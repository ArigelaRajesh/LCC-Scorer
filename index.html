        {tab==="batting"&&<><PartnershipChart inn={inn}/><BattingTab inn={inn}/></>}
        {tab==="bowling"&&<BowlingTab inn={inn}/>}
      </div>
    </div>
  );
}

// ── Score Tab ─────────────────────────────────────────────────────────────────
// ── Free Hit sound — played when a No Ball is recorded ────────────────────────
// Uses a module-level AudioContext so it's accessible from anywhere.
let _fhCtx = null;
function playFreeHitSound(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return;
    if(!_fhCtx)_fhCtx=new Ctx();
    const ctx=_fhCtx;
    if(ctx.state==="suspended")ctx.resume();
    // Ascending G-B-D-G fanfare — distinctive, unmistakable
    [392,494,587,784].forEach((freq,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      const t=ctx.currentTime+i*0.13;
      osc.type="sine";osc.frequency.setValueAtTime(freq,t);
      gain.gain.setValueAtTime(0.0001,t);
      gain.gain.exponentialRampToValueAtTime(0.22,t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(t);osc.stop(t+0.32);
    });
  }catch(e){}
}

// ── Hero animation sounds: bat-hit crack + crowd cheer ─────────────────────────
// Same lightweight, synthesized approach as the free-hit fanfare above (no audio files to host —
// keeps the whole app a single HTML file). Shared context so repeated plays don't pile up nodes.
let _heroCtx = null;
function _getHeroCtx(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return null;
    if(!_heroCtx)_heroCtx=new Ctx();
    if(_heroCtx.state==="suspended")_heroCtx.resume();
    return _heroCtx;
  }catch(e){ return null; }
}
// Short, sharp "crack" — a quick noise burst + a thump, like bat meeting ball.
// Haptic feedback — a tiny vibration confirms a scoring tap registered without looking at the
// screen (great for fast outdoor scoring). Safely no-ops on devices without the Vibration API (iOS
// Safari doesn't support it; Android does).
function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms||12); }catch(e){} }

function playBatCrack(){
  const ctx=_getHeroCtx(); if(!ctx)return;
  try{
    const t=ctx.currentTime;
    // crack: short filtered noise burst
    const bufLen=Math.floor(ctx.sampleRate*0.05);
    const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) data[i]=(Math.random()*2-1)*(1-i/bufLen);
    const noise=ctx.createBufferSource(); noise.buffer=buf;
    const hp=ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=1200;
    const ng=ctx.createGain(); ng.gain.setValueAtTime(0.35,t); ng.gain.exponentialRampToValueAtTime(0.0001,t+0.08);
    noise.connect(hp); hp.connect(ng); ng.connect(ctx.destination); noise.start(t); noise.stop(t+0.08);
    // thump: low sine for body
    const osc=ctx.createOscillator(), og=ctx.createGain();
    osc.type="sine"; osc.frequency.setValueAtTime(180,t); osc.frequency.exponentialRampToValueAtTime(70,t+0.09);
    og.gain.setValueAtTime(0.25,t); og.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
    osc.connect(og); og.connect(ctx.destination); osc.start(t); osc.stop(t+0.1);
  }catch(e){}
}
// Crowd cheer — filtered noise swell, for boundaries (SIX/FOUR).
function playCrowdCheer(big){
  const ctx=_getHeroCtx(); if(!ctx)return;
  try{
    const t=ctx.currentTime;
    const dur=big?1.4:0.8;
    const bufLen=Math.floor(ctx.sampleRate*dur);
    const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) data[i]=Math.random()*2-1;
    const noise=ctx.createBufferSource(); noise.buffer=buf;
    const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=big?1100:900; bp.Q.value=0.7;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(big?0.18:0.12,t+dur*0.25);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    noise.connect(bp); bp.connect(g); g.connect(ctx.destination); noise.start(t); noise.stop(t+dur);
  }catch(e){}
}
// Wicket — deliberately NOT just a bigger crowd cheer (that's what a six already sounds like, and the
// whole point was to make a wicket feel distinct at a glance/listen). Two layered parts: a sharp,
// woody "stumps rattling" knock, then a short descending tone for the dramatic "aaand he's OUT" beat.
function playWicketSound(){
  const ctx=_getHeroCtx(); if(!ctx)return;
  try{
    const t=ctx.currentTime;
    // Part 1: stump-rattle — three quick woody knocks, tight and percussive
    [0,0.045,0.09].forEach((off,i)=>{
      const bufLen=Math.floor(ctx.sampleRate*0.06);
      const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
      const data=buf.getChannelData(0);
      for(let j=0;j<bufLen;j++) data[j]=(Math.random()*2-1)*Math.pow(1-j/bufLen,2);
      const noise=ctx.createBufferSource(); noise.buffer=buf;
      const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=1800-i*300; bp.Q.value=3;
      const g=ctx.createGain();
      g.gain.setValueAtTime(0.28-i*0.05,t+off);
      g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.06);
      noise.connect(bp); bp.connect(g); g.connect(ctx.destination);
      noise.start(t+off); noise.stop(t+off+0.07);
    });
    // Part 2: "womp womp" — a classic two-note descending sad-trombone cadence right after the
    // stump-rattle. A single continuous pitch slide (the old version) read as generically dramatic;
    // two distinct descending notes in sequence is what actually reads as a comedic/rueful "oh no"
    // to a listener, the same shape as the well-known sad-trombone sting.
    [ {start:0.16, from:300, to:210, dur:0.16, peak:0.15},
      {start:0.35, from:230, to:130, dur:0.24, peak:0.17} ].forEach(n=>{
      const osc=ctx.createOscillator(), og=ctx.createGain();
      osc.type="sawtooth";
      osc.frequency.setValueAtTime(n.from,t+n.start);
      osc.frequency.exponentialRampToValueAtTime(n.to,t+n.start+n.dur);
      og.gain.setValueAtTime(0.0001,t+n.start);
      og.gain.exponentialRampToValueAtTime(n.peak,t+n.start+0.02);
      og.gain.exponentialRampToValueAtTime(0.0001,t+n.start+n.dur+0.04);
      osc.connect(og); og.connect(ctx.destination);
      osc.start(t+n.start); osc.stop(t+n.start+n.dur+0.05);
    });
  }catch(e){}
}
// Duck (batter out for 0) — a comedic "quack quack". Two short nasal buzzes made from a fast
// downward sawtooth sweep through a peaky bandpass (that vowel-y "waa" shape reads as a quack).
// Deliberately the ONLY sound for a duck OR golden duck — no celebratory tone layered on top, so it
// stays purely satirical (the `golden` flag now only affects the on-screen visuals, not audio).
function playDuckSound(golden){
  const ctx=_getHeroCtx(); if(!ctx)return;
  try{
    const t=ctx.currentTime;
    const quack=(start,f0,f1)=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=900; bp.Q.value=6;
      osc.type="sawtooth";
      osc.frequency.setValueAtTime(f0,t+start);
      osc.frequency.exponentialRampToValueAtTime(f1,t+start+0.13);
      g.gain.setValueAtTime(0.0001,t+start);
      g.gain.exponentialRampToValueAtTime(0.2,t+start+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001,t+start+0.16);
      osc.connect(bp); bp.connect(g); g.connect(ctx.destination);
      osc.start(t+start); osc.stop(t+start+0.18);
    };
    quack(0,520,300);
    quack(0.22,470,270);
  }catch(e){}
}
// Siren — a two-tone alternating warble (like a referee/emergency alert), so a scorer can hear a
// NO BALL and shout "free hit!" to their fielding side without looking at the screen.
function playSiren(){
  const ctx=_getHeroCtx(); if(!ctx)return;
  try{
    const t=ctx.currentTime;
    const osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type="square";
    // three up/down sweeps between ~660Hz and ~990Hz
    const hi=990, lo=660; let k=t;
    osc.frequency.setValueAtTime(lo,k);
    for(let i=0;i<3;i++){
      osc.frequency.linearRampToValueAtTime(hi,k+0.16); k+=0.16;
      osc.frequency.linearRampToValueAtTime(lo,k+0.16); k+=0.16;
    }
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.12,t+0.04);
    g.gain.setValueAtTime(0.12,k-0.05);
    g.gain.exponentialRampToValueAtTime(0.0001,k+0.05);
    // gentle lowpass so the square wave isn't harsh
    const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=1600;
    osc.connect(lp); lp.connect(g); g.connect(ctx.destination);
    osc.start(t); osc.stop(k+0.1);
  }catch(e){}
}

// ── Milestone sounds ─────────────────────────────────────────────────────────────────────────────
// Until now every milestone (fifty, century, hat-trick, five-for, partnership, 30…) played the same
// generic crowd cheer, so a century sounded identical to a 30. These give the big moments their own
// distinct, recognisable stings — all synthesised in the same Web Audio style as the existing sounds
// (no audio files, keeps the app a single HTML file).

// Triumphant ascending fanfare — for a batter's FIFTY or CENTURY. A bright three-note major arpeggio
// (do–mi–sol) capped by the octave, the classic "achievement unlocked" shape.
function playFanfare(big){
  const ctx=_getHeroCtx(); if(!ctx)return;
  try{
    const t=ctx.currentTime;
    // C major arpeggio; century adds the high octave flourish and a touch more length.
    const notes=big?[523.25,659.25,783.99,1046.5,1318.5]:[523.25,659.25,783.99,1046.5];
    notes.forEach((f,i)=>{
      const step=0.11;
      const st=t+i*step;
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type="triangle";
      osc.frequency.setValueAtTime(f,st);
      g.gain.setValueAtTime(0.0001,st);
      g.gain.exponentialRampToValueAtTime(0.16,st+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,st+step*2.2);
      // a soft second oscillator a fifth up for richness
      const osc2=ctx.createOscillator(), g2=ctx.createGain();
      osc2.type="sine"; osc2.frequency.setValueAtTime(f*1.5,st);
      g2.gain.setValueAtTime(0.0001,st);
      g2.gain.exponentialRampToValueAtTime(0.06,st+0.02);
      g2.gain.exponentialRampToValueAtTime(0.0001,st+step*2);
      osc.connect(g); g.connect(ctx.destination); osc.start(st); osc.stop(st+step*2.5);
      osc2.connect(g2); g2.connect(ctx.destination); osc2.start(st); osc2.stop(st+step*2.5);
    });
  }catch(e){}
}

// Rising achievement sting — for the "smaller" milestones (partnership 50, 30 up, team 50). Two quick
// rising notes: a bright, satisfying "ding-ding" that's clearly positive but lighter than the fanfare.
function playAchievement(){
  const ctx=_getHeroCtx(); if(!ctx)return;
  try{
    const t=ctx.currentTime;
    [ {f:784, st:0}, {f:1046.5, st:0.12} ].forEach(n=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type="sine"; osc.frequency.setValueAtTime(n.f,t+n.st);
      g.gain.setValueAtTime(0.0001,t+n.st);
      g.gain.exponentialRampToValueAtTime(0.15,t+n.st+0.015);
      g.gain.exponentialRampToValueAtTime(0.0001,t+n.st+0.32);
      osc.connect(g); g.connect(ctx.destination); osc.start(t+n.st); osc.stop(t+n.st+0.35);
    });
  }catch(e){}
}

// Dramatic bowler-milestone stab — for a HAT-TRICK or FIVE-FOR. A bold, slightly menacing rising
// brass-like swell then a punchy accent, distinct from the batting fanfare so bowling glory sounds
// like bowling glory.
function playBowlerGlory(){
  const ctx=_getHeroCtx(); if(!ctx)return;
  try{
    const t=ctx.currentTime;
    // rising swell
    const osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type="sawtooth";
    osc.frequency.setValueAtTime(220,t);
    osc.frequency.exponentialRampToValueAtTime(440,t+0.35);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.13,t+0.1);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.45);
    const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=1400;
    osc.connect(lp); lp.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t+0.5);
    // punchy accent chord at the top
    [440,554.37,659.25].forEach(f=>{
      const o=ctx.createOscillator(), og=ctx.createGain();
      o.type="triangle"; o.frequency.setValueAtTime(f,t+0.38);
      og.gain.setValueAtTime(0.0001,t+0.38);
      og.gain.exponentialRampToValueAtTime(0.12,t+0.4);
      og.gain.exponentialRampToValueAtTime(0.0001,t+0.75);
      o.connect(og); og.connect(ctx.destination); o.start(t+0.38); o.stop(t+0.8);
    });
  }catch(e){}
}

// ── QuickAddPlayer — adds a new club member to the roster mid-match ──────────
// Scorer/admin taps "+ Add to club", types a name, saves to Firebase.
// The real-time roster listener in App picks it up instantly — player appears
// in quick-tap buttons for the rest of the match.
function QuickAddPlayer({onAdded,onCancel}){
  const[name,setName]=React.useState("");
  const[saving,setSaving]=React.useState(false);
  const save=()=>{
    const nm=name.trim();if(!nm){alert("Enter a name.");return;}
    if(!FB_OK||!DB){alert("Can't add player — offline.");return;}
    setSaving(true);
    const id="p_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
    DB.ref("roster/"+id).set({name:nm,role:"All-rounder",keeper:false,bat:"Right",bowl:null})
      .then(()=>{ setSaving(false); globalToast(`✅ ${nm} added to the club`); onAdded(nm); })
      .catch(e=>{ setSaving(false); alert("Failed: "+e.message); });
  };
  return(
    <div style={{background:"rgba(16,185,129,.08)",border:"1.5px solid rgba(16,185,129,.35)",borderRadius:12,padding:"10px 12px",marginTop:8}}>
      <p style={{fontSize:10,color:"#34d399",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:8}}>➕ ADD NEW CLUB MEMBER</p>
      <div style={{display:"flex",gap:8}}>
        <input value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&save()}
          placeholder="Player name" autoFocus style={{flex:1,fontSize:13}}/>
        <button onClick={save} disabled={saving} style={{
          padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,
          background:"linear-gradient(135deg,#10b981,#059669)",color:"#111",whiteSpace:"nowrap",
          opacity:saving?.6:1
        }}>{saving?"Saving…":"Add ✓"}</button>
        <button onClick={onCancel} style={{padding:"8px 10px",borderRadius:10,border:"1px solid rgba(107,114,128,.3)",background:"transparent",color:"#9aa8bf",cursor:"pointer",fontSize:13}}>✕</button>
      </div>
      <p style={{fontSize:10,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",marginTop:6}}>Saved to club roster · they can add details later from Join the Club</p>
    </div>
  );
}

function ScoreTab({inn,SK,NS,BW,record,rosterNames,match,pw,nbn,setNBN,confBatsman,nnb,nbwn,setNBWN,confBowler,pr,onRetire,onSwapStrike,onFixPlayers,onEndInnings,onRevert,canRevert,role,onEditOvers,onRestore,restoreChoices,onPickRestore,onCloseRestore,onUndo,canUndo,setIsFreeHit,toast}){
  const[wt,setWT]=useState("Bowled");
  const[fielder,setFielder]=useState("");
  const[roRuns,setRoRuns]=useState(0);      // runs completed before the run-out happened
  const[roEnd,setRoEnd]=useState(null);     // "striker" | "nonStriker" — which end the dismissal occurred at
  const[roOut,setRoOut]=useState(null);     // explicit: which batsman got run out (by name) — removes 0-run ambiguity
  const[showW,setSW]=useState(false);
  const[em,setEM]=useState(null);
  const[er,setER]=useState(0);
  const[nbDecl,setNbDecl]=useState(false); // declared bat-runs on a No Ball — credited but strike never rotates
  const[showOT,setShowOT]=useState(false);
  const[otBase,setOTBase]=useState(0);
  const[otThrow,setOTThrow]=useState(1);
  const isFreeHit=!!(inn&&inn.isFreeHit); // lives on `inn` itself (not local state) so it survives a
  // reload and stays in sync across devices — same class of bug as the old local-only `hist`: a local
  // useState here meant a reload right after a No Ball silently lost free-hit protection, and a
  // second device scoring the same match never even knew the next ball was a free hit.
  // NOTE: setIsFreeHit is a PROP (defined in App, where setInn actually lives) — ScoreTab only
  // receives `inn` read-only plus the `record` callback, so a local setIsFreeHit here would need
  // setInn, which doesn't exist in this component's scope. That mismatch was silently crashing every
  // plain run button (0/1/2/3/4/6) with "setInn is not a function" until this was caught.
  const[quickAdd,setQuickAdd]=useState(null); // "bat" | "bowl" | null
  const[showMore,setShowMore]=useState(false); // collapses less-frequent actions (1D/2D, Overthrow,
  // Retire, End Innings, Edit Overs, Restore) so the core per-ball buttons fit on one screen without
  // scrolling — that's the whole reason a scorer has to keep swiping up and down mid-over.
  const dis=pw||nnb||pr;
  const retiredList=(inn.battingOrder||[]).filter(n=>inn.batsmen&&inn.batsmen[n]&&inn.batsmen[n].retired);

  const wlbl=(t,fielderName,runOutRuns,runOutEnd)=>{
    if(t==="Bowled")  return`b ${inn.bowlerName}`;
    if(t==="Caught"){
      const f=(fielderName||"").trim();
      // If no fielder name was given, or the scorer explicitly typed the bowler's own name,
      // it's genuinely a caught-and-bowled — otherwise credit the fielder who actually took the catch.
      if(!f || f.toLowerCase()===inn.bowlerName.toLowerCase()) return `c & b ${inn.bowlerName}`;
      return `c ${f} b ${inn.bowlerName}`;
    }
    if(t==="LBW")     return`lbw b ${inn.bowlerName}`;
    if(t==="Run Out"){
      const r=parseInt(runOutRuns)||0;
      const endLbl = runOutEnd==="nonStriker" ? `(non-striker's end)` : `(striker's end)`;
      const f=(fielderName||"").trim();
      const by = f ? `run out (${f})` : `run out`;
      const runsPart = r>0 ? ` after ${r} run${r===1?"":"s"}` : "";
      return `${by} ${endLbl}${runsPart}`;
    }
    if(t==="Stumped"){
      const f=(fielderName||"").trim();
      return f ? `st ${f} b ${inn.bowlerName}` : `st b ${inn.bowlerName}`;
    }
    return t;
  };
  const doW=()=>{
    if(wt==="Caught"&&!fielder.trim()){alert("Enter who took the catch (or the bowler's own name if it was caught & bowled).");return;}
    if(wt==="Run Out"&&!inn.single&&!roOut){alert("Select which batsman got run out.");return;}
    // Convert "who got out" (by name) into the engine's runOutEnd ("striker"/"nonStriker"),
    // which means the PHYSICAL end broken AFTER completed runs cross. If an odd number of runs
    // was completed, the batsmen have crossed, so the out player's physical end is the opposite
    // of their starting position.
    let effectiveEnd;
    if(inn.single){
      effectiveEnd="striker";
    }else{
      const runsCross=(parseInt(roRuns)||0)%2===1;
      const outIsStarterStriker = roOut===inn.strikerName;
      // physical end after cross: starter-striker ends at "striker" unless crossed
      effectiveEnd = (outIsStarterStriker !== runsCross) ? "striker" : "nonStriker";
    }
    record({type:"W",extraRuns:0,dismissal:wlbl(wt,fielder,roRuns,effectiveEnd),dismissalType:wt,runOutRuns:roRuns,runOutEnd:effectiveEnd,runOutName:roOut||null,fielder:fielder.trim()||null});
    setSW(false);setFielder("");setRoRuns(0);setRoEnd(null);setRoOut(null);
  };
  const doEx=()=>{
    if(em==="WD"){record({type:"WD",extraRuns:1+er});/* wide on free hit: free hit carries, don't clear */}
    else if(em==="NB"){
      record({type:"NB",extraRuns:1,batRuns:er,isDeclNB:nbDecl});
      // Next delivery is a FREE HIT. The announcement (top banner) and the siren are handled by the
      // shared <BallFlash> when it sees this NB event — so it also reaches viewers and respects the
      // ball-sound toggle. We only need to arm the free-hit state here.
      setIsFreeHit(true);
    }
    else if(em==="DECL"){record({type:"DECL",runs:er||1});setIsFreeHit(false);}
    else{record({type:em,extraRuns:er||1});setIsFreeHit(false);}
    setEM(null);setER(0);setNbDecl(false);
  };
  const doOT=()=>{
    const isDeclOT=typeof otThrow==="string";
    const oRuns=isDeclOT?parseInt(otThrow[1]):otThrow;
    record({type:"OT",baseRuns:otBase,overthrowRuns:oRuns,isDeclOT});
    setIsFreeHit(false); // OT is a legal ball
    setShowOT(false);setOTBase(0);setOTThrow(1);
  };

  // Auto-scroll the "who's next?" panels into view the moment they appear (end of over, wicket,
  // retirement) — the prompt already shows automatically; this makes sure the scorer actually SEES it
  // without hunting, especially with the sticky header taking top space.
  const pendRef=React.useRef(null);
  React.useEffect(()=>{
    if((pw||pr||nnb)&&pendRef.current){ try{pendRef.current.scrollIntoView({behavior:"smooth",block:"center"});}catch(e){} }
  },[pw,pr,nnb]);
  // Fielding-side player list for the dismissal dropdowns (caught by / run out by / stumped by), so the
  // scorer picks a fielder instead of typing. Uses the bowling team's assigned squad (roster fallback),
  // with anyone who's already bowled folded in. Always A–Z, with a "＋ type a new name" escape hatch
  // for a substitute fielder not on any list.
  const fieldOpts=squadOptions(match, inn.bowlingTeam, rosterNames, inn.bowlingOrder);
  // Small reusable fielder dropdown + "type new" fallback. value/onChange drive the shared `fielder`.
  const FielderSelect=({placeholder})=>(
    <>
      <select value={fielder&&!fieldOpts.includes(fielder)?"__new__":fielder}
        onChange={e=>{const v=e.target.value; setFielder(v==="__new__"?"":v);}}
        style={{width:"100%",fontSize:14,padding:"11px 10px",borderRadius:12}}>
        <option value="">{placeholder}</option>
        {fieldOpts.map(n=><option key={n} value={n}>{n}</option>)}
        <option value="__new__">＋ Type a new name…</option>
      </select>
      {(fielder===""||!fieldOpts.includes(fielder))&&(
        <input value={fielder} onChange={e=>setFielder(e.target.value)} placeholder="Type a fielder's name…" style={{width:"100%",fontSize:13,marginTop:6}}/>
      )}
    </>
  );
  return(
    <div className="space-y-4">
      {(pw||pr)&&(
        <div ref={pendRef} className={pr?"alert-indigo":"alert-red"}>
          <p style={{color:pr?"#818cf8":"#f87171",fontFamily:"'JetBrains Mono',monospace",fontSize:11,textTransform:"uppercase",letterSpacing:".15em",marginBottom:8}}>{pr?"🔁 Retired — who's in next?":"⚡ Wicket! Who's next?"}</p>

          {/* Quick-tap: show ONLY batting team's players */}
          {(()=>{
            const dismissed=Object.entries(inn.batsmen||{}).filter(([,b])=>b.out).map(([n])=>n);
            const batting=new Set([SK,NS].filter(Boolean));
            const hasPubTeam=(match?.pubTeamA?.length>0||match?.pubTeamB?.length>0);
            const battingPub=hasPubTeam
              ?(inn.battingTeam===match?.teamA?match.pubTeamA:match.pubTeamB)||[]
              :null;

            if(battingPub&&battingPub.length>0){
              // TEAM MODE: only show this team's players
              const teamAvail=battingPub.filter(n=>!batting.has(n)&&!dismissed.includes(n));
              return(
                <div style={{marginBottom:10}}>
                  <p style={{fontSize:10,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>
                    🟡 {inn.battingTeam} squad:
                  </p>
                  {teamAvail.length===0
                    ?<p style={{fontSize:12,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace"}}>All squad members have batted</p>
                    :<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {teamAvail.map(n=>(
                        <button key={n} onClick={()=>confBatsman(n)} style={{
                          padding:"8px 14px",borderRadius:10,
                          border:"1.5px solid rgba(245,158,11,.5)",
                          background:"rgba(245,158,11,.12)",color:"#fbbf24",fontSize:13,
                          cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,
                          touchAction:"manipulation"
                        }}>{n}</button>
                      ))}
                    </div>
                  }
                </div>
              );
            }else{
              // NO TEAMS ASSIGNED: don't dump the whole club as chips. The dropdown + search below (and
              // the retired-return chips) cover selection cleanly, so this stays uncluttered.
              return null;
            }
          })()}

          {/* Retired batters — return to crease */}
          {retiredList.length>0&&(
            <div style={{marginBottom:10}}>
              <p style={{fontSize:10,color:"#a78bfa",fontFamily:"'JetBrains Mono',monospace",marginBottom:5}}>Return retired:</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {retiredList.map(n=>(
                  <button key={n} onClick={()=>confBatsman(n)} style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid rgba(139,92,246,.5)",background:"rgba(139,92,246,.2)",color:"#c4b5fd",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>
                    {n} <span style={{color:"#7c6aa8",fontSize:10}}>({inn.batsmen[n].runs})</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Dropdown picker (A–Z) — minimises manual typing. Choose a club/retired player from the
              list; only fall back to typing if they pick "＋ Type a new name…". */}
          {/* Dropdown picker (A–Z) — minimises manual typing. Choose a club/retired player from the
              list; only fall back to typing if they pick "＋ Type a new name…". Filtered to exclude
              whoever's already batting at the other end (they can't also be the incoming batsman —
              see confBatsman's matching guard) and anyone already out this innings. */}
          {(()=>{
            const enteringAtStrikerEnd=(inn.pendingOutEnd||"striker")==="striker";
            const otherEndName=enteringAtStrikerEnd?inn.nonStrikerName:inn.strikerName;
            // Pool = the batting team's squad when squads are assigned, otherwise the whole club
            // roster. Retired batters are folded in so they can return. Then drop anyone who can't be
            // the incoming batsman: the player at the other end, anyone already out, and anyone on the
            // fielding side who has bowled.
            const selectable=squadOptions(match, inn.battingTeam, rosterNames, retiredList)
              .filter(n=>!(otherEndName&&n.toLowerCase()===otherEndName.toLowerCase()))
              .filter(n=>!(inn.batsmen&&inn.batsmen[n]&&inn.batsmen[n].out))
              .filter(n=>!(inn.bowlingOrder||[]).some(bn=>bn.toLowerCase()===n.toLowerCase()));
            return(
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <select value={nbn&&!selectable.includes(nbn)?"__new__":nbn}
              onChange={e=>{ const v=e.target.value; if(v==="__new__"){setNBN("");} else {setNBN(v);} }}
              style={{flex:1,fontSize:13,padding:"9px 10px",borderRadius:10}}>
              <option value="">— Select batsman —</option>
              {selectable.map(n=><option key={n} value={n}>{n}</option>)}
              <option value="__new__">＋ Type a new name…</option>
            </select>
            <button className="btn btn-primary" onClick={()=>confBatsman()} style={{padding:"10px 16px",whiteSpace:"nowrap"}}>In →</button>
          </div>
            );
          })()}
          {/* Manual name box appears only when nothing in the list matches (i.e. entering a new person) */}
          {(nbn===""||!squadOptions(match, inn.battingTeam, rosterNames, retiredList).includes(nbn))&&(
            <input value={nbn} onChange={e=>setNBN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confBatsman()}
              placeholder="Type a new player's name…" style={{width:"100%",fontSize:13,marginTop:6}}/>
          )}

          {/* Quick-add new player to roster mid-match */}
          {quickAdd==="bat"
            ? <QuickAddPlayer onAdded={nm=>{setQuickAdd(null);confBatsman(nm);}} onCancel={()=>setQuickAdd(null)}/>
            : <button onClick={()=>setQuickAdd("bat")} style={{marginTop:8,width:"100%",padding:"7px",borderRadius:10,border:"1px dashed rgba(16,185,129,.4)",background:"transparent",color:"#34d399",cursor:"pointer",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>➕ Add new player to club</button>
          }
        </div>
      )}
      {nnb&&!pw&&(
        <div className="alert-indigo" style={{border:"2px solid #6366f1"}}>
          <p style={{color:"#a5b4fc",fontFamily:"'JetBrains Mono',monospace",fontSize:12,textTransform:"uppercase",letterSpacing:".12em",marginBottom:4,fontWeight:700}}>🎯 Over Complete!</p>
          <p ref={nnb&&!(pw||pr)?pendRef:null} style={{color:"#818cf8",fontSize:12,marginBottom:10}}>Who bowls next? <span style={{color:"#4338ca",fontSize:11}}>(not {inn.bowlerName})</span></p>

          {/* Quick-tap: show ONLY bowling team's players */}
          {(()=>{
            const bowled=new Set(inn.bowlingOrder||[]);
            const hasPubTeam=(match?.pubTeamA?.length>0||match?.pubTeamB?.length>0);
            const bowlingPub=hasPubTeam
              ?(inn.battingTeam===match?.teamA?match.pubTeamB:match.pubTeamA)||[]
              :null;
            const bowlingTeam=inn.battingTeam===match?.teamA?match?.teamB:match?.teamA;

            const BowlBtn=({n})=>{
              const b=inn.bowlers?.[n];
              const prev=bowled.has(n);
              return(
                <button key={n} onClick={()=>confBowler(n)} style={{
                  padding:"8px 14px",borderRadius:10,touchAction:"manipulation",
                  border:prev?"1.5px solid rgba(99,102,241,.4)":"1.5px solid rgba(52,211,153,.4)",
                  background:prev?"rgba(99,102,241,.12)":"rgba(52,211,153,.1)",
                  color:prev?"#a5b4fc":"#6ee7b7",fontSize:13,cursor:"pointer",
                  fontFamily:"'Inter',sans-serif",fontWeight:600
                }}>
                  {n}{prev&&b?<span style={{fontSize:10,opacity:.65,marginLeft:4}}>{b.overs}.{b.ballsThisOver}-{b.runs}-{b.wickets}</span>:""}
                </button>
              );
            };

            if(bowlingPub&&bowlingPub.length>0){
              // TEAM MODE: only show bowling team's players
              const fresh=bowlingPub.filter(n=>n!==inn.bowlerName&&!bowled.has(n));
              const prev=bowlingPub.filter(n=>n!==inn.bowlerName&&bowled.has(n));
              return(
                <div style={{marginBottom:10}}>
                  {fresh.length>0&&(
                    <>
                      <p style={{fontSize:10,color:"#6ee7b7",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>
                        ⚡ {bowlingTeam||"Bowling team"} — fresh:
                      </p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                        {fresh.map(n=><BowlBtn key={n} n={n}/>)}
                      </div>
                    </>
                  )}
                  {prev.length>0&&(
                    <>
                      <p style={{fontSize:10,color:"#bcc7d8",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>Bowled before:</p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {prev.map(n=><BowlBtn key={n} n={n}/>)}
                      </div>
                    </>
                  )}
                  {fresh.length===0&&prev.length===0&&(
                    <p style={{fontSize:12,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace"}}>No available bowlers from team</p>
                  )}
                </div>
              );
            }else{
              // NO TEAMS ASSIGNED: don't dump the whole club as chips (that's the cluttered list the
              // user didn't want). Only show players who have ALREADY bowled in THIS match as quick
              // re-pick chips — a short, relevant list. Everyone else is reachable via the dropdown +
              // search below, or the "add new player" option. Keeps this panel clean.
              const prev=(rosterNames||[]).filter(n=>n!==inn.bowlerName&&bowled.has(n));
              return(
                <div style={{marginBottom:10}}>
                  {prev.length>0&&<>
                    <p style={{fontSize:10,color:"#bcc7d8",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>Bowled before — tap to re-pick:</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {prev.map(n=><BowlBtn key={n} n={n}/>)}
                    </div>
                  </>}
                </div>
              );
            }
          })()}

          {/* Dropdown picker (A–Z) — bowling team's squad when assigned, else the club roster. */}
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <select value={nbwn&&!squadOptions(match, inn.bowlingTeam, rosterNames).includes(nbwn)?"__new__":nbwn}
              onChange={e=>{ const v=e.target.value; if(v==="__new__"){setNBWN("");} else {setNBWN(v);} }}
              style={{flex:1,fontSize:13,padding:"9px 10px",borderRadius:10}}>
              <option value="">— Select bowler —</option>
              {squadOptions(match, inn.bowlingTeam, rosterNames).map(n=><option key={n} value={n}>{n}</option>)}
              <option value="__new__">＋ Type a new name…</option>
            </select>
            <button className="btn btn-primary" onClick={()=>confBowler()} style={{padding:"10px 18px",whiteSpace:"nowrap"}}>Bowl →</button>
          </div>
          {(nbwn===""||!squadOptions(match, inn.bowlingTeam, rosterNames).includes(nbwn))&&(
            <input value={nbwn} onChange={e=>setNBWN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confBowler()}
              placeholder="Type a new player's name…" style={{width:"100%",fontSize:13,marginTop:6}}/>
          )}

          {/* Quick-add new player mid-match */}
          {quickAdd==="bowl"
            ? <QuickAddPlayer onAdded={nm=>{setQuickAdd(null);confBowler(nm);}} onCancel={()=>setQuickAdd(null)}/>
            : <button onClick={()=>setQuickAdd("bowl")} style={{marginTop:8,width:"100%",padding:"7px",borderRadius:10,border:"1px dashed rgba(16,185,129,.4)",background:"transparent",color:"#34d399",cursor:"pointer",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>➕ Add new player to club</button>
          }
        </div>
      )}

      {/* Mini cards */}
      <div className="grid-2">
        <div className="mini-card" style={{padding:"10px 12px"}}>
          {/* Header row: title + quick-swap + edit */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <p className="section-title" style={{marginBottom:0}}>🟡 {inn.single?"Batsman":"Batting"}</p>
            {!inn.single&&NS&&(
              <div style={{display:"flex",gap:5}}>
                <button onClick={onSwapStrike} title="Swap strike — instant, no modal" style={{
                  padding:"3px 8px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700,
                  background:"rgba(99,102,241,.15)",border:"1px solid rgba(99,102,241,.4)",color:"#a5b4fc",
                  fontFamily:"'JetBrains Mono',monospace"
                }}>⇄</button>
                <EditPlayersButton inn={inn} match={match} rosterNames={rosterNames} onSwap={onSwapStrike} onSave={onFixPlayers}/>
              </div>
            )}
          </div>
          {(inn.single?[{p:SK,a:true}]:[{p:SK,a:true},{p:NS,a:false}]).map(({p,a},i)=>p?(
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"3px 0",gap:6}}>
              <span style={{fontSize:13,fontWeight:a?700:400,color:a?"#fff":"#bcc7d8",overflow:"hidden",flex:1,minWidth:0}} className="truncate">
                {firstName(p.name)}{a&&<span style={{color:"#fbbf24",fontWeight:700}}> *</span>}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#9aa8bf",flexShrink:0,marginLeft:8}}>{p.runs} ({p.balls})</span>
            </div>
          ):null)}
          {retiredList.length>0&&<p style={{fontSize:9,color:"#7c6aa8",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{retiredList.length} retired</p>}
        </div>
        <div className="mini-card" style={{padding:"10px 12px"}}>
          <p className="section-title" style={{marginBottom:8}}>🎯 Bowling</p>
          {BW&&<div className="flex items-center justify-between" style={{gap:8}}>
            <span style={{fontSize:13,fontWeight:700,color:"#fff",flex:1,minWidth:0,overflow:"hidden"}} className="truncate">{shortName(BW.name)}</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#9aa8bf",flexShrink:0}}>{BW.overs}.{BW.ballsThisOver}-{BW.runs}-{BW.wickets}</span>
          </div>}
        </div>
      </div>

      {/* Over ticker */}
      <div>
        <div className="flex items-center justify-between" style={{marginBottom:6}}>
          <p className="section-title" style={{marginBottom:0}}>Over {Math.floor(inn.totalBalls/6)+1}/{inn.overs} · <span style={{color:"#fbbf24"}}>{inn.totalBalls%6} of 6 balls</span>{(inn.overEvents||[]).filter(e=>e.type==="WD"||e.type==="NB").length>0&&<span style={{color:"#fb923c"}}> +{(inn.overEvents||[]).filter(e=>e.type==="WD"||e.type==="NB").length} extra</span>}</p>
          <button className="btn-undo" onClick={onUndo} disabled={!canUndo} title={canUndo?"Undo the last ball":"Nothing to undo yet this innings"}>↩ Undo</button>
        </div>
        <div style={{background:"#130f3a",border:"1px solid #1e1b4b",borderRadius:12,padding:"6px 10px",display:"flex",gap:6,minHeight:40,overflowX:"auto",alignItems:"center"}}>
          {(inn.overEvents||[]).length===0
            ?<span style={{color:"#2d2a6a",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>— new over —</span>
            :(inn.overEvents||[]).map((ev,i)=><div key={i} className={chipClass(ev)}>{chipLbl(ev)}</div>)
          }
        </div>
        {/* Previous over — one compact, non-wrapping line: label, chips (scrollable), runs total inline.
            Previously this row had flexWrap on, so on narrow phones the "36 runs" total wrapped onto its
            OWN line, adding a whole extra row of height for no reason — part of why the scoring buttons
            kept getting pushed below the fold. */}
        {(()=>{
          const co=inn.completedOvers||[];
          if(co.length===0) return null;
          const last=co[co.length-1]||[];
          const runsInOver=last.reduce((s,ev)=>s+evRuns(ev),0);
          const wktsInOver=last.filter(ev=>ev.type==="W").length;
          return(
            <div style={{marginTop:5,display:"flex",alignItems:"center",gap:6,flexWrap:"nowrap",overflow:"hidden"}}>
              <span style={{fontSize:9,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".08em",flexShrink:0}}>Ov {co.length} →</span>
              <div style={{display:"flex",gap:4,overflowX:"auto",flex:1,minWidth:0}}>
                {last.map((ev,i)=><div key={i} className={chipClass(ev)} style={{transform:"scale(.8)",transformOrigin:"left center",opacity:.85}}>{chipLbl(ev)}</div>)}
              </div>
              <span style={{fontSize:10,color:"#bcc7d8",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>
                {runsInOver}r{wktsInOver>0?` ${wktsInOver}w`:""}
              </span>
            </div>
          );
        })()}
      </div>

      {/* The transient "no ball → free hit" announcement is now handled by the shared <BallFlash>
          top banner (visible to scorer AND viewers, with the siren), so the old center-screen popup
          that used to live here was removed — it duplicated that and overlapped the batting card. */}

      {/* Persistent free hit chip — a slim strip that stays visible for the whole free-hit delivery
          (through any wides) until the next legal ball, so the scorer always has it on screen. */}
      {isFreeHit&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          padding:"9px 16px",borderRadius:30,marginBottom:6,
          background:"rgba(234,179,8,.13)",border:"1.5px solid rgba(234,179,8,.45)"}}>
          <span style={{fontSize:16}}>🟡</span>
          <span style={{color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:".05em"}}>FREE HIT — only Run Out can dismiss</span>
        </div>
      )}

      {/* Note: a "last action" toast used to render here, restating what was just recorded (e.g.
          "6 runs"). Removed — the ball-history chips right above already show exactly that, and the
          score itself updates instantly, so it was pure duplication taking up vertical space for no
          added information. */}

      {/* Buttons */}
      <div style={{opacity:dis?.4:1,pointerEvents:dis?"none":"auto"}} className="space-y-3">
        <div className="grid-4">
          {[0,1,2,3].map(r=><button key={r} className="btn-run" onClick={()=>{record({type:String(r)});setIsFreeHit(false);}}>{r}</button>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1.4fr 1.4fr 1fr 1fr",gap:8}}>
          <button className="btn-run amber" onClick={()=>{record({type:"4"});setIsFreeHit(false);}}>4</button>
          <button className="btn-run green" onClick={()=>{record({type:"6"});setIsFreeHit(false);}}>6</button>
          <button className="btn-run decl" onClick={()=>record({type:"DECL",runs:1})} title="1 declared run — credited, strike won't rotate">1D</button>
          <button className="btn-run decl" onClick={()=>record({type:"DECL",runs:2})} title="2 declared runs — credited, strike won't rotate">2D</button>
        </div>
        <div className="grid-4" style={{gridTemplateColumns:"1fr 1fr 1fr"}}>
          <button className="btn btn-danger" onClick={()=>setSW(true)} style={{borderRadius:14,padding:"13px 8px",fontSize:13}}>Wicket</button>
          <button className="btn btn-outline-amber" onClick={()=>setEM("WD")} style={{borderRadius:14,fontSize:13}}>Wide</button>
          <button className="btn btn-outline-amber" onClick={()=>setEM("NB")} style={{borderRadius:14,fontSize:13,borderColor:"#ca8a04",color:"#facc15"}}>No Ball</button>
        </div>
        {/* Overthrow + Retire share a row now — both are mid-innings actions common enough to want
            one tap away. The rare once-a-match actions (end innings, edit overs, restore) stay behind
            "More actions" below. */}
        <div style={{display:"flex",gap:8}}>
          <button className="btn" onClick={()=>setShowOT(true)} style={{flex:1,borderRadius:14,fontSize:13,padding:"10px 6px",background:"transparent",border:"1.5px solid rgba(251,146,60,.55)",color:"#fb923c",fontWeight:600}}>🔄 Overthrow</button>
          <button className="btn" onClick={onRetire} style={{flex:1,borderRadius:14,fontSize:13,padding:"10px 6px",background:"transparent",border:"1.5px solid rgba(139,92,246,.5)",color:"#c4b5fd",fontWeight:600}}>🔁 Retire {inn.single?"Bat":"Striker"}</button>
        </div>
        <button className="btn w-full" onClick={()=>setShowMore(s=>!s)} style={{borderRadius:14,fontSize:12,padding:"9px",background:"transparent",border:"1px solid rgba(99,102,241,.3)",color:"#818cf8",marginTop:6}}>
          {showMore?"▲ Fewer actions":"▼ More actions (end innings, edit overs…)"}
        </button>
      </div>

      {/* End Innings / Revert — always clickable, even mid-wicket or mid-bowler-change, so admin/scorer can always end or recover */}
      {showMore&&(<>
      <div className="grid-2" style={{marginTop:8}}>
        <button className="btn w-full" onClick={onEndInnings} style={{borderRadius:14,fontSize:12,padding:"11px",background:"transparent",border:"1.5px solid rgba(239,68,68,.4)",color:"#f87171"}}>⏹ End {inn.inningsNum===1?"Innings":"Match"}</button>
        {onRevert&&<button className="btn w-full" onClick={onRevert} disabled={!canRevert} style={{borderRadius:14,fontSize:12,padding:"11px",background:"transparent",border:`1.5px solid ${canRevert?"rgba(52,211,153,.5)":"rgba(55,65,129,.3)"}`,color:canRevert?"#34d399":"#526480",cursor:canRevert?"pointer":"not-allowed"}}>↩️ Revert to Live</button>}
      </div>
      {onEditOvers&&(
        <button className="btn w-full" onClick={()=>{const v=prompt(`Change match overs (currently ${inn.overs}). Enter new total overs:`,String(inn.overs));if(v!==null)onEditOvers(v);}}
          style={{marginTop:8,borderRadius:14,fontSize:12,padding:"11px",background:"transparent",border:"1.5px solid rgba(139,92,246,.4)",color:"#a78bfa"}}>⚙️ Edit Overs ({inn.overs})</button>
      )}
      {role==="admin"&&onRestore&&(
        <button className="btn w-full" onClick={onRestore}
          style={{marginTop:8,borderRadius:14,fontSize:11,padding:"10px",background:"transparent",border:"1px solid rgba(99,102,241,.3)",color:"#9aa8bf"}}
          title="Disaster recovery: restore the match from an automatic backup or checkpoint">🛟 Restore from backup</button>
      )}
      </>)}

      {/* Restore picker — every restorable snapshot, newest first. Checkpoints (write-once, captured
          at each wicket/over) are the trustworthy ones after a corruption event; latest/previous roll
          every ~8s so they may already carry the bad state. Labels show score + time so a poisoned
          snapshot is visually obvious (its score won't match what actually happened at that time). */}
      {restoreChoices&&<Modal onClose={onCloseRestore} title="🛟 Restore from backup">
        {restoreChoices.length===0
          ?<p style={{color:"#bcc7d8",fontFamily:"'JetBrains Mono',monospace",fontSize:12,lineHeight:1.6}}>No backups found yet. Backups are taken automatically a few seconds into a live match, plus a durable checkpoint at every wicket and completed over.</p>
          :<>
            <p style={{color:"#bcc7d8",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:12,lineHeight:1.5}}>Pick the point to go back to. If the newest ones look wrong, choose an older checkpoint — checkpoints can never be overwritten after they're captured.</p>
            <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:"50vh",overflowY:"auto"}}>
              {restoreChoices.map((c,i)=>{
                const t=c.when?new Date(c.when).toLocaleTimeString():"unknown time";
                const kindColor=c.kind==="checkpoint"?"#34d399":c.kind==="latest"?"#fbbf24":"#818cf8";
                const kindLbl=c.kind==="checkpoint"?"🔒 checkpoint":c.kind==="latest"?"latest":"previous";
                return(
                  <button key={i} onClick={()=>{
                      if(confirm(`Restore to: ${c.label}\nSaved ${t}\n\nThis replaces the current live match with that snapshot.`)) onPickRestore(c.snap);
                    }}
                    style={{textAlign:"left",padding:"12px 14px",borderRadius:12,cursor:"pointer",
                      background:"rgba(99,102,241,.06)",border:"1px solid rgba(99,102,241,.25)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                      <span style={{color:"#e5e7eb",fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:600}}>{c.label}</span>
                      <span style={{color:kindColor,fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",whiteSpace:"nowrap"}}>{kindLbl}</span>
                    </div>
                    <div style={{color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",fontSize:10,marginTop:3}}>saved {t}</div>
                  </button>
                );
              })}
            </div>
          </>}
      </Modal>}

      {/* Wicket modal */}
      {showW&&<Modal onClose={()=>{setSW(false);setFielder("");setRoRuns(0);setRoEnd(null);setRoOut(null);}} title="🏏 How Out?">
        {isFreeHit&&(
          <div style={{background:"rgba(234,179,8,.12)",border:"1.5px solid rgba(234,179,8,.4)",borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>🟡</span>
            <span style={{fontSize:12,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>FREE HIT — only Run Out can dismiss</span>
          </div>
        )}
        <div className="grid-2 mb-4">
          {(isFreeHit?["Run Out"]:["Bowled","Caught","Run Out","Stumped"]).map(w=>(
            <button key={w} onClick={()=>setWT(w)} style={{padding:"10px 8px",borderRadius:12,border:`1.5px solid ${wt===w?"transparent":"#526480"}`,background:wt===w?"linear-gradient(135deg,#dc2626,#991b1b)":"transparent",color:wt===w?"#fff":"#bcc7d8",cursor:"pointer",fontWeight:600,fontSize:13,fontFamily:"'Inter',sans-serif",marginBottom:4}}>{w}</button>
          ))}
        </div>
        {wt==="Caught"&&!isFreeHit&&(
          <div style={{marginBottom:14}}>

              border:`1.5px solid ${otThrow===r?"transparent":"#526480"}`,
              background:otThrow===r?"linear-gradient(135deg,#fb923c,#ea580c)":"transparent",

          Declared overthrow <span style={{color:"#a78bfa"}}>(1D/2D — strike based on batter runs only):</span>
        </p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {["D1","D2"].map(d=>(
            <button key={d} onClick={()=>setOTThrow(d)} style={{padding:"10px",borderRadius:12,
              border:`1.5px solid ${otThrow===d?"transparent":"rgba(167,139,250,.4)"}`,
              background:otThrow===d?"linear-gradient(135deg,#7c3aed,#6d28d9)":"rgba(167,139,250,.08)",
              color:otThrow===d?"#fff":"#a78bfa",cursor:"pointer",fontWeight:700,
              fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>{d[1]+"D"}</button>
          ))}
        </div>

        {/* Strike preview */}
        {(()=>{
          const isDeclOT=typeof otThrow==="string";
          const oRuns=isDeclOT?parseInt(otThrow[1]):otThrow;
          const total=otBase+oRuns;
          const strikeChanges=isDeclOT?otBase%2===1:(total)%2===1;
          return(
            <div style={{background:"rgba(251,146,60,.1)",border:"1px solid rgba(251,146,60,.3)",
              borderRadius:12,padding:"10px 14px",marginBottom:14,textAlign:"center"}}>

              </p>

                {strikeChanges?"⇄ Strike CHANGES":"→ Strike STAYS"}
                {isDeclOT&&<span style={{color:"#9aa8bf"}}> (declared — only bat runs count)</span>}
              </p>
            </div>
          );
        })()}

        <button className="btn btn-primary w-full" style={{borderRadius:14}} onClick={doOT}>Confirm Overthrow</button>
      </Modal>}
    </div>
  );
}

function Modal({children,onClose,title}){
  // Rendered via a portal straight to <body>. Several places this is used sit inside .score-header,
  // which has backdrop-filter:blur(...) for the sticky-header glass effect — and any ancestor with a
  // filter/backdrop-filter (or transform) becomes the CONTAINING BLOCK for position:fixed descendants
  // (a real CSS behavior, not just a Safari quirk). Without the portal, this modal's "fixed" overlay
  // was being sized to that small sticky header instead of the actual viewport, which is why it
  // rendered squished near the top of the screen instead of centered/bottom-sheet over everything.
  return ReactDOM.createPortal(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 style={{fontWeight:700,fontSize:17}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#9aa8bf",fontSize:22,cursor:"pointer",lineHeight:1,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8}}>×</button>
        </div>
        {children}
      </div>
    </div>,
    document.body
  );
}

function PinManagementButton(){
  const[open,setOpen]=React.useState(false);
  const[basicPin,setBasicPin]=React.useState("");
  const[superPin,setSuperPin]=React.useState("");
  const[saved,setSaved]=React.useState(false);
  const[err,setErr]=React.useState("");
  const openModal=()=>{ setBasicPin(""); setSuperPin(""); setSaved(false); setErr(""); setOpen(true); };
  const save=()=>{
    setErr("");
    const bp=basicPin.trim(), sp=superPin.trim();
    if(bp&&(bp.length<4||!/^\d+$/.test(bp))){ setErr("Basic PIN must be 4 digits."); return; }
    if(sp&&(sp.length<4||!/^\d+$/.test(sp))){ setErr("Super PIN must be 4 digits."); return; }
    if(bp&&sp&&bp===sp){ setErr("The two PINs can't be the same."); return; }
    if(!bp&&!sp){ setErr("Enter at least one PIN to update."); return; }
    if(!FB_OK||!DB){ setErr("Offline — can't save right now."); return; }
    const updates={};
    if(bp) updates["adminPins/basic"]=bp;
    if(sp) updates["adminPins/super"]=sp;
    DB.ref().update(updates)
      .then(()=>{ setSaved(true); setBasicPin(""); setSuperPin(""); })
      .catch(e=>setErr("Save failed: "+e.message));
  };
  return(<>
    <button onClick={openModal} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.35)",color:"#f87171",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderRadius:8,padding:"4px 9px",fontWeight:600}}>🔐 PINs</button>
    {open&&<Modal onClose={()=>setOpen(false)} title="🔐 Manage Admin PINs">
      <p style={{color:"#bcc7d8",fontSize:12,marginBottom:14}}>Leave a field blank to keep the current PIN unchanged. Changes take effect for the next login — anyone already logged in stays active until they leave.</p>
      <label>New Basic Admin PIN (4 digits)</label>
      <input value={basicPin} onChange={e=>{setBasicPin(e.target.value.replace(/\D/g,"").slice(0,4));setSaved(false);setErr("");}} placeholder="Leave blank to keep current" inputMode="numeric" maxLength={4} style={{marginBottom:12,letterSpacing:"0.3em",textAlign:"center"}}/>
      <label>New Super Admin PIN (4 digits)</label>
      <input value={superPin} onChange={e=>{setSuperPin(e.target.value.replace(/\D/g,"").slice(0,4));setSaved(false);setErr("");}} placeholder="Leave blank to keep current" inputMode="numeric" maxLength={4} style={{marginBottom:14,letterSpacing:"0.3em",textAlign:"center"}}/>
      {err&&<p style={{color:"#f87171",fontSize:12,marginBottom:10}}>{err}</p>}
      {saved&&<p style={{color:"#34d399",fontSize:12,marginBottom:10}}>✓ PINs updated! Share the new Basic PIN with your helper.</p>}
      <p style={{color:"#4338ca",fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginBottom:12}}>Note: PINs are stored securely in Firebase. The hardcoded fallbacks in the file still work if Firebase is unreachable.</p>
      <button className="btn btn-primary w-full" onClick={save}>Save PINs</button>
    </Modal>}
  </>);
}

// Replaces the 6-button overflow row with a tidy dropdown. Navigation items
// (History, Notice) close the menu and navigate. Modal items manage their own

function AdminActionsMenu({onHistory,onAnnounce,inn,onEditMatchSave,match,role,onUpdateTeams,rosterNames,onAbandonMatch,hiCon,setHiCon,bigText,setBigText,celebrationSound,setCelebrationSound,onFixPlayers}){
  const[open,setOpen]=React.useState(false);
  const[editOpen,setEditOpen]=React.useState(false);
  // Fix Players now lives inside this menu (it used to be a separate header button, which cost a
  // whole extra row and pushed the scoring buttons below the fold). Same fields/validation as before.
  const[fixOpen,setFixOpen]=React.useState(false);
  const[fixSk,setFixSk]=React.useState("");
  const[fixNs,setFixNs]=React.useState("");
  const[fixBw,setFixBw]=React.useState("");
  const openFix=()=>{ setFixSk(inn?.strikerName||"");setFixNs(inn?.nonStrikerName||"");setFixBw(inn?.bowlerName||"");setFixOpen(true); };
  const saveFix=()=>{

    if(!inn?.single&&!n){alert("Non-striker name can't be empty.");return;}
    if(!b){alert("Bowler name can't be empty.");return;}
    if(!inn?.single&&s.toLowerCase()===n.toLowerCase()){alert("Striker and non-striker can't be the same person.");return;}
    onFixPlayers&&onFixPlayers({striker:s,nonStriker:inn?.single?null:n,bowler:b});
