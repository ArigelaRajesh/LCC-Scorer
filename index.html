// ── Global toast bus ─────────────────────────────────────────────────────────
// A tiny pub/sub so ANY component (QuickAddPlayer, team editor, PIN modal, etc.) can show a quick
// "✅ Saved" confirmation without threading a callback through props everywhere. GlobalToastHost is
// mounted once near the app root; globalToast(msg) is the only thing other components need to call.
let _toastListeners=[];
function globalToast(msg){ _toastListeners.forEach(fn=>fn(msg)); }
function GlobalToastHost(){
  const[items,setItems]=React.useState([]);
  React.useEffect(()=>{
    const fn=(msg)=>{
      const id=Math.random().toString(36).slice(2);
      setItems(it=>[...it,{id,msg}]);
      setTimeout(()=>setItems(it=>it.filter(x=>x.id!==id)),2800);
    };
    _toastListeners.push(fn);
    return ()=>{_toastListeners=_toastListeners.filter(x=>x!==fn);};
  },[]);
  if(items.length===0) return null;
  return(
    <div style={{position:"fixed",left:"50%",bottom:"calc(18px + env(safe-area-inset-bottom,0px))",transform:"translateX(-50%)",
      zIndex:500,display:"flex",flexDirection:"column",gap:8,alignItems:"center",pointerEvents:"none"}}>
      {items.map(it=>(
        <div key={it.id} style={{background:"var(--surface-2)",border:"1px solid var(--border-soft)",borderRadius:12,
          padding:"9px 16px",fontSize:13,color:"var(--text)",boxShadow:"0 6px 20px rgba(0,0,0,.35)",
          animation:"screenIn .25s ease-out both",whiteSpace:"nowrap"}}>{it.msg}</div>
      ))}
    </div>
  );
}

function Root(){
  const[screen,setScreen]=React.useState(()=>{
    // Deep-link: a QR code / shared link can encode "#live" so scanning it drops straight into the
    // viewer instead of the landing page — one less tap for anyone at the ground.
    try{ if(window.location.hash==="#live") return "viewer"; }catch(e){}
    return "landing";
  });
  const[gate,setGate]=React.useState(null);
  const[adminTier,setAdminTier]=React.useState(null);
  const[dynPins,setDynPins]=React.useState(null);
  // Stable per-tab identity for the single-active-session lock (see claimSession above) — generated
  // once and reused for every claim/heartbeat this tab makes, whether as admin or as a team scorer.
  const mySessionId=React.useRef(Math.random().toString(36).slice(2,10)+Date.now().toString(36)).current;
  // Carries which slot ("teamA"/"teamB") the scorer's PIN resolved to, from ScorerGate into the <App>
  // that mounts right after — App needs this to keep the claim alive with a heartbeat.
  const scorerSlotRef=React.useRef(null);
  const[adminConflict,setAdminConflict]=React.useState(null); // {heldSince} while another admin device is active
  const[adminClaiming,setAdminClaiming]=React.useState(false);

  // ── Browser back button handling ──────────────────────────────────────────
  // Maintain an in-app navigation stack. Every setScreen() pushes a browser
  // history entry so the back button stays inside the app instead of leaving.
  const navStack=React.useRef(["landing"]);
  // Carries a fixture's team names (and tournament/fixture ids) from "Start This Match" on the
  // Tournaments page into the Setup screen, so the team-name fields come pre-filled instead of
  // needing to be retyped. A ref rather than state because it only needs to be read once, at the
  // moment Setup mounts — it's not something anything should re-render in response to.
  const pendingFixtureRef=React.useRef(null);
  const adminAutoTriedRef=React.useRef(false);

  // ── Root-level session heartbeat — the WHOLE admin session, not just the scoring screen ─────────
  // The claim made at the PIN gate must stay alive for as long as this device is signed in ANYWHERE
  // in the admin area (dashboard, roster, poll, history, PIN management…), not only while the App
  // scoring component happens to be mounted. Without this, an admin idling on the dashboard had
  // nothing renewing their claim, it went stale after 20s, and a second device could log straight
  // in — which defeats the entire point of blocking at the gate. Runs whenever adminTier is set;
  // team-scorer sessions are covered by App's own heartbeat since the scoring screen is the only
  // place a team scorer can be. If the slot ever shows a DIFFERENT sessionId (only possible if this
  // device itself went dead/offline for 20s+ and someone else reclaimed the stale slot), this device
  // signs itself out to the landing page rather than carrying on with a session it no longer owns.
  React.useEffect(()=>{
    if(adminTier===null||!FB_OK||!DB) return;
    const ref=DB.ref(sessionPath(null,SCORING_SLOT));
    const renew=()=>{ ref.set({sessionId:mySessionId,lastSeen:Date.now()}).catch(()=>{}); };
    renew();
    const hb=setInterval(renew,6000);
    const cb=ref.on("value",s=>{
      const v=s.val();
      if(v&&v.sessionId&&v.sessionId!==mySessionId){
        try{alert("You were signed out: this device was offline too long and another device signed in.");}catch(e){}
        navStack.current=["landing"];
        window.history.replaceState({screen:"landing",depth:1},"");
        setScreen("landing"); setGate(null); setAdminTier(null);
      }
    });
    return ()=>{ clearInterval(hb); ref.off("value",cb); };
  },[adminTier]);

  const go=(s)=>{
    navStack.current=[...navStack.current,s];
    window.history.pushState({screen:s,depth:navStack.current.length},"");
    setScreen(s);
    setGate(null);
  };
  const goBack=()=>{
    if(navStack.current.length>1){
      navStack.current=navStack.current.slice(0,-1);
      const prev=navStack.current[navStack.current.length-1];
      setScreen(prev);
      // If going back past any admin screen to landing, clear admin state
      if(prev==="landing") setGate(null);
    } else {
      setScreen("landing");
      setGate(null);
    }
  };

  React.useEffect(()=>{
    // Seed the initial history entry
    window.history.replaceState({screen:"landing",depth:1},"");
    const onPop=()=>goBack();
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[]);

  // Wrap setScreen so it also updates navStack and browser history
  const nav=(s)=>go(s);
  const home=()=>{
    navStack.current=["landing"];
    window.history.replaceState({screen:"landing",depth:1},"");
    setScreen("landing");
    setGate(null);
    // Free the admin session lock immediately on exit, not just when <App> itself unmounts — an
    // admin who only browsed the dashboard/Poll/Roster/History and never actually entered live
    // scoring would otherwise leave the lock held (nothing was heartbeating it, but nothing released
    // it either) until it naturally expired. The admin slot is global (not matchId-scoped), so this
    // needs no matchId to release correctly.
    if(adminTier!==null) releaseSession(null,SCORING_SLOT,mySessionId);
    setAdminTier(null); // Clear admin tier so stale tier never contaminates next login
  };
  // Explicit "Log Out" — distinct from "← home". Home just navigates away (this device stays
  // remembered, so picking Admin again logs back in silently). Log Out additionally forgets the
  // remembered PIN on THIS device — for handing the phone to someone else, or when it isn't your
  // device at all — so the next person who opens the app gets a real PIN prompt, not a free pass in.
  const logoutAdmin=()=>{
    if(adminTier!==null) releaseSession(null,SCORING_SLOT,mySessionId);
    try{localStorage.removeItem("lcc_pin_admin");}catch(e){}
    navStack.current=["landing"];
    window.history.replaceState({screen:"landing",depth:1},"");
    setScreen("landing");
    setGate(null);
    setAdminTier(null);
  };
  const pick=(r)=>{
    if(r==="scorer"){setGate("scorer");}
    else if(r==="admin"){setGate("admin");}
    else nav(r);
  };

  if(gate==="scorer") return <ScorerGate mySessionId={mySessionId} onOk={(r)=>{scorerSlotRef.current=r.sessionSlot||null;setGate(null);setScreen("scorer");}} onCancel={home}/>;
  if(gate==="admin"){
    const adminVerify=(v)=>{
      const pins=dynPins||{super:ADMIN_PIN,basic:BASIC_ADMIN_PIN};
      if(v===pins.super) return {ok:true, tier:"super"};
      if(v===pins.basic) return {ok:true, tier:"basic"};
      return {ok:false, msg:"❌ Wrong PIN, try again"};
    };
    const finishAdminLogin=(r)=>{
      setGate(null);
      setAdminTier(r.tier);
      const dest=r.tier==="super"?"superAdmin":"basicAdmin";
      // Reset navStack on every login so browser back can never reach wrong screen
      navStack.current=["landing",dest];
      window.history.replaceState({screen:"landing",depth:1},"");
      window.history.pushState({screen:dest,depth:2},"");
      setScreen(dest);
    };
    // Admin login competes for the SAME single global scoring slot as team scorers — only one
    // scoring/admin device total, any role. Hard stop on conflict: no take-over. The second device
    // is blocked right here at the gate, before it ever reaches the admin dashboard.
    const adminOnOk=(r)=>{
      setAdminClaiming(true);
      claimSession(null,SCORING_SLOT,mySessionId,false).then(res=>{
        setAdminClaiming(false);
        if(res.ok){ finishAdminLogin(r); } else { setAdminConflict({r,heldSince:res.heldSince,error:!!res.error}); }
      });
    };
    if(adminConflict){
      const secsAgo=adminConflict.heldSince?Math.max(0,Math.round((Date.now()-adminConflict.heldSince)/1000)):null;
      return <Centered emoji={adminConflict.error?"📶":"🔒"} title={adminConflict.error?"Connection problem":"Someone is already signed in"}
        sub={adminConflict.error
          ?"Couldn't verify the session lock — check your connection and try again. For safety, login is blocked until the check succeeds."
          :`Another device is already signed in as admin or scorer${secsAgo!=null?` (active ${secsAgo}s ago)`:""}. Only one device can be signed in at a time — ask them to exit or log out first. If that device is dead or lost, just try again in about 20 seconds and you'll get straight in.`}
        onExit={home}>
        <button className="btn btn-primary w-full" style={{marginBottom:10}} disabled={adminClaiming}
          onClick={()=>adminOnOk(adminConflict.r)}>{adminClaiming?"Checking…":"🔁 Try Again"}</button>
      </Centered>;
    }
    if(adminClaiming) return <Centered emoji="🔑" title="Checking device…" sub="Making sure no one else is already active"/>;
    // "Remember this device" for admin — same opt-in pattern as the scorer gate, always re-verified
    // against the current PINs (so a PIN change elsewhere correctly invalidates a stale remembered one).
    if(!adminAutoTriedRef.current){
      adminAutoTriedRef.current=true;
      let saved=null; try{saved=localStorage.getItem("lcc_pin_admin");}catch(e){}
      if(saved){
        const r=adminVerify(saved);
        if(r.ok){ setTimeout(()=>adminOnOk(r),0); return <Centered emoji="🔑" title="Welcome back…" sub="Remembered this device"/>; }
      }
    }
    return <PinGate title="Admin Access" hint="Super or Basic admin PIN" verify={adminVerify} onOk={(r)=>adminOnOk(r)} onCancel={home} rememberKey="lcc_pin_admin"/>;
  }

  const isAdmin=adminTier!==null;
  const isSuper=adminTier==="super";
  const adminHome=adminTier==="super"?"superAdmin":adminTier==="basic"?"basicAdmin":"landing";

  if(screen==="landing") return <Landing onPick={pick}/>;
  if(screen==="viewer")  return <ViewerLive onExit={home}/>;
  if(screen==="basicAdmin") return <BasicAdminHome onPick={nav} onExit={home} onLogout={logoutAdmin}/>;
  if(screen==="history") return <HistoryPage role={isSuper?"admin":"viewer"} onExit={()=>nav(adminHome)}/>;
  if(screen==="poll")    return <PollPage role={isAdmin?"admin":"viewer"} onExit={()=>nav(adminHome)}/>;
  if(screen==="roster")  return <RosterPage role={isAdmin?"admin":"viewer"} onExit={()=>nav(adminHome)}/>;
  if(screen==="stats")   return <StatsPage onExit={()=>nav(adminHome)}/>;
  if(screen==="announce") return <AnnouncementPage onExit={()=>nav(adminHome)}/>;
  if(screen==="scorer")    return <App role="scorer" sessionSlot={scorerSlotRef.current} mySessionId={mySessionId} onExit={home}/>;
  if(screen==="adminScore") return <App role="admin" mySessionId={mySessionId} onExit={()=>nav(adminHome)} onHistory={()=>nav("history")} onPoll={()=>nav("poll")} onRoster={()=>nav("roster")} onAnnounce={()=>nav("announce")} prefillFixture={pendingFixtureRef.current}/>;
  if(screen==="tournaments") return <TournamentsPage role={isAdmin?"admin":"viewer"} onExit={()=>nav(adminHome)}
    onStartMatch={(fixture)=>{ pendingFixtureRef.current=fixture; nav(adminHome==="superAdmin"?"admin":"adminScore"); }}/>;
  if(screen==="superAdmin") return <SuperAdminHome
    onScore={()=>nav("admin")}
    onHistory={()=>nav("history")}
    onStats={()=>nav("stats")}
    onPoll={()=>nav("poll")}
    onRoster={()=>nav("roster")}
    onAnnounce={()=>nav("announce")}
    onPins={()=>nav("pinMgmt")}
    onTournaments={()=>nav("tournaments")}
    onExit={home}
    onLogout={logoutAdmin}/>;
  if(screen==="pinMgmt") return <PinMgmtModal onClose={()=>nav(adminHome)}/>;
  if(screen==="admin") return <App role="admin" mySessionId={mySessionId} onExit={()=>nav(adminHome)} onHistory={()=>nav("history")} onPoll={()=>nav("poll")} onRoster={()=>nav("roster")} onAnnounce={()=>nav("announce")} prefillFixture={pendingFixtureRef.current}/>;
  return <Landing onPick={pick}/>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  componentDidCatch(error,info){console.error("App crashed:",error,info);}
  render(){
    if(this.state.error){
      return(
        <div className="screen">
          <div className="card" style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
            <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,marginBottom:10}}>Something went wrong</h2>
            <p style={{color:"#bcc7d8",fontSize:12,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>{String(this.state.error.message||this.state.error)}</p>
            <p style={{color:"#9aa8bf",fontSize:12,marginBottom:18}}>This is usually caused by stale match data. Tap below to reset and go home — the live match (if any) is unaffected on the server.</p>
            <button className="btn btn-primary w-full" onClick={()=>{this.setState({error:null});window.location.hash="";window.location.reload();}}>🔄 Reset & Reload</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.render(<ErrorBoundary><Root/><GlobalToastHost/></ErrorBoundary>,document.getElementById("root"));

<script>
/* ── PWA service worker ──────────────────────────────────────────────────────────────────────
   Registers a small service worker built from a Blob URL, so the whole app stays a single HTML
   file with no extra files to upload. The SW caches the page shell so the app opens instantly and
   works offline (cached view). Live scores still need a connection (Firebase), but the app frame,
   last-seen data, and UI load with no network. This is what makes "Add to Home Screen" install it
   as a real fullscreen app on iOS and Android. */
(function(){
  if(!('serviceWorker' in navigator)) return;
  // Prefer a real ./sw.js file (most reliable, required for install on iOS Safari). If it isn't
  // present (single-file deploy), fall back to a Blob-built service worker so offline/caching still
  // works on Android/desktop. Either way the app stays installable.
  function registerBlobSW(){
    var swCode = [
      "var CACHE='lcc-v1';",
      "self.addEventListener('install',function(e){self.skipWaiting();e.waitUntil(caches.open(CACHE).then(function(c){return c.add('./');}).catch(function(){}));});",
      "self.addEventListener('activate',function(e){e.waitUntil(self.clients.claim());});",
      "self.addEventListener('fetch',function(e){",
      "  var req=e.request; if(req.method!=='GET'){return;}",
      "  var url=new URL(req.url); if(url.origin!==location.origin){return;}",
      "  if(req.mode==='navigate'){e.respondWith(fetch(req).then(function(res){var copy=res.clone();caches.open(CACHE).then(function(c){c.put('./',copy);});return res;}).catch(function(){return caches.match('./');}));return;}",
      "  e.respondWith(caches.match(req).then(function(c){return c||fetch(req);}));",
      "});"
    ].join("\n");
    try { var b=new Blob([swCode],{type:'text/javascript'}); navigator.serviceWorker.register(URL.createObjectURL(b)).catch(function(){}); } catch(e){}
  }
  // Check for the real file first.
  fetch('./sw.js',{method:'HEAD'}).then(function(r){
    if(r && r.ok){ navigator.serviceWorker.register('./sw.js').catch(function(){ registerBlobSW(); }); }
    else { registerBlobSW(); }
  }).catch(function(){ registerBlobSW(); });
})();
</script>
