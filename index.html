<script>
  // ── LCC Firebase configuration ──
  const firebaseConfig = {
    apiKey: "AIzaSyA_b8dFbqqAQRfl0W6uGyKmebepM8jtt68",
    authDomain: "mcc-scorer.firebaseapp.com",
    databaseURL: "https://mcc-scorer-default-rtdb.firebaseio.com",
    projectId: "mcc-scorer",
    storageBucket: "mcc-scorer.firebasestorage.app",
    messagingSenderId: "813330930410",
    appId: "1:813330930410:web:e996dc941659e5fd6bd593"
  };
  const ADMIN_PIN = "4821";
  const BASIC_ADMIN_PIN = "1234";

  function getDeviceId(){
    try{
      let id = localStorage.getItem("lcc_device_id");
      if(!id){ id = "dev_"+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem("lcc_device_id", id); }
      return id;
    }catch(e){
      if(!window.__lccSessionId) window.__lccSessionId = "dev_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
      return window.__lccSessionId;
    }
  }
  const DEVICE_ID = getDeviceId();

  let DB=null, FB_OK=false, AUTH_READY=false, AUTH_SETTLED=false;
  const _authWaiters=[];
  // Runs cb once auth has SETTLED — meaning sign-in either succeeded, failed, or timed out. We must
  // never block the app forever waiting on auth: if Anonymous Auth is disabled in the Firebase console
  // or sign-in is slow/fails, the app still needs to load and work. So this resolves on ANY settle.
  function releaseAuthWaiters(){ AUTH_SETTLED=true; while(_authWaiters.length){ try{_authWaiters.shift()();}catch(e){} } }
  function onAuthReady(cb){ if(AUTH_SETTLED||AUTH_READY){ cb(); } else { _authWaiters.push(cb); } }
  function tryInitFirebase(){
    if(FB_OK) return;
    if(typeof firebase==="undefined") return;
    try {
      if(!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
      DB = firebase.database();
      FB_OK = true;
      // ── Anonymous Auth — signs every app user in silently so Firebase Rules can require
      // auth != null. But auth must NEVER be a hard dependency for the app loading: if it's
      // disabled or fails, we still release everything so the app works (the rules just need to
      // permit it — see note to user). Three ways we settle: success, failure, or a 4s timeout.
      try{
        firebase.auth().onAuthStateChanged(u=>{
          if(u){ AUTH_READY=true; releaseAuthWaiters(); }
        });
      }catch(e){ releaseAuthWaiters(); }
      try{
        firebase.auth().signInAnonymously().catch(function(e){
          console.warn("Anonymous auth failed (is it enabled in Firebase?):",e&&e.message);
          releaseAuthWaiters(); // proceed anyway — don't strand the app
        });
      }catch(e){ releaseAuthWaiters(); }
      // Hard safety net: if neither success nor failure fires within 4s, proceed regardless.
      setTimeout(releaseAuthWaiters, 4000);
    } catch(e){ console.error("Firebase init failed:",e); releaseAuthWaiters(); }
  }
  tryInitFirebase();
  if(!FB_OK) window.addEventListener("load", tryInitFirebase);
</script>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback}=React;

// ── Helpers ──────────────────────────────────────────────────────────────────
const nb=(n,pid)=>({name:n,pid:pid||null,runs:0,balls:0,fours:0,sixes:0,out:false,howOut:"",onStrike:false});
const nw=(n,pid)=>({name:n,pid:pid||null,overs:0,ballsThisOver:0,runs:0,wickets:0,maidens:0,runsThisOver:0});
const ovStr=(b)=>`${Math.floor(b/6)}.${b%6}`;
const rr=(r,b)=>b===0?"0.00":((r/b)*6).toFixed(2);
const T=20;

// ── Stats linking: normalize a name and resolve it to a roster profile id ──
// Scorecards store players by typed name; profiles use ids. We bridge them by
// matching on a normalized full name (trim + lowercase + collapse spaces).
function normName(n){return (n||"").trim().toLowerCase().replace(/\s+/g," ");}
function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return"just now";
  if(s<3600)return Math.floor(s/60)+"m ago";
  if(s<86400)return Math.floor(s/3600)+"h ago";
  if(s<604800)return Math.floor(s/86400)+"d ago";
  return new Date(ts).toLocaleDateString(undefined,{month:"short",day:"numeric"});
}
// Map any stored venue string to a short canonical label so Lakes / Millennium
// group cleanly even though they're stored as "Lakes High School" /
// "Millennium Park, Lindenhurst" etc. Custom venues keep their own name.
function canonVenue(v){
  const s=(v||"").toLowerCase();
  if(s.includes("lakes")) return "Lakes High School";
  if(s.includes("millennium")) return "Millennium Park";
  return (v&&v.trim())||"Other";
}
function buildPidResolver(roster){
  const map={};
  Object.entries(roster||{}).forEach(([id,p])=>{ if(p&&p.name) map[normName(p.name)]=id; });
  return (name)=> map[normName(name)] || null;
}

// ── Career stats engine — aggregates every completed match in `history` ──
// Players are keyed by profile id when known (exact, survives name typos),
// otherwise by normalized name. Returns one row per player with batting + bowling.
function computeCareerStats(history, roster){
  const resolve=buildPidResolver(roster);
  const players={};
  const keyFor=(p)=>{const pid=p.pid||resolve(p.name);return pid?("id:"+pid):("nm:"+normName(p.name));};
  const ensure=(p)=>{
    const k=keyFor(p);
    if(!players[k]){
      const pid=p.pid||resolve(p.name);
      players[k]={key:k,pid:pid||null,
        name:(pid&&roster&&roster[pid]&&roster[pid].name)||p.name,
        avatar:(pid&&roster&&roster[pid]&&roster[pid].avatar)||null,
        bat:{inns:0,runs:0,balls:0,fours:0,sixes:0,outs:0,hs:0,hsNotOut:false},
        bowl:{inns:0,balls:0,runs:0,wkts:0,maidens:0,bestW:-1,bestR:0},
        matchesSet:{}};
    }
    return players[k];
  };
  Object.values(history||{}).forEach((m,mi)=>{
    [m&&m.inn1,m&&m.inn2].forEach(inn=>{
      if(!inn) return;
      (inn.battingOrder||[]).forEach(name=>{
        const b=inn.batsmen&&inn.batsmen[name]; if(!b) return;
        const pl=ensure(b); pl.matchesSet[mi]=true;
        const batted=(b.balls||0)>0||b.out||(b.runs||0)>0;
        if(batted){
          pl.bat.inns++; pl.bat.runs+=b.runs||0; pl.bat.balls+=b.balls||0;
          pl.bat.fours+=b.fours||0; pl.bat.sixes+=b.sixes||0;
          if(b.out) pl.bat.outs++;
          const notOut=!b.out, runs=b.runs||0;
          if(runs>pl.bat.hs||(runs===pl.bat.hs&&notOut&&!pl.bat.hsNotOut)){ pl.bat.hs=runs; pl.bat.hsNotOut=notOut; }
        }
      });
      (inn.bowlingOrder||[]).forEach(name=>{
        const w=inn.bowlers&&inn.bowlers[name]; if(!w) return;
        const balls=(w.overs||0)*6+(w.ballsThisOver||0);
        const pl=ensure(w); pl.matchesSet[mi]=true;
        if(balls>0||(w.wickets||0)>0){
          pl.bowl.inns++; pl.bowl.balls+=balls; pl.bowl.runs+=w.runs||0;
          pl.bowl.wkts+=w.wickets||0; pl.bowl.maidens+=w.maidens||0;
          const wk=w.wickets||0, rn=w.runs||0;
          if(wk>pl.bowl.bestW||(wk===pl.bowl.bestW&&rn<pl.bowl.bestR)){ pl.bowl.bestW=wk; pl.bowl.bestR=rn; }
        }
      });
    });
  });
  return Object.values(players).map(pl=>{
    const b=pl.bat, w=pl.bowl;
    return {
      key:pl.key, pid:pl.pid, name:pl.name, matches:Object.keys(pl.matchesSet).length,
      bat:{...b, avg:b.outs>0?(b.runs/b.outs):null, sr:b.balls>0?(b.runs/b.balls*100):null},
      bowl:{...w, econ:w.balls>0?(w.runs/w.balls*6):null,
        oversStr:Math.floor(w.balls/6)+(w.balls%6?"."+(w.balls%6):""),
        best:w.bestW>=0?(w.bestW+"/"+w.bestR):"—"}
    };
  });
}

function chipClass(ev){
  if(ev.type==="W")  return "chip chip-W";
  if(ev.type==="4")  return "chip chip-4";
  if(ev.type==="6")  return "chip chip-6";
  if(ev.type==="WD") return "chip chip-WD";
  if(ev.type==="NB") return "chip chip-NB";
  if(ev.type==="0")  return "chip chip-0";
  if(ev.type==="DECL") return "chip chip-6"; // reuse the boundary styling — visually distinct, no new CSS needed
  if(ev.type==="OT")   return "chip chip-WD"; // orange dashed — overthrow declare
  return "chip chip-run";
}
function chipLbl(ev){
  if(ev.type==="W")  return"W";
  if(ev.type==="WD") return ev.extraRuns>1?`wd+${ev.extraRuns-1}`:"wd";
  if(ev.type==="NB") return ev.batRuns>0?`nb+${ev.batRuns}`:"nb";
  if(ev.type==="DECL") return `${ev.runs||0}D`;
  if(ev.type==="OT")   return `OT${(ev.baseRuns||0)+(ev.overthrowRuns||0)}`;
  return ev.type;
}

// ── Setup (Admin only: teams, venue, toss — NO players) ──────────────────────
function Setup({onStart,role,onExit,onHistory,onPoll,onRoster}){
  const rA=useRef(),rB=useRef();
  const[venue,setVenue]=useState(null);
  const[overs,setOvers]=useState(8);
  const[wkts,setWkts]=useState(6);
  const[customOv,setCustomOv]=useState(false);
  const[customWk,setCustomWk]=useState(false);
  const[mWkts,setMWkts]=useState(10);
  const[customMWk,setCustomMWk]=useState(false);
  const[mOvers,setMOvers]=useState(20);
  const[customMOv,setCustomMOv]=useState(false);
  const[customVenueName,setCustomVenueName]=useState("");
  const[customVenueStyle,setCustomVenueStyle]=useState("lakes");
  const[cvOvers,setCvOvers]=useState(8);
  const[cvWkts,setCvWkts]=useState(10);
  const[cvSingle,setCvSingle]=useState(false);
  const[customCvOv,setCustomCvOv]=useState(false);
  const[customCvWk,setCustomCvWk]=useState(false);
  const[single,setSingle]=useState(false);
  const[pinA,setPinA]=useState(()=>String(Math.floor(1000+Math.random()*9000)));
  const[pinB,setPinB]=useState(()=>String(Math.floor(1000+Math.random()*9000)));
  const[tossWinner,setTossWinner]=useState(null);
  const[tossChoice,setTossChoice]=useState(null);
  const[flipping,setFlipping]=useState(false);
  const[coinResult,setCoinResult]=useState(null);
  const[flipCount,setFlipCount]=useState(0);
  const mountedRef=useRef(true);
  const audioCtxRef=useRef(null);

  // ── Published teams history — load ALL past sets, newest first ────────────
  const[pubTeamsList,setPubTeamsList]=useState([]);
  const[selectedPub,setSelectedPub]=useState(null);
  const[roster,setRoster]=useState({});
  const[imported,setImported]=useState(false);

  React.useEffect(()=>{
    if(!FB_OK||!DB) return;
    const rRef=DB.ref("roster");
    const rCb=rRef.on("value",s=>setRoster(s.val()||{}));
    const ptRef=DB.ref("publishedTeams");
    const ptCb=ptRef.on("value",s=>{
      const v=s.val()||{};
      const list=Object.entries(v)

    return()=>{rRef.off("value",rCb);ptRef.off("value",ptCb);};
  },[]);

  const importTeams=(pub)=>{

  // ── Lightweight Web Audio sound effects (no external files needed) ──
  const getAudioCtx = () => {
    if(!audioCtxRef.current){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(Ctx) audioCtxRef.current = new Ctx();
    }
    return audioCtxRef.current;
  };
  const playTick = () => {
    const ctx = getAudioCtx(); if(!ctx) return;
    if(ctx.state==="suspended"){ ctx.resume().catch(()=>{}); return; } // skip just this one tick, context will be ready for the next
    const t = ctx.currentTime;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = "square"; osc.frequency.setValueAtTime(1100, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.06, t+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.06);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t+0.07);
  };
  const playResultChime = () => {
    const ctx = getAudioCtx(); if(!ctx) return;
    if(ctx.state==="suspended"){ ctx.resume().catch(()=>{}); }
    const t = ctx.currentTime;
    [523.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = "sine"; osc.frequency.setValueAtTime(freq, t+i*0.12);
      gain.gain.setValueAtTime(0.0001, t+i*0.12);
      gain.gain.exponentialRampToValueAtTime(0.18, t+i*0.12+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+i*0.12+0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t+i*0.12); osc.stop(t+i*0.12+0.55);
    });
  };
  // Actually SPEAK "Heads!" or "Tails!" out loud using the browser's built-in voice (no audio files needed)
  const announceResult = (word) => {
    try{
      if(!window.speechSynthesis) return;
      window.speechSynthesis.cancel(); // clear any queued/stuck utterances first
      const utter = new SpeechSynthesisUtterance(word + "!");
      utter.rate = 0.85; utter.pitch = 1.1; utter.volume = 1;
      const voices = window.speechSynthesis.getVoices();
      const enVoice = voices.find(v=>v.lang && v.lang.startsWith("en"));
      if(enVoice) utter.voice = enVoice;
      window.speechSynthesis.speak(utter);
    }catch(e){ console.error("speech announce failed",e); }
  };

  const FLIP_DURATION = 5000; // 5 seconds
  const flipCoin=()=>{
    if(flipping)return;
    setFlipping(true);setCoinResult(null);setFlipCount(c=>c+1);
    // iOS/Safari suspend AudioContext until it's resumed inside a real user-gesture handler — this click is that gesture.
    const ctx = getAudioCtx();
    if(ctx && ctx.state==="suspended") ctx.resume().catch(()=>{});
    // CRITICAL for iOS Safari: speechSynthesis.speak() is only reliably allowed when called directly
    // inside a user-gesture handler — calling it later from a setTimeout (as the real "Heads!"/"Tails!"
    // announcement must, since it has to wait for the flip to finish) gets silently blocked on iOS.
    // The fix: speak a near-silent "warm-up" utterance right now, synchronously inside this click.
    // This unlocks the speech engine for the rest of the page session, so the delayed real announcement
    // later (after the 6s flip) is then allowed to play normally.
    try{
      if(window.speechSynthesis){
        const warmup = new SpeechSynthesisUtterance(" ");
        warmup.volume = 0; warmup.rate = 10;
        window.speechSynthesis.speak(warmup);
      }
    }catch(e){}
    // Also pre-load voices now (first call to getVoices() can be empty until they finish loading async)
    try{ window.speechSynthesis && window.speechSynthesis.getVoices(); }catch(e){}
    // Tick sound while the coin spins, slowing down toward the end like a real coin settling
    const tickIntervals = [120,120,140,160,190,230,280,340,420,520,650,820];
    let elapsed = 0;
    tickIntervals.forEach((gap)=>{
      elapsed += gap;
      setTimeout(()=>{ if(mountedRef.current && elapsed < FLIP_DURATION-200) playTick(); }, elapsed);
    });

      if(!mountedRef.current)return;

      setCoinResult(result);
      playResultChime();
      announceResult(result==="heads"?"Heads":"Tails");
      setFlipping(false);
      // Deliberately NOT auto-picking a toss winner — the coin only reveals heads/tails.
      // Whoever called it correctly is selected manually below by admin, just like a real toss.
    },FLIP_DURATION);
  };

// ── App root ─────────────────────────────────────────────────────────────────
function App({role,onExit,onHistory,onPoll,onRoster,onAnnounce}){
  const isScorer=role==="scorer"||role==="admin";
  const[match,setMatch]=useState(null);
  const[tab,setTab]=useState("score");
  const[inn,setInn]=useState(null);
  const[hist,setHist]=useState([]);
  // pw/nnb/pr are derived from inn.pending (NOT separate local state) so that the "we need a new
  // batsman / new bowler / retire" prompt is visible to EVERY device sharing this match — including
  // the second scorer on the same team — since inn.pending travels through the normal Firebase sync
  // along with the rest of the innings. Before this fix these were local-only React state, so if one
  // device triggered the new-bowler prompt and a DIFFERENT device (same team's other phone, or admin)
  // scored the next ball, that second device never saw the prompt and silently kept the old bowler.
  const pw = inn?.pending==="wicket"||inn?.pending==="wicketAndBowler";
  const nnb = inn?.pending==="newBowler"||inn?.pending==="wicketAndBowler";
  const pr = inn?.pending==="retire";
  const[nbn,setNBN]=useState("");
  const[nbwn,setNBWN]=useState("");
  const[ib,setIB]=useState(false);
  const[mo,setMO]=useState(null);
  const[potm,setPotm]=useState(null); // Player of the Match voting
  const[flash,setFlash]=useState(false);
  const[inn1,setInn1]=useState(null);
  const[saved,setSaved]=useState(false);
  const[syncErr,setSyncErr]=useState(null);
  const[loaded,setLoaded]=useState(!FB_OK||!DB); // becomes true once we've checked Firebase for an existing match
  const[preEnd,setPreEnd]=useState(null); // snapshot before ending innings/match, so admin can revert
  const[preEndInDB,setPreEndInDB]=useState(false); // does a revert snapshot exist in Firebase (survives refresh)?


  const[roster,setRoster]=useState({});  // club roster — used to autocomplete names & stamp profile ids for stats
  // Each device gets a stable writer ID. We tag every write with {writer, t}. The listener
  // accepts ALL remote updates except the literal echo of our OWN most-recent write (matched by
  // writer id + timestamp). This is correct for multiple simultaneous scorers — unlike the old
  // single boolean flag, which could swallow a DIFFERENT scorer's update if it arrived in the
  // window after our own write, causing the live/won flicker.
  const writerId=React.useRef("w_"+Math.random().toString(36).slice(2)+Date.now().toString(36));
  const lastWriteT=React.useRef(0);     // timestamp of our last own write
  const lastAppliedT=React.useRef(0);   // timestamp of the most recent state we've applied
  // Regression guard: track the "progress" of the score we've currently applied, so we can REFUSE
  // any incoming update that moves the live score BACKWARD within the same innings (the exact
  // symptom of a stale device clobbering the real score — e.g. 93/6 dropping to 81/4). A backward
  // move is only honoured when it's an explicit undo/revert, or when it comes from an admin (admins
  // have priority and may legitimately correct the score).
  const appliedSig=React.useRef(null);  // {matchId, inningsNum, balls, runs, wkts}
  // Why our own last LOCAL state change happened: "normal" forward scoring vs an intentional
  // "undo"/"revert" that is allowed to move the score backward. Tagged onto our writes so other
  // devices' regression guards know a backward move was deliberate.
  const writeIntent=React.useRef("normal");

  // Track whether a revert snapshot exists in Firebase, so the super-admin revert button
  // stays available even after a page refresh (when local preEnd state is lost).
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB)return;
    const pe=DB.ref("_preEnd");
    const cb=pe.on("value",s=>setPreEndInDB(!!(s.val()&&s.val().inn)));
    return()=>pe.off("value",cb);
  },[isScorer]);

  // Roster listener — powers name autocomplete and links scored players to profiles for career stats.
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB)return;
    const ref=DB.ref("roster");
    const cb=ref.on("value",s=>setRoster(s.val()||{}));
    return ()=>ref.off("value",cb);
  },[isScorer]);
  const resolvePid=React.useMemo(()=>buildPidResolver(roster),[roster]);
  const rosterNames=React.useMemo(()=>Object.values(roster||{}).map(p=>p&&p.name).filter(Boolean).sort((a,b)=>a.localeCompare(b)),[roster]);

  // Pull in any match that's already live (so a scorer/admin joining mid-match sees it)
  // and keep listening so both team scorers + admin always see the SAME shared match.
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB)return;
    const ref=DB.ref("live");
    let cb=null, cancelled=false;
    // Wait for anonymous auth to land before attaching — under rules requiring auth != null, a
    // listener attached pre-auth on a cold load would get permission-denied and not re-read.
    onAuthReady(()=>{
      if(cancelled)return;
      cb=ref.on("value",s=>{
      const v=s.val();
      // Echo suppression: ignore ONLY the exact echo of our own most recent write
      // (same writer id AND same timestamp). Any write from another scorer/admin, or a
      // newer write from us, is always applied. This is what fixes the multi-scorer flicker.
      if(v&&v.writer===writerId.current&&v.t===lastWriteT.current){ return; }
      // Ignore stale / out-of-order updates: never apply a payload older than what we've
      // already shown (Firebase can deliver writes slightly out of order under contention).
      if(v&&typeof v.t==="number"&&v.t<lastAppliedT.current){ return; }
      // IMPORTANT: Firebase Realtime Database does NOT store empty objects {} or empty arrays [] —
      // those keys are silently omitted on write. So a freshly-created match (before openers are set)
      // legitimately arrives here with batsmen/bowlers/battingOrder/etc. MISSING, not present-but-empty.
      // We must normalize those back to {} / [] rather than rejecting the data as "invalid".
      const innOk = v&&v.inn&&typeof v.inn==="object"
        &&typeof v.inn.totalRuns==="number"&&typeof v.inn.totalBalls==="number"&&typeof v.inn.wickets==="number"
        &&typeof v.inn.battingTeam==="string"&&typeof v.inn.bowlingTeam==="string";
      const valid=v&&v.match&&innOk&&v.match.teamA&&v.match.teamB;
      if(!valid){ setLoaded(true); return; }
      // ── REGRESSION GUARD ──────────────────────────────────────────────────────────────────
      // Compute the progress signature of this incoming update and compare to what we've applied.
      // Reject backward moves within the same innings of the same match unless they're an explicit
      // undo/revert (v.intent) or come from an admin (v.role==="admin", admin priority).
      const incomingSig={ matchId:v.match.matchId||null, inningsNum:v.inn.inningsNum||1,
        balls:v.inn.totalBalls||0, runs:v.inn.totalRuns||0, wkts:v.inn.wickets||0 };
      const prev=appliedSig.current;
      const sameInnings = prev && prev.matchId===incomingSig.matchId && prev.inningsNum===incomingSig.inningsNum;
      const goesBackward = sameInnings && (
        incomingSig.balls<prev.balls ||
        (incomingSig.balls===prev.balls && incomingSig.runs<prev.runs) ||
        (incomingSig.balls===prev.balls && incomingSig.runs===prev.runs && incomingSig.wkts<prev.wkts)
      );
      const intentialBack = v.intent==="undo"||v.intent==="revert";
      const adminWrite = v.role==="admin";
      if(goesBackward && !intentialBack && !adminWrite){
        // A stale device tried to overwrite a more advanced score — ignore it, and re-assert our
        // current (more advanced) state so that stale device gets corrected on its next read.
        // Do NOT update appliedSig/lastAppliedT — we are keeping what we already have.
        return;
      }
      // ──────────────────────────────────────────────────────────────────────────────────────
      const normInn = {
        ...v.inn,
        overEvents: v.inn.overEvents||[],
        completedOvers: v.inn.completedOvers||[],
        battingOrder: v.inn.battingOrder||[],
        bowlingOrder: v.inn.bowlingOrder||[],
        batsmen: v.inn.batsmen||{},
        bowlers: v.inn.bowlers||{},
        extras: v.inn.extras||{wd:0,nb:0,b:0,lb:0},

      // scorer slots removed

    },err=>{ console.error("live listener error",err); setSyncErr(err.message||"Could not read live match"); setLoaded(true); });
    });

    // reported back within 6s (auth stalled, permission denied, slow network, etc.), proceed anyway
    // so the start-match screen is reachable. A real live match will still stream in once it arrives.

  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!loaded)return;

    if(!match||!inn){return;}

    // Monotonic timestamp: strictly greater than anything we've written or applied, so our

    const myRole = role==="admin" ? "admin" : "scorer";
    const myIntent = writeIntent.current;
    writeIntent.current="normal"; // reset after consuming

      balls:inn.totalBalls||0, runs:inn.totalRuns||0, wkts:inn.wickets||0 };
    const payload=JSON.parse(JSON.stringify({match,inn,inn1,ib,mo,pinA:match?.pinA||null,pinB:match?.pinB||null,teamA:match?.teamA||null,teamB:match?.teamB||null,battingTeam:inn?.battingTeam||null,writer:writerId.current,role:myRole,intent:myIntent,t}));

  },[match,inn,inn1,ib,mo,isScorer,loaded]);

  // ── AUTOMATIC PERIODIC BACKUP ─────────────────────────────────────────────────────────────────
  // Every ~20s while a match is live, snapshot the current match to a SEPARATE `backup` node, keyed
  // by matchId. This is a safety net: even a worst-case event on `live` (accidental wipe, bad write)
  // can be restored from the most recent snapshot. It is intentionally decoupled from `live` — nothing
  // that writes `live` can touch `backup`. Only an active scorer/admin device backs up (viewers don't),
  // and only when there's a real match in progress (not at match-over or innings break with no data).
  // A small rolling window (latest + previous) is kept so the node never grows unbounded.
  const lastBackupT=React.useRef(0);
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!loaded) return;
    let alive=true, timer=null;
    const doBackup=()=>{
      if(!alive) return;
      // Only back up a genuine in-progress match (has a matchId, an innings, and isn't over).
      const mid = match?.matchId;
      if(mid && inn && !mo){
        const now=Date.now();
        // throttle: never more than once per 18s even if deps change rapidly
        if(now-lastBackupT.current>18000){
          lastBackupT.current=now;
          const snap=JSON.parse(JSON.stringify({
            match,inn,inn1:inn1||null,ib:!!ib,mo:mo||null,
            backedUpAt:now, by:writerId.current
          }));
          // latest = always the newest; prev = the one before (so we keep two restore points)
          const base="backup/"+mid;
          DB.ref(base+"/latest").once("value").then(s=>{
            const cur=s.val();
            if(cur && cur.backedUpAt && cur.backedUpAt!==now){
              DB.ref(base+"/prev").set(cur).catch(()=>{});
            }
            DB.ref(base+"/latest").set(snap).catch(()=>{});
          }).catch(()=>{ DB.ref(base+"/latest").set(snap).catch(()=>{}); });
        }
      }
      timer=setTimeout(doBackup, 20000);
    };
    timer=setTimeout(doBackup, 20000); // first backup ~20s in
    return ()=>{ alive=false; if(timer) clearTimeout(timer); };
  },[isScorer,loaded,match,inn,inn1,ib,mo]);
  // ──────────────────────────────────────────────────────────────────────────────────────────────

  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!mo||saved||!inn)return;
    const matchId=match?.matchId;
    if(!matchId)return; // older matches without an id fall back below
    const histRef=DB.ref("history/"+matchId);
    // Idempotent save: write to the SAME key (history/{matchId}) on every device. A transaction
    // ensures only the FIRST writer creates the record; everyone else sees it already exists and
    // does nothing. This is what stops the 4× duplicate "won" entries when scorer + 2 admins are
    // all watching the same finished match.
    histRef.transaction(cur=>{
      if(cur) return cur; // already saved by another device — leave it untouched
      return JSON.parse(JSON.stringify({result:mo,inn1:inn1||null,inn2:inn,teamA:match?.teamA,teamB:match?.teamB,tossSummary:match?.tossSummary||null,venue:inn.venue,format:inn.format,overs:inn.overs,maxWkts:inn.maxWkts,potm:potm?.winner||null,potmVoting:{open:true,votes:{}},finishedAt:Date.now()}));
    }).then(()=>{
      setSaved(true);
      DB.ref("potm").update({matchId}).catch(()=>{});
    }).catch(e=>console.error("hist save failed",e));
  },[mo,saved,isScorer,inn,inn1,match]);

  if(isScorer&&FB_OK&&DB&&!loaded){
    return <Centered emoji="🔄" title="Loading match…" sub="Checking for a live match"/>;
  }

  const startMatch=({teamA,teamB,battingFirst,bowlingFirst,venue,format,overs,maxWkts,single,pinA,pinB,tossSummary})=>{
    setSaved(false);
    // Stable match ID created ONCE here and synced inside the match object to every device.
    // All scorers/admins then write the final result to history/{matchId} — the SAME key — so
    // the match is saved exactly once no matter how many people have the scorer open. Using
    // push() (random key per device) was what created the duplicate "won" entries.
    const matchId="m_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8);
    setMatch({matchId,teamA,teamB,venue,format,overs,maxWkts,single,pinA,pinB,tossSummary});setHist([]);setInn1(null);
    // Shell innings — no players yet, batting team must enter openers
    setInn({battingTeam:battingFirst,bowlingTeam:bowlingFirst,inningsNum:1,
      venue,format,overs,maxWkts,single:!!single,
      awaitingOpeners:true,
      batsmen:{},battingOrder:[],
      bowlers:{},bowlingOrder:[],
      strikerName:null,nonStrikerName:null,bowlerName:null,
      totalRuns:0,totalBalls:0,wickets:0,overEvents:[],completedOvers:[],
      extras:{wd:0,nb:0,b:0,lb:0},target:null});
  };

  // Called once the batting team's scorer enters opening striker/non-striker
  // and the bowling team's scorer (or admin) enters the opening bowler.
  const fixPlayers=({striker,nonStriker,bowler})=>setInn(p=>{
    const b={...p.batsmen};
    if(!b[striker]) b[striker]={...nb(striker,resolvePid(striker))};
    if(nonStriker&&!b[nonStriker]) b[nonStriker]={...nb(nonStriker,resolvePid(nonStriker))};
    b[striker]={...b[striker],onStrike:true};
    if(nonStriker) b[nonStriker]={...b[nonStriker],onStrike:false};
    const bwlrs={...p.bowlers};
    if(!bwlrs[bowler]) bwlrs[bowler]=nw(bowler,resolvePid(bowler));
    const battingOrder=p.battingOrder.includes(striker)?p.battingOrder:[...p.battingOrder,striker];
    const bo2=(nonStriker&&!battingOrder.includes(nonStriker))?[...battingOrder,nonStriker]:battingOrder;
    const bowlingOrder=p.bowlingOrder.includes(bowler)?p.bowlingOrder:[...p.bowlingOrder,bowler];
    return{...p,batsmen:b,bowlers:bwlrs,battingOrder:bo2,bowlingOrder,strikerName:striker,nonStrikerName:nonStriker,bowlerName:bowler};
  });

  const fillOpeners=({striker,nonStriker,bowler})=>{
    setInn(p=>{
      const single=p.single;
      const batsmen=single
        ?{[striker]:{...nb(striker,resolvePid(striker)),onStrike:true}}
        :{[striker]:{...nb(striker,resolvePid(striker)),onStrike:true},[nonStriker]:nb(nonStriker,resolvePid(nonStriker))};
      return{...p,awaitingOpeners:false,
        batsmen,battingOrder:single?[striker]:[striker,nonStriker],
        bowlers:{[bowler]:nw(bowler,resolvePid(bowler))},bowlingOrder:[bowler],
        strikerName:striker,nonStrikerName:single?null:nonStriker,bowlerName:bowler};
    });
  };

  const swap=(i)=>{
    const b={...i.batsmen};
    b[i.strikerName]={...b[i.strikerName],onStrike:false};
    b[i.nonStrikerName]={...b[i.nonStrikerName],onStrike:true};
    return{...i,batsmen:b,strikerName:i.nonStrikerName,nonStrikerName:i.strikerName};
  };

  const endInnings=(i)=>{
    // Always snapshot BEFORE ending (auto or manual) so super admin can revert a premature/wrong end.
    const snap={inn:JSON.parse(JSON.stringify(i)),inn1:inn1?JSON.parse(JSON.stringify(inn1)):null,ib,mo:null};
    setPreEnd(snap);
    if(FB_OK&&DB) DB.ref("_preEnd").set(JSON.parse(JSON.stringify(snap))).catch(()=>{});
    if(i.inningsNum===1){setInn1(JSON.parse(JSON.stringify(i)));setIB(true);return;}
    const t=i.target;
    if(i.totalRuns<t-1){setMO({winner:i.bowlingTeam,margin:`${t-1-i.totalRuns} run${t-1-i.totalRuns===1?"":"s"}`});if(FB_OK&&DB)DB.ref("potm").set({open:true,votes:{}}).catch(()=>{});}
    else if(i.totalRuns===t-1){setMO({winner:null});if(FB_OK&&DB)DB.ref("potm").set({open:true,votes:{}}).catch(()=>{});}
    else{setMO({winner:i.battingTeam,margin:`${i.maxWkts-i.wickets} wicket${i.maxWkts-i.wickets===1?"":"s"}`});if(FB_OK&&DB)DB.ref("potm").set({open:true,votes:{}}).catch(()=>{});}
  };

  // Snapshot before ending innings/match, so admin can revert
  const manualEndInnings=()=>{
    if(!inn)return;
    if(!confirm(inn.inningsNum===1?"End the 1st innings now?":"End the match now?"))return;
    // Save preEnd snapshot to Firebase so super admin can revert after refresh
    setPreEnd({inn:JSON.parse(JSON.stringify(inn)),inn1:inn1?JSON.parse(JSON.stringify(inn1)):null,ib,mo});

  };
  const applyRevert=(snap)=>{
    const revertedInn=snap.inn, revertedInn1=snap.inn1||null;
    writeIntent.current="revert"; // deliberate backward move — allowed through the regression guard
    setInn(revertedInn);setInn1(revertedInn1);setIB(false);setMO(null);setSaved(false);
    setPreEnd(null);
    if(FB_OK&&DB){
      // Write the reverted (live-again) match to `live` immediately with a fresh, strictly-newer
      // timestamp so the listener can't snap us back to the completed screen.
      const t=Math.max(Date.now(), lastWriteT.current+1, lastAppliedT.current+1);
      lastWriteT.current=t; lastAppliedT.current=t;
      const payload=JSON.parse(JSON.stringify({
        match, inn:revertedInn, inn1:revertedInn1, ib:false, mo:null,
        pinA:match?.pinA||null, pinB:match?.pinB||null, teamA:match?.teamA||null, teamB:match?.teamB||null,
        battingTeam:revertedInn?.battingTeam||null, writer:writerId.current, t
      }));
      DB.ref("live").set(payload).catch(e=>{console.error("revert write failed",e);setSyncErr(e.message||"Revert write blocked");});
      DB.ref("_preEnd").remove().catch(()=>{});
      // NON-DESTRUCTIVE: when reverting a match that had already been saved to history, we must NOT
      // permanently delete it (that risked losing match data). Instead we MOVE it to history_archive/
      // and only then remove it from the live history list. If the match is ended again later, the
      // idempotent save re-creates it. This guarantees the scorecard is never destroyed by a revert.
      if(match?.matchId){
        const hid="history/"+match.matchId;
        DB.ref(hid).once("value").then(s=>{
          const v=s.val();
          if(v){
            DB.ref("history_archive/"+match.matchId).set(v).catch(()=>{});
            DB.ref(hid).remove().catch(()=>{}); // remove from the active list only AFTER archiving

      }

      DB.ref("potm").remove().catch(()=>{});
    }
  };

    if(!confirm("Revert and bring the match back to live? This undoes the innings/match end."))return;

      }).catch(e=>alert("Revert failed: "+(e.message||"could not read snapshot")));
    }
  };

  // Restore the live match from the most recent automatic backup. This is the disaster recovery path:
  // if the live match was wiped or corrupted, this pulls back the latest periodic snapshot (or the one
  // before it) and re-publishes it to `live` as the authoritative state.
  const restoreFromBackup=()=>{
    if(!FB_OK||!DB){ alert("Backup needs a live connection."); return; }
    const mid=match?.matchId;
    const tryRestore=(snap,label)=>{
      if(!snap||!snap.inn||!snap.match){ return false; }
      const when=snap.backedUpAt?new Date(snap.backedUpAt).toLocaleTimeString():"unknown time";
      if(!confirm(`Restore the match from the ${label} backup (saved ${when})?\n\nThis replaces the current live match with that snapshot.`)) return true;
      const t=Math.max(Date.now(), lastWriteT.current+1, lastAppliedT.current+1);
      lastWriteT.current=t; lastAppliedT.current=t;
      writeIntent.current="revert";
      setMatch(snap.match);setInn(snap.inn);setInn1(snap.inn1||null);setIB(!!snap.ib);setMO(snap.mo||null);setSaved(false);
      const payload=JSON.parse(JSON.stringify({...snap, writer:writerId.current, role:role==="admin"?"admin":"scorer", intent:"revert", t}));
      delete payload.backedUpAt; delete payload.by;

      return true;
    };
    const finishNoBackup=()=>alert("No backup found to restore. Backups are taken automatically ~20s into a live match.");
    // Prefer the backup for the current matchId; if there's no current match, ask for the most recent any.
    const base = mid ? "backup/"+mid : null;
    if(base){
      DB.ref(base).once("value").then(s=>{
        const b=s.val();
        if(b && tryRestore(b.latest,"latest")) return;
        if(b && tryRestore(b.prev,"previous")) return;
        finishNoBackup();
      }).catch(e=>alert("Could not read backup: "+(e.message||"")));

      // No live matchId — find the most recently backed-up match across all backups.
      DB.ref("backup").once("value").then(s=>{
        const all=s.val()||{};
        let best=null;
        Object.values(all).forEach(entry=>{
          const cand=entry&&entry.latest;
          if(cand&&cand.backedUpAt&&(!best||cand.backedUpAt>best.backedUpAt)) best=cand;

        finishNoBackup();
      }).catch(e=>alert("Could not read backups: "+(e.message||"")));
    }
  };

  // Super admin: change the match overs mid-match (e.g. set 22 → 25). Updates the live innings'
  // over limit, the saved 1st-innings record if present, and re-derives whether the innings should
  // still be considered "over". Tagged as an admin write so it always syncs.
  const editOvers=(newOvers)=>{
    const n=parseInt(newOvers,10);
    if(!n||n<1||n>50){ alert("Enter a valid number of overs (1–50)."); return; }
    if(!inn){ return; }
    writeIntent.current="revert"; // treat as a deliberate admin correction (may reduce the over limit)
    setInn(prev=>prev?{...prev,overs:n}:prev);
    setInn1(prev=>prev?{...prev,overs:n}:prev);
    // If we're at an innings break that was triggered purely by the OLD over limit, and the new
    // limit leaves balls remaining, lift the break so the 1st innings can continue. Uses functional
    // checks so it's correct even when called right after a revert (whose state update is still pending).
    setIB(prevIB=>{
      if(prevIB && inn && inn.totalBalls < n*6 && inn.inningsNum===1) return false;
      return prevIB;
    });
  };

  const undo=()=>{
    if(!hist.length)return;
    writeIntent.current="undo"; // this is a deliberate backward move — let it through the regression guard
    const prev=hist[hist.length-1];
    setHist(h=>h.slice(0,-1));
    setInn({...prev,pending:null});
    // Clear all pending states so "who bowls/bats next?" UI disappears after undo
    setNNB(false);
    setPW(false);
    setPR(false);
    setNBN("");
    setNBWN("");
    setFlash(true);setTimeout(()=>setFlash(false),500);
  };

  const record=(ev)=>{
    if(!inn)return;
    setHist(h=>[...h,JSON.parse(JSON.stringify(inn))]);
    let i=JSON.parse(JSON.stringify(inn));
    let bw=i.bowlers[i.bowlerName];
    let st=i.batsmen[i.strikerName];
    const isL=ev.type!=="WD"&&ev.type!=="NB";
    let rT=0,rS=0,rB=0,cross=false;

    if(ev.type==="WD"){rT=ev.extraRuns;rB=ev.extraRuns;i.extras.wd+=ev.extraRuns;if((ev.extraRuns-1)>0&&(ev.extraRuns-1)%2===1)cross=true;}
    else if(ev.type==="NB"){rT=ev.extraRuns+ev.batRuns;rB=rT;rS=ev.batRuns;i.extras.nb+=ev.extraRuns;if(ev.batRuns%2===1)cross=true;}
    else if(ev.type==="B"||ev.type==="LB"){rT=ev.extraRuns;i.extras[ev.type==="B"?"b":"lb"]+=ev.extraRuns;if(ev.extraRuns%2===1)cross=true;}
    else if(ev.type==="W"){
      // Run-outs are special: runs may have been completed BEFORE the dismissal.
      // We save runsCross separately — it captures the physical positions AT THE MOMENT
      // of the dismissal (from completed runs only). The combined cross (runs XOR end-of-over)
      // is what controls who faces NEXT, and they must not be confused.
      if(ev.dismissalType==="Run Out"){
        const r=parseInt(ev.runOutRuns)||0;
        rT=r;rS=r;rB=r;
        if(r%2===1)cross=true;
      }else{
        rT=ev.extraRuns||0;
      }
      bw.wickets++;i.wickets++;
    }
    else if(ev.type==="DECL"){
      // Declared runs: admin/scorer manually credits runs when the ball can't be fielded normally
      // (e.g. stuck against a fence). Goes to the striker's own score like a normal hit, counts as
      // a legal ball bowled — but strike NEVER rotates, regardless of the run count being odd or even.
      const r=parseInt(ev.runs)||0; rT=r;rS=r;rB=r;cross=false;
    }
    else if(ev.type==="OT"){
      // Overthrow strike rotation rules:
      // 1D/2D (declared overthrow): only batter's physical runs determine strike — overthrow runs DON'T count
      // Normal overthrow (1,2,3,4): TOTAL runs (bat runs + overthrow) determine strike change
      const bRuns=ev.baseRuns||0;
      const oRuns=ev.overthrowRuns||0;
      const r=bRuns+oRuns; rT=r;rS=r;rB=r;
      cross=ev.isDeclOT ? bRuns%2===1 : (bRuns+oRuns)%2===1;
    }
    else{const r=parseInt(ev.type);rT=r;rS=r;rB=r;if(r%2===1)cross=true;}

    i.totalRuns+=rT;bw.runs+=rB;bw.runsThisOver+=rB;
    if(isL){bw.ballsThisOver++;i.totalBalls++;}
    if(ev.type!=="WD"){st.runs+=rS;if(isL)st.balls++;if(ev.type==="4")st.fours++;if(ev.type==="6")st.sixes++;}
    i.batsmen[i.strikerName]=st;i.bowlers[i.bowlerName]=bw;
    i.overEvents=[...i.overEvents,ev];

    // Declare (stuck ball) never rotates strike FROM THE RUN — apply this BEFORE the end-of-over
    // flip below. The end-of-over swap is a separate, physical thing (batsmen change ends because the
    // bowler switches ends) and MUST still happen even on a declared last ball. Applying it after the
    // flip (as before) wrongly cancelled the over-change swap, leaving the wrong batsman on strike.
    if(ev.type==="DECL")cross=false;

    let overDone=false;
    if(isL&&bw.ballsThisOver===6){
      bw.maidens=bw.runsThisOver===0?bw.maidens+1:bw.maidens;
      bw.overs++;bw.ballsThisOver=0;bw.runsThisOver=0;
      i.bowlers[i.bowlerName]=bw;
      i.completedOvers=[...i.completedOvers,i.overEvents];i.overEvents=[];
      overDone=true;if(!i.single)cross=!cross;
    }
    if(i.single)cross=false;  // single batsman always on strike

    if(ev.type==="W"){
      // Save the striker BEFORE any swap — this is the person actually facing the ball.
      const savedStriker=i.strikerName;
      // For run-out: save the cross from COMPLETED RUNS ONLY (physical positions when wicket fell).
      // The combined cross (runs XOR end-of-over) is what determines who faces next — different thing.
      const runsCross=ev.dismissalType==="Run Out"&&(parseInt(ev.runOutRuns)||0)%2===1;

      if(ev.dismissalType==="Run Out" && ev.runOutEnd){
        // Step 1: Find positions at the MOMENT of dismissal (runs cross only, no over flip yet)
        let tS=i.strikerName, tNS=i.nonStrikerName;
        if(runsCross){const t=tS;tS=tNS;tNS=t;}
        // Step 2: Determine who is out. Prefer the explicit name the scorer chose (unambiguous,
        // handles the 0-run "could be either batsman" case); fall back to physical end for old events.
        const outName = (ev.runOutName && (ev.runOutName===i.strikerName||ev.runOutName===i.nonStrikerName))
          ? ev.runOutName
          : (ev.runOutEnd==="striker"?tS:tNS);
        i.batsmen={...i.batsmen,[outName]:{...i.batsmen[outName],out:true,howOut:ev.dismissal}};
        // Step 3: Apply combined cross (runs + end-of-over) for who faces NEXT
        if(cross){i=swap(i);}
        // Step 4: New batsman fills the slot where the out player now sits in the final state
        i.pendingOutEnd=i.strikerName===outName?"striker":"nonStriker";
      }else{
        // Normal dismissal (Bowled/Caught/LBW/Stumped): savedStriker is ALWAYS out.
        const outBatsman={...i.batsmen[savedStriker],out:true,howOut:ev.dismissal||`b ${i.bowlerName}`};
        i.batsmen={...i.batsmen,[savedStriker]:outBatsman};
        // Apply end-of-over cross AFTER marking dismissal
        if(cross){i=swap(i);}
        // After cross: if over ended (cross=true), surviving non-striker is now at striker position.
        // New batsman fills non-striker slot so survivor faces. Mid-over: new batsman faces normally.
        i.pendingOutEnd=cross?"nonStriker":"striker";
      }
      if(i.battingOrder.length>=i.maxWkts+1||i.wickets>=i.maxWkts||i.totalBalls>=i.overs*6){setInn(i);endInnings(i);return;}
      i.pending=overDone?"wicketAndBowler":"wicket";
      setInn(i);
      return;
    }
    if(cross){ i=swap(i); }
    setInn(i);
    if(i.totalBalls>=i.overs*6){endInnings(i);return;}
    if(i.target!==null&&i.totalRuns>=i.target){setMO({winner:i.battingTeam,margin:`${i.maxWkts-i.wickets} wicket${i.maxWkts-i.wickets===1?"":"s"}`});if(FB_OK&&DB)DB.ref("potm").set({open:true,votes:{}}).catch(()=>{});return;}
    if(overDone){ setInn(p=>({...p,pending:"newBowler"})); }
  };

  const confBatsman=(directName)=>{
    const nm=(typeof directName==="string"?directName:nbn).trim();if(!nm)return;
    setInn(p=>{
      const b={...p.batsmen};
      const enteringAtStrikerEnd = (p.pendingOutEnd||"striker")==="striker";
      const existing=b[nm];
      if(existing){
        // returning retired batsman — keep their score, clear retired flag
        b[nm]={...existing,onStrike:enteringAtStrikerEnd,retired:false};
      }else{
        b[nm]={...nb(nm,resolvePid(nm)),onStrike:enteringAtStrikerEnd};
      }
      const order=p.battingOrder.includes(nm)?p.battingOrder:[...p.battingOrder,nm];
      // If a new bowler was ALSO needed (wicket fell on the over's last ball), keep that prompt
      // showing after this one resolves — otherwise clear pending entirely.
      const nextPending = p.pending==="wicketAndBowler" ? "newBowler" : null;
      // The new batsman fills whichever end was actually vacated — for most dismissals that's always
      // the striker's end, but for a run-out it could be EITHER end, set by pendingOutEnd above.
      return enteringAtStrikerEnd
        ? {...p,batsmen:b,battingOrder:order,strikerName:nm,pending:nextPending,pendingOutEnd:null}
        : {...p,batsmen:b,battingOrder:order,nonStrikerName:nm,pending:nextPending,pendingOutEnd:null};
    });
    setNBN("");
  };
  const retire=()=>{
    // mark current striker as retired, prompt for next batsman
    setHist(h=>[...h,JSON.parse(JSON.stringify(inn))]);
    setInn(p=>{const b={...p.batsmen};b[p.strikerName]={...b[p.strikerName],retired:true,onStrike:false};return{...p,batsmen:b,pending:"retire"};});
  };
  const confBowler=(directName)=>{
    const nm=(typeof directName==="string"?directName:nbwn).trim();if(!nm)return;
    if(inn&&nm===inn.bowlerName){alert("A bowler cannot bowl two overs in a row. Pick a different bowler.");return;}
    setInn(p=>{const b={...p.bowlers};if(!b[nm])b[nm]=nw(nm,resolvePid(nm));return{...p,bowlers:b,bowlingOrder:p.bowlingOrder.includes(nm)?p.bowlingOrder:[...p.bowlingOrder,nm],bowlerName:nm,pending:null};});
    setNBWN("");
  };
  const start2=({striker,nonStriker,bowler})=>{
    setHist([]);
    setInn(p=>({battingTeam:p.bowlingTeam,bowlingTeam:p.battingTeam,inningsNum:2,
      venue:p.venue,format:p.format,overs:p.overs,maxWkts:p.maxWkts,single:p.single,
      batsmen:p.single?{[striker]:{...nb(striker,resolvePid(striker)),onStrike:true}}:{[striker]:{...nb(striker,resolvePid(striker)),onStrike:true},[nonStriker]:nb(nonStriker,resolvePid(nonStriker))},
      battingOrder:p.single?[striker]:[striker,nonStriker],
      bowlers:{[bowler]:nw(bowler,resolvePid(bowler))},bowlingOrder:[bowler],
      strikerName:striker,nonStrikerName:p.single?null:nonStriker,bowlerName:bowler,
      totalRuns:0,totalBalls:0,wickets:0,overEvents:[],completedOvers:[],
      extras:{wd:0,nb:0,b:0,lb:0},target:p.totalRuns+1}));
    setIB(false);
  };

  if(!match){
    if(role!=="admin"){
      return <Centered emoji="🏏" title="No active match yet" sub="Ask the admin to start a match first. This screen will update automatically once they do." onExit={onExit}/>;
    }
    return<Setup onStart={startMatch} role={role} onExit={onExit} onHistory={onHistory} onPoll={onPoll} onRoster={onRoster}/>;
  }
  if(!inn)   return null;
  if(inn.awaitingOpeners) return<OpenersForm inn={inn} match={match} onSubmit={fillOpeners} role={role} onExit={onExit} rosterNames={rosterNames}/>;
  if(ib)     return<InningsBreak inn={inn} match={match} onStart={start2} role={role} onRevert={revert} canRevert={!!preEnd||preEndInDB} onEditOvers={editOvers} onExit={onExit} rosterNames={rosterNames}/>;
  if(mo) return<MatchOver result={mo} inn={inn} inn1={inn1} match={match} potm={potm} role={role} onRevert={revert} canRevert={!!preEnd||preEndInDB} onNew={()=>{setMatch(null);setInn(null);setMO(null);setInn1(null);setPreEnd(null);setPotm(null);if(FB_OK&&DB){DB.ref("live").remove().catch(()=>{});DB.ref("potm").remove().catch(()=>{});DB.ref("_preEnd").remove().catch(()=>{});}}}/>;

  const SK=inn.batsmen[inn.strikerName];
  const NS=inn.nonStrikerName?inn.batsmen[inn.nonStrikerName]:null;
  const BW=inn.bowlers[inn.bowlerName];
  const bLeft=inn.overs*6-inn.totalBalls;
  const crr=rr(inn.totalRuns,inn.totalBalls);
  const req=inn.target?inn.target-inn.totalRuns:null;
  const rrr=inn.target&&bLeft>0?((req/bLeft)*6).toFixed(2):null;

  return(
    <div style={{background:"linear-gradient(165deg,#022c1e 0%,#0a2540 24%,#1c1150 52%,#2d0f5c 76%,#0a0414 100%)",minHeight:"100dvh"}}>

      {syncErr&&(
        <div style={{background:"rgba(239,68,68,.15)",borderBottom:"1px solid rgba(239,68,68,.5)",padding:"8px 14px",textAlign:"center"}}>
          <span style={{color:"#f87171",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>⚠️ Live sync blocked — publish Firebase rules (read/write: true). Scoring still works locally.</span>
        </div>
      )}

      {/* Compact score header — single page fit */}
      <div className="score-header">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:role==="admin"?"#fbbf24":"#34d399",fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:700,textTransform:"uppercase",letterSpacing:".15em",border:`1px solid ${role==="admin"?"rgba(251,191,36,.5)":"rgba(52,211,153,.5)"}`,borderRadius:6,padding:"2px 6px"}}>{role==="admin"?"🔑 Admin":"✏️ Scorer"}</span>
            <span style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:9,textTransform:"uppercase",letterSpacing:".2em"}}>{inn.inningsNum===1?"1st":"2nd"} Inn</span>
            <span style={{width:3,height:3,borderRadius:"50%",background:"#4338ca",display:"inline-block"}}/>
            <span style={{fontWeight:700,fontSize:13}}>{inn.battingTeam}</span>
            <span style={{color:"#4b5563",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>vs {inn.bowlingTeam}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <ManualFixButton inn={inn} rosterNames={rosterNames} onSave={({striker,nonStriker,bowler})=>fixPlayers({striker,nonStriker,bowler})}/>
            {role==="admin"&&<AdminActionsMenu
              onHistory={onHistory} onAnnounce={onAnnounce}
              inn={inn} onEditMatchSave={({overs,maxWkts})=>setInn(p=>({...p,overs,maxWkts}))}
              match={match} role={role}
              onUpdateTeams={(pubTeamA,pubTeamB)=>setMatch(m=>m?({...m,pubTeamA,pubTeamB}):m)}
            />}
            {onExit&&<button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← home</button>}
          </div>
        </div>
        {/* Score + stats all in one compact row */}
        <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap"}}>
          <span className={`score-big${flash?" flash":""}`}>{inn.totalRuns}<span className="score-wkt">/{inn.wickets}</span></span>
          <span style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>({ovStr(inn.totalBalls)} ov)</span>
          <span style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginLeft:4}}>CRR <span style={{color:"#fbbf24",fontWeight:600}}>{crr}</span></span>
          {inn.target&&<>
            <span style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>T:<span style={{color:"#fff",fontWeight:600}}>{inn.target}</span></span>
            <span style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>Need <span style={{color:"#fff",fontWeight:600}}>{Math.max(req,0)}</span>/<span style={{color:"#fff",fontWeight:600}}>{bLeft}b</span></span>
            {rrr&&<span style={{color:parseFloat(rrr)>12?"#f87171":"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>RRR <span style={{fontWeight:600,color:parseFloat(rrr)>12?"#f87171":"#fff"}}>{rrr}</span></span>}
          </>}
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs">
        {[["score","🏏 Live"],["batting","🟡 Batting"],["bowling","🎯 Bowling"]].map(([id,lbl])=>(
          <button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>

      <div className="content">
        {tab==="score"&&<ScoreTab inn={inn} SK={SK} NS={NS} BW={BW} record={record} rosterNames={rosterNames}
          match={match}
          pw={pw} nbn={nbn} setNBN={setNBN} confBatsman={confBatsman}
          nnb={nnb} nbwn={nbwn} setNBWN={setNBWN} confBowler={confBowler}
          pr={pr} onRetire={retire}
          onSwapStrike={()=>setInn(p=>(!p.single&&p.nonStrikerName)?swap(p):p)}
          onFixPlayers={fixPlayers}
          onEndInnings={manualEndInnings} onRevert={revert} canRevert={!!preEnd||preEndInDB} role={role}
          onEditOvers={editOvers} onRestore={restoreFromBackup}
          onUndo={undo} canUndo={hist.length>0}/>}
        {tab==="batting"&&<BattingTab inn={inn}/>}
        {tab==="bowling"&&<BowlingTab inn={inn}/>}
      </div>
    </div>
  );
}
