<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback}=React;

// ── Helpers ──────────────────────────────────────────────────────────────────
const nb=(n,pid)=>({name:n,pid:pid||null,runs:0,balls:0,fours:0,sixes:0,out:false,howOut:"",onStrike:false});
const nw=(n,pid)=>({name:n,pid:pid||null,overs:0,ballsThisOver:0,runs:0,wickets:0,maidens:0,runsThisOver:0});
const ovStr=(b)=>`${Math.floor(b/6)}.${b%6}`;
const rr=(r,b)=>b===0?"0.00":((r/b)*6).toFixed(2);
const T=20;

// ── Stats linking: normalize a name and resolve it to a roster profile id ──
// Scorecards store players by typed name; profiles use ids. We bridge them by
// matching on a normalized full name (trim + lowercase + collapse spaces).
function normName(n){return (n||"").trim().toLowerCase().replace(/\s+/g," ");}
function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return"just now";
  if(s<3600)return Math.floor(s/60)+"m ago";
  if(s<86400)return Math.floor(s/3600)+"h ago";
  if(s<604800)return Math.floor(s/86400)+"d ago";
  return new Date(ts).toLocaleDateString(undefined,{month:"short",day:"numeric"});
}
// Map any stored venue string to a short canonical label so Lakes / Millennium
// group cleanly even though they're stored as "Lakes High School" /
// "Millennium Park, Lindenhurst" etc. Custom venues keep their own name.
function canonVenue(v){
  const s=(v||"").toLowerCase();
  if(s.includes("lakes")) return "Lakes High School";
  if(s.includes("millennium")) return "Millennium Park";
  return (v&&v.trim())||"Other";
}
function buildPidResolver(roster){
  const map={};
  Object.entries(roster||{}).forEach(([id,p])=>{ if(p&&p.name) map[normName(p.name)]=id; });
  return (name)=> map[normName(name)] || null;
}

// ── Career stats engine — aggregates every completed match in `history` ──
// Players are keyed by profile id when known (exact, survives name typos),
// otherwise by normalized name. Returns one row per player with batting + bowling.
function computeCareerStats(history, roster){
  const resolve=buildPidResolver(roster);
  const players={};
  const keyFor=(p)=>{const pid=p.pid||resolve(p.name);return pid?("id:"+pid):("nm:"+normName(p.name));};
  const ensure=(p)=>{
    const k=keyFor(p);
    if(!players[k]){
      const pid=p.pid||resolve(p.name);
      players[k]={key:k,pid:pid||null,
        name:(pid&&roster&&roster[pid]&&roster[pid].name)||p.name,
        bat:{inns:0,runs:0,balls:0,fours:0,sixes:0,outs:0,hs:0,hsNotOut:false},
        bowl:{inns:0,balls:0,runs:0,wkts:0,maidens:0,bestW:-1,bestR:0},
        matchesSet:{}};
    }
    return players[k];
  };
  Object.values(history||{}).forEach((m,mi)=>{
    [m&&m.inn1,m&&m.inn2].forEach(inn=>{
      if(!inn) return;
      (inn.battingOrder||[]).forEach(name=>{
        const b=inn.batsmen&&inn.batsmen[name]; if(!b) return;
        const pl=ensure(b); pl.matchesSet[mi]=true;
        const batted=(b.balls||0)>0||b.out||(b.runs||0)>0;
        if(batted){
          pl.bat.inns++; pl.bat.runs+=b.runs||0; pl.bat.balls+=b.balls||0;
          pl.bat.fours+=b.fours||0; pl.bat.sixes+=b.sixes||0;
          if(b.out) pl.bat.outs++;
          const notOut=!b.out, runs=b.runs||0;
          if(runs>pl.bat.hs||(runs===pl.bat.hs&&notOut&&!pl.bat.hsNotOut)){ pl.bat.hs=runs; pl.bat.hsNotOut=notOut; }
        }
      });
      (inn.bowlingOrder||[]).forEach(name=>{
        const w=inn.bowlers&&inn.bowlers[name]; if(!w) return;
        const balls=(w.overs||0)*6+(w.ballsThisOver||0);
        const pl=ensure(w); pl.matchesSet[mi]=true;
        if(balls>0||(w.wickets||0)>0){
          pl.bowl.inns++; pl.bowl.balls+=balls; pl.bowl.runs+=w.runs||0;
          pl.bowl.wkts+=w.wickets||0; pl.bowl.maidens+=w.maidens||0;
          const wk=w.wickets||0, rn=w.runs||0;
          if(wk>pl.bowl.bestW||(wk===pl.bowl.bestW&&rn<pl.bowl.bestR)){ pl.bowl.bestW=wk; pl.bowl.bestR=rn; }
        }
      });
    });
  });
  return Object.values(players).map(pl=>{
    const b=pl.bat, w=pl.bowl;
    return {
      key:pl.key, pid:pl.pid, name:pl.name, matches:Object.keys(pl.matchesSet).length,
      bat:{...b, avg:b.outs>0?(b.runs/b.outs):null, sr:b.balls>0?(b.runs/b.balls*100):null},
      bowl:{...w, econ:w.balls>0?(w.runs/w.balls*6):null,
        oversStr:Math.floor(w.balls/6)+(w.balls%6?"."+(w.balls%6):""),
        best:w.bestW>=0?(w.bestW+"/"+w.bestR):"—"}
    };
  });
}

function chipClass(ev){
  if(ev.type==="W")  return "chip chip-W";
  if(ev.type==="4")  return "chip chip-4";
  if(ev.type==="6")  return "chip chip-6";
  if(ev.type==="WD") return "chip chip-WD";
  if(ev.type==="NB") return "chip chip-NB";
  if(ev.type==="0")  return "chip chip-0";
  if(ev.type==="DECL") return "chip chip-6"; // reuse the boundary styling — visually distinct, no new CSS needed
  if(ev.type==="OT")   return "chip chip-WD"; // orange dashed — overthrow declare
  return "chip chip-run";
}
function chipLbl(ev){
  if(ev.type==="W")  return"W";
  if(ev.type==="WD") return ev.extraRuns>1?`wd+${ev.extraRuns-1}`:"wd";
  if(ev.type==="NB") return ev.batRuns>0?`nb+${ev.batRuns}`:"nb";
  if(ev.type==="DECL") return `D${ev.runs||0}`;
  if(ev.type==="OT")   return `OT${(ev.baseRuns||0)+(ev.overthrowRuns||0)}`;
  return ev.type;
}

// ── Setup (Admin only: teams, venue, toss — NO players) ──────────────────────
function Setup({onStart,role,onExit,onHistory,onPoll,onRoster}){
  const rA=useRef(),rB=useRef();
  const[venue,setVenue]=useState(null);
  const[overs,setOvers]=useState(8);
  const[wkts,setWkts]=useState(6);
  const[customOv,setCustomOv]=useState(false);
  const[customWk,setCustomWk]=useState(false);
  const[mWkts,setMWkts]=useState(10);
  const[customMWk,setCustomMWk]=useState(false);
  const[mOvers,setMOvers]=useState(20);
  const[customMOv,setCustomMOv]=useState(false);
  const[customVenueName,setCustomVenueName]=useState("");
  const[customVenueStyle,setCustomVenueStyle]=useState("lakes");
  const[cvOvers,setCvOvers]=useState(8);
  const[cvWkts,setCvWkts]=useState(10);
  const[cvSingle,setCvSingle]=useState(false);
  const[customCvOv,setCustomCvOv]=useState(false);
  const[customCvWk,setCustomCvWk]=useState(false);
  const[single,setSingle]=useState(false);
  const[pinA,setPinA]=useState(()=>String(Math.floor(1000+Math.random()*9000)));
  const[pinB,setPinB]=useState(()=>String(Math.floor(1000+Math.random()*9000)));
  const[tossWinner,setTossWinner]=useState(null);
  const[tossChoice,setTossChoice]=useState(null);
  const[flipping,setFlipping]=useState(false);
  const[coinResult,setCoinResult]=useState(null);
  const[flipCount,setFlipCount]=useState(0);
  const mountedRef=useRef(true);
  const audioCtxRef=useRef(null);

  // ── Published teams history — load ALL past sets, newest first ────────────
  const[pubTeamsList,setPubTeamsList]=useState([]);
  const[selectedPub,setSelectedPub]=useState(null);
  const[roster,setRoster]=useState({});
  const[imported,setImported]=useState(false);

  React.useEffect(()=>{
    if(!FB_OK||!DB) return;
    const rRef=DB.ref("roster");
    const rCb=rRef.on("value",s=>setRoster(s.val()||{}));
    const ptRef=DB.ref("publishedTeams");
    const ptCb=ptRef.on("value",s=>{
      const v=s.val()||{};
      const list=Object.entries(v)
        .map(([id,t])=>({id,...t}))
        .sort((a,b)=>b.publishedAt-a.publishedAt)
        .slice(0,8);
      setPubTeamsList(list);
      if(list.length>0) setSelectedPub(p=>p||list[0]);
    });
    return()=>{rRef.off("value",rCb);ptRef.off("value",ptCb);};
  },[]);

  const importTeams=(pub)=>{
    const p=pub||selectedPub;
    if(!p) return;
    if(rA.current) rA.current.value=p.captainA||"Team A";
    if(rB.current) rB.current.value=p.captainB||"Team B";
    setSelectedPub(p);
    setImported(true);
  };

  // Convert PIDs → player names
  const teamNames=(pids)=>(pids||[]).map(id=>roster[id]?.name).filter(Boolean);

  React.useEffect(()=>()=>{mountedRef.current=false;},[]);

  // Defense in depth: Setup creates/configures matches and exposes the "reset live data" tool —
  // it must never be reachable by a non-admin. Placed AFTER all hooks above (Rules of Hooks).
  if(role!=="admin"){
    return <Centered emoji="🏏" title="No active match yet" sub="Ask the admin to start a match first." onExit={onExit}/>;
  }

  const isSingle=venue==="lakes"&&single;

  // ── Lightweight Web Audio sound effects (no external files needed) ──
  const getAudioCtx = () => {
    if(!audioCtxRef.current){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(Ctx) audioCtxRef.current = new Ctx();
    }
    return audioCtxRef.current;
  };
  const playTick = () => {
    const ctx = getAudioCtx(); if(!ctx) return;
    if(ctx.state==="suspended"){ ctx.resume().catch(()=>{}); return; } // skip just this one tick, context will be ready for the next
    const t = ctx.currentTime;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = "square"; osc.frequency.setValueAtTime(1100, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.06, t+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.06);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t+0.07);
  };
  const playResultChime = () => {
    const ctx = getAudioCtx(); if(!ctx) return;
    if(ctx.state==="suspended"){ ctx.resume().catch(()=>{}); }
    const t = ctx.currentTime;
    [523.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = "sine"; osc.frequency.setValueAtTime(freq, t+i*0.12);
      gain.gain.setValueAtTime(0.0001, t+i*0.12);
      gain.gain.exponentialRampToValueAtTime(0.18, t+i*0.12+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+i*0.12+0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t+i*0.12); osc.stop(t+i*0.12+0.55);
    });
  };
  // Actually SPEAK "Heads!" or "Tails!" out loud using the browser's built-in voice (no audio files needed)
  const announceResult = (word) => {
    try{
      if(!window.speechSynthesis) return;
      window.speechSynthesis.cancel(); // clear any queued/stuck utterances first
      const utter = new SpeechSynthesisUtterance(word + "!");
      utter.rate = 0.85; utter.pitch = 1.1; utter.volume = 1;
      const voices = window.speechSynthesis.getVoices();
      const enVoice = voices.find(v=>v.lang && v.lang.startsWith("en"));
      if(enVoice) utter.voice = enVoice;
      window.speechSynthesis.speak(utter);
    }catch(e){ console.error("speech announce failed",e); }
  };

  const FLIP_DURATION = 5000; // 5 seconds
  const flipCoin=()=>{
    if(flipping)return;
    setFlipping(true);setCoinResult(null);setFlipCount(c=>c+1);
    // iOS/Safari suspend AudioContext until it's resumed inside a real user-gesture handler — this click is that gesture.
    const ctx = getAudioCtx();
    if(ctx && ctx.state==="suspended") ctx.resume().catch(()=>{});
    // CRITICAL for iOS Safari: speechSynthesis.speak() is only reliably allowed when called directly
    // inside a user-gesture handler — calling it later from a setTimeout (as the real "Heads!"/"Tails!"
    // announcement must, since it has to wait for the flip to finish) gets silently blocked on iOS.
    // The fix: speak a near-silent "warm-up" utterance right now, synchronously inside this click.
    // This unlocks the speech engine for the rest of the page session, so the delayed real announcement
    // later (after the 6s flip) is then allowed to play normally.
    try{
      if(window.speechSynthesis){
        const warmup = new SpeechSynthesisUtterance(" ");
        warmup.volume = 0; warmup.rate = 10;
        window.speechSynthesis.speak(warmup);
      }
    }catch(e){}
    // Also pre-load voices now (first call to getVoices() can be empty until they finish loading async)
    try{ window.speechSynthesis && window.speechSynthesis.getVoices(); }catch(e){}
    // Tick sound while the coin spins, slowing down toward the end like a real coin settling
    const tickIntervals = [120,120,140,160,190,230,280,340,420,520,650,820];
    let elapsed = 0;
    tickIntervals.forEach((gap)=>{
      elapsed += gap;
      setTimeout(()=>{ if(mountedRef.current && elapsed < FLIP_DURATION-200) playTick(); }, elapsed);
    });
    setTimeout(()=>{
      if(!mountedRef.current)return;
      const result = Math.random()<0.5 ? "heads" : "tails";
      setCoinResult(result);
      playResultChime();
      announceResult(result==="heads"?"Heads":"Tails");
      setFlipping(false);
      // Deliberately NOT auto-picking a toss winner — the coin only reveals heads/tails.
      // Whoever called it correctly is selected manually below by admin, just like a real toss.
    },FLIP_DURATION);
  };
  const go=()=>{
    const[a,b]=[rA,rB].map(r=>r.current?.value?.trim());
    if(!a||!b){alert("Please enter both team names.");return;}
    if(!tossWinner||!tossChoice){alert("Select who won the toss and their decision.");return;}
    if(venue==="lakes"){
      if(!overs||overs<1||overs>50){alert("Enter valid overs (1-50).");return;}
      if(!wkts||wkts<1||wkts>11){alert("Enter valid wickets (1-11).");return;}
    }
    if(venue==="millennium"){
      if(!mOvers||mOvers<1||mOvers>50){alert("Enter valid overs (1-50).");return;}
      if(!mWkts||mWkts<1||mWkts>20){alert("Enter valid wickets (1-20).");return;}
    }
    if(venue==="other"){
      if(!customVenueName.trim()){alert("Enter the ground/venue name.");return;}
      if(!cvOvers||cvOvers<1||cvOvers>50){alert("Enter valid overs (1-50).");return;}
      if(!cvWkts||cvWkts<1||cvWkts>20){alert("Enter valid wickets (1-20).");return;}
    }
    if(!pinA||pinA.length<3||!pinB||pinB.length<3){alert("Both team PINs must be at least 3 digits.");return;}
    if(pinA===pinB){alert("Team A and Team B PINs must be different.");return;}

    // Determine who bats first based on toss
    const winnerName=tossWinner==="A"?a:b;
    const loserName=tossWinner==="A"?b:a;
    const battingFirst=tossChoice==="bat"?winnerName:loserName;
    const bowlingFirst=battingFirst===a?b:a;

    const v=venue==="millennium"
      ?{venue:"Millennium Park, Lindenhurst",format:Number(mOvers)===20?"T20":"Custom",overs:Number(mOvers),maxWkts:Number(mWkts),single:false}
      :venue==="other"
      ?{venue:customVenueName.trim(),format:customVenueStyle==="millennium"?(Number(cvOvers)===20?"T20":"Custom"):"Casual",overs:Number(cvOvers),maxWkts:Number(cvWkts),single:customVenueStyle==="lakes"&&cvSingle}
      :{venue:"Lakes High School",format:"Casual",overs:Number(overs),maxWkts:Number(wkts),single:isSingle};
    onStart({teamA:a,teamB:b,battingFirst,bowlingFirst,pinA,pinB,
      tossSummary:`${winnerName} won the toss, chose to ${tossChoice} first`,
      pubTeamA: imported&&selectedPub ? teamNames(selectedPub.teamA) : [],
      pubTeamB: imported&&selectedPub ? teamNames(selectedPub.teamB) : [],
      ...v});
  };
  const clr=()=>{[rA,rB].forEach(r=>{if(r.current)r.current.value=""});setTossWinner(null);setTossChoice(null);rA.current?.focus();};

  const venueBtn=(id,emoji,title,sub,active)=>(
    <button onClick={()=>setVenue(id)} style={{
      flex:1,padding:"16px 12px",borderRadius:18,cursor:"pointer",textAlign:"left",
      border:active?"2px solid #f59e0b":"1.5px solid rgba(99,102,241,.3)",
      background:active?"linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.1))":"rgba(30,27,75,.5)",
      transition:"all .18s",color:"#fff",fontFamily:"'Inter',sans-serif"
    }}>
      <div style={{fontSize:28,marginBottom:6}}>{emoji}</div>
      <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{title}</div>
      <div style={{fontSize:11,color:active?"#fbbf24":"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>{sub}</div>
    </button>
  );

  const chip=(val,cur,set,suffix)=>(
    <button onClick={()=>set(val)} style={{
      flex:1,padding:"10px 4px",borderRadius:12,cursor:"pointer",fontWeight:700,
      fontFamily:"'JetBrains Mono',monospace",fontSize:15,transition:"all .15s",
      border:cur===val?"none":"1.5px solid rgba(99,102,241,.3)",
      background:cur===val?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",
      color:cur===val?"#111":"#9ca3af"
    }}>{val}{suffix||""}</button>
  );

  const teamAName=rA.current?.value?.trim()||"Team A";
  const teamBName=rB.current?.value?.trim()||"Team B";

  return(
    <div className="screen">
      <div style={{width:"100%",maxWidth:"min(460px,100%)"}}>
        <div className="flex items-center justify-between" style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,background:"rgba(239,68,68,.18)",color:"#f87171",border:"1px solid rgba(239,68,68,.4)",borderRadius:8,padding:"4px 10px",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,letterSpacing:".05em"}}>👑 ADMIN</span>
            <span style={{fontSize:10,color:FB_OK?"#34d399":"#f87171",fontFamily:"'JetBrains Mono',monospace"}} title={FB_OK?"Live sync connected":"Offline — live sync unavailable"}>{FB_OK?"● online":"⚠️ offline"}</span>
          </div>
          {onExit&&<button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← home</button>}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          {onHistory&&<button onClick={onHistory} style={{flex:1,background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.35)",color:"#a5b4fc",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,borderRadius:10,padding:"9px 12px"}}>📚 History</button>}
          {onRoster&&<button onClick={onRoster} style={{flex:1,background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.35)",color:"#6ee7b7",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,borderRadius:10,padding:"9px 12px"}}>👥 Roster</button>}
          {onPoll&&<button onClick={onPoll} style={{flex:1,background:"rgba(167,139,250,.12)",border:"1px solid rgba(167,139,250,.35)",color:"#c4b5fd",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,borderRadius:10,padding:"9px 12px"}}>📋 Poll</button>}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:18}}>
          {FB_OK&&DB&&<button onClick={()=>{ if(confirm("Clear any stuck/corrupted live match data? This won't affect saved history.")){ DB.ref("live").remove().then(()=>alert("Live data cleared. You can start a fresh match now.")); } }} style={{flex:1,background:"transparent",border:"1px solid rgba(99,102,241,.25)",color:"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,borderRadius:10,padding:"9px 12px"}} title="Use this if scorers see a blank screen">🧹 Reset Live Data</button>}
        </div>
        <div className="text-center mb-6 animate-fade">
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:76,height:76,borderRadius:22,background:"linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6)",fontSize:38,marginBottom:14,boxShadow:"0 8px 32px rgba(245,158,11,.45)",animation:"pulseGlow 3s ease-in-out infinite"}}>🏏</div>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:52,fontWeight:700,letterSpacing:"-2px"}}>
            <span style={{background:"linear-gradient(90deg,#FF9933,#ffb366,#FF9933)",backgroundSize:"300% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"slowDrift 9s linear infinite"}}>L</span>
            <span style={{background:"linear-gradient(90deg,#ffffff,#a5b4fc,#ffffff)",backgroundSize:"300% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"slowDrift 9s linear infinite"}}>C</span>
            <span style={{background:"linear-gradient(90deg,#138808,#3fa340,#138808)",backgroundSize:"300% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"slowDrift 9s linear infinite"}}>C</span>
          </h1>
          <p style={{color:"rgba(129,140,248,.5)",fontSize:13,marginTop:2,fontWeight:500}}>Lindenhurst Cricket Club</p>
        </div>
        <div className="card space-y-4">
          {/* Venue picker */}

            <p style={{color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".15em",marginBottom:8}}>📍 Select Ground</p>
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              {venueBtn("lakes","🎾","Lakes High School","Casual · 6-8 ov",venue==="lakes")}
              {venueBtn("millennium","🏟️","Millennium Park","T20 · 20 ov",venue==="millennium")}
            </div>
            <button onClick={()=>setVenue("other")} style={{
              width:"100%",padding:"12px",borderRadius:14,cursor:"pointer",textAlign:"center",
              border:venue==="other"?"2px solid #f59e0b":"1.5px dashed rgba(99,102,241,.4)",
              background:venue==="other"?"linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.1))":"rgba(30,27,75,.3)",
              transition:"all .18s",color:venue==="other"?"#fbbf24":"#818cf8",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:13
            }}>📍✨ New / Other Venue</button>
          </div>

          {/* Lakes: choose overs + wickets */}
          {venue==="lakes"&&(
            <div className="animate-fade" style={{background:"rgba(7,5,15,.4)",borderRadius:16,padding:14,border:"1px solid rgba(99,102,241,.15)"}}>
              <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".12em",marginBottom:6}}>Overs per side</p>
              <div style={{display:"flex",gap:6,marginBottom:customOv?6:12}}>
                {[6,7,8].map(o=>(

                ))}
                <button onClick={()=>{setCustomOv(true);setOvers("")}} style={{flex:1,padding:"10px 4px",borderRadius:12,cursor:"pointer",fontWeight:700,fontFamily:"'Inter',sans-serif",fontSize:12,transition:"all .15s",border:customOv?"none":"1.5px solid rgba(99,102,241,.3)",background:customOv?"linear-gradient(135deg,#8b5cf6,#6366f1)":"transparent",color:customOv?"#fff":"#9ca3af"}}>Custom</button>
              </div>
              {customOv&&<input type="number" min="1" max="50" value={overs} onChange={e=>setOvers(e.target.value)} placeholder="Type overs (e.g. 10, 12, 15)" style={{width:"100%",marginBottom:12,background:"rgba(7,5,15,.8)",border:"1.5px solid rgba(139,92,246,.5)",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,fontFamily:"'JetBrains Mono',monospace",outline:"none"}}/>}

              <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".12em",marginBottom:6}}>Wickets per side</p>
              <div style={{display:"flex",gap:6,marginBottom:customWk?6:0}}>
                {[4,5,6,7].map(w=>(
                  <button key={w} onClick={()=>{setCustomWk(false);setWkts(w)}} style={{flex:1,padding:"10px 4px",borderRadius:12,cursor:"pointer",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",fontSize:15,transition:"all .15s",border:(!customWk&&wkts===w)?"none":"1.5px solid rgba(99,102,241,.3)",background:(!customWk&&wkts===w)?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:(!customWk&&wkts===w)?"#111":"#9ca3af"}}>{w}</button>

              <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".12em",marginBottom:6}}>Batting style</p>
              <div style={{display:"flex",gap:6}}>

              </div>
              {single&&<p style={{color:"#a78bfa",fontFamily:"'JetBrains Mono',monospace",fontSize:10,marginTop:8,textAlign:"center"}}>One batsman bats alone · always on strike · can retire &amp; return</p>}

            </div>
          )}

// ── App root ─────────────────────────────────────────────────────────────────
function App({role,onExit,onHistory,onPoll,onRoster,onAnnounce}){
  const isScorer=role==="scorer"||role==="admin";
  const[match,setMatch]=useState(null);
  const[tab,setTab]=useState("score");
  const[inn,setInn]=useState(null);
  const[hist,setHist]=useState([]);
  // pw/nnb/pr are derived from inn.pending (NOT separate local state) so that the "we need a new
  // batsman / new bowler / retire" prompt is visible to EVERY device sharing this match — including
  // the second scorer on the same team — since inn.pending travels through the normal Firebase sync
  // along with the rest of the innings. Before this fix these were local-only React state, so if one
  // device triggered the new-bowler prompt and a DIFFERENT device (same team's other phone, or admin)
  // scored the next ball, that second device never saw the prompt and silently kept the old bowler.
  const pw = inn?.pending==="wicket"||inn?.pending==="wicketAndBowler";
  const nnb = inn?.pending==="newBowler"||inn?.pending==="wicketAndBowler";
  const pr = inn?.pending==="retire";
  const[nbn,setNBN]=useState("");
  const[nbwn,setNBWN]=useState("");
  const[ib,setIB]=useState(false);
  const[mo,setMO]=useState(null);
  const[potm,setPotm]=useState(null); // Player of the Match voting
  const[flash,setFlash]=useState(false);
  const[inn1,setInn1]=useState(null);
  const[saved,setSaved]=useState(false);
  const[syncErr,setSyncErr]=useState(null);
  const[loaded,setLoaded]=useState(!FB_OK||!DB); // becomes true once we've checked Firebase for an existing match
  const[preEnd,setPreEnd]=useState(null); // snapshot before ending innings/match, so admin can revert


  const[roster,setRoster]=useState({});  // club roster — used to autocomplete names & stamp profile ids for stats
  const localChange=React.useRef(false); // true right after THIS device makes a change — skip the next incoming sync to avoid clobbering our own optimistic update

  // Roster listener — powers name autocomplete and links scored players to profiles for career stats.
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB)return;
    const ref=DB.ref("roster");
    const cb=ref.on("value",s=>setRoster(s.val()||{}));
    return ()=>ref.off("value",cb);
  },[isScorer]);
  const resolvePid=React.useMemo(()=>buildPidResolver(roster),[roster]);
  const rosterNames=React.useMemo(()=>Object.values(roster||{}).map(p=>p&&p.name).filter(Boolean).sort((a,b)=>a.localeCompare(b)),[roster]);

  // Pull in any match that's already live (so a scorer/admin joining mid-match sees it)
  // and keep listening so both team scorers + admin always see the SAME shared match.
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB)return;
    const ref=DB.ref("live");
    const cb=ref.on("value",s=>{
      if(localChange.current){ localChange.current=false; return; } // ignore echo of our own write
      const v=s.val();
      // IMPORTANT: Firebase Realtime Database does NOT store empty objects {} or empty arrays [] —
      // those keys are silently omitted on write. So a freshly-created match (before openers are set)
      // legitimately arrives here with batsmen/bowlers/battingOrder/etc. MISSING, not present-but-empty.
      // We must normalize those back to {} / [] rather than rejecting the data as "invalid".
      const innOk = v&&v.inn&&typeof v.inn==="object"
        &&typeof v.inn.totalRuns==="number"&&typeof v.inn.totalBalls==="number"&&typeof v.inn.wickets==="number"
        &&typeof v.inn.battingTeam==="string"&&typeof v.inn.bowlingTeam==="string";
      const valid=v&&v.match&&innOk&&v.match.teamA&&v.match.teamB;
      if(!valid){ setLoaded(true); return; }
      const normInn = {
        ...v.inn,
        overEvents: v.inn.overEvents||[],
        completedOvers: v.inn.completedOvers||[],
        battingOrder: v.inn.battingOrder||[],
        bowlingOrder: v.inn.bowlingOrder||[],
        batsmen: v.inn.batsmen||{},
        bowlers: v.inn.bowlers||{},
        extras: v.inn.extras||{wd:0,nb:0,b:0,lb:0},
      };
      setMatch(v.match);
      setInn(normInn);
      setInn1(v.inn1||null);
      setIB(!!v.ib);
      setMO(v.mo||null);
      // potm is now on its own path — don't read from live node
      // scorer slots removed
      setLoaded(true);
    },err=>{ console.error("live listener error",err); setSyncErr(err.message||"Could not read live match"); setLoaded(true); });

  },[isScorer]);

  // ── Standalone POTM listener — separate from live so sync never overwrites it ──
  React.useEffect(()=>{

  },[]);

  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!loaded)return;
    // Firebase rejects undefined — strip via JSON round-trip


    const payload=JSON.parse(JSON.stringify({match,inn,inn1,ib,mo,pinA:match?.pinA||null,pinB:match?.pinB||null,teamA:match?.teamA||null,teamB:match?.teamB||null,battingTeam:inn?.battingTeam||null,t:Date.now()}));

  const startMatch=({teamA,teamB,battingFirst,bowlingFirst,venue,format,overs,maxWkts,single,pinA,pinB,tossSummary})=>{
    setSaved(false);

    // Shell innings — no players yet, batting team must enter openers

      awaitingOpeners:true,
      batsmen:{},battingOrder:[],
      bowlers:{},bowlingOrder:[],
      strikerName:null,nonStrikerName:null,bowlerName:null,

  };

    }

    if(!preEnd)return;
    setInn(preEnd.inn);setInn1(preEnd.inn1);setIB(false);setMO(null);setSaved(false);

  };

  const undo=()=>{
    if(!hist.length)return;

    setInn({...prev,pending:null});

    setNNB(false);
    setPW(false);
    setPR(false);
    setNBN("");
    setNBWN("");

  };

  const record=(ev)=>{
    if(!inn)return;
    setHist(h=>[...h,JSON.parse(JSON.stringify(inn))]);
    let i=JSON.parse(JSON.stringify(inn));
    let bw=i.bowlers[i.bowlerName];
    let st=i.batsmen[i.strikerName];
    const isL=ev.type!=="WD"&&ev.type!=="NB";
    let rT=0,rS=0,rB=0,cross=false;

    if(ev.type==="WD"){rT=ev.extraRuns;rB=ev.extraRuns;i.extras.wd+=ev.extraRuns;if((ev.extraRuns-1)>0&&(ev.extraRuns-1)%2===1)cross=true;}
    else if(ev.type==="NB"){rT=ev.extraRuns+ev.batRuns;rB=rT;rS=ev.batRuns;i.extras.nb+=ev.extraRuns;if(ev.batRuns%2===1)cross=true;}
    else if(ev.type==="B"||ev.type==="LB"){rT=ev.extraRuns;i.extras[ev.type==="B"?"b":"lb"]+=ev.extraRuns;if(ev.extraRuns%2===1)cross=true;}

      // Run-outs are special: runs may have been completed BEFORE the dismissal (e.g. they ran a 1,
      // then were caught short going for the 2nd). Those completed runs count normally — including
      // normal odd/even strike-crossing for THOSE runs — same as if it had just been a clean single etc.
      // Other dismissal types (bowled/caught/lbw/stumped) never have runs off the bat.
      if(ev.dismissalType==="Run Out"){
        const r=parseInt(ev.runOutRuns)||0;

        rT=ev.extraRuns||0;

      // a legal ball bowled — but strike NEVER rotates, regardless of the run count being odd or even.
      const r=parseInt(ev.runs)||0; rT=r;rS=r;rB=r;cross=false;
    }
    else if(ev.type==="OT"){

      // D1/D2 (declared overthrow): only batter's physical runs determine strike — overthrow runs DON'T count
      // Normal overthrow (1,2,3,4): TOTAL runs (bat runs + overthrow) determine strike change
      const bRuns=ev.baseRuns||0;

    }

      // figuring out who is physically at which end — for a run-out this matters because the two
      // batsmen may have already swapped positions mid-run when the dismissal happened.
      if(cross){ i=swap(i); }
      if(ev.dismissalType==="Run Out" && ev.runOutEnd){
        // runOutEnd refers to the END (striker's end / non-striker's end), not a fixed person —
        // after the cross above, i.strikerName/i.nonStrikerName already reflect who is physically
        // standing at each end right now, so we just read off whichever end was named.
        const outName = ev.runOutEnd==="striker" ? i.strikerName : i.nonStrikerName;

        i.pendingOutEnd = "striker";
      }

      // pending lives ON inn itself so it syncs to every device sharing this match (both team scorers + admin) —
      // not local component state, which a SECOND device would never see, silently skipping the prompt.
      i.pending = overDone ? "wicketAndBowler" : "wicket";

    }
    if(cross){ i=swap(i); }
    setInn(i);
    if(i.totalBalls>=i.overs*6){endInnings(i);return;}
    if(i.target!==null&&i.totalRuns>=i.target){setMO({winner:i.battingTeam,margin:`${i.maxWkts-i.wickets} wicket${i.maxWkts-i.wickets===1?"":"s"}`});if(FB_OK&&DB)DB.ref("potm").set({open:true,votes:{}}).catch(()=>{});return;}

  };

  const confBatsman=(directName)=>{
    const nm=(typeof directName==="string"?directName:nbn).trim();if(!nm)return;

      return enteringAtStrikerEnd

  };
  const confBowler=(directName)=>{
    const nm=(typeof directName==="string"?directName:nbwn).trim();if(!nm)return;
    if(inn&&nm===inn.bowlerName){alert("A bowler cannot bowl two overs in a row. Pick a different bowler.");return;}
    setInn(p=>{const b={...p.bowlers};if(!b[nm])b[nm]=nw(nm,resolvePid(nm));return{...p,bowlers:b,bowlingOrder:p.bowlingOrder.includes(nm)?p.bowlingOrder:[...p.bowlingOrder,nm],bowlerName:nm,pending:null};});

  };
  const start2=({striker,nonStriker,bowler})=>{
    setHist([]);
    setInn(p=>({battingTeam:p.bowlingTeam,bowlingTeam:p.battingTeam,inningsNum:2,
      venue:p.venue,format:p.format,overs:p.overs,maxWkts:p.maxWkts,single:p.single,
      batsmen:p.single?{[striker]:{...nb(striker,resolvePid(striker)),onStrike:true}}:{[striker]:{...nb(striker,resolvePid(striker)),onStrike:true},[nonStriker]:nb(nonStriker,resolvePid(nonStriker))},
      battingOrder:p.single?[striker]:[striker,nonStriker],
      bowlers:{[bowler]:nw(bowler,resolvePid(bowler))},bowlingOrder:[bowler],
      strikerName:striker,nonStrikerName:p.single?null:nonStriker,bowlerName:bowler,
      totalRuns:0,totalBalls:0,wickets:0,overEvents:[],completedOvers:[],
      extras:{wd:0,nb:0,b:0,lb:0},target:p.totalRuns+1}));
    setIB(false);
  };

  if(!match){
    if(role!=="admin"){
      return <Centered emoji="🏏" title="No active match yet" sub="Ask the admin to start a match first. This screen will update automatically once they do." onExit={onExit}/>;
    }

  }
  if(!inn)   return null;
  if(inn.awaitingOpeners) return<OpenersForm inn={inn} match={match} onSubmit={fillOpeners} role={role} onExit={onExit} rosterNames={rosterNames}/>;
  if(ib)     return<InningsBreak inn={inn} match={match} onStart={start2} role={role} onRevert={revert} canRevert={!!preEnd} onExit={onExit} rosterNames={rosterNames}/>;
  if(mo) return<MatchOver result={mo} inn={inn} inn1={inn1} match={match} potm={potm} role={role} onRevert={revert} canRevert={!!preEnd} onNew={()=>{setMatch(null);setInn(null);setMO(null);setInn1(null);setPreEnd(null);setPotm(null);if(FB_OK&&DB)DB.ref("potm").remove().catch(()=>{});}}/>;

  const bLeft=inn.overs*6-inn.totalBalls;

  return(
    <div style={{background:"linear-gradient(165deg,#022c1e 0%,#0a2540 24%,#1c1150 52%,#2d0f5c 76%,#0a0414 100%)",minHeight:"100dvh"}}>

      {syncErr&&(
        <div style={{background:"rgba(239,68,68,.15)",borderBottom:"1px solid rgba(239,68,68,.5)",padding:"8px 14px",textAlign:"center"}}>
          <span style={{color:"#f87171",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>⚠️ Live sync blocked — publish Firebase rules (read/write: true). Scoring still works locally.</span>
        </div>
      )}

      {/* Compact score header — single page fit */}
      <div className="score-header">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:9,textTransform:"uppercase",letterSpacing:".2em"}}>{inn.inningsNum===1?"1st":"2nd"} Inn</span>
            <span style={{width:3,height:3,borderRadius:"50%",background:"#4338ca",display:"inline-block"}}/>
            <span style={{fontWeight:700,fontSize:13}}>{inn.battingTeam}</span>
            <span style={{color:"#4b5563",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>vs {inn.bowlingTeam}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <ManualFixButton inn={inn} rosterNames={rosterNames} onSave={({striker,nonStriker,bowler})=>fixPlayers({striker,nonStriker,bowler})}/>
            {role==="admin"&&<AdminActionsMenu
              onHistory={onHistory} onAnnounce={onAnnounce}
              inn={inn} onEditMatchSave={({overs,maxWkts})=>setInn(p=>({...p,overs,maxWkts}))}
              match={match} role={role}
              onUpdateTeams={(pubTeamA,pubTeamB)=>setMatch(m=>m?({...m,pubTeamA,pubTeamB}):m)}
            />}
            {onExit&&<button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← home</button>}
          </div>
        </div>
        {/* Score + stats all in one compact row */}
        <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap"}}>
          <span className={`score-big${flash?" flash":""}`}>{inn.totalRuns}<span className="score-wkt">/{inn.wickets}</span></span>
          <span style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>({ovStr(inn.totalBalls)} ov)</span>
          <span style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginLeft:4}}>CRR <span style={{color:"#fbbf24",fontWeight:600}}>{crr}</span></span>
          {inn.target&&<>
            <span style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>T:<span style={{color:"#fff",fontWeight:600}}>{inn.target}</span></span>
            <span style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>Need <span style={{color:"#fff",fontWeight:600}}>{Math.max(req,0)}</span>/<span style={{color:"#fff",fontWeight:600}}>{bLeft}b</span></span>
            {rrr&&<span style={{color:parseFloat(rrr)>12?"#f87171":"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>RRR <span style={{fontWeight:600,color:parseFloat(rrr)>12?"#f87171":"#fff"}}>{rrr}</span></span>}
          </>}
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs">
        {[["score","🏏 Live"],["batting","🟡 Batting"],["bowling","🎯 Bowling"]].map(([id,lbl])=>(
          <button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>

      <div className="content">
        {tab==="score"&&<ScoreTab inn={inn} SK={SK} NS={NS} BW={BW} record={record} rosterNames={rosterNames}
          match={match}
          pw={pw} nbn={nbn} setNBN={setNBN} confBatsman={confBatsman}
          nnb={nnb} nbwn={nbwn} setNBWN={setNBWN} confBowler={confBowler}
          pr={pr} onRetire={retire}
          onSwapStrike={()=>setInn(p=>(!p.single&&p.nonStrikerName)?swap(p):p)}
          onFixPlayers={fixPlayers}
          onEndInnings={manualEndInnings} onRevert={revert} canRevert={!!preEnd} role={role}
          onUndo={undo} canUndo={hist.length>0}/>}
        {tab==="batting"&&<BattingTab inn={inn}/>}
        {tab==="bowling"&&<BowlingTab inn={inn}/>}
      </div>
    </div>
  );
}

// ── Score Tab ─────────────────────────────────────────────────────────────────
// ── Free Hit sound — played when a No Ball is recorded ────────────────────────
// Uses a module-level AudioContext so it's accessible from anywhere.
let _fhCtx = null;
function playFreeHitSound(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return;
    if(!_fhCtx)_fhCtx=new Ctx();
    const ctx=_fhCtx;
    if(ctx.state==="suspended")ctx.resume();
    // Ascending G-B-D-G fanfare — distinctive, unmistakable
    [392,494,587,784].forEach((freq,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      const t=ctx.currentTime+i*0.13;
      osc.type="sine";osc.frequency.setValueAtTime(freq,t);
      gain.gain.setValueAtTime(0.0001,t);
      gain.gain.exponentialRampToValueAtTime(0.22,t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(t);osc.stop(t+0.32);
    });
  }catch(e){}
}

// ── QuickAddPlayer — adds a new club member to the roster mid-match ──────────
// Scorer/admin taps "+ Add to club", types a name, saves to Firebase.
// The real-time roster listener in App picks it up instantly — player appears
// in quick-tap buttons for the rest of the match.
function QuickAddPlayer({onAdded,onCancel}){
  const[name,setName]=React.useState("");
  const[saving,setSaving]=React.useState(false);
  const save=()=>{
    const nm=name.trim();if(!nm){alert("Enter a name.");return;}
    if(!FB_OK||!DB){alert("Can't add player — offline.");return;}
    setSaving(true);
    const id="p_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
    DB.ref("roster/"+id).set({name:nm,role:"All-rounder",keeper:false,bat:"Right",bowl:null})
      .then(()=>{ setSaving(false); onAdded(nm); })
      .catch(e=>{ setSaving(false); alert("Failed: "+e.message); });
  };
  return(
    <div style={{background:"rgba(16,185,129,.08)",border:"1.5px solid rgba(16,185,129,.35)",borderRadius:12,padding:"10px 12px",marginTop:8}}>
      <p style={{fontSize:10,color:"#34d399",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:8}}>➕ ADD NEW CLUB MEMBER</p>
      <div style={{display:"flex",gap:8}}>
        <input value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&save()}
          placeholder="Player name" autoFocus style={{flex:1,fontSize:13}}/>
        <button onClick={save} disabled={saving} style={{
          padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,
          background:"linear-gradient(135deg,#10b981,#059669)",color:"#111",whiteSpace:"nowrap",
          opacity:saving?.6:1
        }}>{saving?"Saving…":"Add ✓"}</button>
        <button onClick={onCancel} style={{padding:"8px 10px",borderRadius:10,border:"1px solid rgba(107,114,128,.3)",background:"transparent",color:"#6b7280",cursor:"pointer",fontSize:13}}>✕</button>
      </div>
      <p style={{fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",marginTop:6}}>Saved to club roster · they can add details later from Join the Club</p>
    </div>
  );
}

function ScoreTab({inn,SK,NS,BW,record,rosterNames,match,pw,nbn,setNBN,confBatsman,nnb,nbwn,setNBWN,confBowler,pr,onRetire,onSwapStrike,onFixPlayers,onEndInnings,onRevert,canRevert,role,onUndo,canUndo}){
  const[wt,setWT]=useState("Bowled");
  const[fielder,setFielder]=useState("");
  const[roRuns,setRoRuns]=useState(0);      // runs completed before the run-out happened
  const[roEnd,setRoEnd]=useState(null);     // "striker" | "nonStriker" — which end the dismissal occurred at
  const[showW,setSW]=useState(false);
  const[em,setEM]=useState(null);
  const[er,setER]=useState(0);
  const[showOT,setShowOT]=useState(false);
  const[otBase,setOTBase]=useState(0);
  const[otThrow,setOTThrow]=useState(1);
  const[showFH,setShowFH]=useState(false);
  const[isFreeHit,setIsFreeHit]=useState(false); // true on the delivery AFTER a No Ball
  const[quickAdd,setQuickAdd]=useState(null); // "bat" | "bowl" | null
  const dis=pw||nnb||pr;
  const retiredList=(inn.battingOrder||[]).filter(n=>inn.batsmen&&inn.batsmen[n]&&inn.batsmen[n].retired);

  const wlbl=(t,fielderName,runOutRuns,runOutEnd)=>{
    if(t==="Bowled")  return`b ${inn.bowlerName}`;
    if(t==="Caught"){
      const f=(fielderName||"").trim();
      // If no fielder name was given, or the scorer explicitly typed the bowler's own name,
      // it's genuinely a caught-and-bowled — otherwise credit the fielder who actually took the catch.
      if(!f || f.toLowerCase()===inn.bowlerName.toLowerCase()) return `c & b ${inn.bowlerName}`;
      return `c ${f} b ${inn.bowlerName}`;
    }
    if(t==="LBW")     return`lbw b ${inn.bowlerName}`;
    if(t==="Run Out"){
      const r=parseInt(runOutRuns)||0;
      const endLbl = runOutEnd==="nonStriker" ? `(non-striker's end)` : `(striker's end)`;
      return r>0 ? `run out ${endLbl} after ${r} run${r===1?"":"s"}` : `run out ${endLbl}`;
    }
    if(t==="Stumped") return`st b ${inn.bowlerName}`;
    return t;
  };
  const doW=()=>{
    if(wt==="Caught"&&!fielder.trim()){alert("Enter who took the catch (or the bowler's own name if it was caught & bowled).");return;}
    if(wt==="Run Out"&&!inn.single&&!roEnd){alert("Select which end the run-out happened at.");return;}
    const effectiveEnd = inn.single ? "striker" : roEnd; // single-batsman mode has only one end
    record({type:"W",extraRuns:0,dismissal:wlbl(wt,fielder,roRuns,effectiveEnd),dismissalType:wt,runOutRuns:roRuns,runOutEnd:effectiveEnd});
    setSW(false);setFielder("");setRoRuns(0);setRoEnd(null);
  };
  const doEx=()=>{
    if(em==="WD"){record({type:"WD",extraRuns:1+er});/* wide on free hit: free hit carries, don't clear */}
    else if(em==="NB"){
      record({type:"NB",extraRuns:1,batRuns:er});
      // Next delivery is a FREE HIT — play sound and show banner
      playFreeHitSound();
      setShowFH(true);
      setIsFreeHit(true); // arm free hit for next legal delivery
      setTimeout(()=>setShowFH(false),3500);
    }
    else if(em==="DECL"){record({type:"DECL",runs:er||1});setIsFreeHit(false);}
    else{record({type:em,extraRuns:er||1});setIsFreeHit(false);}
    setEM(null);setER(0);
  };
  const doOT=()=>{
    const isDeclOT=typeof otThrow==="string";
    const oRuns=isDeclOT?parseInt(otThrow[1]):otThrow;
    record({type:"OT",baseRuns:otBase,overthrowRuns:oRuns,isDeclOT});
    setIsFreeHit(false); // OT is a legal ball
    setShowOT(false);setOTBase(0);setOTThrow(1);
  };

  return(
    <div className="space-y-4">
      {(pw||pr)&&(
        <div className={pr?"alert-indigo":"alert-red"}>
          <p style={{color:pr?"#818cf8":"#f87171",fontFamily:"'JetBrains Mono',monospace",fontSize:11,textTransform:"uppercase",letterSpacing:".15em",marginBottom:8}}>{pr?"🔁 Retired — who's in next?":"⚡ Wicket! Who's next?"}</p>

          {/* Quick-tap: show ONLY batting team's players */}
          {(()=>{
            const dismissed=Object.entries(inn.batsmen||{}).filter(([,b])=>b.out).map(([n])=>n);
            const batting=new Set([SK,NS].filter(Boolean));
            const hasPubTeam=(match?.pubTeamA?.length>0||match?.pubTeamB?.length>0);
            const battingPub=hasPubTeam
              ?(inn.battingTeam===match?.teamA?match.pubTeamA:match.pubTeamB)||[]
              :null;

            if(battingPub&&battingPub.length>0){
              // TEAM MODE: only show this team's players
              const teamAvail=battingPub.filter(n=>!batting.has(n)&&!dismissed.includes(n));
              return(
                <div style={{marginBottom:10}}>
                  <p style={{fontSize:10,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>
                    🟡 {inn.battingTeam} squad:
                  </p>
                  {teamAvail.length===0
                    ?<p style={{fontSize:12,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>All squad members have batted</p>
                    :<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {teamAvail.map(n=>(
                        <button key={n} onClick={()=>confBatsman(n)} style={{
                          padding:"8px 14px",borderRadius:10,
                          border:"1.5px solid rgba(245,158,11,.5)",
                          background:"rgba(245,158,11,.12)",color:"#fbbf24",fontSize:13,
                          cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,
                          touchAction:"manipulation"
                        }}>{n}</button>
                      ))}
                    </div>
                  }
                </div>
              );
            }else{
              // FALLBACK: full roster when no pub team imported
              const avail=(rosterNames||[]).filter(n=>!batting.has(n)&&!dismissed.includes(n));
              return avail.length===0?null:(
                <div style={{marginBottom:10}}>
                  <p style={{fontSize:10,color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>Tap to bring in:</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {avail.map(n=>(
                      <button key={n} onClick={()=>confBatsman(n)} style={{
                        padding:"8px 14px",borderRadius:10,border:"1.5px solid rgba(99,102,241,.4)",
                        background:"rgba(99,102,241,.12)",color:"#a5b4fc",fontSize:13,cursor:"pointer",
                        fontFamily:"'Inter',sans-serif",fontWeight:600,touchAction:"manipulation"
                      }}>{n}</button>
                    ))}
                  </div>
                </div>
              );
            }
          })()}

          {/* Retired batters — return to crease */}
          {retiredList.length>0&&(
            <div style={{marginBottom:10}}>
              <p style={{fontSize:10,color:"#a78bfa",fontFamily:"'JetBrains Mono',monospace",marginBottom:5}}>Return retired:</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {retiredList.map(n=>(
                  <button key={n} onClick={()=>confBatsman(n)} style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid rgba(139,92,246,.5)",background:"rgba(139,92,246,.2)",color:"#c4b5fd",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>
                    {n} <span style={{color:"#7c6aa8",fontSize:10}}>({inn.batsmen[n].runs})</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Text input fallback — for players not in roster */}
          <div style={{display:"flex",gap:8}}>
            <input value={nbn} onChange={e=>setNBN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confBatsman()} placeholder="Or type a new name…" list="batlist" style={{flex:1,fontSize:13}}/>
            <datalist id="batlist">{[...new Set([...retiredList,...(rosterNames||[])])].map(n=><option key={n} value={n}/>)}</datalist>
            <button className="btn btn-primary" onClick={()=>confBatsman()} style={{padding:"10px 16px",whiteSpace:"nowrap"}}>In →</button>
          </div>

          {/* Quick-add new player to roster mid-match */}
          {quickAdd==="bat"
            ? <QuickAddPlayer onAdded={nm=>{setQuickAdd(null);confBatsman(nm);}} onCancel={()=>setQuickAdd(null)}/>
            : <button onClick={()=>setQuickAdd("bat")} style={{marginTop:8,width:"100%",padding:"7px",borderRadius:10,border:"1px dashed rgba(16,185,129,.4)",background:"transparent",color:"#34d399",cursor:"pointer",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>➕ Add new player to club</button>
          }
        </div>
      )}
      {nnb&&!pw&&(
        <div className="alert-indigo" style={{border:"2px solid #6366f1"}}>
          <p style={{color:"#a5b4fc",fontFamily:"'JetBrains Mono',monospace",fontSize:12,textTransform:"uppercase",letterSpacing:".12em",marginBottom:4,fontWeight:700}}>🎯 Over Complete!</p>
          <p style={{color:"#818cf8",fontSize:12,marginBottom:10}}>Who bowls next? <span style={{color:"#4338ca",fontSize:11}}>(not {inn.bowlerName})</span></p>

          {/* Quick-tap: show ONLY bowling team's players */}
          {(()=>{
            const bowled=new Set(inn.bowlingOrder||[]);
            const hasPubTeam=(match?.pubTeamA?.length>0||match?.pubTeamB?.length>0);
            const bowlingPub=hasPubTeam
              ?(inn.battingTeam===match?.teamA?match.pubTeamB:match.pubTeamA)||[]
              :null;
            const bowlingTeam=inn.battingTeam===match?.teamA?match?.teamB:match?.teamA;

            const BowlBtn=({n})=>{
              const b=inn.bowlers?.[n];
              const prev=bowled.has(n);
              return(
                <button key={n} onClick={()=>confBowler(n)} style={{
                  padding:"8px 14px",borderRadius:10,touchAction:"manipulation",
                  border:prev?"1.5px solid rgba(99,102,241,.4)":"1.5px solid rgba(52,211,153,.4)",
                  background:prev?"rgba(99,102,241,.12)":"rgba(52,211,153,.1)",
                  color:prev?"#a5b4fc":"#6ee7b7",fontSize:13,cursor:"pointer",
                  fontFamily:"'Inter',sans-serif",fontWeight:600
                }}>
                  {n}{prev&&b?<span style={{fontSize:10,opacity:.65,marginLeft:4}}>{b.overs}.{b.ballsThisOver}-{b.runs}-{b.wickets}</span>:""}
                </button>
              );
            };

            if(bowlingPub&&bowlingPub.length>0){
              // TEAM MODE: only show bowling team's players
              const fresh=bowlingPub.filter(n=>n!==inn.bowlerName&&!bowled.has(n));
              const prev=bowlingPub.filter(n=>n!==inn.bowlerName&&bowled.has(n));
              return(
                <div style={{marginBottom:10}}>
                  {fresh.length>0&&(
                    <>
                      <p style={{fontSize:10,color:"#6ee7b7",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>
                        ⚡ {bowlingTeam||"Bowling team"} — fresh:
                      </p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                        {fresh.map(n=><BowlBtn key={n} n={n}/>)}
                      </div>
                    </>
                  )}
                  {prev.length>0&&(
                    <>
                      <p style={{fontSize:10,color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>Bowled before:</p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {prev.map(n=><BowlBtn key={n} n={n}/>)}
                      </div>
                    </>
                  )}
                  {fresh.length===0&&prev.length===0&&(
                    <p style={{fontSize:12,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>No available bowlers from team</p>
                  )}
                </div>
              );
            }else{
              // FALLBACK: full roster
              const avail=(rosterNames||[]).filter(n=>n!==inn.bowlerName);
              const fresh=avail.filter(n=>!bowled.has(n));
              const prev=avail.filter(n=>bowled.has(n));
              return(
                <div style={{marginBottom:10}}>
                  {fresh.length>0&&<>
                    <p style={{fontSize:10,color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>New bowlers:</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                      {fresh.map(n=><BowlBtn key={n} n={n}/>)}
                    </div>
                  </>}
                  {prev.length>0&&<>
                    <p style={{fontSize:10,color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>Bowled before:</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {prev.map(n=><BowlBtn key={n} n={n}/>)}
                    </div>
                  </>}
                </div>
              );
            }
          })()}

          {/* Text input fallback */}
          <div style={{display:"flex",gap:8}}>
            <input value={nbwn} onChange={e=>setNBWN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confBowler()} placeholder="Or type a new name…" list="bowlerlist" style={{flex:1,fontSize:13}}/>
            <datalist id="bowlerlist">{(rosterNames||[]).map(n=><option key={n} value={n}/>)}</datalist>
            <button className="btn btn-primary" onClick={()=>confBowler()} style={{padding:"10px 18px",whiteSpace:"nowrap"}}>Bowl →</button>
          </div>

          {/* Quick-add new player mid-match */}
          {quickAdd==="bowl"
            ? <QuickAddPlayer onAdded={nm=>{setQuickAdd(null);confBowler(nm);}} onCancel={()=>setQuickAdd(null)}/>
            : <button onClick={()=>setQuickAdd("bowl")} style={{marginTop:8,width:"100%",padding:"7px",borderRadius:10,border:"1px dashed rgba(16,185,129,.4)",background:"transparent",color:"#34d399",cursor:"pointer",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>➕ Add new player to club</button>
          }
        </div>
      )}

      {/* Mini cards */}
      <div className="grid-2">
        <div className="mini-card" style={{padding:"10px 12px"}}>
          {/* Header row: title + quick-swap + edit */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <p className="section-title" style={{marginBottom:0}}>🟡 {inn.single?"Batsman":"Batting"}</p>
            {!inn.single&&NS&&(
              <div style={{display:"flex",gap:5}}>
                <button onClick={onSwapStrike} title="Swap strike — instant, no modal" style={{
                  padding:"3px 8px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700,
                  background:"rgba(99,102,241,.15)",border:"1px solid rgba(99,102,241,.4)",color:"#a5b4fc",
                  fontFamily:"'JetBrains Mono',monospace"
                }}>⇄</button>
                <EditPlayersButton inn={inn} rosterNames={rosterNames} onSwap={onSwapStrike} onSave={onFixPlayers}/>
              </div>
            )}
          </div>
          {(inn.single?[{p:SK,a:true}]:[{p:SK,a:true},{p:NS,a:false}]).map(({p,a},i)=>p?(
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"3px 0"}}>
              <span style={{fontSize:13,fontWeight:a?700:400,color:a?"#fff":"#9ca3af",display:"flex",alignItems:"center",gap:5,overflow:"hidden"}}>
                {a&&<span style={{color:"#fbbf24",fontSize:10}}>●</span>}
                <span className="truncate">{p.name}</span>
                {a&&<span style={{fontSize:9,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",background:"rgba(245,158,11,.15)",borderRadius:4,padding:"1px 4px",flexShrink:0}}>STRIKE</span>}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280",flexShrink:0,marginLeft:8}}>{p.runs} ({p.balls})</span>
            </div>
          ):null)}
          {retiredList.length>0&&<p style={{fontSize:9,color:"#7c6aa8",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{retiredList.length} retired</p>}
        </div>
        <div className="mini-card" style={{padding:"10px 12px"}}>
          <p className="section-title" style={{marginBottom:8}}>🎯 Bowling</p>
          {BW&&<div className="flex items-center justify-between">
            <span style={{fontSize:13,fontWeight:700,color:"#fff"}} className="truncate">{BW.name}</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280",flexShrink:0,marginLeft:8}}>{BW.overs}.{BW.ballsThisOver}-{BW.runs}-{BW.wickets}</span>
          </div>}
        </div>
      </div>

      {/* Over ticker */}
      <div>
        <div className="flex items-center justify-between mb-2">
          <p className="section-title" style={{marginBottom:0}}>Over {Math.floor(inn.totalBalls/6)+1}/{inn.overs} · <span style={{color:"#fbbf24"}}>{inn.totalBalls%6} of 6 balls</span>{(inn.overEvents||[]).filter(e=>e.type==="WD"||e.type==="NB").length>0&&<span style={{color:"#fb923c"}}> +{(inn.overEvents||[]).filter(e=>e.type==="WD"||e.type==="NB").length} extra</span>}</p>

        <div style={{background:"#130f3a",border:"1px solid #1e1b4b",borderRadius:16,padding:"12px 14px",display:"flex",flexWrap:"wrap",gap:8,minHeight:60}}>
          {(inn.overEvents||[]).length===0
            ?<span style={{color:"#2d2a6a",fontFamily:"'JetBrains Mono',monospace",fontSize:12,alignSelf:"center"}}>— new over —</span>
            :(inn.overEvents||[]).map((ev,i)=><div key={i} className={chipClass(ev)}>{chipLbl(ev)}</div>)
          }
        </div>
      </div>

      {/* Free Hit banner — appears for 3.5s after any No Ball */}
      {showFH&&(
        <div style={{
          position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-54%)",
          zIndex:999,textAlign:"center",pointerEvents:"none",
          animation:"bounceIn .35s ease both"
        }}>
          <div style={{
            background:"linear-gradient(135deg,#fbbf24,#f59e0b,#ef4444)",
            borderRadius:24,padding:"18px 32px",
            boxShadow:"0 0 0 4px rgba(251,191,36,.3),0 0 48px rgba(251,191,36,.6),0 8px 32px rgba(0,0,0,.6)"
          }}>
            <div style={{fontSize:10,color:"rgba(0,0,0,.55)",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,letterSpacing:".25em",marginBottom:4}}>NEXT BALL IS A</div>
            <div style={{fontSize:38,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:"#111",lineHeight:1}}>🟡 FREE HIT!</div>
            <div style={{fontSize:10,color:"rgba(0,0,0,.5)",fontFamily:"'JetBrains Mono',monospace",marginTop:5}}>only run out can dismiss the batter</div>
          </div>
        </div>
