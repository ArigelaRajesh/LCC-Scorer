// ── Player Tools — inline component now lives inside RosterPage Tools tab ────
function PlayerToolsInline({roster,history}){
  const[toolTab,setToolTab]=React.useState("merge");
  const entries=Object.entries(roster||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));

  function MergeTab(){
    const[primary,setPrimary]=React.useState("");
    const[dup,setDup]=React.useState("");
    const[saving,setSaving]=React.useState(false);
    // Names that show up in match history but never resolved to any roster profile — these are what
    // show as "unlinked" on the Stats > Players tab. They can't be picked in the dropdowns above
    // (those only list real roster profiles), so this is a separate, second flow: pick one of these
    // orphaned names, pick the roster profile it's actually the same person as, and link it as an
    // alias — same underlying mechanism as merging two profiles, just starting from a bare name
    // instead of a second profile.
    const orphanedNames=React.useMemo(()=>{
      const stats=computeCareerStats(history||{},roster||{});
      return stats.filter(s=>!s.pid).map(s=>s.name).sort((a,b)=>a.localeCompare(b));
    },[history,roster]);
    const[orphanName,setOrphanName]=React.useState("");
    const[linkTarget,setLinkTarget]=React.useState("");
    const[linking,setLinking]=React.useState(false);
    const doLink=()=>{
      if(!orphanName||!linkTarget){alert("Select both an unlinked name and a profile to link it to.");return;}
      if(!confirm(`Link "${orphanName}" to "${roster[linkTarget]?.name}"?\nPast matches recorded under "${orphanName}" will count toward this profile from now on.`))return;
      setLinking(true);
      const targetProfile=roster[linkTarget]||{};
      const mergedAliases=Array.from(new Set([
        ...(targetProfile.aliases||[]),
        orphanName,
      ].filter(Boolean).filter(n=>normName(n)!==normName(targetProfile.name||""))));
      DB.ref("roster/"+linkTarget+"/aliases").set(mergedAliases)
        .then(()=>{setLinking(false);setOrphanName("");setLinkTarget("");alert("Linked! Past matches under that name now count toward the chosen profile.");})
        .catch(e=>{setLinking(false);alert("Failed: "+e.message);});
    };
    const doMerge=()=>{
      if(!primary||!dup){alert("Select both profiles.");return;}
      if(primary===dup){alert("Can't merge a profile with itself.");return;}
      if(!confirm(`Merge "${roster[dup]?.name}" INTO "${roster[primary]?.name}"?\nThe duplicate profile will be removed.`))return;
      setSaving(true);
      // Preserve the duplicate's identity as an ALIAS on the surviving profile before removing it.
      // Historical matches store player names as plain strings (not roster ids), so simply deleting
      // the duplicate profile — without this — would leave every past match still recorded under
      // "Raj" resolving to nothing, splitting off into its own orphaned name-only stat line instead
      // of actually combining with "Rajesh Arigela" as the merge implies.
      const dupProfile=roster[dup]||{};
      const primaryProfile=roster[primary]||{};
      const mergedAliases=Array.from(new Set([
        ...(primaryProfile.aliases||[]),
        dupProfile.name,
        ...(dupProfile.aliases||[]),
      ].filter(Boolean).filter(n=>normName(n)!==normName(primaryProfile.name||""))));
      DB.ref("roster/"+primary+"/aliases").set(mergedAliases)
        .then(()=>DB.ref("roster/"+dup).remove())
        .then(()=>{setSaving(false);setPrimary("");setDup("");alert("Merged! Duplicate removed — its stats now combine under the kept profile.");})
        .catch(e=>{setSaving(false);alert("Failed: "+e.message);});
    };
    return(<div>
      <p style={{color:"#bcc7d8",fontSize:12,marginBottom:14,lineHeight:1.5}}>Pick the profile to KEEP as Primary, and the one to REMOVE as Duplicate (e.g. "Raj" vs "Rajesh").</p>
      <label>Primary profile (KEEP)</label>
      <select value={primary} onChange={e=>setPrimary(e.target.value)} style={{width:"100%",background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,marginBottom:12,outline:"none"}}>
        <option value="">Select profile to keep…</option>
        {entries.filter(([id])=>id!==dup).map(([id,p])=><option key={id} value={id}>{p.name}</option>)}
      </select>
      <label>Duplicate profile (REMOVE)</label>
      <select value={dup} onChange={e=>setDup(e.target.value)} style={{width:"100%",background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,marginBottom:16,outline:"none"}}>
        <option value="">Select duplicate to remove…</option>
        {entries.filter(([id])=>id!==primary).map(([id,p])=><option key={id} value={id}>{p.name}</option>)}
      </select>
      {primary&&dup&&primary!==dup&&(
        <div className="mini-card" style={{marginBottom:16,background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)"}}>
          <p style={{fontSize:12,color:"#f87171"}}>"<b>{roster[dup]?.name}</b>" will be permanently removed. Stats tracked under that name will now appear under "<b>{roster[primary]?.name}</b>".</p>
        </div>
      )}
      <button className="btn btn-danger w-full" onClick={doMerge} disabled={saving||!primary||!dup||primary===dup}>
        {saving?"Merging…":"🔀 Merge Profiles"}
      </button>

      {orphanedNames.length>0&&(<>
        <div style={{borderTop:"1px solid #1e1b4b",margin:"22px 0 16px"}}/>
        <p style={{fontWeight:700,fontSize:14,marginBottom:6}}>🔗 Link an Unlinked Name</p>
        <p style={{color:"#bcc7d8",fontSize:12,marginBottom:14,lineHeight:1.5}}>
          These names appeared in a match but were never added to the roster — they show as "unlinked" on the Stats page. Pick one and link it to the real profile it belongs to.
        </p>
        <label>Unlinked name</label>
        <select value={orphanName} onChange={e=>setOrphanName(e.target.value)} style={{width:"100%",background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,marginBottom:12,outline:"none"}}>
          <option value="">Select an unlinked name…</option>
          {orphanedNames.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        <label>Link to profile</label>
        <select value={linkTarget} onChange={e=>setLinkTarget(e.target.value)} style={{width:"100%",background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,marginBottom:16,outline:"none"}}>
          <option value="">Select the real profile…</option>
          {entries.map(([id,p])=><option key={id} value={id}>{p.name}</option>)}
        </select>
        <button className="btn btn-primary w-full" onClick={doLink} disabled={linking||!orphanName||!linkTarget}>
          {linking?"Linking…":"🔗 Link Name to Profile"}
        </button>
      </>)}
    </div>);
  }

  function BulkAddTab(){
    const[text,setText]=React.useState("");
    const[saving,setSaving]=React.useState(false);
    const doAdd=()=>{
      const names=text.split("\n").map(n=>n.trim()).filter(Boolean);
      if(!names.length){alert("Enter at least one name.");return;}
      if(!confirm(`Add ${names.length} player${names.length>1?"s":""}?\n${names.join("\n")}`))return;
      setSaving(true);
      const promises=names.map(nm=>{
        const id="p_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
        return DB.ref("roster/"+id).set({name:nm,role:"All-rounder",keeper:false,bat:"Right",bowl:null});
      });
      Promise.all(promises).then(()=>{setSaving(false);setText("");alert(`Added ${names.length} player${names.length>1?"s":""}!`);}).catch(e=>{setSaving(false);alert("Failed: "+e.message);});
    };
    return(<div>
      <p style={{color:"#bcc7d8",fontSize:12,marginBottom:12,lineHeight:1.5}}>Enter one player name per line. They'll all be added as All-rounders — players can edit their own details after.</p>
      <label>Player names (one per line)</label>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"Rajesh Arigela\nKiran Kumar\nPraveen Singh"} style={{width:"100%",minHeight:140,background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:13,outline:"none",resize:"vertical",marginBottom:12,fontFamily:"'Inter',sans-serif",boxSizing:"border-box"}}/>
      <button className="btn btn-primary w-full" onClick={doAdd} disabled={saving||!text.trim()}>
        {saving?"Adding…":"➕ Bulk Add Players"}
      </button>
    </div>);
  }

  function SquadsTab(){
    const[squads,setSquads]=React.useState(undefined);
    const[selectedTeam,setSelectedTeam]=React.useState("");
    const[newTeamName,setNewTeamName]=React.useState("");
    const[addPlayerName,setAddPlayerName]=React.useState("");
    React.useEffect(()=>{
      if(!FB_OK||!DB){setSquads({});return;}
      const ref=DB.ref("teamSquads");
      const cb=ref.on("value",s=>setSquads(s.val()||{}));
      return ()=>ref.off("value",cb);
    },[]);
    if(squads===undefined) return <p style={{color:"#9aa8bf",fontSize:13}}>Loading squads…</p>;
    const squadKey=(name)=>normName(formatTeamName(name)).replace(/[.#$\[\]\/]/g,"_");
    const teamKeys=Object.keys(squads).sort((a,b)=>(squads[a].name||"").localeCompare(squads[b].name||""));
    const rosterNames=Object.values(roster||{}).map(p=>p&&p.name).filter(Boolean).sort((a,b)=>a.localeCompare(b));

    const createSquad=()=>{
      const nm=newTeamName.trim();
      if(!nm){alert("Enter a team/captain name.");return;}
      const formatted=formatTeamName(nm);
      const key=squadKey(nm);
      if(squads[key]){alert(`"${formatted}" already has a saved squad.`);setSelectedTeam(key);setNewTeamName("");return;}
      DB.ref("teamSquads/"+key).set({name:formatted,players:[]})
        .then(()=>{setSelectedTeam(key);setNewTeamName("");})
        .catch(e=>alert("Failed: "+e.message));
    };
    const addPlayer=()=>{
      const nm=addPlayerName.trim();
      if(!nm||!selectedTeam)return;
      const cur=squads[selectedTeam]?.players||[];
      if(cur.some(p=>normName(p)===normName(nm))){alert(`${nm} is already in this squad.`);return;}
      DB.ref("teamSquads/"+selectedTeam+"/players").set([...cur,nm]).catch(e=>alert("Failed: "+e.message));
      setAddPlayerName("");
    };
    const removePlayer=(nm)=>{
      const cur=squads[selectedTeam]?.players||[];
      DB.ref("teamSquads/"+selectedTeam+"/players").set(cur.filter(p=>p!==nm)).catch(()=>{});
    };
    const deleteSquad=()=>{
      if(!confirm(`Delete the saved squad for "${squads[selectedTeam]?.name}"? Players already in past matches are unaffected — this only removes the pre-registered list for picking playing XIs.`))return;
      DB.ref("teamSquads/"+selectedTeam).remove().then(()=>setSelectedTeam(""));
    };

    return(<div>
      <p style={{color:"#bcc7d8",fontSize:12,marginBottom:14,lineHeight:1.5}}>
        Save each team's registered players once (~15-16 per team), then pick who's actually playing from that list every match — no retyping the same names each time.
      </p>
      <div style={{marginBottom:16}}>
        <select value={newTeamName&&!rosterNames.includes(newTeamName)?"__new__":newTeamName}
          onChange={e=>{const v=e.target.value; setNewTeamName(v==="__new__"?"":v);}}
          style={{width:"100%",fontSize:13,padding:"11px 10px",borderRadius:12,marginBottom:8}}>
          <option value="">— Select captain from roster —</option>
          {rosterNames.map(n=><option key={n} value={n}>{n}</option>)}
          <option value="__new__">＋ Type a new name…</option>
        </select>
        {(newTeamName===""||!rosterNames.includes(newTeamName))&&(
          <input value={newTeamName} onChange={e=>setNewTeamName(e.target.value)} placeholder="Type new captain/team name…" style={{width:"100%",fontSize:13,marginBottom:8}}/>
        )}
        <button className="btn btn-primary w-full" onClick={createSquad} style={{padding:"10px 16px"}}>+ Add Team</button>
      </div>
      {teamKeys.length===0?(
        <p style={{color:"#9aa8bf",fontSize:13,textAlign:"center",padding:"20px 0"}}>No team squads saved yet.</p>
      ):(<>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
          {teamKeys.map(k=>(
            <button key={k} onClick={()=>setSelectedTeam(k)} style={{
              padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:"none",
              background:selectedTeam===k?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(255,255,255,.07)",
              color:selectedTeam===k?"#fff":"#bcc7d8"
            }}>{squads[k].name} <span style={{opacity:.6}}>({(squads[k].players||[]).length})</span></button>
          ))}
        </div>
        {selectedTeam&&squads[selectedTeam]&&(
          <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(99,102,241,.2)",borderRadius:14,padding:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <p style={{fontWeight:700,fontSize:14}}>{squads[selectedTeam].name}</p>
              <button onClick={deleteSquad} style={{background:"none",border:"none",color:"#f87171",fontSize:11,cursor:"pointer"}}>🗑️ Delete squad</button>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",gap:8,marginBottom:(addPlayerName==="__new__"||(addPlayerName&&!rosterNames.includes(addPlayerName)))?6:0}}>
                <select value={addPlayerName&&!rosterNames.includes(addPlayerName)?"__new__":addPlayerName}
                  onChange={e=>{const v=e.target.value; setAddPlayerName(v==="__new__"?"":v);}}
                  style={{flex:1,fontSize:13,background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 8px",color:addPlayerName?"#fff":"#818cf8"}}>
                  <option value="">— Select from roster —</option>
                  {rosterNames.filter(n=>!(squads[selectedTeam].players||[]).some(p=>normName(p)===normName(n))).map(n=><option key={n} value={n}>{n}</option>)}
                  <option value="__new__">＋ Type a new name…</option>
                </select>
                <button className="btn" onClick={addPlayer} style={{padding:"10px 14px"}}>+</button>
              </div>
              {(addPlayerName===""||!rosterNames.includes(addPlayerName))&&(
                <input value={addPlayerName} onChange={e=>setAddPlayerName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPlayer()}
                  placeholder="Type new player's name…" style={{width:"100%",fontSize:13}}/>
              )}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {(squads[selectedTeam].players||[]).length===0&&<p style={{color:"#9aa8bf",fontSize:12}}>No players added yet.</p>}
              {(squads[selectedTeam].players||[]).map(n=>(
                <div key={n} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"rgba(255,255,255,.03)",borderRadius:9}}>
                  <span style={{fontSize:13}}>{n}</span>
                  <button onClick={()=>removePlayer(n)} style={{background:"none",border:"none",color:"#9aa8bf",fontSize:14,cursor:"pointer"}}>✕</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </>)}
    </div>);
  }

  return(
    <div>
      <div className="tabs" style={{marginBottom:16,gridTemplateColumns:"1fr 1fr 1fr"}}>
        <button className={`tab${toolTab==="merge"?" active":""}`} onClick={()=>setToolTab("merge")}>🔀 Merge</button>
        <button className={`tab${toolTab==="squads"?" active":""}`} onClick={()=>setToolTab("squads")}>🏏 Squads</button>
        <button className={`tab${toolTab==="bulk"?" active":""}`} onClick={()=>setToolTab("bulk")}>➕ Bulk Add</button>
      </div>
      <div className="mini-card">
        {toolTab==="merge"&&<MergeTab/>}
        {toolTab==="squads"&&<SquadsTab/>}
        {toolTab==="bulk"&&<BulkAddTab/>}
      </div>
    </div>
  );
}

// ── Admin-only: set or change the one shared club passphrase ──────────────────
// Replaces the old per-person PIN system — instead of every player remembering their
// own 4-digit code, the whole club shares ONE passphrase (separate from the admin PIN,
// which stays private). Anyone editing the roster or voting on someone's behalf needs to
// know this phrase once per device — proves "this is someone actually in the club" without
// the friction of managing dozens of individual PINs.
function ClubPassphraseAdmin({current}){
  const[open,setOpen]=React.useState(false);
  const[val,setVal]=React.useState(current||"");
  const save=()=>{
    const v=val.trim();
    if(!v){alert("Enter a passphrase.");return;}
    if(!FB_OK||!DB){alert("Offline — can't save right now.");return;}
    DB.ref("clubPassphrase").set(v).then(()=>{alert("Club passphrase saved! Share it with the group.");setOpen(false);}).catch(e=>alert("Failed: "+e.message));
  };
  return(
    <div className="mini-card" style={{marginBottom:16,border:"1px solid rgba(245,158,11,.3)"}}>
      <div className="flex items-center justify-between">
        <div>
          <p className="section-title" style={{marginBottom:2}}>🔑 Club Passphrase</p>
          <p style={{fontSize:12,color:"#bcc7d8"}}>{current?`Currently set: "${current}"`:"Not set yet — anyone can edit/vote freely until you set one."}</p>
        </div>
        <button onClick={()=>{setVal(current||"");setOpen(!open);}} style={{background:"rgba(245,158,11,.12)",border:"1px solid rgba(245,158,11,.35)",color:"#fbbf24",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{current?"Change":"Set"}</button>
      </div>
      {open&&(
        <div style={{marginTop:12}}>
          <input value={val} onChange={e=>setVal(e.target.value)} placeholder="e.g. LCC2026" style={{marginBottom:10}}/>
          <button className="btn btn-primary w-full" onClick={save}>Save Passphrase</button>
        </div>
      )}
    </div>
  );
}

// ── Grouped vote results — who said Yes/No/+1, scannable at a glance ────────
function PollResultsList({poll}){
  const[roster,setRoster]=React.useState({});
  const[votes,setVotes]=React.useState({});
  React.useEffect(()=>{
    if(!FB_OK||!DB)return;
    const rRef=DB.ref("roster"), vRef=DB.ref("poll/votes");
    const cb1=rRef.on("value",s=>setRoster(s.val()||{}));
    const cb2=vRef.on("value",s=>setVotes(s.val()||{}));
    return ()=>{ rRef.off("value",cb1); vRef.off("value",cb2); };
  },[]);
  const byChoice=(choice)=>Object.entries(votes||{})
    .filter(([,v])=>v?.choice===choice)
    .map(([id])=>roster?.[id]?.name||"(removed player)")
    .sort((a,b)=>a.localeCompare(b));
  const plus1List=Object.entries(votes||{})
    .filter(([,v])=>v?.plus1)
    .map(([id,v])=>`${roster?.[id]?.name||"(removed player)"} → ${v.kidName||"unnamed"}`)
    .sort((a,b)=>a.localeCompare(b));
  const yes=byChoice("yes"), no=byChoice("no");
  const Group=({emoji,label,color,names})=>(
    <div className="mini-card" style={{marginBottom:10}}>
      <p style={{color,fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,marginBottom:names.length?8:0}}>{emoji} {label} ({names.length})</p>
      {names.length===0
        ? <p style={{color:"#8291ab",fontSize:12}}>No one yet</p>
        : names.map(n=><div key={n} style={{fontSize:13,padding:"3px 0",color:"#d1d5db"}}>{n}</div>)}
    </div>
  );
  return(
    <div style={{marginTop:20}}>
      <p className="section-title">Responses</p>
      <Group emoji="✅" label="Yes" color="#34d399" names={yes}/>
      <Group emoji="❌" label="No" color="#f87171" names={no}/>
      <Group emoji="➕" label="Bringing a kid" color="#fbbf24" names={plus1List}/>
    </div>
  );
}

// ── Roster management (admin only) ─────────────────────────────────────────
function PollRosterTab({roster,canDelete}){
  const[name,setName]=React.useState("");
  const[prole,setProle]=React.useState("Batsman");
  const[keeper,setKeeper]=React.useState(false);
  const[bat,setBat]=React.useState("Right");
  const[bowl,setBowl]=React.useState("Seam");
  const[editingId,setEditingId]=React.useState(null);
  const[nameError,setNameError]=React.useState("");
  const[welcome,setWelcome]=React.useState(""); // shows a welcome toast after a new player joins

  const needsBowlStyle=prole==="Bowler"||prole==="All-rounder";
  const resetForm=()=>{setName("");setProle("Batsman");setKeeper(false);setBat("Right");setBowl("Seam");setEditingId(null);setNameError("");};

  const save=()=>{
    const nm=name.trim().replace(/\s+/g," "); // collapse multiple spaces
    if(!nm){setNameError("Please enter your name.");return;}
    // Must be at least 2 words (first + last name)
    if(nm.split(" ").length<2){setNameError("Please enter your full name — first and last name.");return;}
    // Reject duplicate names (case-insensitive), unless editing that same entry
    const dup=Object.entries(roster||{}).find(([id,p])=>
      id!==editingId && (p.name||"").trim().toLowerCase()===nm.toLowerCase());
    if(dup){setNameError(`"${nm}" is already in the club list. If that's not you, add a middle name or initial to tell them apart.`);return;}
    if(!FB_OK||!DB){setNameError("Offline — can't save right now.");return;}
    const isNew=!editingId;
    const firstName=nm.split(" ")[0];
    const id=editingId||("p_"+Math.random().toString(36).slice(2)+Date.now().toString(36));
    const data={name:nm,role:prole,keeper,bat,bowl:needsBowlStyle?bowl:null};
    DB.ref("roster/"+id).set(JSON.parse(JSON.stringify(data))).then(()=>{
      resetForm();
      setWelcome(isNew?`🎉 Welcome to the club, ${firstName}! Your stats start tracking from your next match.`:`✓ Updated — see you out there, ${firstName}!`);
      window.scrollTo({top:0,behavior:"smooth"});
      setTimeout(()=>setWelcome(""),6000);
    }).catch(e=>setNameError("Save failed: "+e.message));
  };
  const doEdit=(id,p)=>{
    setEditingId(id);setName(p.name);setProle(p.role);setKeeper(!!p.keeper);setBat(p.bat||"Right");setBowl(p.bowl||"Seam");setNameError("");
    window.scrollTo({top:0,behavior:"smooth"});
  };
  const doDelete=(id)=>{
    if(!confirm("Remove this player from the club list?"))return;
    DB.ref("roster/"+id).remove();
  };

  const entries=Object.entries(roster||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));

  return(
    <div>
      {welcome&&(
        <div style={{
          marginBottom:14,padding:"14px 16px",borderRadius:14,
          background:"linear-gradient(135deg,rgba(52,211,153,.18),rgba(16,185,129,.1))",
          border:"1.5px solid rgba(52,211,153,.5)",
          color:"#6ee7b7",fontSize:14,fontWeight:600,fontFamily:"'Inter',sans-serif",
          textAlign:"center",lineHeight:1.45,animation:"fadeUp .3s ease both"
        }}>{welcome}</div>
      )}
      <div className="mini-card" style={{marginBottom:16}}>
        <p className="section-title">{editingId?"✏️ Edit Your Details":"➕ Add Yourself"}</p>
        <label>Full name</label>
        <input value={name} onChange={e=>{setName(e.target.value);if(nameError)setNameError("");}} placeholder="e.g. Rajesh Arigela" style={{marginBottom:nameError?4:4,borderColor:nameError?"rgba(239,68,68,.6)":undefined}}/>
        {nameError
          ? <p style={{fontSize:11,color:"#f87171",fontFamily:"'Inter',sans-serif",marginBottom:12,lineHeight:1.4}}>⚠️ {nameError}</p>
          : <p style={{fontSize:10,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",marginBottom:12,lineHeight:1.4}}>💡 Enter your full name (first & last) — used to track your stats across matches.</p>
        }
        <label>Role</label>
        <div className="grid-3" style={{marginBottom:12}}>
          {["Batsman","Bowler","All-rounder"].map(r=>(
            <button key={r} onClick={()=>setProle(r)} style={{padding:"9px 4px",borderRadius:10,border:`1.5px solid ${prole===r?"transparent":"#526480"}`,background:prole===r?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:prole===r?"#111":"#bcc7d8",cursor:"pointer",fontWeight:600,fontSize:11,fontFamily:"'Inter',sans-serif"}}>{r}</button>
          ))}
        </div>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:12,textTransform:"none",letterSpacing:0,fontFamily:"'Inter',sans-serif",fontSize:13,color:"#d1d5db"}}>
          <input type="checkbox" checked={keeper} onChange={e=>setKeeper(e.target.checked)} style={{width:"auto",margin:0}}/>
          🧤 Also keeps wicket
        </label>
        <label>Batting style</label>
        <div className="grid-2" style={{marginBottom:12}}>
          <button onClick={()=>setBat("Left")} style={{padding:"9px 4px",borderRadius:10,border:`1.5px solid ${bat==="Left"?"transparent":"#526480"}`,background:bat==="Left"?"linear-gradient(135deg,#8b5cf6,#6366f1)":"transparent",color:bat==="Left"?"#fff":"#bcc7d8",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>Left-handed</button>
          <button onClick={()=>setBat("Right")} style={{padding:"9px 4px",borderRadius:10,border:`1.5px solid ${bat==="Right"?"transparent":"#526480"}`,background:bat==="Right"?"linear-gradient(135deg,#8b5cf6,#6366f1)":"transparent",color:bat==="Right"?"#fff":"#bcc7d8",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>Right-handed</button>
        </div>
        {needsBowlStyle&&(<>
          <label>Bowling style</label>
          <div className="grid-2" style={{marginBottom:12}}>
            <button onClick={()=>setBowl("Spin")} style={{padding:"9px 4px",borderRadius:10,border:`1.5px solid ${bowl==="Spin"?"transparent":"#526480"}`,background:bowl==="Spin"?"linear-gradient(135deg,#34d399,#10b981)":"transparent",color:bowl==="Spin"?"#111":"#bcc7d8",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>Spin</button>
            <button onClick={()=>setBowl("Seam")} style={{padding:"9px 4px",borderRadius:10,border:`1.5px solid ${bowl==="Seam"?"transparent":"#526480"}`,background:bowl==="Seam"?"linear-gradient(135deg,#34d399,#10b981)":"transparent",color:bowl==="Seam"?"#111":"#bcc7d8",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>Seam</button>
          </div>
        </>)}
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={save}>{editingId?"Save Changes":"➕ Add Me"}</button>
          {editingId&&<button className="btn" onClick={resetForm} style={{background:"transparent",border:"1px solid #526480",color:"#bcc7d8"}}>Cancel</button>}
        </div>
      </div>

      <p className="section-title">Who's in ({entries.length})</p>
      {entries.length===0&&<p style={{color:"#9aa8bf",fontSize:13,textAlign:"center",padding:"20px 0"}}>No one's added themselves yet — be the first!</p>}
      {entries.map(([id,p])=>(
        <div key={id} className="mini-card" style={{marginBottom:8,display:"flex",alignItems:"center",gap:10,justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
            <PlayerAvatar name={p.name} avatar={p.avatar} size={40}/>
            <div style={{minWidth:0}}>
              <div style={{fontWeight:600,fontSize:14}}>{p.name} {p.keeper&&<span title="Wicketkeeper">🧤</span>}</div>
              <div style={{fontSize:11,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>
                {p.role==="Batsman"?"🏏":p.role==="Bowler"?"🎯":"⭐"} {p.role} · {p.bat==="Left"?"LH":"RH"}{p.bowl?` · ${p.bowl}`:""}
              </div>
              {p.aliases&&p.aliases.length>0&&
                <div style={{fontSize:10,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",marginTop:2}} title="Past matches recorded under these names are counted as this profile">also: {p.aliases.join(", ")}</div>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={()=>doEdit(id,p)} style={{background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.3)",color:"#a5b4fc",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>✏️</button>
            {canDelete&&<button onClick={()=>doDelete(id)} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.3)",color:"#f87171",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>🗑️</button>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Create / update the active poll (venue + date + time picker, no manual typing) ──
function PollCreateForm({poll}){
  const[venue,setVenue]=React.useState(poll?.venue||"Lakes High School");
  const[customVenue,setCustomVenue]=React.useState(poll&&!["Lakes High School","Millennium Park"].includes(poll.venue)?poll.venue:"");
  const[isCustom,setIsCustom]=React.useState(poll&&!["Lakes High School","Millennium Park"].includes(poll.venue));
  const[date,setDate]=React.useState(poll?.date||"");
  const[time,setTime]=React.useState(poll?.time||"10:00");

  const create=()=>{
    const v=isCustom?customVenue.trim():venue;
    if(!v){alert("Enter a venue name.");return;}
    if(!date){alert("Pick a date.");return;}
    if(!FB_OK||!DB){alert("Offline — can't publish right now.");return;}
    const data={venue:v,date,time,createdAt:Date.now()};
    // Starting a new poll clears old votes/teams so this week starts fresh
    DB.ref("poll").set({current:data}).then(()=>alert("Poll published! Share the Weekend Poll link with the group.")).catch(e=>alert("Failed: "+e.message));
  };
  const closePoll=()=>{
    if(!confirm("Close this week's poll? Votes and team selections will be cleared."))return;
    DB.ref("poll").remove();
  };

  return(
    <div className="mini-card">
      <p className="section-title">{poll?"📋 Update This Week's Poll":"📋 Create This Week's Poll"}</p>
      <label>Venue</label>
      <div className="grid-2" style={{marginBottom:isCustom?8:12}}>
        <button onClick={()=>{setIsCustom(false);setVenue("Lakes High School")}} style={{padding:"10px 4px",borderRadius:10,border:`1.5px solid ${!isCustom&&venue==="Lakes High School"?"transparent":"#526480"}`,background:!isCustom&&venue==="Lakes High School"?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:!isCustom&&venue==="Lakes High School"?"#111":"#bcc7d8",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>🎾 Lakes High School</button>
        <button onClick={()=>{setIsCustom(false);setVenue("Millennium Park")}} style={{padding:"10px 4px",borderRadius:10,border:`1.5px solid ${!isCustom&&venue==="Millennium Park"?"transparent":"#526480"}`,background:!isCustom&&venue==="Millennium Park"?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:!isCustom&&venue==="Millennium Park"?"#111":"#bcc7d8",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>🏟️ Millennium Park</button>
      </div>
      <button onClick={()=>setIsCustom(true)} style={{width:"100%",padding:"9px",borderRadius:10,border:`1.5px dashed ${isCustom?"#f59e0b":"#526480"}`,background:isCustom?"rgba(245,158,11,.1)":"transparent",color:isCustom?"#fbbf24":"#9aa8bf",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif",marginBottom:isCustom?8:12}}>📍✨ Other venue</button>
      {isCustom&&<input value={customVenue} onChange={e=>setCustomVenue(e.target.value)} placeholder="Ground name" style={{marginBottom:12}}/>}
      <label>Date</label>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{marginBottom:12}}/>
      <label>Time</label>

    </div>

// ── Reusable share button: native share sheet (mobile) with a copy-to-clipboard fallback ──
function ShareButton({label,buildText}){
  const[copied,setCopied]=React.useState(false);
  const doShare=async()=>{
    const text=buildText();
    if(navigator.share){
      try{ await navigator.share({text}); return; }catch(e){ /* user cancelled or share failed — fall through to copy */ }
    }
    try{
      await navigator.clipboard.writeText(text);
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    }catch(e){
      alert(text); // last-resort fallback so the content is at least visible to copy manually
    }
  };
  return(
    <button onClick={doShare} style={{background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.35)",color:"#6ee7b7",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Inter',sans-serif",borderRadius:10,padding:"8px 16px"}}>
      {copied?"✓ Copied!":label}
    </button>
  );
}

// ── Public voting tab — tap your name, pick Yes/No/+1, one vote per device ──
function PollVoteTab({roster,poll,votes,passphrase,role}){
  const[myVote,setMyVote]=React.useState(()=>{try{return localStorage.getItem("lcc_poll_voted_as")||null;}catch(e){return null;}});
  const[kidDraft,setKidDraft]=React.useState({});
  const[deviceUnlocked,setDeviceUnlocked]=React.useState(()=>{
    try{return localStorage.getItem("lcc_club_unlocked")===passphrase&&!!passphrase;}catch(e){return false;}
  });
  const[passModal,setPassModal]=React.useState(null);
  const[passTry,setPassTry]=React.useState("");
  const[passErr,setPassErr]=React.useState("");
  const[plus1Open,setPlus1Open]=React.useState(null);

  // Helper: normalize old {plus1,kidName} OR new {kids:[]} format
  const getKids=(v)=>{
    if(Array.isArray(v?.kids)) return v.kids;
    if(v?.plus1&&v?.kidName) return [v.kidName];
    return [];
  };

  if(!poll) return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:40,marginBottom:10}}>📋</div>
      <p style={{fontWeight:600,marginBottom:4}}>No poll open right now</p>
      <p style={{color:"#9aa8bf",fontSize:13}}>Ask the admin to publish this week's match poll.</p>
    </div>
  );

  const entries=Object.entries(roster||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));
  const totalKids=Object.values(votes||{}).reduce((s,v)=>s+getKids(v).length,0);
  const counts={yes:0,no:0,kids:totalKids};
  Object.values(votes||{}).forEach(v=>{if(v?.choice==="yes")counts.yes++;if(v?.choice==="no")counts.no++;});

  const withClubAuth=(action)=>{
    if(!passphrase||deviceUnlocked){action();return;}
    setPassModal({pendingAction:action});setPassTry("");setPassErr("");
  };
  const confirmPass=()=>{
    if(passTry.trim()!==passphrase){setPassErr("Wrong passphrase — ask admin if you don't have it.");return;}
    try{localStorage.setItem("lcc_club_unlocked",passphrase);}catch(e){}
    setDeviceUnlocked(true);passModal.pendingAction();setPassModal(null);
  };

  const setChoice=(id,choice)=>withClubAuth(()=>{
    if(!FB_OK||!DB)return;
    const existing=votes?.[id]||{};
    const next=existing.choice===choice?null:choice;
    DB.ref("poll/votes/"+id).set(JSON.parse(JSON.stringify({...existing,choice:next})));
    try{localStorage.setItem("lcc_poll_voted_as",id);}catch(e){}
    setMyVote(id);
  });

  const addKid=(id)=>withClubAuth(()=>{
    const nm=(kidDraft[id]||"").trim();
    if(!nm){alert("Enter the kid's name first.");return;}
    if(!FB_OK||!DB)return;
    const existing=votes?.[id]||{};
    const current=getKids(existing);
    DB.ref("poll/votes/"+id).set(JSON.parse(JSON.stringify({...existing,kids:[...current,nm]})));
    setKidDraft(d=>({...d,[id]:""}));
    setPlus1Open(null);
  });

  const removeKid=(id,kidName)=>withClubAuth(()=>{
    if(!FB_OK||!DB)return;
    const existing=votes?.[id]||{};
    const current=getKids(existing).filter(k=>k!==kidName);
    DB.ref("poll/votes/"+id).set(JSON.parse(JSON.stringify({...existing,kids:current})));
  });

  return(
    <div>
      <div className="mini-card" style={{marginBottom:14,textAlign:"center"}}>
        <p style={{color:"#fbbf24",fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,marginBottom:4}}>{poll.venue}</p>
        <p style={{color:"#a5b4fc",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>{new Date(poll.date+"T"+poll.time).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})} · {poll.time}</p>
        <div style={{display:"flex",justifyContent:"center",gap:18,marginTop:10,marginBottom:12}}>
          <span style={{color:"#34d399",fontSize:13,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>✅ {counts.yes} Yes</span>
          <span style={{color:"#f87171",fontSize:13,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>❌ {counts.no} No</span>
          <span style={{color:"#fbbf24",fontSize:13,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>👶 {counts.kids} Kids</span>
        </div>
        <ShareButton label="📤 Share Poll" buildText={()=>{
          const yesNames=Object.entries(votes||{}).filter(([,v])=>v?.choice==="yes").map(([id])=>roster?.[id]?.name).filter(Boolean).sort();
          const noNames=Object.entries(votes||{}).filter(([,v])=>v?.choice==="no").map(([id])=>roster?.[id]?.name).filter(Boolean).sort();
          const kidLines=Object.entries(votes||{}).flatMap(([id,v])=>
            getKids(v).map(k=>`${roster?.[id]?.name||"?"} → ${k}`)
          ).sort();
          const dateStr=new Date(poll.date+"T"+poll.time).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
          let txt=`🏏 LCC Weekend Match\n📍 ${poll.venue}\n📅 ${dateStr} · ${poll.time}\n\n✅ Yes (${yesNames.length}): ${yesNames.join(", ")||"—"}\n❌ No (${noNames.length}): ${noNames.join(", ")||"—"}`;
          if(kidLines.length) txt+=`\n👶 Bringing kids:\n${kidLines.map(l=>"  • "+l).join("\n")}`;
          return txt;
        }}/>
      </div>

      <p className="section-title">Tap your name to vote</p>
      {entries.length===0&&<p style={{color:"#9aa8bf",fontSize:13,textAlign:"center",padding:"20px 0"}}>No players in the roster yet — ask admin to add the team.</p>}
      {entries.map(([id,p])=>{
        const v=votes?.[id]||{};
        const isMe=myVote===id;
        const hasVoted=v.choice==="yes"||v.choice==="no";
        const showKidInput=plus1Open===id;
        const kids=getKids(v);
        return(
          <div key={id} className="mini-card" style={{marginBottom:6,padding:"10px 12px",border:isMe?"1.5px solid rgba(245,158,11,.5)":"1px solid #3730a3"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
              <span style={{fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:8,overflow:"hidden"}}>
                <PlayerAvatar name={p.name} avatar={p.avatar} size={32}/>
                <span style={{overflow:"hidden"}}>
                  <span style={{display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
                  <span style={{display:"flex",alignItems:"center",gap:4}}>
                    {p.keeper&&<span style={{fontSize:10}}>🧤</span>}
                    {isMe&&<span style={{color:"#fbbf24",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}>(you)</span>}
                  </span>
                </span>
              </span>
              <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                {hasVoted?(
                  <button onClick={()=>setChoice(id,v.choice)} style={{padding:"4px 10px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:700,fontSize:11,
                    background:v.choice==="yes"?"linear-gradient(135deg,#34d399,#10b981)":"linear-gradient(135deg,#dc2626,#991b1b)",
                    color:v.choice==="yes"?"#111":"#fff"}}>{v.choice==="yes"?"✅ Yes":"❌ No"} ✕</button>
                ):(
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>setChoice(id,"yes")} style={{width:32,height:32,borderRadius:"50%",border:"1.5px solid rgba(52,211,153,.4)",background:"rgba(52,211,153,.1)",color:"#34d399",cursor:"pointer",fontSize:15}}>✅</button>
                    <button onClick={()=>setChoice(id,"no")} style={{width:32,height:32,borderRadius:"50%",border:"1.5px solid rgba(239,68,68,.4)",background:"rgba(239,68,68,.1)",color:"#f87171",cursor:"pointer",fontSize:15}}>❌</button>
                  </div>
                )}
                {/* ➕ Add kid button */}
                <button onClick={()=>setPlus1Open(plus1Open===id?null:id)}
                  style={{width:32,height:32,borderRadius:"50%",
                  border:`1.5px solid ${kids.length>0?"transparent":"rgba(245,158,11,.4)"}`,
                  background:kids.length>0?"linear-gradient(135deg,#f59e0b,#d97706)":"rgba(245,158,11,.1)",
                  color:kids.length>0?"#111":"#fbbf24",cursor:"pointer",fontSize:kids.length>0?11:15,
                  fontWeight:700}}
                  title={kids.length>0?`${kids.length} kid${kids.length>1?"s":""} — tap to manage`:"Bringing kids?"}>
                  {kids.length>0?kids.length:"➕"}
                </button>
              </div>
            </div>

            {/* Kids chips — always shown if any */}
            {kids.length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                {kids.map((k,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:5,
                    background:"rgba(245,158,11,.12)",border:"1px solid rgba(245,158,11,.3)",
                    borderRadius:20,padding:"3px 10px"}}>
                    <span style={{fontSize:11,color:"#fbbf24"}}>👶 {k}</span>
                    <button onClick={()=>removeKid(id,k)} style={{background:"none",border:"none",
                      color:"#9aa8bf",cursor:"pointer",fontSize:13,lineHeight:1,padding:0}}>×</button>
                  </div>
                ))}
              </div>
            )}

            {/* Add kid input */}
            {showKidInput&&(
              <div style={{display:"flex",gap:6,marginTop:8}}>
                <input value={kidDraft[id]||""} onChange={e=>setKidDraft(d=>({...d,[id]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&addKid(id)}
                  placeholder="Kid's name" autoFocus style={{flex:1,fontSize:12,padding:"7px 10px"}}/>
                <button onClick={()=>addKid(id)} style={{padding:"7px 12px",borderRadius:10,
                  border:"1.5px solid rgba(245,158,11,.4)",background:"transparent",
                  color:"#fbbf24",cursor:"pointer",fontWeight:700,fontSize:12}}>Add</button>
                <button onClick={()=>setPlus1Open(null)} style={{padding:"7px",borderRadius:10,
                  border:"none",background:"rgba(107,114,128,.15)",color:"#9aa8bf",cursor:"pointer",fontSize:13}}>✕</button>
              </div>
            )}
          </div>
        );
      })}
      {passphrase&&<p style={{color:"#4338ca",fontSize:11,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",marginTop:14}}>Club passphrase required once per device.</p>}

      {passModal&&(
        <Modal onClose={()=>setPassModal(null)} title="🔑 Club Passphrase">
          <p style={{color:"#bcc7d8",fontSize:12,marginBottom:14}}>Enter the shared club passphrase to vote. Only needed once on this device.</p>
          <input value={passTry} onChange={e=>{setPassTry(e.target.value);setPassErr("");}} placeholder="Passphrase" autoFocus onKeyDown={e=>e.key==="Enter"&&confirmPass()} style={{marginBottom:8}}/>
          {passErr&&<p style={{color:"#f87171",fontSize:12,marginBottom:10}}>{passErr}</p>}
          <button className="btn btn-primary w-full" onClick={confirmPass}>Confirm</button>
        </Modal>
      )}
    </div>
  );
}
function PollTeamsTab({roster,poll,votes,teams,role}){
  const[showBuilder,setShowBuilder]=React.useState(false);
  const[capA,setCapA]=React.useState(teams?.captainA||"");
  const[capB,setCapB]=React.useState(teams?.captainB||"");
  const[teamA,setTeamA]=React.useState(teams?.teamA||[]);
  const[teamB,setTeamB]=React.useState(teams?.teamB||[]);
  const isAdmin=role==="admin";

  React.useEffect(()=>{
    setCapA(teams?.captainA||"");setCapB(teams?.captainB||"");
    setTeamA(teams?.teamA||[]);setTeamB(teams?.teamB||[]);
  },[teams]);

  const nameOf=(id)=>roster?.[id]?.name||"(removed)";
  const publish=()=>{
    if(!capA.trim()||!capB.trim()){alert("Enter both captains' names.");return;}
    if(teamA.length===0||teamB.length===0){alert("Both teams need at least one player.");return;}
    if(!FB_OK||!DB){alert("Offline.");return;}
    const payload={captainA:capA.trim(),captainB:capB.trim(),teamA,teamB,published:true,publishedAt:Date.now()};
    DB.ref("poll/teams").set(payload)
      .then(()=>{
        // Also save to publishedTeams history so admin can reuse for multiple matches
        DB.ref("publishedTeams").push(payload).catch(()=>{});
        alert("Teams published!");setShowBuilder(false);
      })
      .catch(e=>alert("Failed: "+e.message));
  };
  const moveTo=(id,team)=>{
    setTeamA(a=>a.filter(x=>x!==id));setTeamB(b=>b.filter(x=>x!==id));
    if(team==="A")setTeamA(a=>[...a,id]);
    if(team==="B")setTeamB(b=>[...b,id]);
  };
  const remove=(id)=>{setTeamA(a=>a.filter(x=>x!==id));setTeamB(b=>b.filter(x=>x!==id));};
  const yesIds=Object.entries(votes||{}).filter(([,v])=>v?.choice==="yes").map(([id])=>id);
  const yesPlayers=yesIds.map(id=>({id,...(roster?.[id]||{name:"(removed)"})})).sort((a,b)=>a.name.localeCompare(b.name));
  const assigned=new Set([...teamA,...teamB]);
  const unassigned=yesPlayers.filter(p=>!assigned.has(p.id));

  // ── Published teams view — for everyone ───────────────────────────────────
  const PublishedView=()=>(
    <div>
      <div style={{background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.3)",borderRadius:14,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>✅</span>
        <div>
          <p style={{fontWeight:700,fontSize:13,color:"#34d399"}}>Teams Announced!</p>
          {teams.publishedAt&&<p style={{fontSize:10,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace"}}>{new Date(teams.publishedAt).toLocaleString()}</p>}
        </div>
      </div>
      <div className="grid-2" style={{gap:12,marginBottom:16}}>
        {[["A","#fbbf24","🟡",teams.captainA,teamA],["B","#6ee7b7","⚡",teams.captainB,teamB]].map(([t,col,em,cap,list])=>(
          <div key={t} style={{background:"rgba(255,255,255,.04)",border:`1.5px solid ${t==="A"?"rgba(245,158,11,.3)":"rgba(52,211,153,.3)"}`,borderRadius:16,padding:"14px 12px"}}>
            <p style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,color:col,marginBottom:2}}>{em} Team {t}</p>
            {cap&&<p style={{fontSize:11,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>Captain: {cap}</p>}
            {(list||[]).map(id=>(
              <div key={id} style={{fontSize:12,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.05)",display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:col,flexShrink:0,display:"inline-block"}}/>
                {nameOf(id)}{roster?.[id]?.keeper&&" 🧤"}
              </div>
            ))}
          </div>
        ))}
      </div>
      <ShareButton label="📤 Share Lineup" buildText={()=>{
        const dateStr=poll?new Date(poll.date+"T"+poll.time).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"}):"";
        return `🏏 LCC Teams${poll?` — ${poll.venue} · ${dateStr} ${poll.time}`:""}\n\n🟡 Team A${teams.captainA?` (${teams.captainA})`:""}:\n${(teamA||[]).map(id=>"  • "+nameOf(id)).join("\n")||"  —"}\n\n⚡ Team B${teams.captainB?` (${teams.captainB})`:""}:\n${(teamB||[]).map(id=>"  • "+nameOf(id)).join("\n")||"  —"}`;
      }}/>
      {isAdmin&&<button onClick={()=>setShowBuilder(true)} style={{width:"100%",marginTop:12,padding:"10px",borderRadius:12,border:"1px solid rgba(99,102,241,.35)",background:"transparent",color:"#a5b4fc",cursor:"pointer",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>✏️ Edit Teams (Admin)</button>}
    </div>
  );

  // ── Team builder — admin only ──────────────────────────────────────────────
  const BuilderView=()=>(
    <div>
      {teams?.published&&<button onClick={()=>setShowBuilder(false)} style={{background:"none",border:"none",color:"#9aa8bf",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",marginBottom:12}}>← Back to published teams</button>}
      <div className="mini-card" style={{marginBottom:14}}>
        <p className="section-title">👑 Captains</p>
        <div className="grid-2">
          <div><label>Team A Captain</label><input value={capA} onChange={e=>setCapA(e.target.value)} placeholder="Captain A"/></div>
          <div><label>Team B Captain</label><input value={capB} onChange={e=>setCapB(e.target.value)} placeholder="Captain B"/></div>
        </div>
      </div>
      <p className="section-title">Available — {unassigned.length} unassigned</p>
      {unassigned.length===0&&yesPlayers.length===0&&<p style={{color:"#9aa8bf",fontSize:13,textAlign:"center",padding:"12px 0"}}>No Yes votes yet.</p>}
      {unassigned.map(p=>(
        <div key={p.id} className="mini-card" style={{marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:600}}>{p.name}{p.keeper&&" 🧤"} <span style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>{p.role}</span></span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>moveTo(p.id,"A")} style={{background:"rgba(245,158,11,.15)",border:"1px solid rgba(245,158,11,.4)",color:"#fbbf24",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>→ A</button>
            <button onClick={()=>moveTo(p.id,"B")} style={{background:"rgba(52,211,153,.15)",border:"1px solid rgba(52,211,153,.4)",color:"#6ee7b7",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>→ B</button>
          </div>
        </div>
      ))}
      <div className="divider" style={{margin:"16px 0"}}/>
      <div className="grid-2" style={{gap:12}}>
        {[["A","#fbbf24","🟡",capA,teamA],["B","#6ee7b7","⚡",capB,teamB]].map(([t,col,em,cap,list])=>(
          <div key={t}>
            <p className="section-title" style={{color:col}}>{em} Team {t} ({list.length}){cap&&` · ${cap}`}</p>
            {list.map(id=>(
              <div key={id} className="mini-card" style={{marginBottom:6,padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12}}>{nameOf(id)}</span>
                <button onClick={()=>remove(id)} style={{background:"none",border:"none",color:"#9aa8bf",cursor:"pointer",fontSize:14}}>×</button>
              </div>
            ))}
          </div>
        ))}
      </div>
      <button className="btn btn-primary w-full" style={{marginTop:16}} onClick={publish}>📢 {teams?.published?"Update & Re-publish":"Publish Teams"}</button>
    </div>
  );

  // ── Routing ───────────────────────────────────────────────────────────────
  if(!poll) return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:40,marginBottom:10}}>🏏</div>
      <p style={{fontWeight:600,marginBottom:4}}>No poll open</p>
      <p style={{color:"#9aa8bf",fontSize:13}}>Teams are built from this week's poll responses.</p>
    </div>
  );
  if(teams?.published&&!showBuilder) return <PublishedView/>;
  if(isAdmin) return <BuilderView/>;
  return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:40,marginBottom:10}}>⏳</div>
      <p style={{fontWeight:600,marginBottom:4}}>Teams not announced yet</p>
      <p style={{color:"#9aa8bf",fontSize:13}}>Check back once the admin has finalised and published the teams.</p>
    </div>
  );
}

// ── Stats & Leaderboard page — career stats aggregated from match history ──────
function fmtAvg(v){return v===null?"—":v.toFixed(1);}
function fmtSR(v){return v===null?"—":v.toFixed(1);}
function fmtEcon(v){return v===null?"—":v.toFixed(2);}
function fmtPct(v){return v===null?"—":v.toFixed(0)+"%";}

// ── Character avatars — players pick one when joining ───────────────────────
// ── PlayerAvatar — colour-gradient circle with the player's initials ──────────
function PlayerAvatar({name,avatar,size=38}){
  // Initials: first letter of first + first letter of last name (e.g. "Rajesh Arigela" -> "RA")
  const parts=(name||"?").trim().split(/\s+/);
  const initials=(parts.length>=2
    ? parts[0][0]+parts[parts.length-1][0]
    : (parts[0]||"?").slice(0,2)
  ).toUpperCase();
  const colors=[["#f59e0b","#ef4444"],["#6366f1","#8b5cf6"],["#10b981","#06b6d4"],
                ["#f97316","#ec4899"],["#14b8a6","#6366f1"],["#84cc16","#10b981"]];
  const [c1,c2]=colors[(name||"").charCodeAt(0)%colors.length];
  return(
    <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
      background:`linear-gradient(135deg,${c1},${c2})`,boxShadow:`0 2px 8px ${c1}55`,
      fontFamily:"'Oswald',sans-serif",fontSize:size*0.38,fontWeight:700,color:"#fff",letterSpacing:".02em"}}>
      {initials}
    </div>
  );
}

    const c2=rRef.on("value",s=>setRoster(s.val()||{}));

  const venueList=Object.keys(venueCounts).sort((a,b)=>{
    const rank=x=>x==="Lakes High School"?0:x==="Millennium Park"?1:2;
    return rank(a)-rank(b)||a.localeCompare(b);

  const filteredHistory={};
  Object.entries(history||{}).forEach(([k,m])=>{
    if(venueF!=="All"&&canonVenue(m&&m.venue)!==venueF) return;

  const players=[...stats].sort((a,b)=>a.name.localeCompare(b.name))

  const MEDALS=["🥇","🥈","🥉"];

    const b=s.bat,w=s.bowl,f=s.field;

      <div style={{padding:"12px 14px 14px"}}>
        {/* Batting */}

          <span style={{marginLeft:"auto",fontSize:10,color:"#8291ab",fontFamily:"'JetBrains Mono',monospace"}}>{s.matches} match{s.matches===1?"":"es"}</span>

          {cell("Best",w.best,"#f87171")}{cell("Maidens",w.maidens)}{cell("Dot%",fmtPct(w.dotPct))}

  return(
    <div style={{background:"radial-gradient(ellipse 100% 55% at 85% 0%, rgba(37,99,235,.30), transparent 60%), radial-gradient(ellipse 90% 60% at 8% 92%, rgba(139,92,246,.26), transparent 62%), radial-gradient(circle at 50% 45%, rgba(30,58,138,.18), transparent 70%), linear-gradient(180deg,#0b1230 0%,#0a0e24 32%,#0d0a24 62%,#100a24 100%)",minHeight:"100dvh"}}>
      <PageHeader title="📊 Club Stats" onBack={onExit} backLabel="home"
        right={<p style={{fontSize:10,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",margin:0}}>{venueF==="All"?"All":venueF} · {matchCount}M</p>}

            const allBat=[],allBowl=[];

                (inn.battingOrder||[]).forEach(name=>{const b=inn.batsmen&&inn.batsmen[name];if(!b)return;allBat.push({name,runs:b.runs||0,balls:b.balls||0,fours:b.fours||0,sixes:b.sixes||0,out:b.out,vn,dt});});
                (inn.bowlingOrder||[]).forEach(name=>{const w=inn.bowlers&&inn.bowlers[name];if(!w)return;const balls=(w.overs||0)*6+(w.ballsThisOver||0);allBowl.push({name,wkts:w.wickets||0,runs:w.runs||0,balls,maidens:w.maidens||0,vn,dt});});
              });
            });
            const hsEntry=[...allBat].sort((a,b)=>b.runs-a.runs||a.balls-b.balls)[0]||null;
            const mostSixes=[...allBat].sort((a,b)=>b.sixes-a.sixes)[0]||null;
            const mostFours=[...allBat].sort((a,b)=>b.fours-a.fours)[0]||null;
            const bestBowl=[...allBowl].filter(w=>w.wkts>0).sort((a,b)=>b.wkts-a.wkts||a.runs-b.runs)[0]||null;
            const mostMaidens=[...allBowl].filter(w=>w.maidens>0).sort((a,b)=>b.maidens-a.maidens)[0]||null;
            const RC=({accent,icon,title,name,value,detail})=>{
              const rgb=accent==="#fbbf24"?"251,191,36":accent==="#34d399"?"52,211,153":accent==="#f87171"?"248,113,113":accent==="#a5b4fc"?"165,180,252":"99,102,241";
              return(
              <div style={{display:"flex",gap:0,marginBottom:10,borderRadius:16,overflow:"hidden",
                border:`1px solid rgba(${rgb},.25)`,boxShadow:`0 4px 14px rgba(0,0,0,.28), 0 0 16px rgba(${rgb},.07)`}}>
                <div style={{width:4,background:accent,flexShrink:0}}/>
                <div style={{flex:1,display:"flex",alignItems:"center",gap:12,padding:"13px 14px",
                  background:`linear-gradient(150deg,rgba(${rgb},.12),rgba(${rgb},.03))`}}>
                  <span style={{fontSize:24,flexShrink:0}}>{icon}</span>
                  <div style={{flex:1,overflow:"hidden"}}>
                    <div style={{fontSize:9,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".12em",marginBottom:3}}>{title}</div>
                    <div style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                    <div style={{fontSize:11,color:accent,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{value}</div>
                  </div>
                  {detail&&<div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:9,color:"#8291ab",fontFamily:"'JetBrains Mono',monospace",lineHeight:1.6}}>{detail.split("·").map((d,i)=><div key={i}>{d.trim()}</div>)}</div>
                  </div>}
                </div>
              </div>
            );};
            if(!hsEntry&&!bestBowl)return<p style={{color:"#9aa8bf",textAlign:"center",padding:"20px 0",fontSize:13}}>No records yet for this venue.</p>;
            return(
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <div style={{width:3,height:16,borderRadius:2,background:"#fbbf24"}}/>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:"#fbbf24",letterSpacing:".15em"}}>BATTING</span>
                </div>
                {hsEntry&&<RC accent="#fbbf24" icon="👑" title="HIGHEST SCORE" name={hsEntry.name} value={`${hsEntry.runs+(hsEntry.out?"":"*")} off ${hsEntry.balls} balls`} detail={`${hsEntry.vn}·${hsEntry.dt}`}/>}
                {mostSixes&&mostSixes.sixes>0&&<RC accent="#34d399" icon="💥" title="MOST SIXES (innings)" name={mostSixes.name} value={`${mostSixes.sixes} sixes`} detail={`${mostSixes.vn}·${mostSixes.dt}`}/>}
                {mostFours&&mostFours.fours>0&&<RC accent="#fbbf24" icon="🏃" title="MOST FOURS (innings)" name={mostFours.name} value={`${mostFours.fours} fours`} detail={`${mostFours.vn}·${mostFours.dt}`}/>}
                <div style={{height:1,background:"rgba(255,255,255,.06)",margin:"16px 0"}}/>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <div style={{width:3,height:16,borderRadius:2,background:"#f87171"}}/>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:"#f87171",letterSpacing:".15em"}}>BOWLING</span>
                </div>
                {bestBowl?<RC accent="#f87171" icon="🎳" title="BEST BOWLING" name={bestBowl.name} value={`${bestBowl.wkts}/${bestBowl.runs}`} detail={`${bestBowl.vn}·${bestBowl.dt}`}/>:<p style={{color:"#9aa8bf",fontSize:12,marginBottom:10}}>No wickets recorded yet.</p>}
                {mostMaidens&&<RC accent="#a5b4fc" icon="🔒" title="MOST MAIDENS" name={mostMaidens.name} value={`${mostMaidens.maidens} maiden${mostMaidens.maidens>1?"s":""}`} detail={`${mostMaidens.vn}·${mostMaidens.dt}`}/>}
                {/* Season badges — the Orange/Purple Cap ones are deliberately left out here because
                    they're just the #1 entries from the Leaders tab under a different name. */}
                {(()=>{
                  const unique=badges.filter(b=>b.key!=="orangeCap"&&b.key!=="purpleCap"&&b.winner);
                  if(!unique.length) return null;
                  return(<>
                    <div style={{height:1,background:"rgba(255,255,255,.06)",margin:"16px 0"}}/>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                      <div style={{width:3,height:16,borderRadius:2,background:"#a78bfa"}}/>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:"#a78bfa",letterSpacing:".15em"}}>SEASON BADGES</span>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      {unique.map(bdg=>(
                        <div key={bdg.key} style={{
                          background:"linear-gradient(150deg,rgba(167,139,250,.16),rgba(167,139,250,.04))",
                          border:"1px solid rgba(167,139,250,.35)",
                          boxShadow:"0 4px 16px rgba(0,0,0,.3), 0 0 18px rgba(167,139,250,.08)",
                          borderRadius:16,padding:"14px 10px",textAlign:"center"}}>
                          <div style={{fontSize:26,marginBottom:6}}>{bdg.emoji}</div>
                          <p style={{fontSize:10,color:"#bcc7d8",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".1em",marginBottom:6}}>{bdg.label}</p>
                          <p style={{fontWeight:700,fontSize:14,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{bdg.winner.name}</p>
                          <p style={{fontSize:11,color:"#c4b5fd",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{bdg.stat}</p>
                        </div>
                      ))}
                    </div>
                  </>);
                })()}
              </div>
            );
          })()}
        </>)}
      </div>
    </div>
  );
}
// ── Super Admin: Announcement manager — post a notice visible on the home screen
// ── Tournaments — a reusable, named fixture list (e.g. "2026 Cricket Tournament") that can be
// created fresh each time a new tournament rolls around. Each fixture is just a Team1 vs Team2
// pairing; "Start This Match" hands the pairing straight to Setup with the names pre-filled, and
// once that match finishes, the fixture is automatically marked played and linked to it.
function TournamentsPage({role,onExit,onStartMatch}){
  const isAdmin=role==="admin";
  const[tournaments,setTournaments]=React.useState(undefined);
  const[teamSquads,setTeamSquads]=React.useState({});
  const[selected,setSelected]=React.useState(null);
  const[newName,setNewName]=React.useState("");
  const[newVenue,setNewVenue]=React.useState("Millennium Park");
  const[fxTeam1,setFxTeam1]=React.useState("");
  const[fxTeam2,setFxTeam2]=React.useState("");
  const[fxTeam1Other,setFxTeam1Other]=React.useState(""); // free-text fallback when picking "— Other —"
  const[fxTeam2Other,setFxTeam2Other]=React.useState("");
  const[editingFx,setEditingFx]=React.useState(null); // fixture id currently being renamed
  const[editT1,setEditT1]=React.useState("");
  const[editT2,setEditT2]=React.useState("");

  React.useEffect(()=>{
    if(!FB_OK||!DB){setTournaments({});return;}
    const ref=DB.ref("tournaments");
    const cb=ref.on("value",s=>setTournaments(s.val()||{}));
    const sqRef=DB.ref("teamSquads");
    const sqCb=sqRef.on("value",s=>setTeamSquads(s.val()||{}));
    return ()=>{ref.off("value",cb);sqRef.off("value",sqCb);};
  },[]);

  if(tournaments===undefined) return <Centered emoji="🏆" title="Loading tournaments…" onExit={onExit}/>;

  const list=Object.entries(tournaments).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
  const cur=selected?tournaments[selected]:null;
  const fixtures=cur?Object.entries(cur.fixtures||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0)):[];

  const createTournament=()=>{
    const nm=newName.trim();
    if(!nm){alert("Enter a tournament name.");return;}
    const id="t_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8);
    DB.ref("tournaments/"+id).set({name:nm,venue:newVenue,createdAt:Date.now(),fixtures:{}})
      .then(()=>{setSelected(id);setNewName("");})
      .catch(e=>alert("Failed: "+e.message));
  };
  const deleteTournament=()=>{
    if(!confirm(`Delete "${cur.name}" and its whole fixture list? Matches already played are NOT deleted — only the tournament grouping.`))return;
    DB.ref("tournaments/"+selected).remove().then(()=>setSelected(null));
  };
  const squadNames=Object.values(teamSquads).map(s=>s.name).sort((a,b)=>a.localeCompare(b));
  const resolveTeamPick=(picked,otherText)=>picked==="__other__"?formatTeamName(otherText.trim()):picked;
  const addFixture=()=>{
    const t1=resolveTeamPick(fxTeam1,fxTeam1Other),t2=resolveTeamPick(fxTeam2,fxTeam2Other);
    if(!t1||!t2){alert("Pick (or type) both team names.");return;}
    const fid="f_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,6);
    const order=fixtures.length;
    DB.ref(`tournaments/${selected}/fixtures/${fid}`).set({team1:t1,team2:t2,played:false,matchId:null,order})
      .then(()=>{setFxTeam1("");setFxTeam2("");setFxTeam1Other("");setFxTeam2Other("");})
      .catch(e=>alert("Failed: "+e.message));
  };
  const removeFixture=(fid)=>{
    if(!confirm("Remove this fixture from the tournament?"))return;
    DB.ref(`tournaments/${selected}/fixtures/${fid}`).remove().catch(()=>{});
  };
  const saveFixtureEdit=(fid)=>{
    const t1=formatTeamName(editT1.trim()),t2=formatTeamName(editT2.trim());
    if(!editT1.trim()||!editT2.trim()){alert("Enter both team names.");return;}
    DB.ref(`tournaments/${selected}/fixtures/${fid}`).update({team1:t1,team2:t2})
      .then(()=>setEditingFx(null)).catch(e=>alert("Failed: "+e.message));
  };
  const startFixture=(fid,fx)=>{
    onStartMatch({team1:fx.team1,team2:fx.team2,tournamentId:selected,fixtureId:fid,venue:cur.venue||null});
  };

  const playedCount=fixtures.filter(([,fx])=>fx.played).length;

  return(
    <div style={{background:"radial-gradient(ellipse 100% 55% at 85% 0%, rgba(37,99,235,.30), transparent 60%), radial-gradient(ellipse 90% 60% at 8% 92%, rgba(139,92,246,.26), transparent 62%), radial-gradient(circle at 50% 45%, rgba(30,58,138,.18), transparent 70%), linear-gradient(180deg,#0b1230 0%,#0a0e24 32%,#0d0a24 62%,#100a24 100%)",minHeight:"100dvh"}}>
      <PageHeader title={cur?`🏆 ${cur.name}`:"🏆 Tournaments"} onBack={cur?()=>setSelected(null):onExit} backLabel={cur?"tournaments":"home"}/>
      <div style={{padding:"16px 16px 32px"}}>
        {!cur?(<>
          {isAdmin&&(
            <div style={{marginBottom:16}}>
              <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createTournament()}
                placeholder="New tournament name…" style={{width:"100%",fontSize:13,marginBottom:8}}/>
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                {["Lakes High School","Millennium Park"].map(v=>(
                  <button key={v} onClick={()=>setNewVenue(v)} style={{
                    flex:1,padding:"9px 6px",borderRadius:12,cursor:"pointer",fontSize:12,fontWeight:600,
                    border:`1.5px solid ${newVenue===v?"#f59e0b":"rgba(148,163,184,.25)"}`,
                    background:newVenue===v?"rgba(245,158,11,.15)":"transparent",
                    color:newVenue===v?"#fbbf24":"#94a3b8"
                  }}>{v==="Lakes High School"?"🎾 Lakes":"🏟️ Millennium"}</button>
                ))}
              </div>
              <button className="btn btn-primary w-full" onClick={createTournament} style={{padding:"10px 16px"}}>+ Create Tournament</button>
              <p style={{color:"#9aa8bf",fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginTop:6}}>Every match started from this tournament will default to this ground — no need to pick it again each time.</p>
            </div>
          )}
          {list.length===0?(
            <div style={{textAlign:"center",padding:"40px 16px"}}>
              <div style={{fontSize:48,marginBottom:12}}>🏆</div>
              <p style={{fontWeight:700,fontSize:16,marginBottom:6}}>No tournaments yet</p>
              <p style={{color:"#9aa8bf",fontSize:13}}>{isAdmin?"Create one above to build a fixture list.":"Check back once an admin sets one up."}</p>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {list.map(([id,t])=>{
                const fx=Object.values(t.fixtures||{});
                const played=fx.filter(f=>f.played).length;
                return(
                  <button key={id} onClick={()=>setSelected(id)} style={{
                    display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",
                    borderRadius:16,textAlign:"left",cursor:"pointer",border:"1px solid rgba(52,211,153,.25)",
                    background:"rgba(255,255,255,.03)",color:"#fff"}}>
                    <span>
                      <span style={{display:"block",fontWeight:700,fontSize:15}}>{t.name}</span>
                      <span style={{display:"block",fontSize:11,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{fx.length} fixture{fx.length===1?"":"s"} · {played} played</span>
                    </span>
                    <span style={{color:"#8291ab"}}>→</span>
                  </button>
                );
              })}
            </div>
          )}
        </>):(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{color:"#6ee7b7",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{fixtures.length} fixtures · {playedCount} played</p>
            {isAdmin&&<button onClick={deleteTournament} style={{background:"none",border:"none",color:"#f87171",fontSize:11,cursor:"pointer"}}>🗑️ Delete tournament</button>}
          </div>
          {isAdmin&&(
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",gap:6,marginBottom:fxTeam1==="__other__"||fxTeam2==="__other__"?6:0}}>
                <select value={fxTeam1} onChange={e=>setFxTeam1(e.target.value)} style={{flex:1,fontSize:13,background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 8px",color:fxTeam1?"#fff":"#818cf8"}}>
                  <option value="">— Team 1 —</option>
                  {squadNames.map(n=><option key={n} value={n}>{n}</option>)}
                  <option value="__other__">✏️ Other (type name)…</option>
                </select>
                <select value={fxTeam2} onChange={e=>setFxTeam2(e.target.value)} style={{flex:1,fontSize:13,background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 8px",color:fxTeam2?"#fff":"#818cf8"}}>
                  <option value="">— Team 2 —</option>
                  {squadNames.map(n=><option key={n} value={n}>{n}</option>)}
                  <option value="__other__">✏️ Other (type name)…</option>
                </select>
              </div>
              {(fxTeam1==="__other__"||fxTeam2==="__other__")&&(
                <div style={{display:"flex",gap:6,marginBottom:6}}>
                  {fxTeam1==="__other__"&&<input value={fxTeam1Other} onChange={e=>setFxTeam1Other(e.target.value)} placeholder="Team 1 name…" style={{flex:1,fontSize:13}}/>}
                  {fxTeam2==="__other__"&&<input value={fxTeam2Other} onChange={e=>setFxTeam2Other(e.target.value)} placeholder="Team 2 name…" style={{flex:1,fontSize:13}}/>}
                </div>
              )}
              <button className="btn btn-primary w-full" onClick={addFixture} style={{padding:"10px 14px"}}>+ Add Fixture</button>
              {squadNames.length===0&&<p style={{color:"#9aa8bf",fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginTop:6}}>No saved squads yet — set them up first in Roster → Tools → Squads, or use "Other" to type a name directly.</p>}
            </div>
          )}
          {fixtures.length===0?(
            <p style={{color:"#9aa8bf",fontSize:13,textAlign:"center",padding:"20px 0"}}>No fixtures added yet.</p>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {fixtures.map(([fid,fx])=>(
                <div key={fid} style={{background:"rgba(255,255,255,.03)",border:`1px solid ${fx.played?"rgba(52,211,153,.3)":"rgba(99,102,241,.2)"}`,borderRadius:14,padding:"12px 14px"}}>
                  {editingFx===fid?(
                    <div>
                      <div style={{display:"flex",gap:6,marginBottom:8}}>
                        <select value={squadNames.includes(editT1)?editT1:"__other__"} onChange={e=>setEditT1(e.target.value==="__other__"?"":e.target.value)} style={{flex:1,fontSize:13,background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"9px 6px",color:"#fff"}}>
                          {squadNames.map(n=><option key={n} value={n}>{n}</option>)}
                          <option value="__other__">✏️ Other (type name)…</option>
                        </select>
                        <select value={squadNames.includes(editT2)?editT2:"__other__"} onChange={e=>setEditT2(e.target.value==="__other__"?"":e.target.value)} style={{flex:1,fontSize:13,background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"9px 6px",color:"#fff"}}>
                          {squadNames.map(n=><option key={n} value={n}>{n}</option>)}
                          <option value="__other__">✏️ Other (type name)…</option>
                        </select>
                      </div>
                      {(!squadNames.includes(editT1)||!squadNames.includes(editT2))&&(
                        <div style={{display:"flex",gap:6,marginBottom:8}}>
                          {!squadNames.includes(editT1)&&<input value={editT1} onChange={e=>setEditT1(e.target.value)} placeholder="Team 1 name…" style={{flex:1,fontSize:13}}/>}
                          {!squadNames.includes(editT2)&&<input value={editT2} onChange={e=>setEditT2(e.target.value)} placeholder="Team 2 name…" style={{flex:1,fontSize:13}}/>}
                        </div>
                      )}
                      <div style={{display:"flex",gap:6}}>
                        <button className="btn btn-primary" onClick={()=>saveFixtureEdit(fid)} style={{flex:1,padding:"8px"}}>Save</button>
                        <button className="btn" onClick={()=>setEditingFx(null)} style={{flex:1,padding:"8px"}}>Cancel</button>
                      </div>
                    </div>
                  ):(
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fx.team1} <span style={{color:"#9aa8bf",fontWeight:400}}>vs</span> {fx.team2}</p>
                        {fx.played?<p style={{fontSize:11,color:"#34d399",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>✅ Played</p>
                          :<p style={{fontSize:11,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>Not played yet</p>}
                      </div>
                      {isAdmin&&(
                        <div style={{display:"flex",gap:6,flexShrink:0}}>
                          {!fx.played&&<>
                            <button onClick={()=>{setEditingFx(fid);setEditT1(fx.team1);setEditT2(fx.team2);}} style={{background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.3)",color:"#a5b4fc",borderRadius:8,padding:"6px 9px",fontSize:12,cursor:"pointer"}}>✏️</button>
                            <button onClick={()=>removeFixture(fid)} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.3)",color:"#f87171",borderRadius:8,padding:"6px 9px",fontSize:12,cursor:"pointer"}}>🗑️</button>
                            <button onClick={()=>startFixture(fid,fx)} style={{background:"linear-gradient(135deg,#10b981,#059669)",border:"none",color:"#111",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>▶ Start</button>
                          </>}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </>)}
      </div>
    </div>
  );
}

function AnnouncementPage({onExit}){
  const[current,setCurrent]=React.useState(undefined);
  const[text,setText]=React.useState("");
  const[by,setBy]=React.useState("");
  React.useEffect(()=>{
    if(!FB_OK||!DB){setCurrent(null);return;}
    const ref=DB.ref("announcement");
    const cb=ref.on("value",s=>{const v=s.val()||null;setCurrent(v);setText(v?.text||"");setBy(v?.by||"");});
    return ()=>ref.off("value",cb);
  },[]);
  const save=()=>{
    const t=text.trim();
    if(!t){alert("Enter the announcement text.");return;}
    if(!FB_OK||!DB){alert("Offline.");return;}
    DB.ref("announcement").set({text:t,by:by.trim()||"Admin",postedAt:Date.now()})
      .then(()=>alert("Announcement posted! Everyone will see it on the home screen."))
      .catch(e=>alert("Failed: "+e.message));
  };
  const clear=()=>{
    if(!confirm("Remove the current announcement?"))return;
    DB.ref("announcement").remove().catch(e=>alert("Failed: "+e.message));
  };
  if(current===undefined) return <Centered emoji="📢" title="Loading…" onExit={onExit}/>;
  return(
    <div style={{background:"radial-gradient(ellipse 100% 55% at 85% 0%, rgba(37,99,235,.30), transparent 60%), radial-gradient(ellipse 90% 60% at 8% 92%, rgba(139,92,246,.26), transparent 62%), radial-gradient(circle at 50% 45%, rgba(30,58,138,.18), transparent 70%), linear-gradient(180deg,#0b1230 0%,#0a0e24 32%,#0d0a24 62%,#100a24 100%)",minHeight:"100dvh",padding:"20px 16px"}}>
      <div className="resp-wrap">
        <div className="flex items-center justify-between" style={{marginBottom:18}}>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:26,fontWeight:700}}>📢 Announcements</h1>
          <button onClick={onExit} style={{background:"none",border:"none",color:"#9aa8bf",fontSize:13,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← back</button>
        </div>
        {current&&current.text&&(
          <div style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",borderRadius:14,padding:"12px 14px",marginBottom:16}}>
            <p style={{fontSize:10,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>CURRENT ANNOUNCEMENT</p>
            <p style={{fontSize:13,color:"#fff"}}>{current.text}</p>
            {current.by&&<p style={{fontSize:10,color:"#9aa8bf",marginTop:4}}>— {current.by} · {current.postedAt?new Date(current.postedAt).toLocaleDateString():""}</p>}
            <button onClick={clear} style={{marginTop:10,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.4)",color:"#f87171",borderRadius:10,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>🗑️ Remove Announcement</button>
          </div>
        )}
        <div className="mini-card">
          <p className="section-title">{current?"✏️ Update Announcement":"➕ Post Announcement"}</p>
          <label>Message (shown on the home screen for all players)</label>
