  };
  const[pinMgmtOpen,setPinMgmtOpen]=React.useState(false);
  const[pinViewOpen,setPinViewOpen]=React.useState(false);
  const[qrOpen,setQrOpen]=React.useState(false);
  const[teamEditOpen,setTeamEditOpen]=React.useState(false);
  const[editPubA,setEditPubA]=React.useState([]);
  const[editPubB,setEditPubB]=React.useState([]);
  const[newNameA,setNewNameA]=React.useState("");
  const[newNameB,setNewNameB]=React.useState("");
  const isSuper=role==="admin"; // only admin role (super admin) can edit teams
  const close=()=>setOpen(false);

  // Grid-cell button: icon above label, centered, in a bordered tile — two per row instead of one
  // long single-column list. The old list left a whole strip of empty space to its right on wider
  // phones since it was never wider than ~210px; this actually uses that space instead of wasting it,
  // and roughly halves how far you have to scroll to reach the bottom of the menu.
  const cell=(icon,label,color,onClick,active)=>(
    <button key={label} onClick={()=>{close();onClick();}} style={{
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,
      padding:"12px 6px",background:active?"rgba(99,102,241,.16)":"transparent",
      border:`1px solid ${active?"rgba(99,102,241,.5)":"rgba(99,102,241,.15)"}`,cursor:"pointer",borderRadius:12,
      fontFamily:"'Inter',sans-serif",transition:"background .12s",minHeight:64
    }}
    onMouseEnter={e=>e.currentTarget.style.background="rgba(99,102,241,.12)"}
    onMouseLeave={e=>e.currentTarget.style.background=active?"rgba(99,102,241,.16)":"transparent"}>
      <span style={{fontSize:18}}>{icon}</span>
      <span style={{fontSize:10.5,fontWeight:600,color,textAlign:"center",lineHeight:1.2}}>{label}</span>
    </button>
  );

  // Edit Match inline modal (controlled here so we can close the menu first)
  const[ov,setOv]=React.useState(inn?.overs||0);
  const[wk,setWk]=React.useState(inn?.maxWkts||0);
  const minOv=Math.ceil((inn?.totalBalls||0)/6)||1;
  const minWk=(inn?.wickets||0)+1;
  const saveEdit=()=>{
    const o=Number(ov),w=Number(wk);
    if(!o||o<minOv){alert(`Overs can't be less than ${minOv}.`);return;}
    if(!w||w<minWk){alert(`Wickets can't be less than ${minWk}.`);return;}
    onEditMatchSave({overs:o,maxWkts:w});setEditOpen(false);
  };
  // Adds a typed name to a team via the manual box, enforcing: no blank, no duplicate on THIS team,
  // and — the rule the user asked for — a player already on the OTHER team can't be added here without
  // confirming a MOVE (which removes them from the other side). One player can only be on one team.
  const tryAddName=(raw,list,setList,side,teamName,setNewName)=>{
    const nm=(raw||"").trim(); if(!nm) return;
    const ln=nm.toLowerCase();
    if(list.some(x=>x.toLowerCase()===ln)){ alert(`${nm} is already on ${teamName}.`); return; }
    const other=side==="A"?editPubB:editPubA;
    const setOther=side==="A"?setEditPubB:setEditPubA;
    if((other||[]).some(x=>x.toLowerCase()===ln)){
      if(!confirm(`${nm} is currently on the other team. Move them to ${teamName}? (A player can only be on one team.)`)) return;
      setOther(o=>o.filter(x=>x.toLowerCase()!==ln));   // remove from the other side — a real move
      globalToast(`✅ ${nm} moved to ${teamName}`);
    } else {
      globalToast(`✅ ${nm} added to ${teamName}`);
    }
    setList(l=>[...l,nm]);
    setNewName("");
  };

  const[menuPos,setMenuPos]=React.useState(null); // {top,left} in viewport coords, computed on open
  const triggerRef=React.useRef(null);
  const openMenu=()=>{
    const btn=triggerRef.current;
    if(btn){
      const r=btn.getBoundingClientRect();
      const menuW=Math.min(300,window.innerWidth-24);
      // Anchor to the button's right edge, then clamp so the menu can never run off either side of
      // the viewport — this is what broke when the dropdown got wider: right:0 was relative to this
      // small button's own wrapper, which isn't always near the screen's actual right edge (e.g. once
      // "Fix Players" pushes things around), so a wider panel could extend straight off the left edge.
      let left=r.right-menuW;
      left=Math.max(12,Math.min(left,window.innerWidth-menuW-12));
      setMenuPos({top:r.bottom+6,left,width:menuW});
    }
    setOpen(o=>!o);
  };

  return(
    <div style={{position:"relative"}}>
      {/* Trigger */}
      <button ref={triggerRef} onClick={openMenu} style={{
        background:"rgba(99,102,241,.15)",border:"1.5px solid rgba(99,102,241,.4)",
        color:"#a5b4fc",fontSize:15,cursor:"pointer",borderRadius:9,
        padding:"4px 8px",fontWeight:700,lineHeight:1,fontFamily:"'JetBrains Mono',monospace"
      }} title="Match tools">⚙️</button>

      {/* Dropdown — portaled to <body> and positioned in fixed VIEWPORT coordinates (computed above),
          not relative to this button's own small wrapper. This is the same containing-block fix already
          applied to Modal/MilestoneCelebration (this button sits inside .score-header, which has
          backdrop-filter and so becomes the containing block for any non-portaled fixed/absolute
          descendant) — PLUS it fixes the anchoring bug, since fixed viewport coordinates can't drift
          off-screen the way `right:0` relative to a moving wrapper could. */}
      {open&&menuPos&&ReactDOM.createPortal(<>
        <div onClick={close} style={{position:"fixed",inset:0,zIndex:200}}/>
        <div style={{position:"fixed",top:menuPos.top,left:menuPos.left,zIndex:201,width:menuPos.width,
          maxHeight:"calc(100dvh - "+(menuPos.top+16)+"px)",overflowY:"auto",
          background:"rgba(12,9,38,.98)",border:"1px solid rgba(99,102,241,.4)",borderRadius:16,
          padding:"10px",boxShadow:"0 16px 48px rgba(0,0,0,.7)",backdropFilter:"blur(20px)",
          animation:"fadeUp .15s ease both"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {onFixPlayers&&cell("🔧","Fix Players","#6ee7b7",openFix)}
            {setHiCon&&cell("◐","High Contrast","#67e8f9",()=>setHiCon(h=>{const n=!h;try{localStorage.setItem("lcc_hc",n?"1":"0")}catch(e){}return n;}),hiCon)}
            {setBigText&&cell("A+","Larger Text","#67e8f9",()=>setBigText(b=>{const n=!b;try{localStorage.setItem("lcc_bigtext",n?"1":"0")}catch(e){}return n;}),bigText)}
            {setCelebrationSound&&cell("🔊","Ball Sounds","#fbbf24",()=>setCelebrationSound(v=>{const n=!v;try{localStorage.setItem("lcc_ball_sound",n?"1":"0")}catch(e){}return n;}),celebrationSound)}
            {onHistory&&cell("📚","Match History","#a5b4fc",onHistory||close)}
            {onAnnounce&&cell("📢","Post Notice","#fbbf24",onAnnounce||close)}
            {role==="admin"&&onEditMatchSave&&cell("✏️","Edit Match","#c4b5fd",()=>{setOv(inn?.overs||0);setWk(inn?.maxWkts||0);setEditOpen(true);})}
            {onUpdateTeams&&cell("👥","Edit Teams","#34d399",()=>{
              setEditPubA(match?.pubTeamA||[]);
              setEditPubB(match?.pubTeamB||[]);
              setNewNameA("");setNewNameB("");
              setTeamEditOpen(true);
            })}
            {role==="admin"&&cell("🔐","Admin PINs","#f87171",()=>setPinMgmtOpen(true))}
            {role==="admin"&&match?.pinA&&cell("👁","Team PINs","#6ee7b7",()=>setPinViewOpen(true))}
            {cell("📱","Show QR","#22d3ee",()=>{setOpen(false);setQrOpen(true);})}
            {onAbandonMatch&&cell("🆕","New Match","#fbbf24",()=>{close();onAbandonMatch();})}
          </div>
          <div style={{borderTop:"1px solid #1e1b4b",marginTop:8,paddingTop:6,textAlign:"center"}}>
            <span style={{fontSize:9,color:"#8291ab",fontFamily:"'JetBrains Mono',monospace"}}>build 2026-07-07</span>
          </div>
        </div>
      </>,document.body)}

      {/* Edit Match modal */}
      {editOpen&&<Modal onClose={()=>setEditOpen(false)} title="✏️ Edit Match Settings">
        <p style={{color:"#bcc7d8",fontSize:12,marginBottom:14}}>Correct overs or wickets if they were set wrong at the start.</p>
        <label>Overs per side</label>
        <input type="number" min={minOv} value={ov} onChange={e=>setOv(e.target.value)} style={{marginBottom:6}}/>
        <p style={{color:"#8291ab",fontSize:10,marginBottom:12}}>{Math.ceil((inn?.totalBalls||0)/6)} overs already bowled</p>
        <label>Wickets per side</label>
        <input type="number" min={minWk} value={wk} onChange={e=>setWk(e.target.value)} style={{marginBottom:6}}/>
        <p style={{color:"#8291ab",fontSize:10,marginBottom:14}}>{inn?.wickets||0} wicket{inn?.wickets===1?"":"s"} already fallen</p>
        <button className="btn btn-primary w-full" onClick={saveEdit}>Save Changes</button>
      </Modal>}

      {/* Fix Players modal (moved here from the header) */}
      {fixOpen&&<Modal onClose={()=>setFixOpen(false)} title="🔧 Correct Striker / Bowler">
        <p style={{color:"#bcc7d8",fontSize:12,marginBottom:14}}>Use this if a name was entered wrong (e.g. wrong bowler typed in) or strike rotation needs a manual correction. Scores already recorded are not affected — this only changes who's currently at the crease/bowling.</p>
        <label>{inn?.single?"Batsman":"Striker (on strike now)"}</label>
        <div style={{marginBottom:12}}><PlayerSelectControlled value={fixSk} onChange={setFixSk} options={squadOptions(match, inn?.battingTeam, rosterNames)} placeholder="Choose striker"/></div>
        {!inn?.single&&(<>
          <label>Non-striker</label>
          <div style={{marginBottom:12}}><PlayerSelectControlled value={fixNs} onChange={setFixNs} options={squadOptions(match, inn?.battingTeam, rosterNames)} placeholder="Choose non-striker"/></div>
        </>)}
        <label>Current bowler</label>
        <div style={{marginBottom:14}}><PlayerSelectControlled value={fixBw} onChange={setFixBw} options={squadOptions(match, inn?.bowlingTeam, rosterNames)} placeholder="Choose bowler"/></div>
        <button className="btn btn-primary w-full" onClick={saveFix}>Save Correction</button>
      </Modal>}

      {/* Manage PINs modal */}
      {teamEditOpen&&(
        <Modal onClose={()=>setTeamEditOpen(false)} title="👥 Edit Match Teams">
          <p style={{color:"#bcc7d8",fontSize:12,marginBottom:14}}>Add or remove players from each team. Changes take effect immediately for everyone.</p>
          {[["🟡",match?.teamA||"Team A",editPubA,setEditPubA,newNameA,setNewNameA,"A",setEditPubB],
            ["⚡",match?.teamB||"Team B",editPubB,setEditPubB,newNameB,setNewNameB,"B",setEditPubA]
          ].map(([em,teamName,list,setList,newName,setNewName,side,setOther])=>(
            <div key={side} style={{marginBottom:16}}>
              <p style={{fontWeight:700,fontSize:13,marginBottom:8,color:side==="A"?"#fbbf24":"#6ee7b7"}}>{em} {teamName} ({list.length})</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                {list.map(n=>(
                  <div key={n} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.06)",borderRadius:8,padding:"4px 8px"}}>
                    <span style={{fontSize:12}}>{n}</span>
                    <button title={"Move to the other team"} onClick={()=>{
                      // move this player to the OTHER team: remove here, add there (avoid dupes there)
                      setList(l=>l.filter(x=>x!==n));
                      setOther(o=>o.includes(n)?o:[...o,n]);
                    }} style={{background:"none",border:"none",color:"#a5b4fc",cursor:"pointer",fontSize:13,lineHeight:1,padding:0}}>⇄</button>
                    <button title={"Remove player"} onClick={()=>setList(l=>l.filter(x=>x!==n))} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:14,lineHeight:1,padding:0}}>×</button>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input value={newName} onChange={e=>setNewName(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")tryAddName(newName,list,setList,side,teamName,setNewName);}}
                  placeholder="Add player name…" style={{flex:1,fontSize:13}}/>
                <button onClick={()=>tryAddName(newName,list,setList,side,teamName,setNewName)}
                  style={{padding:"8px 12px",borderRadius:10,border:"none",background:"rgba(99,102,241,.3)",color:"#a5b4fc",cursor:"pointer",fontWeight:700,fontSize:13}}>Add</button>
              </div>
              {/* PICK FROM CLUB ROSTER — the whole point of the fix. Rather than retyping a known
                  member's name from memory, show every club player who ISN'T already on THIS team, as
                  tappable chips. Tapping adds them here (and, if they were on the other team, the
                  add-here + the ⇄ logic keep them from being duplicated across both sides). Case-
                  insensitive filtering so "Raj" already on the team hides "raj" from the pick list. */}
              {(()=>{
                const onThis=new Set(list.map(n=>n.toLowerCase()));
                const other=side==="A"?editPubB:editPubA;   // the OTHER team's current list
                const onOther=new Set((other||[]).map(n=>n.toLowerCase()));
                // Everyone in the club NOT already on this team, sorted A–Z. Players already on the
                // OTHER team are shown but visually flagged and require a confirm to move — a playing
                // member can't be silently added to both sides.
                const available=(rosterNames||[]).filter(n=>!onThis.has(n.toLowerCase())).sort((a,b)=>a.localeCompare(b));
                if(available.length===0) return <p style={{color:"#8291ab",fontSize:10,marginTop:8}}>All club players are on this team.</p>;
                return(
                  <div style={{marginTop:10}}>
                    <p style={{color:"#9aa8bf",fontSize:10,marginBottom:6,textTransform:"uppercase",letterSpacing:".08em"}}>Add a club member (A–Z):</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:132,overflowY:"auto"}}>
                      {available.map(n=>{
                        const elsewhere=onOther.has(n.toLowerCase());
                        return(
                          <button key={n} onClick={()=>{
                            if(elsewhere){
                              if(!confirm(`${n} is currently on the other team. Move them to ${teamName}?`)) return;
                            }
                            setList(l=>l.includes(n)?l:[...l,n]);
                            setOther(o=>o.filter(x=>x!==n));   // moving them off the other side
                          }} title={elsewhere?"On the other team — tap to move":"Add to this team"}
                          style={{background:elsewhere?"rgba(148,163,184,.10)":"rgba(52,211,153,.12)",
                            border:`1px solid ${elsewhere?"rgba(148,163,184,.4)":"rgba(52,211,153,.35)"}`,
                            borderRadius:8,padding:"4px 9px",color:elsewhere?"#94a3b8":"#6ee7b7",cursor:"pointer",fontSize:12}}>
                            {elsewhere?"⇄ ":"+ "}{n}{elsewhere?" (other team)":""}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}
            </div>
          ))}
          <button onClick={()=>{onUpdateTeams(editPubA,editPubB);setTeamEditOpen(false);globalToast("✅ Teams saved");}}
            style={{width:"100%",padding:"12px",borderRadius:14,border:"none",cursor:"pointer",
              background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontWeight:700,fontSize:14}}>
            ✓ Save Teams
          </button>
        </Modal>
      )}
      {pinMgmtOpen&&<PinMgmtModal onClose={()=>setPinMgmtOpen(false)}/>}

      {/* View Team PINs modal */}
      {pinViewOpen&&match?.pinA&&(
        <Modal onClose={()=>setPinViewOpen(false)} title="👥 Team PINs">
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[["🟡",match.teamA,match.pinA],["⚡",match.teamB,match.pinB]].map(([em,team,pin])=>(
              <div key={team} style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.3)",borderRadius:12,padding:"12px 14px"}}>
                <p style={{fontSize:11,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>{em} {team}</p>
                <p style={{fontFamily:"'Oswald',sans-serif",fontSize:28,fontWeight:700,letterSpacing:"0.2em",color:"#fff"}}>{pin}</p>
              </div>
            ))}
          </div>
        </Modal>
      )}
      {/* QR code for the live viewer — lets anyone at the ground scan straight into "📡 Live" instead
          of typing a URL. Encodes the current site's URL + #live, which Root() reads on load to jump
          directly to the viewer screen. Uses a public QR-image API (no library to bundle); if it can't
          load (offline), the raw link is still shown to copy/share manually. */}
      {qrOpen&&(
        <Modal onClose={()=>setQrOpen(false)} title="📱 Scan to Watch Live">
          {(()=>{
            let liveUrl="";
            try{ liveUrl=window.location.origin+window.location.pathname+"#live"; }catch(e){}
            const qrImg="https://api.qrserver.com/v1/create-qr-code/?size=260x260&margin=8&color=0a1a3a&bgcolor=ffffff&data="+encodeURIComponent(liveUrl);
            return(
              <div style={{textAlign:"center"}}>
                <div style={{background:"#fff",borderRadius:16,padding:12,display:"inline-block",marginBottom:12}}>
                  <img src={qrImg} alt="QR code to live scorecard" width="260" height="260" style={{display:"block",borderRadius:8}}/>
                </div>
                <p style={{fontSize:11,color:"var(--text-mute)",fontFamily:"'JetBrains Mono',monospace",lineHeight:1.6,wordBreak:"break-all"}}>{liveUrl}</p>
                <p style={{fontSize:11,color:"var(--text-dim)",marginTop:8}}>Anyone can scan this with their phone camera to jump straight into the live scorecard — no app, no typing.</p>
              </div>
            );
          })()}
        </Modal>
      )}
    </div>
  );
}

// ── EditPlayersButton — redesigned player editor available to scorer AND admin ─
// Accessible right from the batting card. Shows clear visual crease layout with
// inline name editing and a swap button. ManualFixButton in the admin header
// still works as a secondary entry point.
function EditPlayersButton({inn,match,rosterNames,onSwap,onSave}){
  const[open,setOpen]=React.useState(false);
  const[sk,setSk]=React.useState("");
  const[ns,setNs]=React.useState("");
  const[bw,setBw]=React.useState("");
  const[swapped,setSwapped]=React.useState(false);
  if(!inn||!onSave) return null;
  // Batsmen come from the batting team's squad, the bowler from the bowling team's (roster fallback).
  const batOpts=squadOptions(match, inn.battingTeam, rosterNames);
  const bowlOpts=squadOptions(match, inn.bowlingTeam, rosterNames);
  const openModal=()=>{ setSk(inn.strikerName||""); setNs(inn.nonStrikerName||""); setBw(inn.bowlerName||""); setSwapped(false); setOpen(true); };
  const doSwap=()=>{ const t=sk; setSk(ns); setNs(t); setSwapped(s=>!s); };
  const save=()=>{
    const s=sk.trim(), n=ns.trim(), b=bw.trim();
    if(!s){alert("Striker name can't be empty.");return;}
    if(!inn.single&&!n){alert("Non-striker name can't be empty.");return;}
    if(!b){alert("Bowler name can't be empty.");return;}
    if(!inn.single&&s.toLowerCase()===n.toLowerCase()){alert("Striker and non-striker can't be the same person.");return;}
    {const lb=b.toLowerCase(); if(lb===s.toLowerCase()||(n&&lb===n.toLowerCase())){alert("The bowler can't also be a batsman — they're on opposite teams.");return;}}
    onSave({striker:s,nonStriker:inn.single?null:n,bowler:b});
    setOpen(false);
  };
  return(<>
    <button onClick={openModal} title="Edit player names or swap strike" style={{
      padding:"3px 8px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:600,
      background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.35)",color:"#6ee7b7",
      fontFamily:"'JetBrains Mono',monospace"
    }}>✏️</button>
    {open&&<Modal onClose={()=>setOpen(false)} title="🏏 Edit Players">
      <p style={{color:"#9aa8bf",fontSize:11,fontFamily:"'JetBrains Mono',monospace",marginBottom:16}}>Fix names or swap strike · scores already recorded are not affected</p>

      {/* AT THE CREASE section */}
      <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".15em",marginBottom:10}}>At the Crease</p>

      {/* Striker card */}
      <div style={{background:"rgba(245,158,11,.08)",border:"1.5px solid rgba(245,158,11,.35)",borderRadius:14,padding:"10px 12px",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{fontSize:9,fontWeight:700,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".1em",background:"rgba(245,158,11,.15)",borderRadius:4,padding:"2px 7px"}}>● ON STRIKE</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <PlayerSelectControlled value={sk} onChange={setSk} options={batOpts} placeholder="Choose striker" accent="rgba(245,158,11,.5)"/>
        </div>
      </div>

      {/* Swap button */}
      {!inn.single&&<div style={{display:"flex",justifyContent:"center",margin:"4px 0"}}>
        <button onClick={doSwap} style={{
          padding:"7px 22px",borderRadius:20,cursor:"pointer",border:"1.5px solid rgba(99,102,241,.5)",
          background:swapped?"rgba(99,102,241,.25)":"rgba(99,102,241,.1)",color:"#a5b4fc",
          fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",transition:"background .15s"
        }} title="Swap striker and non-striker">⇄ Swap Strike</button>
      </div>}

      {/* Non-striker card */}
      {!inn.single&&<div style={{background:"rgba(99,102,241,.07)",border:"1.5px solid rgba(99,102,241,.25)",borderRadius:14,padding:"10px 12px",marginTop:4,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{fontSize:9,fontWeight:700,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".1em",background:"rgba(99,102,241,.15)",borderRadius:4,padding:"2px 7px"}}>○ NON-STRIKER</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <PlayerSelectControlled value={ns} onChange={setNs} options={batOpts} placeholder="Choose non-striker" accent="rgba(99,102,241,.45)"/>
        </div>
      </div>}

      {/* Bowler section */}
      <div style={{borderTop:"1px solid #1e1b4b",paddingTop:14,marginBottom:14}}>
        <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".15em",marginBottom:8}}>Bowling This Over</p>
        <div style={{background:"rgba(52,211,153,.07)",border:"1.5px solid rgba(52,211,153,.25)",borderRadius:14,padding:"10px 12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:9,fontWeight:700,color:"#34d399",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".1em",background:"rgba(52,211,153,.15)",borderRadius:4,padding:"2px 7px"}}>🎯 BOWLER</span>
          </div>
          <PlayerSelectControlled value={bw} onChange={setBw} options={bowlOpts} placeholder="Choose bowler" accent="rgba(52,211,153,.4)"/>
        </div>
      </div>

      {swapped&&<p style={{color:"#a5b4fc",fontSize:11,fontFamily:"'JetBrains Mono',monospace",marginBottom:10,textAlign:"center"}}>⇄ Batsmen swapped — tap Save to confirm</p>}
      <button className="btn btn-primary w-full" style={{borderRadius:14}} onClick={save}>Save Changes</button>
    </Modal>}
  </>);
}

    const s=sk.trim(), n=ns.trim(), b=bw.trim();
    if(!s){alert("Striker name can't be empty.");return;}

        <label>{inn.single?"Batsman":"Striker (on strike now)"}</label>
        <div style={{marginBottom:12}}><PlayerSelectControlled value={sk} onChange={setSk} options={batOpts} placeholder="Choose striker"/></div>

function EditMatchButton({inn,onSave}){
  const[open,setOpen]=React.useState(false);
  const[ov,setOv]=React.useState(inn?.overs||0);
  const[wk,setWk]=React.useState(inn?.maxWkts||0);
  if(!inn) return null;
  const minOv = Math.ceil((inn.totalBalls||0)/6)||1; // can't set below overs already bowled
  const minWk = (inn.wickets||0)+1;                  // can't set below wickets already fallen
  const openModal=()=>{ setOv(inn.overs); setWk(inn.maxWkts); setOpen(true); };
  const save=()=>{
    const o=Number(ov), w=Number(wk);
    if(!o||o<minOv){alert(`Overs can't be less than ${minOv} (overs already bowled).`);return;}
    if(!w||w<minWk){alert(`Wickets can't be less than ${minWk} (wickets already fallen).`);return;}
    onSave({overs:o,maxWkts:w});
    setOpen(false);
  };
  return(<>
    <button onClick={openModal} style={{background:"rgba(139,92,246,.12)",border:"1px solid rgba(139,92,246,.35)",color:"#c4b5fd",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderRadius:8,padding:"4px 9px",fontWeight:600}}>✏️ Edit Match</button>
    {open&&(
      <Modal onClose={()=>setOpen(false)} title="✏️ Edit Match Settings">
        <p style={{color:"#bcc7d8",fontSize:12,marginBottom:14}}>Correct overs or wickets if they were set wrong at the start. Can't go below what's already happened in this innings.</p>
        <label>Overs per side</label>
        <input type="number" min={minOv} value={ov} onChange={e=>setOv(e.target.value)} style={{marginBottom:12}}/>
        <p style={{color:"#8291ab",fontSize:10,marginTop:-8,marginBottom:12}}>{Math.ceil((inn.totalBalls||0)/6)} overs already bowled this innings</p>
        <label>Wickets per side</label>
        <input type="number" min={minWk} value={wk} onChange={e=>setWk(e.target.value)} style={{marginBottom:12}}/>
        <p style={{color:"#8291ab",fontSize:10,marginTop:-8,marginBottom:14}}>{inn.wickets||0} wicket{inn.wickets===1?"":"s"} already fallen</p>
        <button className="btn btn-primary w-full" onClick={save}>Save Changes</button>
      </Modal>
    )}
  </>);
}

    {open&&(
      <Modal onClose={()=>setOpen(false)} title="🔑 Team Scorer PINs">

              <button onClick={()=>copy(pin)} style={{padding:"10px 13px",borderRadius:12,border:`1.5px solid ${color}66`,background:"transparent",color,cursor:"pointer",fontSize:16}} title="Copy PIN">📋</button>
            </div>
          </div>

// ── Batting Tab ───────────────────────────────────────────────────────────────
function BattingTab({inn}){
  return(
    <div style={{background:"#1e1b4b",border:"1px solid #3730a3",borderRadius:20,overflow:"hidden"}}>
      <table className="score-table">
        <thead><tr>{["Batsman","R","B","4s","6s","SR"].map((h,i)=><th key={h} style={i===0?{textAlign:"left"}:{}}>{h}</th>)}</tr></thead>
        <tbody>
          {(inn.battingOrder||[]).map(name=>{

// ── Bowling Tab ───────────────────────────────────────────────────────────────
// Computes one bowler's over-by-over spell — e.g. "1-0-4-1, 0-0-6-0, 2-0-9-1" — by pairing
// completedOvers with the parallel overBowlers array (which over belonged to which bowler).
// Pure read, no state; safe to call on every render.
function bowlerSpell(inn,name){
  const co=inn.completedOvers||[], ob=inn.overBowlers||[];
  const overs=[];
  co.forEach((events,i)=>{
    if(ob[i]!==name) return;
    let runs=0,wkts=0;
    (events||[]).forEach(ev=>{
      runs+=evRuns(ev);
      if(ev.type==="W") wkts++;
    });
    overs.push(`${runs}${wkts>0?"-"+wkts:""}`);
  });
  // The bowler's CURRENT in-progress over (if it's them bowling right now) isn't in completedOvers
  // yet — show it as a live tail so the spell is never missing the most recent action.
  if(inn.bowlerName===name&&(inn.overEvents||[]).length>0){
    let runs=0,wkts=0;
    inn.overEvents.forEach(ev=>{ runs+=evRuns(ev); if(ev.type==="W") wkts++; });
    overs.push(`${runs}${wkts>0?"-"+wkts:""}*`);
  }
  return overs;
}

function BowlingTab({inn}){
  const[expanded,setExpanded]=React.useState(null);
  return(
    <div style={{background:"#1e1b4b",border:"1px solid #3730a3",borderRadius:20,overflow:"hidden"}}>
      <table className="score-table">
        <thead><tr>{["Bowler","O","M","R","W","Econ"].map((h,i)=><th key={h} style={i===0?{textAlign:"left"}:{}}>{h}</th>)}</tr></thead>
        <tbody>
          {(inn.bowlingOrder||[]).map(name=>{
            const b=inn.bowlers[name];
            const balls=b.overs*6+b.ballsThisOver;
            const econ=balls>0?((b.runs/balls)*6).toFixed(2):"—";
            const spell=bowlerSpell(inn,name);
            const hasMultiOverSpell=spell.length>1; // a single-over spell just repeats the R column above
            const isOpen=expanded===name&&hasMultiOverSpell;
            return(
              <React.Fragment key={name}>
                <tr onClick={()=>hasMultiOverSpell&&setExpanded(isOpen?null:name)} style={{cursor:hasMultiOverSpell?"pointer":"default"}}>
                  <td style={{fontFamily:"'Inter',sans-serif",fontWeight:600}}>
                    {name}{name===inn.bowlerName&&<span style={{color:"#fbbf24",fontSize:10,marginLeft:6}}>●</span>}
                    {hasMultiOverSpell&&<span style={{color:"var(--text-mute)",fontSize:10,marginLeft:6}}>{isOpen?"▲":"▾"}</span>}
                  </td>
                  <td>{b.overs}.{b.ballsThisOver}</td>

                  <td style={{color:"#9aa8bf"}}>{b.runs}</td>
                  <td style={{color:"#f87171",fontWeight:700}}>{b.wickets}</td>
                  <td style={{color:"#9aa8bf"}}>{econ}</td>
                </tr>

                  <tr>
                    <td colSpan={6} style={{background:"rgba(0,0,0,.15)",padding:"8px 12px"}}>
                      <p style={{fontSize:9,color:"var(--text-mute)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Runs conceded per over bowled</p>
                      <p style={{fontSize:12,color:"var(--text-dim)",fontFamily:"'JetBrains Mono',monospace"}}>{spell.join(", ")}</p>

      </table>

// Reusable player dropdown — a real <select> (no manual typing needed), with an "➕ Add new player…"
// choice that swaps in a one-off text box for the rare case of someone not in the list. Writes the
// chosen/typed value into inputRef.current.value so existing go() handlers (which read the ref) keep
// working unchanged. Options are expected pre-sorted A–Z by the caller.
// Given a team NAME, return that team's assigned squad as a deduped, A–Z-sorted list — used to
// populate every player dropdown in the app. If squads were assigned for this match (pubTeamA /
// pubTeamB), the list is that team's members; otherwise we fall back to the whole club roster.
// Team matching is case-/whitespace-insensitive so a stray trailing space on a name never drops the
// squad back to the full roster. `extra` names (e.g. players already in this innings) are folded in
// so a dropdown never omits someone who's genuinely on the field.
function squadOptions(match, teamName, rosterNames, extra){
  const az=(a,b)=>String(a).localeCompare(String(b));
  const norm=s=>String(s==null?"":s).trim().toLowerCase();
  const hasPub=((match&&match.pubTeamA&&match.pubTeamA.length>0)||(match&&match.pubTeamB&&match.pubTeamB.length>0));
  let list;
  if(hasPub){
    list = norm(teamName)===norm(match&&match.teamA) ? (match.pubTeamA||[])
         : norm(teamName)===norm(match&&match.teamB) ? (match.pubTeamB||[])
         : (rosterNames||[]);
  } else {
    list = rosterNames||[];
  }
  return [...new Set([...(list||[]),...((extra||[]).filter(Boolean))].filter(Boolean))].sort(az);
}

function PlayerSelect({inputRef,options,placeholder}){
  const[val,setVal]=React.useState("");
  const[adding,setAdding]=React.useState(false);
  const[typed,setTyped]=React.useState("");
  // keep a hidden holder in sync so refs used by existing submit handlers still read a value
  const holder=React.useRef({value:""});
  React.useEffect(()=>{ if(inputRef) inputRef.current=holder.current; },[inputRef]);
  const set=(v)=>{ holder.current.value=v; setVal(v); };
  if(adding){
    return(
      <div style={{display:"flex",gap:6}}>
        <input autoFocus value={typed} onChange={e=>{setTyped(e.target.value);holder.current.value=e.target.value;}}
          placeholder="New player name…" style={{flex:1,fontSize:13}}/>
        <button type="button" onClick={()=>{setAdding(false);setTyped("");set("");}}
          style={{padding:"0 12px",borderRadius:10,border:"1px solid rgba(148,163,184,.3)",background:"transparent",color:"#94a3b8",cursor:"pointer",fontSize:12}}>✕</button>
      </div>
    );
  }
  return(
    <select value={val} onChange={e=>{ if(e.target.value==="__add__"){setAdding(true);holder.current.value="";} else set(e.target.value); }}
      style={{width:"100%",fontSize:13,padding:"10px",borderRadius:10,background:"#1e1b4b",color:val?"#e5e7eb":"#9aa8bf",border:"1px solid rgba(99,102,241,.3)"}}>
      <option value="">{placeholder||"Choose player…"}</option>
      {(options||[]).map(n=><option key={n} value={n} style={{color:"#e5e7eb"}}>{n}</option>)}
      <option value="__add__" style={{color:"#6ee7b7"}}>➕ Add new player…</option>
    </select>
  );
}

// Controlled variant of PlayerSelect for the "edit / fix players" modals, where the field is
// pre-filled with the CURRENT player and driven by value/onChange state (not a ref). Same team-aware
// dropdown + "➕ Add new player…" escape hatch. The current value is always merged into the options
// so an existing name is selectable even if it isn't in the assigned squad.
function PlayerSelectControlled({value,onChange,options,placeholder,accent}){
  const[adding,setAdding]=React.useState(false);
  const az=(a,b)=>String(a).localeCompare(String(b));
  const opts=[...new Set([...(options||[]),...(value?[value]:[])].filter(Boolean))].sort(az);
  const border=accent||"rgba(99,102,241,.4)";
  const base={flex:1,width:"100%",background:"rgba(7,5,15,.8)",border:`1.5px solid ${border}`,borderRadius:10,
    padding:"10px 12px",fontSize:14,fontFamily:"'Inter',sans-serif",outline:"none"};
  if(adding){
    return(
      <div style={{display:"flex",gap:6,width:"100%"}}>
        <input autoFocus value={value} onChange={e=>onChange(e.target.value)} placeholder="New player name…" style={{...base,color:"#fff"}}/>
        <button type="button" onClick={()=>{setAdding(false);onChange("");}}
          style={{padding:"0 12px",borderRadius:10,border:"1px solid rgba(148,163,184,.3)",background:"transparent",color:"#94a3b8",cursor:"pointer",fontSize:12}}>✕</button>
      </div>
    );
  }
  return(
    <select value={opts.includes(value)?value:""} onChange={e=>{ if(e.target.value==="__add__"){onChange("");setAdding(true);} else onChange(e.target.value); }}
      style={{...base,color:value?"#fff":"#9aa8bf"}}>
      <option value="">{placeholder||"Choose player…"}</option>
      {opts.map(n=><option key={n} value={n} style={{color:"#e5e7eb"}}>{n}</option>)}
      <option value="__add__" style={{color:"#6ee7b7"}}>➕ Add new player…</option>
    </select>
  );
}

    if(!single&&!ns){alert("Enter the non-striker (or admin can set Single batsman mode at Lakes).");return;}
    // Striker and non-striker must be two DIFFERENT people — same name on both is a data error that
    // would corrupt the scorecard (one player credited for both ends). Case-insensitive check.
    if(!single&&s.toLowerCase()===ns.toLowerCase()){alert("Striker and non-striker must be two different players.");return;}

    const lb=bw.toLowerCase();

          {match?.tossSummary&&<p style={{color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",fontSize:12,marginTop:6}}>🪙 {match.tossSummary}</p>}
        </div>
        <div className="card space-y-4">
          <div style={{background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.25)",borderRadius:14,padding:"10px 14px",textAlign:"center"}}>
            <span style={{color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:600}}>🏏 {inn.battingTeam} is batting first</span>
          </div>
          <p style={{color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".15em"}}>{inn.battingTeam}'s opening {single?"batsman":"pair"}</p>
          {(()=>{
            // Batsmen come from the batting team's assigned squad, the bowler from the bowling team's
            // (whole-club roster when no squads were assigned). Everything is a real dropdown — no
            // manual typing — with a "➕ Add new player…" choice for a genuinely new name.
            const batOpts=squadOptions(match, inn.battingTeam, rosterNames);
            const bowlOpts=squadOptions(match, inn.bowlingTeam, rosterNames);
            return(<>

          <p style={{color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",fontSize:13,marginTop:4}}>{inn.battingTeam} · {ovStr(inn.totalBalls)} overs{single?" · single batsman":""}</p>
        </div>
        <div className="card space-y-4">
          <div className="tag-amber">🎯 {inn.bowlingTeam} need {inn.totalRuns+1} to win in {inn.overs} overs</div>
          <div className="divider"/>
          <p style={{color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".15em"}}>{inn.bowlingTeam}'s opening {single?"batsman":"pair"}</p>
          <div><label>🟡 {single?"Batsman":"Striker (on strike)"}</label>

              style={{marginTop:4,borderRadius:14,fontSize:13,padding:"12px",background:"transparent",border:"1.5px solid rgba(139,92,246,.4)",color:"#a78bfa"}}>⚙️ Edit Overs ({inn.overs})</button>
          )}

            <button className="btn w-full" onClick={onUndoLastBall}
              style={{marginTop:4,borderRadius:14,fontSize:13,padding:"12px",background:"transparent",border:"1.5px solid rgba(96,165,250,.5)",color:"#60a5fa"}}>

            <button className="btn w-full" onClick={()=>{

              // offer to adjust the over count as part of the revert.

                const v=prompt(`1st innings is now live again. Change match overs if needed (currently ${inn.overs}). Enter new total overs, or Cancel to keep:`,String(inn.overs));

      </div>
    </div>
  );

// ── Scorecard canvas builder — shared by MatchOver and MatchDetailView ────────
function buildScorecardCanvas(i1,i2,result,match){
  const W=800,pad=32;
  const allBat1=(i1?.battingOrder||[]).map(n=>{const b=i1.batsmen[n];const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):"0.0";return[n,b.out?b.howOut:b.retired?"retired":"not out",b.runs,b.balls,b.fours,b.sixes,sr];});
  const allBat2=(i2?.battingOrder||[]).map(n=>{const b=i2.batsmen[n];const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):"0.0";return[n,b.out?b.howOut:b.retired?"retired":"not out",b.runs,b.balls,b.fours,b.sixes,sr];});
  const allBwl1=(i1?.bowlingOrder||[]).map(n=>{const b=i1.bowlers[n];const bl=b.overs*6+b.ballsThisOver;return[n,`${b.overs}.${b.ballsThisOver}`,b.maidens,b.runs,b.wickets,bl>0?((b.runs/bl)*6).toFixed(2):"0.00"];});
  const allBwl2=(i2?.bowlingOrder||[]).map(n=>{const b=i2.bowlers[n];const bl=b.overs*6+b.ballsThisOver;return[n,`${b.overs}.${b.ballsThisOver}`,b.maidens,b.runs,b.wickets,bl>0?((b.runs/bl)*6).toFixed(2):"0.00"];});

  const rowH=28,headH=44,secH=36,extraH=28,divH=2;
  const tableW=W-pad*2;
  const batCols=[tableW*0.3,tableW*0.28,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07];
  const bwlCols=[tableW*0.35,tableW*0.1,tableW*0.1,tableW*0.1,tableW*0.1,tableW*0.12,tableW*0.13];

  const headerH=match?.tossSummary?96:80;
  const H=headerH+secH+headH+(allBat1.length*rowH)+extraH+divH+
           secH+headH+(allBwl1.length*rowH)+40+
           secH+headH+(allBat2.length*rowH)+extraH+divH+
           secH+headH+(allBwl2.length*rowH)+60;

  const cv=document.createElement("canvas");
  cv.width=W*2;cv.height=H*2;
  const ctx=cv.getContext("2d");
  ctx.scale(2,2);

  // Background
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#0f0c29");bg.addColorStop(0.5,"#1a1040");bg.addColorStop(1,"#0d1223");
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  let y=0;

  // Header banner
  const hb=ctx.createLinearGradient(0,0,W,headerH);
  hb.addColorStop(0,"#1e1b4b");hb.addColorStop(1,"#13103a");
  ctx.fillStyle=hb;ctx.fillRect(0,0,W,headerH);
  ctx.fillStyle="#818cf8";ctx.font="bold 11px 'JetBrains Mono',monospace";ctx.textAlign="center";
  ctx.fillText(`LCC · LINDENHURST CRICKET CLUB · ${(i2?.format==="T20"?"T20 @ MILLENNIUM PARK":((i2?.overs||i1?.overs||0)+"-OVER @ LAKES HIGH SCHOOL"))}`,W/2,22);
  const resultTxt=result?.winner?`${result.winner} won${result.margin?" by "+result.margin:""}`:i2?"Match Tied":"";
  ctx.fillStyle="#fbbf24";ctx.font="bold 22px 'Oswald',sans-serif";
  ctx.fillText(resultTxt,W/2,52);
  const s1=i1?`${i1.battingTeam}: ${i1.totalRuns}/${i1.wickets} (${ovStr(i1.totalBalls)} ov)`:"";
  const s2=i2?`${i2.battingTeam}: ${i2.totalRuns}/${i2.wickets} (${ovStr(i2.totalBalls)} ov)`:"";
  ctx.fillStyle="#a5b4fc";ctx.font="12px 'Inter',sans-serif";
  ctx.fillText(`${s1}   |   ${s2}`,W/2,72);
  if(match?.tossSummary){ctx.fillStyle="#34d399";ctx.font="11px 'JetBrains Mono',monospace";ctx.fillText(`🪙 ${match.tossSummary}`,W/2,90);}
  y=headerH;

  const drawSection=(title,color)=>{
    ctx.fillStyle=color||"#1e1b4b";ctx.fillRect(0,y,W,secH);
    ctx.fillStyle="#fff";ctx.font="bold 13px 'Oswald',sans-serif";ctx.textAlign="left";
    ctx.fillText(title,pad,y+secH/2+5);
    y+=secH;
  };
  const drawTableHead=(cols,labels)=>{
    ctx.fillStyle="#252060";ctx.fillRect(0,y,W,headH);
    let x=pad;
    labels.forEach((l,i)=>{
      ctx.fillStyle="#818cf8";ctx.font="bold 10px 'JetBrains Mono',monospace";
      ctx.textAlign=i===0?"left":"right";
      ctx.fillText(l,i===0?x:x+cols[i]-4,y+headH/2+4);
      x+=cols[i];
    });
    y+=headH;
  };
  const drawRow=(cols,cells,even)=>{
    ctx.fillStyle=even?"rgba(30,27,75,.4)":"transparent";ctx.fillRect(0,y,W,rowH);
    let x=pad;
    cells.forEach((c,i)=>{
      ctx.fillStyle=i===2?"#fbbf24":i===1?"#9aa8bf":"#e0e7ff";
      ctx.font=i===0?"bold 11px 'Inter',sans-serif":"11px 'JetBrains Mono',monospace";
      ctx.textAlign=i===0?"left":"right";
      const txt=String(c);
      ctx.fillText(txt.length>22&&i===0?txt.slice(0,20)+"…":txt,i===0?x:x+cols[i]-4,y+rowH/2+4);
      x+=cols[i];
    });
    y+=rowH;
  };
  const drawExtras=(ext)=>{
    if(!ext)return;
    ctx.fillStyle="rgba(30,27,75,.3)";ctx.fillRect(0,y,W,extraH);
    ctx.fillStyle="#9aa8bf";ctx.font="11px 'JetBrains Mono',monospace";ctx.textAlign="left";
    ctx.fillText(`Extras: WD ${ext.wd||0}  NB ${ext.nb||0}  B ${ext.b||0}  LB ${ext.lb||0}  Total ${(ext.wd||0)+(ext.nb||0)+(ext.b||0)+(ext.lb||0)}`,pad,y+extraH/2+4);
    y+=extraH;
  };
  const hline=()=>{ctx.fillStyle="#3730a3";ctx.fillRect(0,y,W,divH);y+=divH;};

  // 1st Innings batting
  if(i1?.battingTeam){
    drawSection(`🟡 ${i1.battingTeam} — 1st Innings  ${i1.totalRuns}/${i1.wickets} (${ovStr(i1.totalBalls)} ov)`,"#0f3a1a");
    drawTableHead(batCols,["Batsman","Dismissal","R","B","4s","6s","SR"]);
    allBat1.forEach((r,i)=>drawRow(batCols,r,i%2===0));
    drawExtras(i1.extras);
    hline();
    drawSection(`🎯 ${i2?.battingTeam||""} Bowling`,"#1a0f3a");
    drawTableHead(bwlCols,["Bowler","O","M","R","W","Econ"]);
    allBwl1.forEach((r,i)=>drawRow(bwlCols,r,i%2===0));
    y+=40;
  }
  // 2nd Innings batting
  if(i2?.battingTeam){
    drawSection(`🟡 ${i2.battingTeam} — 2nd Innings  ${i2.totalRuns}/${i2.wickets} (${ovStr(i2.totalBalls)} ov)`,"#0f3a1a");
    drawTableHead(batCols,["Batsman","Dismissal","R","B","4s","6s","SR"]);
    allBat2.forEach((r,i)=>drawRow(batCols,r,i%2===0));
    drawExtras(i2.extras);
    hline();
    drawSection(`🎯 ${i1?.battingTeam||""} Bowling`,"#1a0f3a");
    drawTableHead(bwlCols,["Bowler","O","M","R","W","Econ"]);
    allBwl2.forEach((r,i)=>drawRow(bwlCols,r,i%2===0));
    y+=30;
  }

  // Footer
  const dt=new Date(match?.finishedAt||Date.now()).toLocaleString();
  ctx.fillStyle="#4338ca";ctx.font="10px 'JetBrains Mono',monospace";ctx.textAlign="center";
  ctx.fillText(`Generated by LCC Scorer · ${dt}`,W/2,y+20);

  return cv;
}

// ── Match Over ────────────────────────────────────────────────────────────────
// ── Player of the Match Voting ────────────────────────────────────────────────
function POTMVoting({inn,inn1,potm,role}){
  // deviceId persisted across sessions so one vote per device, myVote survives refresh
  const deviceId=React.useMemo(()=>{
    try{
      let id=localStorage.getItem("lcc_device_id");
      if(!id){id="d_"+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("lcc_device_id",id);}
      return id;
    }catch(e){return "d_"+Math.random().toString(36).slice(2);}
  },[]);
  const[myName,setMyName]=React.useState(()=>{try{return localStorage.getItem("lcc_potm_voter")||null;}catch(e){return null;}});

  // All players who batted or bowled in either innings
  const participants=React.useMemo(()=>{
    const s=new Set();
    [inn1,inn].forEach(i=>{if(!i)return;Object.keys(i.batsmen||{}).forEach(n=>s.add(n));(i.bowlingOrder||[]).forEach(n=>s.add(n));});
    return[...s].sort();
  },[inn,inn1]);

  // Auto-suggested standout performer — a hint only, never forces anyone's vote. Simple impact score:
  // runs plus a wicket weighting (roughly how POTM tends to get decided informally), highest wins.
  // IMPORTANT: this hook must stay above every early return in this component (Rules of Hooks) — it
  // was originally placed after one, which is a real bug (conditional hook calls); fixed here.
  const suggested=React.useMemo(()=>{
    const impact={};
    [inn1,inn].forEach(i=>{
      if(!i) return;
      Object.entries(i.batsmen||{}).forEach(([n,b])=>{ impact[n]=(impact[n]||0)+(b.runs||0); });
      Object.entries(i.bowlers||{}).forEach(([n,w])=>{ impact[n]=(impact[n]||0)+(w.wickets||0)*20; });
    });
    let best=null,max=-1;
    Object.entries(impact).forEach(([n,v])=>{ if(v>max){max=v;best=n;} });
    return max>0?best:null;
  },[inn,inn1]);

  const votes=potm?.votes||{};
  const counts={};
  Object.values(votes).forEach(v=>{if(v?.votedFor)counts[v.votedFor]=(counts[v.votedFor]||0)+1;});
  const totalVotes=Object.values(counts).reduce((a,b)=>a+b,0);
  const myVote=votes[deviceId]?.votedFor||null;

  const castVote=(name)=>{
    if(!myName||!FB_OK||!DB)return;
    if(myVote===name){
      // Tapping your current pick again retracts it — lets you undo without being forced to pick
      // someone else first.
      DB.ref("potm/votes/"+deviceId).remove().catch(()=>{});
      if(potm?.matchId) DB.ref("history/"+potm.matchId+"/potmVoting/votes/"+deviceId).remove().catch(()=>{});
      return;
    }
    const voteData={voter:myName,votedFor:name,at:Date.now()};
    // Write to live potm node (for real-time display on this screen)
    DB.ref("potm/votes/"+deviceId).set(voteData).catch(()=>{});
    // Also write to history so votes persist permanently
    if(potm?.matchId) DB.ref("history/"+potm.matchId+"/potmVoting/votes/"+deviceId).set(voteData).catch(()=>{});
  };

  const closeAndAnnounce=()=>{
    if(!FB_OK||!DB)return;
    let winner=null,max=0;
    Object.entries(counts).forEach(([n,c])=>{if(c>max){max=c;winner=n;}});
    if(!winner&&participants.length>0)winner=participants[0];
    const closedAt=Date.now();
    DB.ref("potm").update({open:false,winner,closedAt}).catch(()=>{});
    // Save winner permanently to history entry
    if(potm?.matchId){
      DB.ref("history/"+potm.matchId+"/potmVoting").update({open:false,winner,closedAt}).catch(()=>{});
      DB.ref("history/"+potm.matchId+"/potm").set(winner).catch(()=>{});
    }
    DB.ref("announcement").set({text:`🏆 Player of the Match: ${winner}! (${max} vote${max===1?"":"s"})`,by:"LCC",ts:Date.now()}).catch(()=>{});
  };

  // ── Winner declared ────────────────────────────────────────────────────────
  if(potm?.winner){
    const winnerVotes=counts[potm.winner]||0;
    return(
      <div style={{background:"linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.1))",border:"2px solid rgba(245,158,11,.5)",borderRadius:20,padding:"20px 18px",marginTop:20,textAlign:"center"}}>
        <div style={{fontSize:42,marginBottom:6}}>🏆</div>
        <p style={{fontSize:10,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".2em",marginBottom:6}}>PLAYER OF THE MATCH</p>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:28,fontWeight:700,color:"#fbbf24",marginBottom:4}}>{potm.winner}</p>
        <p style={{fontSize:11,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace"}}>{winnerVotes} vote{winnerVotes===1?"":"s"} · {totalVotes} total</p>
      </div>
    );
  }

  if(!potm?.open) return null;

  // ── Step 1: Identify yourself ──────────────────────────────────────────────
  if(!myName){
    return(
      <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"18px 16px",marginTop:20}}>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,marginBottom:4}}>🏆 Player of the Match</p>
        <p style={{color:"#bcc7d8",fontSize:12,marginBottom:14}}>Who are you? Pick your name to cast your vote.</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {participants.map(n=>(
            <button key={n} onClick={()=>{setMyName(n);try{localStorage.setItem("lcc_potm_voter",n);}catch(e){}}}
              style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid rgba(99,102,241,.4)",
                background:"rgba(99,102,241,.12)",color:"#a5b4fc",fontSize:13,cursor:"pointer",
                fontFamily:"'Inter',sans-serif",fontWeight:600}}>
              {n}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Step 2: Cast your vote ─────────────────────────────────────────────────
  const sorted=[...participants].sort((a,b)=>(counts[b]||0)-(counts[a]||0));
  return(
    <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"18px 16px",marginTop:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <p style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,marginBottom:2}}>🏆 Player of the Match</p>
          <p style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>Voting as {myName}{myVote?` · voted for ${myVote}`:""}</p>
        </div>
        <button onClick={()=>{setMyName(null);try{localStorage.removeItem("lcc_potm_voter");}catch(e){}}}
          style={{background:"none",border:"none",color:"#9aa8bf",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>Not you?</button>
      </div>
      {suggested&&!myVote&&(
        <p style={{fontSize:11,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>⭐ Standout performance: {suggested} — but vote for whoever you think earned it.</p>
      )}
      <p style={{fontSize:10,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>{myVote?"Tap a different name to change your vote, or tap your pick again to remove it.":"Tap a name to vote — you can change your mind anytime before voting closes."}</p>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {sorted.filter(n=>n!==myName).map(n=>{
          const c=counts[n]||0;
          const pct=totalVotes>0?Math.round((c/totalVotes)*100):0;
          const isMyVote=myVote===n;
          return(
            <button key={n} onClick={()=>castVote(n)} style={{
              display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"11px 14px",borderRadius:14,cursor:"pointer",
              border:isMyVote?"2px solid #fbbf24":"1.5px solid rgba(99,102,241,.3)",
              background:isMyVote?"rgba(245,158,11,.15)":"rgba(255,255,255,.03)",
              color:"#fff",textAlign:"left",position:"relative",overflow:"hidden"
            }}>
              {/* vote bar */}
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:pct+"%",background:"rgba(245,158,11,.08)",transition:"width .4s ease"}}/>
              <span style={{fontWeight:isMyVote?700:500,fontSize:14,position:"relative"}}>{n}{n===suggested&&<span style={{marginLeft:6,fontSize:11}}>⭐</span>}{isMyVote&&<span style={{color:"#fbbf24",marginLeft:6,fontSize:11}}>✓ your vote</span>}</span>
              <span style={{fontSize:11,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",position:"relative"}}>{c} vote{c===1?"":"s"}</span>
            </button>
          );
        })}
      </div>
      <p style={{fontSize:10,color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",marginBottom:role==="admin"?10:0}}>{totalVotes} vote{totalVotes===1?"":"s"} cast · {Object.keys(votes).length} player{Object.keys(votes).length===1?"":"s"} voted</p>
      {role==="admin"&&(
        <button onClick={closeAndAnnounce} style={{
          width:"100%",padding:"12px",borderRadius:14,border:"none",cursor:"pointer",
          background:"linear-gradient(135deg,#f59e0b,#d97706)",
          color:"#111",fontWeight:700,fontSize:14,fontFamily:"'Inter',sans-serif"
        }}>🏆 Close Voting & Announce Winner</button>
      )}
    </div>
  );
}

// End-of-match FINALE — a bigger, one-time celebratory burst on the result screen itself (the actual
// emotional peak of the match), on top of the milestone celebrations that already fire during play.
// Ties (no winner) get a calmer "Match Tied" treatment, no confetti.
// End-of-match FINALE — a full fireworks show over a dark vignette, with a gold winner banner:
// the actual emotional peak of the match. One-time, ~6.5s, auto-fades, pointerEvents:none so the
// result screen underneath stays fully tappable throughout. Portalled to <body> so no ancestor
// backdrop-filter can clip it. Ties (no winner) get no finale.
function MatchFinale({winner}){
  const[show,setShow]=React.useState(true);
  React.useEffect(()=>{ const t=setTimeout(()=>setShow(false),6500); return ()=>clearTimeout(t); },[]);
  if(!show||!winner||typeof document==="undefined") return null;
  // A staggered volley of bursts across the top two-thirds of the screen — like a real display,
  // they don't all go off at once.
  const bursts=[
    {x:"20%",y:"22%",d:0.0},{x:"78%",y:"16%",d:0.5},{x:"50%",y:"30%",d:1.0},
    {x:"12%",y:"42%",d:1.6},{x:"86%",y:"38%",d:2.1},{x:"38%",y:"12%",d:2.7},
    {x:"64%",y:"46%",d:3.3},{x:"26%",y:"26%",d:3.9},{x:"74%",y:"22%",d:4.5},
    {x:"48%",y:"18%",d:5.1},
  ];
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:150,pointerEvents:"none",overflow:"hidden",
      animation:"finaleFade 6.5s ease both"}}>
      {/* Dark vignette so the fireworks pop like a night sky, while the centre stays readable. */}
      <div style={{position:"absolute",inset:0,
        background:"radial-gradient(ellipse at 50% 40%, rgba(2,6,23,.25), rgba(2,6,23,.72))"}}/>
      {bursts.map((b,i)=><Firework key={i} x={b.x} y={b.y} delay={b.d}
        count={i%3===0?30:24} dist={i%3===0?130:100}/>)}
      <div style={{position:"absolute",top:"20%",left:0,right:0,textAlign:"center",padding:"0 20px",
        animation:"milestoneIn .55s cubic-bezier(.22,1,.36,1) .25s both"}}>
        <div style={{fontSize:56,filter:"drop-shadow(0 0 24px rgba(251,191,36,.8))"}}>🏆</div>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:40,fontWeight:800,fontStyle:"italic",
          lineHeight:1.05,letterSpacing:".03em",
          background:"linear-gradient(180deg,#fff7d6,#fbbf24 55%,#d97706)",
          WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
          filter:"drop-shadow(0 4px 20px rgba(251,191,36,.55)) drop-shadow(0 1px 2px rgba(0,0,0,.8))"}}>
          {winner}
        </div>
        <div style={{marginTop:6,fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,
          letterSpacing:".35em",color:"#fde68a",textTransform:"uppercase",
          textShadow:"0 0 14px rgba(251,191,36,.6)"}}>Champions of the day</div>
      </div>
    </div>,
    document.body
  );
}

function MatchOver({result,inn,inn1,match,potm,role,onRevert,canRevert,onNew,onUndoLastBall,canUndoLastBall}){
  const[saving,setSaving]=React.useState(false);

  const[scorecardUrl,setScorecardUrl]=React.useState(null);

  const openScorecard=()=>{
    setSaving(true);
    setTimeout(()=>{
      try{
        const i1=inn1||{battingTeam:"",bowlingTeam:"",totalRuns:0,wickets:0,totalBalls:0,battingOrder:[],batsmen:{},bowlers:{},bowlingOrder:[],extras:{wd:0,nb:0,b:0,lb:0}};
        const cv=buildScorecardCanvas(i1,inn,result,match);
        setScorecardUrl(cv.toDataURL("image/png"));
        setSaving(false);
      }catch(e){console.error("Scorecard error:",e);setSaving(false);}
    },100);
  };

  // WhatsApp-ready RESULT CARD — compact summary image (result, both innings, top batter & bowler),
  // shared via the native share sheet when available, otherwise downloaded.
  const shareResult=()=>{
    try{
      const i1=inn1||{battingTeam:"",totalRuns:0,wickets:0,totalBalls:0,batsmen:{},bowlers:{},battingOrder:[],bowlingOrder:[]};
      const W=800,H=460,cv=document.createElement("canvas");cv.width=W;cv.height=H;const x=cv.getContext("2d");
      const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,"#020617");g.addColorStop(.6,"#0a1a3a");g.addColorStop(1,"#0e2148");
      x.fillStyle=g;x.fillRect(0,0,W,H);
      x.strokeStyle="rgba(34,211,238,.5)";x.lineWidth=3;x.strokeRect(10,10,W-20,H-20);
      x.fillStyle="#22d3ee";x.font="700 20px Oswald, sans-serif";x.textAlign="center";
      x.fillText("LINDENHURST CRICKET CLUB",W/2,52);
      x.fillStyle="#fff";x.font="700 34px Oswald, sans-serif";
      x.fillText(`${result?.winner||"Match"} ${result?.winner?"WON":"RESULT"}${result?.margin?" by "+result.margin:""}`,W/2,102);
      const line=(i,y)=>{ if(!i||!i.battingTeam) return;
        x.textAlign="left";x.fillStyle="#93a4c8";x.font="600 18px Inter, sans-serif";x.fillText(i.battingTeam,60,y);
        x.textAlign="right";x.fillStyle="#fff";x.font="700 26px Oswald, sans-serif";
        x.fillText(`${i.totalRuns}/${i.wickets}  (${Math.floor((i.totalBalls||0)/6)}.${(i.totalBalls||0)%6} ov)`,W-60,y); };
      line(i1,168); line(inn,210);
      const top=(i)=>{ if(!i) return ["",""];
        let tb=null;(i.battingOrder||[]).forEach(n=>{const b=i.batsmen[n];if(b&&(!tb||b.runs>tb.runs))tb={...b,n};});
        let tw=null;(i.bowlingOrder||[]).forEach(n=>{const b=i.bowlers[n];if(b&&(!tw||b.wickets>tw.wickets))tw={...b,n};});
        return [tb?`${tb.n} ${tb.runs}(${tb.balls})`:"", tw&&tw.wickets>0?`${tw.n} ${tw.wickets}/${tw.runs}`:""]; };
      const[t1b,t1w]=top(i1),[t2b,t2w]=top(inn);
      x.textAlign="center";x.fillStyle="#22d3ee";x.font="600 13px 'JetBrains Mono', monospace";
      x.fillText("TOP PERFORMERS",W/2,268);
      x.fillStyle="#eaf2ff";x.font="500 16px Inter, sans-serif";
      [t1b&&"🏏 "+t1b,t1w&&"🎯 "+t1w,t2b&&"🏏 "+t2b,t2w&&"🎯 "+t2w].filter(Boolean).forEach((s,i)=>x.fillText(s,W/2,300+i*30));
      x.fillStyle="#5f7099";x.font="500 12px 'JetBrains Mono', monospace";
      x.fillText((match?.venue?match.venue+" · ":"")+new Date().toLocaleDateString(),W/2,H-32);
      cv.toBlob(async(blob)=>{
        const fname="LCC-result.png";
        try{
          const file=new File([blob],fname,{type:"image/png"});
          if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:"Match result"}); return; }
        }catch(e){}
        const a=document.createElement("a");a.download=fname;a.href=URL.createObjectURL(blob);
        document.body.appendChild(a);a.click();document.body.removeChild(a);
      },"image/png");
    }catch(e){ alert("Couldn't build the share card: "+(e.message||e)); }
  };
  const downloadScorecard=()=>{
    if(!scorecardUrl)return;
    const i1=inn1||{battingTeam:""};
    const fname=`LCC-${(i1.battingTeam||"team").replace(/\s+/g,"-")}-vs-${(inn.battingTeam||"team").replace(/\s+/g,"-")}.png`;
    const a=document.createElement("a");a.download=fname;a.href=scorecardUrl;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  };

  // Inline innings highlights
  const innHighlight=(inn)=>{
    if(!inn) return null;
    const bats=Object.entries(inn.batsmen||{}).sort((a,b)=>b[1].runs-a[1].runs);
    const top=bats[0];
    const bowls=Object.entries(inn.bowlers||{}).filter(([,b])=>b.wickets>0).sort((a,b)=>b[1].wickets-a[1].wickets||a[1].runs-b[1].runs);
    const bestBowl=bowls[0];
    return {top,bestBowl};
  };

    {/* In-page scorecard modal */}

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",
          borderBottom:"1px solid rgba(99,102,241,.25)",background:"rgba(8,6,30,.98)",flexShrink:0}}>

          iOS: long-press image → Save to Photos · Android/Desktop: tap Save above

    <div className="screen">

          </button>
          {canUndoLastBall&&(
            <button className="btn" onClick={onUndoLastBall} style={{padding:"13px 20px",fontSize:14,background:"transparent",border:"1.5px solid rgba(96,165,250,.5)",color:"#60a5fa",borderRadius:14}}>
              ↩ Undo Last Ball <span style={{display:"block",fontSize:10,color:"#9aa8bf",fontWeight:400,marginTop:2}}>Just this delivery — e.g. if it wrongly ended the match again</span>
            </button>
          )}
          {canRevert&&(
            <button className="btn" onClick={onRevert} style={{padding:"13px 20px",fontSize:14,background:"transparent",border:"1.5px solid rgba(52,211,153,.5)",color:"#34d399",borderRadius:14}}>↩️ Revert — bring match back to live</button>
          )}
          <button className="btn btn-ghost" onClick={onNew} style={{padding:"13px 20px",fontSize:14}}>🏏 New Match</button>
