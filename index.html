function PinGate({title,pin,altPin,verify,hint,onOk,onCancel,rememberKey}){
  const[val,setVal]=React.useState("");
  const[err,setErr]=React.useState(false);
  const[errMsg,setErrMsg]=React.useState("");
  const[remember,setRemember]=React.useState(false);
  const submit=()=>{
    const finish=(r)=>{
      // Opt-in only — never remembered unless the person explicitly ticks the box. Scoped to a
      // caller-provided key (e.g. per matchId) so it can't leak into unlocking a DIFFERENT match later.
      if(remember&&rememberKey){ try{localStorage.setItem(rememberKey,val);}catch(e){} }
      onOk(r);
    };
    if(verify){
      const r=verify(val);
      if(r.ok){finish(r);}else{setErr(true);setErrMsg(r.msg||"❌ Wrong PIN");setVal("");}
    } else {
      if(val===pin||(altPin&&val===altPin)){finish();}else{setErr(true);setErrMsg("❌ Wrong PIN, try again");setVal("");}
    }
  };
  return(
    <div className="result-screen"><div className="result-card" style={{maxWidth:360,textAlign:"center"}}>
      <div style={{fontSize:44,marginBottom:10}}>🔒</div>
      <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:24,fontWeight:700,marginBottom:4}}>{title}</h2>
      <p style={{color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:hint?6:18}}>Enter PIN to continue</p>
      {hint&&<p style={{color:"#34d399",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:16}}>● {hint}</p>}
      <input type="password" inputMode="numeric" value={val} autoFocus
        onChange={e=>{setVal(e.target.value);setErr(false);}}
        onKeyDown={e=>e.key==="Enter"&&submit()}
        placeholder="••••"
        style={{width:"100%",textAlign:"center",letterSpacing:"0.5em",fontSize:22,background:"rgba(7,5,15,.8)",border:`1.5px solid ${err?"#ef4444":"rgba(99,102,241,.4)"}`,borderRadius:14,padding:"12px",color:"#fff",fontFamily:"'JetBrains Mono',monospace",outline:"none",marginBottom:12}}/>
      {err&&<p style={{color:"#f87171",fontSize:12,marginBottom:12,fontFamily:"'Inter',sans-serif",lineHeight:1.4}}>{errMsg}</p>}
      {rememberKey&&(
        <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,cursor:"pointer",fontSize:12,color:"var(--text-dim)",textAlign:"left"}}>
          <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)} style={{width:"auto"}}/>
          Remember me on this device (skip the PIN next time, this match only)
        </label>
      )}
      <div className="grid-2">
        <button className="btn btn-ghost w-full" onClick={onCancel}>Cancel</button>
        <button className="btn btn-primary w-full" onClick={submit}>Enter</button>
      </div>
    </div></div>
  );
}

function CricketHero({hideText}){
  // Jumbled order — no two same outcomes back to back where possible
  const outcomes=React.useMemo(()=>[
    {label:"SIX!",color:"#34d399",type:"six"},
    {label:"RUN OUT!",color:"#f87171",type:"runout"},
    {label:"FOUR!",color:"#fbbf24",type:"four"},
    {label:"WIDE",color:"#a5b4fc",type:"wide"},
    {label:"CAUGHT!",color:"#f87171",type:"caught"},
    {label:"SIX!",color:"#34d399",type:"six"},
    {label:"BOWLED!",color:"#f87171",type:"bowled"},
  ],[]);
  const[idx,setIdx]=React.useState(0);
  // displayIdx is DELIBERATELY SEPARATE from idx. `idx` picks which outcome drives the CURRENT
  // delivery's physics (ball target, bat swing angle) for the whole cycle, and it advances to the
  // NEXT ball the instant the celebration ends. But if the BADGE reads its text/colour straight from
  // `idx`, the still-fading-out badge from the ball that just finished instantly SWAPS its content to
  // the NEXT ball's outcome the moment idx advances — showing next ball's result while it's still
  // fading, before that ball has even been bowled. displayIdx is only updated the moment the result
  // is actually revealed for a delivery (in the t_result timer below), so the badge always shows the
  // outcome that matches what just happened, never an early peek at what's coming.
  const[displayIdx,setDisplayIdx]=React.useState(0);
  // OPT-IN sound for the landing animation. Default OFF and only togglable by a deliberate tap (which
  // also satisfies browser autoplay rules) — the animation itself never makes noise unprompted, which
  // was the earlier complaint. A ref mirrors the state so the once-only timer chain reads live value.
  const[heroSound,setHeroSound]=React.useState(false);
  const heroSoundRef=React.useRef(false);
  // Refs mirroring idx/outcomes so the timer chain's callbacks (which only capture their closure ONCE,
  // since the effect below never re-runs) can always read the CURRENT outcome — needed for triggering
  // the right sound effect (bat-crack / crowd-cheer) at the right moment without a stale value.
  const idxRef=React.useRef(idx);
  const outcomesRef=React.useRef(outcomes);
  React.useEffect(()=>{ idxRef.current=idx; },[idx]);
  React.useEffect(()=>{ outcomesRef.current=outcomes; },[outcomes]);
  // 8-SECOND CINEMATIC TIMELINE — distinct phases so the bowler runs in, delivers, the ball travels,
  // the bat swings, the result pops, then a celebration beat before resetting. Each phase flows into
  // the next via a single recursive timeout chain (no parallel timers) so nothing desyncs.
  //   runin   (0.0–2.0s)  bowler runs in toward the crease
  //   action  (2.0–2.5s)  bowling delivery stride + arm comes over
  //   release (2.5–3.0s)  ball leaves the hand, travels toward the bat
  //   swing   (3.0–4.0s)  bat meets ball at contact (result decided)
  //   result  (4.0–5.5s)  outcome plays out — ball flies to its settle point, word pops
  //   celebrate(5.5–7.5s) celebration beat — figures react, word eases, ball fades
  //   reset   (one frame) snap ball back to bowler hand before the next run-in
  const[phase,setPhase]=React.useState("runin");
  // Timeline — slowed for a calmer feel. KEY DETAIL: T_RUNIN (2750ms) is EXACTLY 5 × the 550ms
  // stride cycle, so the leg/bounce/arm run animations complete whole strides and stop right on
  // their rest frame (which matches the delivery pose) — no mid-stride snap when the run-up ends.
  // The contact "swing" beat stays SHORT (260ms): ball meets bat and flies away immediately.
  // T_RESULT/T_CELEBRATE trimmed from 2800/2400 — the badge was being held so long (5.6s of near-
  // nothing after contact) that it felt like a long dead pause before the next ball. Still plenty of
  // time to read a short word (1.8s) and let reactions play out (1.4s), just not padded.
  const T_RUNIN=2750, T_ACTION=800, T_RELEASE=900, T_SWING=260, T_RESULT=1800, T_CELEBRATE=1400;
  const t_action  = T_RUNIN;                                   // 2750
  const t_release = t_action + T_ACTION;                       // 3550
  const t_swing   = t_release + T_RELEASE;                     // 4450 (contact)
  const t_result  = t_swing + T_SWING;                         // 4710 — ball flies off right after impact
  const t_celeb   = t_result + T_RESULT;                       // 6510
  const CYCLE_MS  = t_celeb + T_CELEBRATE + 250;               // ≈ 8.2s total, calm but not padded

  React.useEffect(()=>{
    let alive=true;
    let timers=[];
    let raf=null;
    function step(){
      if(!alive)return;
      // reset: snap ball to bowler's hand invisibly, then start the run-in on the next frame
      setPhase("reset");
      raf=requestAnimationFrame(()=>{
        raf=requestAnimationFrame(()=>{ if(alive) setPhase("runin"); });
      });
      timers.push(setTimeout(()=>{ if(alive) setPhase("action"); },t_action));
      timers.push(setTimeout(()=>{ if(alive) setPhase("release"); },t_release));
      timers.push(setTimeout(()=>{
        if(!alive)return;
        setPhase("swing");     // contact moment
        // Sound is OPT-IN via the corner toggle (default silent). Bat-crack on contact, except a wide.
        if(heroSoundRef.current){ const t=outcomesRef.current[idxRef.current]?.type; if(t&&t!=="wide"){ try{playBatCrack();}catch(e){} } }
      },t_swing));
      timers.push(setTimeout(()=>{
        if(!alive)return;
        setPhase("result");
        setDisplayIdx(idxRef.current);   // freeze the badge's content to THIS delivery's outcome
        if(heroSoundRef.current){ const t=outcomesRef.current[idxRef.current]?.type;
          try{ if(t==="six") playCrowdCheer(true); else if(t==="four") playCrowdCheer(false);
               else if(t==="bowled"||t==="caught"||t==="runout") playCrowdCheer(true); }catch(e){} }
      },t_result));
      timers.push(setTimeout(()=>{ if(alive) setPhase("celebrate"); },t_celeb));
      timers.push(setTimeout(()=>{
        if(!alive)return;
        setIdx(i=>(i+1)%outcomes.length);
        step();
      },CYCLE_MS));
    }
    step();
    return ()=>{ alive=false; timers.forEach(clearTimeout); if(raf)cancelAnimationFrame(raf); };
  },[outcomes.length]);

  const o=outcomes[idx];
  const type=o.type;
  const isBowled=type==="bowled", isSix=type==="six", isCaught=type==="caught", isRunOut=type==="runout", isWide=type==="wide", isFour=type==="four";
  const isHit = isSix||isFour;
  // Every outcome that involves contact now gets its OWN distinct bat motion (shot variety), instead
  // of only six/four swinging and everything else staying still:
  //   six     → lofted drive: big full arc, high follow-through (ball flies up and over)
  //   four    → cover drive: smooth wide arc through the off side (ball races along the ground)
  //   bowled  → defensive prod: small, late, weak push that doesn't get there in time
  //   caught  → loose drive: a fuller swing that skies it (mistimed, hence the catch)
  //   runout  → quick tap: short nudge for a single, bat barely moves
  //   wide    → no shot at all (ball is too far away to play)
  // contact happens at the START of "swing"; everything from swing onward is post-contact
  const contactOrAfter = phase==="swing"||phase==="result"||phase==="celebrate";
  const settled = phase==="result"||phase==="celebrate";
  const celebrating = phase==="celebrate";
  const runningIn = phase==="runin"||phase==="action";
  const S=(c)=>({stroke:c,strokeWidth:5,strokeLinecap:"round",fill:"none"});

  // ── Ball position, computed directly from `phase` ──
  const BOWLER_HAND={x:70,y:110};
  const contactPt = isWide?{x:252,y:140}:isCaught?{x:248,y:108}:isBowled?{x:284,y:118}:{x:252,y:118};
  const settlePt = (()=>{
    if(isSix) return {x:60,y:42};
    if(isFour) return {x:8,y:112};
    if(isBowled) return {x:291,y:130};
    if(isCaught) return {x:208,y:58};
    if(isRunOut) return {x:56,y:108};
    return {x:305,y:142}; // wide drifts off
  })();
  // Ball travel: during runin it waits in the hand; on release it flies to contact; on swing/after it goes to settle.
  const ballTarget = (phase==="reset"||phase==="runin"||phase==="action") ? BOWLER_HAND
                   : phase==="release" ? contactPt
                   : phase==="swing" ? contactPt
                   : settlePt;
  const ballMoving = phase==="release"||phase==="swing"||phase==="result";
  // Dotted glowing trail: only on the RESULT leg, i.e. AFTER the ball is struck and flies away (like
  // the reference image, where the streak trails off toward the crowd). We deliberately DON'T draw a
  // trail on the release leg — a straight dotted laser line from the bowler's hand to the batsman
  // looked unnatural and static (this was the "line from bowler to batsman" that showed on screen).
  const trailFrom = phase==="result" ? contactPt : null;
  const showTrail = phase==="result" && !isWide && (isSix||isFour);

  // Bat swing choreography, synced to the ball:
  //   release phase → BACKLIFT (+28°): the bat lifts up and back WHILE the ball flies in, like a real
  //     batsman winding up as the bowler releases — so bat and ball are both in motion together.
  //   swing (contact) → snaps through to the outcome's shot angle in 150ms, meeting the arriving ball.
  //   settled → eases back to neutral (follow-through recovering).
  const swingRotation = settled ? 0 : contactOrAfter ? (
    isSix ? -160        // lofted drive — big full arc
    : isFour ? -100      // cover drive — wide smooth arc
    : isCaught ? -130     // loose drive — fuller swing, mistimed
    : isBowled ? -35      // defensive prod — small, late, doesn't get there
    : isRunOut ? -45      // quick tap for a single
    : 0                   // wide — no shot
  ) : phase==="release" ? 28 : 0;
  const swings = isSix||isFour||isCaught||isBowled||isRunOut; // every outcome except WIDE now swings
  const isWicket = isBowled||isCaught||isRunOut;
  // Fixed angles for the particle burst (deterministic — no per-frame randomness, so React state
  // never has to track random values). 8-way spread reads as a believable little impact burst.
  const particleAngles=React.useMemo(()=>[0,45,90,135,180,225,270,315],[]);
  // Bowler run-in: the whole bowler figure translates in from further back during runin, plants at action.
  const bowlerShift = runningIn ? (phase==="runin"? -26 : 0) : 0;
  // Bowling arm — angles were derived by SIMULATION (not guesswork): I placed the hand where it should
  // be at each phase and solved for the rotation. 0° = straight down, clockwise positive. The sequence
  // STRICTLY DECREASES so CSS rotates one continuous direction (a real over-arm windmill), never the
  // short way back — which is what made earlier versions look reversed / flicker:
  //   run-up (338°): arm hanging down by the side
  //   action (215°): cocked up and behind the head
  //   release (163°): extended at the top
  //   follow-through / contact+after (52°): swung down and forward toward the batsman, and HELD there
  // On a wicket it lifts to a raised fist-pump for the celebration beat.
  const bowlArm = celebrating&&isWicket ? 30
                : contactOrAfter ? 52
                : phase==="release" ? 163
                : phase==="action" ? 215
                : phase==="runin" ? 338
                : 338;
  // Camera punch-in — a quick subtle zoom at the moment of contact, easing back out over the
  // result/celebrate window. Skipped for WIDE (nothing actually happens to punch into).
  const cameraScale = (phase==="swing" && !isWide) ? 1.045 : 1;
  // BODY MECHANICS — upper-body lean and knee drive, per phase. This is what makes the figures read
  // as PEOPLE with weight and momentum rather than rigid sticks:
  //   bowler: leans forward while running (8°), coils slightly back in the gather (-6°), then drives
  //           hard forward over the braced front leg through release (14°) and follow-through (20°).
  //   knee drive: in the gather the front knee lifts high (62°) then plants for the delivery stride.
  //   batsman: stands neutral, tips back a touch with the backlift (+4°), then leans INTO the shot
  //            (-10°) at contact — the weight transfer of a real drive. No lean for a wide (no shot).
  const bowLean       = contactOrAfter ? 22 : phase==="release" ? 14 : phase==="action" ? -12 : 8;
  const bowFrontThigh = phase==="action" ? 48 : 38;
  // Follow-through: the back leg KICKS UP HIGH behind (the signature fast-bowler finish from the
  // reference image) — thigh swings way back (-62°) with the shin flicked up further.

  return(
    <div style={{position:"relative",width:"100%",aspectRatio:"320/170",margin:"0 auto",
      borderRadius:18,overflow:"hidden",border:"1px solid rgba(99,102,241,.25)"}}>
      {/* Real stadium photo background */}
      <img src={STADIUM} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
      {/* Sound toggle — pointerEvents:auto re-enables taps on just this button even though the whole
          animation container is pointerEvents:none. Default muted; a tap opts in (autoplay-safe). */}
      <button onClick={()=>{ setHeroSound(s=>{const n=!s; heroSoundRef.current=n; return n;}); try{_getHeroCtx();}catch(e){} }}
        title={heroSound?"Animation sounds on — tap to mute":"Tap for bat & crowd sounds"}
        style={{position:"absolute",top:8,right:8,zIndex:6,pointerEvents:"auto",background:"rgba(8,12,32,.55)",
          border:"1px solid rgba(255,255,255,.28)",borderRadius:20,padding:"5px 10px",fontSize:13,lineHeight:1,
          cursor:"pointer",color:"#fff",opacity:heroSound?1:.75}}>{heroSound?"🔊":"🔇"}</button>
      {/* Crowd shimmer — faint twinkling sparkle over the stands, very subtle */}
      <div style={{position:"absolute",inset:0,pointerEvents:"none",opacity:.5,mixBlendMode:"screen",
        background:"radial-gradient(1px 1px at 20% 38%,rgba(255,255,255,.7),transparent),radial-gradient(1px 1px at 60% 32%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 80% 42%,rgba(173,216,255,.6),transparent),radial-gradient(1px 1px at 38% 46%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 72% 50%,rgba(255,255,255,.55),transparent)",
        animation:"crowdShimmer 3.2s steps(2) infinite"}}/>
      {/* Floodlight sweep — a soft diagonal beam of light that slowly drifts across the scene */}
      <div style={{position:"absolute",top:"-30%",left:"-30%",width:"50%",height:"160%",pointerEvents:"none",
        background:"linear-gradient(105deg,transparent,rgba(190,220,255,.10) 45%,rgba(190,220,255,.16) 50%,rgba(190,220,255,.10) 55%,transparent)",
        filter:"blur(6px)",transform:"rotate(8deg)",animation:"floodSweep 9s ease-in-out infinite"}}/>
      {/* Dark overlay so the stick figures + result text stay readable on the bright pitch */}
      <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(5,8,30,.35) 0%,rgba(5,8,30,.15) 55%,rgba(5,8,30,.45) 100%)",pointerEvents:"none"}}/>
      <svg viewBox="0 0 320 170" preserveAspectRatio="xMidYMid meet" style={{position:"relative",width:"100%",height:"100%",display:"block",
        transform:`scale(${cameraScale})`,transformOrigin:"52% 60%",
        transition:phase==="swing"?"transform 130ms cubic-bezier(.34,1.56,.64,1)":"transform 650ms ease-out"}}>
        <defs>
          {/* soft white glow for the stick figures (matches the reference's glowing white players) */}
          <filter id="figGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="1.6" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          {/* stronger glow for the result badge border + text */}
          <filter id="badgeGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="2.4" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          {/* red glow for the ball + its dotted trail */}
          <filter id="ballGlow" x="-120%" y="-120%" width="340%" height="340%">
            <feGaussianBlur stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          {/* RESULT BADGE defs — a clean, elegant NEON FRAME (thin glowing outline over a dark-glass
              interior, with softly glowing text), matching the reference look. No filled button. Both
              the frame and the text glow are tinted per-outcome at render time via o.color. */}
          <filter id="badgeFrameGlow" x="-70%" y="-70%" width="240%" height="240%">
            <feGaussianBlur stdDeviation="2.6" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="badgeTextGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {/* Result badge — a colourful neon-bordered plaque (like the reference "FOUR!" badge):
            rounded rect outline in the outcome colour with a glow, and glowing text inside.
            Pops in at the result moment, eases during celebration.
            BULLETPROOF FIX: this whole badge is now only RENDERED AT ALL while settled (result or
            celebrate) is true — not just faded via opacity. Two earlier attempts tried to hide it with
            opacity/transition timing, but that's fragile: a CSS transition running in real browser time
            is decoupled from React's render cycle, so there's always a risk of a visible sliver where
            the DOM content has already updated to the next ball's outcome but the fade-out hasn't
            finished (or vice-versa). Not rendering the element at all outside settled removes that
            entire class of bug — there is nothing for a stale style to show, because there is no
            element. The key={displayIdx} also forces a clean remount for every new result, so the
            pop-in animation always plays fresh rather than potentially reusing an in-flight one. */}
        {/* Boundary CELEBRATION — colored confetti dots rain over the scene on a four/six */}
        {celebrating&&isHit&&(
          <g pointerEvents="none">
            {[[30,"#fbbf24",0],[70,"#34d399",.15],[110,"#f87171",.05],[150,"#60a5fa",.25],[190,"#f4b63f",.1],[230,"#a78bfa",.2],[270,"#34d399",.02],[95,"#ffffff",.3],[205,"#fbbf24",.18],[250,"#60a5fa",.08]].map(([x,cc,d],i)=>(
              <circle key={i} cx={x} cy="6" r="2.4" fill={cc} style={{animation:`heroConf 1.6s ease-in ${d}s both`}}/>
            ))}
          </g>
        )}
        {!hideText&&settled&&(
          <g key={displayIdx} style={{transformOrigin:"160px 26px",
                     animation:phase==="result"?"badgePop .55s cubic-bezier(.22,1,.36,1) both":"none",
                     opacity:celebrating?0.85:1,
                     transform:phase==="result"?undefined:celebrating?"scale(0.97)":"scale(1)",
                     transition:celebrating?"opacity .6s ease-out, transform .6s ease-out":"none"}}>
            {(()=>{
              // Clean neon frame — thin glowing outline over a dark-glass interior, glowing text,
              // with the reference image's little spark accents flanking the frame.
              // Uses dispO (the FROZEN outcome from displayIdx), NOT o (the live physics outcome) —
              // see the displayIdx comment above for why this separation is required.
              const dispO = outcomes[displayIdx] || o;
              const w = Math.max(96, dispO.label.length*17 + 44);
              const x = 160 - w/2;
              return(<>
                {/* dark-glass interior so the text is readable over the bright pitch */}
                <rect x={x} y="9" width={w} height="34" rx="10" ry="10" fill="rgba(8,12,32,0.5)"/>
                {/* thin glowing neon outline in the outcome colour */}
                <rect x={x} y="9" width={w} height="34" rx="10" ry="10"
                  fill="none" stroke={dispO.color} strokeWidth="2" filter="url(#badgeFrameGlow)"/>
                {/* spark accents flanking the frame (from the reference image) */}
                <g stroke={dispO.color} strokeWidth="2" strokeLinecap="round" filter="url(#badgeTextGlow)">
                  <line x1={x-10} y1="20" x2={x-5} y2="23"/>
                  <line x1={x-12} y1="28" x2={x-6} y2="28"/>
                  <line x1={x-10} y1="36" x2={x-5} y2="33"/>
                  <line x1={x+w+10} y1="20" x2={x+w+5} y2="23"/>
                  <line x1={x+w+12} y1="28" x2={x+w+6} y2="28"/>
                  <line x1={x+w+10} y1="36" x2={x+w+5} y2="33"/>
                </g>
                {/* softly glowing text in the outcome colour — every reference in this badge uses
                    dispO (never o), so it is IMPOSSIBLE for this element to show any outcome other
                    than the one that was frozen for THIS delivery at the moment it was revealed. */}
                <text x="160" y="33" textAnchor="middle"
                  fontFamily="'Oswald',sans-serif" fontSize="22" fontWeight="700" letterSpacing="3" fontStyle="italic"
                  fill={dispO.color} filter="url(#badgeTextGlow)">{dispO.label}</text>
              </>);
            })()}
          </g>
        )}

        {/* Pitch + figures band — the photo provides the real pitch, so just a soft ground shadow */}
        {/* Whole scene scaled down (reference proportions) WITHOUT changing internal coordinates — so
            bat/ball/result sync stays identical. IMPORTANT: no blur filter on this layer. A Gaussian
            glow filter here forced the browser to re-rasterize the blur on EVERY animation frame
            (legs cycling, ball moving, bat swinging) — the #1 cause of the flickering/jank seen on
            phones. The crisp white figures on the dark stadium read cleanly without it; only the
            result badge (which animates once per cycle) keeps a glow filter. */}
        <g transform="translate(51,46) scale(0.68)">
        <ellipse cx="160" cy="150" rx="150" ry="7" fill="rgba(0,0,0,.28)"/>

        {/* Bowler — runs IN during runin, plants and delivers on action/release. Drawn with CLEAN
            even-width rounded-cap strokes (the crisp reference style), NOT tapered polygons. Limbs are
            two-segment (thigh+shin, upper+forearm) so knees/elbows still articulate, but every segment
            is a simple <line> via the S() style. All phase-driven values (bowlerShift, bowlArm,
            runningIn) are reused untouched — only the drawing primitive changed back to clean lines. */}
        <g style={{transform:`translate(${56+bowlerShift}px,76px)`,transition:`transform ${runningIn?(phase==="runin"?T_RUNIN:T_ACTION):300}ms ease-in-out`}}>
          <g style={{animation:phase==="runin"?"runBounce .55s ease-in-out infinite":"none",
            // DELIVERY BOUND — real fast bowlers leap into their delivery stride. A quick rise during
            // the gather (action) and a plant back down as the arm comes over (release onward).
            transform:phase==="action"?"translateY(-6px)":"translateY(0px)",
            transition:phase==="action"?`transform ${T_ACTION}ms ease-out`:phase==="release"?"transform 260ms ease-in":"transform 300ms ease-in-out"}}>
          {/* LEGS (outside the lean group — they stay planted while the upper body drives forward).
              front leg: run-cycle while running in; KNEE-DRIVE lift (62°) in the gather; then plants
              at the delivery stride angle (38°). Rest frames of the run cycle match the planted pose
              so strides never snap. Small FOOT lines make the figure read as a person. */}
          <g style={{transformOrigin:"0px 41px",
            animation:phase==="runin"?"thighSwingA .55s ease-in-out infinite":"none",
            transform:phase==="runin"?"rotate(34deg)":`rotate(${bowFrontThigh}deg)`,
            transition:phase==="runin"?"none":`transform ${phase==="action"?T_ACTION:300}ms ease-out`}}>
            <line x1="0" y1="41" x2="0" y2="57" {...S("#eaf0ff")}/>
            <g style={{transformOrigin:"0px 57px",transform:phase==="action"?"rotate(-14deg)":"rotate(-22deg)",transition:"transform 300ms ease-out"}}>
              <line x1="0" y1="57" x2="0" y2="73" {...S("#eaf0ff")}/>
              <line x1="0" y1="73" x2="7" y2="73" stroke="#eaf0ff" strokeWidth="4" strokeLinecap="round"/>
            </g>
          </g>
          <g style={{transformOrigin:"0px 41px",
            animation:phase==="runin"?"thighSwingB .55s ease-in-out infinite":"none",
            transform:phase==="runin"?"rotate(-24deg)":`rotate(${bowBackThigh}deg)`,
            transition:phase==="runin"?"none":`transform ${phase==="action"?T_ACTION:300}ms ease-out`}}>
            <line x1="0" y1="41" x2="0" y2="57" {...S("#eaf0ff")}/>
            <g style={{transformOrigin:"0px 57px",transform:"rotate(-28deg)"}}>
              <line x1="0" y1="57" x2="0" y2="73" {...S("#eaf0ff")}/>
              <line x1="0" y1="73" x2="6" y2="73" stroke="#eaf0ff" strokeWidth="4" strokeLinecap="round"/>
            </g>
          </g>
          {/* UPPER BODY in a LEAN group pivoting at the hip: leans forward running → coils back in the
              gather → drives forward over the front leg through release and follow-through. The arms
              live inside so the shoulders move with the torso, like a real body. */}
          <g style={{transform:`rotate(${bowLean}deg)`,transformOrigin:"0px 41px",
            transition:`transform ${phase==="action"?T_ACTION:phase==="release"?T_RELEASE:400}ms ease-in-out`}}>
          {/* HUMAN head: skin-tone fill + team cap with a peak (bowler faces right) */}
          <circle cx="0" cy="-1" r="9" fill="#f1c08e" stroke="#eaf0ff" strokeWidth="2"/>
          <path d="M -9 -2.5 A 9 9 0 0 1 9 -2.5 Z" fill="#059669"/>
          <line x1="8" y1="-3" x2="14" y2="-1.5" stroke="#059669" strokeWidth="3.5" strokeLinecap="round"/>
          <line x1="0" y1="8" x2="0" y2="14" stroke="#eaf0ff" strokeWidth="5" strokeLinecap="round"/>
          {/* JERSEY — filled shirt in the bowling side's green kit; limbs stay light (trousers/skin) */}
          <rect x="-6.5" y="12" width="13" height="27" rx="6" fill="#34d399"/>
          {/* bowling arm — the verified monotonic windmill (338→215→163→52), one continuous arc */}
          <g style={{transformOrigin:"0px 19px",transform:`rotate(${bowlArm}deg)`,
            transition:`transform ${phase==="action"?T_ACTION:phase==="release"?T_RELEASE:phase==="swing"?150:phase==="runin"?T_RUNIN:300}ms ${phase==="release"||phase==="swing"?"ease-in":"ease-in-out"}`}}>
            <line x1="0" y1="19" x2="0" y2="32" stroke="#34d399" strokeWidth="5" strokeLinecap="round"/>
            <g style={{transformOrigin:"0px 32px",transform:"rotate(-10deg)"}}>
              <line x1="0" y1="32" x2="0" y2="43" {...S("#eaf0ff")}/>
              <circle cx="0" cy="44" r="2.6" fill="#eaf0ff"/>
            </g>
          </g>
          {/* non-bowling arm — pumps during the run, thrown up for balance in the delivery */}
          <g style={{transformOrigin:"0px 19px",
            animation:phase==="runin"?"runArm .55s ease-in-out infinite":"none",
            transform:phase==="runin"?"rotate(150deg)":"rotate(-145deg)",
            transition:phase==="runin"?"none":"transform 300ms ease-in-out"}}>
            <line x1="0" y1="19" x2="0" y2="30" stroke="#34d399" strokeWidth="5" strokeLinecap="round"/>
            <g style={{transformOrigin:"0px 30px",transform:"rotate(20deg)"}}>
              <line x1="0" y1="30" x2="0" y2="40" {...S("#eaf0ff")}/>
              <circle cx="0" cy="41" r="2.6" fill="#eaf0ff"/>
            </g>
          </g>
          </g>
          </g>
        </g>

        {/* Batsman 1 (striker) — CLEAN even-width strokes (crisp reference style), NOT tapered polygons.
            Outer translate/rotate group (isRunOut sprint positioning, dismissal slump) is completely
            untouched; only the drawing primitive changed back to clean lines. Legs show a wide
            front-foot drive stance during contactOrAfter (narrow stance beforehand). */}
        <g transform={isRunOut?"translate(0,0)":"translate(264,76)"}>
          <g style={{
            transform:isRunOut
              ?(settled?"translate(56px,76px)":contactOrAfter?"translate(150px,76px)":"translate(264px,76px)")
              :(celebrating&&(isBowled||isCaught)?"rotate(8deg)":"none"),
            transformOrigin:"0px 30px",
            transition:isRunOut
              ?`transform ${contactOrAfter?(settled?'1100ms':'900ms'):'0ms'} ease-in-out`
              :(celebrating&&(isBowled||isCaught)?"transform 500ms ease-out":"none")
          }}>
            {/* front leg (toward the bowler, -x): thigh + shin hinged at knee */}
            <g style={{transformOrigin:"0px 41px",
              animation:isRunOut?"thighSwingA .55s ease-in-out infinite":"none",
              transform:isRunOut?undefined:(contactOrAfter?"rotate(-42deg)":"rotate(-8deg)"),
              transition:isRunOut?"none":"transform 200ms ease-out"}}>
              <line x1="0" y1="41" x2="0" y2="57" {...S("#fff4dc")}/>
              <g style={{transformOrigin:"0px 57px",transform:contactOrAfter&&!isRunOut?"rotate(18deg)":"rotate(0deg)"}}>
                <line x1="0" y1="57" x2="0" y2="73" {...S("#fff4dc")}/>
                 <line x1="0" y1="56" x2="0" y2="71" stroke="#f8f1dc" strokeWidth="8" strokeLinecap="round" opacity="0.95"/>
                 <ellipse cx="-1.5" cy="74" rx="4.5" ry="2.4" fill="#3a3560"/>
              </g>
            </g>
            {/* back leg (trailing, +x) */}
            <g style={{transformOrigin:"0px 41px",
              animation:isRunOut?"thighSwingB .55s ease-in-out infinite":"none",
              transform:isRunOut?undefined:(contactOrAfter?"rotate(34deg)":"rotate(6deg)"),
              transition:isRunOut?"none":"transform 200ms ease-out"}}>
              <line x1="0" y1="41" x2="0" y2="57" {...S("#fff4dc")}/>
              <g style={{transformOrigin:"0px 57px",transform:contactOrAfter&&!isRunOut?"rotate(-8deg)":"rotate(0deg)"}}>
                <line x1="0" y1="57" x2="0" y2="73" {...S("#fff4dc")}/>
                 <line x1="0" y1="56" x2="0" y2="71" stroke="#f8f1dc" strokeWidth="8" strokeLinecap="round" opacity="0.95"/>
                 <ellipse cx="-1.5" cy="74" rx="4.5" ry="2.4" fill="#3a3560"/>
              </g>
            </g>
            {/* UPPER BODY in a LEAN group pivoting at the hip: tips back a touch with the backlift,
                then leans INTO the shot at contact — the weight transfer of a real drive. Head, torso
                and both arms live inside so the shoulders move with the torso. Legs stay planted. */}
            <g style={{transform:`rotate(${batLean}deg)`,transformOrigin:"0px 41px",
              transition:`transform ${phase==="release"?T_RELEASE:250}ms ease-in-out`}}>
            {/* HUMAN head: skin-tone fill + gold batting HELMET (peak + face grille, facing the bowler) */}
            <circle cx="0" cy="-1" r="9" fill="#f1c08e" stroke="#fff4dc" strokeWidth="2"/>
            <path d="M -9 -1.5 A 9 9 0 0 1 9 -1.5 Z" fill="#d98a06"/>
            <line x1="-8" y1="-2.5" x2="-13.5" y2="-1" stroke="#d98a06" strokeWidth="3.5" strokeLinecap="round"/>
            <line x1="-12.5" y1="0.5" x2="-8.5" y2="5" stroke="#d98a06" strokeWidth="2" strokeLinecap="round"/>
            <line x1="0" y1="8" x2="0" y2="14" stroke="#fff4dc" strokeWidth="5" strokeLinecap="round"/>
            {/* JERSEY — batting side's gold kit */}
            <rect x="-6.5" y="12" width="13" height="27" rx="6" fill="#f4b63f"/>
            {/* Bat arm — reuses the EXISTING swingRotation value untouched (per-outcome shot type).
                Upper arm + forearm + a flat two-tone bat (light handle, slightly thicker blade) drawn
                as clean lines. The 150ms contact transition still matches the result-text pop-in. */}
            <g style={{transformOrigin:"0px 19px",
              transform:`rotate(${swingRotation}deg)`,
              transition:`transform ${runningIn?'250ms':phase==="release"?T_RELEASE+'ms':contactOrAfter?(settled?'900ms':'150ms'):'0ms'} ${phase==="release"?"ease-out":"ease-in-out"}`}}>
              <line x1="0" y1="19" x2="0" y2="31" stroke="#f4b63f" strokeWidth="5" strokeLinecap="round"/>
              <g style={{transformOrigin:"0px 31px",transform:"rotate(-15deg)"}}>
                <line x1="0" y1="31" x2="0" y2="39" {...S("#fff4dc")}/>
                {/* bat: handle then blade, continuing roughly in line with the forearm */}
                <line x1="0" y1="39" x2="0" y2="47" stroke="#c9b48a" strokeWidth="4" strokeLinecap="round"/>
                {/* gripping hands on the handle — small but makes the figure read as a person */}
                <circle cx="0" cy="39.5" r="2.6" fill="#fff4dc"/>
                <circle cx="0" cy="43.5" r="2.6" fill="#fff4dc"/>
                <line x1="0" y1="47" x2="0" y2="60" stroke="#f0d9b5" strokeWidth="7" strokeLinecap="round"/>
              </g>
            </g>
            {/* Free arm raised in celebration on a SIX (celebrate beat only) — additive, opacity-driven */}
            <g opacity={celebrating&&isSix?1:0} style={{transition:"opacity 300ms ease-out"}}>
              <g style={{transformOrigin:"0px 19px",transform:"rotate(-140deg)"}}>
                <line x1="0" y1="19" x2="0" y2="30" stroke="#f4b63f" strokeWidth="5" strokeLinecap="round"/>
              </g>
            </g>
            </g>
          </g>
        </g>

        {/* Batsman 2 (non-striker) — only for run-out, mirrors batsman 1's phase-driven motion exactly.
            Upgraded to tapered limbs with a real running-stride leg cycle instead of the old scaleX trick. */}
        {isRunOut&&(
          <g style={{
            transform:settled?"translate(264px,76px)":contactOrAfter?"translate(170px,76px)":"translate(56px,76px)",
            transition:`transform ${contactOrAfter?(settled?'1100ms':'900ms'):'0ms'} ease-in-out`
          }}>
            <circle cx="0" cy="-1" r="9" fill="#f1c08e" stroke="#ffffff" strokeWidth="2"/>
            <path d="M -9 -1.5 A 9 9 0 0 1 9 -1.5 Z" fill="#d98a06"/>
            <line x1="-8" y1="-2.5" x2="-13.5" y2="-1" stroke="#d98a06" strokeWidth="3.5" strokeLinecap="round"/>
            <line x1="0" y1="8" x2="0" y2="14" stroke="#ffffff" strokeWidth="5" strokeLinecap="round"/>
            <rect x="-6.5" y="12" width="13" height="27" rx="6" fill="#f4b63f"/>
            <g style={{transformOrigin:"0px 41px",animation:"thighSwingA .55s ease-in-out infinite"}}>
              <line x1="0" y1="41" x2="0" y2="57" {...S("#ffffff")}/>
              <g style={{transformOrigin:"0px 57px"}}><line x1="0" y1="57" x2="0" y2="73" {...S("#ffffff")}/></g>
            </g>
            <g style={{transformOrigin:"0px 41px",animation:"thighSwingB .55s ease-in-out infinite"}}>
              <line x1="0" y1="41" x2="0" y2="57" {...S("#ffffff")}/>
              <g style={{transformOrigin:"0px 57px"}}><line x1="0" y1="57" x2="0" y2="73" {...S("#ffffff")}/></g>
            </g>
            <g style={{transformOrigin:"0px 19px",transform:"rotate(-35deg)"}}>
              <line x1="0" y1="19" x2="0" y2="33" {...S("#ffffff")}/>
            </g>
          </g>
        )}

        {/* Fielder — dives in exactly when phase becomes "contact", then eases up into a less-prone
            triumphant lean during the celebration beat (small reaction touch, same dive logic intact).
            Clean even-width line strokes; the outer dive translate+rotate is completely untouched. */}
        {isCaught&&(
          <g transform="translate(222,60)">
            <g style={{
              opacity:contactOrAfter?1:0,
              transform:celebrating?"translate(-16px,2px) rotate(-8deg)":contactOrAfter?"translate(-16px,8px) rotate(-30deg)":"translate(0,0) rotate(0deg)",
              transition:`transform ${contactOrAfter?(celebrating?'500ms':'350ms'):'0ms'} ease-out, opacity 150ms ease-out`
            }}>
              <circle cx="0" cy="0" r="9" fill="#f1c08e" stroke="#d6ffe9" strokeWidth="2"/>
              <path d="M -9 -0.5 A 9 9 0 0 1 9 -0.5 Z" fill="#059669"/>
              <line x1="-8" y1="-1.5" x2="-13.5" y2="0" stroke="#059669" strokeWidth="3.5" strokeLinecap="round"/>
              <line x1="0" y1="7" x2="0" y2="13" stroke="#d6ffe9" strokeWidth="5" strokeLinecap="round"/>
              <rect x="-6" y="11" width="12" height="26" rx="6" fill="#34d399"/>
              <g style={{transformOrigin:"0px 16px",transform:"rotate(-55deg)"}}><line x1="0" y1="16" x2="0" y2="30" {...S("#d6ffe9")}/></g>
              <g style={{transformOrigin:"0px 16px",transform:"rotate(55deg)"}}><line x1="0" y1="16" x2="0" y2="30" {...S("#d6ffe9")}/></g>
              <g style={{transformOrigin:"0px 40px",transform:"rotate(-30deg)"}}><line x1="0" y1="40" x2="0" y2="56" {...S("#d6ffe9")}/></g>
              <g style={{transformOrigin:"0px 40px",transform:"rotate(30deg)"}}><line x1="0" y1="40" x2="0" y2="56" {...S("#d6ffe9")}/></g>
            </g>
          </g>
        )}

        {/* Stumps — fall exactly when phase becomes "contact", same trigger as everything else */}
        <g transform="translate(286,117)">
          {[0,5,10].map(dx=>(
            <line key={dx} x1={dx} y1="0" x2={dx} y2="24" stroke={(isBowled||isRunOut)&&contactOrAfter?"#f87171":"rgba(226,232,240,.55)"} strokeWidth="3"
              style={isBowled?{transformOrigin:`${dx}px 24px`,transform:`rotate(${contactOrAfter?40:0}deg)`,transition:`transform ${contactOrAfter?'400ms':'0ms'} ease-out`}:{}}/>
          ))}
          {/* Flying bails — two short bars that pop off the top of the stumps and tumble away on BOWLED */}
          {isBowled&&[{dx:1,fly:-16,rot:-90},{dx:7,fly:14,rot:120}].map((b,i)=>(
            <line key={"bail"+i} x1={b.dx} y1="-2" x2={b.dx+4} y2="-2" stroke="#fde68a" strokeWidth="2.5" strokeLinecap="round"
              filter="url(#ballGlow)"
              opacity={contactOrAfter?(settled?0:1):0}
              style={{transformOrigin:`${b.dx+2}px -2px`,
                      transform:contactOrAfter?`translate(${b.fly}px,-22px) rotate(${b.rot}deg)`:"translate(0,0)",
                      transition:contactOrAfter?"transform 600ms cubic-bezier(.3,.7,.5,1), opacity 600ms ease-out":"none"}}/>
          ))}
        </g>

        {/* Wicketkeeper — rebuilt as a proper SIDE-VIEW crouch matching the reference image (the old
            version was drawn FRONT-view with symmetric splayed legs, which clashed with every other
            side-view figure and read as a shapeless squat). Now: leaning forward toward the batsman,
            legs together and bent under the body, gloves reaching down in front — the classic keeper
            "ready" position. Position (outer) and sway (inner) stay on separate groups so the CSS
            animation can never override the placement (the old teleport-to-the-floodlight bug). */}
        <g transform="translate(314,122) scale(0.72)">
          <g style={{animation:"keeperSway 2.6s ease-in-out infinite",transformOrigin:"0px 10px"}}>
          <g style={{transform:(contactOrAfter&&isBowled)?"translate(-4px,2px)":"none",
              animation:(celebrating&&isWicket)?"keeperHop .8s ease-out 2":"none",
              transition:"transform 300ms ease-out"}}>
            {/* head, forward of the body from the crouch lean */}
            <circle cx="-13" cy="-9" r="7" fill="#f1c08e" stroke="#d6ffe9" strokeWidth="2"/>
            <path d="M -20 -10 A 7 7 0 0 1 -6 -10 Z" fill="#059669"/>
            <line x1="-19" y1="-11" x2="-23" y2="-9.5" stroke="#059669" strokeWidth="3" strokeLinecap="round"/>
            {/* torso leaning well forward (the rounded back of a crouching keeper) */}
            <line x1="-9" y1="-3" x2="0" y2="10" stroke="#34d399" strokeWidth="9" strokeLinecap="round"/>
            {/* near leg: thigh forward-down, shin to the ground, small foot */}
            <line x1="0" y1="10" x2="-9" y2="17" {...S("#d6ffe9")}/>
            <line x1="-9" y1="17" x2="-7" y2="27" {...S("#d6ffe9")}/>
            <line x1="-7" y1="27" x2="-1" y2="27" stroke="#d6ffe9" strokeWidth="4" strokeLinecap="round"/>
            {/* far leg, slightly offset for depth */}
            <line x1="0" y1="10" x2="-4" y2="18" {...S("#d6ffe9")}/>
            <line x1="-4" y1="18" x2="-2" y2="27" {...S("#d6ffe9")}/>
            {/* arms reaching down-forward, gloves together low in front */}
            <line x1="-9" y1="-1" x2="-15" y2="8" {...S("#d6ffe9")}/>
            <line x1="-15" y1="8" x2="-11" y2="16" {...S("#d6ffe9")}/>
            <circle cx="-10.5" cy="17.5" r="3" fill="#d6ffe9"/>
          </g>
          </g>
        </g>

        {/* Glowing dotted ball trail — a red dashed streak from the start of the ball's current leg to
            the ball, fading behind it (like the reference). Sits just under the ball. */}
        {showTrail&&trailFrom&&(
          <line x1={trailFrom.x} y1={trailFrom.y} x2={ballTarget.x} y2={ballTarget.y}
            stroke="#ff3b3b" strokeWidth="3" strokeLinecap="round" strokeDasharray="1 7"
            filter="url(#ballGlow)" opacity={settled?0:0.85}
            style={{transition:phase==="result"?"opacity 500ms ease-out":"opacity 150ms ease-in"}}/>
        )}

        {/* Particle burst — a quick radiating spark of impact for boundaries and catches, adds visual
            drama right at the contact point without touching any of the synced ball/bat logic. */}
        {(isSix||isFour||isCaught)&&particleAngles.map(a=>{
          const rad=a*Math.PI/180;
          const burst=contactOrAfter&&!celebrating;
          const dist=burst?16:0;
          const dx=Math.cos(rad)*dist, dy=Math.sin(rad)*dist;
          return(
            <circle key={"p"+a} cx={contactPt.x} cy={contactPt.y} r="1.6"
              fill={isSix?"#fde68a":isFour?"#fbbf24":"#e2e8f0"}
              opacity={contactOrAfter?(celebrating?0:0.9):0}
              style={{transform:`translate(${dx}px,${dy}px)`,
                      transition:phase==="swing"?"transform 260ms ease-out, opacity 150ms ease-in"
                              :celebrating?"opacity 500ms ease-out"
                              :"none"}}/>
          );
        })}

        {/* Ball — position computed directly from `phase`. Release flies hand→contact over T_RELEASE,
            swing snaps contact (150ms, matched to bat+text), result flies to settle point. A subtle
            parabolic arc (CSS keyframe bump layered ON TOP of the linear cx/cy travel — the straight-line
            cx/cy transition is untouched, so the guaranteed start/end positions never change) gives the
            six and four a believable lofted feel with real "gravity", instead of a flat straight line. */}
        <circle cx={ballTarget.x} cy={ballTarget.y} r="6" fill="#ef4444" stroke="#fca5a5" strokeWidth="2"
          filter="url(#ballGlow)"
          opacity={(phase==="reset"||phase==="runin"||phase==="action")?0:(settled&&(isSix||isFour||isBowled||isCaught||isRunOut||isWide)?0:1)}
          style={{animation:(phase==="result"&&isSix)?"ballArc 1.1s ease-out 1":(phase==="result"&&isFour)?"ballArcLow 1.1s ease-out 1":"none",
                  transition:(phase==="reset"||phase==="runin"||phase==="action")?"none"
                  :phase==="release"?`cx ${T_RELEASE}ms ease-in, cy ${T_RELEASE}ms ease-in, opacity 150ms ease-in`
                  :phase==="swing"?`cx 150ms ease-out, cy 150ms ease-out`
                  :settled?`cx 1100ms ease-out, cy 1100ms ease-out, opacity 600ms ease-out`
                  :"none"}}/>
        </g>
      </svg>
    </div>
  );
}

function LCCLogo(){
  return(
    <div style={{
      flexShrink:0,display:"inline-flex",
      // Outer glow ring — single elegant gradient matching the site's indigo/purple/cyan palette
      background:"linear-gradient(145deg,#06b6d4,#6366f1,#8b5cf6,#06b6d4)",
      borderRadius:18,padding:"2.5px",
      boxShadow:"0 0 18px rgba(99,102,241,.45),0 4px 16px rgba(0,0,0,.5)",
      animation:"slowDrift 8s linear infinite",backgroundSize:"300% 300%"
    }}>
      <div style={{
        display:"inline-flex",flexDirection:"column",alignItems:"center",
        background:"linear-gradient(160deg,#0d0b28,#13103a)",
        borderRadius:16,padding:"6px 10px 7px",gap:0
      }}>
        {/* Bat + wickets icon row */}
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4,opacity:.7}}>
          <div style={{width:14,height:2.5,borderRadius:2,background:"linear-gradient(90deg,#a67c52,#e8c39a)",transform:"rotate(-25deg)",transformOrigin:"right center"}}/>
          <div style={{display:"flex",gap:1.5}}>
            {[0,1,2].map(i=><div key={i} style={{width:1.5,height:8,borderRadius:1,background:"rgba(226,232,240,.5)"}}/>)}
          </div>

// ── WeatherWidget — cycles between ⛅ temp and 🕐 time under the logo ─────────
function wmoEmoji(code){
  if(code===0)return"☀️";                          // clear sky
  if(code<=2)return"🌤️";                           // mainly clear
  if(code===3)return"☁️";                           // overcast
  if(code<=48)return"🌫️";                          // fog
  if(code<=55)return"🌦️";                          // drizzle
  if(code<=65)return"🌧️";                          // rain
  if(code<=67)return"🌨️";                          // freezing rain
  if(code<=77)return"❄️";                           // snow
  if(code<=82)return"🌧️";                          // rain showers
  if(code<=86)return"🌨️";                          // snow showers
  return"⛈️";                                       // thunderstorm
}
function WeatherWidget(){
  const[temp,setTemp]=React.useState(null);
  const[emoji,setEmoji]=React.useState("🌡️");
  const[time,setTime]=React.useState("");
  const[show,setShow]=React.useState(0); // 0=weather, 1=time

  const tick=()=>setTime(new Date().toLocaleTimeString("en-US",
    {timeZone:"America/Chicago",hour:"numeric",minute:"2-digit",hour12:true}));

  const fetchWx=()=>{
    // Request both current formats — Open-Meteo sometimes returns
    // weather_code in `current` and sometimes in `current_weather`
    fetch("https://api.open-meteo.com/v1/forecast?latitude=42.3831&longitude=-87.8939"+
      "&current=temperature_2m,weather_code&current_weather=true"+
      "&temperature_unit=fahrenheit&timezone=America/Chicago&forecast_days=1")
      .then(r=>r.json())
      .then(d=>{
        // Try both response shapes — use whichever has the data
        const t=d?.current?.temperature_2m??d?.current_weather?.temperature;
        const code=d?.current?.weather_code??d?.current_weather?.weathercode;
        if(t!=null){
          setTemp(Math.round(t));
          setEmoji(wmoEmoji(code??0));
        }
      })
      .catch(()=>{});
  };

  React.useEffect(()=>{
    tick();fetchWx();

    // Tick every second — guarantees clock is never stale, even after Chrome throttles the tab
    const ti=setInterval(tick,1000);

    // Refresh weather every 10 min
    const wi=setInterval(fetchWx,10*60*1000);

    // Cycle between weather and time every 3 seconds
    const ci=setInterval(()=>setShow(s=>(s+1)%2),3000);

    // Snap to current values the moment user returns to the tab
    const onVisible=()=>{
      if(document.visibilityState==='visible'){tick();fetchWx();}
    };
    document.addEventListener('visibilitychange',onVisible);

    return()=>{
      clearInterval(ti);clearInterval(wi);clearInterval(ci);
      document.removeEventListener('visibilitychange',onVisible);
    };
  },[]);

  if(!time)return null;

  const base={
    fontSize:10,fontFamily:"'JetBrains Mono',monospace",
    color:"rgba(165,180,252,.7)",letterSpacing:".04em",
    whiteSpace:"nowrap",textAlign:"center",
    transition:"opacity .5s ease, transform .5s ease",
  };

  return(
    <div style={{marginTop:5,height:14,overflow:"hidden",position:"relative",minWidth:90}}>
      {/* Weather */}
      <div style={{...base,position:"absolute",left:0,right:0,
        opacity:show===0&&temp?1:0,
        transform:show===0?`translateY(0)`:`translateY(-8px)`}}>
        {emoji} {temp!==null?`${temp}°F`:"—"}
      </div>
      {/* Time */}
      <div style={{...base,position:"absolute",left:0,right:0,
        opacity:show===1?1:0,
        transform:show===1?`translateY(0)`:`translateY(8px)`}}>
        {time} CT
      </div>
    </div>
  );
}


// First-open guided tour — shown ONCE ever (per browser), pointing at the exact features that turned
// out to be "it exists but nobody found it" in real use: scoring, live team updates, and the viewer.
// Dismiss (skip or finish) and it never appears again on this device.
// "Find yourself" — a lightweight personal stat lookup right on the landing screen. Reuses the same
// computeCareerStats() the Stats page already relies on, so it's always consistent with it; this is
// just a much faster path to "what are MY numbers" than digging through admin menus.
function FindYourself(){
  const[q,setQ]=React.useState("");
  const[open,setOpen]=React.useState(false);
  const[data,setData]=React.useState(null);
  const[names,setNames]=React.useState([]);
  const[focused,setFocused]=React.useState(false);
  const inputRef=React.useRef(null);
  React.useEffect(()=>{
    if(!FB_OK||!DB)return;
    const ref=DB.ref("roster");
    const cb=ref.on("value",s=>{
      const v=s.val()||{};
      setNames(Object.values(v).map(p=>p&&p.name).filter(Boolean).sort((a,b)=>a.localeCompare(b)));
    });
    return ()=>ref.off("value",cb);
  },[]);
  const runFor=(nm)=>{
    if(!nm||!FB_OK||!DB) return;
    setQ(nm); setFocused(false); setOpen(true); setData("loading");
    Promise.all([DB.ref("history").once("value"),DB.ref("roster").once("value")]).then(([hs,rs])=>{
      const stats=computeCareerStats(hs.val()||{},rs.val()||{});
      const hit=stats.find(s=>normName(s.name).includes(normName(nm)));
      setData(hit||"none");
    }).catch(()=>setData("none"));
  };
  const search=()=>runFor(q.trim());
  const clearSearch=()=>{ setQ(""); setOpen(false); setData(null); setFocused(false); try{inputRef.current&&inputRef.current.focus();}catch(e){} };
  const nq=normName(q.trim());
  const suggestions=focused&&nq&&!open?names.filter(n=>normName(n).includes(nq)).slice(0,5):[];
  return(
    <div style={{marginBottom:"clamp(10px,2.5vw,14px)",position:"relative"}}>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1,position:"relative"}}>
          <input ref={inputRef} value={q}
            onChange={e=>{setQ(e.target.value);if(open){setOpen(false);setData(null);}}}
            onFocus={()=>setFocused(true)}
            onBlur={()=>setTimeout(()=>setFocused(false),120)}
            onKeyDown={e=>e.key==="Enter"&&search()}
            className="find-stats-input"
            placeholder="🔍 Find your stats… type your name here" style={{width:"100%",fontSize:13,paddingRight:q?32:undefined}}/>
          {q&&(
            <button onClick={clearSearch} aria-label="Clear search" style={{
              position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
              width:22,height:22,borderRadius:"50%",border:"none",cursor:"pointer",
              background:"rgba(255,255,255,.12)",color:"#cbd5e1",fontSize:13,lineHeight:1,
              display:"flex",alignItems:"center",justifyContent:"center"
            }}>✕</button>
          )}
        </div>
        <button onClick={search} className="btn btn-primary" style={{padding:"10px 16px",whiteSpace:"nowrap"}}>Go</button>
      </div>
      {suggestions.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:15,
          background:"rgba(20,17,55,.98)",border:"1px solid rgba(99,102,241,.45)",borderRadius:12,
          overflow:"hidden",backdropFilter:"blur(16px)",boxShadow:"0 10px 30px rgba(0,0,0,.5)"}}>
          {suggestions.map(n=>(
            <button key={n} onMouseDown={()=>runFor(n)} style={{
              display:"block",width:"100%",textAlign:"left",padding:"10px 14px",fontSize:13,
              background:"none",border:"none",color:"#e2e5f8",cursor:"pointer",fontFamily:"'Inter',sans-serif",
              borderBottom:"1px solid rgba(99,102,241,.15)"
            }}>👤 {n}</button>
          ))}
        </div>
      )}
      {open&&(
        <div style={{marginTop:8,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:"14px 16px",position:"relative"}}>
          <button onClick={clearSearch} aria-label="Close results" style={{
            position:"absolute",top:10,right:10,width:24,height:24,borderRadius:"50%",border:"none",cursor:"pointer",
            background:"rgba(255,255,255,.08)",color:"#bcc7d8",fontSize:13,lineHeight:1,
            display:"flex",alignItems:"center",justifyContent:"center"
          }}>✕</button>
          {data==="loading"&&<p style={{fontSize:12,color:"var(--text-mute)",textAlign:"center"}}>Searching…</p>}
          {data==="none"&&<p style={{fontSize:12,color:"var(--text-mute)",textAlign:"center"}}>No matches found for "{q}". Check the spelling, or you may not have played yet.</p>}
          {data&&data!=="loading"&&data!=="none"&&(

// Recent matches — small swipeable cards on the landing screen so it feels alive even between live
// matches, instead of a static page. Purely a read of the last few History entries.
function RecentMatchesCarousel({onOpen}){
  const[list,setList]=React.useState(null);
  React.useEffect(()=>{
    if(!FB_OK||!DB){setList([]);return;}
    const ref=DB.ref("history").limitToLast(5);
    const cb=ref.on("value",s=>{
      const v=s.val()||{};
      // Filter out any null/malformed entries BEFORE they ever reach render. A single bad or
      // partially-deleted history record here was able to crash the ENTIRE app (this whole app is
      // wrapped in one top-level ErrorBoundary, so an error rendering this small landing-page widget
      // showed the same "Something went wrong" screen everywhere else too, including trying to start
      // a new match afterwards — this is almost certainly why both looked broken together).
      const arr=Object.entries(v).map(([id,m])=>m&&typeof m==="object"?{id,...m}:null)
        .filter(Boolean).sort((a,b)=>(b.finishedAt||0)-(a.finishedAt||0));

// ── Single-active-session lock ────────────────────────────────────────────────────────────────────
// ONE global slot — "scoring" — shared by EVERY scoring identity: the admin PINs and both teams'
// scorer PINs all claim the same slot. Only one device can hold it, so only one device can be signed
// in to score (or even reach the admin dashboard) at a time, full stop. This is deliberately stricter
// than the earlier per-identity model (separate admin/teamA/teamB slots): Lokesh wants a hard
// guarantee that two devices can never be scoring simultaneously in ANY combination — admin+admin,
// scorer+scorer, or admin+scorer — since any of those combinations is the two-writers race that
// wiped a 2nd innings. The cost is that both teams can no longer enter their openers at the same
// moment during an innings break (second team waits for the first to exit); that friction was judged
// acceptable versus the data-loss risk.
// There is NO manual "take over" path — a second device is hard-blocked at the PIN gate, before it
// reaches any dashboard or scoring screen. The ONLY way a slot changes hands is the stale timeout:
// if the holder's heartbeat goes quiet for SESSION_TIMEOUT_MS (crashed tab, dead phone, closed app),
// the next login reclaims it silently. So the worst case after losing a device is a ~20 second wait.
// A Firebase transaction makes the claim atomic — if two devices submit a claim in the same instant,
// exactly one wins, deterministically, rather than a last-write-wins race.
const SESSION_TIMEOUT_MS=20000;
const SCORING_SLOT="scoring";
function sessionPath(matchId,slot){ return matchId?`sessions/${matchId}/${slot}`:`sessions/_admin/${slot}`; }
function claimSession(matchId,slot,sessionId,force){
  return new Promise(resolve=>{
    if(!FB_OK||!DB||!slot){ resolve({ok:true}); return; } // no Firebase at all = local-only mode; nothing to race against
    // MUST wait for anonymous auth to settle before transacting — every other Firebase read in this
    // app does this via onAuthReady, and this one is no exception. On a FRESH page load (a refresh!)
    // the transaction was firing before auth landed, getting permission-denied, and the old error
    // handler failed OPEN — which let a freshly-refreshed second device sail straight past the lock
    // and into the admin dashboard while another device was actively signed in.
    onAuthReady(()=>{
      const ref=DB.ref(sessionPath(matchId,slot));
      const now=Date.now();
      ref.transaction(cur=>{
        const activeElsewhere = cur&&cur.sessionId&&cur.sessionId!==sessionId&&(now-(cur.lastSeen||0))<SESSION_TIMEOUT_MS;
        if(activeElsewhere&&!force) return; // abort the transaction — leave the existing claim untouched
        return {sessionId,lastSeen:now};
      },(err,committed,snap)=>{
        if(err){
          // Fail CLOSED: an errored claim must not grant access — that's the exact hole that let a
          // refreshed device bypass the lock. The 'error' flag lets the gate show "connection
          // problem — try again" rather than the misleading "someone is already signed in".
          resolve({ok:false,error:true});
          return;
        }
        if(committed){ resolve({ok:true}); }
        else { resolve({ok:false,heldSince:(snap&&snap.val()&&snap.val().lastSeen)||null}); }
      });
    });
  });
}
// Free a session slot immediately (logout / navigating away), rather than leaving it to expire on its
// own after SESSION_TIMEOUT_MS. Transaction-guarded: only clears the slot if it STILL holds exactly
// our own sessionId — if we'd already been taken over by another device (kicked out), this correctly
// does nothing rather than deleting the other device's now-rightful claim.
function releaseSession(matchId,slot,sessionId){
  if(!FB_OK||!DB||!slot) return Promise.resolve();
  // Same onAuthReady discipline as claimSession — a release fired pre-auth (e.g. logout right after
  // a refresh) would error out silently and leave the slot held until the 20s stale timeout.
  return new Promise(resolve=>{
    onAuthReady(()=>{
      DB.ref(sessionPath(matchId,slot)).transaction(cur=>{
        if(cur&&cur.sessionId===sessionId) return null; // returning null deletes the node
        return cur; // not ours anymore (or already gone) — leave it exactly as-is
      }).then(resolve).catch(resolve);
    });
  });
}

function ScorerGate({onOk,onCancel,mySessionId}){
  const[data,setData]=React.useState(undefined);
  const[conflict,setConflict]=React.useState(null); // {slot, r, heldSince} while blocked by another active device
  const[claiming,setClaiming]=React.useState(false);
  const autoTriedRef=React.useRef(null);
  React.useEffect(()=>{
    if(!FB_OK||!DB){setData(null);return;}
    let ref=null, cb=null, cancelled=false;
    // Wait for anonymous auth before reading (rules require auth != null); attaching pre-auth would
    // get permission-denied and could leave the scorer stuck on a stale/empty gate.
    onAuthReady(()=>{
      if(cancelled)return;
      ref=DB.ref("live");
      cb=ref.on("value",s=>{
        const v=s.val();
        if(!v||!v.inn||!v.pinA||!v.pinB){setData(null);return;}
        setData({pinA:v.pinA,pinB:v.pinB,teamA:v.teamA,teamB:v.teamB,matchId:v.match?.matchId||null,
          battingTeam:v.battingTeam,awaitingOpeners:!!v.inn.awaitingOpeners,ib:!!v.ib,mo:!!v.mo});
      },err=>{ console.error("scorer gate read error",err); setData(null); });
    });
    const fallback=setTimeout(()=>{ setData(d=>d===undefined?null:d); },6000);
    return ()=>{ cancelled=true; clearTimeout(fallback); if(ref&&cb)ref.off("value",cb); };
  },[]);

  if(data===undefined) return <Centered emoji="🔑" title="Checking match…" sub="Loading scorer access"/>;
  if(data===null) return <Centered emoji="🏏" title="No active match yet" sub="Waiting for admin to start a match." onExit={onCancel}/>;
  if(data.mo) return <Centered emoji="🏆" title="Match has ended" sub="Ask the admin to start a new match." onExit={onCancel}/>;

  const verify=(entered)=>{
    if(entered===ADMIN_PIN||entered===BASIC_ADMIN_PIN) return {ok:true,slot:SCORING_SLOT};
    const isTeamA=entered===data.pinA, isTeamB=entered===data.pinB;
    if(!isTeamA&&!isTeamB) return {ok:false,msg:"❌ Wrong PIN, try again"};
    const myTeam=isTeamA?data.teamA:data.teamB;
    if(data.awaitingOpeners||data.ib) return {ok:true,slot:SCORING_SLOT,team:myTeam};
    if(myTeam===data.battingTeam) return {ok:true,slot:SCORING_SLOT,team:myTeam};
    return {ok:false,msg:`🔒 ${myTeam} isn't batting yet — ${data.battingTeam} is batting now.`};
  };

  // Between a successful PIN and actually letting the person in: claim the ONE global scoring slot.
  // Admin PINs and both team PINs all compete for the same slot — only one scoring device total,
  // regardless of role. If someone else holds it (heartbeat within the last 20s), this is a HARD
  // stop: no take-over button, no way through. The slot frees when the other device exits or logs
  // out, or automatically ~20s after it dies/disconnects.
  const attemptClaim=(r)=>{
    setClaiming(true);
    claimSession(null,SCORING_SLOT,mySessionId,false).then(res=>{
      setClaiming(false);
      if(res.ok){ onOk({...r,sessionSlot:SCORING_SLOT}); }
      else { setConflict({r,heldSince:res.heldSince,error:!!res.error}); }
    });
  };

  if(conflict){
    const secsAgo=conflict.heldSince?Math.max(0,Math.round((Date.now()-conflict.heldSince)/1000)):null;
    return <Centered emoji={conflict.error?"📶":"🔒"} title={conflict.error?"Connection problem":"Someone is already signed in"}
      sub={conflict.error
        ?"Couldn't verify the session lock — check your connection and try again. For safety, login is blocked until the check succeeds."
        :`Another device is already signed in to score${secsAgo!=null?` (active ${secsAgo}s ago)`:""}. Only one device can score at a time — ask them to exit or log out first. If that device is dead or lost, just try again in about 20 seconds and you'll get straight in.`}
      onExit={onCancel}>
      <button className="btn btn-primary w-full" style={{marginBottom:10}} disabled={claiming}
        onClick={()=>attemptClaim(conflict.r)}>{claiming?"Checking…":"🔁 Try Again"}</button>
    </Centered>;
  }
  if(claiming) return <Centered emoji="🔑" title="Checking device…" sub="Making sure no one else is already active"/>;

  // "Remember this device" — if a PIN was saved for THIS exact match earlier, try it silently before
  // showing the gate at all. Always re-verifies against current match state (never blindly trusts
  // storage), so a stale/wrong-team remembered PIN just falls through to the normal PIN screen instead
  // of granting access it shouldn't.
  const rememberKey=data.matchId?("lcc_pin_"+data.matchId):null;
  if(rememberKey&&autoTriedRef.current!==rememberKey){
    autoTriedRef.current=rememberKey;
    let saved=null; try{saved=localStorage.getItem(rememberKey);}catch(e){}
    if(saved){
      const r=verify(saved);
      if(r.ok){ setTimeout(()=>attemptClaim(r),0); return <Centered emoji="🔑" title="Welcome back…" sub="Remembered this device"/>; }
    }
  }

  return <PinGate title="Team Scorer Access" verify={verify} onOk={(r)=>attemptClaim(r)} onCancel={onCancel} rememberKey={rememberKey}
    hint={data.awaitingOpeners?"Setting up openers":data.ib?"Innings break — new team sets up":`${data.battingTeam} batting`}/>;
}
