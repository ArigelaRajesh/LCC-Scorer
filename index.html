function PinGate({title,pin,altPin,verify,hint,onOk,onCancel}){
  const[val,setVal]=React.useState("");
  const[err,setErr]=React.useState(false);
  const[errMsg,setErrMsg]=React.useState("");
  const submit=()=>{
    if(verify){
      const r=verify(val);
      if(r.ok){onOk();}else{setErr(true);setErrMsg(r.msg||"❌ Wrong PIN");setVal("");}
    } else {
      if(val===pin||(altPin&&val===altPin)){onOk();}else{setErr(true);setErrMsg("❌ Wrong PIN, try again");setVal("");}
    }
  };
  return(
    <div className="result-screen"><div className="result-card" style={{maxWidth:360,textAlign:"center"}}>
      <div style={{fontSize:44,marginBottom:10}}>🔒</div>
      <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:24,fontWeight:700,marginBottom:4}}>{title}</h2>
      <p style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:hint?6:18}}>Enter PIN to continue</p>
      {hint&&<p style={{color:"#34d399",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:16}}>● {hint}</p>}
      <input type="password" inputMode="numeric" value={val} autoFocus
        onChange={e=>{setVal(e.target.value);setErr(false);}}
        onKeyDown={e=>e.key==="Enter"&&submit()}
        placeholder="••••"
        style={{width:"100%",textAlign:"center",letterSpacing:"0.5em",fontSize:22,background:"rgba(7,5,15,.8)",border:`1.5px solid ${err?"#ef4444":"rgba(99,102,241,.4)"}`,borderRadius:14,padding:"12px",color:"#fff",fontFamily:"'JetBrains Mono',monospace",outline:"none",marginBottom:12}}/>
      {err&&<p style={{color:"#f87171",fontSize:12,marginBottom:12,fontFamily:"'Inter',sans-serif",lineHeight:1.4}}>{errMsg}</p>}
      <div className="grid-2">
        <button className="btn btn-ghost w-full" onClick={onCancel}>Cancel</button>
        <button className="btn btn-primary w-full" onClick={submit}>Enter</button>
      </div>
    </div></div>
  );
}

function CricketScene(){
  // Jumbled order — no two same outcomes back to back where possible
  const outcomes=React.useMemo(()=>[
    {label:"SIX!",color:"#34d399",type:"six"},
    {label:"RUN OUT!",color:"#f87171",type:"runout"},
    {label:"FOUR!",color:"#fbbf24",type:"four"},
    {label:"WIDE",color:"#a5b4fc",type:"wide"},
    {label:"CAUGHT!",color:"#f87171",type:"caught"},
    {label:"SIX!",color:"#34d399",type:"six"},
    {label:"BOWLED!",color:"#f87171",type:"bowled"},
  ],[]);
  const[idx,setIdx]=React.useState(0);
  // phase: "approach" (ball traveling toward the bat) -> "contact" (the moment of truth — bat, ball,
  // AND result text all flip to their "hit" pose in this SAME React state update, so they are
  // mathematically guaranteed to change in the same render/paint) -> "settle" (everything eases back).
  const[phase,setPhase]=React.useState("approach");
  const APPROACH_MS=1900;   // bowler runs in, ball travels
  const SETTLE_MS=2400;     // after contact: follow-through, ball flies away, result fades
  const CYCLE_MS=APPROACH_MS+SETTLE_MS+200; // small gap before next outcome starts

  // SINGLE recursive setTimeout chain — NOT a setInterval running alongside separate setTimeouts.
  // The previous version had setInterval(runCycle, CYCLE_MS) AND a setTimeout both firing around the
  // same moment as two independent timers; if they landed even a few ms apart, the new outcome's label
  // would render in the OLD "settle" pose for a flash before phase reset to "approach" caught up —
  // that flash was the literal cause of "result shows up first, then flickers". This pattern guarantees
  // the outcome change and the phase reset happen in the exact same callback, same tick, every time.
  React.useEffect(()=>{
    let alive=true;
    let timers=[];
    let raf=null;
    function step(){
      if(!alive)return;
      // "reset": ball snaps instantly (no transition) back to the bowler's hand, invisible.
      // Then on the NEXT animation frame we switch to "approach", which has a real transition —
      // so the browser animates FROM this reset position TO the contact point, guaranteeing every
      // single outcome (including six and caught, whose settle points are far from the bowler)
      // visibly starts its ball-travel from the bowler's hand, never from wherever the last ball settled.
      setPhase("reset");
      raf=requestAnimationFrame(()=>{
        raf=requestAnimationFrame(()=>{ if(alive) setPhase("approach"); });
      });
      timers.push(setTimeout(()=>{ if(alive) setPhase("contact"); },APPROACH_MS));
      timers.push(setTimeout(()=>{ if(alive) setPhase("settle"); },APPROACH_MS+120));
      timers.push(setTimeout(()=>{
        if(!alive)return;
        setIdx(i=>(i+1)%outcomes.length); // change outcome...
        step();                            // ...and immediately chain the next cycle's reset, atomically
      },CYCLE_MS));
    }
    step();
    return ()=>{ alive=false; timers.forEach(clearTimeout); if(raf)cancelAnimationFrame(raf); };
  },[outcomes.length]);

  const o=outcomes[idx];
  const type=o.type;
  const isBowled=type==="bowled", isSix=type==="six", isCaught=type==="caught", isRunOut=type==="runout", isWide=type==="wide", isFour=type==="four";
  const isHit = isSix||isFour;
  const contactOrAfter = phase==="contact"||phase==="settle";
  const settled = phase==="settle";
  const S=(c)=>({stroke:c,strokeWidth:5,strokeLinecap:"round",fill:"none"});

  // ── Ball position, computed directly from `phase` in JS (not a CSS keyframe %) ──
  // This is what guarantees sync: the ball's rendered position THIS render is derived from
  // the exact same `phase` value that also controls the bat pose and the result text.
  const BOWLER_HAND={x:70,y:110};
  const contactPt = isWide?{x:252,y:140}:isCaught?{x:248,y:108}:isBowled?{x:284,y:118}:{x:252,y:118};
  const settlePt = (()=>{
    if(isSix) return {x:60,y:42};
    if(isFour) return {x:8,y:112};
    if(isBowled) return {x:291,y:130};
    if(isCaught) return {x:208,y:58};
    if(isRunOut) return {x:56,y:108};
    return {x:305,y:142}; // wide drifts off
  })();
  // phase==="reset" is a one-frame state inserted right before "approach" starts: it snaps the ball
  // back to the bowler's hand with NO transition, so the very next frame (approach) can then transition
  // smoothly FROM the bowler's hand TO the contact point. Without this explicit reset frame, the browser
  // would transition from wherever the ball settled in the PREVIOUS cycle (which for six/caught is far
  // from the bowler) straight toward this cycle's contact point — visually looking like the ball started
  // its journey from near the batsman/fielder instead of the bowler. This was the actual root cause.
  const ballTarget = phase==="reset" ? BOWLER_HAND : phase==="approach" ? contactPt : phase==="contact" ? contactPt : settlePt;

  const swingRotation = settled ? 0 : contactOrAfter ? (isSix?-160:isFour?-100:0) : 0;
  const bowlArmRotation = phase==="approach" ? -360 : -360;

  // viewBox is 320x170: a dedicated top band (y 0-40) for the result word,
  // and the pitch/figures live entirely below that (y 45-150) — no shared space, no overlap risk.
  return(
    <div style={{position:"relative",width:"100%",aspectRatio:"320/170",maxHeight:150,margin:"0 auto 2px"}}>
      <svg viewBox="0 0 320 170" preserveAspectRatio="xMidYMid meet" style={{width:"100%",height:"100%",display:"block"}}>
        {/* Result word — appears in the EXACT same render where phase becomes "contact", driven by JS not a CSS %.
            IMPORTANT: the transition for going BACK to invisible (start of next cycle) must be fast, not slow —
            a slow fade-out here was the cause of the old label still being visible (mid-fade) at the same moment
            the new outcome's word had already swapped in via {o.label}, which looked exactly like duplication. */}
        <text x="160" y="28" textAnchor="middle"
          fontFamily="'Oswald',sans-serif" fontSize="28" fontWeight="700" letterSpacing="2"
          fill={o.color}
          opacity={contactOrAfter ? (settled?0.55:0.95) : 0}
          style={{transform:contactOrAfter?(settled?"scale(0.95)":"scale(1.1)"):"scale(0.5)",
                  transformOrigin:"160px 28px",
                  transition:phase==="contact"?"opacity .15s ease-out, transform .15s cubic-bezier(.34,1.56,.64,1)"
                            :phase==="settle"?"opacity .6s ease-out, transform .6s ease-out"
                            :"opacity 0s, transform 0s"}}>
          {o.label}
        </text>

        {/* Pitch + figures band */}
        <line x1="14" y1="148" x2="306" y2="148" stroke="rgba(16,185,129,.55)" strokeWidth="3"/>

        {/* Bowler — runs through release motion during "approach", same JS-driven timing as the ball */}
        <g transform="translate(56,76)">
          <circle cx="0" cy="0" r="11" {...S("#a5b4fc")}/>
          <line x1="0" y1="11" x2="0" y2="49" {...S("#a5b4fc")}/>
          <line x1="0" y1="49" x2="-12" y2="65" {...S("#a5b4fc")}/>
          <line x1="0" y1="49" x2="12" y2="65" {...S("#a5b4fc")}/>
          <g style={{transformOrigin:"0px 19px",transform:`rotate(${phase==="approach"?-220:-360}deg)`,transition:`transform ${phase==="approach"?APPROACH_MS:300}ms ease-in-out`}}>
            <line x1="0" y1="19" x2="19" y2="9" {...S("#a5b4fc")}/>
          </g>
        </g>

        {/* Batsman 1 (striker) */}
        <g transform={isRunOut?"translate(0,0)":"translate(264,76)"}>
          <g style={{
            transform:isRunOut?(settled?"translate(56px,76px)":contactOrAfter?"translate(150px,76px)":"translate(264px,76px)"):"none",
            transition:isRunOut?`transform ${contactOrAfter?(settled?'1100ms':'900ms'):'0ms'} ease-in-out`:"none"
          }}>
            <circle cx="0" cy="0" r="11" {...S("#fbbf24")}/>
            <line x1="0" y1="11" x2="0" y2="49" {...S("#fbbf24")}/>
            <g style={{transformOrigin:"0px 49px",animation:isRunOut?"legSprint .3s linear infinite":"none"}}>
              <line x1="0" y1="49" x2="-12" y2="65" {...S("#fbbf24")}/>
              <line x1="0" y1="49" x2="12" y2="65" {...S("#fbbf24")}/>
            </g>
            {/* Bat swing — same simple motion for every outcome that involves a swing (six and four alike).
                A six is distinguished by the BALL flying further/higher afterward, not by a separate
                celebration animation — keeps the scene simple and avoids any extra moving parts to desync.
                The contact-transition duration (150ms) is matched EXACTLY to the result text's pop-in duration
                below, so the bat finishes its swing at the same visual instant the word finishes appearing. */}
            <g style={{transformOrigin:"0px 19px",
              transform:`rotate(${isHit?swingRotation:0}deg)`,
              transition:`transform ${phase==="approach"?'250ms':contactOrAfter?(settled?'900ms':'150ms'):'0ms'} ease-in-out`}}>
              <line x1="0" y1="19" x2="-7" y2="31" {...S("#fbbf24")}/>
              <line x1="-7" y1="31" x2="-7" y2="62" stroke="#e8c39a" strokeWidth="7" strokeLinecap="round"/>
            </g>
          </g>
        </g>

        {/* Batsman 2 (non-striker) — only for run-out, mirrors batsman 1's phase-driven motion exactly */}
        {isRunOut&&(
          <g style={{
            transform:settled?"translate(264px,76px)":contactOrAfter?"translate(170px,76px)":"translate(56px,76px)",
            transition:`transform ${contactOrAfter?(settled?'1100ms':'900ms'):'0ms'} ease-in-out`
          }}>
            <circle cx="0" cy="0" r="11" {...S("#e0e7ff")}/>
            <line x1="0" y1="11" x2="0" y2="49" {...S("#e0e7ff")}/>
            <g style={{transformOrigin:"0px 49px",animation:"legSprint .3s linear infinite"}}>
              <line x1="0" y1="49" x2="-12" y2="65" {...S("#e0e7ff")}/>
              <line x1="0" y1="49" x2="12" y2="65" {...S("#e0e7ff")}/>
            </g>
            <line x1="0" y1="19" x2="14" y2="10" {...S("#e0e7ff")}/>
          </g>
        )}

        {/* Fielder — only for a catch, dives in exactly when phase becomes "contact" */}
        {isCaught&&(
          <g transform="translate(222,60)">
            <g style={{
              opacity:contactOrAfter?1:0,
              transform:contactOrAfter?"translate(-16px,8px) rotate(-30deg)":"translate(0,0) rotate(0deg)",
              transition:`transform ${contactOrAfter?'350ms':'0ms'} ease-out, opacity 150ms ease-out`
            }}>
              <circle cx="0" cy="0" r="10" {...S("#6ee7b7")}/>
              <line x1="0" y1="10" x2="0" y2="40" {...S("#6ee7b7")}/>
              <line x1="0" y1="16" x2="-14" y2="4" {...S("#6ee7b7")}/>
              <line x1="0" y1="16" x2="14" y2="4" {...S("#6ee7b7")}/>
              <line x1="0" y1="40" x2="-10" y2="54" {...S("#6ee7b7")}/>
              <line x1="0" y1="40" x2="10" y2="54" {...S("#6ee7b7")}/>
            </g>
          </g>
        )}

        {/* Stumps — fall exactly when phase becomes "contact", same trigger as everything else */}
        <g transform="translate(286,117)">
          {[0,5,10].map(dx=>(
            <line key={dx} x1={dx} y1="0" x2={dx} y2="24" stroke={(isBowled||isRunOut)&&contactOrAfter?"#f87171":"rgba(226,232,240,.55)"} strokeWidth="3"
              style={isBowled?{transformOrigin:`${dx}px 24px`,transform:`rotate(${contactOrAfter?40:0}deg)`,transition:`transform ${contactOrAfter?'400ms':'0ms'} ease-out`}:{}}/>
          ))}
        </g>

        {/* Ball — position computed directly from `phase` (the single source of truth), not an independent CSS keyframe.
            Contact-transition duration (150ms) matched exactly to the bat swing and result text above, so all
            three visually land together at the same instant — this is the actual definition of "bat hits ball,
            then result shows, in sync": all three numbers must be identical, not just close. */}
        <circle cx={ballTarget.x} cy={ballTarget.y} r="6" fill="#ef4444" stroke="#fca5a5" strokeWidth="2"
          opacity={phase==="reset"?0:(settled&&(isSix||isFour||isBowled||isCaught||isRunOut||isWide)?0:1)}
          style={{transition:phase==="reset"?"none"
                  :phase==="approach"?`cx ${APPROACH_MS}ms ease-in-out, cy ${APPROACH_MS}ms ease-in-out, opacity 200ms ease-in`
                  :contactOrAfter?`cx ${settled?'1100ms':'150ms'} ease-in-out, cy ${settled?'1100ms':'150ms'} ease-in-out, opacity ${settled?'600ms':'0ms'} ease-out`
                  :"none"}}/>
      </svg>
    </div>
  );
}

function ScorerGate({onOk,onCancel}){
  const[data,setData]=React.useState(undefined); // undefined=loading, null=no match, obj=match info
  const[slotMsg,setSlotMsg]=React.useState(null); // transient message when a slot claim fails
  React.useEffect(()=>{
    if(!FB_OK||!DB){setData(null);return;}
    const ref=DB.ref("live");
    const cb=ref.on("value",s=>{
      const v=s.val();
      if(!v||!v.inn||!v.pinA||!v.pinB){setData(null);return;}
      setData({pinA:v.pinA,pinB:v.pinB,teamA:v.teamA,teamB:v.teamB,battingTeam:v.battingTeam,
        awaitingOpeners:!!v.inn.awaitingOpeners,ib:!!v.ib,mo:!!v.mo,
        slotsA:Array.isArray(v.slotsA)?v.slotsA:[],slotsB:Array.isArray(v.slotsB)?v.slotsB:[]});
    });
    return ()=>ref.off("value",cb);
  },[]);

  if(data===undefined) return <Centered emoji="🔑" title="Checking match…" sub="Loading scorer access"/>;
  if(data===null) return <Centered emoji="🏏" title="No active match yet" sub="Waiting for admin to start a match… this screen will update automatically once they do." onExit={onCancel}/>;
  if(data.mo) return <Centered emoji="🏆" title="Match has ended" sub="Ask the admin to start a new match." onExit={onCancel}/>;

  // Try to claim (or confirm an existing claim on) one of a team's 2 scorer slots for this device.
  // Returns true if this device now has (or already had) a slot; false if both slots are taken by others.
  const claimSlot=(teamKey, slotsField)=>{
    const slots = data[slotsField];
    if(slots.includes(DEVICE_ID)) return true; // already has a slot — always allowed back in
    if(slots.length < 2){
      const updated = [...slots, DEVICE_ID];
      DB.ref(`live/${slotsField}`).set(updated).catch(e=>console.error("slot claim failed",e));
      return true;
    }
    return false; // both slots full, and this device isn't one of them
  };

  const verify=(entered)=>{
    if(entered===ADMIN_PIN) return {ok:true};  // admin master key — not subject to the 2-slot limit
    const isTeamA=entered===data.pinA, isTeamB=entered===data.pinB;
    if(!isTeamA&&!isTeamB) return {ok:false,msg:"❌ Wrong PIN, try again"};
    const myTeam=isTeamA?data.teamA:data.teamB;

    // Enforce max 2 scorers per team (tracked by device, so the same phone can always rejoin)
    const slotOk = isTeamA ? claimSlot(myTeam,"slotsA") : claimSlot(myTeam,"slotsB");
    if(!slotOk) return {ok:false,msg:`🚫 Already 2 scorers active for ${myTeam}. Ask one of them to hand off, or have admin reset the match.`};

    // During opener setup OR innings break (new team about to bat), both team scorers may enter
    if(data.awaitingOpeners||data.ib) return {ok:true};
    // Otherwise only the currently-batting team can use the live scoring buttons
    if(myTeam===data.battingTeam) return {ok:true};
    return {ok:false,msg:`🔒 ${myTeam} isn't batting right now. ${data.battingTeam} is batting — wait for your innings.`};
  };

  return <PinGate title="Team Scorer Access" verify={verify} onOk={onOk} onCancel={onCancel}
    hint={data.awaitingOpeners?"Setting up openers — both teams can enter":data.ib?"Innings break — new batting team can set up":`${data.battingTeam} is batting now`}/>;
}

  const entries=Object.entries(roster||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));

  // Each vote record is {choice:"yes"|"no", plus1:boolean, kidName:string}.
  // choice is mutually exclusive (a person is in exactly one of Yes/No, never both, never neither
  // once they've voted). plus1 is completely independent of choice — it can be true alongside
  // EITHER yes or no, since a parent might bring their kid regardless of their own attendance.
  const setChoice=(playerId,choice)=>{
    if(!FB_OK||!DB)return;
    const existing=votes?.[playerId]||{};
    DB.ref("poll/votes/"+playerId).set(JSON.parse(JSON.stringify({...existing,choice})));
    try{ localStorage.setItem("lcc_poll_voted_as",playerId); }catch(e){}
    setMyVote(playerId);
  };
  const togglePlus1=(playerId)=>{
    if(!FB_OK||!DB)return;
    const existing=votes?.[playerId]||{};
    const turningOn=!existing.plus1;
    if(turningOn){
      const nm=(kidDraft[playerId]||"").trim();
      if(!nm){ alert("Enter your kid's name first."); return; }
      DB.ref("poll/votes/"+playerId).set(JSON.parse(JSON.stringify({...existing,plus1:true,kidName:nm})));
    }else{
      DB.ref("poll/votes/"+playerId).set(JSON.parse(JSON.stringify({...existing,plus1:false,kidName:null})));
    }
  };

  const counts={yes:0,no:0,plus1:0};
  Object.values(votes||{}).forEach(v=>{
    if(v?.choice==="yes")counts.yes++;
    if(v?.choice==="no")counts.no++;
    if(v?.plus1)counts.plus1++;
  });

  return(
    <div>
      <div className="mini-card" style={{marginBottom:16,textAlign:"center"}}>
        <p style={{color:"#fbbf24",fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,marginBottom:4}}>{poll.venue}</p>
        <p style={{color:"#a5b4fc",fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}>{new Date(poll.date+"T"+poll.time).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})} · {poll.time}</p>
        <div style={{display:"flex",justifyContent:"center",gap:18,marginTop:12}}>
          <span style={{color:"#34d399",fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}>✅ {counts.yes} Yes</span>
          <span style={{color:"#f87171",fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}>❌ {counts.no} No</span>
          <span style={{color:"#fbbf24",fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}>➕ {counts.plus1} Kids</span>
        </div>
      </div>
      <p className="section-title">Tap your name to vote</p>
      {entries.length===0&&<p style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"20px 0"}}>No players in the roster yet — ask admin to add the team.</p>}
      {entries.map(([id,p])=>{
        const v=votes?.[id]||{};
        const isMe=myVote===id;
        return(
          <div key={id} className="mini-card" style={{marginBottom:8,border:isMe?"1.5px solid rgba(245,158,11,.5)":undefined}}>
            <div className="flex items-center justify-between" style={{marginBottom:8}}>
              <span style={{fontWeight:600,fontSize:14}}>{p.name} {p.keeper&&"🧤"}{isMe&&<span style={{color:"#fbbf24",fontSize:10,marginLeft:6}}>(you)</span>}</span>
              <span style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>{p.role}</span>
            </div>
            <div className="grid-2" style={{marginBottom:10}}>
              <button onClick={()=>setChoice(id,"yes")} style={{padding:"8px 4px",borderRadius:10,border:`1.5px solid ${v.choice==="yes"?"transparent":"#374151"}`,background:v.choice==="yes"?"linear-gradient(135deg,#34d399,#10b981)":"transparent",color:v.choice==="yes"?"#111":"#9ca3af",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"'Inter',sans-serif"}}>✅ Yes</button>
              <button onClick={()=>setChoice(id,"no")} style={{padding:"8px 4px",borderRadius:10,border:`1.5px solid ${v.choice==="no"?"transparent":"#374151"}`,background:v.choice==="no"?"linear-gradient(135deg,#dc2626,#991b1b)":"transparent",color:v.choice==="no"?"#fff":"#9ca3af",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"'Inter',sans-serif"}}>❌ No</button>
            </div>
            {/* +1 is independent of Yes/No — a parent can bring a kid regardless of their own choice */}
            {v.plus1 ? (
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.35)",borderRadius:10,padding:"8px 10px"}}>
                <span style={{fontSize:12,color:"#fbbf24",fontFamily:"'Inter',sans-serif"}}>➕ Bringing {v.kidName}</span>
                <button onClick={()=>togglePlus1(id)} style={{background:"none",border:"none",color:"#92753a",cursor:"pointer",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>remove</button>
              </div>
            ) : (
              <div style={{display:"flex",gap:6}}>
                <input value={kidDraft[id]||""} onChange={e=>setKidDraft(d=>({...d,[id]:e.target.value}))} placeholder="Kid's name (optional)" style={{flex:1,fontSize:12,padding:"8px 10px"}}/>
                <button onClick={()=>togglePlus1(id)} style={{padding:"8px 12px",borderRadius:10,border:"1.5px solid rgba(245,158,11,.4)",background:"transparent",color:"#fbbf24",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"'Inter',sans-serif",whiteSpace:"nowrap"}}>➕ Add</button>
              </div>
            )}
          </div>
        );
      })}
      <p style={{color:"#4338ca",fontSize:11,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",marginTop:14}}>Anyone can vote on behalf of any name — tap the right name for you. +1 works alongside either Yes or No.</p>
    </div>
  );
}

// ── Captain-led team builder — anyone can open this and assign players, then publish ──
function PollTeamsTab({roster,poll,votes,teams}){
  const[capA,setCapA]=React.useState(teams?.captainA||"");
  const[capB,setCapB]=React.useState(teams?.captainB||"");
  const[teamA,setTeamA]=React.useState(teams?.teamA||[]);
  const[teamB,setTeamB]=React.useState(teams?.teamB||[]);

  React.useEffect(()=>{
    setCapA(teams?.captainA||""); setCapB(teams?.captainB||"");
    setTeamA(teams?.teamA||[]); setTeamB(teams?.teamB||[]);
  },[teams]);

  if(!poll) return <Centered emoji="🏏" title="No poll open right now" sub="Teams are built from this week's poll responses."/>;

  const yesIds=Object.entries(votes||{}).filter(([,v])=>v?.choice==="yes").map(([id])=>id);
  const yesPlayers=yesIds.map(id=>({id,...(roster?.[id]||{name:"(removed player)"})})).sort((a,b)=>a.name.localeCompare(b.name));
  const assigned=new Set([...teamA,...teamB]);
  const unassigned=yesPlayers.filter(p=>!assigned.has(p.id));

  const moveTo=(id,team)=>{
    setTeamA(a=>a.filter(x=>x!==id));
    setTeamB(b=>b.filter(x=>x!==id));
    if(team==="A") setTeamA(a=>[...a.filter(x=>x!==id),id]);
    if(team==="B") setTeamB(b=>[...b.filter(x=>x!==id),id]);
  };
  const remove=(id)=>{ setTeamA(a=>a.filter(x=>x!==id)); setTeamB(b=>b.filter(x=>x!==id)); };

  const publish=()=>{
    if(!capA.trim()||!capB.trim()){alert("Enter both captains' names.");return;}
    if(teamA.length===0||teamB.length===0){alert("Both teams need at least one player.");return;}
    if(!FB_OK||!DB){alert("Offline — can't publish right now.");return;}
    DB.ref("poll/teams").set({captainA:capA.trim(),captainB:capB.trim(),teamA,teamB,published:true,publishedAt:Date.now()})
      .then(()=>alert("Teams published! Everyone can now see the lineup."))
      .catch(e=>alert("Failed: "+e.message));
  };

  const nameOf=(id)=>roster?.[id]?.name||"(removed player)";

  return(
    <div>
      <div className="mini-card" style={{marginBottom:16}}>
        <p className="section-title">👑 Captains for this week</p>
        <div className="grid-2">
          <div>
            <label>Team A Captain</label>
            <input value={capA} onChange={e=>setCapA(e.target.value)} placeholder="Captain A's name"/>
          </div>
          <div>
            <label>Team B Captain</label>
            <input value={capB} onChange={e=>setCapB(e.target.value)} placeholder="Captain B's name"/>
          </div>
        </div>
      </div>

      <p className="section-title">Available (voted Yes) — {unassigned.length} unassigned</p>
      {unassigned.length===0&&yesPlayers.length===0&&<p style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"14px 0"}}>No Yes votes yet — check the Vote tab.</p>}
      {unassigned.map(p=>(
        <div key={p.id} className="mini-card" style={{marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:600}}>{p.name} {p.keeper&&"🧤"} <span style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>{p.role}</span></span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>moveTo(p.id,"A")} style={{background:"rgba(245,158,11,.15)",border:"1px solid rgba(245,158,11,.4)",color:"#fbbf24",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>→ A</button>
            <button onClick={()=>moveTo(p.id,"B")} style={{background:"rgba(52,211,153,.15)",border:"1px solid rgba(52,211,153,.4)",color:"#6ee7b7",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>→ B</button>
          </div>
        </div>
      ))}

      <div className="divider" style={{margin:"18px 0"}}/>
      <div className="grid-2" style={{gap:12}}>
        <div>
          <p className="section-title" style={{color:"#fbbf24"}}>🟡 Team A ({teamA.length}){capA&&` · ${capA}`}</p>
          {teamA.map(id=>(
            <div key={id} className="mini-card" style={{marginBottom:6,padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12}}>{nameOf(id)}</span>
              <button onClick={()=>remove(id)} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:14}}>×</button>
            </div>
          ))}
        </div>
        <div>
          <p className="section-title" style={{color:"#6ee7b7"}}>⚡ Team B ({teamB.length}){capB&&` · ${capB}`}</p>
          {teamB.map(id=>(
            <div key={id} className="mini-card" style={{marginBottom:6,padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12}}>{nameOf(id)}</span>
              <button onClick={()=>remove(id)} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:14}}>×</button>
            </div>
          ))}
        </div>
      </div>

      <button className="btn btn-primary w-full" style={{marginTop:18}} onClick={publish}>📢 Publish Teams</button>
      {teams?.published&&<p style={{color:"#34d399",fontSize:11,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",marginTop:10}}>✓ Published — visible to everyone</p>}
      <p style={{color:"#4338ca",fontSize:11,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",marginTop:10}}>Even after the match starts, you can come back here and adjust who's on which team if plans change.</p>
    </div>
  );
}

function Root(){
  const[screen,setScreen]=React.useState("landing"); // landing|viewer|scorer|admin|history
  const[gate,setGate]=React.useState(null);          // null | "scorer" | "admin"
  const[isAdmin,setIsAdmin]=React.useState(false);    // persists for this session once admin PIN is entered

  const pick=(r)=>{
    if(r==="scorer"){setGate("scorer");}
    else if(r==="admin"){setGate("admin");}
    else setScreen(r);
  };
  const home=()=>{setScreen("landing");setGate(null);};

  if(gate==="scorer") return <ScorerGate onOk={()=>{setGate(null);setScreen("scorer");}} onCancel={home}/>;
  if(gate==="admin")  return <PinGate title="Admin Access"  pin={ADMIN_PIN}  onOk={()=>{setGate(null);setIsAdmin(true);setScreen("admin");}}  onCancel={home}/>;

  if(screen==="landing") return <Landing onPick={pick}/>;
  if(screen==="viewer")  return <ViewerLive onExit={home}/>;
  if(screen==="history") return <HistoryPage role={isAdmin?"admin":"viewer"} onExit={()=>setScreen(isAdmin?"admin":"landing")}/>;
  if(screen==="poll")    return <PollPage role={isAdmin?"admin":"viewer"} onExit={()=>setScreen(isAdmin?"admin":"landing")}/>;
  if(screen==="roster")  return <RosterPage onExit={()=>setScreen(isAdmin?"admin":"landing")}/>;
  if(screen==="pollAdmin") return <PollAdminPage onExit={()=>setScreen(isAdmin?"admin":"landing")}/>;
  if(screen==="scorer")  return <App role="scorer" onExit={home}/>;
  if(screen==="admin")   return <App role="admin" onExit={home} onHistory={()=>setScreen("history")} onPoll={()=>setScreen("pollAdmin")} onRoster={()=>setScreen("roster")}/>;
  return <Landing onPick={pick}/>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  componentDidCatch(error,info){console.error("App crashed:",error,info);}
  render(){
    if(this.state.error){
      return(
        <div className="screen">
          <div className="card" style={{maxWidth:420,textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
            <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,marginBottom:10}}>Something went wrong</h2>
            <p style={{color:"#9ca3af",fontSize:12,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>{String(this.state.error.message||this.state.error)}</p>
            <p style={{color:"#6b7280",fontSize:12,marginBottom:18}}>This is usually caused by stale match data. Tap below to reset and go home — the live match (if any) is unaffected on the server.</p>
            <button className="btn btn-primary w-full" onClick={()=>{this.setState({error:null});window.location.hash="";window.location.reload();}}>🔄 Reset & Reload</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.render(<ErrorBoundary><Root/></ErrorBoundary>,document.getElementById("root"));
</script>
