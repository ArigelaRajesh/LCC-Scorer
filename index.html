      {/* Buttons */}
      <div style={{opacity:dis?.4:1,pointerEvents:dis?"none":"auto"}} className="space-y-3">
        <div className="grid-4">
          {[0,1,2,3].map(r=><button key={r} className="btn-run" onClick={()=>{record({type:String(r)});setIsFreeHit(false);}}>{r}</button>)}
        </div>
        <div className="grid-3">
          <button className="btn-run amber" onClick={()=>{record({type:"4"});setIsFreeHit(false);}}>4</button>
          <button className="btn-run green" onClick={()=>{record({type:"6"});setIsFreeHit(false);}}>6</button>
          <button className="btn-run" onClick={()=>{record({type:"5"});setIsFreeHit(false);}}>5</button>
        </div>
        <div className="grid-4" style={{gridTemplateColumns:"1fr 1fr 1fr"}}>
          <button className="btn btn-danger" onClick={()=>setSW(true)} style={{borderRadius:14,padding:"13px 8px",fontSize:13}}>Wicket</button>
          <button className="btn btn-outline-amber" onClick={()=>setEM("WD")} style={{borderRadius:14,fontSize:13}}>Wide</button>
          <button className="btn btn-outline-amber" onClick={()=>setEM("NB")} style={{borderRadius:14,fontSize:13,borderColor:"#ca8a04",color:"#facc15"}}>No Ball</button>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn" onClick={()=>record({type:"DECL",runs:1})} style={{flex:1,borderRadius:14,fontSize:15,padding:"10px 4px",background:"transparent",border:"1.5px solid rgba(167,139,250,.5)",color:"#c4b5fd",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>D1</button>
          <button className="btn" onClick={()=>record({type:"DECL",runs:2})} style={{flex:1,borderRadius:14,fontSize:15,padding:"10px 4px",background:"transparent",border:"1.5px solid rgba(167,139,250,.5)",color:"#c4b5fd",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>D2</button>
          <button className="btn" onClick={()=>setShowOT(true)} style={{flex:2,borderRadius:14,fontSize:12,padding:"10px 6px",background:"transparent",border:"1.5px solid rgba(251,146,60,.55)",color:"#fb923c",fontWeight:600}}>🔄 Overthrow</button>
        </div>
        <button className="btn w-full" onClick={onRetire} style={{borderRadius:14,fontSize:13,padding:"12px",background:"transparent",border:"1.5px solid rgba(139,92,246,.5)",color:"#c4b5fd",marginTop:8}}>🔁 Retire {inn.single?"Batsman":"Striker"}</button>
      </div>

      {/* End Innings / Revert — always clickable, even mid-wicket or mid-bowler-change, so admin/scorer can always end or recover */}
      <div className="grid-2" style={{marginTop:8}}>
        <button className="btn w-full" onClick={onEndInnings} style={{borderRadius:14,fontSize:12,padding:"11px",background:"transparent",border:"1.5px solid rgba(239,68,68,.4)",color:"#f87171"}}>⏹ End {inn.inningsNum===1?"Innings":"Match"}</button>
        {role==="admin"&&<button className="btn w-full" onClick={onRevert} disabled={!canRevert} style={{borderRadius:14,fontSize:12,padding:"11px",background:"transparent",border:`1.5px solid ${canRevert?"rgba(52,211,153,.5)":"rgba(55,65,129,.3)"}`,color:canRevert?"#34d399":"#374151",cursor:canRevert?"pointer":"not-allowed"}}>↩️ Revert to Live</button>}
      </div>

      {/* Wicket modal */}
      {showW&&<Modal onClose={()=>{setSW(false);setFielder("");}} title="🏏 How Out?">
        {isFreeHit&&(
          <div style={{background:"rgba(234,179,8,.12)",border:"1.5px solid rgba(234,179,8,.4)",borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>🟡</span>
            <span style={{fontSize:12,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>FREE HIT — only Run Out can dismiss</span>
          </div>
        )}
        <div className="grid-2 mb-4">
          {(isFreeHit?["Run Out"]:["Bowled","Caught","LBW","Run Out","Stumped"]).map(w=>(
            <button key={w} onClick={()=>setWT(w)} style={{padding:"10px 8px",borderRadius:12,border:`1.5px solid ${wt===w?"transparent":"#374151"}`,background:wt===w?"linear-gradient(135deg,#dc2626,#991b1b)":"transparent",color:wt===w?"#fff":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:13,fontFamily:"'Inter',sans-serif",marginBottom:4}}>{w}</button>
          ))}
        </div>
        {wt==="Caught"&&!isFreeHit&&(
          <div style={{marginBottom:14}}>
            <label>Caught by</label>
            <input value={fielder} onChange={e=>setFielder(e.target.value)} placeholder="Fielder's name (or bowler's, if c&b)" autoFocus/>
          </div>
        )}
        {wt==="Run Out"&&(<>
          <div style={{marginBottom:14}}>
            <label>Runs completed before the run-out</label>
            <div className="grid-4" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
              {[0,1,2,3].map(r=>(
                <button key={r} onClick={()=>setRoRuns(r)} style={{padding:"10px",borderRadius:12,border:`1.5px solid ${roRuns===r?"transparent":"#374151"}`,background:roRuns===r?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:roRuns===r?"#111":"#9ca3af",cursor:"pointer",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>{r}</button>
              ))}
            </div>
          </div>
          {!inn.single&&(
            <div style={{marginBottom:14}}>
              <label>Which end was the wicket?</label>
              <p style={{color:"#6b7280",fontSize:11,marginTop:-4,marginBottom:8}}>This decides where the new batsman comes in — pick the end the fielders actually hit, not who was originally batting there.</p>
              <div className="grid-2">
                <button onClick={()=>setRoEnd("striker")} style={{padding:"11px 6px",borderRadius:12,border:`1.5px solid ${roEnd==="striker"?"transparent":"#374151"}`,background:roEnd==="striker"?"linear-gradient(135deg,#dc2626,#991b1b)":"transparent",color:roEnd==="striker"?"#fff":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>🏏 Striker's end</button>
                <button onClick={()=>setRoEnd("nonStriker")} style={{padding:"11px 6px",borderRadius:12,border:`1.5px solid ${roEnd==="nonStriker"?"transparent":"#374151"}`,background:roEnd==="nonStriker"?"linear-gradient(135deg,#dc2626,#991b1b)":"transparent",color:roEnd==="nonStriker"?"#fff":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>⚪ Non-striker's end</button>
              </div>
            </div>
          )}
        </>)}
        <button className="btn btn-danger w-full" style={{borderRadius:14}} onClick={()=>{doW();setIsFreeHit(false);}}>Confirm Wicket</button>
      </Modal>}

      {/* Extra modal */}
      {em&&<Modal onClose={()=>{setEM(null);setER(0);}} title={em==="WD"?"Wide":em==="NB"?"No Ball":em==="B"?"Byes":em==="DECL"?"📍 Declare Runs":"Leg Byes"}>
        <p style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:12,marginBottom:12}}>{em==="NB"?"Runs off the bat:":em==="DECL"?"Runs to credit the striker (strike will NOT rotate):":"Additional runs:"}</p>
        <div className="grid-4 mb-4" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
          {[0,1,2,3,4,6].map(r=>(
            <button key={r} onClick={()=>setER(r)} style={{padding:"10px",borderRadius:12,border:`1.5px solid ${er===r?"transparent":"#374151"}`,background:er===r?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:er===r?"#111":"#9ca3af",cursor:"pointer",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",fontSize:14,marginBottom:6}}>{r}</button>
          ))}
        </div>
        <button className="btn btn-primary w-full" style={{borderRadius:14}} onClick={doEx}>Confirm</button>
      </Modal>}

      {/* Overthrow modal */}
      {showOT&&<Modal onClose={()=>setShowOT(false)} title="🔄 Overthrow">
        <p style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:12,marginBottom:4}}>Runs batters completed before the overthrow:</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
          {[0,1,2,3].map(r=>(
            <button key={r} onClick={()=>setOTBase(r)} style={{padding:"10px",borderRadius:12,
              border:`1.5px solid ${otBase===r?"transparent":"#374151"}`,
              background:otBase===r?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",
              color:otBase===r?"#111":"#9ca3af",cursor:"pointer",fontWeight:700,
              fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>{r}</button>
          ))}
        </div>

        <p style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:12,marginBottom:4}}>
          Overthrow runs <span style={{color:"#fb923c"}}>(normal: 1-4)</span>:
        </p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:8}}>
          {[1,2,3,4].map(r=>(
            <button key={r} onClick={()=>setOTThrow(r)} style={{padding:"10px",borderRadius:12,
              border:`1.5px solid ${otThrow===r?"transparent":"#374151"}`,
              background:otThrow===r?"linear-gradient(135deg,#fb923c,#ea580c)":"transparent",
              color:otThrow===r?"#111":"#9ca3af",cursor:"pointer",fontWeight:700,
              fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>{r}</button>
          ))}
        </div>

        <p style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:4}}>
          Declared overthrow <span style={{color:"#a78bfa"}}>(D1/D2 — strike based on batter runs only):</span>
        </p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {["D1","D2"].map(d=>(
            <button key={d} onClick={()=>setOTThrow(d)} style={{padding:"10px",borderRadius:12,
              border:`1.5px solid ${otThrow===d?"transparent":"rgba(167,139,250,.4)"}`,
              background:otThrow===d?"linear-gradient(135deg,#7c3aed,#6d28d9)":"rgba(167,139,250,.08)",
              color:otThrow===d?"#fff":"#a78bfa",cursor:"pointer",fontWeight:700,
              fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>{d}</button>
          ))}
        </div>

        {/* Strike preview */}
        {(()=>{
          const isDeclOT=typeof otThrow==="string";
          const oRuns=isDeclOT?parseInt(otThrow[1]):otThrow;
          const total=otBase+oRuns;
          const strikeChanges=isDeclOT?otBase%2===1:(total)%2===1;
          return(
            <div style={{background:"rgba(251,146,60,.1)",border:"1px solid rgba(251,146,60,.3)",
              borderRadius:12,padding:"10px 14px",marginBottom:14,textAlign:"center"}}>
              <p style={{color:"#fb923c",fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>
                {otBase} bat + {isDeclOT?otThrow:otThrow+" overthrow"} = <strong style={{fontSize:16,color:"#fff"}}>{total} total</strong>
              </p>
              <p style={{color:strikeChanges?"#34d399":"#a5b4fc",fontSize:11,fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>
                {strikeChanges?"⇄ Strike CHANGES":"→ Strike STAYS"}
                {isDeclOT&&<span style={{color:"#6b7280"}}> (declared — only bat runs count)</span>}
              </p>
            </div>
          );
        })()}

        <button className="btn btn-primary w-full" style={{borderRadius:14}} onClick={doOT}>Confirm Overthrow</button>
      </Modal>}
    </div>
  );
}

function Modal({children,onClose,title}){
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 style={{fontWeight:700,fontSize:17}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#6b7280",fontSize:22,cursor:"pointer",lineHeight:1,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── PIN Viewer — admin can check both team PINs anytime during the match ──────
// ── Super Admin: PIN management — set Basic Admin PIN from inside the app ──────
function PinManagementButton(){
  const[open,setOpen]=React.useState(false);
  const[basicPin,setBasicPin]=React.useState("");
  const[superPin,setSuperPin]=React.useState("");
  const[saved,setSaved]=React.useState(false);
  const[err,setErr]=React.useState("");
  const openModal=()=>{ setBasicPin(""); setSuperPin(""); setSaved(false); setErr(""); setOpen(true); };
  const save=()=>{
    setErr("");
    const bp=basicPin.trim(), sp=superPin.trim();
    if(bp&&(bp.length<4||!/^\d+$/.test(bp))){ setErr("Basic PIN must be 4 digits."); return; }
    if(sp&&(sp.length<4||!/^\d+$/.test(sp))){ setErr("Super PIN must be 4 digits."); return; }
    if(bp&&sp&&bp===sp){ setErr("The two PINs can't be the same."); return; }
    if(!bp&&!sp){ setErr("Enter at least one PIN to update."); return; }
    if(!FB_OK||!DB){ setErr("Offline — can't save right now."); return; }
    const updates={};
    if(bp) updates["adminPins/basic"]=bp;
    if(sp) updates["adminPins/super"]=sp;
    DB.ref().update(updates)
      .then(()=>{ setSaved(true); setBasicPin(""); setSuperPin(""); })
      .catch(e=>setErr("Save failed: "+e.message));
  };
  return(<>
    <button onClick={openModal} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.35)",color:"#f87171",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderRadius:8,padding:"4px 9px",fontWeight:600}}>🔐 PINs</button>
    {open&&<Modal onClose={()=>setOpen(false)} title="🔐 Manage Admin PINs">
      <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>Leave a field blank to keep the current PIN unchanged. Changes take effect for the next login — anyone already logged in stays active until they leave.</p>
      <label>New Basic Admin PIN (4 digits)</label>
      <input value={basicPin} onChange={e=>{setBasicPin(e.target.value.replace(/\D/g,"").slice(0,4));setSaved(false);setErr("");}} placeholder="Leave blank to keep current" inputMode="numeric" maxLength={4} style={{marginBottom:12,letterSpacing:"0.3em",textAlign:"center"}}/>
      <label>New Super Admin PIN (4 digits)</label>
      <input value={superPin} onChange={e=>{setSuperPin(e.target.value.replace(/\D/g,"").slice(0,4));setSaved(false);setErr("");}} placeholder="Leave blank to keep current" inputMode="numeric" maxLength={4} style={{marginBottom:14,letterSpacing:"0.3em",textAlign:"center"}}/>
      {err&&<p style={{color:"#f87171",fontSize:12,marginBottom:10}}>{err}</p>}
      {saved&&<p style={{color:"#34d399",fontSize:12,marginBottom:10}}>✓ PINs updated! Share the new Basic PIN with your helper.</p>}
      <p style={{color:"#4338ca",fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginBottom:12}}>Note: PINs are stored securely in Firebase. The hardcoded fallbacks in the file still work if Firebase is unreachable.</p>
      <button className="btn btn-primary w-full" onClick={save}>Save PINs</button>
    </Modal>}
  </>);
}

// ── PinMgmtModal — extracted as real component to avoid hooks-in-IIFE (React error #310) ──
function PinMgmtModal({onClose}){
  const[bp,setBP]=React.useState("");
  const[sp,setSP]=React.useState("");
  const[saved,setSaved]=React.useState(false);
  const[err,setErr]=React.useState("");
  const save=()=>{
    setErr("");
    const b=bp.trim(),s=sp.trim();
    if(b&&(b.length<4||!/^\d+$/.test(b))){setErr("Basic PIN must be 4 digits.");return;}
    if(s&&(s.length<4||!/^\d+$/.test(s))){setErr("Super PIN must be 4 digits.");return;}
    if(b&&s&&b===s){setErr("PINs can't be the same.");return;}
    if(!b&&!s){setErr("Enter at least one PIN to update.");return;}
    if(!FB_OK||!DB){setErr("Offline.");return;}
    const u={};if(b)u["adminPins/basic"]=b;if(s)u["adminPins/super"]=s;
    DB.ref().update(u).then(()=>setSaved(true)).catch(e=>setErr("Failed: "+e.message));
  };
  return(
    <Modal onClose={onClose} title="🔐 Manage Admin PINs">
      <label>New Basic Admin PIN</label>
      <input value={bp} onChange={e=>{setBP(e.target.value.replace(/\D/g,"").slice(0,4));setSaved(false);setErr("");}} placeholder="Leave blank to keep" inputMode="numeric" maxLength={4} style={{marginBottom:12,letterSpacing:".3em",textAlign:"center"}}/>
      <label>New Super Admin PIN</label>
      <input value={sp} onChange={e=>{setSP(e.target.value.replace(/\D/g,"").slice(0,4));setSaved(false);setErr("");}} placeholder="Leave blank to keep" inputMode="numeric" maxLength={4} style={{marginBottom:14,letterSpacing:".3em",textAlign:"center"}}/>
      {err&&<p style={{color:"#f87171",fontSize:12,marginBottom:10}}>{err}</p>}
      {saved&&<p style={{color:"#34d399",fontSize:12,marginBottom:10}}>✓ PINs updated!</p>}
      <button className="btn btn-primary w-full" onClick={save}>Save PINs</button>
    </Modal>
  );
}
// Replaces the 6-button overflow row with a tidy dropdown. Navigation items
// (History, Notice) close the menu and navigate. Modal items manage their own
// open state locally so the dropdown stays out of their way.
function AdminActionsMenu({onHistory,onAnnounce,inn,onEditMatchSave,match,role,onUpdateTeams}){
  const[open,setOpen]=React.useState(false);
  const[editOpen,setEditOpen]=React.useState(false);
  const[pinMgmtOpen,setPinMgmtOpen]=React.useState(false);
  const[pinViewOpen,setPinViewOpen]=React.useState(false);
  const[teamEditOpen,setTeamEditOpen]=React.useState(false);
  const[editPubA,setEditPubA]=React.useState([]);
  const[editPubB,setEditPubB]=React.useState([]);
  const[newNameA,setNewNameA]=React.useState("");
  const[newNameB,setNewNameB]=React.useState("");
  const isSuper=role==="admin"; // only admin role (super admin) can edit teams
  const close=()=>setOpen(false);

  const row=(icon,label,color,onClick)=>(
    <button key={label} onClick={()=>{close();onClick();}} style={{width:"100%",display:"flex",alignItems:"center",gap:10,
      padding:"10px 12px",background:"transparent",border:"none",cursor:"pointer",borderRadius:10,
      fontFamily:"'Inter',sans-serif",transition:"background .12s"
    }}
    onMouseEnter={e=>e.currentTarget.style.background="rgba(99,102,241,.12)"}
    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <span style={{fontSize:16,flexShrink:0}}>{icon}</span>
      <span style={{fontSize:13,fontWeight:600,color}}>{label}</span>
    </button>
  );

  // Edit Match inline modal (controlled here so we can close the menu first)
  const[ov,setOv]=React.useState(inn?.overs||0);
  const[wk,setWk]=React.useState(inn?.maxWkts||0);
  const minOv=Math.ceil((inn?.totalBalls||0)/6)||1;
  const minWk=(inn?.wickets||0)+1;
  const saveEdit=()=>{
    const o=Number(ov),w=Number(wk);
    if(!o||o<minOv){alert(`Overs can't be less than ${minOv}.`);return;}
    if(!w||w<minWk){alert(`Wickets can't be less than ${minWk}.`);return;}
    onEditMatchSave({overs:o,maxWkts:w});setEditOpen(false);
  };

  return(
    <div style={{position:"relative"}}>
      {/* Trigger */}
      <button onClick={()=>setOpen(o=>!o)} style={{
        background:"rgba(99,102,241,.15)",border:"1.5px solid rgba(99,102,241,.4)",
        color:"#a5b4fc",fontSize:15,cursor:"pointer",borderRadius:9,
        padding:"4px 8px",fontWeight:700,lineHeight:1,fontFamily:"'JetBrains Mono',monospace"
      }} title="Admin tools">⚙️</button>

      {/* Dropdown */}
      {open&&<>
        <div onClick={close} style={{position:"fixed",inset:0,zIndex:40}}/>
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,zIndex:41,minWidth:210,
          background:"rgba(12,9,38,.98)",border:"1px solid rgba(99,102,241,.4)",borderRadius:16,
          padding:"6px",boxShadow:"0 16px 48px rgba(0,0,0,.7)",backdropFilter:"blur(20px)",
          animation:"fadeUp .15s ease both"}}>
          {onHistory&&row("📚","Match History","#a5b4fc",onHistory||close)}
          {onAnnounce&&row("📢","Post Notice","#fbbf24",onAnnounce||close)}
          <div style={{borderTop:"1px solid #1e1b4b",margin:"4px 0"}}/>
          {row("✏️","Edit Match (overs/wkts)","#c4b5fd",()=>{setOv(inn?.overs||0);setWk(inn?.maxWkts||0);setEditOpen(true);})}
          {isSuper&&onUpdateTeams&&row("👥","Edit Match Teams","#34d399",()=>{
            setEditPubA(match?.pubTeamA||[]);
            setEditPubB(match?.pubTeamB||[]);
            setNewNameA("");setNewNameB("");
            setTeamEditOpen(true);
          })}
          {row("🔐","Manage Admin PINs","#f87171",()=>setPinMgmtOpen(true))}
          {match?.pinA&&row("👁","View Team PINs","#6ee7b7",()=>setPinViewOpen(true))}
        </div>
      </>}

      {/* Edit Match modal */}
      {editOpen&&<Modal onClose={()=>setEditOpen(false)} title="✏️ Edit Match Settings">
        <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>Correct overs or wickets if they were set wrong at the start.</p>
        <label>Overs per side</label>
        <input type="number" min={minOv} value={ov} onChange={e=>setOv(e.target.value)} style={{marginBottom:6}}/>
        <p style={{color:"#4b5563",fontSize:10,marginBottom:12}}>{Math.ceil((inn?.totalBalls||0)/6)} overs already bowled</p>
        <label>Wickets per side</label>
        <input type="number" min={minWk} value={wk} onChange={e=>setWk(e.target.value)} style={{marginBottom:6}}/>
        <p style={{color:"#4b5563",fontSize:10,marginBottom:14}}>{inn?.wickets||0} wicket{inn?.wickets===1?"":"s"} already fallen</p>
        <button className="btn btn-primary w-full" onClick={saveEdit}>Save Changes</button>
      </Modal>}

      {/* Manage PINs modal */}
      {teamEditOpen&&(
        <Modal onClose={()=>setTeamEditOpen(false)} title="👥 Edit Match Teams">
          <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>Add or remove players from each team. Changes take effect immediately for everyone.</p>
          {[["🟡",match?.teamA||"Team A",editPubA,setEditPubA,newNameA,setNewNameA,"A"],
            ["⚡",match?.teamB||"Team B",editPubB,setEditPubB,newNameB,setNewNameB,"B"]
          ].map(([em,teamName,list,setList,newName,setNewName,side])=>(
            <div key={side} style={{marginBottom:16}}>
              <p style={{fontWeight:700,fontSize:13,marginBottom:8,color:side==="A"?"#fbbf24":"#6ee7b7"}}>{em} {teamName} ({list.length})</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                {list.map(n=>(
                  <div key={n} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(255,255,255,.06)",borderRadius:8,padding:"4px 8px"}}>
                    <span style={{fontSize:12}}>{n}</span>
                    <button onClick={()=>setList(l=>l.filter(x=>x!==n))} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:14,lineHeight:1,padding:0}}>×</button>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input value={newName} onChange={e=>setNewName(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&newName.trim()){setList(l=>[...l,newName.trim()]);setNewName("");}}}
                  placeholder="Add player name…" style={{flex:1,fontSize:13}}/>
                <button onClick={()=>{if(newName.trim()){setList(l=>[...l,newName.trim()]);setNewName("");}}}
                  style={{padding:"8px 12px",borderRadius:10,border:"none",background:"rgba(99,102,241,.3)",color:"#a5b4fc",cursor:"pointer",fontWeight:700,fontSize:13}}>Add</button>
              </div>
            </div>
          ))}

          background:swapped?"rgba(99,102,241,.25)":"rgba(99,102,241,.1)",color:"#a5b4fc",

function EditMatchButton({inn,onSave}){
  const[open,setOpen]=React.useState(false);
  const[ov,setOv]=React.useState(inn?.overs||0);
  const[wk,setWk]=React.useState(inn?.maxWkts||0);
  if(!inn) return null;
  const minOv = Math.ceil((inn.totalBalls||0)/6)||1; // can't set below overs already bowled
  const minWk = (inn.wickets||0)+1;                  // can't set below wickets already fallen
  const openModal=()=>{ setOv(inn.overs); setWk(inn.maxWkts); setOpen(true); };
  const save=()=>{
    const o=Number(ov), w=Number(wk);
    if(!o||o<minOv){alert(`Overs can't be less than ${minOv} (overs already bowled).`);return;}
    if(!w||w<minWk){alert(`Wickets can't be less than ${minWk} (wickets already fallen).`);return;}
    onSave({overs:o,maxWkts:w});
    setOpen(false);
  };
  return(<>
    <button onClick={openModal} style={{background:"rgba(139,92,246,.12)",border:"1px solid rgba(139,92,246,.35)",color:"#c4b5fd",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderRadius:8,padding:"4px 9px",fontWeight:600}}>✏️ Edit Match</button>
    {open&&(
      <Modal onClose={()=>setOpen(false)} title="✏️ Edit Match Settings">
        <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>Correct overs or wickets if they were set wrong at the start. Can't go below what's already happened in this innings.</p>
        <label>Overs per side</label>
        <input type="number" min={minOv} value={ov} onChange={e=>setOv(e.target.value)} style={{marginBottom:12}}/>
        <p style={{color:"#4b5563",fontSize:10,marginTop:-8,marginBottom:12}}>{Math.ceil((inn.totalBalls||0)/6)} overs already bowled this innings</p>
        <label>Wickets per side</label>
        <input type="number" min={minWk} value={wk} onChange={e=>setWk(e.target.value)} style={{marginBottom:12}}/>
        <p style={{color:"#4b5563",fontSize:10,marginTop:-8,marginBottom:14}}>{inn.wickets||0} wicket{inn.wickets===1?"":"s"} already fallen</p>
        <button className="btn btn-primary w-full" onClick={save}>Save Changes</button>
      </Modal>
    )}
  </>);
}

                <td style={{color:"#6b7280"}}>{b.balls}</td>

function InningsBreak({inn,match,onStart,role,onRevert,canRevert,onExit,rosterNames}){
  const rS=useRef(),rNS=useRef(),rBw=useRef();
  const single=inn.single;
  const go=()=>{
    const[s,ns,bw]=[rS,rNS,rBw].map(r=>r.current?.value?.trim());
    if(!s||!bw){alert("Fill all required fields.");return;}
    if(!single&&!ns){alert("Enter the non-striker.");return;}
    onStart({striker:s,nonStriker:single?null:ns,bowler:bw});
  };
  const fields=single
    ?[["🟡 Batsman",rS,"Batsman name"],["🎯 Opening Bowler",rBw,"Bowler name"]]
    :[["🟡 Striker",rS,"On-strike batsman"],["⚪ Non-striker",rNS,"Non-strike batsman"],["🎯 Opening Bowler",rBw,"Bowler name"]];
  return(
    <div className="screen">
      <div style={{width:"100%",maxWidth:"min(460px,100%)"}}>
        {(onExit||role==="admin")&&<div style={{display:"flex",justifyContent:"flex-end",gap:10,marginBottom:8}}>
          {role==="admin"&&<PinButton match={match}/>}
          {onExit&&<button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← home</button>}
        </div>}
        <div className="text-center mb-6">
          <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:11,textTransform:"uppercase",letterSpacing:".25em",marginBottom:8}}>Innings Break</p>
          <h1 style={{fontSize:56,fontFamily:"'Oswald',sans-serif",fontWeight:700}}>{inn.totalRuns}/{inn.wickets}</h1>
          <p style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:13,marginTop:4}}>{inn.battingTeam} · {ovStr(inn.totalBalls)} overs{single?" · single batsman":""}</p>
        </div>
        <div className="card space-y-4">
          <div className="tag-amber">🎯 {inn.bowlingTeam} need {inn.totalRuns+1} to win in {inn.overs} overs</div>
          <div className="divider"/>
          {fields.map(([l,r,p])=>(
            <div key={l}><label>{l}</label><input ref={r} list="rosterPlayers2" placeholder={p}/></div>
          ))}
          <datalist id="rosterPlayers2">{(rosterNames||[]).map(n=><option key={n} value={n}/>)}</datalist>
          <button className="btn btn-primary w-full" onClick={go}>Start 2nd Innings</button>
          {role==="admin"&&canRevert&&(
            <button className="btn w-full" onClick={onRevert} style={{borderRadius:14,fontSize:13,padding:"12px",background:"transparent",border:"1.5px solid rgba(52,211,153,.5)",color:"#34d399"}}>↩️ Revert — undo end, back to live 1st innings</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Scorecard canvas builder — shared by MatchOver and MatchDetailView ────────
function buildScorecardCanvas(i1,i2,result,match){
  const W=800,pad=32;
  const allBat1=(i1?.battingOrder||[]).map(n=>{const b=i1.batsmen[n];const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):"0.0";return[n,b.out?b.howOut:b.retired?"retired":"not out",b.runs,b.balls,b.fours,b.sixes,sr];});
  const allBat2=(i2?.battingOrder||[]).map(n=>{const b=i2.batsmen[n];const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):"0.0";return[n,b.out?b.howOut:b.retired?"retired":"not out",b.runs,b.balls,b.fours,b.sixes,sr];});
  const allBwl1=(i1?.bowlingOrder||[]).map(n=>{const b=i1.bowlers[n];const bl=b.overs*6+b.ballsThisOver;return[n,`${b.overs}.${b.ballsThisOver}`,b.maidens,b.runs,b.wickets,bl>0?((b.runs/bl)*6).toFixed(2):"0.00"];});
  const allBwl2=(i2?.bowlingOrder||[]).map(n=>{const b=i2.bowlers[n];const bl=b.overs*6+b.ballsThisOver;return[n,`${b.overs}.${b.ballsThisOver}`,b.maidens,b.runs,b.wickets,bl>0?((b.runs/bl)*6).toFixed(2):"0.00"];});

  const rowH=28,headH=44,secH=36,extraH=28,divH=2;
  const tableW=W-pad*2;
  const batCols=[tableW*0.3,tableW*0.28,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07];
  const bwlCols=[tableW*0.35,tableW*0.1,tableW*0.1,tableW*0.1,tableW*0.1,tableW*0.12,tableW*0.13];

  const headerH=match?.tossSummary?96:80;
  const H=headerH+secH+headH+(allBat1.length*rowH)+extraH+divH+
           secH+headH+(allBwl1.length*rowH)+40+
           secH+headH+(allBat2.length*rowH)+extraH+divH+
           secH+headH+(allBwl2.length*rowH)+60;

  const cv=document.createElement("canvas");
  cv.width=W*2;cv.height=H*2;
  const ctx=cv.getContext("2d");
  ctx.scale(2,2);

  // Background
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#0f0c29");bg.addColorStop(0.5,"#1a1040");bg.addColorStop(1,"#0d1223");
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  let y=0;

  // Header banner
  const hb=ctx.createLinearGradient(0,0,W,headerH);
  hb.addColorStop(0,"#1e1b4b");hb.addColorStop(1,"#13103a");
  ctx.fillStyle=hb;ctx.fillRect(0,0,W,headerH);
  ctx.fillStyle="#818cf8";ctx.font="bold 11px 'JetBrains Mono',monospace";ctx.textAlign="center";
  ctx.fillText(`LCC · LINDENHURST CRICKET CLUB · ${(i2?.format==="T20"?"T20 @ MILLENNIUM PARK":((i2?.overs||i1?.overs||0)+"-OVER @ LAKES HIGH SCHOOL"))}`,W/2,22);
  const resultTxt=result?.winner?`${result.winner} won${result.margin?" by "+result.margin:""}`:i2?"Match Tied":"";
  ctx.fillStyle="#fbbf24";ctx.font="bold 22px 'Oswald',sans-serif";
  ctx.fillText(resultTxt,W/2,52);
  const s1=i1?`${i1.battingTeam}: ${i1.totalRuns}/${i1.wickets} (${ovStr(i1.totalBalls)} ov)`:"";
  const s2=i2?`${i2.battingTeam}: ${i2.totalRuns}/${i2.wickets} (${ovStr(i2.totalBalls)} ov)`:"";
  ctx.fillStyle="#a5b4fc";ctx.font="12px 'Inter',sans-serif";
  ctx.fillText(`${s1}   |   ${s2}`,W/2,72);
  if(match?.tossSummary){ctx.fillStyle="#34d399";ctx.font="11px 'JetBrains Mono',monospace";ctx.fillText(`🪙 ${match.tossSummary}`,W/2,90);}
  y=headerH;

  const drawSection=(title,color)=>{
    ctx.fillStyle=color||"#1e1b4b";ctx.fillRect(0,y,W,secH);
    ctx.fillStyle="#fff";ctx.font="bold 13px 'Oswald',sans-serif";ctx.textAlign="left";
    ctx.fillText(title,pad,y+secH/2+5);
    y+=secH;
  };
  const drawTableHead=(cols,labels)=>{
    ctx.fillStyle="#252060";ctx.fillRect(0,y,W,headH);
    let x=pad;
    labels.forEach((l,i)=>{
      ctx.fillStyle="#818cf8";ctx.font="bold 10px 'JetBrains Mono',monospace";
      ctx.textAlign=i===0?"left":"right";
      ctx.fillText(l,i===0?x:x+cols[i]-4,y+headH/2+4);
      x+=cols[i];
    });
    y+=headH;
  };
  const drawRow=(cols,cells,even)=>{
    ctx.fillStyle=even?"rgba(30,27,75,.4)":"transparent";ctx.fillRect(0,y,W,rowH);
    let x=pad;
    cells.forEach((c,i)=>{
      ctx.fillStyle=i===2?"#fbbf24":i===1?"#6b7280":"#e0e7ff";
      ctx.font=i===0?"bold 11px 'Inter',sans-serif":"11px 'JetBrains Mono',monospace";
      ctx.textAlign=i===0?"left":"right";
      const txt=String(c);
      ctx.fillText(txt.length>22&&i===0?txt.slice(0,20)+"…":txt,i===0?x:x+cols[i]-4,y+rowH/2+4);
      x+=cols[i];
    });
    y+=rowH;
  };
  const drawExtras=(ext)=>{
    if(!ext)return;
    ctx.fillStyle="rgba(30,27,75,.3)";ctx.fillRect(0,y,W,extraH);
    ctx.fillStyle="#6b7280";ctx.font="11px 'JetBrains Mono',monospace";ctx.textAlign="left";
    ctx.fillText(`Extras: WD ${ext.wd||0}  NB ${ext.nb||0}  B ${ext.b||0}  LB ${ext.lb||0}  Total ${(ext.wd||0)+(ext.nb||0)+(ext.b||0)+(ext.lb||0)}`,pad,y+extraH/2+4);
    y+=extraH;
  };
  const hline=()=>{ctx.fillStyle="#3730a3";ctx.fillRect(0,y,W,divH);y+=divH;};

  // 1st Innings batting
  if(i1?.battingTeam){
    drawSection(`🟡 ${i1.battingTeam} — 1st Innings  ${i1.totalRuns}/${i1.wickets} (${ovStr(i1.totalBalls)} ov)`,"#0f3a1a");
    drawTableHead(batCols,["Batsman","Dismissal","R","B","4s","6s","SR"]);
    allBat1.forEach((r,i)=>drawRow(batCols,r,i%2===0));
    drawExtras(i1.extras);
    hline();
    drawSection(`🎯 ${i2?.battingTeam||""} Bowling`,"#1a0f3a");
    drawTableHead(bwlCols,["Bowler","O","M","R","W","Econ"]);
    allBwl1.forEach((r,i)=>drawRow(bwlCols,r,i%2===0));
    y+=40;
  }
  // 2nd Innings batting
  if(i2?.battingTeam){
    drawSection(`🟡 ${i2.battingTeam} — 2nd Innings  ${i2.totalRuns}/${i2.wickets} (${ovStr(i2.totalBalls)} ov)`,"#0f3a1a");
    drawTableHead(batCols,["Batsman","Dismissal","R","B","4s","6s","SR"]);
    allBat2.forEach((r,i)=>drawRow(batCols,r,i%2===0));
    drawExtras(i2.extras);
    hline();
    drawSection(`🎯 ${i1?.battingTeam||""} Bowling`,"#1a0f3a");
    drawTableHead(bwlCols,["Bowler","O","M","R","W","Econ"]);
    allBwl2.forEach((r,i)=>drawRow(bwlCols,r,i%2===0));
    y+=30;
  }

  // Footer
  const dt=new Date(match?.finishedAt||Date.now()).toLocaleString();
  ctx.fillStyle="#4338ca";ctx.font="10px 'JetBrains Mono',monospace";ctx.textAlign="center";
  ctx.fillText(`Generated by LCC Scorer · ${dt}`,W/2,y+20);

  return cv;
}

// ── Match Over ────────────────────────────────────────────────────────────────
// ── Player of the Match Voting ────────────────────────────────────────────────
function POTMVoting({inn,inn1,potm,role}){
  const deviceId=React.useMemo(()=>{try{let id=localStorage.getItem("lcc_device_id");return id||"d_"+Math.random().toString(36).slice(2);}catch(e){return "d_"+Math.random().toString(36).slice(2);}},[]);
  const[myName,setMyName]=React.useState(()=>{try{return localStorage.getItem("lcc_potm_voter")||null;}catch(e){return null;}});

  // All players who batted or bowled in either innings
  const participants=React.useMemo(()=>{
    const s=new Set();
    [inn1,inn].forEach(i=>{if(!i)return;Object.keys(i.batsmen||{}).forEach(n=>s.add(n));(i.bowlingOrder||[]).forEach(n=>s.add(n));});
    return[...s].sort();
  },[inn,inn1]);

  const votes=potm?.votes||{};
  const counts={};
  Object.values(votes).forEach(v=>{if(v?.votedFor)counts[v.votedFor]=(counts[v.votedFor]||0)+1;});
  const totalVotes=Object.values(counts).reduce((a,b)=>a+b,0);
  const myVote=votes[deviceId]?.votedFor||null;

  const castVote=(name)=>{
    if(!myName||!FB_OK||!DB)return;
    DB.ref("potm/votes/"+deviceId).set({voter:myName,votedFor:name,at:Date.now()}).catch(()=>{});
  };

  const closeAndAnnounce=()=>{
    if(!FB_OK||!DB)return;
    let winner=null,max=0;
    Object.entries(counts).forEach(([n,c])=>{if(c>max){max=c;winner=n;}});
    if(!winner&&participants.length>0)winner=participants[0];
    DB.ref("potm").update({open:false,winner,closedAt:Date.now()}).catch(()=>{});
    // Show on home screen ticker
    DB.ref("announcement").set({text:`🏆 Player of the Match: ${winner}! (${max} vote${max===1?"":"s"})`,by:"LCC",ts:Date.now()}).catch(()=>{});
  };

  // ── Winner declared ────────────────────────────────────────────────────────
  if(potm?.winner){
    const winnerVotes=counts[potm.winner]||0;
    return(
      <div style={{background:"linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.1))",border:"2px solid rgba(245,158,11,.5)",borderRadius:20,padding:"20px 18px",marginTop:20,textAlign:"center"}}>
        <div style={{fontSize:42,marginBottom:6}}>🏆</div>
        <p style={{fontSize:10,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".2em",marginBottom:6}}>PLAYER OF THE MATCH</p>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:28,fontWeight:700,color:"#fbbf24",marginBottom:4}}>{potm.winner}</p>
        <p style={{fontSize:11,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>{winnerVotes} vote{winnerVotes===1?"":"s"} · {totalVotes} total</p>
      </div>
    );
  }

  if(!potm?.open) return null;

  // ── Step 1: Identify yourself ──────────────────────────────────────────────
  if(!myName){
    return(
      <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"18px 16px",marginTop:20}}>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,marginBottom:4}}>🏆 Player of the Match</p>
        <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>Who are you? Pick your name to cast your vote.</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {participants.map(n=>(
            <button key={n} onClick={()=>{setMyName(n);try{localStorage.setItem("lcc_potm_voter",n);}catch(e){}}}
              style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid rgba(99,102,241,.4)",
                background:"rgba(99,102,241,.12)",color:"#a5b4fc",fontSize:13,cursor:"pointer",
                fontFamily:"'Inter',sans-serif",fontWeight:600}}>
              {n}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Step 2: Cast your vote ─────────────────────────────────────────────────
  const sorted=[...participants].sort((a,b)=>(counts[b]||0)-(counts[a]||0));
  return(
    <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"18px 16px",marginTop:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <p style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,marginBottom:2}}>🏆 Player of the Match</p>
          <p style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>Voting as {myName}{myVote?` · voted for ${myVote}`:""}</p>
        </div>
        <button onClick={()=>{setMyName(null);try{localStorage.removeItem("lcc_potm_voter");}catch(e){}}}
          style={{background:"none",border:"none",color:"#6b7280",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>Not you?</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {sorted.filter(n=>n!==myName).map(n=>{
          const c=counts[n]||0;
          const pct=totalVotes>0?Math.round((c/totalVotes)*100):0;
          const isMyVote=myVote===n;
          return(
            <button key={n} onClick={()=>castVote(n)} style={{
              display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"11px 14px",borderRadius:14,cursor:"pointer",
              border:isMyVote?"2px solid #fbbf24":"1.5px solid rgba(99,102,241,.3)",
              background:isMyVote?"rgba(245,158,11,.15)":"rgba(255,255,255,.03)",
              color:"#fff",textAlign:"left",position:"relative",overflow:"hidden"
            }}>
              {/* vote bar */}
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:pct+"%",background:"rgba(245,158,11,.08)",transition:"width .4s ease"}}/>
              <span style={{fontWeight:isMyVote?700:500,fontSize:14,position:"relative"}}>{n}{isMyVote&&<span style={{color:"#fbbf24",marginLeft:6,fontSize:11}}>✓ your vote</span>}</span>
              <span style={{fontSize:11,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",position:"relative"}}>{c} vote{c===1?"":"s"}</span>
            </button>
          );
        })}
      </div>
      <p style={{fontSize:10,color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",marginBottom:role==="admin"?10:0}}>{totalVotes} vote{totalVotes===1?"":"s"} cast · {Object.keys(votes).length} player{Object.keys(votes).length===1?"":"s"} voted</p>
      {role==="admin"&&(
        <button onClick={closeAndAnnounce} style={{
          width:"100%",padding:"12px",borderRadius:14,border:"none",cursor:"pointer",
          background:"linear-gradient(135deg,#f59e0b,#d97706)",
          color:"#111",fontWeight:700,fontSize:14,fontFamily:"'Inter',sans-serif"
        }}>🏆 Close Voting & Announce Winner</button>
      )}
    </div>
  );
}

function MatchOver({result,inn,inn1,match,potm,role,onRevert,canRevert,onNew}){
  const[saving,setSaving]=React.useState(false);

  const downloadScorecard=()=>{
    setSaving(true);
    setTimeout(()=>{
      try{
        const i1=inn1||{battingTeam:"",bowlingTeam:"",totalRuns:0,wickets:0,totalBalls:0,battingOrder:[],batsmen:{},bowlers:{},bowlingOrder:[],extras:{wd:0,nb:0,b:0,lb:0}};
        const cv=buildScorecardCanvas(i1,inn,result,match);
        const dataUrl=cv.toDataURL("image/png");
        const fname=`LCC-scorecard-${(i1.battingTeam||"team").replace(/\s+/g,"-")}-vs-${(inn.battingTeam||"team").replace(/\s+/g,"-")}.png`;
        const isIOS=/iP(hone|ad|od)/.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
        if(isIOS){
          const w=window.open();
          if(w){w.document.write(`<title>${fname}</title><body style="margin:0;background:#07050f;display:flex;flex-direction:column;align-items:center;font-family:sans-serif"><p style="color:#fbbf24;padding:14px;font-size:15px;text-align:center">📥 Press &amp; hold the image below → <b>Save to Photos</b></p><img src="${dataUrl}" style="width:100%;max-width:800px"/></body>`);}
          else{alert("Please allow popups to save the scorecard, or take a screenshot.");}
        } else {
          const a=document.createElement("a");a.download=fname;a.href=dataUrl;
          document.body.appendChild(a);a.click();document.body.removeChild(a);
        }
        setSaving(false);
      }catch(e){console.error("Scorecard error:",e);setSaving(false);}
    },100);
  };

  return(
    <div className="screen">
      <div style={{textAlign:"center",maxWidth:"min(460px,100%)",width:"100%"}}>
        <div style={{fontSize:64,marginBottom:20}}>🏆</div>
        <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:11,textTransform:"uppercase",letterSpacing:".25em",marginBottom:12}}>Match Complete</p>
        <h1 style={{fontSize:40,fontFamily:"'Oswald',sans-serif",fontWeight:700,marginBottom:8}}>{result.winner?`${result.winner} Win!`:"Match Tied!"}</h1>
        {result.winner&&<p style={{color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontSize:18,marginBottom:16}}>by {result.margin}</p>}

        {/* Score summary card */}
        <div className="card" style={{marginBottom:20,textAlign:"left"}}>
          {inn1&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #3730a3",marginBottom:8}}>
            <span style={{fontWeight:600,fontSize:14}}>{inn1.battingTeam}</span>
            <span style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:"#a5b4fc"}}>{inn1.totalRuns}/{inn1.wickets} <span style={{fontSize:13,color:"#6b7280"}}>({ovStr(inn1.totalBalls)} ov)</span></span>
          </div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0"}}>
            <span style={{fontWeight:600,fontSize:14}}>{inn.battingTeam}</span>
            <span style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:"#a5b4fc"}}>{inn.totalRuns}/{inn.wickets} <span style={{fontSize:13,color:"#6b7280"}}>({ovStr(inn.totalBalls)} ov)</span></span>
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button className="btn btn-primary" style={{padding:"14px 20px",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={downloadScorecard} disabled={saving}>
            {saving?"Generating...":"📥 Download Scorecard (PNG)"}
          </button>
          {role==="admin"&&canRevert&&(
            <button className="btn" onClick={onRevert} style={{padding:"13px 20px",fontSize:14,background:"transparent",border:"1.5px solid rgba(52,211,153,.5)",color:"#34d399",borderRadius:14}}>↩️ Revert — bring match back to live</button>
          )}
          <button className="btn btn-ghost" onClick={onNew} style={{padding:"13px 20px",fontSize:14}}>🏏 New Match</button>
        </div>

        {/* Player of the Match voting */}
        <POTMVoting inn={inn} inn1={inn1} potm={potm} role={role}/>

        <p style={{color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",fontSize:10,marginTop:16}}>Full batting & bowling scorecard saved as image</p>
      </div>
    </div>
  );
}

function ViewerLive({onExit}){
  const[snap,setSnap]=React.useState(undefined);
  const[potm,setPotm]=React.useState(null);
  const[tab,setTab]=React.useState("live");
  React.useEffect(()=>{
    if(!FB_OK||!DB){setSnap(null);return;}
    const ref=DB.ref("live");
    const cb=ref.on("value",s=>setSnap(s.val()));
    // Also listen to POTM so viewers can vote + see winner
    const pRef=DB.ref("potm");
    const pCb=pRef.on("value",s=>setPotm(s.val()||null));
    return ()=>{ref.off("value",cb);pRef.off("value",pCb);};
  },[]);

  if(snap===undefined) return <Centered emoji="📡" title="Connecting…" sub="Loading live match" onExit={onExit}/>;
  if(!snap||!snap.inn) return <Centered emoji="🏏" title="No live match" sub="Nothing is being scored right now. Check back when a game starts." onExit={onExit}/>;

  const inn=snap.inn, inn1=snap.inn1, mo=snap.mo, match=snap.match;

  if(inn.awaitingOpeners){
    return <Centered emoji="🏏" title={`${inn.battingTeam} vs ${inn.bowlingTeam}`}
      sub={`Match starting soon — ${inn.battingTeam} is setting their opening batsmen.`} onExit={onExit}/>;
  }

  if(mo){
    const i2=inn;
    return (
      <div className="result-screen"><div className="result-card">
        <div className="text-center" style={{marginBottom:16}}>
          <div style={{fontSize:54}}>🏆</div>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:36,fontWeight:700,background:"linear-gradient(135deg,#fff,#fbbf24)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{mo.winner?`${mo.winner} Win!`:"Match Tied!"}</h1>
          {mo.winner&&<p style={{color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontSize:16}}>by {mo.margin}</p>}
        </div>
        {inn1&&<ScoreRow team={inn1.battingTeam} runs={inn1.totalRuns} wkts={inn1.wickets} balls={inn1.totalBalls}/>}
        <ScoreRow team={i2.battingTeam} runs={i2.totalRuns} wkts={i2.wickets} balls={i2.totalBalls}/>
        {/* POTM voting — same component, viewer role so no Close button */}
        <POTMVoting inn={inn} inn1={inn1} potm={potm} role="viewer"/>
        <button className="btn btn-ghost w-full" style={{marginTop:16}} onClick={onExit}>← Back</button>
      </div></div>
    );
  }

  const bLeft=inn.overs*6-inn.totalBalls;
  const crr=rr(inn.totalRuns,inn.totalBalls);
  const req=inn.target?inn.target-inn.totalRuns:null;
  const rrr=inn.target&&bLeft>0?((req/bLeft)*6).toFixed(2):null;
  const SK=inn.batsmen[inn.strikerName];
  const NS=inn.nonStrikerName?inn.batsmen[inn.nonStrikerName]:null;
  const BW=inn.bowlers[inn.bowlerName];

      const arr=Object.entries(v).map(([id,m])=>({id,...m})).sort((a,b)=>b.finishedAt-a.finishedAt);

// ── Full scorecard for a completed match (from history) ──────────────────────
// ── Match Highlights — best figures from both innings ────────────────────────
function MatchHighlights({m}){
  const combined=(key)=>{
    const out={};
    [m.inn1,m.inn2].forEach(inn=>{
      if(!inn)return;
      Object.entries(inn[key]||{}).forEach(([name,d])=>{
        if(!out[name])out[name]={runs:0,balls:0,fours:0,sixes:0,wickets:0,bowlerRuns:0,overs:0};
        if(key==="batsmen"){out[name].runs+=(d.runs||0);out[name].balls+=(d.balls||0);out[name].fours+=(d.fours||0);out[name].sixes+=(d.sixes||0);}
        if(key==="bowlers"){out[name].wickets+=(d.wickets||0);out[name].bowlerRuns+=(d.runs||0);out[name].overs+=(d.overs||0);}
      });
    });
    return out;
  };
  const bat=combined("batsmen");
  const bowl=combined("bowlers");

  // Catches from howOut field
  const catches={};
  [m.inn1,m.inn2].forEach(inn=>{
    Object.values(inn?.batsmen||{}).forEach(b=>{
      if(b?.howOut&&b.howOut.startsWith("c ")){
        const name=b.howOut.split(" b ")[0].replace("c ","").trim();
        if(name&&name!=="sub")catches[name]=(catches[name]||0)+1;
      }
    });
  });

  const highlights=[];
  const topBat=Object.entries(bat).sort((a,b)=>b[1].runs-a[1].runs)[0];
  if(topBat)highlights.push({em:"🏏",title:"Top Scorer",name:topBat[0],val:`${topBat[1].runs} runs (${topBat[1].balls}b)`});
  const topBowl=Object.entries(bowl).filter(([,d])=>d.wickets>0).sort((a,b)=>b[1].wickets-a[1].wickets||a[1].bowlerRuns-b[1].bowlerRuns)[0];
  if(topBowl)highlights.push({em:"🎯",title:"Best Bowling",name:topBowl[0],val:`${topBowl[1].wickets}/${topBowl[1].bowlerRuns}`});
  const mostSix=Object.entries(bat).filter(([,d])=>d.sixes>0).sort((a,b)=>b[1].sixes-a[1].sixes)[0];
  if(mostSix)highlights.push({em:"6️⃣",title:"Most Sixes",name:mostSix[0],val:`${mostSix[1].sixes} sixes`});
  const mostFour=Object.entries(bat).filter(([,d])=>d.fours>0).sort((a,b)=>b[1].fours-a[1].fours)[0];
  if(mostFour)highlights.push({em:"4️⃣",title:"Most Fours",name:mostFour[0],val:`${mostFour[1].fours} fours`});
  const topCatch=Object.entries(catches).sort((a,b)=>b[1]-a[1])[0];
  if(topCatch)highlights.push({em:"🙌",title:"Most Catches",name:topCatch[0],val:`${topCatch[1]} catch${topCatch[1]>1?"es":""}`});
  const bestEcon=Object.entries(bowl).filter(([,d])=>d.overs>=1).sort((a,b)=>(a[1].bowlerRuns/a[1].overs)-(b[1].bowlerRuns/b[1].overs))[0];
  if(bestEcon)highlights.push({em:"💨",title:"Best Economy",name:bestEcon[0],val:`${(bestEcon[1].bowlerRuns/bestEcon[1].overs).toFixed(2)} rpo`});

  if(!highlights.length)return null;
  return(
    <div style={{marginTop:16}}>
      <p style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".15em",marginBottom:10}}>📊 MATCH HIGHLIGHTS</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {highlights.map(h=>(
          <div key={h.title} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(99,102,241,.2)",borderRadius:14,padding:"12px 12px"}}>
            <p style={{fontSize:18,marginBottom:4}}>{h.em}</p>
            <p style={{fontSize:9,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:2}}>{h.title}</p>
            <p style={{fontWeight:700,fontSize:13}}>{h.name}</p>
            <p style={{fontSize:11,color:"#a5b4fc",fontFamily:"'JetBrains Mono',monospace"}}>{h.val}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MatchHistoryPOTM — permanent POTM voting accessible from match history ───
// Lives at history/{matchId}/potmVoting so players can vote any time after match
function MatchHistoryPOTM({m,role}){
  const[voting,setVoting]=React.useState(null);
  const deviceId=React.useMemo(()=>{try{let id=localStorage.getItem("lcc_device_id");return id||"d_"+Math.random().toString(36).slice(2);}catch(e){return "d_"+Math.random().toString(36).slice(2);}},[]);
  const[myName,setMyName]=React.useState(()=>{try{return localStorage.getItem("lcc_potm_voter_"+m.id)||null;}catch(e){return null;}});

  React.useEffect(()=>{
    if(!FB_OK||!DB||!m.id)return;
    const ref=DB.ref("history/"+m.id+"/potmVoting");
    const cb=ref.on("value",s=>setVoting(s.val()));
    return()=>ref.off("value",cb);
  },[m.id]);

  // All players who batted or bowled in either innings
  const participants=React.useMemo(()=>{
    const s=new Set();
    [m.inn1,m.inn2].forEach(inn=>{if(!inn)return;Object.keys(inn.batsmen||{}).forEach(n=>s.add(n));(inn.bowlingOrder||[]).forEach(n=>s.add(n));});
    return[...s].sort();
  },[m.inn1,m.inn2]);

  if(!voting)return null;

  const votes=voting.votes||{};
  const counts={};
  Object.values(votes).forEach(v=>{if(v?.votedFor)counts[v.votedFor]=(counts[v.votedFor]||0)+1;});
  const totalVotes=Object.values(counts).reduce((a,b)=>a+b,0);
  const myVote=votes[deviceId]?.votedFor||null;

  const castVote=(name)=>{
    if(!myName||!FB_OK||!DB)return;
    DB.ref("history/"+m.id+"/potmVoting/votes/"+deviceId).set({voter:myName,votedFor:name,at:Date.now()}).catch(()=>{});
  };

  const closeAndAnnounce=()=>{
    if(!FB_OK||!DB)return;
    let winner=null,max=0;
    Object.entries(counts).forEach(([n,c])=>{if(c>max){max=c;winner=n;}});
    if(!winner&&participants.length>0)winner=participants[0];
    DB.ref("history/"+m.id+"/potmVoting").update({open:false,winner,closedAt:Date.now()}).catch(()=>{});
    DB.ref("history/"+m.id+"/potm").set(winner).catch(()=>{});
    DB.ref("announcement").set({text:`🏆 Player of the Match (${m.teamA||""} vs ${m.teamB||""}): ${winner}!`,by:"LCC",ts:Date.now()}).catch(()=>{});
  };

  // ── Winner card ───────────────────────────────────────────────────────────
  if(voting.winner){
    return(
      <div style={{background:"linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.1))",border:"2px solid rgba(245,158,11,.5)",borderRadius:20,padding:"20px 18px",marginTop:16,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:6}}>🏆</div>
        <p style={{fontSize:9,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".2em",marginBottom:4}}>PLAYER OF THE MATCH</p>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:26,fontWeight:700,color:"#fbbf24"}}>{voting.winner}</p>
        <p style={{fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{totalVotes} vote{totalVotes===1?"":"s"}</p>
      </div>
    );
  }

  if(!voting.open)return null;

  // ── Step 1: Who are you? ──────────────────────────────────────────────────
  if(!myName){
    return(
      <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"16px",marginTop:16}}>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,marginBottom:4}}>🏆 Vote · Player of the Match</p>
        <p style={{color:"#9ca3af",fontSize:11,marginBottom:12}}>Only players who participated can vote. Pick your name:</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {participants.map(n=>(
            <button key={n} onClick={()=>{setMyName(n);try{localStorage.setItem("lcc_potm_voter_"+m.id,n);}catch(e){}}}
              style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid rgba(99,102,241,.4)",background:"rgba(99,102,241,.12)",color:"#a5b4fc",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>
              {n}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Step 2: Cast vote ─────────────────────────────────────────────────────
  const sorted=[...participants].sort((a,b)=>(counts[b]||0)-(counts[a]||0));
  return(
    <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"16px",marginTop:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div>
          <p style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,marginBottom:2}}>🏆 Player of the Match</p>
          <p style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>Voting as {myName}{myVote?` · voted for ${myVote}`:""}</p>
        </div>
        <button onClick={()=>{setMyName(null);try{localStorage.removeItem("lcc_potm_voter_"+m.id);}catch(e){}}}
          style={{background:"none",border:"none",color:"#6b7280",fontSize:10,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>Not you?</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
        {sorted.filter(n=>n!==myName).map(n=>{
          const c=counts[n]||0;

function PinGate({title,pin,altPin,verify,hint,onOk,onCancel}){
  const[val,setVal]=React.useState("");
  const[err,setErr]=React.useState(false);
  const[errMsg,setErrMsg]=React.useState("");
  const submit=()=>{
    if(verify){
      const r=verify(val);
      if(r.ok){onOk(r);}else{setErr(true);setErrMsg(r.msg||"❌ Wrong PIN");setVal("");}
    } else {
      if(val===pin||(altPin&&val===altPin)){onOk();}else{setErr(true);setErrMsg("❌ Wrong PIN, try again");setVal("");}
    }
  };
  return(
    <div className="result-screen"><div className="result-card" style={{maxWidth:360,textAlign:"center"}}>
      <div style={{fontSize:44,marginBottom:10}}>🔒</div>
      <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:24,fontWeight:700,marginBottom:4}}>{title}</h2>
      <p style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:hint?6:18}}>Enter PIN to continue</p>
      {hint&&<p style={{color:"#34d399",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:16}}>● {hint}</p>}
      <input type="password" inputMode="numeric" value={val} autoFocus
        onChange={e=>{setVal(e.target.value);setErr(false);}}
        onKeyDown={e=>e.key==="Enter"&&submit()}
        placeholder="••••"
        style={{width:"100%",textAlign:"center",letterSpacing:"0.5em",fontSize:22,background:"rgba(7,5,15,.8)",border:`1.5px solid ${err?"#ef4444":"rgba(99,102,241,.4)"}`,borderRadius:14,padding:"12px",color:"#fff",fontFamily:"'JetBrains Mono',monospace",outline:"none",marginBottom:12}}/>
      {err&&<p style={{color:"#f87171",fontSize:12,marginBottom:12,fontFamily:"'Inter',sans-serif",lineHeight:1.4}}>{errMsg}</p>}
      <div className="grid-2">
        <button className="btn btn-ghost w-full" onClick={onCancel}>Cancel</button>
        <button className="btn btn-primary w-full" onClick={submit}>Enter</button>
      </div>
    </div></div>
  );
}

function CricketScene({hideText}){
  // Jumbled order — no two same outcomes back to back where possible
  const outcomes=React.useMemo(()=>[
    {label:"SIX!",color:"#34d399",type:"six"},
    {label:"RUN OUT!",color:"#f87171",type:"runout"},
    {label:"FOUR!",color:"#fbbf24",type:"four"},
    {label:"WIDE",color:"#a5b4fc",type:"wide"},
    {label:"CAUGHT!",color:"#f87171",type:"caught"},
    {label:"SIX!",color:"#34d399",type:"six"},
    {label:"BOWLED!",color:"#f87171",type:"bowled"},
  ],[]);
  const[idx,setIdx]=React.useState(0);
  // phase: "approach" (ball traveling toward the bat) -> "contact" (the moment of truth — bat, ball,
  // AND result text all flip to their "hit" pose in this SAME React state update, so they are
  // mathematically guaranteed to change in the same render/paint) -> "settle" (everything eases back).
  const[phase,setPhase]=React.useState("approach");
  const APPROACH_MS=1900;   // bowler runs in, ball travels
  const SETTLE_MS=2400;     // after contact: follow-through, ball flies away, result fades
  const CYCLE_MS=APPROACH_MS+SETTLE_MS+200; // small gap before next outcome starts

  // SINGLE recursive setTimeout chain — NOT a setInterval running alongside separate setTimeouts.
  // The previous version had setInterval(runCycle, CYCLE_MS) AND a setTimeout both firing around the
  // same moment as two independent timers; if they landed even a few ms apart, the new outcome's label
  // would render in the OLD "settle" pose for a flash before phase reset to "approach" caught up —
  // that flash was the literal cause of "result shows up first, then flickers". This pattern guarantees
  // the outcome change and the phase reset happen in the exact same callback, same tick, every time.
  React.useEffect(()=>{
    let alive=true;
    let timers=[];
    let raf=null;
    function step(){
      if(!alive)return;
      // "reset": ball snaps instantly (no transition) back to the bowler's hand, invisible.
      // Then on the NEXT animation frame we switch to "approach", which has a real transition —
      // so the browser animates FROM this reset position TO the contact point, guaranteeing every
      // single outcome (including six and caught, whose settle points are far from the bowler)
      // visibly starts its ball-travel from the bowler's hand, never from wherever the last ball settled.
      setPhase("reset");
      raf=requestAnimationFrame(()=>{
        raf=requestAnimationFrame(()=>{ if(alive) setPhase("approach"); });
      });
      timers.push(setTimeout(()=>{ if(alive) setPhase("contact"); },APPROACH_MS));
      timers.push(setTimeout(()=>{ if(alive) setPhase("settle"); },APPROACH_MS+120));
      timers.push(setTimeout(()=>{
        if(!alive)return;
        setIdx(i=>(i+1)%outcomes.length); // change outcome...
        step();                            // ...and immediately chain the next cycle's reset, atomically
      },CYCLE_MS));
    }
    step();
    return ()=>{ alive=false; timers.forEach(clearTimeout); if(raf)cancelAnimationFrame(raf); };
  },[outcomes.length]);

  const o=outcomes[idx];
  const type=o.type;
  const isBowled=type==="bowled", isSix=type==="six", isCaught=type==="caught", isRunOut=type==="runout", isWide=type==="wide", isFour=type==="four";
  const isHit = isSix||isFour;
  const contactOrAfter = phase==="contact"||phase==="settle";
  const settled = phase==="settle";
  const S=(c)=>({stroke:c,strokeWidth:6,strokeLinecap:"round",fill:"none"});

  // ── Ball position, computed directly from `phase` in JS (not a CSS keyframe %) ──
  // This is what guarantees sync: the ball's rendered position THIS render is derived from
  // the exact same `phase` value that also controls the bat pose and the result text.
  const BOWLER_HAND={x:70,y:110};
  const contactPt = isWide?{x:252,y:140}:isCaught?{x:248,y:108}:isBowled?{x:284,y:118}:{x:252,y:118};
  const settlePt = (()=>{
    if(isSix) return {x:60,y:42};
    if(isFour) return {x:8,y:112};
    if(isBowled) return {x:291,y:130};
    if(isCaught) return {x:208,y:58};
    if(isRunOut) return {x:56,y:108};
    return {x:305,y:142}; // wide drifts off
  })();
  // phase==="reset" is a one-frame state inserted right before "approach" starts: it snaps the ball
  // back to the bowler's hand with NO transition, so the very next frame (approach) can then transition
  // smoothly FROM the bowler's hand TO the contact point. Without this explicit reset frame, the browser
  // would transition from wherever the ball settled in the PREVIOUS cycle (which for six/caught is far
  // from the bowler) straight toward this cycle's contact point — visually looking like the ball started
  // its journey from near the batsman/fielder instead of the bowler. This was the actual root cause.
  const ballTarget = phase==="reset" ? BOWLER_HAND : phase==="approach" ? contactPt : phase==="contact" ? contactPt : settlePt;

  const swingRotation = settled ? 0 : contactOrAfter ? (isSix?-160:isFour?-100:0) : 0;
  const bowlArmRotation = phase==="approach" ? -360 : -360;

  // viewBox is 320x170: a dedicated top band (y 0-40) for the result word,
  // and the pitch/figures live entirely below that (y 45-150) — no shared space, no overlap risk.
  return(
    <div style={{position:"relative",width:"100%",aspectRatio:"320/170",margin:"0 auto 2px"}}>
      <svg viewBox="0 0 320 170" preserveAspectRatio="xMidYMid meet" style={{width:"100%",height:"100%",display:"block"}}>
        {/* Result word — appears in the EXACT same render where phase becomes "contact", driven by JS not a CSS %.
            IMPORTANT: the transition for going BACK to invisible (start of next cycle) must be fast, not slow —
            a slow fade-out here was the cause of the old label still being visible (mid-fade) at the same moment
            the new outcome's word had already swapped in via {o.label}, which looked exactly like duplication. */}
        {!hideText&&(
          <text x="160" y="28" textAnchor="middle"
            fontFamily="'Oswald',sans-serif" fontSize="28" fontWeight="700" letterSpacing="2"
            fill={o.color}
            opacity={contactOrAfter ? (settled?0.55:0.95) : 0}
            style={{transform:contactOrAfter?(settled?"scale(0.95)":"scale(1.1)"):"scale(0.5)",
                    transformOrigin:"160px 28px",
                    transition:phase==="contact"?"opacity .15s ease-out, transform .15s cubic-bezier(.34,1.56,.64,1)"
                            :phase==="settle"?"opacity .6s ease-out, transform .6s ease-out"
                            :"opacity 0s, transform 0s"}}>
            {o.label}
          </text>
        )}

        {/* Pitch + figures band */}
        <line x1="14" y1="148" x2="306" y2="148" stroke="rgba(16,185,129,.55)" strokeWidth="3"/>

        {/* Bowler — runs through release motion during "approach", same JS-driven timing as the ball */}
        <g transform="translate(56,76)">
          <circle cx="0" cy="0" r="11" {...S("#a5b4fc")}/>
          <line x1="0" y1="11" x2="0" y2="49" {...S("#a5b4fc")}/>
          <line x1="0" y1="49" x2="-12" y2="65" {...S("#a5b4fc")}/>
          <line x1="0" y1="49" x2="12" y2="65" {...S("#a5b4fc")}/>
          <g style={{transformOrigin:"0px 19px",transform:`rotate(${phase==="approach"?-220:-360}deg)`,transition:`transform ${phase==="approach"?APPROACH_MS:300}ms ease-in-out`}}>
            <line x1="0" y1="19" x2="19" y2="9" {...S("#a5b4fc")}/>
          </g>
        </g>

        {/* Batsman 1 (striker) */}
        <g transform={isRunOut?"translate(0,0)":"translate(264,76)"}>
          <g style={{
            transform:isRunOut?(settled?"translate(56px,76px)":contactOrAfter?"translate(150px,76px)":"translate(264px,76px)"):"none",
            transition:isRunOut?`transform ${contactOrAfter?(settled?'1100ms':'900ms'):'0ms'} ease-in-out`:"none"
          }}>
            <circle cx="0" cy="0" r="11" {...S("#fbbf24")}/>
            <line x1="0" y1="11" x2="0" y2="49" {...S("#fbbf24")}/>
            <g style={{transformOrigin:"0px 49px",animation:isRunOut?"legSprint .3s linear infinite":"none"}}>
              <line x1="0" y1="49" x2="-12" y2="65" {...S("#fbbf24")}/>
              <line x1="0" y1="49" x2="12" y2="65" {...S("#fbbf24")}/>
            </g>
            {/* Bat swing — same simple motion for every outcome that involves a swing (six and four alike).
                A six is distinguished by the BALL flying further/higher afterward, not by a separate
                celebration animation — keeps the scene simple and avoids any extra moving parts to desync.
                The contact-transition duration (150ms) is matched EXACTLY to the result text's pop-in duration
                below, so the bat finishes its swing at the same visual instant the word finishes appearing. */}
            <g style={{transformOrigin:"0px 19px",
              transform:`rotate(${isHit?swingRotation:0}deg)`,
              transition:`transform ${phase==="approach"?'250ms':contactOrAfter?(settled?'900ms':'150ms'):'0ms'} ease-in-out`}}>
              <line x1="0" y1="19" x2="-7" y2="31" {...S("#fbbf24")}/>
              <line x1="-7" y1="31" x2="-7" y2="62" stroke="#e8c39a" strokeWidth="7" strokeLinecap="round"/>
            </g>
          </g>
        </g>

        {/* Batsman 2 (non-striker) — only for run-out, mirrors batsman 1's phase-driven motion exactly */}
        {isRunOut&&(
          <g style={{
            transform:settled?"translate(264px,76px)":contactOrAfter?"translate(170px,76px)":"translate(56px,76px)",
            transition:`transform ${contactOrAfter?(settled?'1100ms':'900ms'):'0ms'} ease-in-out`
          }}>
            <circle cx="0" cy="0" r="11" {...S("#e0e7ff")}/>
            <line x1="0" y1="11" x2="0" y2="49" {...S("#e0e7ff")}/>
            <g style={{transformOrigin:"0px 49px",animation:"legSprint .3s linear infinite"}}>
              <line x1="0" y1="49" x2="-12" y2="65" {...S("#e0e7ff")}/>
              <line x1="0" y1="49" x2="12" y2="65" {...S("#e0e7ff")}/>
            </g>
            <line x1="0" y1="19" x2="14" y2="10" {...S("#e0e7ff")}/>
          </g>
        )}

        {/* Fielder — only for a catch, dives in exactly when phase becomes "contact" */}
        {isCaught&&(
          <g transform="translate(222,60)">
            <g style={{
              opacity:contactOrAfter?1:0,
              transform:contactOrAfter?"translate(-16px,8px) rotate(-30deg)":"translate(0,0) rotate(0deg)",
              transition:`transform ${contactOrAfter?'350ms':'0ms'} ease-out, opacity 150ms ease-out`
            }}>
              <circle cx="0" cy="0" r="10" {...S("#6ee7b7")}/>
              <line x1="0" y1="10" x2="0" y2="40" {...S("#6ee7b7")}/>
              <line x1="0" y1="16" x2="-14" y2="4" {...S("#6ee7b7")}/>
              <line x1="0" y1="16" x2="14" y2="4" {...S("#6ee7b7")}/>
              <line x1="0" y1="40" x2="-10" y2="54" {...S("#6ee7b7")}/>
              <line x1="0" y1="40" x2="10" y2="54" {...S("#6ee7b7")}/>
            </g>
          </g>
        )}

        {/* Stumps — fall exactly when phase becomes "contact", same trigger as everything else */}
        <g transform="translate(286,117)">
          {[0,5,10].map(dx=>(
            <line key={dx} x1={dx} y1="0" x2={dx} y2="24" stroke={(isBowled||isRunOut)&&contactOrAfter?"#f87171":"rgba(226,232,240,.55)"} strokeWidth="3"
              style={isBowled?{transformOrigin:`${dx}px 24px`,transform:`rotate(${contactOrAfter?40:0}deg)`,transition:`transform ${contactOrAfter?'400ms':'0ms'} ease-out`}:{}}/>
          ))}
        </g>

        {/* Ball — position computed directly from `phase` (the single source of truth), not an independent CSS keyframe.
            Contact-transition duration (150ms) matched exactly to the bat swing and result text above, so all
            three visually land together at the same instant — this is the actual definition of "bat hits ball,
            then result shows, in sync": all three numbers must be identical, not just close. */}
        <circle cx={ballTarget.x} cy={ballTarget.y} r="6" fill="#ef4444" stroke="#fca5a5" strokeWidth="2"
          opacity={phase==="reset"?0:(settled&&(isSix||isFour||isBowled||isCaught||isRunOut||isWide)?0:1)}
          style={{transition:phase==="reset"?"none"
                  :phase==="approach"?`cx ${APPROACH_MS}ms ease-in-out, cy ${APPROACH_MS}ms ease-in-out, opacity 200ms ease-in`
                  :contactOrAfter?`cx ${settled?'1100ms':'150ms'} ease-in-out, cy ${settled?'1100ms':'150ms'} ease-in-out, opacity ${settled?'600ms':'0ms'} ease-out`
                  :"none"}}/>
      </svg>
    </div>
  );
}

// ── WeatherWidget — cycles between ⛅ temp and 🕐 time under the logo ─────────
function wmoEmoji(code){
  if(code===0)return"☀️";                          // clear sky
  if(code<=2)return"🌤️";                           // mainly clear
  if(code===3)return"☁️";                           // overcast
  if(code<=48)return"🌫️";                          // fog
  if(code<=55)return"🌦️";                          // drizzle
  if(code<=65)return"🌧️";                          // rain
  if(code<=67)return"🌨️";                          // freezing rain
  if(code<=77)return"❄️";                           // snow
  if(code<=82)return"🌧️";                          // rain showers
  if(code<=86)return"🌨️";                          // snow showers
  return"⛈️";                                       // thunderstorm
}
function WeatherWidget(){
  const[temp,setTemp]=React.useState(null);
  const[emoji,setEmoji]=React.useState("🌡️");
  const[time,setTime]=React.useState("");
  const[show,setShow]=React.useState(0); // 0=weather, 1=time

  const tick=()=>setTime(new Date().toLocaleTimeString("en-US",
    {timeZone:"America/Chicago",hour:"numeric",minute:"2-digit",hour12:true}));

  const fetchWx=()=>{
    // Request both current formats — Open-Meteo sometimes returns
    // weather_code in `current` and sometimes in `current_weather`
    fetch("https://api.open-meteo.com/v1/forecast?latitude=42.3831&longitude=-87.8939"+
      "&current=temperature_2m,weather_code&current_weather=true"+
      "&temperature_unit=fahrenheit&timezone=America/Chicago&forecast_days=1")
      .then(r=>r.json())
      .then(d=>{
        // Try both response shapes — use whichever has the data
        const t=d?.current?.temperature_2m??d?.current_weather?.temperature;
        const code=d?.current?.weather_code??d?.current_weather?.weathercode;
        if(t!=null){
          setTemp(Math.round(t));
          setEmoji(wmoEmoji(code??0));
        }
      })
      .catch(()=>{});
  };

  React.useEffect(()=>{
    tick();fetchWx();

    // Tick every second — guarantees clock is never stale, even after Chrome throttles the tab
    const ti=setInterval(tick,1000);

    // Refresh weather every 10 min
    const wi=setInterval(fetchWx,10*60*1000);

    // Cycle between weather and time every 3 seconds
    const ci=setInterval(()=>setShow(s=>(s+1)%2),3000);

    // Snap to current values the moment user returns to the tab
    const onVisible=()=>{
      if(document.visibilityState==='visible'){tick();fetchWx();}
    };
    document.addEventListener('visibilitychange',onVisible);

    return()=>{
      clearInterval(ti);clearInterval(wi);clearInterval(ci);
      document.removeEventListener('visibilitychange',onVisible);
    };
  },[]);

  if(!time)return null;

  const base={
    fontSize:10,fontFamily:"'JetBrains Mono',monospace",
    color:"rgba(165,180,252,.7)",letterSpacing:".04em",
    whiteSpace:"nowrap",textAlign:"center",
    transition:"opacity .5s ease, transform .5s ease",
  };

  return(
    <div style={{marginTop:5,height:14,overflow:"hidden",position:"relative",minWidth:90}}>
      {/* Weather */}
      <div style={{...base,position:"absolute",left:0,right:0,
        opacity:show===0&&temp?1:0,
        transform:show===0?`translateY(0)`:`translateY(-8px)`}}>
        {emoji} {temp!==null?`${temp}°F`:"—"}
      </div>
      {/* Time */}
      <div style={{...base,position:"absolute",left:0,right:0,
        opacity:show===1?1:0,
        transform:show===1?`translateY(0)`:`translateY(8px)`}}>
        {time} CT
      </div>
    </div>
  );
}

function ScorerGate({onOk,onCancel}){
  const[data,setData]=React.useState(undefined);
  React.useEffect(()=>{
    if(!FB_OK||!DB){setData(null);return;}
    const ref=DB.ref("live");
    const cb=ref.on("value",s=>{
      const v=s.val();
      if(!v||!v.inn||!v.pinA||!v.pinB){setData(null);return;}
      setData({pinA:v.pinA,pinB:v.pinB,teamA:v.teamA,teamB:v.teamB,
        battingTeam:v.battingTeam,awaitingOpeners:!!v.inn.awaitingOpeners,ib:!!v.ib,mo:!!v.mo});
    });
    return ()=>ref.off("value",cb);
  },[]);

  if(data===undefined) return <Centered emoji="🔑" title="Checking match…" sub="Loading scorer access"/>;
  if(data===null) return <Centered emoji="🏏" title="No active match yet" sub="Waiting for admin to start a match." onExit={onCancel}/>;
  if(data.mo) return <Centered emoji="🏆" title="Match has ended" sub="Ask the admin to start a new match." onExit={onCancel}/>;

  const verify=(entered)=>{
    if(entered===ADMIN_PIN||entered===BASIC_ADMIN_PIN) return {ok:true};
    const isTeamA=entered===data.pinA, isTeamB=entered===data.pinB;
    if(!isTeamA&&!isTeamB) return {ok:false,msg:"❌ Wrong PIN, try again"};
    const myTeam=isTeamA?data.teamA:data.teamB;
    if(data.awaitingOpeners||data.ib) return {ok:true};
    if(myTeam===data.battingTeam) return {ok:true};
    return {ok:false,msg:`🔒 ${myTeam} isn't batting yet — ${data.battingTeam} is batting now.`};
  };

  return <PinGate title="Team Scorer Access" verify={verify} onOk={onOk} onCancel={onCancel}
    hint={data.awaitingOpeners?"Setting up openers":data.ib?"Innings break — new team sets up":`${data.battingTeam} batting`}/>;
}

// ── Admin-only: set or change the one shared club passphrase ──────────────────
// Replaces the old per-person PIN system — instead of every player remembering their
// own 4-digit code, the whole club shares ONE passphrase (separate from the admin PIN,
// which stays private). Anyone editing the roster or voting on someone's behalf needs to
// know this phrase once per device — proves "this is someone actually in the club" without
// the friction of managing dozens of individual PINs.
function ClubPassphraseAdmin({current}){
  const[open,setOpen]=React.useState(false);
  const[val,setVal]=React.useState(current||"");
  const save=()=>{
    const v=val.trim();

    DB.ref("clubPassphrase").set(v).then(()=>{alert("Club passphrase saved! Share it with the group.");setOpen(false);}).catch(e=>alert("Failed: "+e.message));
  };
  return(
    <div className="mini-card" style={{marginBottom:16,border:"1px solid rgba(245,158,11,.3)"}}>
      <div className="flex items-center justify-between">
        <div>
          <p className="section-title" style={{marginBottom:2}}>🔑 Club Passphrase</p>
          <p style={{fontSize:12,color:"#9ca3af"}}>{current?`Currently set: "${current}"`:"Not set yet — anyone can edit/vote freely until you set one."}</p>
        </div>
        <button onClick={()=>{setVal(current||"");setOpen(!open);}} style={{background:"rgba(245,158,11,.12)",border:"1px solid rgba(245,158,11,.35)",color:"#fbbf24",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{current?"Change":"Set"}</button>

}
