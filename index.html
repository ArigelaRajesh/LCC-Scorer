      let id = localStorage.getItem("lcc_device_id");

      // localStorage unavailable (private browsing etc) — fall back to a session-only id

<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback}=React;

// ── Helpers ──────────────────────────────────────────────────────────────────
const nb=(n)=>({name:n,runs:0,balls:0,fours:0,sixes:0,out:false,howOut:"",onStrike:false});
const nw=(n)=>({name:n,overs:0,ballsThisOver:0,runs:0,wickets:0,maidens:0,runsThisOver:0});
const ovStr=(b)=>`${Math.floor(b/6)}.${b%6}`;
const rr=(r,b)=>b===0?"0.00":((r/b)*6).toFixed(2);
const T=20;

function chipClass(ev){
  if(ev.type==="W")  return "chip chip-W";
  if(ev.type==="4")  return "chip chip-4";
  if(ev.type==="6")  return "chip chip-6";
  if(ev.type==="WD") return "chip chip-WD";
  if(ev.type==="NB") return "chip chip-NB";
  if(ev.type==="0")  return "chip chip-0";
  return "chip chip-run";
}
function chipLbl(ev){
  if(ev.type==="W")  return"W";
  if(ev.type==="WD") return ev.extraRuns>1?`wd+${ev.extraRuns-1}`:"wd";
  if(ev.type==="NB") return ev.extraRuns>1?`nb+${ev.extraRuns-1}`:"nb";
  return ev.type;
}

// ── Setup (Admin only: teams, venue, toss — NO players) ──────────────────────
function Setup({onStart,role,onExit,onHistory}){
  const rA=useRef(),rB=useRef();
  const[venue,setVenue]=useState(null);     // "lakes" | "millennium"
  const[overs,setOvers]=useState(8);
  const[wkts,setWkts]=useState(6);
  const[customOv,setCustomOv]=useState(false);
  const[customWk,setCustomWk]=useState(false);
  const[mWkts,setMWkts]=useState(10);        // Millennium Park wickets per side (default 10, raisable for extra players)
  const[customMWk,setCustomMWk]=useState(false);
  const[single,setSingle]=useState(false);   // single-batsman mode (Lakes)
  const[pinA,setPinA]=useState(()=>String(Math.floor(1000+Math.random()*9000)));
  const[pinB,setPinB]=useState(()=>String(Math.floor(1000+Math.random()*9000)));
  const[tossWinner,setTossWinner]=useState(null); // "A" | "B"
  const[tossChoice,setTossChoice]=useState(null); // "bat" | "bowl"
  const[flipping,setFlipping]=useState(false);
  const[coinResult,setCoinResult]=useState(null); // "heads" | "tails"
  const mountedRef=useRef(true);
  const audioCtxRef = useRef(null);
  React.useEffect(()=>()=>{mountedRef.current=false;},[]);

  // Defense in depth: Setup creates/configures matches and exposes the "reset live data" tool —
  // it must never be reachable by a non-admin. Placed AFTER all hooks above (Rules of Hooks).
  if(role!=="admin"){
    return <Centered emoji="🏏" title="No active match yet" sub="Ask the admin to start a match first." onExit={onExit}/>;
  }

  const isSingle=venue==="lakes"&&single;

  // ── Lightweight Web Audio sound effects (no external files needed) ──
  const getAudioCtx = () => {
    if(!audioCtxRef.current){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(Ctx) audioCtxRef.current = new Ctx();
    }
    return audioCtxRef.current;
  };
  const playTick = () => {
    const ctx = getAudioCtx(); if(!ctx || ctx.state!=="running") return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = "square"; osc.frequency.setValueAtTime(1100, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.06, t+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.06);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t+0.07);
  };
  const playResultChime = () => {
    const ctx = getAudioCtx(); if(!ctx || ctx.state!=="running") return;
    const t = ctx.currentTime;
    [523.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = "sine"; osc.frequency.setValueAtTime(freq, t+i*0.12);
      gain.gain.setValueAtTime(0.0001, t+i*0.12);
      gain.gain.exponentialRampToValueAtTime(0.18, t+i*0.12+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+i*0.12+0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t+i*0.12); osc.stop(t+i*0.12+0.55);
    });
  };
  // Actually SPEAK "Heads!" or "Tails!" out loud using the browser's built-in voice (no audio files needed)
  const announceResult = (word) => {
    try{
      if(!window.speechSynthesis) return;
      window.speechSynthesis.cancel(); // clear any queued/stuck utterances first
      const utter = new SpeechSynthesisUtterance(word + "!");
      utter.rate = 0.9; utter.pitch = 1.1; utter.volume = 1;
      window.speechSynthesis.speak(utter);
    }catch(e){ console.error("speech announce failed",e); }
  };

  const FLIP_DURATION = 6000; // 6 seconds, as requested — gives time for the call to happen "in the air"
  const flipCoin=()=>{
    if(flipping)return;
    setFlipping(true);setCoinResult(null);
    // iOS/Safari suspend AudioContext until it's resumed inside a real user-gesture handler — this click is that gesture.
    const ctx = getAudioCtx();
    if(ctx && ctx.state==="suspended") ctx.resume().catch(()=>{});
    // Tick sound while the coin spins, slowing down toward the end like a real coin settling
    const tickIntervals = [120,120,140,160,190,230,280,340,420,520,650,820];
    let elapsed = 0;
    tickIntervals.forEach((gap)=>{
      elapsed += gap;
      setTimeout(()=>{ if(mountedRef.current && elapsed < FLIP_DURATION-200) playTick(); }, elapsed);
    });
    setTimeout(()=>{
      if(!mountedRef.current)return;
      const result = Math.random()<0.5 ? "heads" : "tails";
      setCoinResult(result);
      playResultChime();
      announceResult(result==="heads"?"Heads":"Tails");
      setFlipping(false);
      // Deliberately NOT auto-picking a toss winner — the coin only reveals heads/tails.
      // Whoever called it correctly is selected manually below by admin, just like a real toss.
    },FLIP_DURATION);
  };
  const go=()=>{
    const[a,b]=[rA,rB].map(r=>r.current?.value?.trim());
    if(!a||!b){alert("Please enter both team names.");return;}
    if(!tossWinner||!tossChoice){alert("Select who won the toss and their decision.");return;}
    if(venue==="lakes"){
      if(!overs||overs<1||overs>50){alert("Enter valid overs (1-50).");return;}
      if(!wkts||wkts<1||wkts>11){alert("Enter valid wickets (1-11).");return;}
    }
    if(venue==="millennium"){
      if(!mWkts||mWkts<1||mWkts>20){alert("Enter valid wickets (1-20).");return;}
    }
    if(!pinA||pinA.length<3||!pinB||pinB.length<3){alert("Both team PINs must be at least 3 digits.");return;}
    if(pinA===pinB){alert("Team A and Team B PINs must be different.");return;}

    // Determine who bats first based on toss
    const winnerName=tossWinner==="A"?a:b;
    const loserName=tossWinner==="A"?b:a;
    const battingFirst=tossChoice==="bat"?winnerName:loserName;
    const bowlingFirst=battingFirst===a?b:a;

// ── App root ─────────────────────────────────────────────────────────────────
function App({role,onExit,onHistory}){
  const isScorer=role==="scorer"||role==="admin";
  const[match,setMatch]=useState(null);
  const[tab,setTab]=useState("score");
  const[inn,setInn]=useState(null);
  const[hist,setHist]=useState([]);
  const[pw,setPW]=useState(false);
  const[nbn,setNBN]=useState("");
  const[nnb,setNNB]=useState(false);
  const[nbwn,setNBWN]=useState("");
  const[ib,setIB]=useState(false);
  const[mo,setMO]=useState(null);
  const[flash,setFlash]=useState(false);
  const[inn1,setInn1]=useState(null);
  const[pr,setPR]=useState(false);   // pending retire -> choose next batsman
  const[saved,setSaved]=useState(false);
  const[syncErr,setSyncErr]=useState(null);
  const[loaded,setLoaded]=useState(!FB_OK||!DB); // becomes true once we've checked Firebase for an existing match
  const[preEnd,setPreEnd]=useState(null); // snapshot before ending innings/match, so admin can revert
  const[slotsA,setSlotsA]=useState([]);  // device IDs holding Team A's 2 scorer slots
  const[slotsB,setSlotsB]=useState([]);  // device IDs holding Team B's 2 scorer slots
  const localChange=React.useRef(false); // true right after THIS device makes a change — skip the next incoming sync to avoid clobbering our own optimistic update

  // Pull in any match that's already live (so a scorer/admin joining mid-match sees it)
  // and keep listening so both team scorers + admin always see the SAME shared match.
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB)return;
    const ref=DB.ref("live");
    const cb=ref.on("value",s=>{
      if(localChange.current){ localChange.current=false; return; } // ignore echo of our own write
      const v=s.val();
      // IMPORTANT: Firebase Realtime Database does NOT store empty objects {} or empty arrays [] —
      // those keys are silently omitted on write. So a freshly-created match (before openers are set)
      // legitimately arrives here with batsmen/bowlers/battingOrder/etc. MISSING, not present-but-empty.
      // We must normalize those back to {} / [] rather than rejecting the data as "invalid".
      const innOk = v&&v.inn&&typeof v.inn==="object"
        &&typeof v.inn.totalRuns==="number"&&typeof v.inn.totalBalls==="number"&&typeof v.inn.wickets==="number"
        &&typeof v.inn.battingTeam==="string"&&typeof v.inn.bowlingTeam==="string";
      const valid=v&&v.match&&innOk&&v.match.teamA&&v.match.teamB;
      if(!valid){ setLoaded(true); return; }
      const normInn = {
        ...v.inn,
        overEvents: v.inn.overEvents||[],
        completedOvers: v.inn.completedOvers||[],
        battingOrder: v.inn.battingOrder||[],
        bowlingOrder: v.inn.bowlingOrder||[],
        batsmen: v.inn.batsmen||{},
        bowlers: v.inn.bowlers||{},
        extras: v.inn.extras||{wd:0,nb:0,b:0,lb:0},
      };
      setMatch(v.match);
      setInn(normInn);
      setInn1(v.inn1||null);
      setIB(!!v.ib);
      setMO(v.mo||null);
      setSlotsA(Array.isArray(v.slotsA)?v.slotsA:[]);
      setSlotsB(Array.isArray(v.slotsB)?v.slotsB:[]);
      setLoaded(true);
    },err=>{ console.error("live listener error",err); setSyncErr(err.message||"Could not read live match"); setLoaded(true); });
    return ()=>ref.off("value",cb);
  },[isScorer]);

  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!loaded)return;
    // Firebase rejects undefined — strip via JSON round-trip
    // NOTE: slotsA/slotsB are included here (preserved from the last read) so this full-node
    // overwrite never erases the scorer-slot locks claimed via ScorerGate.
    const payload=JSON.parse(JSON.stringify({match,inn,inn1,ib,mo,pinA:match?.pinA||null,pinB:match?.pinB||null,teamA:match?.teamA||null,teamB:match?.teamB||null,battingTeam:inn?.battingTeam||null,slotsA,slotsB,t:Date.now()}));
    localChange.current=true;
    DB.ref("live").set(payload).then(()=>{if(syncErr)setSyncErr(null);}).catch(e=>{console.error("sync failed",e);setSyncErr(e.message||"Write blocked — check Firebase rules");});
  },[match,inn,inn1,ib,mo,isScorer,loaded,slotsA,slotsB]);

  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!mo||saved||!inn)return;
    const histPayload=JSON.parse(JSON.stringify({result:mo,inn1:inn1||null,inn2:inn,teamA:match?.teamA,teamB:match?.teamB,tossSummary:match?.tossSummary||null,venue:inn.venue,format:inn.format,overs:inn.overs,maxWkts:inn.maxWkts,finishedAt:Date.now()}));
    DB.ref("history").push(histPayload).then(()=>setSaved(true)).catch(e=>console.error("hist save failed",e));
  },[mo,saved,isScorer,inn,inn1,match]);

  if(isScorer&&FB_OK&&DB&&!loaded){
    return <Centered emoji="🔄" title="Loading match…" sub="Checking for a live match"/>;
  }

  const startMatch=({teamA,teamB,battingFirst,bowlingFirst,venue,format,overs,maxWkts,single,pinA,pinB,tossSummary})=>{
    setSaved(false);
    setMatch({teamA,teamB,venue,format,overs,maxWkts,single,pinA,pinB,tossSummary});setHist([]);setInn1(null);
    // Shell innings — no players yet, batting team must enter openers
    setInn({battingTeam:battingFirst,bowlingTeam:bowlingFirst,inningsNum:1,
      venue,format,overs,maxWkts,single:!!single,
      awaitingOpeners:true,
      batsmen:{},battingOrder:[],
      bowlers:{},bowlingOrder:[],
      strikerName:null,nonStrikerName:null,bowlerName:null,
      totalRuns:0,totalBalls:0,wickets:0,overEvents:[],completedOvers:[],
      extras:{wd:0,nb:0,b:0,lb:0},target:null});
  };

  // Called once the batting team's scorer enters opening striker/non-striker
  // and the bowling team's scorer (or admin) enters the opening bowler.
  const fillOpeners=({striker,nonStriker,bowler})=>{
    setInn(p=>{
      const single=p.single;
      const batsmen=single
        ?{[striker]:{...nb(striker),onStrike:true}}
        :{[striker]:{...nb(striker),onStrike:true},[nonStriker]:nb(nonStriker)};
      return{...p,awaitingOpeners:false,
        batsmen,battingOrder:single?[striker]:[striker,nonStriker],
        bowlers:{[bowler]:nw(bowler)},bowlingOrder:[bowler],
        strikerName:striker,nonStrikerName:single?null:nonStriker,bowlerName:bowler};
    });
  };

  const swap=(i)=>{
    const b={...i.batsmen};
    b[i.strikerName]={...b[i.strikerName],onStrike:false};
    b[i.nonStrikerName]={...b[i.nonStrikerName],onStrike:true};
    return{...i,batsmen:b,strikerName:i.nonStrikerName,nonStrikerName:i.strikerName};
  };

  const endInnings=(i)=>{
    if(i.inningsNum===1){setInn1(JSON.parse(JSON.stringify(i)));setIB(true);return;}
    const t=i.target;
    if(i.totalRuns<t-1) setMO({winner:i.bowlingTeam,margin:`${t-1-i.totalRuns} run${t-1-i.totalRuns===1?"":"s"}`});
    else if(i.totalRuns===t-1) setMO({winner:null});
    else setMO({winner:i.battingTeam,margin:`${i.maxWkts-i.wickets} wicket${i.maxWkts-i.wickets===1?"":"s"}`});
  };

  // Snapshot before ending innings/match, so admin can revert
  const manualEndInnings=()=>{
    if(!inn)return;
    if(!confirm(inn.inningsNum===1?"End the 1st innings now?":"End the match now?"))return;
    setPreEnd({inn:JSON.parse(JSON.stringify(inn)),inn1:inn1?JSON.parse(JSON.stringify(inn1)):null,ib,mo});
    endInnings(inn);
  };
  const revert=()=>{
    if(!preEnd)return;
    if(!confirm("Revert and bring the match back to live? This undoes the innings/match end."))return;
    setInn(preEnd.inn);setInn1(preEnd.inn1);setIB(false);setMO(null);setSaved(false);
    setPreEnd(null);
  };

  const undo=()=>{
    if(!hist.length)return;
    const prev=hist[hist.length-1];
    setHist(h=>h.slice(0,-1));
    setInn(prev);setPW(false);setNNB(false);
    setFlash(true);setTimeout(()=>setFlash(false),500);
  };

  const record=(ev)=>{
    if(!inn)return;
    setHist(h=>[...h,JSON.parse(JSON.stringify(inn))]);
    let i=JSON.parse(JSON.stringify(inn));
    let bw=i.bowlers[i.bowlerName];
    let st=i.batsmen[i.strikerName];
    const isL=ev.type!=="WD"&&ev.type!=="NB";
    let rT=0,rS=0,rB=0,cross=false;

    if(ev.type==="WD"){rT=ev.extraRuns;rB=ev.extraRuns;i.extras.wd+=ev.extraRuns;if((ev.extraRuns-1)>0&&(ev.extraRuns-1)%2===1)cross=true;}
    else if(ev.type==="NB"){rT=ev.extraRuns+ev.batRuns;rB=rT;rS=ev.batRuns;i.extras.nb+=ev.extraRuns;if(ev.batRuns%2===1)cross=true;}
    else if(ev.type==="B"||ev.type==="LB"){rT=ev.extraRuns;i.extras[ev.type==="B"?"b":"lb"]+=ev.extraRuns;if(ev.extraRuns%2===1)cross=true;}
    else if(ev.type==="W"){rT=ev.extraRuns||0;bw.wickets++;i.wickets++;}
    else{const r=parseInt(ev.type);rT=r;rS=r;rB=r;if(r%2===1)cross=true;}

    i.totalRuns+=rT;bw.runs+=rB;bw.runsThisOver+=rB;
    if(isL){bw.ballsThisOver++;i.totalBalls++;}
    if(ev.type!=="WD"){st.runs+=rS;if(isL)st.balls++;if(ev.type==="4")st.fours++;if(ev.type==="6")st.sixes++;}
    if(ev.type==="W"){st.out=true;st.howOut=ev.dismissal||`b ${i.bowlerName}`;}
    i.batsmen[i.strikerName]=st;i.bowlers[i.bowlerName]=bw;
    i.overEvents=[...i.overEvents,ev];

    let overDone=false;
    if(isL&&bw.ballsThisOver===6){
      bw.maidens=bw.runsThisOver===0?bw.maidens+1:bw.maidens;
      bw.overs++;bw.ballsThisOver=0;bw.runsThisOver=0;
      i.bowlers[i.bowlerName]=bw;
      i.completedOvers=[...i.completedOvers,i.overEvents];i.overEvents=[];
      overDone=true;if(!i.single)cross=!cross;
    }
    if(i.single)cross=false;  // single batsman always on strike
    setInn(i);
    if(ev.type==="W"){
      if(i.battingOrder.length>=i.maxWkts+1||i.wickets>=i.maxWkts||i.totalBalls>=i.overs*6){endInnings(i);return;}
      setPW(true);
      if(overDone)setNNB(true);  // wicket fell on the over's last ball — still need a new bowler too
      return;
    }
    if(cross)setInn(p=>swap(p));
    if(i.totalBalls>=i.overs*6){endInnings(i);return;}
    if(i.target!==null&&i.totalRuns>=i.target){setMO({winner:i.battingTeam,margin:`${i.maxWkts-i.wickets} wicket${i.maxWkts-i.wickets===1?"":"s"}`});return;}
    if(overDone)setNNB(true);
  };

  const confBatsman=()=>{
    const nm=nbn.trim();if(!nm)return;
    setInn(p=>{
      const b={...p.batsmen};
      const existing=b[nm];
      if(existing){
        // returning retired batsman — keep their score, clear retired flag
        b[nm]={...existing,onStrike:true,retired:false};
      }else{
        b[nm]={...nb(nm),onStrike:true};
      }
      const order=p.battingOrder.includes(nm)?p.battingOrder:[...p.battingOrder,nm];
      return{...p,batsmen:b,battingOrder:order,strikerName:nm};
    });
    setNBN("");setPW(false);setPR(false);
  };
  const retire=()=>{
    // mark current striker as retired, prompt for next batsman
    setHist(h=>[...h,JSON.parse(JSON.stringify(inn))]);
    setInn(p=>{const b={...p.batsmen};b[p.strikerName]={...b[p.strikerName],retired:true,onStrike:false};return{...p,batsmen:b};});
    setPR(true);
  };
  const confBowler=()=>{
    const nm=nbwn.trim();if(!nm)return;
    if(inn&&nm===inn.bowlerName){alert("A bowler cannot bowl two overs in a row. Pick a different bowler.");return;}
    setInn(p=>{const b={...p.bowlers};if(!b[nm])b[nm]=nw(nm);return{...p,bowlers:b,bowlingOrder:p.bowlingOrder.includes(nm)?p.bowlingOrder:[...p.bowlingOrder,nm],bowlerName:nm};});
    setNBWN("");setNNB(false);
  };
  const start2=({striker,nonStriker,bowler})=>{
    setHist([]);
    setInn(p=>({battingTeam:p.bowlingTeam,bowlingTeam:p.battingTeam,inningsNum:2,
      venue:p.venue,format:p.format,overs:p.overs,maxWkts:p.maxWkts,single:p.single,
      batsmen:p.single?{[striker]:{...nb(striker),onStrike:true}}:{[striker]:{...nb(striker),onStrike:true},[nonStriker]:nb(nonStriker)},
      battingOrder:p.single?[striker]:[striker,nonStriker],
      bowlers:{[bowler]:nw(bowler)},bowlingOrder:[bowler],
      strikerName:striker,nonStrikerName:p.single?null:nonStriker,bowlerName:bowler,
      totalRuns:0,totalBalls:0,wickets:0,overEvents:[],completedOvers:[],
      extras:{wd:0,nb:0,b:0,lb:0},target:p.totalRuns+1}));
    setIB(false);
  };

  if(!match){
    if(role!=="admin"){
      return <Centered emoji="🏏" title="No active match yet" sub="Ask the admin to start a match first. This screen will update automatically once they do." onExit={onExit}/>;
    }
    return<Setup onStart={startMatch} role={role} onExit={onExit} onHistory={onHistory}/>;
  }
  if(!inn)   return null;
  if(inn.awaitingOpeners) return<OpenersForm inn={inn} match={match} onSubmit={fillOpeners} role={role} onExit={onExit}/>;
  if(ib)     return<InningsBreak inn={inn} match={match} onStart={start2} role={role} onRevert={revert} canRevert={!!preEnd} onExit={onExit}/>;
  if(mo)     return<MatchOver result={mo} inn={inn} inn1={inn1} match={match} role={role} onRevert={revert} canRevert={!!preEnd} onNew={()=>{setMatch(null);setInn(null);setMO(null);setInn1(null);setPreEnd(null);}}/>;

  const SK=inn.batsmen[inn.strikerName];
  const NS=inn.nonStrikerName?inn.batsmen[inn.nonStrikerName]:null;
  const BW=inn.bowlers[inn.bowlerName];
  const bLeft=inn.overs*6-inn.totalBalls;
  const crr=rr(inn.totalRuns,inn.totalBalls);
  const req=inn.target?inn.target-inn.totalRuns:null;
  const rrr=inn.target&&bLeft>0?((req/bLeft)*6).toFixed(2):null;

  return(
    <div style={{background:"linear-gradient(165deg,#022c1e 0%,#0a2540 24%,#1c1150 52%,#2d0f5c 76%,#0a0414 100%)",minHeight:"100vh"}}>

      {syncErr&&(
        <div style={{background:"rgba(239,68,68,.15)",borderBottom:"1px solid rgba(239,68,68,.5)",padding:"8px 14px",textAlign:"center"}}>
          <span style={{color:"#f87171",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>⚠️ Live sync blocked — publish Firebase rules (read/write: true). Scoring still works locally.</span>
        </div>
      )}

      {/* Score header */}
      <div className="score-header">
        <div className="flex items-center justify-between mb-3">
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".2em"}}>{inn.inningsNum===1?"1st":"2nd"} Innings</span>
            <span style={{width:4,height:4,borderRadius:"50%",background:"#4338ca",display:"inline-block"}}/>
            <span style={{fontWeight:600,fontSize:14}}>{inn.battingTeam}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{color:"#4b5563",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>vs {inn.bowlingTeam}</span>
            {role==="admin"&&onHistory&&<button onClick={onHistory} style={{background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.35)",color:"#a5b4fc",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderRadius:8,padding:"4px 9px",fontWeight:600}}>📚 History</button>}
            {role==="admin"&&<PinButton match={match} slotsA={slotsA} slotsB={slotsB} onClearSlots={()=>{
              setSlotsA([]); setSlotsB([]);
            }}/>}
            {onExit&&<button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← home</button>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
          <span style={{fontSize:10,background:inn.format==="T20"?"rgba(245,158,11,.18)":"rgba(99,102,241,.18)",color:inn.format==="T20"?"#fbbf24":"#a5b4fc",border:`1px solid ${inn.format==="T20"?"rgba(245,158,11,.35)":"rgba(99,102,241,.35)"}`,borderRadius:6,padding:"2px 8px",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,letterSpacing:".05em"}}>{inn.format==="T20"?"🏟️ T20":`🎾 ${inn.overs} OV`}</span>
          <span style={{fontSize:10,color:"#4b5563",fontFamily:"'JetBrains Mono',monospace"}}>{inn.venue} · {inn.overs} ov · {inn.maxWkts} wkts</span>
        </div>
        {match?.tossSummary&&<div style={{marginBottom:6}}><span style={{fontSize:10,color:"#34d399",fontFamily:"'JetBrains Mono',monospace"}}>🪙 {match.tossSummary}</span></div>}
        <div className={`flex items-center gap-4 ${flash?"flash":""}`}>
          <span className="score-big">{inn.totalRuns}<span className="score-wkt">/{inn.wickets}</span></span>
          <span style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:16,marginBottom:4}}>({ovStr(inn.totalBalls)} ov)</span>
        </div>
        <div style={{display:"flex",gap:16,marginTop:10,flexWrap:"wrap"}}>
          <span style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>CRR <span style={{color:"#fbbf24",fontWeight:600}}>{crr}</span></span>
          {inn.target&&<>
            <span style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Target <span style={{color:"#fff",fontWeight:600}}>{inn.target}</span></span>
            <span style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Need <span style={{color:"#fff",fontWeight:600}}>{Math.max(req,0)}</span> off <span style={{color:"#fff",fontWeight:600}}>{bLeft}</span>b</span>
            {rrr&&<span style={{color:parseFloat(rrr)>12?"#f87171":"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>RRR <span style={{fontWeight:600,color:parseFloat(rrr)>12?"#f87171":"#fff"}}>{rrr}</span></span>}
          </>}
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs">
        {[["score","🏏 Live"],["batting","🟡 Batting"],["bowling","🎯 Bowling"]].map(([id,lbl])=>(
          <button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>

      <div className="content">
        {tab==="score"&&<ScoreTab inn={inn} SK={SK} NS={NS} BW={BW} record={record}
          pw={pw} nbn={nbn} setNBN={setNBN} confBatsman={confBatsman}
          nnb={nnb} nbwn={nbwn} setNBWN={setNBWN} confBowler={confBowler}
          pr={pr} onRetire={retire}
          onEndInnings={manualEndInnings} onRevert={revert} canRevert={!!preEnd} role={role}
          onUndo={undo} canUndo={hist.length>0}/>}
        {tab==="batting"&&<BattingTab inn={inn}/>}
        {tab==="bowling"&&<BowlingTab inn={inn}/>}
      </div>
    </div>
  );
}

// ── Score Tab ─────────────────────────────────────────────────────────────────
function ScoreTab({inn,SK,NS,BW,record,pw,nbn,setNBN,confBatsman,nnb,nbwn,setNBWN,confBowler,pr,onRetire,onEndInnings,onRevert,canRevert,role,onUndo,canUndo}){
  const[wt,setWT]=useState("Bowled");
  const[showW,setSW]=useState(false);
  const[em,setEM]=useState(null);
  const[er,setER]=useState(0);
  const dis=pw||nnb||pr;
  const retiredList=(inn.battingOrder||[]).filter(n=>inn.batsmen&&inn.batsmen[n]&&inn.batsmen[n].retired);

  const wlbl=(t)=>{
    if(t==="Bowled")  return`b ${inn.bowlerName}`;
    if(t==="Caught")  return`c & b ${inn.bowlerName}`;
    if(t==="LBW")     return`lbw b ${inn.bowlerName}`;
    if(t==="Run Out") return"run out";
    if(t==="Stumped") return`st b ${inn.bowlerName}`;
    return t;
  };
  const doW=()=>{record({type:"W",extraRuns:0,dismissal:wlbl(wt)});setSW(false);};
  const doEx=()=>{
    if(em==="WD")record({type:"WD",extraRuns:1+er});
    else if(em==="NB")record({type:"NB",extraRuns:1,batRuns:er});
    else record({type:em,extraRuns:er||1});
    setEM(null);setER(0);
  };

  return(
    <div className="space-y-4">
      {(pw||pr)&&(
        <div className={pr?"alert-indigo":"alert-red"}>
          <p style={{color:pr?"#818cf8":"#f87171",fontFamily:"'JetBrains Mono',monospace",fontSize:11,textTransform:"uppercase",letterSpacing:".15em",marginBottom:8}}>{pr?"🔁 Retired — who's in next?":"⚡ Wicket! Who's next?"}</p>
          <div style={{display:"flex",gap:8}}>
            <input value={nbn} onChange={e=>setNBN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confBatsman()} placeholder="Batsman name" autoFocus list="batlist" style={{flex:1}}/>
            <datalist id="batlist">{retiredList.map(n=><option key={n} value={n}/>)}</datalist>
            <button className="btn btn-primary" onClick={confBatsman} style={{padding:"10px 16px",whiteSpace:"nowrap"}}>In →</button>
          </div>
          {retiredList.length>0&&<div style={{marginTop:8}}>
            <p style={{fontSize:10,color:"#a78bfa",fontFamily:"'JetBrains Mono',monospace",marginBottom:5}}>Tap a retired batsman to return:</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {retiredList.map(n=>(
                <button key={n} onClick={()=>{setNBN(n);}} style={{padding:"5px 10px",borderRadius:8,border:"1px solid rgba(139,92,246,.4)",background:"rgba(139,92,246,.12)",color:"#c4b5fd",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>{n} <span style={{color:"#7c6aa8"}}>({inn.batsmen[n].runs})</span></button>
              ))}
            </div>
          </div>}
        </div>
      )}
      {nnb&&!pw&&(
        <div className="alert-indigo" style={{border:"2px solid #6366f1"}}>
          <p style={{color:"#a5b4fc",fontFamily:"'JetBrains Mono',monospace",fontSize:12,textTransform:"uppercase",letterSpacing:".12em",marginBottom:4,fontWeight:700}}>🎯 Over Complete!</p>
          <p style={{color:"#818cf8",fontSize:12,marginBottom:10}}>Select the next bowler (a bowler can't bowl two overs in a row):</p>
          <div style={{display:"flex",gap:8,marginBottom:(inn.bowlingOrder||[]).filter(b=>b!==inn.bowlerName).length>0?10:0}}>
            <input value={nbwn} onChange={e=>setNBWN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confBowler()} placeholder="Type bowler name" autoFocus style={{flex:1}}/>
            <button className="btn btn-primary" onClick={confBowler} style={{padding:"10px 18px",whiteSpace:"nowrap"}}>Bowl →</button>
          </div>
          {(inn.bowlingOrder||[]).filter(b=>b!==inn.bowlerName).length>0&&<div>
            <p style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",marginBottom:5}}>Or tap a previous bowler:</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {(inn.bowlingOrder||[]).filter(b=>b!==inn.bowlerName).map(b=>(
                <button key={b} onClick={()=>setNBWN(b)} style={{padding:"6px 12px",borderRadius:8,border:nbwn===b?"none":"1px solid rgba(99,102,241,.4)",background:nbwn===b?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(99,102,241,.12)",color:nbwn===b?"#fff":"#a5b4fc",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>{b}</button>
              ))}
            </div>
          </div>}
          <p style={{fontSize:10,color:"#4338ca",marginTop:8,fontFamily:"'JetBrains Mono',monospace"}}>Last over bowled by: {inn.bowlerName}</p>
        </div>
      )}

      {/* Mini cards */}
      <div className="grid-2">
        <div className="mini-card">
          <p className="section-title">🟡 {inn.single?"Batsman":"Batting"}</p>
          {(inn.single?[{p:SK,a:true}]:[{p:SK,a:true},{p:NS,a:false}]).map(({p,a},i)=>p?(
            <div key={i} className="flex items-center justify-between" style={{padding:"3px 0"}}>
              <span style={{fontSize:13,fontWeight:a?700:400,color:a?"#fff":"#9ca3af",display:"flex",alignItems:"center",gap:4,overflow:"hidden"}}>
                {a&&<span style={{color:"#fbbf24",fontSize:10}}>●</span>}
                <span className="truncate">{p.name}</span>
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280",flexShrink:0,marginLeft:8}}>{p.runs} ({p.balls})</span>
            </div>
          ):null)}
          {retiredList.length>0&&<p style={{fontSize:9,color:"#7c6aa8",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{retiredList.length} retired</p>}
        </div>
        <div className="mini-card">
          <p className="section-title">🎯 Bowling</p>
          {BW&&<div className="flex items-center justify-between">
            <span style={{fontSize:13,fontWeight:700,color:"#fff"}} className="truncate">{BW.name}</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280",flexShrink:0,marginLeft:8}}>{BW.overs}.{BW.ballsThisOver}-{BW.runs}-{BW.wickets}</span>
          </div>}
        </div>
      </div>

      {/* Over ticker */}
      <div>
        <div className="flex items-center justify-between mb-2">

              <button onClick={()=>copy(pin)} style={{padding:"10px 13px",borderRadius:12,border:`1.5px solid ${color}66`,background:"transparent",color:color,cursor:"pointer",fontSize:16}} title="Copy PIN">📋</button>
            </div>
            <p style={{fontSize:10,color:slots.length>=2?"#f87171":"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>{slots.length}/2 scorer slots in use{slots.length>=2?" · full":""}</p>

// ── Match Over ────────────────────────────────────────────────────────────────
function MatchOver({result,inn,inn1,match,role,onRevert,canRevert,onNew}){
  const[saving,setSaving]=React.useState(false);

  const downloadScorecard=()=>{
    setSaving(true);
    setTimeout(()=>{
      const W=800,pad=32;
      // Build rows
      const i1=inn1||{battingTeam:"",bowlingTeam:"",totalRuns:0,wickets:0,totalBalls:0,battingOrder:[],batsmen:{},bowlers:{},bowlingOrder:[],extras:{wd:0,nb:0,b:0,lb:0}};
      const i2=inn;
      const allBat1=i1.battingOrder.map(n=>{const b=i1.batsmen[n];const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):"0.0";return[n,b.out?b.howOut:b.retired?"retired":"not out",b.runs,b.balls,b.fours,b.sixes,sr];});
      const allBat2=i2.battingOrder.map(n=>{const b=i2.batsmen[n];const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):"0.0";return[n,b.out?b.howOut:b.retired?"retired":"not out",b.runs,b.balls,b.fours,b.sixes,sr];});
      const allBwl1=i1.bowlingOrder.map(n=>{const b=i1.bowlers[n];const bl=b.overs*6+b.ballsThisOver;return[n,`${b.overs}.${b.ballsThisOver}`,b.maidens,b.runs,b.wickets,bl>0?((b.runs/bl)*6).toFixed(2):"0.00"];});
      const allBwl2=i2.bowlingOrder.map(n=>{const b=i2.bowlers[n];const bl=b.overs*6+b.ballsThisOver;return[n,`${b.overs}.${b.ballsThisOver}`,b.maidens,b.runs,b.wickets,bl>0?((b.runs/bl)*6).toFixed(2):"0.00"];});

      const rowH=28,headH=44,secH=36,extraH=28,divH=2;
      const tableW=W-pad*2;
      const batCols=[tableW*0.3,tableW*0.28,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07];
      const bwlCols=[tableW*0.35,tableW*0.1,tableW*0.1,tableW*0.1,tableW*0.1,tableW*0.12,tableW*0.13];

      // Calc height
      const headerH = match?.tossSummary ? 96 : 80;
      const H=headerH+secH+headH+(allBat1.length*rowH)+extraH+divH+
               secH+headH+(allBwl1.length*rowH)+40+
               secH+headH+(allBat2.length*rowH)+extraH+divH+
               secH+headH+(allBwl2.length*rowH)+60;

      const cv=document.createElement("canvas");
      cv.width=W*2;cv.height=H*2;
      const ctx=cv.getContext("2d");
      ctx.scale(2,2);

      // Background
      const bg=ctx.createLinearGradient(0,0,W,H);
      bg.addColorStop(0,"#0f0c29");bg.addColorStop(0.5,"#1a1040");bg.addColorStop(1,"#0d1223");
      ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

      let y=0;

      // Header banner
      const hb=ctx.createLinearGradient(0,0,W,headerH);
      hb.addColorStop(0,"#1e1b4b");hb.addColorStop(1,"#13103a");
      ctx.fillStyle=hb;ctx.fillRect(0,0,W,headerH);
      ctx.fillStyle="#818cf8";ctx.font="bold 11px 'JetBrains Mono',monospace";ctx.textAlign="center";
      ctx.fillText(`LCC · LINDENHURST CRICKET CLUB · ${(inn.format==="T20"?"T20 @ MILLENNIUM PARK":(inn.overs+"-OVER @ LAKES HIGH SCHOOL"))}`,W/2,22);
      // Result
      const resultTxt=result.winner?`${result.winner} won${result.margin?" by "+result.margin:""}`:inn1?"Match Tied":"";
      ctx.fillStyle="#fbbf24";ctx.font="bold 22px 'Oswald',sans-serif";
      ctx.fillText(resultTxt,W/2,52);
      // Score line
      const s1=`${i1.battingTeam}: ${i1.totalRuns}/${i1.wickets} (${ovStr(i1.totalBalls)} ov)`;
      const s2=`${i2.battingTeam}: ${i2.totalRuns}/${i2.wickets} (${ovStr(i2.totalBalls)} ov)`;
      ctx.fillStyle="#a5b4fc";ctx.font="12px 'Inter',sans-serif";
      ctx.fillText(`${s1}   |   ${s2}`,W/2,72);
      // Toss line (if available)
      if(match?.tossSummary){
        ctx.fillStyle="#34d399";ctx.font="11px 'JetBrains Mono',monospace";
        ctx.fillText(`🪙 ${match.tossSummary}`,W/2,90);
      }
      y=headerH;

      const drawSection=(title,color)=>{
        ctx.fillStyle=color||"#1e1b4b";ctx.fillRect(0,y,W,secH);
        ctx.fillStyle="#fff";ctx.font="bold 13px 'Oswald',sans-serif";ctx.textAlign="left";
        ctx.fillText(title,pad,y+secH/2+5);
        y+=secH;
      };

      const drawTableHead=(cols,labels,isLeft)=>{
        ctx.fillStyle="#13103a";ctx.fillRect(0,y,W,headH);
        ctx.fillStyle="#818cf8";ctx.font="bold 10px 'JetBrains Mono',monospace";
        let x=pad;
        labels.forEach((l,i)=>{
          ctx.textAlign=i===0?"left":"right";
          ctx.fillText(l,i===0?x:x+cols[i]-4,y+headH/2+4);
          x+=cols[i];
        });
        y+=headH;
      };

      const drawBatRow=(row,cols,alt)=>{
        if(alt){ctx.fillStyle="rgba(255,255,255,0.03)";ctx.fillRect(0,y,W,rowH);}
        let x=pad;
        row.forEach((cell,i)=>{
          ctx.fillStyle=i===0?"#fff":i===2?"#fff":i===4?"#fbbf24":i===5?"#34d399":"#9ca3af";
          ctx.font=i===0?"600 12px 'Inter',sans-serif":i===1?"11px 'Inter',sans-serif":"12px 'JetBrains Mono',monospace";
          ctx.textAlign=i===0?"left":"right";
          if(i===1){
            ctx.fillStyle="#4338ca";ctx.font="10px 'JetBrains Mono',monospace";
            ctx.fillText(String(cell),x+cols[i]-4,y+rowH/2+4);
          } else {
            ctx.fillText(String(cell),i===0?x:x+cols[i]-4,y+rowH/2+4);
          }
          x+=cols[i];
        });
        ctx.strokeStyle="rgba(99,102,241,0.15)";ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(pad,y+rowH);ctx.lineTo(W-pad,y+rowH);ctx.stroke();
        y+=rowH;
      };

      const drawBwlRow=(row,cols,alt)=>{
        if(alt){ctx.fillStyle="rgba(255,255,255,0.03)";ctx.fillRect(0,y,W,rowH);}
        let x=pad;
        row.forEach((cell,i)=>{
          ctx.fillStyle=i===0?"#fff":i===4?"#f87171":"#9ca3af";
          ctx.font=i===0?"600 12px 'Inter',sans-serif":"12px 'JetBrains Mono',monospace";
          ctx.textAlign=i===0?"left":"right";
          ctx.fillText(String(cell),i===0?x:x+cols[i]-4,y+rowH/2+4);
          x+=cols[i];
        });
        ctx.strokeStyle="rgba(99,102,241,0.15)";ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(pad,y+rowH);ctx.lineTo(W-pad,y+rowH);ctx.stroke();
        y+=rowH;
      };

      const drawExtras=(ex)=>{
        const total=ex.wd+ex.nb+ex.b+ex.lb;
        ctx.fillStyle="#4338ca";ctx.font="11px 'JetBrains Mono',monospace";ctx.textAlign="left";
        ctx.fillText(`Extras: ${total}  (wd ${ex.wd}  nb ${ex.nb}  b ${ex.b}  lb ${ex.lb})`,pad,y+extraH/2+4);
        y+=extraH;
      };

      const divider=()=>{
        ctx.fillStyle="#3730a3";ctx.fillRect(0,y,W,divH);y+=divH;
      };

      // 1st innings batting
      drawSection(`🏏 1st Innings — ${i1.battingTeam} Batting`,"#1e1b4b");
      drawTableHead(batCols,["Batsman","Dismissal","R","B","4s","6s","SR"]);
      allBat1.forEach((r,i)=>drawBatRow(r,batCols,i%2===1));
      drawExtras(i1.extras);divider();

      // 1st innings bowling
      drawSection(`🎯 ${i2.battingTeam} Bowling`,"#130f3a");
      drawTableHead(bwlCols,["Bowler","O","M","R","W","Econ"]);
      allBwl2.forEach((r,i)=>drawBwlRow(r,bwlCols,i%2===1));
      y+=20;

      // 2nd innings batting
      drawSection(`🏏 2nd Innings — ${i2.battingTeam} Batting`,"#1e1b4b");
      drawTableHead(batCols,["Batsman","Dismissal","R","B","4s","6s","SR"]);
      allBat2.forEach((r,i)=>drawBatRow(r,batCols,i%2===1));
      drawExtras(i2.extras);divider();

      // 2nd innings bowling
      drawSection(`🎯 ${i1.battingTeam} Bowling`,"#130f3a");
      drawTableHead(bwlCols,["Bowler","O","M","R","W","Econ"]);
      allBwl1.forEach((r,i)=>drawBwlRow(r,bwlCols,i%2===1));
      y+=20;

      // Footer
      ctx.fillStyle="#3730a3";ctx.font="10px 'JetBrains Mono',monospace";ctx.textAlign="center";
      ctx.fillText("Generated by CricScore · T20 Match Scorer",W/2,y+20);

      // Download
      const dataUrl=cv.toDataURL("image/png");
      const fname=`LCC-scorecard-${(i1.battingTeam||"team").replace(/\s+/g,"-")}-vs-${(i2.battingTeam||"team").replace(/\s+/g,"-")}.png`;
      // iOS Safari/Chrome ignore the download attribute — detect and open in new tab so user can long-press to save
      const isIOS=/iP(hone|ad|od)/.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
      if(isIOS){
        const w=window.open();
        if(w){ w.document.write(`<title>${fname}</title><body style="margin:0;background:#07050f;display:flex;flex-direction:column;align-items:center;font-family:sans-serif"><p style="color:#fbbf24;padding:14px;font-size:15px;text-align:center">📥 Press &amp; hold the image below → <b>Save to Photos</b></p><img src="${dataUrl}" style="width:100%;max-width:800px"/></body>`); }
        else { alert("Please allow popups to save the scorecard, or take a screenshot."); }
      } else {
        const a=document.createElement("a");
        a.download=fname;
        a.href=dataUrl;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
      setSaving(false);
    },100);
  };

  return(
    <div className="screen">
      <div style={{textAlign:"center",maxWidth:460,width:"100%"}}>
        <div style={{fontSize:64,marginBottom:20}}>🏆</div>
        <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:11,textTransform:"uppercase",letterSpacing:".25em",marginBottom:12}}>Match Complete</p>
        <h1 style={{fontSize:40,fontFamily:"'Oswald',sans-serif",fontWeight:700,marginBottom:8}}>{result.winner?`${result.winner} Win!`:"Match Tied!"}</h1>
        {result.winner&&<p style={{color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontSize:18,marginBottom:16}}>by {result.margin}</p>}

        {/* Score summary card */}
        <div className="card" style={{marginBottom:20,textAlign:"left"}}>
          {inn1&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #3730a3",marginBottom:8}}>
            <span style={{fontWeight:600,fontSize:14}}>{inn1.battingTeam}</span>
            <span style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:"#a5b4fc"}}>{inn1.totalRuns}/{inn1.wickets} <span style={{fontSize:13,color:"#6b7280"}}>({ovStr(inn1.totalBalls)} ov)</span></span>
          </div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0"}}>
            <span style={{fontWeight:600,fontSize:14}}>{inn.battingTeam}</span>
            <span style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:"#a5b4fc"}}>{inn.totalRuns}/{inn.wickets} <span style={{fontSize:13,color:"#6b7280"}}>({ovStr(inn.totalBalls)} ov)</span></span>
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button className="btn btn-primary" style={{padding:"14px 20px",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={downloadScorecard} disabled={saving}>
            {saving?"Generating...":"📥 Download Scorecard (PNG)"}
          </button>
          {role==="admin"&&canRevert&&(
            <button className="btn" onClick={onRevert} style={{padding:"13px 20px",fontSize:14,background:"transparent",border:"1.5px solid rgba(52,211,153,.5)",color:"#34d399",borderRadius:14}}>↩️ Revert — bring match back to live</button>
          )}
          <button className="btn btn-ghost" onClick={onNew} style={{padding:"13px 20px",fontSize:14}}>🏏 New Match</button>
        </div>
        <p style={{color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",fontSize:10,marginTop:16}}>Full batting & bowling scorecard saved as image</p>
      </div>
    </div>
  );
}

function ViewerLive({onExit}){
  const[snap,setSnap]=React.useState(undefined);
  React.useEffect(()=>{
    if(!FB_OK||!DB){setSnap(null);return;}
    const ref=DB.ref("live");
    const cb=ref.on("value",s=>setSnap(s.val()));
    return ()=>ref.off("value",cb);
  },[]);

  if(snap===undefined) return <Centered emoji="📡" title="Connecting…" sub="Loading live match" onExit={onExit}/>;
  if(!snap||!snap.inn) return <Centered emoji="🏏" title="No live match" sub="Nothing is being scored right now. Check back when a game starts." onExit={onExit}/>;

  const inn=snap.inn, inn1=snap.inn1, mo=snap.mo, match=snap.match;

  if(inn.awaitingOpeners){
    return <Centered emoji="🏏" title={`${inn.battingTeam} vs ${inn.bowlingTeam}`}
      sub={`Match starting soon — ${inn.battingTeam} is setting their opening batsmen.`} onExit={onExit}/>;
  }

  if(mo){
    const i2=inn;
    return (
      <div className="result-screen"><div className="result-card" style={{maxWidth:480}}>
        <div className="text-center" style={{marginBottom:16}}>
          <div style={{fontSize:54}}>🏆</div>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:36,fontWeight:700,background:"linear-gradient(135deg,#fff,#fbbf24)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{mo.winner?`${mo.winner} Win!`:"Match Tied!"}</h1>
          {mo.winner&&<p style={{color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontSize:16}}>by {mo.margin}</p>}
        </div>
        {inn1&&<ScoreRow team={inn1.battingTeam} runs={inn1.totalRuns} wkts={inn1.wickets} balls={inn1.totalBalls}/>}
        <ScoreRow team={i2.battingTeam} runs={i2.totalRuns} wkts={i2.wickets} balls={i2.totalBalls}/>
        <button className="btn btn-ghost w-full" style={{marginTop:16}} onClick={onExit}>← Back</button>
      </div></div>
    );
  }

  const bLeft=inn.overs*6-inn.totalBalls;
  const crr=rr(inn.totalRuns,inn.totalBalls);
  const req=inn.target?inn.target-inn.totalRuns:null;
  const rrr=inn.target&&bLeft>0?((req/bLeft)*6).toFixed(2):null;
  const SK=inn.batsmen[inn.strikerName];
  const NS=inn.nonStrikerName?inn.batsmen[inn.nonStrikerName]:null;
  const BW=inn.bowlers[inn.bowlerName];

  return(
    <div style={{background:"linear-gradient(165deg,#022c1e,#0a2540,#1c1150,#2d0f5c,#0a0414)",minHeight:"100vh"}}>
      <div className="score-header">
        <div className="flex items-center justify-between" style={{marginBottom:6}}>
          <span style={{fontSize:10,background:"rgba(16,185,129,.18)",color:"#34d399",border:"1px solid rgba(16,185,129,.4)",borderRadius:6,padding:"3px 9px",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,letterSpacing:".05em"}}>● LIVE</span>
          <button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← back</button>
        </div>
        <div className="flex items-center justify-between" style={{marginBottom:6}}>
          <div className="flex items-center" style={{gap:8}}>
            <span style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".2em"}}>{inn.inningsNum===1?"1st":"2nd"} Inn</span>
            <span style={{fontWeight:700,fontSize:14}}>{inn.battingTeam}</span>
          </div>
          <span style={{color:"#4b5563",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>vs {inn.bowlingTeam}</span>
        </div>
        {match?.tossSummary&&<div style={{marginBottom:6}}><span style={{fontSize:10,color:"#34d399",fontFamily:"'JetBrains Mono',monospace"}}>🪙 {match.tossSummary}</span></div>}
        <div className="flex items-center" style={{gap:10}}>
          <span className="score-number">{inn.totalRuns}<span className="score-wkt">/{inn.wickets}</span></span>
          <span style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:16,marginBottom:4}}>({ovStr(inn.totalBalls)} ov)</span>
        </div>
        <div className="flex" style={{gap:16,marginTop:8,flexWrap:"wrap"}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280"}}>CRR <span style={{color:"#fbbf24",fontWeight:600}}>{crr}</span></span>
          {inn.target&&<>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#818cf8"}}>Target <span style={{color:"#fff",fontWeight:600}}>{inn.target}</span></span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280"}}>Need <span style={{color:"#fff",fontWeight:600}}>{Math.max(req,0)}</span> off <span style={{color:"#fff",fontWeight:600}}>{bLeft}</span></span>
            {rrr&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:parseFloat(rrr)>12?"#f87171":"#6b7280"}}>RRR <span style={{fontWeight:600}}>{rrr}</span></span>}
          </>}
        </div>
      </div>
      <div className="content" style={{paddingTop:16}}>
        {inn.inningsNum===2&&inn1&&(
          <div style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.3)",borderRadius:14,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"#a5b4fc",fontFamily:"'Inter',sans-serif"}}><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#818cf8"}}>1ST INN</span>  {inn1.battingTeam}</span>
            <span style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,color:"#c7d2fe"}}>{inn1.totalRuns}/{inn1.wickets} <span style={{fontSize:11,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>({ovStr(inn1.totalBalls)})</span></span>
          </div>
        )}
        <div className="grid-2" style={{marginBottom:16}}>
          <div className="mini-card">
            <p className="section-title">🟡 {inn.single?"Batsman":"Batting"}</p>
            {(inn.single?[SK]:[SK,NS]).filter(Boolean).map((p,i)=>(
              <div key={i} className="flex items-center justify-between" style={{padding:"3px 0"}}>
                <span style={{fontSize:13,fontWeight:p===SK?700:400,color:p===SK?"#fff":"#9ca3af"}}>{p===SK&&<span style={{color:"#fbbf24",fontSize:10,marginRight:4}}>●</span>}{p.name}</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280"}}>{p.runs} ({p.balls})</span>
              </div>
            ))}
          </div>
          <div className="mini-card">
            <p className="section-title">🎯 Bowling</p>
            {BW&&<div className="flex items-center justify-between">
              <span style={{fontSize:13,fontWeight:700}} className="truncate">{BW.name}</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280"}}>{BW.overs}.{BW.ballsThisOver}-{BW.runs}-{BW.wickets}</span>
            </div>}
          </div>
        </div>
        {/* This over */}
        <p className="section-title">This Over</p>
        <div style={{background:"#130f3a",border:"1px solid #1e1b4b",borderRadius:16,padding:"12px 14px",display:"flex",flexWrap:"wrap",gap:8,minHeight:60}}>
          {(!inn.overEvents||inn.overEvents.length===0)
            ?<span style={{color:"#2d2a6a",fontFamily:"'JetBrains Mono',monospace",fontSize:12,alignSelf:"center"}}>— new over —</span>
            :inn.overEvents.map((ev,i)=><div key={i} className={chipClass(ev)}>{chipLbl(ev)}</div>)}
        </div>
        <p style={{textAlign:"center",color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginTop:16}}>🔄 Updates automatically · {inn.venue}</p>
      </div>
    </div>
  );
}

function ScoreRow({team,runs,wkts,balls}){
  return(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(99,102,241,.2)"}}>
      <span style={{fontWeight:700,fontSize:15}}>{team}</span>
      <span style={{fontFamily:"'Oswald',sans-serif",fontSize:24,fontWeight:700}}>{runs}<span style={{color:"#f87171"}}>/{wkts}</span> <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280"}}>({ovStr(balls)})</span></span>
    </div>

}

function Centered({emoji,title,sub,onExit,children}){
  return(
    <div className="result-screen"><div className="text-center" style={{maxWidth:420}}>
      <div style={{fontSize:56,marginBottom:14}}>{emoji}</div>
      <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:30,fontWeight:700,marginBottom:8}}>{title}</h1>
      {sub&&<p style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:13,marginBottom:20,lineHeight:1.5}}>{sub}</p>}

function HistoryPage({role,onExit}){
  const[list,setList]=React.useState(undefined);
  const[openId,setOpenId]=React.useState(null);
  React.useEffect(()=>{
    if(!FB_OK||!DB){setList(null);return;}
    const ref=DB.ref("history").limitToLast(50);
    const cb=ref.on("value",s=>{
      const v=s.val()||{};
      const arr=Object.entries(v).map(([id,m])=>({id,...m})).sort((a,b)=>b.finishedAt-a.finishedAt);
      setList(arr);
    });
    return ()=>ref.off("value",cb);
  },[]);
  const del=(id,e)=>{ e.stopPropagation(); if(confirm("Delete this match permanently? This cannot be undone.")) DB.ref("history/"+id).remove(); };

  if(list===undefined) return <Centered emoji="📚" title="Loading history…" onExit={onExit}/>;
  if(!list||list.length===0) return <Centered emoji="📭" title="No matches yet" sub="Completed matches will appear here." onExit={onExit}/>;

  const opened=openId?list.find(m=>m.id===openId):null;
  if(opened) return <MatchDetailView match={opened} role={role} onBack={()=>setOpenId(null)} onDelete={(id)=>{DB.ref("history/"+id).remove();setOpenId(null);}}/>;

  return(
    <div style={{background:"linear-gradient(165deg,#022c1e,#0a2540,#1c1150,#2d0f5c,#0a0414)",minHeight:"100vh",padding:"20px 16px"}}>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div className="flex items-center justify-between" style={{marginBottom:18}}>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:28,fontWeight:700}}>📚 Match History</h1>
          <button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:13,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← back</button>
        </div>
        {list.map(m=>{
          const d=new Date(m.finishedAt);
          const r=m.result||{};
          return(
            <div key={m.id} className="mini-card" style={{marginBottom:10,cursor:"pointer",transition:"all .15s"}}
              onClick={()=>setOpenId(m.id)}
              onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(99,102,241,.5)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor=""}>
              <div className="flex items-center justify-between" style={{marginBottom:6}}>
                <span style={{fontSize:10,background:m.format==="T20"?"rgba(245,158,11,.18)":"rgba(99,102,241,.18)",color:m.format==="T20"?"#fbbf24":"#a5b4fc",borderRadius:6,padding:"2px 8px",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{m.format==="T20"?"🏟️ T20":`🎾 ${m.overs}ov`}</span>
                <span style={{fontSize:10,color:"#4b5563",fontFamily:"'JetBrains Mono',monospace"}}>{d.toLocaleDateString()} {d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
              </div>
              <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{r.winner?`🏆 ${r.winner} won${r.margin?" by "+r.margin:""}`:"Match Tied"}</div>
              {m.inn1&&<div style={{fontSize:12,color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace"}}>{m.inn1.battingTeam}: {m.inn1.totalRuns}/{m.inn1.wickets} ({ovStr(m.inn1.totalBalls)})</div>}
              {m.inn2&&<div style={{fontSize:12,color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace"}}>{m.inn2.battingTeam}: {m.inn2.totalRuns}/{m.inn2.wickets} ({ovStr(m.inn2.totalBalls)})</div>}
              <div className="flex items-center justify-between" style={{marginTop:6}}>
                <span style={{fontSize:10,color:"#4338ca",fontFamily:"'JetBrains Mono',monospace"}}>{m.venue}</span>
                <span style={{fontSize:11,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>View scorecard →</span>
              </div>
              {role==="admin"&&<button onClick={(e)=>del(m.id,e)} style={{marginTop:8,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.4)",color:"#f87171",borderRadius:10,padding:"6px 12px",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>🗑️ Delete</button>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Full scorecard for a completed match (from history) ──────────────────────
function MatchDetailView({match:m,role,onBack,onDelete}){
  const[tab,setTab]=React.useState("summary");
  const d=new Date(m.finishedAt);
  const r=m.result||{};
  return(
    <div style={{background:"linear-gradient(165deg,#022c1e,#0a2540,#1c1150,#2d0f5c,#0a0414)",minHeight:"100vh",padding:"20px 16px"}}>
      <div style={{maxWidth:520,margin:"0 auto"}}>
        <div className="flex items-center justify-between" style={{marginBottom:14}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:"#6b7280",fontSize:13,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← all matches</button>
          {role==="admin"&&<button onClick={()=>{if(confirm("Delete this match permanently? This cannot be undone."))onDelete(m.id);}} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.4)",color:"#f87171",borderRadius:10,padding:"6px 12px",fontSize:11,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>🗑️ Delete Match</button>}
        </div>

        {/* Result header */}
        <div className="card" style={{textAlign:"center",marginBottom:16}}>
          <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".2em",marginBottom:8}}>
            {d.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})} · {m.venue}
          </p>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:26,fontWeight:700,marginBottom:6}}>

          {m.inn2&&<div className="score-summary-row"><span style={{fontWeight:600,fontSize:14}}>{m.inn2.battingTeam}</span><span style={{fontFamily:"'Oswald',sans-serif",fontSize:20,fontWeight:700,color:"#a5b4fc"}}>{m.inn2.totalRuns}/{m.inn2.wickets} <span style={{fontSize:12,color:"#6b7280"}}>({ovStr(m.inn2.totalBalls)})</span></span></div>}
        </div>

          {[["summary","Summary"],m.inn1?["inn1",`${m.inn1.battingTeam} Inn`]:null,m.inn2?["inn2",`${m.inn2.battingTeam} Inn`]:null].filter(Boolean).map(([id,lbl])=>(
            <button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
          ))}
        </div>

        {tab==="summary"&&(
          <div className="mini-card">
            <p className="section-title">Match Info</p>
            <div style={{fontSize:13,color:"#d1d5db",lineHeight:1.8}}>
              <div>📍 {m.venue}</div>
              <div>🏏 {m.format==="T20"?`T20 · 20 overs · ${m.maxWkts||10} wickets`:`${m.overs} overs · ${m.maxWkts} wickets`}</div>
              {m.tossSummary&&<div>🪙 {m.tossSummary}</div>}
              <div>📅 {d.toLocaleString()}</div>
              {r.winner?<div>🏆 {r.winner} won by {r.margin}</div>:<div>🤝 Match tied</div>}
            </div>
          </div>
        )}
        {tab==="inn1"&&m.inn1&&<><BattingTab inn={m.inn1}/><div style={{marginTop:14}}/><BowlingTab inn={m.inn1}/></>}
        {tab==="inn2"&&m.inn2&&<><BattingTab inn={m.inn2}/><div style={{marginTop:14}}/><BowlingTab inn={m.inn2}/></>}
      </div>
    </div>
  );
}

function PinGate({title,pin,altPin,verify,hint,onOk,onCancel}){
  const[val,setVal]=React.useState("");
  const[err,setErr]=React.useState(false);
  const[errMsg,setErrMsg]=React.useState("");
  const submit=()=>{
    if(verify){
      const r=verify(val);
      if(r.ok){onOk();}else{setErr(true);setErrMsg(r.msg||"❌ Wrong PIN");setVal("");}
    } else {
      if(val===pin||(altPin&&val===altPin)){onOk();}else{setErr(true);setErrMsg("❌ Wrong PIN, try again");setVal("");}
    }
  };
  return(
    <div className="result-screen"><div className="result-card" style={{maxWidth:360,textAlign:"center"}}>
      <div style={{fontSize:44,marginBottom:10}}>🔒</div>
      <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:24,fontWeight:700,marginBottom:4}}>{title}</h2>
      <p style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:hint?6:18}}>Enter PIN to continue</p>
      {hint&&<p style={{color:"#34d399",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:16}}>● {hint}</p>}
      <input type="password" inputMode="numeric" value={val} autoFocus
        onChange={e=>{setVal(e.target.value);setErr(false);}}
        onKeyDown={e=>e.key==="Enter"&&submit()}
        placeholder="••••"
        style={{width:"100%",textAlign:"center",letterSpacing:"0.5em",fontSize:22,background:"rgba(7,5,15,.8)",border:`1.5px solid ${err?"#ef4444":"rgba(99,102,241,.4)"}`,borderRadius:14,padding:"12px",color:"#fff",fontFamily:"'JetBrains Mono',monospace",outline:"none",marginBottom:12}}/>
      {err&&<p style={{color:"#f87171",fontSize:12,marginBottom:12,fontFamily:"'Inter',sans-serif",lineHeight:1.4}}>{errMsg}</p>}
      <div className="grid-2">
        <button className="btn btn-ghost w-full" onClick={onCancel}>Cancel</button>
        <button className="btn btn-primary w-full" onClick={submit}>Enter</button>
      </div>
    </div></div>
  );
}

function CricketScene(){
  const outcomes=React.useMemo(()=>[
    {label:"SIX!",color:"#34d399",type:"six"},
    {label:"FOUR!",color:"#fbbf24",type:"four"},
    {label:"OUT!",color:"#f87171",type:"bowled"},
    {label:"SIX!",color:"#34d399",type:"six"},
  ],[]);
  const[idx,setIdx]=React.useState(0);
  const[k,setK]=React.useState(0);
  React.useEffect(()=>{
    const t=setInterval(()=>{ setIdx(i=>(i+1)%outcomes.length); setK(x=>x+1); },4000);
    return ()=>clearInterval(t);
  },[outcomes.length]);
  const o=outcomes[idx];
  const isBowled=o.type==="bowled";
  const isSix=o.type==="six";

  // viewBox is 320x170: a dedicated top band (y 0-40) for the result word,

    <div style={{position:"relative",width:"100%",aspectRatio:"320/170",maxHeight:150,margin:"0 auto 2px"}}>
      <svg viewBox="0 0 320 170" preserveAspectRatio="xMidYMid meet" style={{width:"100%",height:"100%",display:"block"}}>
        {/* Result word — its own clear band at the very top, nothing else ever renders here */}
        <text key={"r"+k} x="160" y="28" textAnchor="middle"

        {/* Pitch + figures band, starts well below the text band */}

        {/* Bowler */}
        <g transform="translate(56,76)">

          <line x1="0" y1="11" x2="0" y2="49" {...S("#a5b4fc")}/>
          <line x1="0" y1="49" x2="-12" y2="65" {...S("#a5b4fc")}/>
          <line x1="0" y1="49" x2="12" y2="65" {...S("#a5b4fc")}/>
          <g key={"a"+k} style={{transformOrigin:"0px 19px",animation:"bowlArm 4s ease-in-out"}}>
            <line x1="0" y1="19" x2="19" y2="9" {...S("#a5b4fc")}/>
          </g>
        </g>
        {/* Batsman */}
        <g transform="translate(264,76)">
          <circle cx="0" cy="0" r="11" {...S("#fbbf24")}/>
          <line x1="0" y1="11" x2="0" y2="49" {...S("#fbbf24")}/>
          <line x1="0" y1="49" x2="-12" y2="65" {...S("#fbbf24")}/>
          <line x1="0" y1="49" x2="12" y2="65" {...S("#fbbf24")}/>
          <g key={"b"+k} style={{transformOrigin:"0px 19px",animation:swingAnim}}>
            <line x1="0" y1="19" x2="-7" y2="31" {...S("#fbbf24")}/>
            <line x1="-7" y1="31" x2="-7" y2="62" stroke="#e8c39a" strokeWidth="7" strokeLinecap="round"/>
          </g>
        </g>
        {/* Stumps */}
        <g transform="translate(286,117)">
          {[0,5,10].map(dx=>(
            <line key={dx} x1={dx} y1="0" x2={dx} y2="24" stroke={isBowled?"#f87171":"rgba(226,232,240,.55)"} strokeWidth="3"
              style={isBowled?{transformOrigin:`${dx}px 24px`,animation:"stumpFall 4s ease-in-out"}:{}}/>
          ))}
        </g>
        {/* Ball */}
        <g key={"ball"+k} style={{animation:`${ballAnim} 4s ease-in-out`}}>

function ScorerGate({onOk,onCancel}){
  const[data,setData]=React.useState(undefined); // undefined=loading, null=no match, obj=match info
  const[slotMsg,setSlotMsg]=React.useState(null); // transient message when a slot claim fails
  React.useEffect(()=>{
    if(!FB_OK||!DB){setData(null);return;}
    const ref=DB.ref("live");
    const cb=ref.on("value",s=>{
      const v=s.val();
      if(!v||!v.inn||!v.pinA||!v.pinB){setData(null);return;}
      setData({pinA:v.pinA,pinB:v.pinB,teamA:v.teamA,teamB:v.teamB,battingTeam:v.battingTeam,
        awaitingOpeners:!!v.inn.awaitingOpeners,ib:!!v.ib,mo:!!v.mo,
        slotsA:Array.isArray(v.slotsA)?v.slotsA:[],slotsB:Array.isArray(v.slotsB)?v.slotsB:[]});
    });
    return ()=>ref.off("value",cb);
  },[]);

  if(data===undefined) return <Centered emoji="🔑" title="Checking match…" sub="Loading scorer access"/>;
  if(data===null) return <Centered emoji="🏏" title="No active match yet" sub="Waiting for admin to start a match… this screen will update automatically once they do." onExit={onCancel}/>;
  if(data.mo) return <Centered emoji="🏆" title="Match has ended" sub="Ask the admin to start a new match." onExit={onCancel}/>;

  // Try to claim (or confirm an existing claim on) one of a team's 2 scorer slots for this device.
  // Returns true if this device now has (or already had) a slot; false if both slots are taken by others.
  const claimSlot=(teamKey, slotsField)=>{
    const slots = data[slotsField];
    if(slots.includes(DEVICE_ID)) return true; // already has a slot — always allowed back in
    if(slots.length < 2){
      const updated = [...slots, DEVICE_ID];
      DB.ref(`live/${slotsField}`).set(updated).catch(e=>console.error("slot claim failed",e));
      return true;
    }
    return false; // both slots full, and this device isn't one of them
  };

  const verify=(entered)=>{
    if(entered===ADMIN_PIN) return {ok:true};  // admin master key — not subject to the 2-slot limit
    const isTeamA=entered===data.pinA, isTeamB=entered===data.pinB;
    if(!isTeamA&&!isTeamB) return {ok:false,msg:"❌ Wrong PIN, try again"};
    const myTeam=isTeamA?data.teamA:data.teamB;

    // Enforce max 2 scorers per team (tracked by device, so the same phone can always rejoin)
    const slotOk = isTeamA ? claimSlot(myTeam,"slotsA") : claimSlot(myTeam,"slotsB");
    if(!slotOk) return {ok:false,msg:`🚫 Already 2 scorers active for ${myTeam}. Ask one of them to hand off, or have admin reset the match.`};

    // During opener setup OR innings break (new team about to bat), both team scorers may enter
    if(data.awaitingOpeners||data.ib) return {ok:true};
    // Otherwise only the currently-batting team can use the live scoring buttons
    if(myTeam===data.battingTeam) return {ok:true};
    return {ok:false,msg:`🔒 ${myTeam} isn't batting right now. ${data.battingTeam} is batting — wait for your innings.`};
  };

  return <PinGate title="Team Scorer Access" verify={verify} onOk={onOk} onCancel={onCancel}
    hint={data.awaitingOpeners?"Setting up openers — both teams can enter":data.ib?"Innings break — new batting team can set up":`${data.battingTeam} is batting now`}/>;
}

function Root(){
  const[screen,setScreen]=React.useState("landing"); // landing|viewer|scorer|admin|history
  const[gate,setGate]=React.useState(null);          // null | "scorer" | "admin"
  const[isAdmin,setIsAdmin]=React.useState(false);    // persists for this session once admin PIN is entered

  const pick=(r)=>{
    if(r==="scorer"){setGate("scorer");}
    else if(r==="admin"){setGate("admin");}
    else setScreen(r);
  };
  const home=()=>{setScreen("landing");setGate(null);};

  if(gate==="scorer") return <ScorerGate onOk={()=>{setGate(null);setScreen("scorer");}} onCancel={home}/>;
  if(gate==="admin")  return <PinGate title="Admin Access"  pin={ADMIN_PIN}  onOk={()=>{setGate(null);setIsAdmin(true);setScreen("admin");}}  onCancel={home}/>;

  if(screen==="landing") return <Landing onPick={pick}/>;
  if(screen==="viewer")  return <ViewerLive onExit={home}/>;
  if(screen==="history") return <HistoryPage role={isAdmin?"admin":"viewer"} onExit={()=>setScreen(isAdmin?"admin":"landing")}/>;
  if(screen==="scorer")  return <App role="scorer" onExit={home}/>;
  if(screen==="admin")   return <App role="admin" onExit={home} onHistory={()=>setScreen("history")}/>;
  return <Landing onPick={pick}/>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  componentDidCatch(error,info){console.error("App crashed:",error,info);}
  render(){
    if(this.state.error){
      return(
        <div className="screen">
          <div className="card" style={{maxWidth:420,textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
            <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,marginBottom:10}}>Something went wrong</h2>
            <p style={{color:"#9ca3af",fontSize:12,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>{String(this.state.error.message||this.state.error)}</p>
            <p style={{color:"#6b7280",fontSize:12,marginBottom:18}}>This is usually caused by stale match data. Tap below to reset and go home — the live match (if any) is unaffected on the server.</p>
            <button className="btn btn-primary w-full" onClick={()=>{this.setState({error:null});window.location.hash="";window.location.reload();}}>🔄 Reset & Reload</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.render(<ErrorBoundary><Root/></ErrorBoundary>,document.getElementById("root"));
