                  <p style={{color:"#a5b4fc",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".12em",marginBottom:10}}>🏏 Who's playing today?</p>
                  <div style={{display:"flex",gap:14}}>
                    {squadCol(teamAName,squadA,assignA,setAssignA,"#f59e0b")}
                    {squadCol(teamBName,squadB,assignB,setAssignB,"#34d399")}
                  </div>
                  <p style={{color:"#4338ca",fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginTop:10}}>
                    Manage each team's full squad from Roster → Tools → Team Squads.
                  </p>
                </div>
              );
            })()}

            {/* Optional team assignment — tap a club member to put them on a side. Keeps the pickers
                clean later (only that team's players show as next bowler/batsman). Fully optional.
                This whole-club picker stays available even when squads exist above, in case someone
                not in the registered squad (a substitute) needs to be added for just this match. */}
            {(()=>{
              const allNames=Object.values(roster||{}).map(p=>p&&p.name).filter(Boolean).sort((a,b)=>a.localeCompare(b));
              if(allNames.length===0) return null;
              const inA=new Set(assignA), inB=new Set(assignB);
              const setSide=(name,side)=>{
                setAssignA(prev=>{const s=new Set(prev); if(side==="A"){s.add(name);}else{s.delete(name);} return [...s];});
                setAssignB(prev=>{const s=new Set(prev); if(side==="B"){s.add(name);}else{s.delete(name);} return [...s];});
              };
              const clearSide=(name)=>{ setAssignA(p=>p.filter(x=>x!==name)); setAssignB(p=>p.filter(x=>x!==name)); };
              return(
                <div style={{background:"rgba(52,211,153,.06)",border:"1px solid rgba(52,211,153,.25)",borderRadius:14,padding:14}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setShowAssign(s=>!s)}>
                    <p style={{color:"#6ee7b7",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".12em"}}>
                      👥 Assign players to teams {(assignA.length||assignB.length)?`(${assignA.length} / ${assignB.length})`:"(optional)"}
                    </p>
                    <span style={{color:"#6ee7b7",fontSize:13}}>{showAssign?"▲":"▼"}</span>
                  </div>
                  {showAssign&&(
                    <div style={{marginTop:10}}>
                      <p style={{color:"#4338ca",fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>
                        Tap a name to toggle {teamAName} → {teamBName} → none. Assigned players show as tappable chips when picking the next bowler or batsman.
                      </p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {allNames.map(n=>{
                          const side=inA.has(n)?"A":inB.has(n)?"B":null;
                          const next=side===null?"A":side==="A"?"B":"none";
                          const bg=side==="A"?"rgba(245,158,11,.18)":side==="B"?"rgba(52,211,153,.16)":"rgba(255,255,255,.04)";
                          const bd=side==="A"?"#f59e0b":side==="B"?"#34d399":"rgba(148,163,184,.35)";
                          const col=side==="A"?"#fbbf24":side==="B"?"#6ee7b7":"#94a3b8";
                          return(
                            <button key={n} onClick={()=>{ if(next==="none")clearSide(n); else setSide(n,next); }}
                              style={{padding:"6px 11px",borderRadius:9,border:`1.5px solid ${bd}`,background:bg,color:col,fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>
                              {side==="A"?"🏏 ":side==="B"?"⚡ ":""}{n}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            <div className="grid-2">
              <button className="btn btn-ghost w-full" onClick={clr}>Clear</button>
              <button className="btn btn-primary w-full" onClick={go}>Start Match</button>
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

// ── App root ─────────────────────────────────────────────────────────────────
function App({role,onExit,onHistory,onPoll,onRoster,onAnnounce,prefillFixture,sessionSlot,mySessionId}){
  const isScorer=role==="scorer"||role==="admin";
  const[match,setMatch]=useState(null);
  const[tab,setTab]=useState("score");
  const[inn,setInn]=useState(null);
  // Restore-from-backup picker: null=closed, []=opened but nothing found, [...]=list of snapshots.
  // Declared HERE at the top — not next to applyRestore/restoreFromBackup which use it — because App
  // has a conditional early return (skeleton loading) partway down, and every hook must sit above it.
  const[restoreChoices,setRestoreChoices]=useState(null);
  const[hist,setHist]=useState([]);
  // ── Undo history persistence ────────────────────────────────────────────────────────────────
  // `hist` (the local pre-ball snapshot stack that powers Undo) used to live ONLY in memory, which
  // meant it was silently wiped by anything that remounts the component: a fresh deployment/reload,
  // a backup restore, or a revert-to-live that happens to follow a reload on any device. Undo would
  // just go quietly dead with no explanation. Persisting it to localStorage (keyed to the specific
  // match+innings, so switching matches/innings never cross-contaminates) means it survives all of
  // that and gets rehydrated automatically. Capped at the last 40 balls — undoing further back than
  // that is never a realistic scenario, and it keeps storage/memory bounded over a long innings.
  const histKeyFor=(m,i)=>"lcc_hist_"+((m&&m.matchId)||"x")+"_"+((i&&i.inningsNum)||1);
  const updateHist=(updater)=>{
    setHist(h=>{
      const nh=(typeof updater==="function"?updater(h):updater).slice(-40);
      try{if(match&&inn)localStorage.setItem(histKeyFor(match,inn),JSON.stringify(nh));}catch(e){}
      return nh;
    });
  };
  const pushHist=(snap)=>updateHist(h=>[...h,snap]);
  const clearHist=()=>{
    setHist([]);
    try{if(match&&inn)localStorage.removeItem(histKeyFor(match,inn));}catch(e){}
  };
  // Rehydrate on mount / whenever we land on a match+innings with nothing in memory yet — covers a
  // fresh page load or a reconnect after the tab was closed and reopened mid-match.
  React.useEffect(()=>{
    if(!match||!inn||hist.length>0)return;
    try{
      const raw=localStorage.getItem(histKeyFor(match,inn));
      if(raw){
        const parsed=JSON.parse(raw);
        if(Array.isArray(parsed)&&parsed.length>0) setHist(parsed);
      }
    }catch(e){}
  },[match?.matchId,inn?.inningsNum]);
  // Larger-text mode for scoring outdoors in sunlight — zooms the whole scorer page ~15%. Persisted.
  const[bigText,setBigText]=useState(()=>{try{return localStorage.getItem("lcc_bigtext")==="1"}catch(e){return false}});
  const[hiCon,setHiCon]=useState(()=>{try{return localStorage.getItem("lcc_hc")==="1"}catch(e){return false}});
  React.useEffect(()=>{ try{document.body.classList.toggle("hc",hiCon);}catch(e){} },[hiCon]);
  // Sound + flash for every four/six/wicket during live scoring — defaults ON here (unlike the
  // viewer's equivalent, which defaults off) since the scorer explicitly asked for this and is
  // actively engaged with the screen the whole time, not just glancing at it occasionally.
  const[celebrationSound,setCelebrationSound]=useState(()=>{try{return localStorage.getItem("lcc_ball_sound")!=="0"}catch(e){return true}});
  // KEEP SCREEN AWAKE while actively scoring — phones dimming/locking mid-over is a real field
  // annoyance. Uses the Wake Lock API (Android Chrome, iOS Safari 16.4+); safely no-ops elsewhere.
  // Re-acquires on tab refocus (the lock auto-releases when the tab is hidden).
  React.useEffect(()=>{
    if(!isScorer||!inn) return;
    let lock=null;
    const grab=()=>{ try{ if(navigator.wakeLock&&document.visibilityState==="visible"){ navigator.wakeLock.request("screen").then(l=>{lock=l;}).catch(()=>{}); } }catch(e){} };
    grab();
    const onVis=()=>{ if(document.visibilityState==="visible") grab(); };
    document.addEventListener("visibilitychange",onVis);
    return ()=>{ document.removeEventListener("visibilitychange",onVis); try{lock&&lock.release&&lock.release();}catch(e){} };
  },[isScorer,inn?1:0]);
  // pw/nnb/pr are derived from inn.pending (NOT separate local state) so that the "we need a new
  // batsman / new bowler / retire" prompt is visible to EVERY device sharing this match — including
  // the second scorer on the same team — since inn.pending travels through the normal Firebase sync
  // along with the rest of the innings. Before this fix these were local-only React state, so if one
  // device triggered the new-bowler prompt and a DIFFERENT device (same team's other phone, or admin)
  // scored the next ball, that second device never saw the prompt and silently kept the old bowler.
  const pw = inn?.pending==="wicket"||inn?.pending==="wicketAndBowler";
  const nnb = inn?.pending==="newBowler"||inn?.pending==="wicketAndBowler";
  const pr = inn?.pending==="retire";
  const[nbn,setNBN]=useState("");
  const[nbwn,setNBWN]=useState("");
  const[ib,setIB]=useState(false);
  // At the innings break, everyone (team scorers AND admins) must re-confirm before scoring the 2nd
  // innings — so Team B's PIN actually gets used, and the handoff is deliberate rather than the 1st
  // innings' scorer silently carrying on. This resets to false whenever we (re-)enter an innings break.
  const[secondInningsAuthed,setSecondInningsAuthed]=useState(false);
  // Whenever we ENTER an innings break, require a fresh confirmation for the 2nd innings.
  React.useEffect(()=>{ if(ib) setSecondInningsAuthed(false); },[ib]);
  const[mo,setMO]=useState(null);
  const[potm,setPotm]=useState(null); // Player of the Match voting
  const[flash,setFlash]=useState(false);
  const[inn1,setInn1]=useState(null);
  const[saved,setSaved]=useState(false);
  const[syncErr,setSyncErr]=useState(null);
  // Live-write status for the scorer's confidence indicator: "idle" (nothing pending), "syncing"
  // (a write is in flight), "ok" (last write confirmed by Firebase), "error" (last write failed).
  // This is the difference between a scorer knowing their ball saved vs. scoring five more into a
  // dead connection — a direct guard against the data-loss scenarios we've fought before.
  // (Network online/offline is tracked separately by the existing `isOffline` state below, which
  // already has an auto-retry-on-reconnect effect — we reuse that rather than a second flag.)
  const[syncState,setSyncState]=useState("idle");
  const[loaded,setLoaded]=useState(!FB_OK||!DB); // becomes true once we've checked Firebase for an existing match
  const[preEnd,setPreEnd]=useState(null); // snapshot before ending innings/match, so admin can revert
  const[preEndInDB,setPreEndInDB]=useState(false); // does a revert snapshot exist in Firebase (survives refresh)?


  const[roster,setRoster]=useState({});  // club roster — used to autocomplete names & stamp profile ids for stats
  // Each device gets a stable writer ID. We tag every write with {writer, t}. The listener
  // accepts ALL remote updates except the literal echo of our OWN most-recent write (matched by
  // writer id + timestamp). This is correct for multiple simultaneous scorers — unlike the old
  // single boolean flag, which could swallow a DIFFERENT scorer's update if it arrived in the
  // window after our own write, causing the live/won flicker.
  const writerId=React.useRef("w_"+Math.random().toString(36).slice(2)+Date.now().toString(36));
  const lastWriteT=React.useRef(0);     // timestamp of our last own write
  const lastAppliedT=React.useRef(0);   // timestamp of the most recent state we've applied
  // Regression guard: track the "progress" of the score we've currently applied, so we can REFUSE
  // any incoming update that moves the live score BACKWARD within the same innings (the exact
  // symptom of a stale device clobbering the real score — e.g. 93/6 dropping to 81/4). A backward
  // move is only honoured when it's an explicit undo/revert, or when it comes from an admin (admins
  // have priority and may legitimately correct the score).
  const appliedSig=React.useRef(null);  // {matchId, inningsNum, balls, runs, wkts}
  // Why our own last LOCAL state change happened: "normal" forward scoring vs an intentional
  // "undo"/"revert" that is allowed to move the score backward. Tagged onto our writes so other
  // devices' regression guards know a backward move was deliberate.
  const writeIntent=React.useRef("normal");
  // Timestamp of the last deliberate match-over / innings-break CLEAR (revert or undo). For a short
  // window after this, the live listener rejects any incoming snapshot that still carries mo/ib, so a
  // late echo can't snap us back to "match completed" after we've intentionally reverted.
  const moClearedAt=React.useRef(0);

  // ── Concurrent-scorer awareness ─────────────────────────────────────────────────────────────
  // This app's whole design assumes ONE device is actively scoring at a time — Undo only tracks
  // THIS device's own actions (never balls that arrive from another device via the listener), and
  // the single shared Firebase node is last-write-wins, so two devices scoring around the same
  // moment can silently overwrite each other. Neither of those is something to patch around safely;
  // the real fix is making the collision visible so people can coordinate BEFORE it happens, rather
  // than trying to rebuild the sync engine's conflict handling. Uses a completely separate Firebase
  // path (not nested under `live`) so this can never interfere with the existing regression-guarded
  // read/write path there — it's a pure side-channel presence signal, nothing more.
  const[otherScorers,setOtherScorers]=React.useState([]);
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!match?.matchId)return;
    const path=`activeScorers/${match.matchId}`;
    const myRef=DB.ref(`${path}/${writerId.current}`);
    const beat=()=>{ myRef.set({role,lastSeen:Date.now()}).catch(()=>{}); };
    beat();
    const interval=setInterval(beat,6000);
    const allRef=DB.ref(path);
    const cb=allRef.on("value",s=>{
      const v=s.val()||{};
      const now=Date.now();
      const others=Object.entries(v)
        .filter(([wid,e])=>wid!==writerId.current && e && (now-(e.lastSeen||0))<15000)
        .map(([,e])=>e.role);
      setOtherScorers(others);
      // Opportunistic cleanup: this node used to just accumulate forever — every device that ever
      // opened the app left an entry behind, and if it didn't exit cleanly (crashed tab, dead phone,
      // force-closed app), nothing ever removed it. The 15s freshness filter above already hides
      // stale entries from the "other scorers active" badge, but the junk itself stayed in Firebase
      // indefinitely. Reusing SESSION_TIMEOUT_MS (same 20s staleness threshold as the session lock)
      // for consistency: any device that reads this node deletes OTHER devices' entries once they've
      // gone stale. Safe for any device to do — deleting an already-gone key is a harmless no-op, and
      // a still-active device's own entry never qualifies since it keeps renewing well within the
      // window. Only ever touches other devices' keys, never this device's own.
      Object.entries(v).forEach(([wid,e])=>{
        if(wid!==writerId.current && e && (now-(e.lastSeen||0))>=SESSION_TIMEOUT_MS){
          DB.ref(`${path}/${wid}`).remove().catch(()=>{});
        }
      });
    });
    return ()=>{
      clearInterval(interval);
      allRef.off("value",cb);
      myRef.remove().catch(()=>{});
    };
  },[isScorer,match?.matchId,role]);

  // ── Single-active-session lock: heartbeat + kick detection ─────────────────────────────────────
  // The actual CLAIM — and the hard "someone is already signed in" block — already happened at the
  // PIN gate before this component ever mounted. There is one global scoring slot for everyone
  // (admin + both team PINs). Session lifecycle ownership is split by role to avoid two effects
  // fighting over the same slot:
  //   • role==="admin": Root's own heartbeat effect owns the claim for the WHOLE admin session
  //     (dashboard, roster, history, scoring…), because an admin can be signed in without this App
  //     component being mounted at all. App deliberately does NOTHING here for admins — renewing or
  //     releasing from here too would fight Root's effect (e.g. App unmounting when the admin steps
  //     back to the dashboard would release the slot Root still legitimately holds).
  //   • role==="scorer": the scoring screen is the only place a team scorer exists, so App owns the
  //     full lifecycle — renew while mounted, release on unmount, and sign out if the slot is ever
  //     reclaimed after this device went stale (only possible if we were dead/offline 20s+).
  const mySessionIdSafe=mySessionId||writerId.current;
  const[kickedOut,setKickedOut]=React.useState(false);
  const[retakingOver,setRetakingOver]=React.useState(false);
  React.useEffect(()=>{
    if(role!=="scorer"||!FB_OK||!DB)return;
    const ref=DB.ref(sessionPath(null,SCORING_SLOT));
    const renew=()=>{ ref.set({sessionId:mySessionIdSafe,lastSeen:Date.now()}).catch(()=>{}); };
    renew();
    const hb=setInterval(renew,6000);
    const cb=ref.on("value",s=>{
      const v=s.val();
      if(v&&v.sessionId&&v.sessionId!==mySessionIdSafe){ setKickedOut(true); }
    });
    return ()=>{
      clearInterval(hb); ref.off("value",cb);
      // Release-on-exit: free the slot the instant this device stops actively scoring, rather than
      // making the next device wait out the full heartbeat timeout. Safe even if we'd already been
      // reclaimed elsewhere — releaseSession only clears the slot if it still holds exactly OUR
      // sessionId, so someone else's rightful claim is never undone by this.
      releaseSession(null,SCORING_SLOT,mySessionIdSafe);
    };
  },[role]);

  // Track whether a revert snapshot exists in Firebase, so the super-admin revert button
  // stays available even after a page refresh (when local preEnd state is lost).
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB)return;
    const pe=DB.ref("_preEnd");
    const cb=pe.on("value",s=>setPreEndInDB(!!(s.val()&&s.val().inn)));
    return()=>pe.off("value",cb);
  },[isScorer]);

  // Roster listener — powers name autocomplete and links scored players to profiles for career stats.
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB)return;
    const ref=DB.ref("roster");
    const cb=ref.on("value",s=>setRoster(s.val()||{}));
    return ()=>ref.off("value",cb);
  },[isScorer]);
  const resolvePid=React.useMemo(()=>buildPidResolver(roster),[roster]);
  const rosterNames=React.useMemo(()=>Object.values(roster||{}).map(p=>p&&p.name).filter(Boolean).sort((a,b)=>a.localeCompare(b)),[roster]);

  // Kept fresh on every render (no deps — cheap) so the live-listener callback below, which is set up
  // ONCE on mount and would otherwise only ever see the match/inn/inn1/ib/mo values from that first
  // render, can read our actual CURRENT state when it needs to self-heal (see regression guard below).
  const latestStateRef=React.useRef(null);
  React.useEffect(()=>{ latestStateRef.current={match,inn,inn1,ib,mo}; });

  // Pull in any match that's already live (so a scorer/admin joining mid-match sees it)
  // and keep listening so both team scorers + admin always see the SAME shared match.
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB)return;
    const ref=DB.ref("live");
    let cb=null, cancelled=false;
    // Wait for anonymous auth to land before attaching — under rules requiring auth != null, a
    // listener attached pre-auth on a cold load would get permission-denied and not re-read.
    onAuthReady(()=>{
      if(cancelled)return;
      cb=ref.on("value",s=>{
      const v=s.val();
      // Echo suppression: ignore ONLY the exact echo of our own most recent write
      // (same writer id AND same timestamp). Any write from another scorer/admin, or a
      // newer write from us, is always applied. This is what fixes the multi-scorer flicker.
      if(v&&v.writer===writerId.current&&v.t===lastWriteT.current){ return; }
      // Ignore stale / out-of-order updates: never apply a payload older than what we've
      // already shown (Firebase can deliver writes slightly out of order under contention).
      if(v&&typeof v.t==="number"&&v.t<lastAppliedT.current){ return; }
      // IMPORTANT: Firebase Realtime Database does NOT store empty objects {} or empty arrays [] —
      // those keys are silently omitted on write. So a freshly-created match (before openers are set)
      // legitimately arrives here with batsmen/bowlers/battingOrder/etc. MISSING, not present-but-empty.
      // We must normalize those back to {} / [] rather than rejecting the data as "invalid".
      const innOk = v&&v.inn&&typeof v.inn==="object"
        &&typeof v.inn.totalRuns==="number"&&typeof v.inn.totalBalls==="number"&&typeof v.inn.wickets==="number"
        &&typeof v.inn.battingTeam==="string"&&typeof v.inn.bowlingTeam==="string";
      const valid=v&&v.match&&innOk&&v.match.teamA&&v.match.teamB;
      if(!valid){ setLoaded(true); return; }
      // ── REGRESSION GUARD ──────────────────────────────────────────────────────────────────
      // Compute the progress signature of this incoming update and compare to what we've applied.
      // Reject backward moves within the same innings of the same match unless they're an explicit
      // undo/revert (v.intent) or come from an admin (v.role==="admin", admin priority).
      const incomingSig={ matchId:v.match.matchId||null, inningsNum:v.inn.inningsNum||1,
        balls:v.inn.totalBalls||0, runs:v.inn.totalRuns||0, wkts:v.inn.wickets||0 };
      const prev=appliedSig.current;
      const sameMatch = prev && prev.matchId===incomingSig.matchId;
      const sameInnings = sameMatch && prev.inningsNum===incomingSig.inningsNum;
      // A backward move can happen two ways: (a) WITHIN the same innings, balls/runs/wkts drop — the
      // original check below — or (b) the innings number itself drops (e.g. 2 → 1). Case (b) is exactly
      // what let a whole 2nd innings vanish: two people confirmed the innings-2 handoff close together,
      // and a device that hadn't yet moved past the completed-1st-innings/innings-break screen pushed
      // its own (now-superseded) write. Because its inningsNum(1) didn't MATCH what we'd already applied
      // (2), `sameInnings` was false and the guard skipped the check entirely — a stale innings-1 write
      // sailed straight through and clobbered live innings-2 data. Any drop in inningsNum for the same
      // match is exactly as much a regression as a ball-count drop and must be caught the same way.
      const inningsRegressed = sameMatch && incomingSig.inningsNum < prev.inningsNum;
      const goesBackward = inningsRegressed || (sameInnings && (
        incomingSig.balls<prev.balls ||
        (incomingSig.balls===prev.balls && incomingSig.runs<prev.runs) ||
        (incomingSig.balls===prev.balls && incomingSig.runs===prev.runs && incomingSig.wkts<prev.wkts)
      ));
      const intentialBack = v.intent==="undo"||v.intent==="revert";
      // Admin priority applies ONLY to deliberate corrections (undo/revert), NOT to routine forward
      // scoring. Previously ANY admin write bypassed the guard, which caused a real multi-device bug:
      // if the admin's device had a slightly stale score (it hadn't yet received a ball another scorer
      // just added), the admin's next normal write would move everyone BACKWARD and the guard let it
      // through purely because it was tagged role:"admin". Now a backward move is only honoured when it
      // is explicitly an undo/revert — an accidental backward admin write is rejected like anyone's.
      const adminCorrection = v.role==="admin" && intentialBack;
      if(goesBackward && !intentialBack && !adminCorrection){
        // A stale device tried to overwrite a more advanced score — ignore it locally, AND self-heal:
        // re-push OUR more-advanced state back to `live` right away. Just returning here (as this used
        // to) left the bad write sitting in Firebase — correct only in the memory of whichever device
        // ignored it — until that device happened to score again. Any OTHER device or viewer reading
        // `live` in the meantime (or the periodic backup snapshot, which reads local state blindly)
        // would pick up the corrupted data, which is exactly why the backup restore didn't help either.
        const ls=latestStateRef.current;
        if(ls && ls.match && ls.inn && FB_OK && DB){
          const healT=Math.max(Date.now(), lastWriteT.current+1, lastAppliedT.current+1);
          lastWriteT.current=healT; lastAppliedT.current=healT;
          appliedSig.current={ matchId:ls.match.matchId||null, inningsNum:ls.inn.inningsNum||1,
            balls:ls.inn.totalBalls||0, runs:ls.inn.totalRuns||0, wkts:ls.inn.wickets||0 };
          const healPayload=JSON.parse(JSON.stringify({
            match:ls.match, inn:ls.inn, inn1:ls.inn1, ib:ls.ib, mo:ls.mo,
            pinA:ls.match?.pinA||null, pinB:ls.match?.pinB||null,
            teamA:ls.match?.teamA||null, teamB:ls.match?.teamB||null,
            battingTeam:ls.inn?.battingTeam||null,
            writer:writerId.current, role:role==="admin"?"admin":"scorer", intent:"normal", t:healT
          }));
          lastPayloadRef.current=healPayload;
          try{localStorage.setItem("lcc_pending_write",JSON.stringify(healPayload));}catch(e){}
          DB.ref("live").set(healPayload).catch(()=>{});
        }
        return;
      }
      // ──────────────────────────────────────────────────────────────────────────────────────
      const normInn = {
        ...v.inn,
        overEvents: v.inn.overEvents||[],
        completedOvers: v.inn.completedOvers||[],
        battingOrder: v.inn.battingOrder||[],
        bowlingOrder: v.inn.bowlingOrder||[],
        batsmen: v.inn.batsmen||{},
        bowlers: v.inn.bowlers||{},
        extras: v.inn.extras||{wd:0,nb:0,b:0,lb:0},
      };
      setMatch(v.match);
      setInn(normInn);
      setInn1(v.inn1||null);
      // GUARD against a stale "match over" / "innings break" echo. If we deliberately cleared mo/ib in
      // the last 12 seconds (revert or undo) but this incoming snapshot STILL carries mo or ib set,
      // it's a late/stale echo (our own round-trip, or another device that hadn't yet seen the revert).
      // Applying it would snap us straight back to the completed/break screen — the reported bug. In
      // that window we force mo/ib to cleared. Genuine re-completions after the window pass normally.
      const recentlyCleared = (Date.now()-moClearedAt.current) < 12000;
      if(recentlyCleared && (v.mo||v.ib)){
        setIB(false);
        setMO(null);
      } else {
        setIB(!!v.ib);
        setMO(v.mo||null);
      }
      if(typeof v.t==="number") lastAppliedT.current=v.t;
      appliedSig.current=incomingSig;  // remember the progress we've now applied (for the regression guard)
      // potm is now on its own path — don't read from live node
      // scorer slots removed
      setLoaded(true);
    },err=>{ console.error("live listener error",err); setSyncErr(err.message||"Could not read live match"); setLoaded(true); });
    });
    // Hard safety net: never let the app sit on "Loading match…" forever. If the listener hasn't
    // reported back within 6s (auth stalled, permission denied, slow network, etc.), proceed anyway
    // so the start-match screen is reachable. A real live match will still stream in once it arrives.
    const loadFallback=setTimeout(()=>{ setLoaded(true); },6000);
    return ()=>{ cancelled=true; clearTimeout(loadFallback); if(cb) ref.off("value",cb); };
  },[isScorer]);

  // ── Standalone POTM listener — separate from live so sync never overwrites it ──
  React.useEffect(()=>{
    if(!FB_OK||!DB)return;
    const pRef=DB.ref("potm");
    const pCb=pRef.on("value",s=>setPotm(s.val()||null));
    return()=>pRef.off("value",pCb);
  },[]);

  // ── OFFLINE-TOLERANT SCORING ──────────────────────────────────────────────
  // Ground wifi/signal is often patchy. Scoring itself (record()/undo()) only ever touches LOCAL
  // React state, so it already keeps working perfectly while offline — nothing here changes that.
  // What was missing: if a write to Firebase failed (or never got a chance to fire because the device
  // was offline when the LAST ball was scored), that ball's data could sit unsynced with no visible
  // indication and no automatic retry once the connection came back. Two additions close that gap:
  //  1. Every attempted payload is mirrored to localStorage, so it survives even a tab reload.
  //  2. The moment the browser reports back online, the last payload is re-sent immediately, instead
  //     of waiting for the next ball to be scored (which might be minutes away, between overs).
  const[isOffline,setIsOffline]=React.useState(()=>{try{return !navigator.onLine;}catch(e){return false;}});
  const lastPayloadRef=React.useRef(null);
  React.useEffect(()=>{
    const goOffline=()=>setIsOffline(true);
    const goOnline=()=>{
      setIsOffline(false);
      // Re-send whatever we last tried to write — don't wait for the next ball.
      if(lastPayloadRef.current && FB_OK && DB){
        setSyncState("syncing");
        DB.ref("live").set(lastPayloadRef.current).then(()=>{setSyncErr(null);setSyncState("ok");}).catch(()=>{setSyncState("error");});
      }
    };
    window.addEventListener("online",goOnline);
    window.addEventListener("offline",goOffline);
    return ()=>{window.removeEventListener("online",goOnline);window.removeEventListener("offline",goOffline);};
  },[]);

  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!loaded)return;
    // SAFETY GUARD: never write a payload that has no actual match in it. Without a match+innings,
    // a JSON round-trip drops the undefined keys and we'd push {ib,writer,t} — an empty object that
    // OVERWRITES a live match via .set(). That is exactly how a whole match got wiped. If there's
    // nothing meaningful to sync, leave `live` untouched (clearing is done explicitly elsewhere).
    if(!match||!inn){return;}
    // Firebase rejects undefined — strip via JSON round-trip.
    // Monotonic timestamp: strictly greater than anything we've written or applied, so our
    // own write is never mistaken for stale, and remote readers can order writes correctly.
    const t=Math.max(Date.now(), lastWriteT.current+1, lastAppliedT.current+1);
    lastWriteT.current=t;
    lastAppliedT.current=t;
    // Tag every write with our role (admin/scorer — admins have priority in the regression guard)
    // and the intent of this change (normal forward scoring, or an undo/revert that is allowed to
    // move the score backward). Also record our own new progress so our regression guard is in sync.
    const myRole = role==="admin" ? "admin" : "scorer";
    const myIntent = writeIntent.current;
    writeIntent.current="normal"; // reset after consuming
    appliedSig.current={ matchId:match.matchId||null, inningsNum:inn.inningsNum||1,
      balls:inn.totalBalls||0, runs:inn.totalRuns||0, wkts:inn.wickets||0 };
    const payload=JSON.parse(JSON.stringify({match,inn,inn1,ib,mo,pinA:match?.pinA||null,pinB:match?.pinB||null,teamA:match?.teamA||null,teamB:match?.teamB||null,battingTeam:inn?.battingTeam||null,writer:writerId.current,role:myRole,intent:myIntent,t}));
    lastPayloadRef.current=payload;
    try{localStorage.setItem("lcc_pending_write",JSON.stringify(payload));}catch(e){}
    setSyncState("syncing");
    DB.ref("live").set(payload).then(()=>{
      if(syncErr)setSyncErr(null);
      setSyncState("ok");
      try{localStorage.removeItem("lcc_pending_write");}catch(e){}
    }).catch(e=>{console.error("sync failed",e);setSyncErr(e.message||"Write blocked — check Firebase rules");setSyncState("error");});
  },[match,inn,inn1,ib,mo,isScorer,loaded]);

  // ── AUTOMATIC PERIODIC BACKUP ─────────────────────────────────────────────────────────────────
  // Every ~20s while a match is live, snapshot the current match to a SEPARATE `backup` node, keyed
  // by matchId. This is a safety net: even a worst-case event on `live` (accidental wipe, bad write)
  // can be restored from the most recent snapshot. It is intentionally decoupled from `live` — nothing
  // that writes `live` can touch `backup`. Only an active scorer/admin device backs up (viewers don't),
  // and only when there's a real match in progress (not at match-over or innings break with no data).
  // A small rolling window (latest + previous) is kept so the node never grows unbounded.
  //
  // CRITICAL FIX: the timer must NOT be tied to [match,inn,inn1,ib,mo] in its effect dependencies.
  // `inn` is a new object on EVERY ball scored, so an effect depending on it would tear down and
  // restart its setTimeout from zero on every single ball — meaning the 20s countdown almost never
  // reached completion during active scoring (only during a real lull, like between overs). That's
  // why restores were pulling noticeably stale data. The fix: keep the latest state in a ref (updated
  // every render, which is cheap), and run a single setInterval that's created ONCE per match session
  // and just reads the ref each time it fires — so backups happen on a true, unbroken 20s cadence.
  const backupStateRef=React.useRef({match,inn,inn1,ib,mo});
  React.useEffect(()=>{ backupStateRef.current={match,inn,inn1,ib,mo}; }); // no deps: cheap, runs every render
  // The actual snapshot writer, extracted so BOTH the periodic timer AND the event-driven effect
  // (wicket / over-complete) can call it. Reads the freshest state from the ref every time.
  const backupWriterRef=React.useRef(null);
  backupWriterRef.current=()=>{
    if(!isScorer||!FB_OK||!DB) return;
    const {match,inn,inn1,ib,mo}=backupStateRef.current;
    const mid = match?.matchId;
    if(mid && inn && !mo){
      const now=Date.now();
      const snap=JSON.parse(JSON.stringify({
        match,inn,inn1:inn1||null,ib:!!ib,mo:mo||null,
        backedUpAt:now, by:writerId.current
      }));
      const base="backup/"+mid;
      DB.ref(base+"/latest").once("value").then(s=>{
        const cur=s.val();
        if(cur && cur.backedUpAt && cur.backedUpAt!==now){
          DB.ref(base+"/prev").set(cur).catch(()=>{});
        }
        DB.ref(base+"/latest").set(snap).catch(()=>{});
      }).catch(()=>{ DB.ref(base+"/latest").set(snap).catch(()=>{}); });
    }
  };
  // Periodic backup — a true, unbroken 8s cadence (tightened from 20s so a restore loses less), set up
  // once per session and never reset by scoring.
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!loaded) return;
    const interval=setInterval(()=>{ backupWriterRef.current&&backupWriterRef.current(); }, 8000);
    return ()=>{ clearInterval(interval); };
  },[isScorer,loaded]);
  // Event-driven backup — fire an IMMEDIATE snapshot right after the important, hard-to-recreate
  // moments (a wicket falling, an over completing). These are exactly the states you'd hate to lose,
  // so we capture them fresh instead of waiting for the next periodic tick.
  //
  // These moments ALSO write a durable CHECKPOINT — and checkpoints are what make restore actually
  // trustworthy after a corruption event. latest/prev roll every ~8s, so if `live` gets poisoned
  // (e.g. the two-devices regression that wiped a 2nd innings), the bad state overwrites BOTH rolling
  // slots within ~16 seconds and there is nothing clean left to restore — exactly what happened in
  // the real incident. Checkpoints fix this two ways: (1) each is keyed to a specific progress point
  // (innings + balls bowled), and (2) each is WRITE-ONCE via a transaction — the first device to
  // capture that progress point owns it forever; nothing that happens later, however corrupted, can
  // overwrite it. A rolling window of the last 12 is kept so the node stays bounded (a T20 innings
  // has 20 overs, so 12 checkpoints ≈ the last ~10 overs of play plus wickets — plenty of runway).
  const lastBackupKeyRef=React.useRef("");
  const CHECKPOINT_KEEP=12;
  const writeCheckpoint=()=>{
    if(!isScorer||!FB_OK||!DB) return;
    const {match,inn,inn1,ib,mo}=backupStateRef.current;
    const mid=match?.matchId;
    if(!mid||!inn||mo) return;
    const key="c_"+(inn.inningsNum||1)+"_"+(inn.totalBalls||0)+"_"+(inn.wickets||0);
    const snap=JSON.parse(JSON.stringify({
      match,inn,inn1:inn1||null,ib:!!ib,mo:mo||null,
      backedUpAt:Date.now(), by:writerId.current
    }));
    const cpRef=DB.ref("backup/"+mid+"/checkpoints/"+key);
    cpRef.transaction(cur=>{
      if(cur) return cur; // write-once: this progress point was already captured — never overwrite it
      return snap;
    }).then(()=>{
      // Prune beyond the rolling window — delete oldest by backedUpAt.
      DB.ref("backup/"+mid+"/checkpoints").once("value").then(s=>{
        const all=s.val()||{};
        const keys=Object.keys(all).sort((a,b)=>(all[a].backedUpAt||0)-(all[b].backedUpAt||0));
        while(keys.length>CHECKPOINT_KEEP){
          const oldest=keys.shift();
          DB.ref("backup/"+mid+"/checkpoints/"+oldest).remove().catch(()=>{});
        }
      }).catch(()=>{});
    }).catch(()=>{});
  };
  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!loaded||!inn||mo) return;
    const key=(inn.inningsNum||1)+":"+(inn.wickets||0)+":"+Math.floor((inn.totalBalls||0)/6);
    if(key!==lastBackupKeyRef.current){
      lastBackupKeyRef.current=key;
      // small delay so state has fully settled after the ball that caused the wicket/over-change
      const id=setTimeout(()=>{ backupWriterRef.current&&backupWriterRef.current(); writeCheckpoint(); },400);
      return ()=>clearTimeout(id);
    }
  },[inn,mo,isScorer,loaded]);
  // ──────────────────────────────────────────────────────────────────────────────────────────────

  React.useEffect(()=>{
    if(!isScorer||!FB_OK||!DB||!mo||saved||!inn)return;
    const matchId=match?.matchId;
    if(!matchId)return; // older matches without an id fall back below
    const histRef=DB.ref("history/"+matchId);
    // Idempotent save: write to the SAME key (history/{matchId}) on every device. A transaction
    // ensures only the FIRST writer creates the record; everyone else sees it already exists and
    // does nothing. This is what stops the 4× duplicate "won" entries when scorer + 2 admins are
    // all watching the same finished match.
    histRef.transaction(cur=>{
      if(cur) return cur; // already saved by another device — leave it untouched
      return JSON.parse(JSON.stringify({result:mo,inn1:inn1||null,inn2:inn,teamA:match?.teamA,teamB:match?.teamB,pubTeamA:match?.pubTeamA||null,pubTeamB:match?.pubTeamB||null,tossSummary:match?.tossSummary||null,venue:inn.venue,format:inn.format,overs:inn.overs,maxWkts:inn.maxWkts,potm:potm?.winner||null,potmVoting:{open:true,votes:{}},finishedAt:Date.now(),tournamentId:match?.tournamentId||null}));
    }).then(()=>{
      setSaved(true);
      DB.ref("potm").update({matchId}).catch(()=>{});
      // If this match was started from a tournament fixture, mark that fixture played and link it
      // to the finished match — this is what lets the Tournaments page show "✅ Played" and jump
      // straight to the scorecard instead of offering "Start This Match" again.
      if(match?.tournamentId&&match?.fixtureId){
        DB.ref(`tournaments/${match.tournamentId}/fixtures/${match.fixtureId}`).update({played:true,matchId}).catch(()=>{});
      }
    }).catch(e=>console.error("hist save failed",e));
  },[mo,saved,isScorer,inn,inn1,match]);

  const[toast,setToast]=React.useState(null);
  const toastTimerRef=React.useRef(null);

  if(isScorer&&FB_OK&&DB&&!loaded){
    // Skeleton loading — shimmering placeholders in the shape of the scoring page feel faster and
    // less jarring than a spinner while Firebase fetches the live match.
    return(
      <div className="screen"><div style={{width:"100%",maxWidth:420}}>
        <div className="skel" style={{height:64,marginBottom:12}}/>
        <div className="skel" style={{height:130,marginBottom:12}}/>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div className="skel" style={{height:46,flex:1}}/><div className="skel" style={{height:46,flex:1}}/><div className="skel" style={{height:46,flex:1}}/>
        </div>
        <div className="skel" style={{height:46,width:"65%"}}/>
        <p style={{color:"var(--text-mute)",fontSize:11,fontFamily:"'JetBrains Mono',monospace",marginTop:16,textAlign:"center"}}>Checking for a live match…</p>
      </div></div>
    );
  }

  // Abandon the CURRENT match and return the admin to a fresh Setup screen. Needed because once a
  // match is live there was no way to start a different one without playing the current one to its end.
  // CRITICAL: an in-progress match is normally only saved to History when it FINISHES — so simply
  // clearing it would lose all its scoring (the data-loss the user hit). To prevent that, we first
  // snapshot the current match (in whatever state it's in) into history_archive/ so it's always
  // recoverable, THEN clear the live slot. Finished matches already in History are untouched.
  const abandonMatch=()=>{
    if(!confirm("Start a new match? The current match will be saved (you can find it later) and the live screen cleared for everyone."))return;
    if(FB_OK&&DB&&match?.matchId&&inn){
      const archived=JSON.parse(JSON.stringify({
        result:mo||{winner:null,abandoned:true}, inn1:inn1||null, inn2:inn,
        teamA:match?.teamA, teamB:match?.teamB, tossSummary:match?.tossSummary||null,
        venue:inn.venue, format:inn.format, overs:inn.overs, maxWkts:inn.maxWkts,
        potm:potm?.winner||null, abandoned:!mo, savedAt:Date.now(), finishedAt:Date.now()
      }));
      // Use history_archive so an unfinished/abandoned game doesn't clutter the main History list of
      // completed matches, but is still permanently kept and recoverable.
      DB.ref("history_archive/"+match.matchId).set(archived).catch(()=>{});
    }
    setMatch(null);setInn(null);setInn1(null);setMO(null);setIB(false);setPreEnd(null);setPotm(null);
    setHist([]);setSecondInningsAuthed(false);
    if(FB_OK&&DB){
      DB.ref("live").remove().catch(()=>{});
      DB.ref("potm").remove().catch(()=>{});
      DB.ref("_preEnd").remove().catch(()=>{});
    }
  };

  const startMatch=({teamA,teamB,battingFirst,bowlingFirst,venue,format,overs,maxWkts,single,pinA,pinB,tossSummary,pubTeamA,pubTeamB,tournamentId,fixtureId})=>{
    setSaved(false);
    // Stable match ID created ONCE here and synced inside the match object to every device.
    // All scorers/admins then write the final result to history/{matchId} — the SAME key — so
    // the match is saved exactly once no matter how many people have the scorer open. Using
    // push() (random key per device) was what created the duplicate "won" entries.
    const matchId="m_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8);
    // NOTE: pubTeamA/pubTeamB (the playing-XI list Setup computes — from a manual assignment, an
    // imported published team, or a saved squad picker) were being silently dropped here: this
    // function's destructuring never named them, so they never made it into the stored match object
    // despite Setup sending them correctly. That meant every "who's playing today" selection was
    // discarded the moment a match started. Now captured properly, along with tournamentId/fixtureId
    // for matches started from a tournament fixture.
    setMatch({matchId,teamA,teamB,venue,format,overs,maxWkts,single,pinA,pinB,tossSummary,
      pubTeamA:pubTeamA||[],pubTeamB:pubTeamB||[],tournamentId:tournamentId||null,fixtureId:fixtureId||null});
    setHist([]);setInn1(null);
    // Shell innings — no players yet, batting team must enter openers
    setInn({battingTeam:battingFirst,bowlingTeam:bowlingFirst,inningsNum:1,
      venue,format,overs,maxWkts,single:!!single,
      awaitingOpeners:true,
      batsmen:{},battingOrder:[],
      bowlers:{},bowlingOrder:[],
      strikerName:null,nonStrikerName:null,bowlerName:null,
      totalRuns:0,totalBalls:0,wickets:0,overEvents:[],completedOvers:[],overBowlers:[],partnerships:[],partnership:0,partnershipBalls:0,
      extras:{wd:0,nb:0,b:0,lb:0},target:null});
  };

  // Called once the batting team's scorer enters opening striker/non-striker
  // and the bowling team's scorer (or admin) enters the opening bowler.
  const fixPlayers=({striker,nonStriker,bowler})=>setInn(p=>{
    const b={...p.batsmen};
    if(!b[striker]) b[striker]={...nb(striker,resolvePid(striker))};
    if(nonStriker&&!b[nonStriker]) b[nonStriker]={...nb(nonStriker,resolvePid(nonStriker))};
    b[striker]={...b[striker],onStrike:true};
    if(nonStriker) b[nonStriker]={...b[nonStriker],onStrike:false};
    const bwlrs={...p.bowlers};
    if(!bwlrs[bowler]) bwlrs[bowler]=nw(bowler,resolvePid(bowler));
    const battingOrder=p.battingOrder.includes(striker)?p.battingOrder:[...p.battingOrder,striker];
    const bo2=(nonStriker&&!battingOrder.includes(nonStriker))?[...battingOrder,nonStriker]:battingOrder;
    const bowlingOrder=p.bowlingOrder.includes(bowler)?p.bowlingOrder:[...p.bowlingOrder,bowler];
    return{...p,batsmen:b,bowlers:bwlrs,battingOrder:bo2,bowlingOrder,strikerName:striker,nonStrikerName:nonStriker,bowlerName:bowler};
  });

  const fillOpeners=({striker,nonStriker,bowler})=>{
    setInn(p=>{
      const single=p.single;
      const batsmen=single
        ?{[striker]:{...nb(striker,resolvePid(striker)),onStrike:true}}
        :{[striker]:{...nb(striker,resolvePid(striker)),onStrike:true},[nonStriker]:nb(nonStriker,resolvePid(nonStriker))};
      return{...p,awaitingOpeners:false,
        batsmen,battingOrder:single?[striker]:[striker,nonStriker],
        bowlers:{[bowler]:nw(bowler,resolvePid(bowler))},bowlingOrder:[bowler],
        strikerName:striker,nonStrikerName:single?null:nonStriker,bowlerName:bowler};
    });
  };

  const swap=(i)=>{
    const b={...i.batsmen};
    b[i.strikerName]={...b[i.strikerName],onStrike:false};
    b[i.nonStrikerName]={...b[i.nonStrikerName],onStrike:true};
    return{...i,batsmen:b,strikerName:i.nonStrikerName,nonStrikerName:i.strikerName};
  };

  const endInnings=(i)=>{
    // Always snapshot BEFORE ending (auto or manual) so super admin can revert a premature/wrong end.
    const snap={inn:JSON.parse(JSON.stringify(i)),inn1:inn1?JSON.parse(JSON.stringify(inn1)):null,ib,mo:null};
    setPreEnd(snap);
    if(FB_OK&&DB) DB.ref("_preEnd").set(JSON.parse(JSON.stringify(snap))).catch(()=>{});
    if(i.inningsNum===1){setInn1(JSON.parse(JSON.stringify(i)));setIB(true);return;}
    const t=i.target;
    if(i.totalRuns<t-1){setMO({winner:i.bowlingTeam,margin:`${t-1-i.totalRuns} run${t-1-i.totalRuns===1?"":"s"}`});if(FB_OK&&DB)DB.ref("potm").set({open:true,votes:{}}).catch(()=>{});}
    else if(i.totalRuns===t-1){setMO({winner:null});if(FB_OK&&DB)DB.ref("potm").set({open:true,votes:{}}).catch(()=>{});}
    else{setMO({winner:i.battingTeam,margin:`${i.maxWkts-i.wickets} wicket${i.maxWkts-i.wickets===1?"":"s"}`});if(FB_OK&&DB)DB.ref("potm").set({open:true,votes:{}}).catch(()=>{});}
  };

  // Snapshot before ending innings/match, so admin can revert
  const manualEndInnings=()=>{
    if(!inn)return;
    if(!confirm(inn.inningsNum===1?"End the 1st innings now?":"End the match now?"))return;
    // Save preEnd snapshot to Firebase so super admin can revert after refresh
    setPreEnd({inn:JSON.parse(JSON.stringify(inn)),inn1:inn1?JSON.parse(JSON.stringify(inn1)):null,ib,mo});
    if(FB_OK&&DB) DB.ref("_preEnd").set(JSON.parse(JSON.stringify({inn,inn1:inn1||null,ib:!!ib,mo:mo||null}))).catch(()=>{});
    endInnings(inn);
  };
  const applyRevert=(snap)=>{
    let revertedInn=snap.inn, revertedInn1=snap.inn1||null;
    // SINGLE-DEVICE re-completion bug: the preEnd snapshot is captured at the instant the innings/match
    // ended — i.e. AFTER the winning run was already on the board. So for a target chase that finished by
    // reaching the target, the reverted innings still has totalRuns >= target. Scoring any further ball
    // then instantly re-satisfies "target reached" and the match flips back to completed — an inescapable
    // loop of revert → score → completed. To break it, when we're reverting a match that ended by reaching
    // the target, roll back to the ball-history entry BEFORE the winning delivery (if we have it), so the
    // score returns to below the target and the win condition no longer fires. If no history is available,
    // fall back to clearing the target on the reverted innings so a manual re-end is still possible without
    // an automatic snap-back.
    const endedByChase = revertedInn && revertedInn.target!=null && (revertedInn.totalRuns||0) >= revertedInn.target;
    if(endedByChase){
      if(hist.length>0){
        const beforeWinning = JSON.parse(JSON.stringify(hist[hist.length-1]));
        if(beforeWinning && beforeWinning.inningsNum===revertedInn.inningsNum && (beforeWinning.totalRuns||0) < revertedInn.target){
          revertedInn = beforeWinning;
          // We've just "consumed" this entry — the reverted innings state now IS what this entry
          // described, so pop it off. Everything still under it in the stack remains valid (it
          // describes real prior balls of this same innings) and Undo keeps working normally from
          // here — it was a mistake to wipe the whole stack (see history of this function): hist
          // isn't invalidated by a normal revert, since nothing new gets scored between ending an
          // innings/match and reverting it back to live. Clearing it just broke Undo for no reason.
          updateHist(h=>h.slice(0,-1));
        } else {
          // No usable pre-winning ball in history — keep the target and score intact but mark this
          // innings so the auto-complete check skips ONCE. The scorer can then correct/rescore, and the
          // match will only re-complete when a genuinely new winning ball is scored.
          revertedInn = {...revertedInn, suppressAutoEnd:true};
        }
      } else {
        revertedInn = {...revertedInn, suppressAutoEnd:true};
      }
    }
    // Set state ONLY and let the normal sync effect do the actual `live` write — same proven fix as
    // restoreFromBackup above. This function PREVIOUSLY also did its own direct DB.ref("live").set()
    // write here, in addition to the state change triggering the sync effect's write — two competing
    // writes for the same revert. The direct write's payload was missing the `role`/`intent` tags that
    // the sync effect's write correctly includes, so this device's OWN regression guard would reject
    // the direct write's echo (looking like a stale device trying to move the score backward with no
    // justification), leaving `appliedSig` briefly out of step with what was actually reverted to.

      if(match?.matchId){

  // picker, newest first, so the admin can choose exactly which point to go back to. The picker is
  // what makes checkpoints useful: when the newest snapshots are poisoned (the exact failure mode of

  // NOTE: restoreChoices state is declared at the TOP of App with the other useState calls — NOT here

    // here — doing both caused two racing writes and left the scoring engine unable to add a bowler

    writeIntent.current="revert";

  const restoreFromBackup=()=>{

        label:`Inn ${snap.inn.inningsNum||1} · ${snap.inn.totalRuns||0}/${snap.inn.wickets||0} (${ovStr(snap.inn.totalBalls||0)} ov)`,
      };
    };

          const c=describeSnap(cp,"checkpoint"); if(c) out.push(c);

      out.sort((a,b2)=>(b2.when||0)-(a.when||0));

  // Super admin: change the match overs mid-match (e.g. set 22 → 25). Updates the live innings'

  const editOvers=(newOvers)=>{

    if(!inn){ return; }

    // otherwise the innings could be retroactively "completed" mid-over, or worse, mid-chase with
    // balls bowled exceeding the new overs*6 limit. This applies to BOTH innings, not just the 2nd.
    const bowledSoFar = Math.ceil((inn.totalBalls||0)/6);

      return;

    // same number of overs. You may only REDUCE it (e.g. rain/time), never raise it above what the

    setIB(prevIB=>{

  };

  const undo=()=>{
    if(!hist.length)return;

    // whole snapshot back in was silently discarding that edit every time Undo ran afterward — which is
    // exactly the "Undo stops behaving right after editing overs" bug. The overs limit is an explicit
    // admin correction, not part of any individual ball, so it must survive a ball-level undo.
    setInn({...prev,pending:null,overs:inn.overs});

    // the screen actually returns to live scoring instead of staying stuck showing "innings/match

      // so it may well have already happened before this Undo). If the ball being undone was the
      // winning/final ball, that saved record is now WRONG — archive it the same non-destructive way
      // Revert does (move to history_archive/, remove from the live history list) instead of leaving a
      // stale "completed" entry sitting in Match History after the match no longer shows as finished.
      setSaved(false);

  const showToast=(label)=>{

  };

  const record=(ev)=>{

    // of the scoring logic below regardless of how this ball gets processed.
    {

        : t==="WD" ? "Wide"
        : t==="NB" ? "No ball"
        : t==="B" ? "Bye"
        : t==="LB" ? "Leg bye"
        : t==="OT" ? "Overthrow"

      // (run worm, previous-over preview, scorecard builder) is untouched. This is only for the new
      // per-bowler spell breakdown (over-by-over figures like "1-0-4-1, 0-0-6-0").

  const confBatsman=(directName)=>{

    // persisted to the roster, and it was easy to miss since it's optional and easy to skip in the
    // middle of live scoring. That's exactly why players added during a match weren't showing up in
    // the roster for the NEXT match. Now any genuinely new name is saved automatically, silently, in
    // the background — the explicit button still exists for when you want to fill in role/keeper/etc
    // up front, but it's no longer the ONLY way to end up in the club.
    // CRICKET RULE: a batsman who is OUT is done for the innings — they can never bat again. A RETIRED

    const already=inn&&inn.batsmen&&inn.batsmen[nm];

    // of two separate players.
    if(inn){

      const otherEndName=enteringAtStrikerEnd?inn.nonStrikerName:inn.strikerName;
      if(otherEndName&&otherEndName.toLowerCase()===nm.toLowerCase()){

      }
    }

    // can't later be brought in as a batsman for the batting side too, even if no formal team list was
    // ever set up (the app infers "who's on which side" from who's actually batted/bowled so far, so
    // this protection works with or without the pre-match team picker).
    if(!already && inn && (inn.bowlingOrder||[]).some(n=>n.toLowerCase()===nm.toLowerCase())){

    }

      const b={...p.batsmen};

        b[nm]={...existing,onStrike:enteringAtStrikerEnd,retired:false};
      }else{
        b[nm]={...nb(nm,resolvePid(nm)),onStrike:enteringAtStrikerEnd};
      }
      const order=p.battingOrder.includes(nm)?p.battingOrder:[...p.battingOrder,nm];
      // If a new bowler was ALSO needed (wicket fell on the over's last ball), keep that prompt
      // showing after this one resolves — otherwise clear pending entirely.
      const nextPending = p.pending==="wicketAndBowler" ? "newBowler" : null;
      // The new batsman fills whichever end was actually vacated — for most dismissals that's always
      // the striker's end, but for a run-out it could be EITHER end, set by pendingOutEnd above.
      return enteringAtStrikerEnd
        ? {...p,batsmen:b,battingOrder:order,strikerName:nm,pending:nextPending,pendingOutEnd:null}
        : {...p,batsmen:b,battingOrder:order,nonStrikerName:nm,pending:nextPending,pendingOutEnd:null};
    });
    setNBN("");
  };
  const retire=()=>{
    // mark current striker as retired, prompt for next batsman
    pushHist(JSON.parse(JSON.stringify(inn)));
    setInn(p=>{const b={...p.batsmen};b[p.strikerName]={...b[p.strikerName],retired:true,onStrike:false};return{...p,batsmen:b,pending:"retire"};});
  };
  const confBowler=(directName)=>{
    const nm=(typeof directName==="string"?directName:nbwn).trim();if(!nm)return;
    if(inn&&nm===inn.bowlerName){alert("A bowler cannot bowl two overs in a row. Pick a different bowler.");return;}
    // A batsman currently at the crease can't bowl — they're on the batting side. Blocks the same
    // person being entered as both a batsman and the bowler.
    if(inn){
      const ln=nm.toLowerCase();
      if((inn.strikerName&&ln===inn.strikerName.toLowerCase())||(inn.nonStrikerName&&ln===inn.nonStrikerName.toLowerCase())){
        alert(`${nm} is currently batting and can't bowl this over. Pick a fielding-side player.`);
        return;
      }
      // TEAM-SIDE LOCK: anyone who has EVER batted in this innings (not just the current pair) is on
      // the batting side and can't later bowl, even if they were dismissed earlier and no formal team
      // list was set up. Inferred the same way as the batsman-side check above.
      if((inn.battingOrder||[]).some(n=>n.toLowerCase()===ln)){
        alert(`${nm} has already batted in this innings, for the batting side — they can't also bowl for the fielding side.`);
        return;
      }
    }
    // Same auto-save-to-roster fix as confBatsman above — see that comment for the full reasoning.
    const alreadyKnownBowler=(rosterNames||[]).some(n=>n.toLowerCase()===nm.toLowerCase());
    if(!alreadyKnownBowler&&FB_OK&&DB){
      const id="p_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
      DB.ref("roster/"+id).set({name:nm,role:"All-rounder",keeper:false,bat:"Right",bowl:null}).catch(()=>{});
    }
    setInn(p=>{const b={...p.bowlers};if(!b[nm])b[nm]=nw(nm,resolvePid(nm));return{...p,bowlers:b,bowlingOrder:p.bowlingOrder.includes(nm)?p.bowlingOrder:[...p.bowlingOrder,nm],bowlerName:nm,pending:null};});
    setNBWN("");
  };
  const start2=({striker,nonStriker,bowler})=>{
    setHist([]);
    setInn(p=>({battingTeam:p.bowlingTeam,bowlingTeam:p.battingTeam,inningsNum:2,
      venue:p.venue,format:p.format,overs:p.overs,maxWkts:p.maxWkts,single:p.single,
      batsmen:p.single?{[striker]:{...nb(striker,resolvePid(striker)),onStrike:true}}:{[striker]:{...nb(striker,resolvePid(striker)),onStrike:true},[nonStriker]:nb(nonStriker,resolvePid(nonStriker))},
      battingOrder:p.single?[striker]:[striker,nonStriker],

      totalRuns:0,totalBalls:0,wickets:0,overEvents:[],completedOvers:[],overBowlers:[],partnerships:[],partnership:0,partnershipBalls:0,

    return <Centered emoji="🔒" title="Signed out"

  }

  if(!match){
    if(role!=="admin"){
      return <Centered emoji="🏏" title="No active match yet" sub="Ask the admin to start a match first. This screen will update automatically once they do." onExit={onExit}/>;
    }

  }
  if(!inn)   return null;
  if(inn.awaitingOpeners) return<OpenersForm inn={inn} match={match} onSubmit={fillOpeners} role={role} onExit={onExit} rosterNames={rosterNames}/>;
  if(ib && !secondInningsAuthed){

    // (inn.bowlingTeam while we're still holding the completed 1st innings). They (or an admin) must
    // confirm to take over scoring — this is what gives Team B's PIN a real purpose, and makes an
    // admin re-confirm with a single deliberate action rather than silently carrying through.
    const newBattingTeam = inn?.bowlingTeam;   // becomes the batting team in innings 2
    const teamBPin = (newBattingTeam===match?.teamA) ? match?.pinA : match?.pinB;

    // re-confirm with a single tap rather than re-typing a PIN.

              {/* Controls moved to the top-right so they no longer occupy their own row. Fix Players

              <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                {/* Sync status — the scorer's confirmation that their last ball actually reached the

                {(role==="admin"||role==="scorer")&&(()=>{
                  const st=isOffline?"offline":syncState;

                    offline:{t:"⚡ offline",c:"#f87171",b:"rgba(239,68,68,.4)",bg:"rgba(239,68,68,.12)"},
                    error:{t:"⚠ not saved",c:"#f87171",b:"rgba(239,68,68,.4)",bg:"rgba(239,68,68,.12)"},
                    syncing:{t:"⟳ saving",c:"#fbbf24",b:"rgba(251,191,36,.4)",bg:"rgba(251,191,36,.1)"},
                    ok:{t:"✓ saved",c:"#34d399",b:"rgba(52,211,153,.4)",bg:"rgba(52,211,153,.1)"},
                    idle:null,

                  if(!cfg) return null;
                  return <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:700,
                    color:cfg.c,border:`1px solid ${cfg.b}`,background:cfg.bg,borderRadius:6,padding:"2px 6px",
                    whiteSpace:"nowrap",letterSpacing:".03em"}}>{cfg.t}</span>;

                {(role==="admin"||role==="scorer")&&<AdminActionsMenu
                  onHistory={role==="admin"?onHistory:null} onAnnounce={role==="admin"?onAnnounce:null}
                  inn={inn} onEditMatchSave={role==="admin"?(({overs,maxWkts})=>setInn(p=>({...p,overs,maxWkts}))):null}
                  match={match} role={role} rosterNames={rosterNames} onAbandonMatch={role==="admin"?abandonMatch:null}
                  hiCon={hiCon} setHiCon={setHiCon} bigText={bigText} setBigText={setBigText}

                  onUpdateTeams={(pubTeamA,pubTeamB)=>{
                    setMatch(m=>m?({...m,pubTeamA,pubTeamB}):m);
                    // Persist any brand-new names added via the team editor to the club roster too, so
                    // late-arrival players assigned here also become permanent club members (consistent

                    if(FB_OK&&DB){
                      const known=new Set((rosterNames||[]).map(n=>n.toLowerCase()));
                      [...pubTeamA,...pubTeamB].forEach(nm=>{

                          known.add(nm.toLowerCase());
                          const id="p_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
                          DB.ref("roster/"+id).set({name:nm,role:"All-rounder",keeper:false,bat:"Right",bowl:null}).catch(()=>{});
                        }
                      });

                  }}
                />}
                {onExit&&<button onClick={onExit} style={{background:"none",border:"none",color:"#9aa8bf",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap"}}>← home</button>}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",gap:8,flexWrap:"wrap",minWidth:0,marginTop:"auto"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:8,minWidth:0}}>
                <span key={inn.totalRuns+"-"+inn.wickets} className={`score-big score-pulse${flash?" flash":""}`}>{inn.totalRuns}<span className="score-wkt">/{inn.wickets}</span></span>
                <span style={{color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>({ovStr(inn.totalBalls)} ov)</span>
              </div>
              {/* Compact stat chips on the score line — CRR always; Proj only in the 1st innings
                  (extrapolated final at the current rate, the standard broadcast stat). */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#bcc7d8",
                  background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",
                  borderRadius:9,padding:"4px 9px",whiteSpace:"nowrap"}}>CRR <span style={{color:"#fbbf24",fontWeight:700}}>{crr}</span></span>
                {!inn.target&&inn.totalBalls>0&&inn.overs>0&&
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#a5b4fc",
                    background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.3)",
                    borderRadius:9,padding:"4px 9px",whiteSpace:"nowrap"}}>Proj <span style={{color:"#fff",fontWeight:700}}>{Math.round(parseFloat(crr)*inn.overs)}</span></span>}
              </div>
            </div>
            {/* CURRENT PARTNERSHIP — the run-up between the two batsmen at the crease right now. Shown
                only when there IS a partnership to speak of: two-batsman mode with both ends occupied.
                Hidden during single-batsman innings (no partnership concept there) and while a new
                batsman is still being selected after a wicket (inn.nonStrikerName briefly absent). */}
            {/* Current partnership — compact blue bar with inline label, identical to the viewer
                header so scorer/admin see the same treatment. */}
            <CurrentPartnershipBar inn={inn} compact labelled/>
            {/* Write-FAILED banner — distinct from the offline banner above (which covers "no network").
                This one fires when we ARE online but the server rejected/failed the write, which the
                offline banner wouldn't catch. Red and urgent: a failed save while apparently connected
                is the sneakiest data-loss case, so the scorer should see it and stop. */}
            {(role==="admin"||role==="scorer")&&!isOffline&&syncState==="error"&&(
              <div style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.5)",
                borderRadius:10,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>⚠️</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#fca5a5",lineHeight:1.4}}>
                  Last ball didn't save to the server. It will retry automatically — if this stays, check your connection before scoring more.
                </span>
              </div>
            )}
          </div>
          {/* CHASE STRIP — full-width match equation during the 2nd innings, with a progress bar
              that actually has room to breathe (the old narrow side panel cramped all of this). */}
          {inn.target&&(()=>{
            const ahead=parseFloat(crr)>=parseFloat(rrr||crr);
            return(
              <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",
                borderRadius:12,padding:"9px 12px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"nowrap"}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#818cf8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",minWidth:0}}>
                    Target <span style={{color:"#fff",fontWeight:700}}>{inn.target}</span> · Need <span style={{color:"#fff",fontWeight:700}}>{Math.max(req,0)}</span> off <span style={{color:"#fff",fontWeight:700}}>{bLeft}</span>b
                  </span>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,whiteSpace:"nowrap",flexShrink:0,
                    color:rrr&&parseFloat(rrr)>12?"#f87171":"#bcc7d8"}}>
                    {rrr&&<>RRR <span style={{fontWeight:700,color:parseFloat(rrr)>12?"#f87171":"#fff"}}>{rrr}</span> · </>}
                    <span style={{fontWeight:700,color:ahead?"#34d399":"#f87171"}}>{ahead?"▲ ON TRACK":"▼ BEHIND"}</span>
                  </span>
                </div>
              </div>
            );
          })()}
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs">
        {[["score","🏏 Live"],["batting","🟡 Batting"],["bowling","🎯 Bowling"]].map(([id,lbl])=>(
          <button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>

      <div className="content">
        {tab==="score"&&<ScoreTab inn={inn} SK={SK} NS={NS} BW={BW} record={record} rosterNames={rosterNames}
          match={match}
          pw={pw} nbn={nbn} setNBN={setNBN} confBatsman={confBatsman}
          nnb={nnb} nbwn={nbwn} setNBWN={setNBWN} confBowler={confBowler}
          pr={pr} onRetire={retire}
          onSwapStrike={()=>setInn(p=>(!p.single&&p.nonStrikerName)?swap(p):p)}

          onUndo={undo} canUndo={hist.length>0}
