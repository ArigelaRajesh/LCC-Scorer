// ════════════════════════════════════════════════════════════════════
//  ROOT — role landing, PIN gates, live viewer, history
// ════════════════════════════════════════════════════════════════════
// TEAM MILESTONE CELEBRATION — full-screen (non-blocking) confetti + banner when the batting team's
// total crosses each 50 (50/100/150/200…). Shown to BOTH the scorer and live viewers. Details:
// - pointerEvents:none on everything, so it can NEVER block a scoring tap mid-celebration.
// - Tracks Math.floor(runs/50); celebrates only when the floor INCREASES. On mount it just baselines
//   (no celebration for opening the app mid-innings at 120). resetKey (matchId+innings) rebaselines
//   silently on a new innings/match. If runs go DOWN (undo/revert), the baseline follows silently so
//   re-crossing after a correction celebrates again correctly.
// - Confetti positions/delays are a FIXED table (no randomness in render) so re-renders are stable.
const MILESTONE_CONFETTI=[
  {l:6,d:0,e:"🎉"},{l:14,d:.25,e:"✨"},{l:22,d:.1,e:"🎊"},{l:30,d:.4,e:"⭐"},{l:38,d:.05,e:"🎉"},
  {l:46,d:.3,e:"✨"},{l:54,d:.15,e:"🎊"},{l:62,d:.45,e:"🎉"},{l:70,d:.2,e:"⭐"},{l:78,d:.35,e:"✨"},
  {l:86,d:.08,e:"🎊"},{l:94,d:.28,e:"🎉"}
];
// A lightweight, BRIEF celebration for every four/six/wicket — deliberately not the same as
// MilestoneCelebration (that one's a bigger, rarer moment: 50s/100s/partnerships/hat-tricks). This
// fires on nearly every over, so it needs to be quick (~1.1s) and get out of the way, not demand
// attention the way a 100 does. Portaled to <body> for the same reason Modal/MilestoneCelebration
// are — this sits inside .score-header, which has backdrop-filter and becomes a containing block for
// any non-portaled fixed-position descendant.
// A single CSS firework — bright core flash plus 20–30 glowing spark streaks flying radially
// outward from (x,y). Positions are % of the viewport (the parent is a fixed inset:0 overlay).
// Pure CSS animation (transform + opacity), no canvas/rAF, so several at once stay cheap even on
// an older phone mid-match.
function Firework({x,y,delay=0,colors,count=26,dist=110}){
  const sparks=React.useMemo(()=>{
    const cs=colors||["#fde68a","#fbbf24","#fb923c","#f472b6","#a78bfa","#60a5fa","#34d399","#fff"];
    return Array.from({length:count},(_,i)=>{
      const a=(i/count)*Math.PI*2+Math.random()*0.4;
      const d=dist*(0.55+Math.random()*0.55);
      return {
        id:i,
        dx:Math.round(Math.cos(a)*d),
        dy:Math.round(Math.sin(a)*d),
        c:cs[i%cs.length],
        delay:(delay+Math.random()*0.08).toFixed(2),
        dur:(0.9+Math.random()*0.5).toFixed(2),
        w:Math.random()>0.5?3:2,
        h:7+Math.round(Math.random()*6),
      };
    });
  },[]);
  return(
    <div style={{position:"absolute",left:x,top:y,pointerEvents:"none"}}>
      <div style={{position:"absolute",left:-14,top:-14,width:28,height:28,borderRadius:"50%",
        background:"radial-gradient(circle,#fff,rgba(255,225,160,.55) 45%,transparent 72%)",
        animation:`fwFlash .55s ease-out ${delay}s both`}}/>
      {sparks.map(s=>(
        <div key={s.id} style={{position:"absolute",left:0,top:0,width:s.w,height:s.h,borderRadius:2,
          background:s.c,boxShadow:`0 0 6px ${s.c},0 0 14px ${s.c}88`,
          animation:`fwSpark ${s.dur}s cubic-bezier(.12,.65,.35,1) ${s.delay}s both`,
          "--dx":s.dx+"px","--dy":s.dy+"px"}}/>
      ))}
    </div>
  );
}

// Confetti spray from a bottom corner (FOUR) — golden pieces launch up and inward, tumble and fade.
function CornerSpray({side,count=16}){
  const pieces=React.useMemo(()=>{
    const cs=["#fde68a","#fbbf24","#f59e0b","#fff7d6"];
    return Array.from({length:count},(_,i)=>({
      id:i,
      dx:Math.round((50+Math.random()*180)*(side==="left"?1:-1)),
      dy:-Math.round(140+Math.random()*220),
      rot:Math.round(Math.random()*680-340),
      delay:(Math.random()*0.16).toFixed(2),
      size:5+Math.round(Math.random()*5),
      c:cs[i%cs.length],
      tall:Math.random()>0.4,
    }));
  },[]);
  return(
    <div style={{position:"absolute",bottom:"14%",[side==="left"?"left":"right"]:"6%",pointerEvents:"none"}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:"absolute",left:0,top:0,
          width:p.tall?p.size*0.6:p.size,height:p.tall?p.size*1.8:p.size,
          background:p.c,borderRadius:p.tall?1:"50%",boxShadow:`0 0 5px ${p.c}66`,
          animation:`confettiSpray 1.25s cubic-bezier(.15,.6,.4,1) ${p.delay}s both`,
          "--dx":p.dx+"px","--dy":p.dy+"px","--rot":p.rot+"deg"}}/>
      ))}
    </div>
  );
}

// The most recent delivery event in this innings (current over, or the last completed over if the
// current one just rolled over). Used by BallFlash to tell a no-ball / duck apart from a plain ball.
function lastBallEvent(inn){
  if(!inn) return null;
  const oe=(inn.overEvents&&inn.overEvents.length)?inn.overEvents:((inn.completedOvers||[]).slice(-1)[0]||[]);
  return oe[oe.length-1]||null;
}
function BallFlash({inn,soundOn}){
  const prevRef=React.useRef(null);
  const[flash,setFlash]=React.useState(null);
  // Monotonic count of delivery events this innings (every ball, wide, no-ball and wicket appends
  // one). This is the trigger: it changes on EVERY delivery — including a no-ball or a dot — which a
  // pure runs/wickets diff would miss, and it lets us look at the actual last event to classify it.
  const evc=inn?((inn.completedOvers||[]).reduce((a,o)=>a+((o&&o.length)||0),0)+((inn.overEvents||[]).length)):0;
  React.useEffect(()=>{
    if(!inn){prevRef.current=null;return;}
    const outSet=new Set(Object.entries(inn.batsmen||{}).filter(([,b])=>b&&b.out).map(([n])=>n));
    const cur={mid:inn.matchId||null,innNum:inn.inningsNum||1,runs:inn.totalRuns||0,wkts:inn.wickets||0,evc,outSet};
    const prev=prevRef.current;
    prevRef.current=cur;
    if(!prev) return;
    if(prev.mid!==cur.mid||prev.innNum!==cur.innNum) return; // new match/innings — not a "next ball"
    if(cur.evc<=prev.evc) return; // no new delivery (e.g. an undo/correction) — stay silent
    const ev=lastBallEvent(inn);
    const dr=cur.runs-prev.runs, dw=cur.wkts-prev.wkts;
    let f=null;
    if(dw>0||(ev&&ev.type==="W")){
      // Which batsman just fell? The one now out who wasn't out on the previous snapshot.
      let newOut=null;
      for(const n of cur.outSet){ if(!prev.outSet.has(n)){ newOut=n; break; } }
      const b=newOut?inn.batsmen[newOut]:null;
      const isDuck=!!b&&(b.runs||0)===0;                 // out for zero
      const isGolden=isDuck&&(b.balls||0)===1;            // out for zero, first ball faced
      if(isGolden){ f={type:"golden",label:"GOLDEN DUCK!",emoji:"🦆",sub:"OUT FIRST BALL",color:"#f59e0b",dur:1900}; if(soundOn){try{playDuckSound(true);}catch(e){}} }
      else if(isDuck){ f={type:"duck",label:"DUCK!",emoji:"🦆",sub:"OUT FOR A DUCK",color:"#f87171",dur:1700}; if(soundOn){try{playDuckSound(false);}catch(e){}} }
      else { f={type:"wicket",label:"OUT!",color:"#f87171",dur:900}; if(soundOn){try{playWicketSound();}catch(e){}} }
    }
    // No ball → free hit: siren so the scorer can call it to their side, plus a bold banner.
    else if(ev&&ev.type==="NB"){ f={type:"noball",label:"NO BALL",sub:"FREE HIT",color:"#fb923c",dur:1800}; if(soundOn){try{playSiren();}catch(e){}} }
    else if(dr>=6){ f={type:"six",label:"SIX!",color:"#34d399",dur:1600}; if(soundOn){try{playCrowdCheer(true);}catch(e){}} }
    else if(dr>=4){ f={type:"four",label:"FOUR!",color:"#fbbf24",dur:1450}; if(soundOn){try{playCrowdCheer(false);}catch(e){}} }
    if(f) setFlash({...f,id:Date.now()});
  },[evc,inn&&inn.inningsNum,inn&&inn.matchId]);
  React.useEffect(()=>{
    if(!flash)return;
    const t=setTimeout(()=>setFlash(null),flash.dur||1100);
    return ()=>clearTimeout(t);
  },[flash&&flash.id]);
  if(!flash||typeof document==="undefined") return null;
  const dur=(flash.dur||1100)/1000;
  const isOut=flash.type==="wicket"||flash.type==="duck"||flash.type==="golden";
  // Gradient word colours per event.
  const grad=flash.type==="six"?"linear-gradient(180deg,#d1fae5,#34d399 55%,#0d9488)"
    :flash.type==="four"?"linear-gradient(180deg,#fff7d6,#fbbf24 55%,#d97706)"
    :flash.type==="golden"?"linear-gradient(180deg,#fff7d6,#fbbf24 55%,#b45309)"
    :flash.type==="noball"?"linear-gradient(180deg,#ffedd5,#fb923c 55%,#c2410c)"
    :"linear-gradient(180deg,#fecaca,#f87171 55%,#dc2626)";
  const wordSize=flash.type==="six"?64:flash.type==="four"?60:flash.type==="golden"?38:flash.type==="noball"?54:52;
  return ReactDOM.createPortal(
    <div key={flash.id} style={{position:"fixed",inset:0,zIndex:250,pointerEvents:"none",overflow:"hidden"}}>
      {/* Soft coloured glow hugging the screen edges — sells the moment without covering content. */}
      <div style={{position:"absolute",inset:0,animation:`edgeGlowPulse ${dur}s ease-out both`,
        boxShadow:`inset 0 0 90px 16px ${flash.color}55`}}/>
      {flash.type==="six"&&<>
        <Firework x="24%" y="24%" delay={0}/>
        <Firework x="76%" y="18%" delay={0.18}/>
        <Firework x="50%" y="36%" delay={0.34} dist={95}/>
      </>}
      {flash.type==="four"&&<>
        <CornerSpray side="left"/>
        <CornerSpray side="right"/>
        <Firework x="50%" y="22%" delay={0.05} dist={80} count={20}
          colors={["#fde68a","#fbbf24","#f59e0b","#fff"]}/>
      </>}
      {flash.type==="noball"?(
        // NO BALL / free-hit alert — a clean SOLID banner pinned near the very top so it never
        // overlaps the batting card the way the big transparent word did. Slides down, holds, lifts.
        <div style={{position:"absolute",top:"3.5%",left:"50%",transform:"translateX(-50%)",
          animation:`nbBanner ${dur}s cubic-bezier(.2,1,.35,1) both`,textAlign:"center",maxWidth:"92%"}}>
          <div style={{background:"linear-gradient(135deg,#fbbf24,#f59e0b,#ea580c)",borderRadius:16,
            padding:"10px 22px",boxShadow:"0 10px 34px rgba(234,88,12,.5),0 0 0 3px rgba(251,191,36,.25)"}}>
            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:30,fontWeight:800,fontStyle:"italic",
              color:"#1a1204",letterSpacing:".02em",lineHeight:1}}>🟡 NO BALL</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,marginTop:4,
              letterSpacing:".28em",color:"#3b1d00"}}>FREE HIT — RUN OUT ONLY</div>
          </div>
        </div>
      ):(
        <div style={{position:"absolute",top:isOut?"15%":"12%",left:"50%",
          animation:`bigWordIn ${dur}s cubic-bezier(.2,1,.35,1) both`,textAlign:"center"}}>
          {/* Emoji sits OUTSIDE the gradient-clipped word — a gradient text-clip turns an emoji
              transparent on iOS Safari, so the 🦆 has to be its own element. */}
          {flash.emoji&&<div style={{fontSize:56,lineHeight:1,marginBottom:2,
            animation:"duckWaddle .5s ease-in-out infinite"}}>{flash.emoji}</div>}
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:wordSize,fontWeight:800,
            fontStyle:"italic",letterSpacing:".04em",lineHeight:1,display:"inline-block",
            background:grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
            filter:`drop-shadow(0 4px 18px ${flash.color}aa) drop-shadow(0 1px 2px rgba(0,0,0,.7))`,
            animation:isOut?"ballFlashShake .4s ease-in-out .05s 2":"none"}}>
            {flash.label}
          </div>
          {flash.sub&&<div style={{marginTop:5,fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,
            letterSpacing:".22em",color:flash.color,textTransform:"uppercase",
            textShadow:`0 0 12px ${flash.color}88, 0 1px 2px rgba(0,0,0,.8)`}}>{flash.sub}</div>}
        </div>
      )}
    </div>,
    document.body
  );
}

function MilestoneCelebration({inn,resetKey,playSound}){
  const[queue,setQueue]=React.useState([]);   // celebrations waiting to show, shown one at a time
  const[show,setShow]=React.useState(null);
  // Per-type "last celebrated level" refs so each achievement only fires once when it's first reached.
  // bat = fifties/centuries track (÷50); bat30 = the separate 30-run club milestone track (see below).
  const seen=React.useRef({team:null,bat:{},bat30:{},part:null,hat:{},figs:{}});
  const keyRef=React.useRef(resetKey);
  const baselined=React.useRef(false);

  React.useEffect(()=>{
    if(!inn){ return; }
    const fresh=()=>({team:null,bat:{},bat30:{},part:null,hat:{},figs:{}});
    // On a new innings/match, or first mount, BASELINE silently: record current levels so we don't
    // fire a burst of celebrations for a match opened mid-way. Only future crossings celebrate.
    if(keyRef.current!==resetKey || !baselined.current){
      keyRef.current=resetKey; baselined.current=true;
      const s=fresh();
      s.team=Math.floor((inn.totalRuns||0)/50);
      s.part=Math.floor((inn.partnership||0)/50);
      Object.entries(inn.batsmen||{}).forEach(([n,b])=>{ s.bat[n]=Math.floor((b.runs||0)/50); s.bat30[n]=(b.runs||0)>=30; });
      Object.entries(inn.bowlers||{}).forEach(([n,bw])=>{ s.hat[n]=bw.streak||0; s.figs[n]=bw.wickets||0; });
      seen.current=s;
      return;
    }
    const found=[];
    const S=seen.current;
    // 1) TEAM total 50/100/150…
    const tf=Math.floor((inn.totalRuns||0)/50);
    if(S.team===null)S.team=tf;
    else if(tf>S.team&&inn.totalRuns>0){found.push({kind:"team",title:`${tf*50} UP!`,sub:inn.battingTeam,color:"#fbbf24"});}
    if(tf<S.team)S.team=tf; else S.team=Math.max(S.team,tf);
    // 2) INDIVIDUAL batsman 50/100…
    Object.entries(inn.batsmen||{}).forEach(([n,b])=>{
      const f=Math.floor((b.runs||0)/50);
      if(S.bat[n]===undefined){S.bat[n]=f;return;}
      if(f>S.bat[n]&&b.runs>0){const label=f*50; found.push({kind:"bat",title:`${label===100?"CENTURY":label===50?"FIFTY":label}! `,sub:`${n} — ${b.runs}`,color:"#34d399",emoji:label>=100?"💯":"🏏"});}
      S.bat[n]=f;
    });
    // 2b) INDIVIDUAL batsman 30 — a genuine milestone in short club games. Separate one-shot track so
    // it never interferes with the fifty/century logic above. Suppressed if they've already reached 50
    // (S.bat[n]>=1), so a batsman who jumps from 29 to a fifty in one update sees only the FIFTY.
    Object.entries(inn.batsmen||{}).forEach(([n,b])=>{
      const hit=(b.runs||0)>=30;
      if(S.bat30[n]===undefined){S.bat30[n]=hit;return;}
      if(hit&&!S.bat30[n]&&(b.runs||0)<50&&(S.bat[n]||0)<1){ found.push({kind:"bat30",title:"30 UP! ",sub:`${n} — ${b.runs}`,color:"#38bdf8",emoji:"👏"}); }
      S.bat30[n]=hit;
    });
    // 3) PARTNERSHIP 50/100… — meaningless in single-batsman format (no second batsman to partner
    // with), which is exactly what was producing "RAJESH ARIGELA & undefined".
    const pf=Math.floor((inn.partnership||0)/50);
    if(S.part===null)S.part=pf;
    else if(!inn.single&&pf>S.part&&inn.partnership>0&&inn.nonStrikerName){found.push({kind:"part",title:`${pf*50} PARTNERSHIP!`,sub:`${inn.strikerName} & ${inn.nonStrikerName}`,color:"#60a5fa",emoji:"🤝"});}
    S.part=pf;
    // 4) BOWLER hat-trick (3+ in a row) and good figures (3, 4, 5-wicket hauls)
    Object.entries(inn.bowlers||{}).forEach(([n,bw])=>{
      const streak=bw.streak||0, wk=bw.wickets||0;
      if(S.hat[n]===undefined)S.hat[n]=streak; 
      else{
        if(streak>=3&&streak>S.hat[n]){found.push({kind:"hat",title:streak===3?"HAT-TRICK!":`${streak} IN A ROW!`,sub:`${n} 🔥`,color:"#f87171",emoji:"🎯"});}
        S.hat[n]=streak;
      }
      if(S.figs[n]===undefined)S.figs[n]=wk;
      else{
        // celebrate crossing into 3, 4, 5+ wickets (a good spell). 5+ = "five-for".
        [3,4,5].forEach(m=>{ if(wk>=m&&S.figs[n]<m){ found.push({kind:"figs",title:m>=5?"FIVE-FOR! 🌟":`${wk} WICKETS!`,sub:`${n} — ${wk}/${bw.runs}`,color:"#a78bfa",emoji:"⚡"}); } });
        S.figs[n]=wk;
      }
    });
    if(found.length){ setQueue(q=>[...q,...found]); }
  },[inn,resetKey]);

  // Show queued celebrations one at a time (so two at once don't overlap on screen). This effect
  // ONLY pops the queue and sets `show` — the dismiss timer lives in its own effect below. Keeping
  // them separate matters: if the timeout were set here, changing `show` (a dependency) would make
  // React tear down and re-run this effect on the very next render, clearing the timeout it had just
  // scheduled before it ever had a chance to fire — which is exactly why celebrations were getting
  // stuck on screen instead of disappearing after a few seconds.
  React.useEffect(()=>{
    if(show||queue.length===0)return;
    const next=queue[0];
    setQueue(q=>q.slice(1));
    setShow(next);
    if(playSound){
      try{
        // Pick a sound that fits the milestone rather than one generic cheer for everything (which
        // made a century sound identical to a 30). The three functions below were built for exactly
        // this: a triumphant fanfare for a batter's fifty/century (century = the bigger variant),
        // a dramatic swell for bowling glory (hat-trick / five-for), and a lighter "ding-ding"
        // achievement sting for the smaller landmarks (30 up, team 50, partnership).
        const k=next.kind;
        if(k==="bat"){ playFanfare(/💯/.test(next.emoji||"")||/CENTURY/.test(next.title||"")); }
        else if(k==="hat"||k==="figs"){ playBowlerGlory(); }
        else { playAchievement(); } // bat30, team, part
      }catch(e){}
    }
  },[queue,show,playSound]);

  // Auto-dismiss whatever's currently showing. Depends only on `show`, so this timer is scheduled
  // exactly once per celebration and fires cleanly.
  React.useEffect(()=>{
    if(!show)return;
    const t=setTimeout(()=>setShow(null),3600);
    return ()=>clearTimeout(t);
  },[show]);

  if(!show) return null;
  // Portalled to <body> — this component is mounted inside .score-header, which has
  // backdrop-filter:blur(...) for its sticky-glass look. Any ancestor with a filter/backdrop-filter
  // becomes the containing block for position:fixed descendants, so without the portal this
  // "full-screen" celebration overlay was actually being clipped to the small header's own bounding
  // box instead of covering the real viewport.
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:900,pointerEvents:"none",overflow:"hidden"}}>
      {MILESTONE_CONFETTI.map((cf,i)=>(
        <span key={i} style={{position:"absolute",top:0,left:cf.l+"%",fontSize:22,
          animation:`confettiFall 2.6s ease-in ${cf.d}s both`}}>{cf.e}</span>
      ))}
      <div style={{position:"absolute",top:"24%",left:0,right:0,display:"flex",justifyContent:"center",padding:"0 16px"}}>
        <div style={{animation:"milestoneIn .5s cubic-bezier(.22,1,.36,1) both",textAlign:"center",
          background:"rgba(8,12,32,.85)",border:`2px solid ${show.color}`,borderRadius:18,padding:"14px 26px",
          boxShadow:`0 0 34px ${show.color}70`,maxWidth:"90%"}}>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:34,fontWeight:700,fontStyle:"italic",color:show.color,letterSpacing:1.5,lineHeight:1.05}}>
            {show.emoji?show.emoji+" ":""}{show.title}
          </div>
          {show.sub&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#e5e7eb",marginTop:7,letterSpacing:".12em",textTransform:"uppercase"}}>{show.sub}</div>}
        </div>
      </div>
    </div>,
    document.body
  );
}

// Viewer "Teams" tab — shows both squads. Reads straight from match.pubTeamA/pubTeamB, which arrive
// on the SAME live snapshot the viewer already streams, so any admin edit (add/swap/remove) shows up
// here automatically with no extra wiring. If teams weren't assigned for this match, it says so
// rather than showing an empty box. Players currently at the crease / bowling are marked live.
// Tiny initials avatar — colored circle with a player's initials (e.g. "RG"), so name lists scan at
// a glance. Deterministic color from the accent passed in (team color).
function Avatar({name,color,size}){
  const s=size||20;
  const parts=(name||"").trim().split(/\s+/);
  const init=((parts[0]||"")[0]||"")+((parts[1]||"")[0]||"");
  return(
    <span style={{width:s,height:s,borderRadius:"50%",flexShrink:0,display:"inline-flex",alignItems:"center",justifyContent:"center",
      background:`${color}22`,border:`1.5px solid ${color}66`,color,fontSize:s*0.42,fontWeight:700,
      fontFamily:"'Inter',sans-serif",textTransform:"uppercase",letterSpacing:".02em"}}>{init||"?"}</span>
  );
}


// Run "worm" — cumulative runs at the end of each over, as a compact SVG line. Wicket overs get a red
// dot. When it's the 2nd innings and the 1st is available, the 1st innings worm shows dimmed behind
// for the classic chase comparison. Pure render from completedOvers — no state, cheap.
// One-line commentary for the most recent delivery — "SIX! Rajesh 42(28)" — derived purely from the
// last event in the live data. Keyed by ball count so it animates in on every new delivery.
function describeBall(ev,inn){
  if(!ev) return null;
  // MUST use evRuns() here, not a hand-rolled (ev.runs||0)+(ev.batRuns||0)+... sum — plain bat-off
  // runs (tapping 0–6) are stored as just {type:"6"} with NO separate runs field, so that old formula
  // always evaluated to 0 for ordinary balls and every four/six/single/dot was mislabeled "Dot ball"
  // here regardless of what actually happened (the live header desyncing from the actual last ball).
  // See the comment on evRuns() for the same bug class fixed at its other call sites.
  const r=evRuns(ev);
  let head;
  if(ev.type==="W") head="WICKET!";
  else if(ev.type==="WD") head="Wide"+((ev.extraRuns||1)>1?" +"+((ev.extraRuns||1)-1):"");
  else if(ev.type==="NB") head="No ball!"+(r>0?" "+r+" run"+(r===1?"":"s"):"");
  else if(ev.type==="B") head="Bye"+(r>0?" "+r+" run"+(r===1?"":"s"):"");
  else if(ev.type==="LB") head="Leg bye"+(r>0?" "+r+" run"+(r===1?"":"s"):"");
  else if(r>=6) head="SIX!";
  else if(r>=4) head="FOUR!";
  else if(r===0) head="Dot ball";
  else head=r+" run"+(r===1?"":"s");
  const sk=inn&&inn.batsmen&&inn.batsmen[inn.strikerName];
  const who=sk?` · ${inn.strikerName} ${sk.runs}(${sk.balls})`:"";
  return head+who;
}

// Partnership breakdown — "who actually built this innings." A simple bar per stand, in order, sized
// by its share of the total — distinct from the run worm (which tracks progress over TIME, not who
// was batting). Includes the live in-progress stand as a final, still-growing bar.
function PartnershipChart({inn}){
  const done=(inn.partnerships||[]).filter(p=>p&&p.pair&&p.pair[0]&&p.pair[1]);
  const live=(inn.strikerName&&inn.nonStrikerName&&!inn.single)
    ? [{runs:inn.partnership||0,balls:inn.partnershipBalls||0,pair:[inn.strikerName,inn.nonStrikerName],live:true}] : [];
  const all=[...done,...live];
  if(all.length===0) return null;
  const max=Math.max(1,...all.map(p=>p.runs));
  return(
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:"10px 12px",marginBottom:14}}>
      <p style={{fontSize:9,color:"var(--text-mute)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".15em",marginBottom:8}}>🤝 Partnerships</p>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {all.map((p,i)=>(
          <div key={i}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}>
              <span style={{color:"var(--text-dim)"}}>{p.pair[0]} & {p.pair[1]}{p.live&&<span style={{color:"var(--primary)",marginLeft:5}}>● current</span>}</span>
              <span style={{color:"var(--text)",fontWeight:700}}>{p.runs}{p.live&&p.balls!=null?<span style={{color:"var(--text-mute)",fontWeight:400}}> ({p.balls})</span>:null}</span>
            </div>
            <div style={{height:6,borderRadius:3,background:"var(--surface-3)",overflow:"hidden"}}>
              <div style={{height:"100%",width:(p.runs/max*100)+"%",background:p.live?"var(--primary)":"var(--amber)",borderRadius:3,transition:"width .3s ease"}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// Compact CURRENT-partnership bar for the headers (viewer + scorer + admin) — the same visual
// language as the "● current" row inside the full PartnershipChart (blue fill), distilled to one
// self-contained strip: names, runs, balls, and a progress bar that fills relative to a modest
// reference stand so early runs still show visible movement. Module scope = stable identity = no
// remount/animation replay on Firebase updates. Renders nothing when there's no live stand to show
// (single-batsman innings, or a new batsman still being chosen after a wicket).
function CurrentPartnershipBar({inn,compact,labelled}){
  if(!inn||inn.single||!inn.strikerName||!inn.nonStrikerName) return null;
  const runs=inn.partnership||0;
  const balls=inn.partnershipBalls||0;
  // Fill relative to a 50-run reference (a healthy stand), capped at 100%. Gives visible movement
  // from the very first run rather than needing a huge partnership before the bar looks non-empty.
  const pct=Math.max(4,Math.min(100,(runs/50)*100));
  return (
    <div style={{marginTop:compact?5:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:8,marginBottom:3}}>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:compact?11:12,color:"var(--text-dim)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {labelled&&<span style={{color:"var(--text-mute)",textTransform:"uppercase",letterSpacing:".1em",fontSize:compact?9:10}}>Current P'ship </span>}
          🤝 {firstName(inn.strikerName)} &amp; {firstName(inn.nonStrikerName)}
        </span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:compact?11:12,flexShrink:0}}>
          <span style={{color:"var(--text)",fontWeight:700}}>{runs}</span>
          <span style={{color:"var(--text-mute)"}}> ({balls})</span>
        </span>
      </div>
      <div style={{height:5,borderRadius:3,background:"var(--surface-3)",overflow:"hidden"}}>
        <div style={{height:"100%",width:pct+"%",borderRadius:3,background:"var(--primary)",transition:"width .3s ease"}}/>
      </div>
    </div>
  );
}

function ViewerTeams({match,inn}){
  const teamA=match?.teamA||"Team A", teamB=match?.teamB||"Team B";
  let listA=match?.pubTeamA||[], listB=match?.pubTeamB||[];
  const striker=inn?.strikerName, nonStriker=inn?.nonStrikerName, bowler=inn?.bowlerName;
  const outNames=new Set(Object.entries(inn?.batsmen||{}).filter(([,b])=>b&&b.out).map(([n])=>n));
  const assigned=listA.length>0||listB.length>0;
  // FALLBACK when captains/admin never assigned public squads: rather than show empty "Not set yet"
  // columns next to a confusing banner, build each side from who's actually appeared in the live data.
  // The batting side = everyone who has batted (inn.battingOrder); the bowling side = everyone who has
  // bowled (inn.bowlingOrder). This reflects the real players on the field even without a formal squad.
  if(!assigned&&inn){
    const battingSide=inn.battingTeam, bowlingSide=inn.bowlingTeam;
    const batters=inn.battingOrder||[], bowlers=inn.bowlingOrder||[];

    else { listA=bowlers; listB=batters; }
  }
  const tag=(n)=>{
    if(n===striker||n===nonStriker) return {label:"batting",color:"#fbbf24"};
    if(n===bowler) return {label:"bowling",color:"#6ee7b7"};
    if(outNames.has(n)) return {label:"out",color:"#f87171"};
    return null;
  };
  const col=(em,name,list,accent)=>(
    <div style={{flex:1,minWidth:0}}>
      <p style={{fontWeight:700,fontSize:13,marginBottom:8,color:accent}}>{em} {name} <span style={{color:"#9aa8bf",fontWeight:400}}>({list.length})</span></p>
      {list.length===0
        ? <p style={{fontSize:12,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace"}}>No players yet</p>
        : <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {list.map(n=>{const t=tag(n);return(
              <div key={n} style={{display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,.04)",borderRadius:8,padding:"6px 9px"}}>
                <Avatar name={n} color={accent}/>
                <span style={{fontSize:13,color:"#e5e7eb",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{n}</span>
                {t&&<span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".08em",color:t.color,border:`1px solid ${t.color}55`,borderRadius:6,padding:"1px 5px",flexShrink:0}}>{t.label}</span>}
              </div>
            );})}
          </div>}
    </div>
  );
  return(
    <div>
      {/* Match info — moved here out of the Live header to keep that header clean. Toss, venue,
          format and the full team matchup all live in this tab now. */}
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:"14px",marginBottom:16}}>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:17,fontWeight:700,marginBottom:6}}>
          {teamA} <span style={{color:"var(--text-mute)",fontSize:13}}>vs</span> {teamB}
        </div>
        {match?.tossSummary&&<div style={{fontSize:12,color:"#6ee7b7",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>🪙 {match.tossSummary}</div>}
        <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:11,color:"var(--text-mute)",fontFamily:"'JetBrains Mono',monospace"}}>
          {inn?.format&&<span>🏏 {inn.format}</span>}
          {inn?.overs?<span>⏱ {inn.overs} overs</span>:null}
          {inn?.venue&&<span>📍 {inn.venue}</span>}
        </div>
      </div>
      <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
        {col("🟡",teamA,listA,"#fbbf24")}
        {col("⚡",teamB,listB,"#6ee7b7")}
      </div>
    </div>
  );
}

// Build a WhatsApp-ready FINAL RESULT message: winner, margin, both innings, and player of the match.
// Read-only string building over the match-over snapshot. Used by the "Share Result" button.
function buildResultShareParts(snap,potm){
  if(!snap||!snap.inn||!snap.mo) return null;
  const inn=snap.inn, inn1=snap.inn1, mo=snap.mo;
  const lines=[];
  lines.push("🏆 "+(mo.winner?`${mo.winner} WON`:"MATCH TIED")+(mo.margin?` by ${mo.margin}`:""));
  const title=[inn.format,inn.venue].filter(Boolean).join(" · ");
  if(title) lines.push(title);
  lines.push("");
  if(inn1) lines.push(`${inn1.battingTeam}: ${inn1.totalRuns||0}/${inn1.wickets||0} (${ovStr(inn1.totalBalls||0)} ov)`);
  lines.push(`${inn.battingTeam}: ${inn.totalRuns||0}/${inn.wickets||0} (${ovStr(inn.totalBalls||0)} ov)`);
  // Top scorer from each innings, if available.
  const s2=inningsSummary(inn), s1=inn1?inningsSummary(inn1):null;
  const stars=[];
  if(s1&&s1.topBat) stars.push(`${s1.topBat.name} ${s1.topBat.runs}(${s1.topBat.balls})`);
  if(s2&&s2.topBat) stars.push(`${s2.topBat.name} ${s2.topBat.runs}(${s2.topBat.balls})`);
  if(stars.length){ lines.push(""); lines.push("⭐ "+stars.join("  |  ")); }
  // Best partnership across the match.
  let bp=null;
  [s1,s2].forEach(ss=>{ if(ss&&ss.bestPart&&(!bp||ss.bestPart.runs>bp.runs)) bp=ss.bestPart; });
  if(bp){ lines.push("🤝 Best stand: "+bp.pair[0]+" & "+bp.pair[1]+" ("+bp.runs+")"); }
  const pom=potm&&potm.winner;
  if(pom){ lines.push(""); lines.push("🏅 Player of the Match: "+pom); }
  return {body:lines.join("\n"), url:(typeof window!=="undefined"?window.location.origin:"")};
}
// Combined single string — clipboard fallback + stable shape for tests/other callers.
function buildResultShareText(snap,potm){
  const parts=buildResultShareParts(snap,potm);
  if(!parts) return "";
  return parts.body+"\n\nFull scorecard 👉 "+parts.url;
}

// Compute a concise summary of a finished innings for the innings-break card: top scorer and best
// bowler. Pure read-only derivation over the innings object — no state, safe to call in render.
function inningsSummary(inn){
  if(!inn) return null;
  let topBat=null;
  Object.values(inn.batsmen||{}).forEach(b=>{
    if(!b) return;
    if(!topBat || (b.runs||0)>(topBat.runs||0) || ((b.runs||0)===(topBat.runs||0)&&(b.balls||0)<(topBat.balls||0))) topBat=b;
  });
  let bestBowl=null;
  Object.values(inn.bowlers||{}).forEach(w=>{
    if(!w) return;
    // Best = most wickets, then fewest runs conceded.
    if(!bestBowl || (w.wickets||0)>(bestBowl.wickets||0) || ((w.wickets||0)===(bestBowl.wickets||0)&&(w.runs||0)<(bestBowl.runs||0))) bestBowl=w;
  });
  // Best (highest-scoring) partnership of the innings — from the completed-stands list plus the
  // current unbroken stand, so it works both mid-innings and on a finished/saved innings.
  let bestPart=null;
  const stands=[...(inn.partnerships||[])];
  if(inn.strikerName&&inn.nonStrikerName&&!inn.single){
    stands.push({runs:inn.partnership||0,pair:[inn.strikerName,inn.nonStrikerName]});
  }
  stands.forEach(p=>{
    if(!p||!p.pair) return;
    if(!bestPart || (p.runs||0)>(bestPart.runs||0)) bestPart={runs:p.runs||0,pair:p.pair};
  });
  return {
    topBat: topBat&&(topBat.runs||0)>0 ? {name:topBat.name, runs:topBat.runs||0, balls:topBat.balls||0} : null,
    bestBowl: bestBowl&&(bestBowl.wickets||0)>0 ? {name:bestBowl.name, wickets:bestBowl.wickets||0, runs:bestBowl.runs||0, overs:ovStr((bestBowl.overs||0)*6+(bestBowl.ballsThisOver||0))} : null,
    bestPart: bestPart&&bestPart.runs>0 ? bestPart : null,
  };
}

// Build a WhatsApp-ready live-score message from the current snapshot, and share it. Uses the native
// Web Share sheet when available (iOS/Android Safari & Chrome both support it), which lets the person
// pick WhatsApp directly; falls back to copying the text to the clipboard with a small confirmation
// otherwise. Pure string building + a share call — no app state touched, safe to call anytime.
//
// IMPORTANT: the score text and the link are built as SEPARATE pieces (buildLiveShareParts), not one
// combined string. Passing navigator.share({text}) with a URL embedded INSIDE that text string was the
// actual bug reported: several share targets (confirmed on iOS Chrome) auto-detect the URL inside the
// text and collapse the ENTIRE share down to just that link — the whole score message silently
// vanished, leaving only "https://.../#live". The Web Share API has a dedicated `url` field for
// exactly this reason; passing text and url separately keeps both intact through the share sheet.
function buildLiveShareParts(snap){
  if(!snap||!snap.inn) return null;
  const inn=snap.inn, inn1=snap.inn1, match=snap.match;
  const lines=[];
  const title=[inn.format,match?.tournamentName].filter(Boolean).join(" · ");
  lines.push("🏏 LIVE"+(title?" — "+title:"")+(inn.venue?" @ "+inn.venue:""));
  lines.push("");
  lines.push(`${inn.battingTeam} ${inn.totalRuns||0}/${inn.wickets||0} (${ovStr(inn.totalBalls||0)} ov)`);
  if(inn1) lines.push(`${inn1.battingTeam} ${inn1.totalRuns||0}/${inn1.wickets||0} (${ovStr(inn1.totalBalls||0)} ov)`);
  // Chase equation, when in the 2nd innings with a target. overs limit lives on inn, not match.
  if(inn.target!=null && inn.inningsNum===2){
    const need=inn.target-(inn.totalRuns||0);
    const totalBalls=(inn.overs||0)*6;
    const ballsLeft=Math.max(0,totalBalls-(inn.totalBalls||0));
    if(need>0 && ballsLeft>0) lines.push(`Need ${need} off ${ballsLeft} balls to win`);
  }
  return {body:lines.join("\n"), url:(typeof window!=="undefined"?window.location.origin+"/#live":"#live")};
}
// Combined single string — used for the clipboard fallback (which has no separate url concept) and
// kept as the stable shape for tests/other callers.
function buildLiveShareText(snap){
  const parts=buildLiveShareParts(snap);
  if(!parts) return "";
  return parts.body+"\n\nWatch live 👉 "+parts.url;
}
function shareLive(snap,onCopied){
  const parts=buildLiveShareParts(snap);
  if(!parts) return;
  try{
    if(navigator.share){
      navigator.share({text:parts.body,url:parts.url}).catch(()=>{}); // user cancelling the sheet is not an error
      return;
    }
  }catch(e){}
  // Fallback: copy to clipboard — here text+url DO need to be one combined string since there's
  // nothing else to paste but the clipboard contents.
  try{
    const combined=parts.body+"\n\nWatch live 👉 "+parts.url;
    navigator.clipboard.writeText(combined).then(()=>{ onCopied&&onCopied(); }).catch(()=>{ onCopied&&onCopied(); });
  }catch(e){ onCopied&&onCopied(); }
}

function ViewerLive({onExit}){
  const[snap,setSnap]=React.useState(undefined);
  const[potm,setPotm]=React.useState(null);
  const[tab,setTab]=React.useState("live");
  const[shareToast,setShareToast]=React.useState(false);
  // MATCH SOUNDS for viewers — when the live score changes, play a matching sound so watching feels
  // alive: bat-crack for 1–3 runs, crowd cheer for a FOUR, big roar for a SIX or a WICKET. Defaults ON
  // (persisted per-device via localStorage) — browsers require a user tap before audio actually plays
  // on first load, but the toggle lets people mute back off and that choice sticks across visits.
  // soundOnRef mirrors the state so the compare-effect reads the current value without re-subscribing.
  // Bat-crack for ordinary 1–3 run singles/twos/threes — quiet audio-only feedback. Boundaries and
  // wickets are handled by the shared <BallFlash> component below instead (visual + sound together,
  // same component used on the scorer's own screen), so that logic isn't duplicated in two places.
  // Single shared sound setting across the whole app — same "lcc_ball_sound" key the scorer/admin
  // 🔊 toggle uses. Previously the viewer had its own separate "lcc_viewer_sound" flag, which meant
  // sound could be ON in the viewer but OFF on the scorer (or vice-versa) — confusing. One key now.
  const[soundOn,setSoundOnRaw]=React.useState(()=>{try{return localStorage.getItem("lcc_ball_sound")!=="0"}catch(e){return true}});
  const setSoundOn=(v)=>{ setSoundOnRaw(prev=>{ const n=typeof v==="function"?v(prev):v; try{localStorage.setItem("lcc_ball_sound",n?"1":"0");}catch(e){} return n; }); };
  const soundOnRef=React.useRef(false);
  React.useEffect(()=>{ soundOnRef.current=soundOn; },[soundOn]);
  const prevScoreRef=React.useRef(null);
  React.useEffect(()=>{
    const inn=snap&&snap.inn;
    if(!inn){ prevScoreRef.current=null; return; }
    const cur={mid:snap.match&&snap.match.matchId, innNum:inn.inningsNum||1, runs:inn.totalRuns||0, wkts:inn.wickets||0};
    const prev=prevScoreRef.current;
    prevScoreRef.current=cur;
    if(!soundOnRef.current||!prev) return;
    if(prev.mid!==cur.mid||prev.innNum!==cur.innNum) return;   // new match/innings — no sound
    const dr=cur.runs-prev.runs, dw=cur.wkts-prev.wkts;
    if(dw===0&&dr>0&&dr<4){ try{playBatCrack();}catch(e){} }   // 1–3 — quiet bat knock only
  },[snap]);
  React.useEffect(()=>{
    if(!FB_OK||!DB){setSnap(null);return;}
    let liveRef=null, liveCb=null, potmRef=null, potmCb=null, cancelled=false;
    // Wait for anonymous auth to land before attaching. Under security rules requiring auth != null,
    // a listener attached BEFORE sign-in completes gets permission-denied on its first read and then
    // will not reliably re-fire on later updates — which is exactly how a viewer ends up stuck on an
    // OLD scoreboard. Attaching inside onAuthReady guarantees the read is authorized and keeps
    // streaming live updates. A hard fallback still resolves the "Connecting…" state if auth stalls.
    onAuthReady(()=>{
      if(cancelled)return;
      liveRef=DB.ref("live");
      liveCb=liveRef.on("value",s=>setSnap(s.val()),err=>{ console.error("viewer live read error",err); setSnap(null); });
      potmRef=DB.ref("potm");
      potmCb=potmRef.on("value",s=>setPotm(s.val()||null),()=>{});
    });
    // Safety: if auth never settles, don't hang on the connecting screen forever.
    const fallback=setTimeout(()=>{ if(!cancelled&&snap===undefined) setSnap(s=>s===undefined?null:s); },6000);
    return ()=>{ cancelled=true; clearTimeout(fallback);
      if(liveRef&&liveCb)liveRef.off("value",liveCb);
      if(potmRef&&potmCb)potmRef.off("value",potmCb); };
  },[]);

  if(snap===undefined) return <Centered emoji="📡" title="Connecting…" sub="Loading live match" onExit={onExit}/>;
  if(!snap||!snap.inn) return <Centered emoji="🏏" title="No live match" sub="Nothing is being scored right now. Check back when a game starts." onExit={onExit}/>;

  const inn=snap.inn, inn1=snap.inn1, mo=snap.mo, match=snap.match;

  if(inn.awaitingOpeners){
    return <Centered emoji="🏏" title={`${inn.battingTeam} vs ${inn.bowlingTeam}`}
      sub={`Match starting soon — ${inn.battingTeam} is setting their opening batsmen.`} onExit={onExit}/>;
  }

  // ── Innings-break summary — shown to viewers between innings, while the 2nd-innings openers are
  //    being set. `inn` here is the just-finished 1st innings. Read-only recap: total, top scorer,
  //    best bowler, and the target the chasing side needs. Prime screenshot material for the group. ──
  if(snap.ib){
    const s=inningsSummary(inn);
    const target=(inn.totalRuns||0)+1;
    const chasingTeam=inn.bowlingTeam;
    const rr=inn.overs?((inn.totalRuns||0)/(inn.overs)).toFixed(2):null;
    return (
      <div style={{background:"radial-gradient(ellipse 100% 55% at 85% 0%, rgba(37,99,235,.30), transparent 60%), radial-gradient(ellipse 90% 60% at 8% 92%, rgba(139,92,246,.26), transparent 62%), radial-gradient(circle at 50% 45%, rgba(30,58,138,.18), transparent 70%), linear-gradient(180deg,#0b1230 0%,#0a0e24 32%,#0d0a24 62%,#100a24 100%)",minHeight:"100dvh",padding:"20px 16px"}}>
        <div className="flex items-center justify-between" style={{marginBottom:20}}>
          <span style={{fontSize:11,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".2em",fontWeight:700}}>⏸ INNINGS BREAK</span>
          <div className="flex items-center" style={{gap:10}}>
            <button onClick={()=>shareLive(snap,()=>{ setShareToast(true); setTimeout(()=>setShareToast(false),2200); })}
              style={{background:"rgba(37,211,102,.15)",border:"1px solid rgba(37,211,102,.4)",color:"#25d366",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderRadius:8,padding:"4px 10px",fontWeight:600}}>📤 Share</button>
            <button onClick={onExit} style={{background:"none",border:"none",color:"#9aa8bf",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← back</button>
          </div>
        </div>
        {shareToast&&<div style={{marginBottom:12,fontSize:11,color:"#25d366",fontFamily:"'JetBrains Mono',monospace"}}>✓ Score copied — paste it into WhatsApp!</div>}

        <div style={{textAlign:"center",marginBottom:8}}>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700}}>{inn.battingTeam}</div>
          <div className="score-number" style={{fontSize:56,lineHeight:1.1}}>{inn.totalRuns||0}<span className="score-wkt">/{inn.wickets||0}</span></div>
          <div style={{color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>({ovStr(inn.totalBalls||0)} ov{rr?` · RR ${rr}`:""})</div>
        </div>

        <div style={{background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.3)",borderRadius:16,padding:"16px",textAlign:"center",margin:"16px 0"}}>
          <div style={{fontSize:13,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>🎯 TARGET</div>
          <div style={{fontSize:32,fontWeight:700,fontFamily:"'Oswald',sans-serif"}}>{target}</div>
          <div style={{fontSize:12,color:"#bcc7d8",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{chasingTeam} need {target} to win{inn.overs?` · ${(target/inn.overs).toFixed(2)} req rate`:""}</div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{background:"rgba(52,211,153,.07)",border:"1px solid rgba(52,211,153,.25)",borderRadius:14,padding:"14px"}}>
            <div style={{fontSize:10,color:"#34d399",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:6}}>🏏 TOP SCORER</div>
            {s&&s.topBat
              ?<><div style={{fontWeight:700,fontSize:15}}>{s.topBat.name}</div><div style={{color:"#bcc7d8",fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>{s.topBat.runs} ({s.topBat.balls})</div></>
              :<div style={{color:"#9aa8bf",fontSize:12}}>—</div>}
          </div>
          <div style={{background:"rgba(167,139,250,.07)",border:"1px solid rgba(167,139,250,.25)",borderRadius:14,padding:"14px"}}>
            <div style={{fontSize:10,color:"#a78bfa",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:6}}>🎯 BEST BOWLER</div>
            {s&&s.bestBowl
              ?<><div style={{fontWeight:700,fontSize:15}}>{s.bestBowl.name}</div><div style={{color:"#bcc7d8",fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>{s.bestBowl.wickets}/{s.bestBowl.runs} ({s.bestBowl.overs})</div></>
              :<div style={{color:"#9aa8bf",fontSize:12}}>—</div>}
          </div>
        </div>

        {s&&s.bestPart&&(
          <div style={{background:"rgba(56,189,248,.07)",border:"1px solid rgba(56,189,248,.25)",borderRadius:14,padding:"14px",marginTop:10}}>
            <div style={{fontSize:10,color:"#38bdf8",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:6}}>🤝 BEST PARTNERSHIP</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:8}}>
              <div style={{fontWeight:700,fontSize:14}}>{firstName(s.bestPart.pair[0])} & {firstName(s.bestPart.pair[1])}</div>
              <div style={{color:"#e5e7eb",fontFamily:"'Oswald',sans-serif",fontSize:20,fontWeight:700}}>{s.bestPart.runs}</div>
            </div>
          </div>
        )}

        <div style={{textAlign:"center",marginTop:24,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>
          ⏳ {chasingTeam} setting up their innings…
        </div>
      </div>
    );
  }

  if(mo){
    const i2=inn;
    return (
      <div className="result-screen">
      <MatchFinale winner={mo.winner}/>
      <div className="result-card">
        <div className="text-center" style={{marginBottom:16}}>
          <div style={{fontSize:54}}>🏆</div>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:36,fontWeight:700,background:"linear-gradient(135deg,#fff,#fbbf24)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{mo.winner?`${mo.winner} Win!`:"Match Tied!"}</h1>
          {mo.winner&&<p style={{color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontSize:16}}>by {mo.margin}</p>}
        </div>
        {inn1&&<ScoreRow team={inn1.battingTeam} runs={inn1.totalRuns} wkts={inn1.wickets} balls={inn1.totalBalls}/>}
        <ScoreRow team={i2.battingTeam} runs={i2.totalRuns} wkts={i2.wickets} balls={i2.totalBalls}/>
        {/* POTM voting — same component, viewer role so no Close button */}
        <POTMVoting inn={inn} inn1={inn1} potm={potm} role="viewer"/>
        <button className="btn w-full" style={{marginTop:16,background:"rgba(37,211,102,.15)",border:"1px solid rgba(37,211,102,.4)",color:"#25d366",fontWeight:600}}
          onClick={()=>{
            const parts=buildResultShareParts(snap,potm);
            if(!parts) return;
            try{ if(navigator.share){ navigator.share({text:parts.body,url:parts.url}).catch(()=>{}); return; } }catch(e){}
            const combined=parts.body+"\n\nFull scorecard 👉 "+parts.url;
            try{ navigator.clipboard.writeText(combined).then(()=>{ setShareToast(true); setTimeout(()=>setShareToast(false),2200); }).catch(()=>{}); }catch(e){}
          }}>📤 Share Result</button>
        {shareToast&&<div style={{textAlign:"center",marginTop:8,fontSize:11,color:"#25d366",fontFamily:"'JetBrains Mono',monospace"}}>✓ Result copied — paste it into WhatsApp!</div>}
        <button className="btn btn-ghost w-full" style={{marginTop:8}} onClick={onExit}>← Back</button>
      </div></div>
    );
  }

  const bLeft=inn.overs*6-inn.totalBalls;
  const crr=rr(inn.totalRuns,inn.totalBalls);
  const req=inn.target?inn.target-inn.totalRuns:null;
  const rrr=inn.target&&bLeft>0?((req/bLeft)*6).toFixed(2):null;
  const SK=inn.batsmen[inn.strikerName];
  const NS=inn.nonStrikerName?inn.batsmen[inn.nonStrikerName]:null;
  const BW=inn.bowlers[inn.bowlerName];

  return(
    <div style={{background:"radial-gradient(ellipse 100% 55% at 85% 0%, rgba(37,99,235,.30), transparent 60%), radial-gradient(ellipse 90% 60% at 8% 92%, rgba(139,92,246,.26), transparent 62%), radial-gradient(circle at 50% 45%, rgba(30,58,138,.18), transparent 70%), linear-gradient(180deg,#0b1230 0%,#0a0e24 32%,#0d0a24 62%,#100a24 100%)",minHeight:"100dvh"}}>
      <div className="score-header">
        <BallFlash inn={inn} soundOn={soundOn}/>
        <div className="flex items-center justify-between" style={{marginBottom:8}}>
          <div className="flex items-center" style={{gap:8}}>
            <span style={{fontSize:10,background:"rgba(16,185,129,.18)",color:"#34d399",border:"1px solid rgba(16,185,129,.4)",borderRadius:6,padding:"3px 9px",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,letterSpacing:".05em"}}>● LIVE</span>
            <span style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".2em"}}>{inn.inningsNum===1?"1st":"2nd"} Innings</span>
          </div>
          <div className="flex items-center" style={{gap:10}}>
            <button onClick={()=>shareLive(snap,()=>{ setShareToast(true); setTimeout(()=>setShareToast(false),2200); })}
              style={{background:"rgba(37,211,102,.15)",border:"1px solid rgba(37,211,102,.4)",color:"#25d366",
                fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderRadius:8,padding:"4px 10px",fontWeight:600}}
              title="Share the live score">📤 Share</button>
            <button onClick={onExit} style={{background:"none",border:"none",color:"#9aa8bf",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← back</button>
          </div>
        </div>
        {shareToast&&<div style={{marginBottom:8,fontSize:11,color:"#25d366",fontFamily:"'JetBrains Mono',monospace"}}>✓ Score copied — paste it into WhatsApp!</div>}
        {/* Concise matchup line. The toss summary and venue moved to the Teams tab (now "Match")
            to keep this header tight — image showed toss/venue crowding the top. */}
        <div style={{marginBottom:2}}>
          <span style={{fontWeight:700,fontSize:16}}>{inn.battingTeam}</span>
          <span style={{color:"#9aa8bf",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}> vs {inn.bowlingTeam}</span>
        </div>
        <MilestoneCelebration inn={inn} resetKey={(match?.matchId||"m")+":"+(inn.inningsNum||1)} playSound={soundOn}/>
        {/* Big score with CRR + Projected pills on the right — same layout as the admin scoreboard so
            the viewer reads as prominently. Proj (extrapolated final at current rate) shows in the 1st
            innings only, the standard broadcast stat. */}
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:8,minWidth:0}}>
            <span key={inn.totalRuns+"-"+inn.wickets} className="score-big score-pulse">{inn.totalRuns}<span className="score-wkt">/{inn.wickets}</span></span>
            <span style={{color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>({ovStr(inn.totalBalls)} ov)</span>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#bcc7d8",
              background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",
              borderRadius:9,padding:"5px 10px",whiteSpace:"nowrap"}}>CRR <span style={{color:"#fbbf24",fontWeight:700}}>{crr}</span></span>
            {!inn.target&&inn.totalBalls>0&&inn.overs>0&&
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#a5b4fc",
                background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.3)",
                borderRadius:9,padding:"5px 10px",whiteSpace:"nowrap"}}>Proj <span style={{color:"#fff",fontWeight:700}}>{Math.round(parseFloat(crr)*inn.overs)}</span></span>}
          </div>
        </div>
        {/* TICKER — one line describing the latest ball, directly under the score (ball info first) */}
        {(()=>{
          const evs=inn.overEvents&&inn.overEvents.length?inn.overEvents:((inn.completedOvers||[]).slice(-1)[0]||[]);
          const line=describeBall(evs[evs.length-1],inn);
          if(!line) return null;
          const big=line.startsWith("SIX")||line.startsWith("FOUR")||line.startsWith("WICKET");
          return(
            <div key={(inn.totalBalls||0)+"-"+(inn.totalRuns||0)+"-"+(inn.wickets||0)}
              style={{marginTop:6,fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:".04em",
                color:line.startsWith("WICKET")?"var(--red-2)":big?"var(--amber-2)":"var(--text-dim)",
                animation:"screenIn .35s ease-out both"}}>
              ▸ {line}
            </div>
          );
        })()}
        {/* Current partnership — labelled, then the blue bar (names + runs/balls + progress). */}
        <CurrentPartnershipBar inn={inn} labelled/>
        {/* CHASE STRIP — the same compact, information-dense equation the scorer/admin sees, brought
            to the viewer so watching teammates instantly know where the chase stands: target, what's
            needed, required rate, whether they're ON TRACK or BEHIND, and a colour-coded progress bar
            (green ahead / red behind). Replaces the older bulky "Need X off Y balls" banner. */}
        {inn.target!=null&&bLeft>0&&req>0&&(()=>{
          const ahead=parseFloat(crr)>=parseFloat(rrr||crr);
          return(
            <div key={req+"-"+bLeft} style={{marginTop:10,background:"rgba(255,255,255,.04)",
              border:"1px solid rgba(255,255,255,.09)",borderRadius:12,padding:"10px 13px",animation:"screenIn .3s ease-out both"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"nowrap"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#a5b4fc",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",minWidth:0}}>
                  Target <span style={{color:"#fff",fontWeight:700}}>{inn.target}</span> · Need <span style={{color:"#fff",fontWeight:700}}>{Math.max(req,0)}</span> off <span style={{color:"#fff",fontWeight:700}}>{bLeft}</span>b
                </span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,whiteSpace:"nowrap",flexShrink:0,color:rrr&&parseFloat(rrr)>12?"#f87171":"#bcc7d8"}}>
                  {rrr&&<>RRR <span style={{fontWeight:700,color:parseFloat(rrr)>12?"#f87171":"#fff"}}>{rrr}</span> · </>}
                  <span style={{fontWeight:700,color:ahead?"#34d399":"#f87171"}}>{ahead?"▲ ON TRACK":"▼ BEHIND"}</span>
                </span>
              </div>
            </div>
          );
        })()}
        {/* CRR now lives as a pill next to the score above (admin-style). Target shows in the chase
            banner during a chase. No separate CRR row needed here anymore. */}
      </div>
      <div className="content" style={{paddingTop:16}}>
        {/* Tabs as a clean 3-column segmented control; the sound control sits on its own as a
            separate labelled pill so it no longer crowds the tab row. */}
        <div style={{display:"flex",alignItems:"center",gap:10,margin:"8px 14px 16px"}}>
          <div className="tabs" style={{margin:0,flex:1}}>
            <button className={`tab${tab==="live"?" active":""}`} onClick={()=>setTab("live")}>📡 Live</button>
            <button className={`tab${tab==="scorecard"?" active":""}`} onClick={()=>setTab("scorecard")}>📋 Scorecard</button>
            <button className={`tab${tab==="teams"?" active":""}`} onClick={()=>setTab("teams")}>👥 Match</button>
          </div>
          <button onClick={()=>{ setSoundOn(s=>!s); try{_getHeroCtx();}catch(e){} }}
            title={soundOn?"Match sounds on — tap to mute":"Match sounds off — tap to enable"}
            style={{display:"flex",alignItems:"center",gap:5,background:soundOn?"rgba(52,211,153,.15)":"#1e1b4b",
              border:soundOn?"1px solid rgba(52,211,153,.5)":"1px solid transparent",borderRadius:14,
              padding:"9px 12px",cursor:"pointer",color:soundOn?"#6ee7b7":"#9aa8bf",fontSize:16,lineHeight:1,flexShrink:0}}>
            {soundOn?"🔊":"🔇"}
          </button>
        </div>

        {tab==="teams"?(
          <ViewerTeams match={match} inn={inn}/>
        ):tab==="scorecard"?(
          <>
            <PartnershipChart inn={inn}/>
            {inn.inningsNum===2&&inn1&&(<>
              <p className="section-title">1st Innings — {inn1.battingTeam}</p>
              <BattingTab inn={inn1}/>
              <div style={{marginTop:14}}/>
              <BowlingTab inn={inn1}/>
              <div className="divider" style={{margin:"18px 0"}}/>
            </>)}
            <p className="section-title">{inn.inningsNum===2?"2nd Innings — ":""}{inn.battingTeam}</p>
            <BattingTab inn={inn}/>
            <div style={{marginTop:14}}/>
            <BowlingTab inn={inn}/>
          </>
        ):(<>
        <div className="grid-2" style={{marginBottom:16}}>
          <div className="mini-card">
            <p className="section-title">🟡 {inn.single?"Batsman":"Batting"}</p>
            {(inn.single?[SK]:[SK,NS]).filter(Boolean).map((p,i)=>(
              <div key={i} className="flex items-center justify-between" style={{padding:"3px 0",gap:8}}>
                <span style={{fontSize:13,fontWeight:p===SK?700:400,color:p===SK?"#fff":"#bcc7d8",flex:1,minWidth:0,overflow:"hidden"}} className="truncate">{firstName(p.name)}{p===SK&&<span style={{color:"#fbbf24",fontWeight:700}}> *</span>}</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#9aa8bf",flexShrink:0}}>{p.runs} ({p.balls})</span>
              </div>
            ))}
          </div>
          <div className="mini-card">
            <p className="section-title">🎯 Bowling</p>
            {BW&&<div className="flex items-center justify-between" style={{gap:8}}>
              <span style={{fontSize:13,fontWeight:700,flex:1,minWidth:0,overflow:"hidden"}} className="truncate">{shortName(BW.name)}</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#9aa8bf",flexShrink:0}}>{BW.overs}.{BW.ballsThisOver}-{BW.runs}-{BW.wickets}</span>
            </div>}
          </div>
        </div>
        {/* This over — now the ONE home for ball chips (the header's duplicate mini-strip was
            removed). Between overs, rather than an empty "— new over —" box, show the over that
            just finished, dimmed and labelled, so the recent rhythm of play is never off-screen. */}
        {(()=>{
          const cur=inn.overEvents||[];
          const co=inn.completedOvers||[];
          const showingPrev=cur.length===0&&co.length>0;
          const evs=showingPrev?co[co.length-1]:cur;
          return(<>
            <p className="section-title">{showingPrev?"Last Over":"This Over"}</p>
            <div style={{background:"#130f3a",border:"1px solid #1e1b4b",borderRadius:16,padding:"12px 14px",display:"flex",flexWrap:"wrap",gap:8,minHeight:60,opacity:showingPrev?0.75:1}}>
              {evs.length===0
                ?<span style={{color:"#2d2a6a",fontFamily:"'JetBrains Mono',monospace",fontSize:12,alignSelf:"center"}}>— new over —</span>
                :evs.map((ev,i)=><div key={i} className={chipClass(ev)}>{chipLbl(ev)}</div>)}
            </div>
            {/* RECENT OVERS — runs (and any wickets) in each of the last completed overs, newest last.
                Turns the previously empty space into a genuine at-a-glance momentum read: are they
                accelerating or stalling? Only shown once at least one over is complete. */}
            {co.length>0&&(()=>{
              const recent=co.slice(-6).map((ov,idx)=>{
                const startIdx=co.length-Math.min(6,co.length)+idx;
                const runs=(ov||[]).reduce((a,e)=>a+evRuns(e),0);
                const wkts=(ov||[]).filter(e=>e&&e.type==="W").length;
                return {n:startIdx+1,runs,wkts};
              });
              const last5=co.slice(-5).reduce((a,ov)=>a+(ov||[]).reduce((s,e)=>s+evRuns(e),0),0);
              return(
                <div style={{marginTop:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                    <p className="section-title" style={{marginBottom:0}}>Recent Overs</p>
                    {co.length>=2&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"var(--text-mute)"}}>last {Math.min(5,co.length)} ov: <span style={{color:"#67e8f9",fontWeight:700}}>{last5}</span> runs</span>}
                  </div>

// ── Full scorecard for a completed match (from history) ──────────────────────
// ── Match Highlights — best figures from both innings ────────────────────────
function MatchHighlights({m}){
  const combined=(key)=>{
    const out={};
    [m.inn1,m.inn2].forEach(inn=>{
      if(!inn)return;
      Object.entries(inn[key]||{}).forEach(([name,d])=>{
        if(!out[name])out[name]={runs:0,balls:0,fours:0,sixes:0,wickets:0,bowlerRuns:0,overs:0};
        if(key==="batsmen"){out[name].runs+=(d.runs||0);out[name].balls+=(d.balls||0);out[name].fours+=(d.fours||0);out[name].sixes+=(d.sixes||0);}
        if(key==="bowlers"){out[name].wickets+=(d.wickets||0);out[name].bowlerRuns+=(d.runs||0);out[name].overs+=(d.overs||0);}
      });
    });
    return out;
  };
  const bat=combined("batsmen");
  const bowl=combined("bowlers");

  // Fielding from howOut field: catches, run-outs, and stumpings
  const catches={};
  [m.inn1,m.inn2].forEach(inn=>{
    Object.values(inn?.batsmen||{}).forEach(b=>{
      const ho=b?.howOut||"";
      if(ho.startsWith("c ")){
        const name=ho.split(" b ")[0].replace("c ","").trim();
        if(name&&name!=="sub")catches[name]=(catches[name]||0)+1;
      }else if(ho.startsWith("st ")&&ho.includes(" b ")){
        // stumped: "st Keeper b Bowler"
        const name=ho.split(" b ")[0].replace("st ","").trim();
        if(name&&name!=="sub")catches[name]=(catches[name]||0)+1;
      }else if(ho.startsWith("run out (")){
        // run out: "run out (Fielder) (end) ..."
        const m2=ho.match(/^run out \(([^)]+)\)/);
        if(m2&&m2[1]&&m2[1]!=="sub")catches[m2[1].trim()]=(catches[m2[1].trim()]||0)+1;
      }
    });
  });

  const highlights=[];
  const topBat=Object.entries(bat).sort((a,b)=>b[1].runs-a[1].runs)[0];
  if(topBat)highlights.push({em:"🏏",title:"Top Scorer",name:topBat[0],val:`${topBat[1].runs} runs (${topBat[1].balls}b)`});
  const topBowl=Object.entries(bowl).filter(([,d])=>d.wickets>0).sort((a,b)=>b[1].wickets-a[1].wickets||a[1].bowlerRuns-b[1].bowlerRuns)[0];
  if(topBowl)highlights.push({em:"🎯",title:"Best Bowling",name:topBowl[0],val:`${topBowl[1].wickets}/${topBowl[1].bowlerRuns}`});
  const mostSix=Object.entries(bat).filter(([,d])=>d.sixes>0).sort((a,b)=>b[1].sixes-a[1].sixes)[0];
  if(mostSix)highlights.push({em:"6️⃣",title:"Most Sixes",name:mostSix[0],val:`${mostSix[1].sixes} sixes`});
  const mostFour=Object.entries(bat).filter(([,d])=>d.fours>0).sort((a,b)=>b[1].fours-a[1].fours)[0];
  if(mostFour)highlights.push({em:"4️⃣",title:"Most Fours",name:mostFour[0],val:`${mostFour[1].fours} fours`});
  const topCatch=Object.entries(catches).sort((a,b)=>b[1]-a[1])[0];
  if(topCatch)highlights.push({em:"🙌",title:"Best Fielding",name:topCatch[0],val:`${topCatch[1]} dismissal${topCatch[1]>1?"s":""}`});
  const bestEcon=Object.entries(bowl).filter(([,d])=>d.overs>=1).sort((a,b)=>(a[1].bowlerRuns/a[1].overs)-(b[1].bowlerRuns/b[1].overs))[0];
  if(bestEcon)highlights.push({em:"💨",title:"Best Economy",name:bestEcon[0],val:`${(bestEcon[1].bowlerRuns/bestEcon[1].overs).toFixed(2)} rpo`});

  if(!highlights.length)return null;
  return(
    <div style={{marginTop:16}}>
      <p style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".15em",marginBottom:10}}>📊 MATCH HIGHLIGHTS</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {highlights.map(h=>(
          <div key={h.title} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(99,102,241,.2)",borderRadius:14,padding:"12px 12px"}}>
            <p style={{fontSize:18,marginBottom:4}}>{h.em}</p>
            <p style={{fontSize:9,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:2}}>{h.title}</p>
            <p style={{fontWeight:700,fontSize:13}}>{h.name}</p>
            <p style={{fontSize:11,color:"#a5b4fc",fontFamily:"'JetBrains Mono',monospace"}}>{h.val}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MatchHistoryPOTM — permanent POTM voting accessible from match history ───
// Lives at history/{matchId}/potmVoting so players can vote any time after match
function MatchHistoryPOTM({m,role}){
  const[voting,setVoting]=React.useState(null);
  const deviceId=React.useMemo(()=>{
    try{
      let id=localStorage.getItem("lcc_device_id");
      if(!id){id="d_"+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("lcc_device_id",id);}
      return id;
    }catch(e){return "d_"+Math.random().toString(36).slice(2);}
  },[]);
  const[myName,setMyName]=React.useState(()=>{try{return localStorage.getItem("lcc_potm_voter_"+m.id)||null;}catch(e){return null;}});

  React.useEffect(()=>{
    if(!FB_OK||!DB||!m.id)return;
    const ref=DB.ref("history/"+m.id+"/potmVoting");
    const cb=ref.on("value",s=>{
      const v=s.val();
      // If no potmVoting exists yet, initialise it so voting can start
      if(!v&&FB_OK&&DB) DB.ref("history/"+m.id+"/potmVoting").set({open:true,votes:{}}).catch(()=>{});
      setVoting(v||{open:true,votes:{}});
    });
    return()=>ref.off("value",cb);
  },[m.id]);

  // All players who batted or bowled in either innings
  const participants=React.useMemo(()=>{
    const s=new Set();
    [m.inn1,m.inn2].forEach(inn=>{if(!inn)return;Object.keys(inn.batsmen||{}).forEach(n=>s.add(n));(inn.bowlingOrder||[]).forEach(n=>s.add(n));});
    return[...s].sort();
  },[m.inn1,m.inn2]);

  if(!voting)return <p style={{fontSize:11,color:"#8291ab",fontFamily:"'JetBrains Mono',monospace",marginTop:16}}>Loading POTM voting…</p>;

  const votes=voting.votes||{};
  const counts={};
  Object.values(votes).forEach(v=>{if(v?.votedFor)counts[v.votedFor]=(counts[v.votedFor]||0)+1;});
  const totalVotes=Object.values(counts).reduce((a,b)=>a+b,0);
  const myVote=votes[deviceId]?.votedFor||null;

  const castVote=(name)=>{
    if(!myName||!FB_OK||!DB)return;
    if(myVote===name){
      DB.ref("history/"+m.id+"/potmVoting/votes/"+deviceId).remove().catch(()=>{});
      return;
    }
    DB.ref("history/"+m.id+"/potmVoting/votes/"+deviceId).set({voter:myName,votedFor:name,at:Date.now()}).catch(()=>{});
  };

  const closeAndAnnounce=()=>{
    if(!FB_OK||!DB)return;
    let winner=null,max=0;
    Object.entries(counts).forEach(([n,c])=>{if(c>max){max=c;winner=n;}});
    if(!winner&&participants.length>0)winner=participants[0];
    DB.ref("history/"+m.id+"/potmVoting").update({open:false,winner,closedAt:Date.now()}).catch(()=>{});
    DB.ref("history/"+m.id+"/potm").set(winner).catch(()=>{});
    DB.ref("announcement").set({text:`🏆 Player of the Match (${m.teamA||""} vs ${m.teamB||""}): ${winner}!`,by:"LCC",ts:Date.now()}).catch(()=>{});
  };

  // ── Winner card ───────────────────────────────────────────────────────────
  if(voting.winner){
    return(
      <div style={{background:"linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.1))",border:"2px solid rgba(245,158,11,.5)",borderRadius:20,padding:"20px 18px",marginTop:16,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:6}}>🏆</div>
        <p style={{fontSize:9,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".2em",marginBottom:4}}>PLAYER OF THE MATCH</p>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:26,fontWeight:700,color:"#fbbf24"}}>{voting.winner}</p>
        <p style={{fontSize:10,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{totalVotes} vote{totalVotes===1?"":"s"}</p>
      </div>
    );
  }

  if(!voting.open)return null;

  // ── Step 1: Who are you? ──────────────────────────────────────────────────
  if(!myName){
    return(
      <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"16px",marginTop:16}}>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,marginBottom:4}}>🏆 Vote · Player of the Match</p>
        <p style={{color:"#bcc7d8",fontSize:11,marginBottom:12}}>Only players who participated can vote. Pick your name:</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {participants.map(n=>(
            <button key={n} onClick={()=>{setMyName(n);try{localStorage.setItem("lcc_potm_voter_"+m.id,n);}catch(e){}}}
              style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid rgba(99,102,241,.4)",background:"rgba(99,102,241,.12)",color:"#a5b4fc",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>
              {n}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Step 2: Cast vote ─────────────────────────────────────────────────────
  const sorted=[...participants].sort((a,b)=>(counts[b]||0)-(counts[a]||0));
  return(
    <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"16px",marginTop:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div>
          <p style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,marginBottom:2}}>🏆 Player of the Match</p>
          <p style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>Voting as {myName}{myVote?` · voted for ${myVote}`:""}</p>
        </div>
        <button onClick={()=>{setMyName(null);try{localStorage.removeItem("lcc_potm_voter_"+m.id);}catch(e){}}}
          style={{background:"none",border:"none",color:"#9aa8bf",fontSize:10,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>Not you?</button>
      </div>
      <p style={{fontSize:9,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",marginBottom:8}}>{myVote?"Tap a different name to change your vote, or tap your pick again to remove it.":"Tap a name to vote — you can change your mind anytime before voting closes."}</p>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
        {sorted.filter(n=>n!==myName).map(n=>{
          const c=counts[n]||0;
          const pct=totalVotes>0?Math.round((c/totalVotes)*100):0;
          const isMyVote=myVote===n;
          return(
            <button key={n} onClick={()=>castVote(n)} style={{
              display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"10px 14px",borderRadius:12,cursor:"pointer",position:"relative",overflow:"hidden",
              border:isMyVote?"2px solid #fbbf24":"1.5px solid rgba(99,102,241,.3)",
              background:isMyVote?"rgba(245,158,11,.15)":"rgba(255,255,255,.03)",color:"#fff",textAlign:"left"
            }}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:pct+"%",background:"rgba(245,158,11,.08)",transition:"width .4s ease"}}/>
              <span style={{fontWeight:isMyVote?700:400,fontSize:13,position:"relative"}}>{n}{isMyVote&&<span style={{color:"#fbbf24",marginLeft:6,fontSize:10}}>✓ your vote</span>}</span>
              <span style={{fontSize:10,color:"#9aa8bf",fontFamily:"'JetBrains Mono',monospace",position:"relative"}}>{c} vote{c===1?"":"s"}</span>
            </button>
          );
        })}
      </div>
      <p style={{fontSize:10,color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",marginBottom:role==="admin"?10:0}}>{totalVotes} vote{totalVotes===1?"":"s"} cast</p>
      {role==="admin"&&(
        <button onClick={closeAndAnnounce} style={{width:"100%",padding:"12px",borderRadius:14,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#111",fontWeight:700,fontSize:13}}>
          🏆 Close Voting & Announce Winner
        </button>
      )}
    </div>
  );
}

function MatchDetailView({match:m,role,onBack,onDelete}){
  const[tab,setTab]=React.useState("summary");
  const[editOpen,setEditOpen]=React.useState(false);
  const[eWinner,setEWinner]=React.useState(m.result?.winner||"");
  const[eMargin,setEMargin]=React.useState(m.result?.margin||"");
  const[eToss,setEToss]=React.useState(m.tossSummary||"");
  const[eSaving,setESaving]=React.useState(false);
  const[dlSaving,setDlSaving]=React.useState(false);
  const saveEdit=()=>{
    if(!FB_OK||!DB) return;
    setESaving(true);
    const updates={};
    updates["history/"+m.id+"/result"]={winner:eWinner.trim()||null,margin:eMargin.trim()||null};
    updates["history/"+m.id+"/tossSummary"]=eToss.trim()||null;
    DB.ref().update(updates)
