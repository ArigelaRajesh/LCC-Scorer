// ── Reusable share button: native share sheet (mobile) with a copy-to-clipboard fallback ──
function ShareButton({label,buildText}){
  const[copied,setCopied]=React.useState(false);
  const doShare=async()=>{
    const text=buildText();
    if(navigator.share){
      try{ await navigator.share({text}); return; }catch(e){ /* user cancelled or share failed — fall through to copy */ }
    }
    try{
      await navigator.clipboard.writeText(text);
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    }catch(e){
      alert(text); // last-resort fallback so the content is at least visible to copy manually
    }
  };
  return(
    <button onClick={doShare} style={{background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.35)",color:"#6ee7b7",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Inter',sans-serif",borderRadius:10,padding:"8px 16px"}}>
      {copied?"✓ Copied!":label}
    </button>
  );
}

// ── Public voting tab — tap your name, pick Yes/No/+1, one vote per device ──
function PollVoteTab({roster,poll,votes,passphrase,role}){
  const[myVote,setMyVote]=React.useState(()=>{try{return localStorage.getItem("lcc_poll_voted_as")||null;}catch(e){return null;}});
  const[kidDraft,setKidDraft]=React.useState({});
  const[deviceUnlocked,setDeviceUnlocked]=React.useState(()=>{
    try{return localStorage.getItem("lcc_club_unlocked")===passphrase&&!!passphrase;}catch(e){return false;}
  });
  const[passModal,setPassModal]=React.useState(null);
  const[passTry,setPassTry]=React.useState("");
  const[passErr,setPassErr]=React.useState("");
  const[plus1Open,setPlus1Open]=React.useState(null);

  // Helper: normalize old {plus1,kidName} OR new {kids:[]} format
  const getKids=(v)=>{
    if(Array.isArray(v?.kids)) return v.kids;
    if(v?.plus1&&v?.kidName) return [v.kidName];
    return [];
  };

  if(!poll) return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:40,marginBottom:10}}>📋</div>
      <p style={{fontWeight:600,marginBottom:4}}>No poll open right now</p>
      <p style={{color:"#6b7280",fontSize:13}}>Ask the admin to publish this week's match poll.</p>
    </div>
  );

  const entries=Object.entries(roster||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));
  const totalKids=Object.values(votes||{}).reduce((s,v)=>s+getKids(v).length,0);
  const counts={yes:0,no:0,kids:totalKids};
  Object.values(votes||{}).forEach(v=>{if(v?.choice==="yes")counts.yes++;if(v?.choice==="no")counts.no++;});

  const withClubAuth=(action)=>{
    if(!passphrase||deviceUnlocked){action();return;}
    setPassModal({pendingAction:action});setPassTry("");setPassErr("");
  };
  const confirmPass=()=>{
    if(passTry.trim()!==passphrase){setPassErr("Wrong passphrase — ask admin if you don't have it.");return;}
    try{localStorage.setItem("lcc_club_unlocked",passphrase);}catch(e){}
    setDeviceUnlocked(true);passModal.pendingAction();setPassModal(null);
  };

  const setChoice=(id,choice)=>withClubAuth(()=>{
    if(!FB_OK||!DB)return;
    const existing=votes?.[id]||{};
    const next=existing.choice===choice?null:choice;
    DB.ref("poll/votes/"+id).set(JSON.parse(JSON.stringify({...existing,choice:next})));
    try{localStorage.setItem("lcc_poll_voted_as",id);}catch(e){}
    setMyVote(id);
  });

  const addKid=(id)=>withClubAuth(()=>{
    const nm=(kidDraft[id]||"").trim();
    if(!nm){alert("Enter the kid's name first.");return;}
    if(!FB_OK||!DB)return;
    const existing=votes?.[id]||{};
    const current=getKids(existing);
    DB.ref("poll/votes/"+id).set(JSON.parse(JSON.stringify({...existing,kids:[...current,nm]})));
    setKidDraft(d=>({...d,[id]:""}));
    setPlus1Open(null);
  });

  const removeKid=(id,kidName)=>withClubAuth(()=>{
    if(!FB_OK||!DB)return;
    const existing=votes?.[id]||{};
    const current=getKids(existing).filter(k=>k!==kidName);
    DB.ref("poll/votes/"+id).set(JSON.parse(JSON.stringify({...existing,kids:current})));
  });

  return(
    <div>
      <div className="mini-card" style={{marginBottom:14,textAlign:"center"}}>
        <p style={{color:"#fbbf24",fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,marginBottom:4}}>{poll.venue}</p>
        <p style={{color:"#a5b4fc",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>{new Date(poll.date+"T"+poll.time).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})} · {poll.time}</p>
        <div style={{display:"flex",justifyContent:"center",gap:18,marginTop:10,marginBottom:12}}>
          <span style={{color:"#34d399",fontSize:13,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>✅ {counts.yes} Yes</span>
          <span style={{color:"#f87171",fontSize:13,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>❌ {counts.no} No</span>
          <span style={{color:"#fbbf24",fontSize:13,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>👶 {counts.kids} Kids</span>
        </div>
        <ShareButton label="📤 Share Poll" buildText={()=>{
          const yesNames=Object.entries(votes||{}).filter(([,v])=>v?.choice==="yes").map(([id])=>roster?.[id]?.name).filter(Boolean).sort();
          const noNames=Object.entries(votes||{}).filter(([,v])=>v?.choice==="no").map(([id])=>roster?.[id]?.name).filter(Boolean).sort();
          const kidLines=Object.entries(votes||{}).flatMap(([id,v])=>
            getKids(v).map(k=>`${roster?.[id]?.name||"?"} → ${k}`)
          ).sort();
          const dateStr=new Date(poll.date+"T"+poll.time).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
          let txt=`🏏 LCC Weekend Match\n📍 ${poll.venue}\n📅 ${dateStr} · ${poll.time}\n\n✅ Yes (${yesNames.length}): ${yesNames.join(", ")||"—"}\n❌ No (${noNames.length}): ${noNames.join(", ")||"—"}`;
          if(kidLines.length) txt+=`\n👶 Bringing kids:\n${kidLines.map(l=>"  • "+l).join("\n")}`;
          return txt;
        }}/>
      </div>

      <p className="section-title">Tap your name to vote</p>
      {entries.length===0&&<p style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"20px 0"}}>No players in the roster yet — ask admin to add the team.</p>}
      {entries.map(([id,p])=>{
        const v=votes?.[id]||{};
        const isMe=myVote===id;
        const hasVoted=v.choice==="yes"||v.choice==="no";
        const showKidInput=plus1Open===id;
        const kids=getKids(v);
        return(

                ):(
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>setChoice(id,"yes")} style={{width:32,height:32,borderRadius:"50%",border:"1.5px solid rgba(52,211,153,.4)",background:"rgba(52,211,153,.1)",color:"#34d399",cursor:"pointer",fontSize:15}}>✅</button>
                    <button onClick={()=>setChoice(id,"no")} style={{width:32,height:32,borderRadius:"50%",border:"1.5px solid rgba(239,68,68,.4)",background:"rgba(239,68,68,.1)",color:"#f87171",cursor:"pointer",fontSize:15}}>❌</button>
                  </div>
                )}
                {/* ➕ Add kid button */}
                <button onClick={()=>setPlus1Open(plus1Open===id?null:id)}
                  style={{width:32,height:32,borderRadius:"50%",
                  border:`1.5px solid ${kids.length>0?"transparent":"rgba(245,158,11,.4)"}`,
                  background:kids.length>0?"linear-gradient(135deg,#f59e0b,#d97706)":"rgba(245,158,11,.1)",
                  color:kids.length>0?"#111":"#fbbf24",cursor:"pointer",fontSize:kids.length>0?11:15,
                  fontWeight:700}}
                  title={kids.length>0?`${kids.length} kid${kids.length>1?"s":""} — tap to manage`:"Bringing kids?"}>
                  {kids.length>0?kids.length:"➕"}
                </button>
              </div>
            </div>

            {/* Kids chips — always shown if any */}
            {kids.length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                {kids.map((k,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:5,
                    background:"rgba(245,158,11,.12)",border:"1px solid rgba(245,158,11,.3)",
                    borderRadius:20,padding:"3px 10px"}}>
                    <span style={{fontSize:11,color:"#fbbf24"}}>👶 {k}</span>
                    <button onClick={()=>removeKid(id,k)} style={{background:"none",border:"none",
                      color:"#6b7280",cursor:"pointer",fontSize:13,lineHeight:1,padding:0}}>×</button>
                  </div>
                ))}
              </div>
            )}

            {/* Add kid input */}
            {showKidInput&&(
              <div style={{display:"flex",gap:6,marginTop:8}}>
                <input value={kidDraft[id]||""} onChange={e=>setKidDraft(d=>({...d,[id]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&addKid(id)}
                  placeholder="Kid's name" autoFocus style={{flex:1,fontSize:12,padding:"7px 10px"}}/>
                <button onClick={()=>addKid(id)} style={{padding:"7px 12px",borderRadius:10,
                  border:"1.5px solid rgba(245,158,11,.4)",background:"transparent",
                  color:"#fbbf24",cursor:"pointer",fontWeight:700,fontSize:12}}>Add</button>
                <button onClick={()=>setPlus1Open(null)} style={{padding:"7px",borderRadius:10,
                  border:"none",background:"rgba(107,114,128,.15)",color:"#6b7280",cursor:"pointer",fontSize:13}}>✕</button>
              </div>
            )}
          </div>
        );
      })}
      {passphrase&&<p style={{color:"#4338ca",fontSize:11,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",marginTop:14}}>Club passphrase required once per device.</p>}

      {passModal&&(
        <Modal onClose={()=>setPassModal(null)} title="🔑 Club Passphrase">
          <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>Enter the shared club passphrase to vote. Only needed once on this device.</p>
          <input value={passTry} onChange={e=>{setPassTry(e.target.value);setPassErr("");}} placeholder="Passphrase" autoFocus onKeyDown={e=>e.key==="Enter"&&confirmPass()} style={{marginBottom:8}}/>
          {passErr&&<p style={{color:"#f87171",fontSize:12,marginBottom:10}}>{passErr}</p>}
          <button className="btn btn-primary w-full" onClick={confirmPass}>Confirm</button>
        </Modal>
      )}
    </div>
  );
}
function PollTeamsTab({roster,poll,votes,teams,role}){
  const[showBuilder,setShowBuilder]=React.useState(false);
  const[capA,setCapA]=React.useState(teams?.captainA||"");
  const[capB,setCapB]=React.useState(teams?.captainB||"");
  const[teamA,setTeamA]=React.useState(teams?.teamA||[]);
  const[teamB,setTeamB]=React.useState(teams?.teamB||[]);
  const isAdmin=role==="admin";

  React.useEffect(()=>{
    setCapA(teams?.captainA||"");setCapB(teams?.captainB||"");
    setTeamA(teams?.teamA||[]);setTeamB(teams?.teamB||[]);
  },[teams]);

  const nameOf=(id)=>roster?.[id]?.name||"(removed)";
  const publish=()=>{
    if(!capA.trim()||!capB.trim()){alert("Enter both captains' names.");return;}
    if(teamA.length===0||teamB.length===0){alert("Both teams need at least one player.");return;}
    if(!FB_OK||!DB){alert("Offline.");return;}
    const payload={captainA:capA.trim(),captainB:capB.trim(),teamA,teamB,published:true,publishedAt:Date.now()};
    DB.ref("poll/teams").set(payload)
      .then(()=>{
        // Also save to publishedTeams history so admin can reuse for multiple matches
        DB.ref("publishedTeams").push(payload).catch(()=>{});
        alert("Teams published!");setShowBuilder(false);
      })
      .catch(e=>alert("Failed: "+e.message));
  };
  const moveTo=(id,team)=>{
    setTeamA(a=>a.filter(x=>x!==id));setTeamB(b=>b.filter(x=>x!==id));
    if(team==="A")setTeamA(a=>[...a,id]);
    if(team==="B")setTeamB(b=>[...b,id]);
  };
  const remove=(id)=>{setTeamA(a=>a.filter(x=>x!==id));setTeamB(b=>b.filter(x=>x!==id));};
  const yesIds=Object.entries(votes||{}).filter(([,v])=>v?.choice==="yes").map(([id])=>id);
  const yesPlayers=yesIds.map(id=>({id,...(roster?.[id]||{name:"(removed)"})})).sort((a,b)=>a.name.localeCompare(b.name));
  const assigned=new Set([...teamA,...teamB]);
  const unassigned=yesPlayers.filter(p=>!assigned.has(p.id));

  // ── Published teams view — for everyone ───────────────────────────────────
  const PublishedView=()=>(
    <div>
      <div style={{background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.3)",borderRadius:14,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>✅</span>
        <div>
          <p style={{fontWeight:700,fontSize:13,color:"#34d399"}}>Teams Announced!</p>
          {teams.publishedAt&&<p style={{fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>{new Date(teams.publishedAt).toLocaleString()}</p>}
        </div>
      </div>
      <div className="grid-2" style={{gap:12,marginBottom:16}}>
        {[["A","#fbbf24","🟡",teams.captainA,teamA],["B","#6ee7b7","⚡",teams.captainB,teamB]].map(([t,col,em,cap,list])=>(
          <div key={t} style={{background:"rgba(255,255,255,.04)",border:`1.5px solid ${t==="A"?"rgba(245,158,11,.3)":"rgba(52,211,153,.3)"}`,borderRadius:16,padding:"14px 12px"}}>
            <p style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,color:col,marginBottom:2}}>{em} Team {t}</p>
            {cap&&<p style={{fontSize:11,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>Captain: {cap}</p>}
            {(list||[]).map(id=>(
              <div key={id} style={{fontSize:12,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.05)",display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:col,flexShrink:0,display:"inline-block"}}/>
                {nameOf(id)}{roster?.[id]?.keeper&&" 🧤"}
              </div>
            ))}
          </div>
        ))}
      </div>
      <ShareButton label="📤 Share Lineup" buildText={()=>{
        const dateStr=poll?new Date(poll.date+"T"+poll.time).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"}):"";
        return `🏏 LCC Teams${poll?` — ${poll.venue} · ${dateStr} ${poll.time}`:""}\n\n🟡 Team A${teams.captainA?` (${teams.captainA})`:""}:\n${(teamA||[]).map(id=>"  • "+nameOf(id)).join("\n")||"  —"}\n\n⚡ Team B${teams.captainB?` (${teams.captainB})`:""}:\n${(teamB||[]).map(id=>"  • "+nameOf(id)).join("\n")||"  —"}`;
      }}/>
      {isAdmin&&<button onClick={()=>setShowBuilder(true)} style={{width:"100%",marginTop:12,padding:"10px",borderRadius:12,border:"1px solid rgba(99,102,241,.35)",background:"transparent",color:"#a5b4fc",cursor:"pointer",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>✏️ Edit Teams (Admin)</button>}
    </div>
  );

  // ── Team builder — admin only ──────────────────────────────────────────────
  const BuilderView=()=>(
    <div>
      {teams?.published&&<button onClick={()=>setShowBuilder(false)} style={{background:"none",border:"none",color:"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",marginBottom:12}}>← Back to published teams</button>}
      <div className="mini-card" style={{marginBottom:14}}>
        <p className="section-title">👑 Captains</p>
        <div className="grid-2">
          <div><label>Team A Captain</label><input value={capA} onChange={e=>setCapA(e.target.value)} placeholder="Captain A"/></div>
          <div><label>Team B Captain</label><input value={capB} onChange={e=>setCapB(e.target.value)} placeholder="Captain B"/></div>
        </div>
      </div>
      <p className="section-title">Available — {unassigned.length} unassigned</p>
      {unassigned.length===0&&yesPlayers.length===0&&<p style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"12px 0"}}>No Yes votes yet.</p>}
      {unassigned.map(p=>(
        <div key={p.id} className="mini-card" style={{marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:600}}>{p.name}{p.keeper&&" 🧤"} <span style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>{p.role}</span></span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>moveTo(p.id,"A")} style={{background:"rgba(245,158,11,.15)",border:"1px solid rgba(245,158,11,.4)",color:"#fbbf24",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>→ A</button>
            <button onClick={()=>moveTo(p.id,"B")} style={{background:"rgba(52,211,153,.15)",border:"1px solid rgba(52,211,153,.4)",color:"#6ee7b7",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>→ B</button>
          </div>
        </div>
      ))}
      <div className="divider" style={{margin:"16px 0"}}/>
      <div className="grid-2" style={{gap:12}}>
        {[["A","#fbbf24","🟡",capA,teamA],["B","#6ee7b7","⚡",capB,teamB]].map(([t,col,em,cap,list])=>(
          <div key={t}>
            <p className="section-title" style={{color:col}}>{em} Team {t} ({list.length}){cap&&` · ${cap}`}</p>
            {list.map(id=>(
              <div key={id} className="mini-card" style={{marginBottom:6,padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12}}>{nameOf(id)}</span>
                <button onClick={()=>remove(id)} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:14}}>×</button>
              </div>
            ))}
          </div>
        ))}
      </div>
      <button className="btn btn-primary w-full" style={{marginTop:16}} onClick={publish}>📢 {teams?.published?"Update & Re-publish":"Publish Teams"}</button>
    </div>
  );

  // ── Routing ───────────────────────────────────────────────────────────────
  if(!poll) return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:40,marginBottom:10}}>🏏</div>
      <p style={{fontWeight:600,marginBottom:4}}>No poll open</p>
      <p style={{color:"#6b7280",fontSize:13}}>Teams are built from this week's poll responses.</p>
    </div>
  );
  if(teams?.published&&!showBuilder) return <PublishedView/>;
  if(isAdmin) return <BuilderView/>;
  return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:40,marginBottom:10}}>⏳</div>
      <p style={{fontWeight:600,marginBottom:4}}>Teams not announced yet</p>
      <p style={{color:"#6b7280",fontSize:13}}>Check back once the admin has finalised and published the teams.</p>
    </div>
  );
}

// ── Stats & Leaderboard page — career stats aggregated from match history ──────
function fmtAvg(v){return v===null?"—":v.toFixed(1);}
function fmtSR(v){return v===null?"—":v.toFixed(1);}
function fmtEcon(v){return v===null?"—":v.toFixed(2);}

// Initial-avatar for player cards
function PlayerAvatar({name,size=38}){
  const initial=(name||"?")[0].toUpperCase();
  const colors=[["#f59e0b","#ef4444"],["#6366f1","#8b5cf6"],["#10b981","#06b6d4"],
                ["#f97316","#ec4899"],["#14b8a6","#6366f1"],["#84cc16","#10b981"]];
  const [c1,c2]=colors[(name||"").charCodeAt(0)%colors.length];
  return(
    <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
      background:`linear-gradient(135deg,${c1},${c2})`,boxShadow:`0 2px 8px ${c1}55`,
      fontFamily:"'Oswald',sans-serif",fontSize:size*0.46,fontWeight:700,color:"#fff"}}>
      {initial}
    </div>
  );
}

function StatsPage({onExit}){
  const[history,setHistory]=React.useState(undefined);
  const[roster,setRoster]=React.useState({});
  const[view,setView]=React.useState("leaders");
  const[expanded,setExpanded]=React.useState(null);
  const[q,setQ]=React.useState("");
  const[venueF,setVenueF]=React.useState("All");
  React.useEffect(()=>{
    if(!FB_OK||!DB){setHistory({});return;}
    const hRef=DB.ref("history").limitToLast(200), rRef=DB.ref("roster");
    const c1=hRef.on("value",s=>setHistory(s.val()||{}));
    const c2=rRef.on("value",s=>setRoster(s.val()||{}));
    return ()=>{hRef.off("value",c1);rRef.off("value",c2);};
  },[]);
  if(history===undefined) return <Centered emoji="📊" title="Loading stats…" onExit={onExit}/>;

  const venueCounts={};
  Object.values(history||{}).forEach(m=>{const v=canonVenue(m&&m.venue);venueCounts[v]=(venueCounts[v]||0)+1;});
  const venueList=Object.keys(venueCounts).sort((a,b)=>{
    const rank=x=>x==="Lakes High School"?0:x==="Millennium Park"?1:2;
    return rank(a)-rank(b)||a.localeCompare(b);
  });
  const filteredHistory={};
  Object.entries(history||{}).forEach(([k,m])=>{if(venueF==="All"||canonVenue(m&&m.venue)===venueF)filteredHistory[k]=m;});
  const stats=computeCareerStats(filteredHistory,roster);
  const topRuns=[...stats].filter(s=>s.bat.runs>0).sort((a,b)=>b.bat.runs-a.bat.runs).slice(0,10);
  const topWkts=[...stats].filter(s=>s.bowl.wkts>0).sort((a,b)=>b.bowl.wkts-a.bowl.wkts||a.bowl.runs-b.bowl.runs).slice(0,10);
  const players=[...stats].sort((a,b)=>a.name.localeCompare(b.name))
    .filter(s=>!q.trim()||normName(s.name).includes(normName(q)));
  const hasData=stats.length>0;
  const matchCount=Object.keys(filteredHistory).length;

  // Club summary totals
  const clubRuns=stats.reduce((s,p)=>s+p.bat.runs,0);
  const clubWkts=stats.reduce((s,p)=>s+p.bowl.wkts,0);

  const MEDALS=["🥇","🥈","🥉"];

  // Full player stat card (expanded)
  const FullCard=({s})=>{
    const b=s.bat,w=s.bowl;
    const cell=(label,val,accent)=>(
      <div style={{flex:1,textAlign:"center"}}>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:19,fontWeight:700,color:accent||"#fff",lineHeight:1}}>{val}</div>
        <div style={{fontSize:9,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginTop:3}}>{label}</div>
      </div>
    );
    return(
      <div style={{padding:"12px 14px 14px"}}>
        {/* Batting */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
          <div style={{width:3,height:14,borderRadius:2,background:"#fbbf24"}}/>
          <span style={{fontSize:10,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,letterSpacing:".15em"}}>BATTING</span>
          <span style={{marginLeft:"auto",fontSize:10,color:"#4b5563",fontFamily:"'JetBrains Mono',monospace"}}>{s.matches} match{s.matches===1?"":"es"}</span>
        </div>
        <div style={{display:"flex",gap:4,marginBottom:14}}>
          {cell("Runs",b.runs,"#fbbf24")}{cell("Inns",b.inns)}{cell("HS",b.hs+(b.hsNotOut&&b.hs>0?"*":""))}{cell("Avg",fmtAvg(b.avg))}
          {cell("SR",fmtSR(b.sr))}{cell("4s",b.fours,"#fbbf24")}{cell("6s",b.sixes,"#34d399")}
        </div>
        {/* Bowling */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
          <div style={{width:3,height:14,borderRadius:2,background:"#f87171"}}/>
          <span style={{fontSize:10,color:"#f87171",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,letterSpacing:".15em"}}>BOWLING</span>
        </div>
        <div style={{display:"flex",gap:4}}>
          {cell("Wkts",w.wkts,"#f87171")}{cell("Overs",w.oversStr)}{cell("Econ",fmtEcon(w.econ))}{cell("Best",w.best,"#f87171")}
        </div>
        {(b.inns===0&&w.inns===0)&&<p style={{color:"#6b7280",fontSize:12,textAlign:"center",marginTop:10}}>No scored appearances yet.</p>}
      </div>
    );
  };

  const LeaderEntry=({s,rank,kind})=>{

    const val=kind==="runs"?s.bat.runs:s.bowl.wkts;

      <div style={{marginBottom:isTop3?10:6}}>
        <div onClick={()=>setExpanded(isExp?null:s.key+"_"+kind)} style={{
          display:"flex",alignItems:"center",gap:10,padding:isTop3?"12px 14px":"10px 12px",borderRadius:14,cursor:"pointer",
          background:isTop3?"rgba(255,255,255,.04)":"transparent",
          border:`1px solid ${isTop3?"rgba(255,255,255,.1)":"rgba(99,102,241,.12)"}`,
          transition:"background .15s"
        }}>
          <span style={{width:28,textAlign:"center",fontSize:isTop3?20:13,flexShrink:0}}>
            {rank<3?MEDALS[rank]:<span style={{fontFamily:"'Oswald',sans-serif",fontWeight:700,color:"#4b5563"}}>{rank+1}</span>}
          </span>
          <PlayerAvatar name={s.name} size={isTop3?36:28}/>
          <span style={{flex:1,overflow:"hidden"}}>
            <span style={{display:"block",fontWeight:700,fontSize:isTop3?15:13,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</span>
            {isTop3&&<span style={{display:"block",fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",marginTop:1}}>{s.matches}M · {kind==="runs"?s.bat.inns+" inn":s.bowl.oversStr+" ov"}</span>}
          </span>
          <div style={{textAlign:"right",flexShrink:0}}>
            <span style={{fontFamily:"'Oswald',sans-serif",fontSize:isTop3?22:16,fontWeight:700,color:accent}}>{val}</span>
            <span style={{fontSize:9,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",marginLeft:3}}>{unit}</span>
          </div>
          <span style={{color:"#4b5563",fontSize:11,transform:isExp?"rotate(180deg)":"none",transition:"transform .2s",flexShrink:0}}>▾</span>
        </div>
        {isExp&&(
          <div style={{background:"rgba(10,8,35,.5)",borderRadius:12,border:"1px solid rgba(99,102,241,.15)",marginTop:4}}>
            <FullCard s={s}/>
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{background:"linear-gradient(165deg,#022c1e,#0a2540,#1c1150,#2d0f5c,#0a0414)",minHeight:"100dvh"}}>
      <PageHeader title="📊 Club Stats" onBack={onExit} backLabel="home"
        right={<p style={{fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",margin:0}}>{venueF==="All"?"All":venueF} · {matchCount}M</p>}
      />
      {/* ── Content ── */}
      <div style={{padding:"14px 16px 0"}}>

        {/* Venue filter */}
        {venueList.length>0&&(
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
            {["All",...venueList].map(v=>{
              const active=venueF===v;
              const label=v==="Lakes High School"?"🎾 Lakes":v==="Millennium Park"?"🏟️ Millennium":v==="All"?"All":"📍 "+v;
              return(
                <button key={v} onClick={()=>{setVenueF(v);setExpanded(null);}} style={{
                  padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:600,
                  fontFamily:"'Inter',sans-serif",border:"none",transition:"all .15s",
                  background:active?"linear-gradient(135deg,#f59e0b,#ef4444)":"rgba(255,255,255,.07)",
                  color:active?"#111":"#9ca3af"
                }}>{label}{v!=="All"&&<span style={{opacity:.55,marginLeft:4}}>{venueCounts[v]}</span>}</button>
              );
            })}
          </div>
        )}

        {/* Club summary pills */}
        {hasData&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
            {[["Matches",matchCount,"#6366f1"],["Club Runs",clubRuns,"#fbbf24"],["Wickets",clubWkts,"#f87171"]].map(([lbl,val,col])=>(
              <div key={lbl} style={{background:"rgba(255,255,255,.04)",border:`1px solid ${col}28`,borderRadius:14,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:col,lineHeight:1}}>{val}</div>
                <div style={{fontSize:9,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginTop:3}}>{lbl.toUpperCase()}</div>
              </div>
            ))}
          </div>
        )}

      {/* ── Content ── */}

        {Object.keys(history).length===0?(
          <div style={{textAlign:"center",padding:"40px 16px"}}>
            <div style={{fontSize:48,marginBottom:12}}>📭</div>
            <p style={{fontWeight:700,fontSize:16,marginBottom:6}}>No stats yet</p>
            <p style={{color:"#6b7280",fontSize:13}}>Complete and save a match to start building club stats.</p>
          </div>
        ):!hasData?(
          <div style={{textAlign:"center",padding:"32px 16px"}}>
            <div style={{fontSize:40,marginBottom:10}}>🏟️</div>
            <p style={{fontWeight:700,marginBottom:4}}>No matches at {venueF}</p>
            <p style={{color:"#6b7280",fontSize:12}}>Try a different venue above.</p>
          </div>
        ):(<>
          {/* Tabs */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:18,
            background:"rgba(255,255,255,.04)",borderRadius:14,padding:4}}>
            {[["leaders","🏆 Leaders"],["players","👤 Players"],["records","🌟 Records"]].map(([id,lbl])=>(
              <button key={id} onClick={()=>setView(id)} style={{
                padding:"9px 4px",borderRadius:10,border:"none",cursor:"pointer",
                fontSize:12,fontWeight:600,fontFamily:"'Inter',sans-serif",transition:"all .15s",
                background:view===id?"linear-gradient(135deg,rgba(99,102,241,.6),rgba(139,92,246,.6))":"transparent",
                color:view===id?"#fff":"#6b7280",
                boxShadow:view===id?"0 2px 8px rgba(99,102,241,.3)":""
              }}>{lbl}</button>
            ))}
          </div>

          {/* ── LEADERS ── */}
          {view==="leaders"&&(
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:3,height:16,borderRadius:2,background:"#fbbf24"}}/>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:"#fbbf24",letterSpacing:".15em"}}>MOST RUNS</span>
              </div>
              {topRuns.length?topRuns.map((s,i)=><LeaderEntry key={s.key} s={s} rank={i} kind="runs"/>)
                :<p style={{color:"#6b7280",fontSize:12,marginBottom:16}}>No runs recorded yet.</p>}

              <div style={{height:1,background:"rgba(255,255,255,.06)",margin:"16px 0"}}/>

              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:3,height:16,borderRadius:2,background:"#f87171"}}/>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:"#f87171",letterSpacing:".15em"}}>MOST WICKETS</span>
              </div>
              {topWkts.length?topWkts.map((s,i)=><LeaderEntry key={s.key} s={s} rank={i} kind="wkts"/>)
                :<p style={{color:"#6b7280",fontSize:12}}>No wickets recorded yet.</p>}
              <p style={{color:"#4338ca",fontSize:10,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",marginTop:16}}>Tap any player to see their full stats</p>
            </div>
          )}

          {/* ── PLAYERS ── */}
          {view==="players"&&(
            <div>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Search players…" style={{marginBottom:12}}/>
              {players.length===0&&<p style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"16px 0"}}>No players match "{q}".</p>}
              {players.map(s=>(
                <div key={s.key} style={{marginBottom:8,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:16,overflow:"hidden"}}>
                  <button onClick={()=>setExpanded(expanded===s.key?null:s.key)} style={{
                    width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 14px",
                    background:"transparent",border:"none",cursor:"pointer",color:"#fff",textAlign:"left"}}>
                    <PlayerAvatar name={s.name} size={42}/>
                    <span style={{flex:1,overflow:"hidden"}}>
                      <span style={{display:"block",fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {s.name}
                        {!s.pid&&<span style={{color:"#4b5563",fontSize:10,marginLeft:6,fontFamily:"'JetBrains Mono',monospace"}}>unlinked</span>}
                      </span>
                      <span style={{display:"flex",gap:12,marginTop:3}}>
                        <span style={{fontSize:11,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace"}}>{s.bat.runs} runs</span>
                        <span style={{fontSize:11,color:"#f87171",fontFamily:"'JetBrains Mono',monospace"}}>{s.bowl.wkts} wkts</span>
                        <span style={{fontSize:11,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>{s.matches}M</span>
                      </span>
                    </span>
                    <span style={{color:"#4b5563",fontSize:12,transform:expanded===s.key?"rotate(180deg)":"none",transition:"transform .2s",flexShrink:0}}>▾</span>
                  </button>
                  {expanded===s.key&&(
                    <div style={{borderTop:"1px solid rgba(255,255,255,.06)"}}>
                      <FullCard s={s}/>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* ── RECORDS ── */}
          {view==="records"&&(()=>{
            const allBat=[],allBowl=[];
            Object.entries(filteredHistory||{}).forEach(([,m])=>{
              [m&&m.inn1,m&&m.inn2].forEach(inn=>{
                if(!inn)return;
                const vn=canonVenue(m.venue||inn.venue||"");
                const dt=m.finishedAt?new Date(m.finishedAt).toLocaleDateString():"";
                (inn.battingOrder||[]).forEach(name=>{const b=inn.batsmen&&inn.batsmen[name];if(!b)return;allBat.push({name,runs:b.runs||0,balls:b.balls||0,fours:b.fours||0,sixes:b.sixes||0,out:b.out,vn,dt});});
                (inn.bowlingOrder||[]).forEach(name=>{const w=inn.bowlers&&inn.bowlers[name];if(!w)return;const balls=(w.overs||0)*6+(w.ballsThisOver||0);allBowl.push({name,wkts:w.wickets||0,runs:w.runs||0,balls,maidens:w.maidens||0,vn,dt});});
              });
            });
            const hsEntry=[...allBat].sort((a,b)=>b.runs-a.runs||a.balls-b.balls)[0]||null;
            const mostSixes=[...allBat].sort((a,b)=>b.sixes-a.sixes)[0]||null;
            const mostFours=[...allBat].sort((a,b)=>b.fours-a.fours)[0]||null;
            const bestBowl=[...allBowl].filter(w=>w.wkts>0).sort((a,b)=>b.wkts-a.wkts||a.runs-b.runs)[0]||null;
            const mostMaidens=[...allBowl].filter(w=>w.maidens>0).sort((a,b)=>b.maidens-a.maidens)[0]||null;
            const RC=({accent,icon,title,name,value,detail})=>(
              <div style={{display:"flex",gap:0,marginBottom:10,borderRadius:16,overflow:"hidden",
                border:"1px solid rgba(255,255,255,.07)"}}>
                <div style={{width:4,background:accent,flexShrink:0}}/>
                <div style={{flex:1,display:"flex",alignItems:"center",gap:12,padding:"13px 14px",
                  background:"rgba(255,255,255,.03)"}}>
                  <span style={{fontSize:24,flexShrink:0}}>{icon}</span>
                  <div style={{flex:1,overflow:"hidden"}}>
                    <div style={{fontSize:9,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".12em",marginBottom:3}}>{title}</div>
                    <div style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                    <div style={{fontSize:11,color:accent,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{value}</div>
                  </div>
                  {detail&&<div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:9,color:"#4b5563",fontFamily:"'JetBrains Mono',monospace",lineHeight:1.6}}>{detail.split("·").map((d,i)=><div key={i}>{d.trim()}</div>)}</div>
                  </div>}
                </div>
              </div>
            );
            if(!hsEntry&&!bestBowl)return<p style={{color:"#6b7280",textAlign:"center",padding:"20px 0",fontSize:13}}>No records yet for this venue.</p>;
            return(
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <div style={{width:3,height:16,borderRadius:2,background:"#fbbf24"}}/>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:"#fbbf24",letterSpacing:".15em"}}>BATTING</span>
                </div>
                {hsEntry&&<RC accent="#fbbf24" icon="👑" title="HIGHEST SCORE" name={hsEntry.name} value={`${hsEntry.runs+(hsEntry.out?"":"*")} off ${hsEntry.balls} balls`} detail={`${hsEntry.vn}·${hsEntry.dt}`}/>}
                {mostSixes&&mostSixes.sixes>0&&<RC accent="#34d399" icon="💥" title="MOST SIXES (innings)" name={mostSixes.name} value={`${mostSixes.sixes} sixes`} detail={`${mostSixes.vn}·${mostSixes.dt}`}/>}
                {mostFours&&mostFours.fours>0&&<RC accent="#fbbf24" icon="🏃" title="MOST FOURS (innings)" name={mostFours.name} value={`${mostFours.fours} fours`} detail={`${mostFours.vn}·${mostFours.dt}`}/>}
                <div style={{height:1,background:"rgba(255,255,255,.06)",margin:"16px 0"}}/>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <div style={{width:3,height:16,borderRadius:2,background:"#f87171"}}/>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:"#f87171",letterSpacing:".15em"}}>BOWLING</span>
                </div>
                {bestBowl?<RC accent="#f87171" icon="🎳" title="BEST BOWLING" name={bestBowl.name} value={`${bestBowl.wkts}/${bestBowl.runs}`} detail={`${bestBowl.vn}·${bestBowl.dt}`}/>:<p style={{color:"#6b7280",fontSize:12,marginBottom:10}}>No wickets recorded yet.</p>}
                {mostMaidens&&<RC accent="#a5b4fc" icon="🔒" title="MOST MAIDENS" name={mostMaidens.name} value={`${mostMaidens.maidens} maiden${mostMaidens.maidens>1?"s":""}`} detail={`${mostMaidens.vn}·${mostMaidens.dt}`}/>}
              </div>
            );
          })()}
        </>)}
      </div>
    </div>
  );
}
// ── Super Admin: Announcement manager — post a notice visible on the home screen
function AnnouncementPage({onExit}){
  const[current,setCurrent]=React.useState(undefined);
  const[text,setText]=React.useState("");
  const[by,setBy]=React.useState("");
  React.useEffect(()=>{
    if(!FB_OK||!DB){setCurrent(null);return;}
    const ref=DB.ref("announcement");
    const cb=ref.on("value",s=>{const v=s.val()||null;setCurrent(v);setText(v?.text||"");setBy(v?.by||"");});
    return ()=>ref.off("value",cb);
  },[]);
  const save=()=>{
    const t=text.trim();
    if(!t){alert("Enter the announcement text.");return;}
    if(!FB_OK||!DB){alert("Offline.");return;}
    DB.ref("announcement").set({text:t,by:by.trim()||"Admin",postedAt:Date.now()})
      .then(()=>alert("Announcement posted! Everyone will see it on the home screen."))
      .catch(e=>alert("Failed: "+e.message));
  };
  const clear=()=>{
    if(!confirm("Remove the current announcement?"))return;
    DB.ref("announcement").remove().catch(e=>alert("Failed: "+e.message));
  };
  if(current===undefined) return <Centered emoji="📢" title="Loading…" onExit={onExit}/>;
  return(
    <div style={{background:"linear-gradient(165deg,#022c1e,#0a2540,#1c1150,#2d0f5c,#0a0414)",minHeight:"100dvh",padding:"20px 16px"}}>
      <div className="resp-wrap">
        <div className="flex items-center justify-between" style={{marginBottom:18}}>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:26,fontWeight:700}}>📢 Announcements</h1>
          <button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:13,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← back</button>
        </div>
        {current&&current.text&&(
          <div style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",borderRadius:14,padding:"12px 14px",marginBottom:16}}>
            <p style={{fontSize:10,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>CURRENT ANNOUNCEMENT</p>
            <p style={{fontSize:13,color:"#fff"}}>{current.text}</p>
            {current.by&&<p style={{fontSize:10,color:"#6b7280",marginTop:4}}>— {current.by} · {current.postedAt?new Date(current.postedAt).toLocaleDateString():""}</p>}
            <button onClick={clear} style={{marginTop:10,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.4)",color:"#f87171",borderRadius:10,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>🗑️ Remove Announcement</button>
          </div>
        )}
        <div className="mini-card">
          <p className="section-title">{current?"✏️ Update Announcement":"➕ Post Announcement"}</p>
          <label>Message (shown on the home screen for all players)</label>
          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="e.g. Match this Saturday at Lakes — 9am sharp!" rows={3}
            style={{width:"100%",background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,fontFamily:"'Inter',sans-serif",outline:"none",resize:"vertical",marginBottom:12}}/>
          <label>Posted by (optional)</label>
          <input value={by} onChange={e=>setBy(e.target.value)} placeholder="Your name" style={{marginBottom:14}}/>
          <button className="btn btn-primary w-full" onClick={save}>📢 {current?"Update":"Post"} Announcement</button>
        </div>
      </div>
    </div>
  );
}

// ── Basic Admin: Player Tools — merge, link, bulk-add ─────────────────────────
function PlayerToolsPage({onExit}){
  const[roster,setRoster]=React.useState(undefined);
  const[history,setHistory]=React.useState({});
  const[tab,setTab]=React.useState("merge");
  React.useEffect(()=>{
    if(!FB_OK||!DB){setRoster({});return;}
    const rRef=DB.ref("roster"), hRef=DB.ref("history").limitToLast(200);
    const c1=rRef.on("value",s=>setRoster(s.val()||{}));
    const c2=hRef.on("value",s=>setHistory(s.val()||{}));
    return ()=>{rRef.off("value",c1);hRef.off("value",c2);};
  },[]);
  if(roster===undefined) return <Centered emoji="🔧" title="Loading…" onExit={onExit}/>;

  function MergeTab(){
    const[primary,setPrimary]=React.useState("");
    const[dup,setDup]=React.useState("");
    const[saving,setSaving]=React.useState(false);
    const entries=Object.entries(roster).sort((a,b)=>a[1].name.localeCompare(b[1].name));
    const doMerge=()=>{
      if(!primary||!dup){alert("Select both profiles.");return;}
      if(primary===dup){alert("Can't merge a profile with itself.");return;}
      if(!confirm(`Merge "${roster[dup]?.name}" INTO "${roster[primary]?.name}"? The duplicate profile will be removed.`))return;
      setSaving(true);
      DB.ref("roster/"+dup).remove()
        .then(()=>{setSaving(false);setPrimary("");setDup("");alert("Merged! Duplicate removed. Stats will consolidate under the primary name.");})
        .catch(e=>{setSaving(false);alert("Failed: "+e.message);});
    };
    return(<div>
      <p style={{color:"#9ca3af",fontSize:12,marginBottom:14,lineHeight:1.5}}>Pick the profile to KEEP as Primary, and the one to REMOVE as Duplicate (e.g. "Raj" vs "Rajesh Arigela").</p>
      <label>Primary profile (KEEP)</label>
      <select value={primary} onChange={e=>setPrimary(e.target.value)} style={{width:"100%",background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,marginBottom:12,outline:"none"}}>
        <option value="">Select profile to keep…</option>
        {entries.filter(([id])=>id!==dup).map(([id,p])=><option key={id} value={id}>{p.name}</option>)}
      </select>
      <label>Duplicate profile (REMOVE)</label>
      <select value={dup} onChange={e=>setDup(e.target.value)} style={{width:"100%",background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,marginBottom:14,outline:"none"}}>
        <option value="">Select profile to remove…</option>
        {entries.filter(([id])=>id!==primary).map(([id,p])=><option key={id} value={id}>{p.name}</option>)}
      </select>
      {primary&&dup&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:12,padding:"10px 14px",marginBottom:14}}>
        <p style={{color:"#f87171",fontSize:12}}>⚠️ <strong>"{roster[dup]?.name}"</strong> will be permanently removed. Stats consolidate under <strong>"{roster[primary]?.name}"</strong>.</p>
      </div>}
      <button className="btn btn-danger w-full" style={{borderRadius:14}} onClick={doMerge} disabled={saving||!primary||!dup}>{saving?"Merging…":"🔀 Merge Profiles"}</button>
    </div>);
  }

  function LinkTab(){
    const[saving,setSaving]=React.useState(null);
    const resolve=buildPidResolver(roster);
    const unlinked=new Set();
    Object.values(history||{}).forEach(m=>{
      [m&&m.inn1,m&&m.inn2].forEach(inn=>{
        if(!inn)return;
        [...(inn.battingOrder||[]),...(inn.bowlingOrder||[])].forEach(name=>{
          const pid=(inn.batsmen&&inn.batsmen[name]&&inn.batsmen[name].pid)||(inn.bowlers&&inn.bowlers[name]&&inn.bowlers[name].pid)||resolve(name);
          if(!pid) unlinked.add(name);
        });
      });
    });
    const unlinkedList=[...unlinked].sort((a,b)=>a.localeCompare(b));
    const[links,setLinks]=React.useState({});
    const rosterEntries=Object.entries(roster).sort((a,b)=>a[1].name.localeCompare(b[1].name));
    const saveLink=(typedName,profileId)=>{
      if(!profileId){alert("Select a profile.");return;}
      const profile=roster[profileId];
      if(!confirm(`Link all appearances of "${typedName}" to "${profile.name}"'s profile?`))return;
      setSaving(typedName);
      const current=profile.aliases||[];
      if(current.includes(typedName)){setSaving(null);setLinks(l=>({...l,[typedName]:"done"}));return;}
      DB.ref("roster/"+profileId+"/aliases").set([...current,typedName])
        .then(()=>{setSaving(null);setLinks(l=>({...l,[typedName]:"done"}));})
        .catch(e=>{setSaving(null);alert("Failed: "+e.message);});
    };
    if(unlinkedList.length===0) return(<div style={{textAlign:"center",padding:"24px 0"}}><div style={{fontSize:32,marginBottom:8}}>✅</div><p style={{color:"#34d399",fontWeight:600,fontSize:14}}>All match names are linked to profiles!</p></div>);
    return(<div>
      <p style={{color:"#9ca3af",fontSize:12,marginBottom:14,lineHeight:1.5}}>{unlinkedList.length} name{unlinkedList.length>1?"s":""} in history not linked to a profile. Match each to the right person.</p>
      {unlinkedList.map(name=>(
        <div key={name} className="mini-card" style={{marginBottom:8}}>
          <p style={{fontWeight:600,fontSize:13,marginBottom:8,color:"#fbbf24"}}>"{name}"</p>
          {links[name]==="done"?<p style={{color:"#34d399",fontSize:12}}>✓ Linked!</p>:(
            <div style={{display:"flex",gap:8}}>
              <select defaultValue="" onChange={e=>setLinks(l=>({...l,[name]:e.target.value}))} style={{flex:1,background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:10,padding:"8px 12px",color:"#fff",fontSize:13,outline:"none"}}>
                <option value="">Match to profile…</option>
                {rosterEntries.map(([id,p])=><option key={id} value={id}>{p.name}</option>)}
              </select>
              <button onClick={()=>saveLink(name,links[name])} disabled={!links[name]||saving===name} style={{padding:"8px 14px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#f59e0b,#ef4444)",color:"#111",fontWeight:700,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>{saving===name?"…":"Link"}</button>
            </div>
          )}
        </div>
      ))}
    </div>);
  }

  function BulkAddTab(){
    const[text,setText]=React.useState("");
    const[saving,setSaving]=React.useState(false);
    const[done,setDone]=React.useState(null);
    const doAdd=()=>{
      const names=text.split("\n").map(n=>n.trim()).filter(n=>n.length>1);
      if(names.length===0){alert("Enter at least one name.");return;}
      if(!FB_OK||!DB){alert("Offline.");return;}
      setSaving(true);
      const existing=new Set(Object.values(roster).map(p=>normName(p.name)));
      const toAdd=names.filter(n=>!existing.has(normName(n)));
      if(toAdd.length===0){setSaving(false);alert("All names already exist in the roster.");return;}
      const updates={};
      toAdd.forEach(name=>{
        const id="p_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
        updates["roster/"+id]={name,role:"Batsman",bat:"Right",keeper:false,bowl:null};
      });
      DB.ref().update(updates)
        .then(()=>{setSaving(false);setDone(toAdd);setText("");})
        .catch(e=>{setSaving(false);alert("Failed: "+e.message);});
    };
    return(<div>
      <p style={{color:"#9ca3af",fontSize:12,marginBottom:12,lineHeight:1.5}}>One full name per line. Duplicates are skipped. New players default to "Batsman" — edit individually after.</p>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"Rajesh Arigela\nRanjith Kumar\nPradeep Singh"} rows={6}
        style={{width:"100%",background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,fontFamily:"'Inter',sans-serif",outline:"none",resize:"vertical",marginBottom:14}}/>

// ── Basic Admin: Vote on behalf of players ────────────────────────────────────
function VoteOnBehalfPage({onExit}){
  const[roster,setRoster]=React.useState(undefined);
  const[votes,setVotes]=React.useState({});
  const[poll,setPoll]=React.useState(undefined);
  const[saving,setSaving]=React.useState(null);
  React.useEffect(()=>{
    if(!FB_OK||!DB){setRoster({});setPoll(null);return;}
    const rRef=DB.ref("roster"), vRef=DB.ref("poll/votes"), pRef=DB.ref("poll/current");
    const c1=rRef.on("value",s=>setRoster(s.val()||{}));
    const c2=vRef.on("value",s=>setVotes(s.val()||{}));
    const c3=pRef.on("value",s=>setPoll(s.val()||null));
    return ()=>{rRef.off("value",c1);vRef.off("value",c2);pRef.off("value",c3);};
  },[]);
  if(roster===undefined||poll===undefined) return <Centered emoji="📋" title="Loading…" onExit={onExit}/>;
  const setVote=(id,choice)=>{
    setSaving(id);
    const existing=votes[id]||{};
    DB.ref("poll/votes/"+id).set(JSON.parse(JSON.stringify({...existing,choice})))
      .then(()=>setSaving(null)).catch(e=>{setSaving(null);alert("Failed: "+e.message);});
  };
  const clearVote=(id)=>{
    setSaving(id);
    DB.ref("poll/votes/"+id).remove().then(()=>setSaving(null)).catch(e=>{setSaving(null);alert("Failed: "+e.message);});
  };
  const entries=Object.entries(roster||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));
  return(
    <div style={{background:"linear-gradient(165deg,#022c1e,#0a2540,#1c1150,#2d0f5c,#0a0414)",minHeight:"100dvh",padding:"20px 16px"}}>
      <div className="resp-wrap">
        <div className="flex items-center justify-between" style={{marginBottom:4}}>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:24,fontWeight:700}}>🗳️ Vote on Behalf</h1>
          <button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:13,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← back</button>
        </div>
        {!poll?(<div className="mini-card" style={{textAlign:"center",padding:"24px"}}><div style={{fontSize:32,marginBottom:8}}>📋</div><p style={{color:"#6b7280"}}>No poll is open right now.</p></div>):(
          <div>
            <div style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.3)",borderRadius:14,padding:"10px 14px",marginBottom:14}}>
              <p style={{fontSize:12,color:"#a5b4fc",fontFamily:"'JetBrains Mono',monospace"}}>📋 {poll.venue} · {poll.date} {poll.time}</p>
              <p style={{fontSize:11,color:"#6b7280",marginTop:4}}>Mark availability for players who haven't voted yet.</p>
            </div>
            {entries.map(([id,p])=>{
              const v=votes[id]; const choice=v?.choice;
              return(
                <div key={id} className="mini-card" style={{marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                  <span style={{fontWeight:600,fontSize:13,flex:1}}>{p.name}{choice&&<span style={{fontSize:10,color:choice==="yes"?"#34d399":"#f87171",marginLeft:8,fontFamily:"'JetBrains Mono',monospace"}}>{choice==="yes"?"✅":"❌"}</span>}</span>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    {saving===id?<span style={{color:"#6b7280",fontSize:12}}>…</span>:(<>
                      <button onClick={()=>choice==="yes"?clearVote(id):setVote(id,"yes")} style={{padding:"6px 12px",borderRadius:10,border:"none",background:choice==="yes"?"linear-gradient(135deg,#34d399,#10b981)":"rgba(52,211,153,.15)",color:choice==="yes"?"#111":"#34d399",fontWeight:700,fontSize:12,cursor:"pointer"}}>✅</button>
                      <button onClick={()=>choice==="no"?clearVote(id):setVote(id,"no")} style={{padding:"6px 12px",borderRadius:10,border:"none",background:choice==="no"?"linear-gradient(135deg,#dc2626,#991b1b)":"rgba(239,68,68,.15)",color:choice==="no"?"#fff":"#f87171",fontWeight:700,fontSize:12,cursor:"pointer"}}>❌</button>
                    </>)}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function SuperAdminHome({onScore,onHistory,onAnnounce,onRoster,onStats,onPoll,onPins,onVoteOnBehalf,onPlayerTools,onExit}){
  return <AdminHome tier="super" onPick={(s)=>{
    if(s==="admin")       onScore();
    else if(s==="history")   onHistory();
    else if(s==="announce")  onAnnounce();
    else if(s==="roster")    onRoster();
    else if(s==="stats")     onStats();
    else if(s==="pollAdmin") onPoll();
    else if(s==="poll")      onPoll();
    else if(s==="pinMgmt")   onPins();
    else if(s==="voteOnBehalf") onVoteOnBehalf();
    else if(s==="playerTools")  onPlayerTools();
  }} onExit={onExit}/>;
}

function BasicAdminHome({onPick,onExit}){
  return <AdminHome tier="basic" onPick={onPick} onExit={onExit}/>;
}

function Root(){
  const[screen,setScreen]=React.useState("landing");
  const[gate,setGate]=React.useState(null);
  const[adminTier,setAdminTier]=React.useState(null);
  const[dynPins,setDynPins]=React.useState(null);

  // ── Browser back button handling ──────────────────────────────────────────
  // Maintain an in-app navigation stack. Every setScreen() pushes a browser
  // history entry so the back button stays inside the app instead of leaving.
  const navStack=React.useRef(["landing"]);

  const go=(s)=>{
    navStack.current=[...navStack.current,s];
    window.history.pushState({screen:s,depth:navStack.current.length},"");
    setScreen(s);
    setGate(null);
  };
  const goBack=()=>{
    if(navStack.current.length>1){
      navStack.current=navStack.current.slice(0,-1);
      const prev=navStack.current[navStack.current.length-1];
      setScreen(prev);
      // If going back past any admin screen to landing, clear admin state
      if(prev==="landing") setGate(null);
    } else {
      setScreen("landing");
      setGate(null);
    }
  };

  React.useEffect(()=>{
    // Seed the initial history entry
    window.history.replaceState({screen:"landing",depth:1},"");
    const onPop=()=>goBack();
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[]);

  // Wrap setScreen so it also updates navStack and browser history
  const nav=(s)=>go(s);
  const home=()=>{
    navStack.current=["landing"];
    window.history.replaceState({screen:"landing",depth:1},"");
    setScreen("landing");
    setGate(null);
    setAdminTier(null); // Clear admin tier so stale tier never contaminates next login
  };
  const pick=(r)=>{
    if(r==="scorer"){setGate("scorer");}
    else if(r==="admin"){setGate("admin");}
    else nav(r);
  };

  if(gate==="scorer") return <ScorerGate onOk={()=>{setGate(null);setScreen("scorer");}} onCancel={home}/>;
  if(gate==="admin")  return <PinGate title="Admin Access" hint="Super or Basic admin PIN"
    verify={(v)=>{
      const pins=dynPins||{super:ADMIN_PIN,basic:BASIC_ADMIN_PIN};
      if(v===pins.super) return {ok:true, tier:"super"};
      if(v===pins.basic) return {ok:true, tier:"basic"};
      return {ok:false, msg:"❌ Wrong PIN, try again"};
    }}
    onOk={(r)=>{
      setGate(null);
      setAdminTier(r.tier);
      const dest=r.tier==="super"?"superAdmin":"basicAdmin";
      // Reset navStack on every login so browser back can never reach wrong screen
      navStack.current=["landing",dest];
      window.history.replaceState({screen:"landing",depth:1},"");
      window.history.pushState({screen:dest,depth:2},"");
      setScreen(dest);
    }}
    onCancel={home}/>;

  const isAdmin=adminTier!==null;
  const isSuper=adminTier==="super";
  const adminHome=adminTier==="super"?"superAdmin":adminTier==="basic"?"basicAdmin":"landing";

  if(screen==="landing") return <Landing onPick={pick}/>;
  if(screen==="viewer")  return <ViewerLive onExit={home}/>;
  if(screen==="basicAdmin") return <BasicAdminHome onPick={nav} onExit={home}/>;
  if(screen==="history") return <HistoryPage role={isSuper?"admin":"viewer"} onExit={()=>nav(adminHome)}/>;
  if(screen==="poll")    return <PollPage role={isAdmin?"admin":"viewer"} onExit={()=>nav(adminHome)}/>;
  if(screen==="roster")  return <RosterPage role={isAdmin?"admin":"viewer"} onExit={()=>nav(adminHome)}/>;
  if(screen==="stats")   return <StatsPage onExit={()=>nav(adminHome)}/>;
  if(screen==="pollAdmin") return <PollAdminPage onExit={()=>nav(adminHome)}/>;
  if(screen==="announce") return <AnnouncementPage onExit={()=>nav(adminHome)}/>;
  if(screen==="playerTools") return <PlayerToolsPage onExit={()=>nav(adminHome)}/>;
  if(screen==="voteOnBehalf") return <VoteOnBehalfPage onExit={()=>nav(adminHome)}/>;
  if(screen==="scorer")    return <App role="scorer" onExit={home}/>;
  if(screen==="adminScore") return <App role="admin" onExit={()=>nav(adminHome)} onHistory={()=>nav("history")} onPoll={()=>nav("pollAdmin")} onRoster={()=>nav("roster")} onAnnounce={()=>nav("announce")}/>;
  if(screen==="superAdmin") return <SuperAdminHome
    onScore={()=>nav("admin")}
    onHistory={()=>nav("history")}
    onStats={()=>nav("stats")}
    onPoll={()=>nav("pollAdmin")}
    onRoster={()=>nav("roster")}
    onAnnounce={()=>nav("announce")}
    onPins={()=>nav("pinMgmt")}
    onVoteOnBehalf={()=>nav("voteOnBehalf")}
    onPlayerTools={()=>nav("playerTools")}
    onExit={home}/>;
  if(screen==="pinMgmt") return <PinMgmtModal onClose={()=>nav(adminHome)}/>;
  if(screen==="admin") return <App role="admin" onExit={()=>nav(adminHome)} onHistory={()=>nav("history")} onPoll={()=>nav("pollAdmin")} onRoster={()=>nav("roster")} onAnnounce={()=>nav("announce")}/>;
  return <Landing onPick={pick}/>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  componentDidCatch(error,info){console.error("App crashed:",error,info);}
  render(){
    if(this.state.error){
      return(
        <div className="screen">
          <div className="card" style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
            <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,marginBottom:10}}>Something went wrong</h2>
            <p style={{color:"#9ca3af",fontSize:12,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>{String(this.state.error.message||this.state.error)}</p>
            <p style={{color:"#6b7280",fontSize:12,marginBottom:18}}>This is usually caused by stale match data. Tap below to reset and go home — the live match (if any) is unaffected on the server.</p>
            <button className="btn btn-primary w-full" onClick={()=>{this.setState({error:null});window.location.hash="";window.location.reload();}}>🔄 Reset & Reload</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.render(<ErrorBoundary><Root/></ErrorBoundary>,document.getElementById("root"));
</script>
