// ── Free Hit sound — played when a No Ball is recorded ────────────────────────
// Uses a module-level AudioContext so it's accessible from anywhere.
let _fhCtx = null;
function playFreeHitSound(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return;
    if(!_fhCtx)_fhCtx=new Ctx();
    const ctx=_fhCtx;
    if(ctx.state==="suspended")ctx.resume();
    // Ascending G-B-D-G fanfare — distinctive, unmistakable
    [392,494,587,784].forEach((freq,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      const t=ctx.currentTime+i*0.13;
      osc.type="sine";osc.frequency.setValueAtTime(freq,t);
      gain.gain.setValueAtTime(0.0001,t);
      gain.gain.exponentialRampToValueAtTime(0.22,t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(t);osc.stop(t+0.32);
    });
  }catch(e){}
}

// ── QuickAddPlayer — adds a new club member to the roster mid-match ──────────
// Scorer/admin taps "+ Add to club", types a name, saves to Firebase.
// The real-time roster listener in App picks it up instantly — player appears
// in quick-tap buttons for the rest of the match.
function QuickAddPlayer({onAdded,onCancel}){
  const[name,setName]=React.useState("");
  const[saving,setSaving]=React.useState(false);
  const save=()=>{
    const nm=name.trim();if(!nm){alert("Enter a name.");return;}
    if(!FB_OK||!DB){alert("Can't add player — offline.");return;}
    setSaving(true);
    const id="p_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
    DB.ref("roster/"+id).set({name:nm,role:"All-rounder",keeper:false,bat:"Right",bowl:null})
      .then(()=>{ setSaving(false); onAdded(nm); })
      .catch(e=>{ setSaving(false); alert("Failed: "+e.message); });
  };
  return(
    <div style={{background:"rgba(16,185,129,.08)",border:"1.5px solid rgba(16,185,129,.35)",borderRadius:12,padding:"10px 12px",marginTop:8}}>
      <p style={{fontSize:10,color:"#34d399",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:8}}>➕ ADD NEW CLUB MEMBER</p>
      <div style={{display:"flex",gap:8}}>
        <input value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&save()}
          placeholder="Player name" autoFocus style={{flex:1,fontSize:13}}/>
        <button onClick={save} disabled={saving} style={{
          padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,
          background:"linear-gradient(135deg,#10b981,#059669)",color:"#111",whiteSpace:"nowrap",
          opacity:saving?.6:1
        }}>{saving?"Saving…":"Add ✓"}</button>
        <button onClick={onCancel} style={{padding:"8px 10px",borderRadius:10,border:"1px solid rgba(107,114,128,.3)",background:"transparent",color:"#6b7280",cursor:"pointer",fontSize:13}}>✕</button>
      </div>
      <p style={{fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",marginTop:6}}>Saved to club roster · they can add details later from Join the Club</p>
    </div>
  );
}

function ScoreTab({inn,SK,NS,BW,record,rosterNames,match,pw,nbn,setNBN,confBatsman,nnb,nbwn,setNBWN,confBowler,pr,onRetire,onSwapStrike,onFixPlayers,onEndInnings,onRevert,canRevert,role,onEditOvers,onRestore,onUndo,canUndo}){
  const[wt,setWT]=useState("Bowled");
  const[fielder,setFielder]=useState("");
  const[roRuns,setRoRuns]=useState(0);      // runs completed before the run-out happened
  const[roEnd,setRoEnd]=useState(null);     // "striker" | "nonStriker" — which end the dismissal occurred at
  const[roOut,setRoOut]=useState(null);     // explicit: which batsman got run out (by name) — removes 0-run ambiguity
  const[showW,setSW]=useState(false);
  const[em,setEM]=useState(null);
  const[er,setER]=useState(0);
  const[showOT,setShowOT]=useState(false);
  const[otBase,setOTBase]=useState(0);
  const[otThrow,setOTThrow]=useState(1);
  const[showFH,setShowFH]=useState(false);
  const[isFreeHit,setIsFreeHit]=useState(false); // true on the delivery AFTER a No Ball
  const[quickAdd,setQuickAdd]=useState(null); // "bat" | "bowl" | null
  const dis=pw||nnb||pr;
  const retiredList=(inn.battingOrder||[]).filter(n=>inn.batsmen&&inn.batsmen[n]&&inn.batsmen[n].retired);

  const wlbl=(t,fielderName,runOutRuns,runOutEnd)=>{
    if(t==="Bowled")  return`b ${inn.bowlerName}`;
    if(t==="Caught"){
      const f=(fielderName||"").trim();
      // If no fielder name was given, or the scorer explicitly typed the bowler's own name,
      // it's genuinely a caught-and-bowled — otherwise credit the fielder who actually took the catch.
      if(!f || f.toLowerCase()===inn.bowlerName.toLowerCase()) return `c & b ${inn.bowlerName}`;
      return `c ${f} b ${inn.bowlerName}`;
    }
    if(t==="LBW")     return`lbw b ${inn.bowlerName}`;
    if(t==="Run Out"){
      const r=parseInt(runOutRuns)||0;
      const endLbl = runOutEnd==="nonStriker" ? `(non-striker's end)` : `(striker's end)`;
      const f=(fielderName||"").trim();
      const by = f ? `run out (${f})` : `run out`;
      const runsPart = r>0 ? ` after ${r} run${r===1?"":"s"}` : "";
      return `${by} ${endLbl}${runsPart}`;
    }
    if(t==="Stumped"){
      const f=(fielderName||"").trim();
      return f ? `st ${f} b ${inn.bowlerName}` : `st b ${inn.bowlerName}`;
    }
    return t;
  };
  const doW=()=>{
    if(wt==="Caught"&&!fielder.trim()){alert("Enter who took the catch (or the bowler's own name if it was caught & bowled).");return;}
    if(wt==="Run Out"&&!inn.single&&!roOut){alert("Select which batsman got run out.");return;}
    // Convert "who got out" (by name) into the engine's runOutEnd ("striker"/"nonStriker"),
    // which means the PHYSICAL end broken AFTER completed runs cross. If an odd number of runs
    // was completed, the batsmen have crossed, so the out player's physical end is the opposite
    // of their starting position.
    let effectiveEnd;
    if(inn.single){
      effectiveEnd="striker";
    }else{
      const runsCross=(parseInt(roRuns)||0)%2===1;
      const outIsStarterStriker = roOut===inn.strikerName;
      // physical end after cross: starter-striker ends at "striker" unless crossed
      effectiveEnd = (outIsStarterStriker !== runsCross) ? "striker" : "nonStriker";
    }
    record({type:"W",extraRuns:0,dismissal:wlbl(wt,fielder,roRuns,effectiveEnd),dismissalType:wt,runOutRuns:roRuns,runOutEnd:effectiveEnd,runOutName:roOut||null});
    setSW(false);setFielder("");setRoRuns(0);setRoEnd(null);setRoOut(null);
  };
  const doEx=()=>{
    if(em==="WD"){record({type:"WD",extraRuns:1+er});/* wide on free hit: free hit carries, don't clear */}
    else if(em==="NB"){
      record({type:"NB",extraRuns:1,batRuns:er});
      // Next delivery is a FREE HIT — play sound and show banner
      playFreeHitSound();
      setShowFH(true);
      setIsFreeHit(true); // arm free hit for next legal delivery
      setTimeout(()=>setShowFH(false),3500);
    }
    else if(em==="DECL"){record({type:"DECL",runs:er||1});setIsFreeHit(false);}
    else{record({type:em,extraRuns:er||1});setIsFreeHit(false);}
    setEM(null);setER(0);
  };
  const doOT=()=>{
    const isDeclOT=typeof otThrow==="string";
    const oRuns=isDeclOT?parseInt(otThrow[1]):otThrow;
    record({type:"OT",baseRuns:otBase,overthrowRuns:oRuns,isDeclOT});
    setIsFreeHit(false); // OT is a legal ball
    setShowOT(false);setOTBase(0);setOTThrow(1);
  };

  return(
    <div className="space-y-4">
      {(pw||pr)&&(
        <div className={pr?"alert-indigo":"alert-red"}>
          <p style={{color:pr?"#818cf8":"#f87171",fontFamily:"'JetBrains Mono',monospace",fontSize:11,textTransform:"uppercase",letterSpacing:".15em",marginBottom:8}}>{pr?"🔁 Retired — who's in next?":"⚡ Wicket! Who's next?"}</p>

          {/* Quick-tap: show ONLY batting team's players */}
          {(()=>{
            const dismissed=Object.entries(inn.batsmen||{}).filter(([,b])=>b.out).map(([n])=>n);
            const batting=new Set([SK,NS].filter(Boolean));
            const hasPubTeam=(match?.pubTeamA?.length>0||match?.pubTeamB?.length>0);
            const battingPub=hasPubTeam
              ?(inn.battingTeam===match?.teamA?match.pubTeamA:match.pubTeamB)||[]
              :null;

            if(battingPub&&battingPub.length>0){
              // TEAM MODE: only show this team's players
              const teamAvail=battingPub.filter(n=>!batting.has(n)&&!dismissed.includes(n));
              return(
                <div style={{marginBottom:10}}>
                  <p style={{fontSize:10,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>
                    🟡 {inn.battingTeam} squad:
                  </p>
                  {teamAvail.length===0
                    ?<p style={{fontSize:12,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>All squad members have batted</p>
                    :<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {teamAvail.map(n=>(
                        <button key={n} onClick={()=>confBatsman(n)} style={{
                          padding:"8px 14px",borderRadius:10,
                          border:"1.5px solid rgba(245,158,11,.5)",
                          background:"rgba(245,158,11,.12)",color:"#fbbf24",fontSize:13,
                          cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,
                          touchAction:"manipulation"
                        }}>{n}</button>
                      ))}
                    </div>
                  }
                </div>
              );
            }else{
              // FALLBACK: full roster when no pub team imported
              const avail=(rosterNames||[]).filter(n=>!batting.has(n)&&!dismissed.includes(n));
              return avail.length===0?null:(
                <div style={{marginBottom:10}}>
                  <p style={{fontSize:10,color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>Tap to bring in:</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {avail.map(n=>(
                      <button key={n} onClick={()=>confBatsman(n)} style={{
                        padding:"8px 14px",borderRadius:10,border:"1.5px solid rgba(99,102,241,.4)",
                        background:"rgba(99,102,241,.12)",color:"#a5b4fc",fontSize:13,cursor:"pointer",
                        fontFamily:"'Inter',sans-serif",fontWeight:600,touchAction:"manipulation"
                      }}>{n}</button>
                    ))}
                  </div>
                </div>
              );
            }
          })()}

          {/* Retired batters — return to crease */}
          {retiredList.length>0&&(
            <div style={{marginBottom:10}}>
              <p style={{fontSize:10,color:"#a78bfa",fontFamily:"'JetBrains Mono',monospace",marginBottom:5}}>Return retired:</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {retiredList.map(n=>(
                  <button key={n} onClick={()=>confBatsman(n)} style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid rgba(139,92,246,.5)",background:"rgba(139,92,246,.2)",color:"#c4b5fd",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>
                    {n} <span style={{color:"#7c6aa8",fontSize:10}}>({inn.batsmen[n].runs})</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Text input fallback — for players not in roster */}
          <div style={{display:"flex",gap:8}}>
            <input value={nbn} onChange={e=>setNBN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confBatsman()} placeholder="Or type a new name…" list="batlist" style={{flex:1,fontSize:13}}/>
            <datalist id="batlist">{[...new Set([...retiredList,...(rosterNames||[])])].map(n=><option key={n} value={n}/>)}</datalist>
            <button className="btn btn-primary" onClick={()=>confBatsman()} style={{padding:"10px 16px",whiteSpace:"nowrap"}}>In →</button>
          </div>

          {/* Quick-add new player to roster mid-match */}
          {quickAdd==="bat"
            ? <QuickAddPlayer onAdded={nm=>{setQuickAdd(null);confBatsman(nm);}} onCancel={()=>setQuickAdd(null)}/>
            : <button onClick={()=>setQuickAdd("bat")} style={{marginTop:8,width:"100%",padding:"7px",borderRadius:10,border:"1px dashed rgba(16,185,129,.4)",background:"transparent",color:"#34d399",cursor:"pointer",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>➕ Add new player to club</button>
          }
        </div>
      )}
      {nnb&&!pw&&(
        <div className="alert-indigo" style={{border:"2px solid #6366f1"}}>
          <p style={{color:"#a5b4fc",fontFamily:"'JetBrains Mono',monospace",fontSize:12,textTransform:"uppercase",letterSpacing:".12em",marginBottom:4,fontWeight:700}}>🎯 Over Complete!</p>
          <p style={{color:"#818cf8",fontSize:12,marginBottom:10}}>Who bowls next? <span style={{color:"#4338ca",fontSize:11}}>(not {inn.bowlerName})</span></p>

          {/* Quick-tap: show ONLY bowling team's players */}
          {(()=>{
            const bowled=new Set(inn.bowlingOrder||[]);
            const hasPubTeam=(match?.pubTeamA?.length>0||match?.pubTeamB?.length>0);
            const bowlingPub=hasPubTeam
              ?(inn.battingTeam===match?.teamA?match.pubTeamB:match.pubTeamA)||[]
              :null;
            const bowlingTeam=inn.battingTeam===match?.teamA?match?.teamB:match?.teamA;

            const BowlBtn=({n})=>{
              const b=inn.bowlers?.[n];
              const prev=bowled.has(n);
              return(
                <button key={n} onClick={()=>confBowler(n)} style={{
                  padding:"8px 14px",borderRadius:10,touchAction:"manipulation",
                  border:prev?"1.5px solid rgba(99,102,241,.4)":"1.5px solid rgba(52,211,153,.4)",
                  background:prev?"rgba(99,102,241,.12)":"rgba(52,211,153,.1)",
                  color:prev?"#a5b4fc":"#6ee7b7",fontSize:13,cursor:"pointer",
                  fontFamily:"'Inter',sans-serif",fontWeight:600
                }}>
                  {n}{prev&&b?<span style={{fontSize:10,opacity:.65,marginLeft:4}}>{b.overs}.{b.ballsThisOver}-{b.runs}-{b.wickets}</span>:""}
                </button>
              );
            };

            if(bowlingPub&&bowlingPub.length>0){
              // TEAM MODE: only show bowling team's players
              const fresh=bowlingPub.filter(n=>n!==inn.bowlerName&&!bowled.has(n));
              const prev=bowlingPub.filter(n=>n!==inn.bowlerName&&bowled.has(n));
              return(
                <div style={{marginBottom:10}}>
                  {fresh.length>0&&(
                    <>
                      <p style={{fontSize:10,color:"#6ee7b7",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>
                        ⚡ {bowlingTeam||"Bowling team"} — fresh:
                      </p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                        {fresh.map(n=><BowlBtn key={n} n={n}/>)}
                      </div>
                    </>
                  )}
                  {prev.length>0&&(
                    <>
                      <p style={{fontSize:10,color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>Bowled before:</p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {prev.map(n=><BowlBtn key={n} n={n}/>)}
                      </div>
                    </>
                  )}
                  {fresh.length===0&&prev.length===0&&(
                    <p style={{fontSize:12,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>No available bowlers from team</p>
                  )}
                </div>
              );
            }else{
              // FALLBACK: full roster
              const avail=(rosterNames||[]).filter(n=>n!==inn.bowlerName);
              const fresh=avail.filter(n=>!bowled.has(n));
              const prev=avail.filter(n=>bowled.has(n));
              return(
                <div style={{marginBottom:10}}>
                  {fresh.length>0&&<>
                    <p style={{fontSize:10,color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>New bowlers:</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                      {fresh.map(n=><BowlBtn key={n} n={n}/>)}
                    </div>
                  </>}
                  {prev.length>0&&<>
                    <p style={{fontSize:10,color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>Bowled before:</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {prev.map(n=><BowlBtn key={n} n={n}/>)}
                    </div>
                  </>}
                </div>
              );
            }
          })()}

          {/* Text input fallback */}
          <div style={{display:"flex",gap:8}}>
            <input value={nbwn} onChange={e=>setNBWN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confBowler()} placeholder="Or type a new name…" list="bowlerlist" style={{flex:1,fontSize:13}}/>
            <datalist id="bowlerlist">{(rosterNames||[]).map(n=><option key={n} value={n}/>)}</datalist>
            <button className="btn btn-primary" onClick={()=>confBowler()} style={{padding:"10px 18px",whiteSpace:"nowrap"}}>Bowl →</button>
          </div>

          {/* Quick-add new player mid-match */}
          {quickAdd==="bowl"
            ? <QuickAddPlayer onAdded={nm=>{setQuickAdd(null);confBowler(nm);}} onCancel={()=>setQuickAdd(null)}/>
            : <button onClick={()=>setQuickAdd("bowl")} style={{marginTop:8,width:"100%",padding:"7px",borderRadius:10,border:"1px dashed rgba(16,185,129,.4)",background:"transparent",color:"#34d399",cursor:"pointer",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>➕ Add new player to club</button>
          }
        </div>
      )}

      {/* Mini cards */}
      <div className="grid-2">
        <div className="mini-card" style={{padding:"10px 12px"}}>
          {/* Header row: title + quick-swap + edit */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <p className="section-title" style={{marginBottom:0}}>🟡 {inn.single?"Batsman":"Batting"}</p>
            {!inn.single&&NS&&(
              <div style={{display:"flex",gap:5}}>
                <button onClick={onSwapStrike} title="Swap strike — instant, no modal" style={{
                  padding:"3px 8px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700,
                  background:"rgba(99,102,241,.15)",border:"1px solid rgba(99,102,241,.4)",color:"#a5b4fc",
                  fontFamily:"'JetBrains Mono',monospace"
                }}>⇄</button>
                <EditPlayersButton inn={inn} rosterNames={rosterNames} onSwap={onSwapStrike} onSave={onFixPlayers}/>
              </div>
            )}
          </div>
          {(inn.single?[{p:SK,a:true}]:[{p:SK,a:true},{p:NS,a:false}]).map(({p,a},i)=>p?(
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"3px 0"}}>
              <span style={{fontSize:13,fontWeight:a?700:400,color:a?"#fff":"#9ca3af",display:"flex",alignItems:"center",gap:5,overflow:"hidden"}}>
                {a&&<span style={{color:"#fbbf24",fontSize:10}}>●</span>}
                <span className="truncate">{p.name}</span>
                {a&&<span style={{fontSize:9,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",background:"rgba(245,158,11,.15)",borderRadius:4,padding:"1px 4px",flexShrink:0}}>STRIKE</span>}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280",flexShrink:0,marginLeft:8}}>{p.runs} ({p.balls})</span>
            </div>
          ):null)}
          {retiredList.length>0&&<p style={{fontSize:9,color:"#7c6aa8",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{retiredList.length} retired</p>}
        </div>
        <div className="mini-card" style={{padding:"10px 12px"}}>
          <p className="section-title" style={{marginBottom:8}}>🎯 Bowling</p>
          {BW&&<div className="flex items-center justify-between">
            <span style={{fontSize:13,fontWeight:700,color:"#fff"}} className="truncate">{BW.name}</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#6b7280",flexShrink:0,marginLeft:8}}>{BW.overs}.{BW.ballsThisOver}-{BW.runs}-{BW.wickets}</span>
          </div>}
        </div>
      </div>

      {/* Over ticker */}
      <div>
        <div className="flex items-center justify-between mb-2">
          <p className="section-title" style={{marginBottom:0}}>Over {Math.floor(inn.totalBalls/6)+1}/{inn.overs} · <span style={{color:"#fbbf24"}}>{inn.totalBalls%6} of 6 balls</span>{(inn.overEvents||[]).filter(e=>e.type==="WD"||e.type==="NB").length>0&&<span style={{color:"#fb923c"}}> +{(inn.overEvents||[]).filter(e=>e.type==="WD"||e.type==="NB").length} extra</span>}</p>
          <button className="btn-undo" onClick={onUndo} disabled={!canUndo}>↩ Undo</button>
        </div>
        <div style={{background:"#130f3a",border:"1px solid #1e1b4b",borderRadius:16,padding:"12px 14px",display:"flex",flexWrap:"wrap",gap:8,minHeight:60}}>
          {(inn.overEvents||[]).length===0
            ?<span style={{color:"#2d2a6a",fontFamily:"'JetBrains Mono',monospace",fontSize:12,alignSelf:"center"}}>— new over —</span>
            :(inn.overEvents||[]).map((ev,i)=><div key={i} className={chipClass(ev)}>{chipLbl(ev)}</div>)
          }
        </div>
      </div>

      {/* Free Hit banner — animated 3.5s popup after No Ball */}
      {showFH&&(
        <div style={{
          position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-54%)",
          zIndex:999,textAlign:"center",pointerEvents:"none",
          animation:"bounceIn .35s ease both"
        }}>
          <div style={{
            background:"linear-gradient(135deg,#fbbf24,#f59e0b,#ef4444)",
            borderRadius:24,padding:"18px 32px",
            boxShadow:"0 0 0 4px rgba(251,191,36,.3),0 0 48px rgba(251,191,36,.6),0 8px 32px rgba(0,0,0,.6)"
          }}>
            <div style={{fontSize:10,color:"rgba(0,0,0,.55)",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,letterSpacing:".25em",marginBottom:4}}>NEXT BALL IS A</div>
            <div style={{fontSize:38,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:"#111",lineHeight:1}}>🟡 FREE HIT!</div>
            <div style={{fontSize:10,color:"rgba(0,0,0,.5)",fontFamily:"'JetBrains Mono',monospace",marginTop:5}}>only run out can dismiss the batter</div>
          </div>
        </div>
      )}

      {/* Persistent free hit chip — stays visible through wides and until legal delivery */}
      {isFreeHit&&!showFH&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          padding:"9px 16px",borderRadius:30,marginBottom:6,
          background:"rgba(234,179,8,.13)",border:"1.5px solid rgba(234,179,8,.45)"}}>
          <span style={{fontSize:16}}>🟡</span>
          <span style={{color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:".05em"}}>FREE HIT — only Run Out can dismiss</span>
        </div>
      )}

      {/* Buttons */}
      <div style={{opacity:dis?.4:1,pointerEvents:dis?"none":"auto"}} className="space-y-3">
        <div className="grid-4">
          {[0,1,2,3].map(r=><button key={r} className="btn-run" onClick={()=>{record({type:String(r)});setIsFreeHit(false);}}>{r}</button>)}
        </div>
        <div className="grid-3">
          <button className="btn-run amber" onClick={()=>{record({type:"4"});setIsFreeHit(false);}}>4</button>
          <button className="btn-run green" onClick={()=>{record({type:"6"});setIsFreeHit(false);}}>6</button>
          <button className="btn-run" onClick={()=>{record({type:"5"});setIsFreeHit(false);}}>5</button>
        </div>
        <div className="grid-4" style={{gridTemplateColumns:"1fr 1fr 1fr"}}>
          <button className="btn btn-danger" onClick={()=>setSW(true)} style={{borderRadius:14,padding:"13px 8px",fontSize:13}}>Wicket</button>
          <button className="btn btn-outline-amber" onClick={()=>setEM("WD")} style={{borderRadius:14,fontSize:13}}>Wide</button>
          <button className="btn btn-outline-amber" onClick={()=>setEM("NB")} style={{borderRadius:14,fontSize:13,borderColor:"#ca8a04",color:"#facc15"}}>No Ball</button>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn" onClick={()=>record({type:"DECL",runs:1})} style={{flex:1,borderRadius:14,fontSize:15,padding:"10px 4px",background:"transparent",border:"1.5px solid rgba(167,139,250,.5)",color:"#c4b5fd",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>1D</button>
          <button className="btn" onClick={()=>record({type:"DECL",runs:2})} style={{flex:1,borderRadius:14,fontSize:15,padding:"10px 4px",background:"transparent",border:"1.5px solid rgba(167,139,250,.5)",color:"#c4b5fd",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>2D</button>
          <button className="btn" onClick={()=>setShowOT(true)} style={{flex:2,borderRadius:14,fontSize:12,padding:"10px 6px",background:"transparent",border:"1.5px solid rgba(251,146,60,.55)",color:"#fb923c",fontWeight:600}}>🔄 Overthrow</button>
        </div>
        <button className="btn w-full" onClick={onRetire} style={{borderRadius:14,fontSize:13,padding:"12px",background:"transparent",border:"1.5px solid rgba(139,92,246,.5)",color:"#c4b5fd",marginTop:8}}>🔁 Retire {inn.single?"Batsman":"Striker"}</button>
      </div>

      {/* End Innings / Revert — always clickable, even mid-wicket or mid-bowler-change, so admin/scorer can always end or recover */}
      <div className="grid-2" style={{marginTop:8}}>
        <button className="btn w-full" onClick={onEndInnings} style={{borderRadius:14,fontSize:12,padding:"11px",background:"transparent",border:"1.5px solid rgba(239,68,68,.4)",color:"#f87171"}}>⏹ End {inn.inningsNum===1?"Innings":"Match"}</button>
        {onRevert&&<button className="btn w-full" onClick={onRevert} disabled={!canRevert} style={{borderRadius:14,fontSize:12,padding:"11px",background:"transparent",border:`1.5px solid ${canRevert?"rgba(52,211,153,.5)":"rgba(55,65,129,.3)"}`,color:canRevert?"#34d399":"#374151",cursor:canRevert?"pointer":"not-allowed"}}>↩️ Revert to Live</button>}
      </div>
      {onEditOvers&&(
        <button className="btn w-full" onClick={()=>{const v=prompt(`Change match overs (currently ${inn.overs}). Enter new total overs:`,String(inn.overs));if(v!==null)onEditOvers(v);}}
          style={{marginTop:8,borderRadius:14,fontSize:12,padding:"11px",background:"transparent",border:"1.5px solid rgba(139,92,246,.4)",color:"#a78bfa"}}>⚙️ Edit Overs ({inn.overs})</button>
      )}
      {role==="admin"&&onRestore&&(
        <button className="btn w-full" onClick={onRestore}
          style={{marginTop:8,borderRadius:14,fontSize:11,padding:"10px",background:"transparent",border:"1px solid rgba(99,102,241,.3)",color:"#6b7280"}}
          title="Disaster recovery: restore the match from the latest automatic backup">🛟 Restore from backup</button>
      )}

      {/* Wicket modal */}
      {showW&&<Modal onClose={()=>{setSW(false);setFielder("");setRoRuns(0);setRoEnd(null);setRoOut(null);}} title="🏏 How Out?">
        {isFreeHit&&(
          <div style={{background:"rgba(234,179,8,.12)",border:"1.5px solid rgba(234,179,8,.4)",borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>🟡</span>
            <span style={{fontSize:12,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>FREE HIT — only Run Out can dismiss</span>
          </div>
        )}
        <div className="grid-2 mb-4">
          {(isFreeHit?["Run Out"]:["Bowled","Caught","LBW","Run Out","Stumped"]).map(w=>(
            <button key={w} onClick={()=>setWT(w)} style={{padding:"10px 8px",borderRadius:12,border:`1.5px solid ${wt===w?"transparent":"#374151"}`,background:wt===w?"linear-gradient(135deg,#dc2626,#991b1b)":"transparent",color:wt===w?"#fff":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:13,fontFamily:"'Inter',sans-serif",marginBottom:4}}>{w}</button>
          ))}
        </div>
        {wt==="Caught"&&!isFreeHit&&(
          <div style={{marginBottom:14}}>
            <label>Caught by</label>
            <input value={fielder} onChange={e=>setFielder(e.target.value)} placeholder="Fielder's name (or bowler's, if c&b)" autoFocus/>
          </div>
        )}
        {wt==="Run Out"&&(<>
          <div style={{marginBottom:14}}>
            <label>Runs completed before the run-out</label>
            <div className="grid-4" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
              {[0,1,2,3].map(r=>(
                <button key={r} onClick={()=>setRoRuns(r)} style={{padding:"10px",borderRadius:12,border:`1.5px solid ${roRuns===r?"transparent":"#374151"}`,background:roRuns===r?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:roRuns===r?"#111":"#9ca3af",cursor:"pointer",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>{r}</button>
              ))}
            </div>
          </div>
          {!inn.single&&(
            <div style={{marginBottom:14}}>
              <label>Who got run out?</label>
              <p style={{color:"#6b7280",fontSize:11,marginTop:-4,marginBottom:8}}>Pick the batsman who was actually run out. With 0 runs it can be either one — choose whoever was caught short.</p>
              <div className="grid-2">
                {[{nm:inn.strikerName,lbl:"🏏 "+(inn.strikerName||"Striker"),sub:"on strike"},
                  {nm:inn.nonStrikerName,lbl:"⚪ "+(inn.nonStrikerName||"Non-striker"),sub:"non-striker"}].map(o=>(
                  <button key={o.sub} onClick={()=>setRoOut(o.nm)} style={{padding:"11px 8px",borderRadius:12,border:`1.5px solid ${roOut===o.nm?"transparent":"#374151"}`,background:roOut===o.nm?"linear-gradient(135deg,#dc2626,#991b1b)":"transparent",color:roOut===o.nm?"#fff":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif",textAlign:"center",lineHeight:1.3}}>
                    {o.lbl}
                    <span style={{display:"block",fontSize:9,opacity:.7,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>{o.sub}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
          <div style={{marginBottom:14}}>
            <label>Run out by <span style={{color:"#6b7280",fontWeight:400,fontFamily:"'JetBrains Mono',monospace",fontSize:10}}>(optional)</span></label>
            <input value={fielder} onChange={e=>setFielder(e.target.value)} placeholder="Fielder who effected the run-out"/>
          </div>
        </>)}
        {wt==="Stumped"&&(
          <div style={{marginBottom:14}}>
            <label>Stumped by <span style={{color:"#6b7280",fontWeight:400,fontFamily:"'JetBrains Mono',monospace",fontSize:10}}>(wicketkeeper)</span></label>
            <input value={fielder} onChange={e=>setFielder(e.target.value)} placeholder="Wicketkeeper's name" autoFocus/>
          </div>
        )}
        <button className="btn btn-danger w-full" style={{borderRadius:14}} onClick={()=>{doW();setIsFreeHit(false);}}>Confirm Wicket</button>
      </Modal>}

      {/* Extra modal */}
      {em&&<Modal onClose={()=>{setEM(null);setER(0);}} title={em==="WD"?"Wide":em==="NB"?"No Ball":em==="B"?"Byes":em==="DECL"?"📍 Declare Runs":"Leg Byes"}>
        <p style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:12,marginBottom:12}}>{em==="NB"?"Runs off the bat:":em==="DECL"?"Runs to credit the striker (strike will NOT rotate):":"Additional runs:"}</p>
        <div className="grid-4 mb-4" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
          {[0,1,2,3,4,6].map(r=>(
            <button key={r} onClick={()=>setER(r)} style={{padding:"10px",borderRadius:12,border:`1.5px solid ${er===r?"transparent":"#374151"}`,background:er===r?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:er===r?"#111":"#9ca3af",cursor:"pointer",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",fontSize:14,marginBottom:6}}>{r}</button>
          ))}
        </div>
        <button className="btn btn-primary w-full" style={{borderRadius:14}} onClick={doEx}>Confirm</button>
      </Modal>}

      {/* Overthrow modal */}
      {showOT&&<Modal onClose={()=>setShowOT(false)} title="🔄 Overthrow">
        <p style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:12,marginBottom:4}}>Runs batters completed before the overthrow:</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
          {[0,1,2,3].map(r=>(
            <button key={r} onClick={()=>setOTBase(r)} style={{padding:"10px",borderRadius:12,
              border:`1.5px solid ${otBase===r?"transparent":"#374151"}`,
              background:otBase===r?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",
              color:otBase===r?"#111":"#9ca3af",cursor:"pointer",fontWeight:700,
              fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>{r}</button>
          ))}
        </div>

        <p style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:12,marginBottom:4}}>
          Overthrow runs <span style={{color:"#fb923c"}}>(normal: 1-4)</span>:
        </p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:8}}>
          {[1,2,3,4].map(r=>(
            <button key={r} onClick={()=>setOTThrow(r)} style={{padding:"10px",borderRadius:12,
              border:`1.5px solid ${otThrow===r?"transparent":"#374151"}`,
              background:otThrow===r?"linear-gradient(135deg,#fb923c,#ea580c)":"transparent",
              color:otThrow===r?"#111":"#9ca3af",cursor:"pointer",fontWeight:700,
              fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>{r}</button>
          ))}
        </div>

        <p style={{color:"#9ca3af",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:4}}>
          Declared overthrow <span style={{color:"#a78bfa"}}>(1D/2D — strike based on batter runs only):</span>
        </p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {["D1","D2"].map(d=>(
            <button key={d} onClick={()=>setOTThrow(d)} style={{padding:"10px",borderRadius:12,
              border:`1.5px solid ${otThrow===d?"transparent":"rgba(167,139,250,.4)"}`,
              background:otThrow===d?"linear-gradient(135deg,#7c3aed,#6d28d9)":"rgba(167,139,250,.08)",
              color:otThrow===d?"#fff":"#a78bfa",cursor:"pointer",fontWeight:700,
              fontFamily:"'JetBrains Mono',monospace",fontSize:14}}>{d[1]+"D"}</button>
          ))}
        </div>

        {/* Strike preview */}
        {(()=>{
          const isDeclOT=typeof otThrow==="string";
          const oRuns=isDeclOT?parseInt(otThrow[1]):otThrow;
          const total=otBase+oRuns;
          const strikeChanges=isDeclOT?otBase%2===1:(total)%2===1;
          return(
            <div style={{background:"rgba(251,146,60,.1)",border:"1px solid rgba(251,146,60,.3)",
              borderRadius:12,padding:"10px 14px",marginBottom:14,textAlign:"center"}}>
              <p style={{color:"#fb923c",fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>
                {otBase} bat + {isDeclOT?otThrow:otThrow+" overthrow"} = <strong style={{fontSize:16,color:"#fff"}}>{total} total</strong>
              </p>
              <p style={{color:strikeChanges?"#34d399":"#a5b4fc",fontSize:11,fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>
                {strikeChanges?"⇄ Strike CHANGES":"→ Strike STAYS"}
                {isDeclOT&&<span style={{color:"#6b7280"}}> (declared — only bat runs count)</span>}
              </p>
            </div>
          );
        })()}

        <button className="btn btn-primary w-full" style={{borderRadius:14}} onClick={doOT}>Confirm Overthrow</button>
      </Modal>}
    </div>
  );
}

// ── PIN Viewer — admin can check both team PINs anytime during the match ──────
// ── Super Admin: PIN management — set Basic Admin PIN from inside the app ──────
function PinManagementButton(){
  const[open,setOpen]=React.useState(false);
  const[basicPin,setBasicPin]=React.useState("");
  const[superPin,setSuperPin]=React.useState("");
  const[saved,setSaved]=React.useState(false);
  const[err,setErr]=React.useState("");
  const openModal=()=>{ setBasicPin(""); setSuperPin(""); setSaved(false); setErr(""); setOpen(true); };
  const save=()=>{
    setErr("");
    const bp=basicPin.trim(), sp=superPin.trim();
    if(bp&&(bp.length<4||!/^\d+$/.test(bp))){ setErr("Basic PIN must be 4 digits."); return; }
    if(sp&&(sp.length<4||!/^\d+$/.test(sp))){ setErr("Super PIN must be 4 digits."); return; }
    if(bp&&sp&&bp===sp){ setErr("The two PINs can't be the same."); return; }
    if(!bp&&!sp){ setErr("Enter at least one PIN to update."); return; }
    if(!FB_OK||!DB){ setErr("Offline — can't save right now."); return; }
    const updates={};
    if(bp) updates["adminPins/basic"]=bp;
    if(sp) updates["adminPins/super"]=sp;
    DB.ref().update(updates)
      .then(()=>{ setSaved(true); setBasicPin(""); setSuperPin(""); })
      .catch(e=>setErr("Save failed: "+e.message));
  };
  return(<>
    <button onClick={openModal} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.35)",color:"#f87171",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderRadius:8,padding:"4px 9px",fontWeight:600}}>🔐 PINs</button>
    {open&&<Modal onClose={()=>setOpen(false)} title="🔐 Manage Admin PINs">
      <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>Leave a field blank to keep the current PIN unchanged. Changes take effect for the next login — anyone already logged in stays active until they leave.</p>
      <label>New Basic Admin PIN (4 digits)</label>
      <input value={basicPin} onChange={e=>{setBasicPin(e.target.value.replace(/\D/g,"").slice(0,4));setSaved(false);setErr("");}} placeholder="Leave blank to keep current" inputMode="numeric" maxLength={4} style={{marginBottom:12,letterSpacing:"0.3em",textAlign:"center"}}/>
      <label>New Super Admin PIN (4 digits)</label>
      <input value={superPin} onChange={e=>{setSuperPin(e.target.value.replace(/\D/g,"").slice(0,4));setSaved(false);setErr("");}} placeholder="Leave blank to keep current" inputMode="numeric" maxLength={4} style={{marginBottom:14,letterSpacing:"0.3em",textAlign:"center"}}/>
      {err&&<p style={{color:"#f87171",fontSize:12,marginBottom:10}}>{err}</p>}
      {saved&&<p style={{color:"#34d399",fontSize:12,marginBottom:10}}>✓ PINs updated! Share the new Basic PIN with your helper.</p>}
      <p style={{color:"#4338ca",fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginBottom:12}}>Note: PINs are stored securely in Firebase. The hardcoded fallbacks in the file still work if Firebase is unreachable.</p>
      <button className="btn btn-primary w-full" onClick={save}>Save PINs</button>
    </Modal>}
  </>);
}

  const[ov,setOv]=React.useState(inn?.overs||0);
  const[wk,setWk]=React.useState(inn?.maxWkts||0);
  const minOv=Math.ceil((inn?.totalBalls||0)/6)||1;

    const o=Number(ov),w=Number(wk);
    if(!o||o<minOv){alert(`Overs can't be less than ${minOv}.`);return;}
    if(!w||w<minWk){alert(`Wickets can't be less than ${minWk}.`);return;}
    onEditMatchSave({overs:o,maxWkts:w});setEditOpen(false);
  };

  return(
    <div style={{position:"relative"}}>

          <div style={{borderTop:"1px solid #1e1b4b",margin:"4px 0"}}/>
          {row("✏️","Edit Match (overs/wkts)","#c4b5fd",()=>{setOv(inn?.overs||0);setWk(inn?.maxWkts||0);setEditOpen(true);})}
          {isSuper&&onUpdateTeams&&row("👥","Edit Match Teams","#34d399",()=>{
            setEditPubA(match?.pubTeamA||[]);
            setEditPubB(match?.pubTeamB||[]);
            setNewNameA("");setNewNameB("");
            setTeamEditOpen(true);

              </div>
            </div>

          <button onClick={()=>{onUpdateTeams(editPubA,editPubB);setTeamEditOpen(false);}}

              background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontWeight:700,fontSize:14}}>

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[["🟡",match.teamA,match.pinA],["⚡",match.teamB,match.pinB]].map(([em,team,pin])=>(

                <p style={{fontFamily:"'Oswald',sans-serif",fontSize:28,fontWeight:700,letterSpacing:"0.2em",color:"#fff"}}>{pin}</p>
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

          <input value={ns} onChange={e=>setNs(e.target.value)} list="fixPlayers" placeholder="Non-striker's name" style={{marginBottom:12}}/>
        </>)}
        <label>Current bowler</label>
        <input value={bw} onChange={e=>setBw(e.target.value)} list="fixPlayers" placeholder="Bowler's name" style={{marginBottom:14}}/>
        <datalist id="fixPlayers">{(rosterNames||[]).map(n=><option key={n} value={n}/>)}</datalist>
        <button className="btn btn-primary w-full" onClick={save}>Save Correction</button>
      </Modal>
    )}
  </>);
}

function EditMatchButton({inn,onSave}){
  const[open,setOpen]=React.useState(false);
  const[ov,setOv]=React.useState(inn?.overs||0);
  const[wk,setWk]=React.useState(inn?.maxWkts||0);
  if(!inn) return null;
  const minOv = Math.ceil((inn.totalBalls||0)/6)||1; // can't set below overs already bowled
  const minWk = (inn.wickets||0)+1;                  // can't set below wickets already fallen
  const openModal=()=>{ setOv(inn.overs); setWk(inn.maxWkts); setOpen(true); };
  const save=()=>{
    const o=Number(ov), w=Number(wk);
    if(!o||o<minOv){alert(`Overs can't be less than ${minOv} (overs already bowled).`);return;}
    if(!w||w<minWk){alert(`Wickets can't be less than ${minWk} (wickets already fallen).`);return;}
    onSave({overs:o,maxWkts:w});
    setOpen(false);
  };
  return(<>
    <button onClick={openModal} style={{background:"rgba(139,92,246,.12)",border:"1px solid rgba(139,92,246,.35)",color:"#c4b5fd",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderRadius:8,padding:"4px 9px",fontWeight:600}}>✏️ Edit Match</button>
    {open&&(
      <Modal onClose={()=>setOpen(false)} title="✏️ Edit Match Settings">
        <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>Correct overs or wickets if they were set wrong at the start. Can't go below what's already happened in this innings.</p>
        <label>Overs per side</label>
        <input type="number" min={minOv} value={ov} onChange={e=>setOv(e.target.value)} style={{marginBottom:12}}/>
        <p style={{color:"#4b5563",fontSize:10,marginTop:-8,marginBottom:12}}>{Math.ceil((inn.totalBalls||0)/6)} overs already bowled this innings</p>
        <label>Wickets per side</label>
        <input type="number" min={minWk} value={wk} onChange={e=>setWk(e.target.value)} style={{marginBottom:12}}/>
        <p style={{color:"#4b5563",fontSize:10,marginTop:-8,marginBottom:14}}>{inn.wickets||0} wicket{inn.wickets===1?"":"s"} already fallen</p>
        <button className="btn btn-primary w-full" onClick={save}>Save Changes</button>
      </Modal>
    )}
  </>);
}

          {onExit&&<button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← home</button>}

// ── Scorecard canvas builder — shared by MatchOver and MatchDetailView ────────
function buildScorecardCanvas(i1,i2,result,match){
  const W=800,pad=32;
  const allBat1=(i1?.battingOrder||[]).map(n=>{const b=i1.batsmen[n];const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):"0.0";return[n,b.out?b.howOut:b.retired?"retired":"not out",b.runs,b.balls,b.fours,b.sixes,sr];});
  const allBat2=(i2?.battingOrder||[]).map(n=>{const b=i2.batsmen[n];const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):"0.0";return[n,b.out?b.howOut:b.retired?"retired":"not out",b.runs,b.balls,b.fours,b.sixes,sr];});
  const allBwl1=(i1?.bowlingOrder||[]).map(n=>{const b=i1.bowlers[n];const bl=b.overs*6+b.ballsThisOver;return[n,`${b.overs}.${b.ballsThisOver}`,b.maidens,b.runs,b.wickets,bl>0?((b.runs/bl)*6).toFixed(2):"0.00"];});
  const allBwl2=(i2?.bowlingOrder||[]).map(n=>{const b=i2.bowlers[n];const bl=b.overs*6+b.ballsThisOver;return[n,`${b.overs}.${b.ballsThisOver}`,b.maidens,b.runs,b.wickets,bl>0?((b.runs/bl)*6).toFixed(2):"0.00"];});

  const rowH=28,headH=44,secH=36,extraH=28,divH=2;
  const tableW=W-pad*2;
  const batCols=[tableW*0.3,tableW*0.28,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07,tableW*0.07];
  const bwlCols=[tableW*0.35,tableW*0.1,tableW*0.1,tableW*0.1,tableW*0.1,tableW*0.12,tableW*0.13];

  const headerH=match?.tossSummary?96:80;
  const H=headerH+secH+headH+(allBat1.length*rowH)+extraH+divH+
           secH+headH+(allBwl1.length*rowH)+40+
           secH+headH+(allBat2.length*rowH)+extraH+divH+
           secH+headH+(allBwl2.length*rowH)+60;

  const cv=document.createElement("canvas");
  cv.width=W*2;cv.height=H*2;
  const ctx=cv.getContext("2d");
  ctx.scale(2,2);

  // Background
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#0f0c29");bg.addColorStop(0.5,"#1a1040");bg.addColorStop(1,"#0d1223");
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  let y=0;

  // Header banner
  const hb=ctx.createLinearGradient(0,0,W,headerH);
  hb.addColorStop(0,"#1e1b4b");hb.addColorStop(1,"#13103a");
  ctx.fillStyle=hb;ctx.fillRect(0,0,W,headerH);
  ctx.fillStyle="#818cf8";ctx.font="bold 11px 'JetBrains Mono',monospace";ctx.textAlign="center";
  ctx.fillText(`LCC · LINDENHURST CRICKET CLUB · ${(i2?.format==="T20"?"T20 @ MILLENNIUM PARK":((i2?.overs||i1?.overs||0)+"-OVER @ LAKES HIGH SCHOOL"))}`,W/2,22);
  const resultTxt=result?.winner?`${result.winner} won${result.margin?" by "+result.margin:""}`:i2?"Match Tied":"";
  ctx.fillStyle="#fbbf24";ctx.font="bold 22px 'Oswald',sans-serif";
  ctx.fillText(resultTxt,W/2,52);
  const s1=i1?`${i1.battingTeam}: ${i1.totalRuns}/${i1.wickets} (${ovStr(i1.totalBalls)} ov)`:"";
  const s2=i2?`${i2.battingTeam}: ${i2.totalRuns}/${i2.wickets} (${ovStr(i2.totalBalls)} ov)`:"";
  ctx.fillStyle="#a5b4fc";ctx.font="12px 'Inter',sans-serif";
  ctx.fillText(`${s1}   |   ${s2}`,W/2,72);
  if(match?.tossSummary){ctx.fillStyle="#34d399";ctx.font="11px 'JetBrains Mono',monospace";ctx.fillText(`🪙 ${match.tossSummary}`,W/2,90);}
  y=headerH;

  const drawSection=(title,color)=>{
    ctx.fillStyle=color||"#1e1b4b";ctx.fillRect(0,y,W,secH);
    ctx.fillStyle="#fff";ctx.font="bold 13px 'Oswald',sans-serif";ctx.textAlign="left";
    ctx.fillText(title,pad,y+secH/2+5);
    y+=secH;
  };
  const drawTableHead=(cols,labels)=>{
    ctx.fillStyle="#252060";ctx.fillRect(0,y,W,headH);
    let x=pad;
    labels.forEach((l,i)=>{
      ctx.fillStyle="#818cf8";ctx.font="bold 10px 'JetBrains Mono',monospace";
      ctx.textAlign=i===0?"left":"right";
      ctx.fillText(l,i===0?x:x+cols[i]-4,y+headH/2+4);
      x+=cols[i];
    });
    y+=headH;
  };
  const drawRow=(cols,cells,even)=>{
    ctx.fillStyle=even?"rgba(30,27,75,.4)":"transparent";ctx.fillRect(0,y,W,rowH);
    let x=pad;
    cells.forEach((c,i)=>{
      ctx.fillStyle=i===2?"#fbbf24":i===1?"#6b7280":"#e0e7ff";
      ctx.font=i===0?"bold 11px 'Inter',sans-serif":"11px 'JetBrains Mono',monospace";
      ctx.textAlign=i===0?"left":"right";
      const txt=String(c);
      ctx.fillText(txt.length>22&&i===0?txt.slice(0,20)+"…":txt,i===0?x:x+cols[i]-4,y+rowH/2+4);
      x+=cols[i];
    });
    y+=rowH;
  };
  const drawExtras=(ext)=>{
    if(!ext)return;
    ctx.fillStyle="rgba(30,27,75,.3)";ctx.fillRect(0,y,W,extraH);
    ctx.fillStyle="#6b7280";ctx.font="11px 'JetBrains Mono',monospace";ctx.textAlign="left";
    ctx.fillText(`Extras: WD ${ext.wd||0}  NB ${ext.nb||0}  B ${ext.b||0}  LB ${ext.lb||0}  Total ${(ext.wd||0)+(ext.nb||0)+(ext.b||0)+(ext.lb||0)}`,pad,y+extraH/2+4);
    y+=extraH;
  };
  const hline=()=>{ctx.fillStyle="#3730a3";ctx.fillRect(0,y,W,divH);y+=divH;};

  // 1st Innings batting
  if(i1?.battingTeam){
    drawSection(`🟡 ${i1.battingTeam} — 1st Innings  ${i1.totalRuns}/${i1.wickets} (${ovStr(i1.totalBalls)} ov)`,"#0f3a1a");
    drawTableHead(batCols,["Batsman","Dismissal","R","B","4s","6s","SR"]);
    allBat1.forEach((r,i)=>drawRow(batCols,r,i%2===0));
    drawExtras(i1.extras);
    hline();
    drawSection(`🎯 ${i2?.battingTeam||""} Bowling`,"#1a0f3a");
    drawTableHead(bwlCols,["Bowler","O","M","R","W","Econ"]);
    allBwl1.forEach((r,i)=>drawRow(bwlCols,r,i%2===0));
    y+=40;
  }
  // 2nd Innings batting
  if(i2?.battingTeam){
    drawSection(`🟡 ${i2.battingTeam} — 2nd Innings  ${i2.totalRuns}/${i2.wickets} (${ovStr(i2.totalBalls)} ov)`,"#0f3a1a");
    drawTableHead(batCols,["Batsman","Dismissal","R","B","4s","6s","SR"]);
    allBat2.forEach((r,i)=>drawRow(batCols,r,i%2===0));
    drawExtras(i2.extras);
    hline();
    drawSection(`🎯 ${i1?.battingTeam||""} Bowling`,"#1a0f3a");
    drawTableHead(bwlCols,["Bowler","O","M","R","W","Econ"]);
    allBwl2.forEach((r,i)=>drawRow(bwlCols,r,i%2===0));
    y+=30;
  }

  // Footer
  const dt=new Date(match?.finishedAt||Date.now()).toLocaleString();
  ctx.fillStyle="#4338ca";ctx.font="10px 'JetBrains Mono',monospace";ctx.textAlign="center";
  ctx.fillText(`Generated by LCC Scorer · ${dt}`,W/2,y+20);

  return cv;
}

// ── Match Over ────────────────────────────────────────────────────────────────
// ── Player of the Match Voting ────────────────────────────────────────────────
function POTMVoting({inn,inn1,potm,role}){
  // deviceId persisted across sessions so one vote per device, myVote survives refresh
  const deviceId=React.useMemo(()=>{
    try{
      let id=localStorage.getItem("lcc_device_id");
      if(!id){id="d_"+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("lcc_device_id",id);}
      return id;
    }catch(e){return "d_"+Math.random().toString(36).slice(2);}
  },[]);
  const[myName,setMyName]=React.useState(()=>{try{return localStorage.getItem("lcc_potm_voter")||null;}catch(e){return null;}});

  // All players who batted or bowled in either innings
  const participants=React.useMemo(()=>{
    const s=new Set();
    [inn1,inn].forEach(i=>{if(!i)return;Object.keys(i.batsmen||{}).forEach(n=>s.add(n));(i.bowlingOrder||[]).forEach(n=>s.add(n));});
    return[...s].sort();
  },[inn,inn1]);

  const votes=potm?.votes||{};
  const counts={};
  Object.values(votes).forEach(v=>{if(v?.votedFor)counts[v.votedFor]=(counts[v.votedFor]||0)+1;});
  const totalVotes=Object.values(counts).reduce((a,b)=>a+b,0);
  const myVote=votes[deviceId]?.votedFor||null;

  const castVote=(name)=>{
    if(!myName||!FB_OK||!DB)return;
    const voteData={voter:myName,votedFor:name,at:Date.now()};
    // Write to live potm node (for real-time display on this screen)
    DB.ref("potm/votes/"+deviceId).set(voteData).catch(()=>{});
    // Also write to history so votes persist permanently
    if(potm?.matchId) DB.ref("history/"+potm.matchId+"/potmVoting/votes/"+deviceId).set(voteData).catch(()=>{});
  };

  const closeAndAnnounce=()=>{
    if(!FB_OK||!DB)return;
    let winner=null,max=0;
    Object.entries(counts).forEach(([n,c])=>{if(c>max){max=c;winner=n;}});
    if(!winner&&participants.length>0)winner=participants[0];
    const closedAt=Date.now();
    DB.ref("potm").update({open:false,winner,closedAt}).catch(()=>{});
    // Save winner permanently to history entry
    if(potm?.matchId){
      DB.ref("history/"+potm.matchId+"/potmVoting").update({open:false,winner,closedAt}).catch(()=>{});
      DB.ref("history/"+potm.matchId+"/potm").set(winner).catch(()=>{});
    }
    DB.ref("announcement").set({text:`🏆 Player of the Match: ${winner}! (${max} vote${max===1?"":"s"})`,by:"LCC",ts:Date.now()}).catch(()=>{});
  };

  // ── Winner declared ────────────────────────────────────────────────────────
  if(potm?.winner){
    const winnerVotes=counts[potm.winner]||0;
    return(
      <div style={{background:"linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.1))",border:"2px solid rgba(245,158,11,.5)",borderRadius:20,padding:"20px 18px",marginTop:20,textAlign:"center"}}>
        <div style={{fontSize:42,marginBottom:6}}>🏆</div>
        <p style={{fontSize:10,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".2em",marginBottom:6}}>PLAYER OF THE MATCH</p>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:28,fontWeight:700,color:"#fbbf24",marginBottom:4}}>{potm.winner}</p>
        <p style={{fontSize:11,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>{winnerVotes} vote{winnerVotes===1?"":"s"} · {totalVotes} total</p>
      </div>
    );
  }

  if(!potm?.open) return null;

  // ── Step 1: Identify yourself ──────────────────────────────────────────────
  if(!myName){
    return(
      <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"18px 16px",marginTop:20}}>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,marginBottom:4}}>🏆 Player of the Match</p>
        <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>Who are you? Pick your name to cast your vote.</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {participants.map(n=>(
            <button key={n} onClick={()=>{setMyName(n);try{localStorage.setItem("lcc_potm_voter",n);}catch(e){}}}
              style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid rgba(99,102,241,.4)",
                background:"rgba(99,102,241,.12)",color:"#a5b4fc",fontSize:13,cursor:"pointer",
                fontFamily:"'Inter',sans-serif",fontWeight:600}}>
              {n}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Step 2: Cast your vote ─────────────────────────────────────────────────
  const sorted=[...participants].sort((a,b)=>(counts[b]||0)-(counts[a]||0));
  return(
    <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"18px 16px",marginTop:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <p style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,marginBottom:2}}>🏆 Player of the Match</p>
          <p style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>Voting as {myName}{myVote?` · voted for ${myVote}`:""}</p>
        </div>
        <button onClick={()=>{setMyName(null);try{localStorage.removeItem("lcc_potm_voter");}catch(e){}}}
          style={{background:"none",border:"none",color:"#6b7280",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>Not you?</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {sorted.filter(n=>n!==myName).map(n=>{
          const c=counts[n]||0;
          const pct=totalVotes>0?Math.round((c/totalVotes)*100):0;
          const isMyVote=myVote===n;
          return(
            <button key={n} onClick={()=>castVote(n)} style={{
              display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"11px 14px",borderRadius:14,cursor:"pointer",
              border:isMyVote?"2px solid #fbbf24":"1.5px solid rgba(99,102,241,.3)",
              background:isMyVote?"rgba(245,158,11,.15)":"rgba(255,255,255,.03)",
              color:"#fff",textAlign:"left",position:"relative",overflow:"hidden"
            }}>
              {/* vote bar */}
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:pct+"%",background:"rgba(245,158,11,.08)",transition:"width .4s ease"}}/>
              <span style={{fontWeight:isMyVote?700:500,fontSize:14,position:"relative"}}>{n}{isMyVote&&<span style={{color:"#fbbf24",marginLeft:6,fontSize:11}}>✓ your vote</span>}</span>
              <span style={{fontSize:11,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",position:"relative"}}>{c} vote{c===1?"":"s"}</span>
            </button>
          );
        })}
      </div>
      <p style={{fontSize:10,color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",marginBottom:role==="admin"?10:0}}>{totalVotes} vote{totalVotes===1?"":"s"} cast · {Object.keys(votes).length} player{Object.keys(votes).length===1?"":"s"} voted</p>
      {role==="admin"&&(
        <button onClick={closeAndAnnounce} style={{
          width:"100%",padding:"12px",borderRadius:14,border:"none",cursor:"pointer",
          background:"linear-gradient(135deg,#f59e0b,#d97706)",
          color:"#111",fontWeight:700,fontSize:14,fontFamily:"'Inter',sans-serif"
        }}>🏆 Close Voting & Announce Winner</button>
      )}
    </div>
  );
}

function MatchOver({result,inn,inn1,match,potm,role,onRevert,canRevert,onNew}){
  const[saving,setSaving]=React.useState(false);

  const[scorecardUrl,setScorecardUrl]=React.useState(null);

  const openScorecard=()=>{
    setSaving(true);
    setTimeout(()=>{
      try{
        const i1=inn1||{battingTeam:"",bowlingTeam:"",totalRuns:0,wickets:0,totalBalls:0,battingOrder:[],batsmen:{},bowlers:{},bowlingOrder:[],extras:{wd:0,nb:0,b:0,lb:0}};
        const cv=buildScorecardCanvas(i1,inn,result,match);
        setScorecardUrl(cv.toDataURL("image/png"));
        setSaving(false);
      }catch(e){console.error("Scorecard error:",e);setSaving(false);}
    },100);
  };

  const downloadScorecard=()=>{
    if(!scorecardUrl)return;
    const i1=inn1||{battingTeam:""};
    const fname=`LCC-${(i1.battingTeam||"team").replace(/\s+/g,"-")}-vs-${(inn.battingTeam||"team").replace(/\s+/g,"-")}.png`;
    const a=document.createElement("a");a.download=fname;a.href=scorecardUrl;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  };

  // Inline innings highlights
  const innHighlight=(inn)=>{
    if(!inn) return null;
    const bats=Object.entries(inn.batsmen||{}).sort((a,b)=>b[1].runs-a[1].runs);
    const top=bats[0];
    const bowls=Object.entries(inn.bowlers||{}).filter(([,b])=>b.wickets>0).sort((a,b)=>b[1].wickets-a[1].wickets||a[1].runs-b[1].runs);
    const bestBowl=bowls[0];
    return {top,bestBowl};
  };
  const h1=innHighlight(inn1), h2=innHighlight(inn);

  const InnCard=({inn:I,highlight:h,isWinner})=>{
    if(!I) return null;
    return(
      <div style={{background:isWinner?"rgba(52,211,153,.08)":"rgba(255,255,255,.04)",
        border:isWinner?"1.5px solid rgba(52,211,153,.3)":"1px solid rgba(99,102,241,.2)",
        borderRadius:16,padding:"14px 16px",marginBottom:10,textAlign:"left"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <p style={{fontSize:10,color:isWinner?"#34d399":"#818cf8",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:2}}>
              {isWinner?"🏆 WINNER":""}
            </p>
            <p style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700}}>{I.battingTeam}</p>
          </div>
          <div style={{textAlign:"right"}}>
            <p style={{fontFamily:"'Oswald',sans-serif",fontSize:26,fontWeight:700,lineHeight:1,color:isWinner?"#34d399":"#a5b4fc"}}>{I.totalRuns}/{I.wickets}</p>
            <p style={{fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>({ovStr(I.totalBalls)} ov)</p>
          </div>
        </div>
        {(h?.top||h?.bestBowl)&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,borderTop:"1px solid rgba(99,102,241,.15)",paddingTop:10}}>
            {h?.top&&<div>
              <p style={{fontSize:9,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:3}}>🏏 TOP SCORE</p>
              <p style={{fontSize:13,fontWeight:700}}>{h.top[0]}</p>
              <p style={{fontSize:11,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace"}}>{h.top[1].runs} <span style={{color:"#6b7280"}}>({h.top[1].balls}b)</span></p>
            </div>}
            {h?.bestBowl&&<div>
              <p style={{fontSize:9,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:3}}>🎯 BEST BOWL</p>
              <p style={{fontSize:13,fontWeight:700}}>{h.bestBowl[0]}</p>
              <p style={{fontSize:11,color:"#fb923c",fontFamily:"'JetBrains Mono',monospace"}}>{h.bestBowl[1].wickets}/{h.bestBowl[1].runs}</p>
            </div>}
          </div>
        )}
      </div>
    );
  };

  return(
    <>
    {/* In-page scorecard modal */}
    {scorecardUrl&&(
      <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,.97)",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",
          borderBottom:"1px solid rgba(99,102,241,.25)",background:"rgba(8,6,30,.98)",flexShrink:0}}>
          <p style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700}}>📋 Scorecard</p>
          <div style={{display:"flex",gap:8}}>
            <button onClick={downloadScorecard} style={{
              padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",
              background:"rgba(99,102,241,.2)",color:"#a5b4fc",fontSize:12,
              fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>📥 Save</button>
            <button onClick={()=>setScorecardUrl(null)} style={{
              padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",
              background:"rgba(239,68,68,.15)",color:"#f87171",fontSize:12,
              fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>✕ Close</button>
          </div>
        </div>
        <div style={{flex:1,overflow:"auto",padding:16,display:"flex",justifyContent:"center"}}>
          <img src={scorecardUrl} style={{width:"100%",maxWidth:800,borderRadius:10,display:"block"}} alt="Scorecard"/>
        </div>
        <p style={{padding:"10px 16px",color:"#4b5563",fontSize:10,textAlign:"center",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>
          iOS: long-press image → Save to Photos · Android/Desktop: tap Save above
        </p>
      </div>
    )}

    <div className="screen">
      <div style={{textAlign:"center",maxWidth:"min(460px,100%)",width:"100%"}}>
        <div style={{fontSize:52,marginBottom:12}}>🏆</div>
        <h1 style={{fontSize:36,fontFamily:"'Oswald',sans-serif",fontWeight:700,marginBottom:6}}>{result.winner?`${result.winner} Win!`:"Match Tied!"}</h1>
        {result.winner&&<p style={{color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontSize:16,marginBottom:20}}>by {result.margin}</p>}

        {/* Enhanced innings summary cards */}
        <InnCard inn={inn1} highlight={h1} isWinner={result.winner===inn1?.battingTeam}/>
        <InnCard inn={inn} highlight={h2} isWinner={result.winner===inn?.battingTeam}/>

        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:14}}>
          <button className="btn btn-primary" style={{padding:"13px 20px",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={openScorecard} disabled={saving}>
            {saving?"Generating...":"📋 View Full Scorecard"}
          </button>
          {canRevert&&(
            <button className="btn" onClick={onRevert} style={{padding:"13px 20px",fontSize:14,background:"transparent",border:"1.5px solid rgba(52,211,153,.5)",color:"#34d399",borderRadius:14}}>↩️ Revert — bring match back to live</button>
          )}
          <button className="btn btn-ghost" onClick={onNew} style={{padding:"13px 20px",fontSize:14}}>🏏 New Match</button>
        </div>

        {/* Player of the Match voting */}
        <POTMVoting inn={inn} inn1={inn1} potm={potm} role={role}/>

      </div>
    </div>
    </>
  );
}

function ViewerLive({onExit}){
  const[snap,setSnap]=React.useState(undefined);
  const[potm,setPotm]=React.useState(null);
  const[tab,setTab]=React.useState("live");
  React.useEffect(()=>{
    if(!FB_OK||!DB){setSnap(null);return;}
    const ref=DB.ref("live");
    const cb=ref.on("value",s=>setSnap(s.val()));
    // Also listen to POTM so viewers can vote + see winner
    const pRef=DB.ref("potm");
    const pCb=pRef.on("value",s=>setPotm(s.val()||null));
    return ()=>{ref.off("value",cb);pRef.off("value",pCb);};
  },[]);

  if(snap===undefined) return <Centered emoji="📡" title="Connecting…" sub="Loading live match" onExit={onExit}/>;

  const inn=snap.inn, inn1=snap.inn1, mo=snap.mo, match=snap.match;

          <span className="score-number">{inn.totalRuns}<span className="score-wkt">/{inn.wickets}</span></span>

        {inn.inningsNum===2&&inn1&&(

// ── Full scorecard for a completed match (from history) ──────────────────────
// ── Match Highlights — best figures from both innings ────────────────────────
function MatchHighlights({m}){
  const combined=(key)=>{
    const out={};
    [m.inn1,m.inn2].forEach(inn=>{
      if(!inn)return;
      Object.entries(inn[key]||{}).forEach(([name,d])=>{
        if(!out[name])out[name]={runs:0,balls:0,fours:0,sixes:0,wickets:0,bowlerRuns:0,overs:0};
        if(key==="batsmen"){out[name].runs+=(d.runs||0);out[name].balls+=(d.balls||0);out[name].fours+=(d.fours||0);out[name].sixes+=(d.sixes||0);}
        if(key==="bowlers"){out[name].wickets+=(d.wickets||0);out[name].bowlerRuns+=(d.runs||0);out[name].overs+=(d.overs||0);}
      });
    });
    return out;
  };
  const bat=combined("batsmen");
  const bowl=combined("bowlers");

  // Fielding from howOut field: catches, run-outs, and stumpings
  const catches={};
  [m.inn1,m.inn2].forEach(inn=>{
    Object.values(inn?.batsmen||{}).forEach(b=>{
      const ho=b?.howOut||"";
      if(ho.startsWith("c ")){
        const name=ho.split(" b ")[0].replace("c ","").trim();
        if(name&&name!=="sub")catches[name]=(catches[name]||0)+1;
      }else if(ho.startsWith("st ")&&ho.includes(" b ")){
        // stumped: "st Keeper b Bowler"
        const name=ho.split(" b ")[0].replace("st ","").trim();
        if(name&&name!=="sub")catches[name]=(catches[name]||0)+1;
      }else if(ho.startsWith("run out (")){
        // run out: "run out (Fielder) (end) ..."
        const m2=ho.match(/^run out \(([^)]+)\)/);
        if(m2&&m2[1]&&m2[1]!=="sub")catches[m2[1].trim()]=(catches[m2[1].trim()]||0)+1;
      }
    });
  });

  const highlights=[];
  const topBat=Object.entries(bat).sort((a,b)=>b[1].runs-a[1].runs)[0];
  if(topBat)highlights.push({em:"🏏",title:"Top Scorer",name:topBat[0],val:`${topBat[1].runs} runs (${topBat[1].balls}b)`});
  const topBowl=Object.entries(bowl).filter(([,d])=>d.wickets>0).sort((a,b)=>b[1].wickets-a[1].wickets||a[1].bowlerRuns-b[1].bowlerRuns)[0];
  if(topBowl)highlights.push({em:"🎯",title:"Best Bowling",name:topBowl[0],val:`${topBowl[1].wickets}/${topBowl[1].bowlerRuns}`});
  const mostSix=Object.entries(bat).filter(([,d])=>d.sixes>0).sort((a,b)=>b[1].sixes-a[1].sixes)[0];
  if(mostSix)highlights.push({em:"6️⃣",title:"Most Sixes",name:mostSix[0],val:`${mostSix[1].sixes} sixes`});
  const mostFour=Object.entries(bat).filter(([,d])=>d.fours>0).sort((a,b)=>b[1].fours-a[1].fours)[0];
  if(mostFour)highlights.push({em:"4️⃣",title:"Most Fours",name:mostFour[0],val:`${mostFour[1].fours} fours`});
  const topCatch=Object.entries(catches).sort((a,b)=>b[1]-a[1])[0];
  if(topCatch)highlights.push({em:"🙌",title:"Best Fielding",name:topCatch[0],val:`${topCatch[1]} dismissal${topCatch[1]>1?"s":""}`});
  const bestEcon=Object.entries(bowl).filter(([,d])=>d.overs>=1).sort((a,b)=>(a[1].bowlerRuns/a[1].overs)-(b[1].bowlerRuns/b[1].overs))[0];
  if(bestEcon)highlights.push({em:"💨",title:"Best Economy",name:bestEcon[0],val:`${(bestEcon[1].bowlerRuns/bestEcon[1].overs).toFixed(2)} rpo`});

  if(!highlights.length)return null;
  return(
    <div style={{marginTop:16}}>
      <p style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".15em",marginBottom:10}}>📊 MATCH HIGHLIGHTS</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {highlights.map(h=>(
          <div key={h.title} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(99,102,241,.2)",borderRadius:14,padding:"12px 12px"}}>
            <p style={{fontSize:18,marginBottom:4}}>{h.em}</p>
            <p style={{fontSize:9,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:2}}>{h.title}</p>
            <p style={{fontWeight:700,fontSize:13}}>{h.name}</p>
            <p style={{fontSize:11,color:"#a5b4fc",fontFamily:"'JetBrains Mono',monospace"}}>{h.val}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MatchHistoryPOTM — permanent POTM voting accessible from match history ───
// Lives at history/{matchId}/potmVoting so players can vote any time after match
function MatchHistoryPOTM({m,role}){
  const[voting,setVoting]=React.useState(null);
  const deviceId=React.useMemo(()=>{
    try{
      let id=localStorage.getItem("lcc_device_id");
      if(!id){id="d_"+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("lcc_device_id",id);}
      return id;
    }catch(e){return "d_"+Math.random().toString(36).slice(2);}
  },[]);
  const[myName,setMyName]=React.useState(()=>{try{return localStorage.getItem("lcc_potm_voter_"+m.id)||null;}catch(e){return null;}});

  React.useEffect(()=>{
    if(!FB_OK||!DB||!m.id)return;
    const ref=DB.ref("history/"+m.id+"/potmVoting");
    const cb=ref.on("value",s=>{
      const v=s.val();
      // If no potmVoting exists yet, initialise it so voting can start
      if(!v&&FB_OK&&DB) DB.ref("history/"+m.id+"/potmVoting").set({open:true,votes:{}}).catch(()=>{});
      setVoting(v||{open:true,votes:{}});
    });
    return()=>ref.off("value",cb);
  },[m.id]);

  // All players who batted or bowled in either innings
  const participants=React.useMemo(()=>{
    const s=new Set();
    [m.inn1,m.inn2].forEach(inn=>{if(!inn)return;Object.keys(inn.batsmen||{}).forEach(n=>s.add(n));(inn.bowlingOrder||[]).forEach(n=>s.add(n));});
    return[...s].sort();
  },[m.inn1,m.inn2]);

  if(!voting)return <p style={{fontSize:11,color:"#4b5563",fontFamily:"'JetBrains Mono',monospace",marginTop:16}}>Loading POTM voting…</p>;

  const votes=voting.votes||{};
  const counts={};
  Object.values(votes).forEach(v=>{if(v?.votedFor)counts[v.votedFor]=(counts[v.votedFor]||0)+1;});
  const totalVotes=Object.values(counts).reduce((a,b)=>a+b,0);
  const myVote=votes[deviceId]?.votedFor||null;

  const castVote=(name)=>{
    if(!myName||!FB_OK||!DB)return;
    DB.ref("history/"+m.id+"/potmVoting/votes/"+deviceId).set({voter:myName,votedFor:name,at:Date.now()}).catch(()=>{});
  };

  const closeAndAnnounce=()=>{
    if(!FB_OK||!DB)return;
    let winner=null,max=0;
    Object.entries(counts).forEach(([n,c])=>{if(c>max){max=c;winner=n;}});
    if(!winner&&participants.length>0)winner=participants[0];
    DB.ref("history/"+m.id+"/potmVoting").update({open:false,winner,closedAt:Date.now()}).catch(()=>{});
    DB.ref("history/"+m.id+"/potm").set(winner).catch(()=>{});
    DB.ref("announcement").set({text:`🏆 Player of the Match (${m.teamA||""} vs ${m.teamB||""}): ${winner}!`,by:"LCC",ts:Date.now()}).catch(()=>{});
  };

  // ── Winner card ───────────────────────────────────────────────────────────
  if(voting.winner){
    return(
      <div style={{background:"linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.1))",border:"2px solid rgba(245,158,11,.5)",borderRadius:20,padding:"20px 18px",marginTop:16,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:6}}>🏆</div>
        <p style={{fontSize:9,color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".2em",marginBottom:4}}>PLAYER OF THE MATCH</p>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:26,fontWeight:700,color:"#fbbf24"}}>{voting.winner}</p>
        <p style={{fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{totalVotes} vote{totalVotes===1?"":"s"}</p>
      </div>
    );
  }

  if(!voting.open)return null;

  // ── Step 1: Who are you? ──────────────────────────────────────────────────
  if(!myName){
    return(
      <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"16px",marginTop:16}}>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,marginBottom:4}}>🏆 Vote · Player of the Match</p>
        <p style={{color:"#9ca3af",fontSize:11,marginBottom:12}}>Only players who participated can vote. Pick your name:</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {participants.map(n=>(
            <button key={n} onClick={()=>{setMyName(n);try{localStorage.setItem("lcc_potm_voter_"+m.id,n);}catch(e){}}}
              style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid rgba(99,102,241,.4)",background:"rgba(99,102,241,.12)",color:"#a5b4fc",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>
              {n}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Step 2: Cast vote ─────────────────────────────────────────────────────
  const sorted=[...participants].sort((a,b)=>(counts[b]||0)-(counts[a]||0));
  return(
    <div style={{background:"rgba(99,102,241,.08)",border:"1.5px solid rgba(99,102,241,.3)",borderRadius:20,padding:"16px",marginTop:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div>
          <p style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,marginBottom:2}}>🏆 Player of the Match</p>
          <p style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>Voting as {myName}{myVote?` · voted for ${myVote}`:""}</p>
        </div>
        <button onClick={()=>{setMyName(null);try{localStorage.removeItem("lcc_potm_voter_"+m.id);}catch(e){}}}
          style={{background:"none",border:"none",color:"#6b7280",fontSize:10,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>Not you?</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
        {sorted.filter(n=>n!==myName).map(n=>{
          const c=counts[n]||0;
          const pct=totalVotes>0?Math.round((c/totalVotes)*100):0;
          const isMyVote=myVote===n;
          return(
            <button key={n} onClick={()=>castVote(n)} style={{
              display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"10px 14px",borderRadius:12,cursor:"pointer",position:"relative",overflow:"hidden",
              border:isMyVote?"2px solid #fbbf24":"1.5px solid rgba(99,102,241,.3)",
              background:isMyVote?"rgba(245,158,11,.15)":"rgba(255,255,255,.03)",color:"#fff",textAlign:"left"
            }}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:pct+"%",background:"rgba(245,158,11,.08)",transition:"width .4s ease"}}/>
              <span style={{fontWeight:isMyVote?700:400,fontSize:13,position:"relative"}}>{n}{isMyVote&&<span style={{color:"#fbbf24",marginLeft:6,fontSize:10}}>✓ your vote</span>}</span>
              <span style={{fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",position:"relative"}}>{c} vote{c===1?"":"s"}</span>
            </button>
          );
        })}
      </div>
      <p style={{fontSize:10,color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",marginBottom:role==="admin"?10:0}}>{totalVotes} vote{totalVotes===1?"":"s"} cast</p>
      {role==="admin"&&(
        <button onClick={closeAndAnnounce} style={{width:"100%",padding:"12px",borderRadius:14,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#111",fontWeight:700,fontSize:13}}>
          🏆 Close Voting & Announce Winner
        </button>
      )}
    </div>
  );
}

function MatchDetailView({match:m,role,onBack,onDelete}){
  const[tab,setTab]=React.useState("summary");
  const[editOpen,setEditOpen]=React.useState(false);
  const[eWinner,setEWinner]=React.useState(m.result?.winner||"");
  const[eMargin,setEMargin]=React.useState(m.result?.margin||"");
  const[eToss,setEToss]=React.useState(m.tossSummary||"");
  const[eSaving,setESaving]=React.useState(false);
  const[dlSaving,setDlSaving]=React.useState(false);
  const saveEdit=()=>{
    if(!FB_OK||!DB) return;
    setESaving(true);
    const updates={};
    updates["history/"+m.id+"/result"]={winner:eWinner.trim()||null,margin:eMargin.trim()||null};
    updates["history/"+m.id+"/tossSummary"]=eToss.trim()||null;
    DB.ref().update(updates)
      .then(()=>{ setESaving(false); setEditOpen(false); alert("Match result updated."); })
      .catch(e=>{ setESaving(false); alert("Save failed: "+e.message); });

  const[histScorecardUrl,setHistScorecardUrl]=React.useState(null);
