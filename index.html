<script>
  // ── LCC Firebase configuration ──
  const firebaseConfig = {
    apiKey: "AIzaSyA_b8dFbqqAQRfl0W6uGyKmebepM8jtt68",
    authDomain: "mcc-scorer.firebaseapp.com",
    databaseURL: "https://mcc-scorer-default-rtdb.firebaseio.com",
    projectId: "mcc-scorer",
    storageBucket: "mcc-scorer.firebasestorage.app",
    messagingSenderId: "813330930410",
    appId: "1:813330930410:web:e996dc941659e5fd6bd593"
  };
  const ADMIN_PIN = "4821";
  const BASIC_ADMIN_PIN = "1234";

  function getDeviceId(){
    try{
      let id = localStorage.getItem("lcc_device_id");
      if(!id){ id = "dev_"+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem("lcc_device_id", id); }
      return id;
    }catch(e){
      if(!window.__lccSessionId) window.__lccSessionId = "dev_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
      return window.__lccSessionId;
    }
  }
  const DEVICE_ID = getDeviceId();

  let DB=null, FB_OK=false, AUTH_READY=false, AUTH_SETTLED=false;
  const _authWaiters=[];
  // Runs cb once auth has SETTLED — meaning sign-in either succeeded, failed, or timed out. We must
  // never block the app forever waiting on auth: if Anonymous Auth is disabled in the Firebase console
  // or sign-in is slow/fails, the app still needs to load and work. So this resolves on ANY settle.
  function releaseAuthWaiters(){ AUTH_SETTLED=true; while(_authWaiters.length){ try{_authWaiters.shift()();}catch(e){} } }
  function onAuthReady(cb){ if(AUTH_SETTLED||AUTH_READY){ cb(); } else { _authWaiters.push(cb); } }
  function tryInitFirebase(){
    if(FB_OK) return;
    if(typeof firebase==="undefined") return;
    try {
      if(!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
      DB = firebase.database();
      FB_OK = true;
      // ── Anonymous Auth — signs every app user in silently so Firebase Rules can require
      // auth != null. But auth must NEVER be a hard dependency for the app loading: if it's
      // disabled or fails, we still release everything so the app works (the rules just need to
      // permit it — see note to user). Three ways we settle: success, failure, or a 4s timeout.
      try{
        firebase.auth().onAuthStateChanged(u=>{
          if(u){ AUTH_READY=true; releaseAuthWaiters(); }
        });
      }catch(e){ releaseAuthWaiters(); }
      try{
        firebase.auth().signInAnonymously().catch(function(e){
          console.warn("Anonymous auth failed (is it enabled in Firebase?):",e&&e.message);
          releaseAuthWaiters(); // proceed anyway — don't strand the app
        });
      }catch(e){ releaseAuthWaiters(); }
      // Hard safety net: if neither success nor failure fires within 4s, proceed regardless.
      setTimeout(releaseAuthWaiters, 4000);
    } catch(e){ console.error("Firebase init failed:",e); releaseAuthWaiters(); }
  }
  tryInitFirebase();
  if(!FB_OK) window.addEventListener("load", tryInitFirebase);
</script>

}
/* Confetti burst — pieces launch outward to their randomized (--dx, --dy) offset, then keep falling
   under "gravity" (an extra downward drift) while spinning to --rot and fading out. */
@keyframes confettiFly{
  0%{transform:translate(-50%,-50%) rotate(0deg) scale(1);opacity:1;}
  65%{opacity:1;}
  100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy) + 70px)) rotate(var(--rot)) scale(.55);opacity:0;}
}
/* Fireworks — glowing spark streaks fly radially out from a burst point, drift down and fade.
   Pure transform+opacity, so cheap on phones; no canvas, no rAF loop. */
@keyframes fwSpark{
  0%{transform:translate(-50%,-50%) scale(1);opacity:0;}
  8%{opacity:1;}
  100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy) + 36px)) scale(.3);opacity:0;}
}
/* The bright core flash at the centre of each firework burst. */
@keyframes fwFlash{0%{transform:scale(.2);opacity:1}100%{transform:scale(2.8);opacity:0}}
/* Big boundary word ("SIX!" / "FOUR!" / "OUT!") — punchy pop-in, hold, drift-up fade-out. */
@keyframes bigWordIn{
  0%{transform:translateX(-50%) scale(.35) rotate(-5deg);opacity:0;}
  14%{transform:translateX(-50%) scale(1.15) rotate(1deg);opacity:1;}
  24%{transform:translateX(-50%) scale(1) rotate(0deg);}
  78%{transform:translateX(-50%) scale(1);opacity:1;}
  100%{transform:translateX(-50%) scale(1.06) translateY(-14px);opacity:0;}
}
/* Soft coloured glow around the screen edges during a boundary — sells the moment without
   covering any content in the middle. */
@keyframes edgeGlowPulse{0%{opacity:0}16%{opacity:1}68%{opacity:.7}100%{opacity:0}}
/* Corner confetti spray (FOUR) — pieces launch up and inward from the bottom corners. */
@keyframes confettiSpray{
  0%{transform:translate(0,0) rotate(0deg);opacity:1;}
  70%{opacity:1;}
  100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0;}
}
/* NO BALL top banner — slides down from above the viewport, holds, then lifts back up. */
@keyframes nbBanner{
  0%{transform:translateX(-50%) translateY(-120%);opacity:0;}
  12%{transform:translateX(-50%) translateY(0);opacity:1;}
  82%{transform:translateX(-50%) translateY(0);opacity:1;}
  100%{transform:translateX(-50%) translateY(-40%);opacity:0;}
}
/* Duck emoji waddle — a little side-to-side tilt so the 🦆 feels alive/comedic during a duck-out. */
@keyframes duckWaddle{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(9deg)}}
/* End-of-match finale overlay fade-out at the end of the show. */
@keyframes finaleFade{0%{opacity:1}82%{opacity:1}100%{opacity:0}}
/* Wicket flash shake — a sharp side-to-side punctuation so a dismissal reads as jarring/sudden,
   the visual opposite of a boundary's smooth pop-in. */
@keyframes ballFlashShake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-7px);}
  40%{transform:translateX(7px);}
  60%{transform:translateX(-5px);}
  80%{transform:translateX(5px);}
}
@keyframes drift{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(4deg)}}
@keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.5}90%{opacity:.5}100%{transform:translateY(-20vh) rotate(360deg);opacity:0}}
@keyframes logoFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.03)}}
@keyframes ringPulse{0%{transform:scale(.95);opacity:.7}100%{transform:scale(1.6);opacity:0}}
@keyframes slideInUp{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes glowText{0%,100%{filter:drop-shadow(0 0 8px rgba(245,158,11,.3))}50%{filter:drop-shadow(0 0 20px rgba(245,158,11,.6))}}
@keyframes sweep{0%{left:-100%}100%{left:200%}}
/* ── Cricket scene (viewBox 320x120, ground y=104) ── */
@keyframes ballRun{0%{transform:translate(70px,110px);opacity:0}12%{opacity:1}48%{transform:translate(252px,118px)}100%{transform:translate(160px,126px);opacity:0}}
@keyframes legSprint{0%{transform:scaleX(1)}20%{transform:scaleX(.75)}40%{transform:scaleX(1.25)}60%{transform:scaleX(.8)}80%{transform:scaleX(1.2)}100%{transform:scaleX(1)}}
@keyframes floodSweep{0%{transform:translateX(0) rotate(8deg);opacity:.5}50%{transform:translateX(320%) rotate(8deg);opacity:.9}100%{transform:translateX(0) rotate(8deg);opacity:.5}}
@keyframes crowdShimmer{0%{opacity:.3}50%{opacity:.6}100%{opacity:.3}}
@keyframes runBounce{0%{transform:translateY(0)}25%{transform:translateY(-2.5px)}50%{transform:translateY(0)}75%{transform:translateY(-2.5px)}100%{transform:translateY(0)}}
@keyframes thighSwingA{0%{transform:rotate(34deg)}50%{transform:rotate(-14deg)}100%{transform:rotate(34deg)}}
@keyframes thighSwingB{0%{transform:rotate(-24deg)}50%{transform:rotate(22deg)}100%{transform:rotate(-24deg)}}
@keyframes runArm{0%{transform:rotate(150deg)}50%{transform:rotate(118deg)}100%{transform:rotate(150deg)}}
@keyframes ballArc{0%{transform:translateY(0)}40%{transform:translateY(-22px)}100%{transform:translateY(0)}}
@keyframes ballArcLow{0%{transform:translateY(0)}40%{transform:translateY(-8px)}100%{transform:translateY(0)}}
@keyframes keeperSway{0%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}100%{transform:rotate(-2deg)}}
@keyframes keeperHop{0%{transform:translateY(0)}30%{transform:translateY(-9px)}55%{transform:translateY(0)}75%{transform:translateY(-5px)}100%{transform:translateY(0)}}

body.hc{--bg-1:#000000;--bg-2:#01050f;--bg-3:#020a1a;--bg-4:#01050f;--bg-5:#000000;

*{box-sizing:border-box;margin:0;padding:0}
/* ── THEME: Midnight Blue & Cyan ──────────────────────────────────────────────
   All colors centralized here so the whole app shares one cohesive palette and a
   future re-theme is a few lines, not hundreds of edits. Deep midnight-navy base,
   bright cyan as the primary accent, warm amber kept only for run/boundary emphasis. */
:root{
  --bg-1:#05070d; --bg-2:#0a0e1a; --bg-3:#0d1226; --bg-4:#0b0a1f; --bg-5:#050409;
  --surface:#0d1b3e;         /* card background */
  --surface-2:#122550;       /* raised card / header */
  --surface-3:#0a1530;       /* inputs, deep panels */
  --border:#2b4d8a;          /* standard border (navy) — lifted for sunlight visibility */
  --border-soft:rgba(56,132,224,.4);
  --primary:#22d3ee;         /* cyan accent */
  --primary-2:#0891b2;       /* deep cyan */
  --primary-glow:rgba(34,211,238,.35);
  --accent:#38bdf8;          /* sky blue secondary */
  --amber:#f59e0b; --amber-2:#fbbf24;   /* runs / four */
  --green:#10b981; --green-2:#34d399;   /* six / positive */
  --red:#ef4444; --red-2:#f87171;       /* wicket / danger */
  --text:#f2f7ff; --text-dim:#b3c3e8; --text-mute:#8194c0;   /* lifted 2 steps for sunlight */
  --admin:#f43f5e;           /* distinct admin accent (rose) */
  --admin-glow:rgba(244,63,94,.4);
}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer}
input,select,textarea{touch-action:manipulation}
html{overflow-x:hidden;max-width:100vw}
body{font-family:'Inter',sans-serif;
  background:
    radial-gradient(ellipse 85% 50% at 12% -2%, rgba(16,185,129,.20), transparent 55%),
    radial-gradient(ellipse 75% 48% at 88% 6%, rgba(56,120,255,.22), transparent 58%),
    radial-gradient(ellipse 95% 55% at 50% 104%, rgba(147,51,234,.26), transparent 60%),
    radial-gradient(ellipse 60% 40% at 95% 92%, rgba(225,60,150,.14), transparent 55%),
    linear-gradient(165deg,var(--bg-2),var(--bg-1) 45%,var(--bg-5));
  background-attachment:fixed;background-color:var(--bg-1);color:var(--text);min-height:100dvh;overflow-x:hidden;max-width:100vw}
.font-mono{font-family:'JetBrains Mono',monospace}
.font-display{font-family:'Oswald',sans-serif}

/* Layout */
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:
    radial-gradient(ellipse 85% 50% at 12% -2%, rgba(16,185,129,.22), transparent 55%),
    radial-gradient(ellipse 75% 48% at 88% 8%, rgba(56,120,255,.24), transparent 58%),
    radial-gradient(ellipse 95% 55% at 50% 104%, rgba(147,51,234,.28), transparent 60%),
    linear-gradient(165deg,var(--bg-2),var(--bg-1) 45%,var(--bg-5));position:relative;overflow:hidden}

/* result-screen: full-viewport centered (PinGate, Centered, MatchOver) */
.result-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px 16px;background:linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 30%,var(--bg-3) 60%,var(--bg-4) 82%,var(--bg-5) 100%)}
.result-card{background:rgba(13,27,62,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border-soft);border-radius:24px;padding:28px 24px;width:100%;max-width:420px}

/* Responsive content wrapper — replaces hardcoded maxWidth:480 inline styles */
.resp-wrap{width:100%;max-width:520px;margin:0 auto}

.card{background:rgba(13,27,62,.78);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border-soft);border-radius:28px;padding:26px;width:100%;max-width:520px;box-shadow:0 24px 64px rgba(0,0,0,.5)}

/* ── Tablet ≥640px ── */
@media(min-width:640px){
  .resp-wrap{max-width:600px}
  .result-card{max-width:500px;padding:36px 32px;border-radius:28px}
  .card{max-width:600px;padding:32px}
  .mini-card{padding:16px}
  .btn-run{font-size:28px;padding:20px 10px}
  .grid-4{gap:10px}
  .grid-2{gap:12px}
  .tabs{margin:16px 0}
  input{font-size:15px;padding:12px 16px}
  label{font-size:11px}
  .btn{font-size:14px;padding:14px 22px}
}

/* ── Desktop ≥1024px ── */
@media(min-width:1024px){
  .resp-wrap{max-width:720px}
  .result-card{max-width:560px;padding:44px 40px}
  .card{max-width:680px;padding:36px}
  .mini-card{padding:20px 18px}
  .btn-run{font-size:30px;padding:22px 10px;border-radius:18px}
  .grid-4{gap:12px}
  .grid-2{gap:14px}
  input{font-size:16px;padding:13px 18px}
  .btn{font-size:15px}
}

/* ── Large desktop ≥1280px ── */
@media(min-width:1280px){
  .resp-wrap{max-width:800px}
  .result-card{max-width:600px}
}
.section-title{color:var(--primary);font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.2em;margin-bottom:6px}

/* Inputs */
input,select,textarea{width:100%;background:var(--surface-3);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
input::placeholder{color:#8b93d9;opacity:1}
.find-stats-input::placeholder{color:rgba(255,255,255,.62);opacity:1}
label{display:block;color:#818cf8;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.15em;margin-bottom:6px}

/* Buttons */
.btn{border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-radius:14px;transition:all .15s;font-size:13px}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#04121a;padding:13px 20px;box-shadow:0 0 20px var(--primary-glow)}
.btn-primary:hover{filter:brightness(1.1);transform:scale(1.02)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{background:transparent;border:1.5px solid #526480;color:#bcc7d8;padding:13px 20px}
.btn-ghost:hover{border-color:#ef4444;color:#f87171}
.btn-danger{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff;padding:13px 20px}
.btn-danger:hover{filter:brightness(1.1)}
.btn-outline-amber{background:transparent;border:1.5px solid #d97706;color:#fbbf24;padding:13px 14px}
.btn-outline-amber:hover{background:rgba(217,119,6,.15)}
.btn-outline-gray{background:transparent;border:1.5px solid #526480;color:#9aa8bf;padding:13px 14px}
.btn-outline-gray:hover{border-color:#6366f1;color:#818cf8}
.btn-run{background:linear-gradient(135deg,rgba(56,189,248,.20),rgba(37,99,235,.28));border:2px solid #3f7fd6;color:#fff;padding:10px 8px;font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;border-radius:14px;width:100%;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:transform .08s ease,box-shadow .08s ease,background .08s ease;cursor:pointer;user-select:none;box-shadow:0 2px 10px rgba(37,99,235,.18)}
.btn-run:active{transform:scale(.9);background:rgba(99,102,241,.6);border-color:#a5b4fc;box-shadow:0 0 24px rgba(99,102,241,.7)}
.btn-run:hover{border-color:#818cf8;background:rgba(99,102,241,.3)}
.btn-run.amber{background:linear-gradient(135deg,var(--amber),#d97706);color:#111;border:none;box-shadow:0 0 24px rgba(245,158,11,.45);text-shadow:0 1px 0 rgba(0,0,0,.15)}
.btn-run.amber:active{transform:scale(.9);box-shadow:0 0 32px rgba(245,158,11,.8);filter:brightness(1.15)}
.btn-run.green{background:linear-gradient(135deg,var(--green),#059669);color:#04121a;border:none;box-shadow:0 0 20px rgba(16,185,129,.3)}
.btn-run.green:active{transform:scale(.9);box-shadow:0 0 32px rgba(16,185,129,.7);filter:brightness(1.15)}
.btn-run.decl{background:linear-gradient(135deg,rgba(167,139,250,.22),rgba(124,58,237,.30));border:2px solid #8b5cf6;color:#e9d5ff;font-size:18px;box-shadow:0 2px 10px rgba(139,92,246,.2)}
.btn-run.decl:active{transform:scale(.9);background:rgba(139,92,246,.5);border-color:#c4b5fd;box-shadow:0 0 24px rgba(139,92,246,.6)}
.btn-undo{background:transparent;border:1.5px solid #4338ca;color:#818cf8;padding:6px 12px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-undo:hover{background:rgba(99,102,241,.15)}
.btn-undo:disabled{border-color:#1f2937;color:#526480;cursor:not-allowed}

/* Score header */
.score-header{background:linear-gradient(135deg,rgba(34,211,238,.12),rgba(14,33,72,.55),rgba(56,189,248,.08));border-bottom:1px solid var(--border);padding:6px 14px 6px;position:sticky;top:0;z-index:40;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.score-big{font-family:'Oswald',sans-serif;font-size:40px;font-weight:700;line-height:1;background:linear-gradient(135deg,#fff,#a5e9f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-wkt{-webkit-text-fill-color:#f87171}

/* Tabs */
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;background:var(--surface-2);border-radius:16px;padding:4px;margin:6px 14px}
.tab{background:transparent;border:none;color:#9aa8bf;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.08em;padding:10px;border-radius:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.tab.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#04121a}

/* Over ticker */
.chip{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;border:2px solid;flex-shrink:0;transition:transform .15s;cursor:default}
.chip-W{background:#ef4444;color:#fff;border-color:#f87171;box-shadow:0 0 12px rgba(239,68,68,.4)}
.chip-4{background:#f59e0b;color:#111;border-color:#fbbf24;box-shadow:0 0 12px rgba(245,158,11,.4)}
.chip-6{background:#10b981;color:#111;border-color:#34d399;box-shadow:0 0 12px rgba(16,185,129,.35)}
.chip-decl{background:#8b5cf6;color:#fff;border-color:#c4b5fd;box-shadow:0 0 12px rgba(139,92,246,.4)}
.chip-WD,.chip-NB{background:#f59e0b;color:#111;border-color:#fbbf24;border-style:dashed;box-shadow:0 0 12px rgba(245,158,11,.4)}
.chip-0{background:#64748b;color:#fff;border-color:#94a3b8;box-shadow:0 0 12px rgba(100,116,139,.4)}
.chip-run{background:#3b82f6;color:#fff;border-color:#60a5fa;box-shadow:0 0 12px rgba(59,130,246,.4)}

/* Mini cards */
.mini-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px}
.score-summary-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 2px;border-bottom:1px solid var(--border)}
.score-summary-row:last-child{border-bottom:none}

/* Table */
.score-table{width:100%;border-collapse:collapse;font-size:13px}
.score-table th{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--primary);font-weight:500;padding:10px 8px;background:var(--surface-3)}
.score-table th:first-child{text-align:left;padding-left:16px}
.score-table th:last-child{padding-right:16px}
.score-table td{padding:10px 8px;border-top:1px solid var(--border);color:#cbd8f0;text-align:right;font-family:'JetBrains Mono',monospace}
.score-table td:first-child{text-align:left;padding-left:16px;font-family:'Inter',sans-serif;color:#fff;font-weight:600}
.score-table td:last-child{padding-right:16px}

/* Grids */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}

/* Alert boxes */
.alert-red{background:rgba(239,68,68,.12);border:1.5px solid rgba(239,68,68,.5);border-radius:16px;padding:14px}
.alert-indigo{background:rgba(34,211,238,.1);border:1.5px solid rgba(34,211,238,.45);border-radius:16px;padding:14px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:16px}
@media(min-width:640px){.modal-bg{align-items:center}}
.modal{background:var(--surface-2);border:1px solid var(--border);border-radius:24px;padding:20px;width:100%;max-width:360px;max-height:min(85dvh,640px);overflow-y:auto;}

/* Misc */
.divider{height:1px;background:var(--border);margin:8px 0}
.tag-amber{background:rgba(245,158,11,.15);color:#f59e0b;border-radius:10px;padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;text-align:center}
.gap-4{gap:16px}
.gap-2{gap:8px}
.mb-1{margin-bottom:4px}

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback}=React;

// ── Helpers ──────────────────────────────────────────────────────────────────
const nb=(n,pid)=>({name:n,pid:pid||null,runs:0,balls:0,fours:0,sixes:0,out:false,howOut:"",onStrike:false});
const nw=(n,pid)=>({name:n,pid:pid||null,overs:0,ballsThisOver:0,runs:0,wickets:0,maidens:0,runsThisOver:0});
const ovStr=(b)=>`${Math.floor(b/6)}.${b%6}`;
const rr=(r,b)=>b===0?"0.00":((r/b)*6).toFixed(2);
const T=20;

// ── Stats linking: normalize a name and resolve it to a roster profile id ──
// Scorecards store players by typed name; profiles use ids. We bridge them by
// matching on a normalized full name (trim + lowercase + collapse spaces).
function normName(n){return (n||"").trim().toLowerCase().replace(/\s+/g," ");}
// "Avinash Thammineni" -> "Avinash T." — used in compact live cards (batsman/bowler) where a full
// name would get cut off. Keeps the first name in full (that's what people actually go by) and
// reduces the rest to initials, so it's still unambiguous between two players sharing a first name.
function shortName(n){
  const parts=(n||"").trim().split(/\s+/).filter(Boolean);
  if(parts.length<=1) return parts[0]||"";
  return parts[0]+" "+parts.slice(1).map(p=>p[0].toUpperCase()+".").join("");
}
// First name only — for the tightest spaces (live batsman cards), where even "First L." was still
// getting ellipsis-truncated once a strike indicator sat alongside it. First names are consistently
// short enough to fit without truncation in practice.
function firstName(n){
  const parts=(n||"").trim().split(/\s+/).filter(Boolean);
  return parts[0]||"";
}
// "Raj" -> "Raj's Team". Scorers often just type a person's name (whoever's captaining/organizing)
// rather than an actual team name, and typing "'s Team" by hand every single match was the ask here.
// Only appends when the name doesn't already read like a team name — already containing "team", or
// ending in a common team-name suffix (XI, CC, FC, club) — so real team names ("Warriors", "Lakers CC")
// pass through unchanged instead of becoming "Warriors's Team".
function formatTeamName(n){
  const t=(n||"").trim();
  if(!t) return t;
  if(/\b(team|xi|cc|fc|club|xi's?)\b/i.test(t)) return t;
  const last=t[t.length-1].toLowerCase();
  const possessive=(last==="s")?"'":"'s";
  return t+possessive+" Team";
}
function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return"just now";
  if(s<3600)return Math.floor(s/60)+"m ago";
  if(s<86400)return Math.floor(s/3600)+"h ago";
  if(s<604800)return Math.floor(s/86400)+"d ago";
  return new Date(ts).toLocaleDateString(undefined,{month:"short",day:"numeric"});
}
// Map any stored venue string to a short canonical label so Lakes / Millennium
// group cleanly even though they're stored as "Lakes High School" /
// "Millennium Park, Lindenhurst" etc. Custom venues keep their own name.
function canonVenue(v){
  const s=(v||"").toLowerCase();
  if(s.includes("lakes")) return "Lakes High School";
  if(s.includes("millennium")) return "Millennium Park";
  return (v&&v.trim())||"Other";
}
function buildPidResolver(roster){
  const map={};
  Object.entries(roster||{}).forEach(([id,p])=>{
    if(!p) return;
    if(p.name) map[normName(p.name)]=id;
    // Aliases — set when two profiles are merged (see PlayerToolsInline's MergeTab). The duplicate
    // profile's name is preserved here so historical matches recorded under that exact name string
    // still resolve to the surviving profile's id instead of silently splitting into a separate,
    // orphaned "name-only" stat line.
    (p.aliases||[]).forEach(a=>{ if(a) map[normName(a)]=id; });
  });
  return (name)=> map[normName(name)] || null;
}

// ── Career stats engine — aggregates every completed match in `history` ──
// Players are keyed by profile id when known (exact, survives name typos),
// otherwise by normalized name. Returns one row per player with batting + bowling.
// Head-to-head team records from match history. For every completed match, pull the two team names
// and the winner, and tally an all-time record for each unordered pair of teams. Pure read-only
// derivation — no state, safe to call in render. Team names are matched by their normalized form so
// "OG's Team" and "OG's team" fold together, but the display keeps the first-seen original casing.
function computeHeadToHead(history){
  const pairs={}; // key: normalized "a|b" sorted -> {teams:[dispA,dispB], played, wins:{normName:count}, tied}
  const disp={};  // normName -> first-seen display name
  Object.values(history||{}).forEach(m=>{
    if(!m) return;
    // A completed match has two innings; team names come from each innings' batting side, falling back
    // to the recorded teamA/teamB. inn2 is the chasing side; inn1 the side that set the total.
    const t1=(m.inn1&&m.inn1.battingTeam)||m.teamA;
    const t2=(m.inn2&&m.inn2.battingTeam)||m.teamB;
    if(!t1||!t2) return;
    const n1=normName(t1), n2=normName(t2);
    if(!n1||!n2||n1===n2) return;
    if(!disp[n1]) disp[n1]=t1;
    if(!disp[n2]) disp[n2]=t2;
    const key=[n1,n2].sort().join("|");
    if(!pairs[key]) pairs[key]={teams:key.split("|"), played:0, wins:{}, tied:0};
    const P=pairs[key];
    P.played++;
    const w=m.result&&m.result.winner;
    if(!w){ P.tied++; }
    else { const nw=normName(w); P.wins[nw]=(P.wins[nw]||0)+1; }
  });
  // Shape into a sorted list, most-played first.
  return Object.values(pairs).map(P=>{
    const [a,b]=P.teams;
    return {
      a:disp[a]||a, b:disp[b]||b,
      aWins:P.wins[a]||0, bWins:P.wins[b]||0, tied:P.tied, played:P.played
    };
  }).sort((x,y)=>y.played-x.played);
}

function computeCareerStats(history, roster){
  const resolve=buildPidResolver(roster);
  const players={};
  // A batsman/bowler object gets `pid` STAMPED onto it permanently at the moment it's first scored
  // (see nb()/nw()) — it isn't re-checked against the roster on every render. If that roster profile
  // is later deleted, old match records still carry the now-invalid pid. Trusting it blindly (as this
  // used to) created a "ghost" entry: pid is technically truthy so it never showed the "unlinked" tag,
  // but the roster lookup for its name/avatar silently failed too — an entry stuck displaying the raw
  // recorded name, un-mergeable because the merge tool only looks for entries with pid:null. Validating
  // the pid against the CURRENT roster here means a stale one is treated as absent and correctly falls
  // back to name-based resolution (or genuinely shows as unlinked, so it's discoverable again).
  const validPid=(pid)=>(pid&&roster&&roster[pid])?pid:null;
  const keyFor=(p)=>{const pid=validPid(p.pid)||resolve(p.name);return pid?("id:"+pid):("nm:"+normName(p.name));};
  const ensure=(p)=>{
    const k=keyFor(p);
    if(!players[k]){
      const pid=validPid(p.pid)||resolve(p.name);
      players[k]={key:k,pid:pid||null,
        name:(pid&&roster&&roster[pid]&&roster[pid].name)||p.name,
        avatar:(pid&&roster&&roster[pid]&&roster[pid].avatar)||null,
        bat:{inns:0,runs:0,balls:0,fours:0,sixes:0,outs:0,hs:0,hsNotOut:false,fifties:0,hundreds:0,ducks:0},
        bowl:{inns:0,balls:0,runs:0,wkts:0,maidens:0,bestW:-1,bestR:0,dotBalls:0,ballsBowled:0},
        field:{catches:0,runOuts:0,stumpings:0},
        matchesSet:{}};
    }
    return players[k];
  };
  Object.values(history||{}).forEach((m,mi)=>{
    // Playing XI, if this match recorded one — the authoritative "who actually played" list. Credits
    // a match-played count even to someone who fielded the whole game without batting or bowling,
    // which the old bat/bowl-inference approach below could never see. Falls back gracefully for
    // matches saved before this was tracked (pubTeamA/B simply won't be present).
    [...(m&&m.pubTeamA)||[],...(m&&m.pubTeamB)||[]].forEach(name=>{
      if(!name) return;
      const pl=ensure({name});
      pl.matchesSet[mi]=true;
    });
    [m&&m.inn1,m&&m.inn2].forEach(inn=>{
      if(!inn) return;
      (inn.battingOrder||[]).forEach(name=>{
        const b=inn.batsmen&&inn.batsmen[name]; if(!b) return;
        const pl=ensure(b); pl.matchesSet[mi]=true;
        const batted=(b.balls||0)>0||b.out||(b.runs||0)>0;
        if(batted){
          const runs=b.runs||0;
          pl.bat.inns++; pl.bat.runs+=runs; pl.bat.balls+=b.balls||0;
          pl.bat.fours+=b.fours||0; pl.bat.sixes+=b.sixes||0;
          if(b.out) pl.bat.outs++;
          const notOut=!b.out;
          if(runs>pl.bat.hs||(runs===pl.bat.hs&&notOut&&!pl.bat.hsNotOut)){ pl.bat.hs=runs; pl.bat.hsNotOut=notOut; }
          // Milestones are per-INNINGS (b.runs already IS this innings' score, since inn.batsmen
          // resets fresh every match), not a running career total, so these count correctly here.
          if(runs>=100) pl.bat.hundreds++;
          else if(runs>=50) pl.bat.fifties++;
          if(runs===0&&b.out&&(b.balls||0)>0) pl.bat.ducks++;
        }
      });
      (inn.bowlingOrder||[]).forEach(name=>{
        const w=inn.bowlers&&inn.bowlers[name]; if(!w) return;
        const balls=(w.overs||0)*6+(w.ballsThisOver||0);
        const pl=ensure(w); pl.matchesSet[mi]=true;
        if(balls>0||(w.wickets||0)>0){
          pl.bowl.inns++; pl.bowl.balls+=balls; pl.bowl.runs+=w.runs||0;
          pl.bowl.wkts+=w.wickets||0; pl.bowl.maidens+=w.maidens||0;
          const wk=w.wickets||0, rn=w.runs||0;
          if(wk>pl.bowl.bestW||(wk===pl.bowl.bestW&&rn<pl.bowl.bestR)){ pl.bowl.bestW=wk; pl.bowl.bestR=rn; }
        }
      });
      // Ball-level pass — dot balls (bowling) and fielding credit (catches/run outs/stumpings) both
      // need the actual delivery-by-delivery events, not the pre-aggregated batsmen/bowlers summary
      // objects above, so they get their own loop over every recorded ball this innings.
      const allEvents=[...(inn.completedOvers||[]).flat(),...(inn.overEvents||[])];
      allEvents.forEach(ev=>{
        if(!ev) return;
        if(ev.type!=="WD"&&ev.type!=="NB"&&inn.bowlerName){
          // A dot ball is a LEGAL delivery (not a wide/no-ball, which don't count as a "ball" bowled
          // in the traditional sense here) that conceded zero total runs.
          if(evRuns(ev)===0){
            const pl=ensure({name:inn.bowlerName});
            pl.bowl.dotBalls++;
          }
        }
        if(ev.type==="W"&&ev.fielder&&(ev.dismissalType==="Caught"||ev.dismissalType==="Run Out"||ev.dismissalType==="Stumped")){
          const pl=ensure({name:ev.fielder});
          pl.matchesSet[mi]=true;
          if(ev.dismissalType==="Caught") pl.field.catches++;
          else if(ev.dismissalType==="Run Out") pl.field.runOuts++;
          else if(ev.dismissalType==="Stumped") pl.field.stumpings++;
        }
      });
    });
  });
  return Object.values(players).map(pl=>{
    const b=pl.bat, w=pl.bowl, f=pl.field;
    const ballsForDot=w.balls; // dot% is measured against legal balls bowled, same denominator as economy
    return {
      key:pl.key, pid:pl.pid, name:pl.name, matches:Object.keys(pl.matchesSet).length,
      bat:{...b, avg:b.outs>0?(b.runs/b.outs):null, sr:b.balls>0?(b.runs/b.balls*100):null, boundaries:b.fours+b.sixes},
      bowl:{...w, econ:w.balls>0?(w.runs/w.balls*6):null, avg:w.wkts>0?(w.runs/w.wkts):null,
        dotPct:ballsForDot>0?(w.dotBalls/ballsForDot*100):null,
        oversStr:Math.floor(w.balls/6)+(w.balls%6?"."+(w.balls%6):""),
        best:w.bestW>=0?(w.bestW+"/"+w.bestR):"—"},
      field:{...f, dismissals:f.catches+f.runOuts+f.stumpings}
    };
  });
}

// Season/tournament awards, computed from the same stats every player already sees. Criteria are
// necessarily a judgment call for the more informal ones (Finisher, Wall, Fire Bowler) — documented
// here so they're easy to adjust if the club wants a different definition. Minimum-qualification
// thresholds exist so a single lucky ball/over doesn't win an award (e.g. one over for 0 runs
// shouldn't beat someone who bowled economically across a whole tournament).
function computeBadges(stats){
  const withBat=stats.filter(s=>s.bat.inns>0);
  const withBowl=stats.filter(s=>s.bowl.inns>0);
  const withField=stats.filter(s=>s.field.dismissals>0);
  const top=(arr,keyFn)=>arr.length?arr.reduce((a,b)=>keyFn(b)>keyFn(a)?b:a):null;
  const bottom=(arr,keyFn)=>arr.length?arr.reduce((a,b)=>keyFn(b)<keyFn(a)?b:a):null;

  const orangeCap=top(withBat,s=>s.bat.runs);
  const purpleCap=top(withBowl,s=>s.bowl.wkts);
  const sixMachine=top(withBat,s=>s.bat.sixes);
  // Finisher: most not-out innings (closes out the game rather than getting dismissed), min 2 innings
  // played so a single not-out debut doesn't win outright.
  const finisherPool=withBat.filter(s=>s.bat.inns>=2);
  const finisher=top(finisherPool,s=>s.bat.inns-s.bat.outs);
  // Wall: highest batting average, min 2 innings (an average needs more than one knock to mean much).
  const wallPool=withBat.filter(s=>s.bat.inns>=2&&s.bat.avg!=null);
  const wall=top(wallPool,s=>s.bat.avg);
  // Fire Bowler: best (lowest) economy, min 12 balls (2 overs) bowled so one tidy over doesn't win it.
  const firePool=withBowl.filter(s=>s.bowl.balls>=12&&s.bowl.econ!=null);
  const fireBowler=bottom(firePool,s=>s.bowl.econ);
  const safeHands=top(withField,s=>s.field.catches);
  // MVP: a simple, transparent composite — runs + 20/wicket + 10/dismissal (fantasy-cricket-style
  // weighting). Not trying to be a perfect formula, just a fair single number across all three
  // disciplines so an all-round contribution can win over a pure specialist.
  const mvpScore=s=>s.bat.runs+s.bowl.wkts*20+s.field.dismissals*10;
  const mvp=top(stats.filter(s=>s.bat.inns>0||s.bowl.inns>0||s.field.dismissals>0),mvpScore);

  return [
    {key:"orangeCap",emoji:"🏅",label:"Orange Cap",winner:orangeCap,stat:orangeCap?`${orangeCap.bat.runs} runs`:null},
    {key:"purpleCap",emoji:"🟣",label:"Purple Cap",winner:purpleCap,stat:purpleCap?`${purpleCap.bowl.wkts} wkts`:null},
    {key:"sixMachine",emoji:"💥",label:"Six Machine",winner:sixMachine&&sixMachine.bat.sixes>0?sixMachine:null,stat:sixMachine&&sixMachine.bat.sixes>0?`${sixMachine.bat.sixes} sixes`:null},
    {key:"finisher",emoji:"🚀",label:"Finisher",winner:finisher&&(finisher.bat.inns-finisher.bat.outs)>0?finisher:null,stat:finisher?`${finisher.bat.inns-finisher.bat.outs} not outs`:null},
    {key:"wall",emoji:"🧱",label:"Wall",winner:wall,stat:wall?`avg ${wall.bat.avg.toFixed(1)}`:null},
    {key:"fireBowler",emoji:"🔥",label:"Fire Bowler",winner:fireBowler,stat:fireBowler?`econ ${fireBowler.bowl.econ.toFixed(2)}`:null},
    {key:"safeHands",emoji:"🦅",label:"Safe Hands",winner:safeHands&&safeHands.field.catches>0?safeHands:null,stat:safeHands&&safeHands.field.catches>0?`${safeHands.field.catches} catches`:null},
    {key:"mvp",emoji:"👑",label:"MVP",winner:mvp,stat:mvp?`${mvpScore(mvp)} pts`:null},
  ];
}
function chipClass(ev){
  if(ev.type==="W")  return "chip chip-W";
  if(ev.type==="4")  return "chip chip-4";
  if(ev.type==="6")  return "chip chip-6";
  if(ev.type==="WD") return "chip chip-WD";
  if(ev.type==="NB") return "chip chip-NB";
  if(ev.type==="0")  return "chip chip-0";
  if(ev.type==="DECL") return "chip chip-decl"; // own purple styling, matching the 1D/2D buttons
  if(ev.type==="OT")   return "chip chip-WD"; // orange dashed — overthrow declare
  return "chip chip-run";
}
function chipLbl(ev){
  if(ev.type==="W")  return"W";
  if(ev.type==="WD") return ev.extraRuns>1?`wd+${ev.extraRuns-1}`:"wd";
  if(ev.type==="NB") return ev.batRuns>0?`nb+${ev.batRuns}`:"nb";
  if(ev.type==="DECL") return `${ev.runs||0}D`;
  if(ev.type==="OT")   return `OT${(ev.baseRuns||0)+(ev.overthrowRuns||0)}`;
  return ev.type;
}
// Total TEAM runs contributed by a single ball event. Mirrors the `rT` branching inside record()
// exactly — that's the only source of truth for how a ball actually adds to the score. Earlier code
// at a couple of call sites summed events with `(ev.runs||0)+(ev.batRuns||0)+(ev.extraRuns||0)+...`,
// which only ever covers extras/DECL/OT/run-outs. Plain bat-off runs (tapping 0–6) are stored as just
// `{type:"6"}` with NO separate runs field — record() derives the value via parseInt(ev.type) itself
// — so that formula silently summed to 0 for every ordinary scoring shot, undercounting overs that
// were mostly boundaries (an over of six sixes showed "0 runs").
function evRuns(ev){
  if(!ev) return 0;
  if(ev.type==="WD") return ev.extraRuns||0;
  if(ev.type==="NB") return (ev.extraRuns||0)+(ev.batRuns||0);
  if(ev.type==="B"||ev.type==="LB") return ev.extraRuns||0;
  if(ev.type==="W") return ev.dismissalType==="Run Out" ? (parseInt(ev.runOutRuns)||0) : (ev.extraRuns||0);
  if(ev.type==="DECL") return parseInt(ev.runs)||0;
  if(ev.type==="OT") return (ev.baseRuns||0)+(ev.overthrowRuns||0);
  const r=parseInt(ev.type);
  return isNaN(r)?0:r;
}

// ── Setup (Admin only: teams, venue, toss — NO players) ──────────────────────
// One-time dismissible tip banner (per id, remembered in localStorage) — used to point first-time
// admins at features they'd otherwise miss, like assigning teams. Dismiss once, never see it again.
function AdminTip({id,children}){
  const[hide,setHide]=React.useState(()=>{try{return localStorage.getItem("lcc_tip_"+id)==="1"}catch(e){return false}});
  if(hide) return null;
  return(
    <div style={{display:"flex",alignItems:"flex-start",gap:8,background:"rgba(34,211,238,.08)",border:"1px solid rgba(34,211,238,.35)",borderRadius:12,padding:"9px 11px",marginBottom:12}}>
      <span style={{fontSize:13}}>💡</span>
      <span style={{fontSize:11,color:"var(--text-dim)",lineHeight:1.55,flex:1}}>{children}</span>
      <button onClick={()=>{setHide(true);try{localStorage.setItem("lcc_tip_"+id,"1")}catch(e){}}}
        style={{background:"none",border:"none",color:"var(--text-mute)",fontSize:13,cursor:"pointer",padding:0}}>✕</button>
    </div>
  );
}

function Setup({onStart,role,onExit,onHistory,onPoll,onRoster,prefillFixture}){
  const rA=useRef(),rB=useRef();
  const[fxTournamentId,setFxTournamentId]=useState(prefillFixture?.tournamentId||null);
  const[fxFixtureId,setFxFixtureId]=useState(prefillFixture?.fixtureId||null);
  // Setup's own venue picker uses short internal ids ("lakes"/"millennium"), but a tournament stores
  // its venue as the full display name ("Lakes High School"/"Millennium Park") since that's what
  // reads naturally on the Tournaments page. This maps one to the other so the two don't silently
  // desync — passing the full name straight through as venue state would have looked fine at a
  // glance (the UI would just show "other"/uncategorized) while quietly breaking every venue===
  // check used for the overs/wickets defaults and picker highlighting throughout this form.
  const venueNameToId=(v)=>{
    const s=(v||"").toLowerCase();
    if(s.includes("lakes")) return "lakes";
    if(s.includes("millennium")) return "millennium";
    return v||null;
  };
  const[venue,setVenue]=useState(venueNameToId(prefillFixture?.venue)||null);
  // Depends on `venue` (not just `[]`) as a safety net for fixtures that don't specify a venue: the
  // team inputs only exist once venue is set some other way (the user picking manually), so this needs
  // to be able to retry once that happens, not just once at mount.
  React.useEffect(()=>{
    if(!prefillFixture)return;
    if(rA.current&&prefillFixture.team1) rA.current.value=prefillFixture.team1;
    if(rB.current&&prefillFixture.team2) rB.current.value=prefillFixture.team2;
  },[venue]);
  const[overs,setOvers]=useState(8);
  const[wkts,setWkts]=useState(6);
  const[customOv,setCustomOv]=useState(false);
  const[customWk,setCustomWk]=useState(false);
  const[mWkts,setMWkts]=useState(10);
  const[customMWk,setCustomMWk]=useState(false);
  const[mOvers,setMOvers]=useState(20);
  const[customMOv,setCustomMOv]=useState(false);
  const[customVenueName,setCustomVenueName]=useState("");
  const[customVenueStyle,setCustomVenueStyle]=useState("lakes");
  const[cvOvers,setCvOvers]=useState(8);
  const[cvWkts,setCvWkts]=useState(10);
  const[cvSingle,setCvSingle]=useState(false);
  const[customCvOv,setCustomCvOv]=useState(false);
  const[customCvWk,setCustomCvWk]=useState(false);
  const[single,setSingle]=useState(false);
  const[pinA,setPinA]=useState(()=>String(Math.floor(1000+Math.random()*9000)));
  const[pinB,setPinB]=useState(()=>String(Math.floor(1000+Math.random()*9000)));
  const[tossWinner,setTossWinner]=useState(null);
  const[tossChoice,setTossChoice]=useState(null);
  const[flipping,setFlipping]=useState(false);
  const[coinResult,setCoinResult]=useState(null);
  const[flipCount,setFlipCount]=useState(0);
  const mountedRef=useRef(true);
  const audioCtxRef=useRef(null);

  // ── Published teams history — load ALL past sets, newest first ────────────
  const[pubTeamsList,setPubTeamsList]=useState([]);
  const[selectedPub,setSelectedPub]=useState(null);
  const[roster,setRoster]=useState({});
  const[imported,setImported]=useState(false);
  // Persistent per-team squads (e.g. "Rutul" -> his ~15 registered players), separate from the
  // clubwide roster. When the entered team name matches one of these, the assignment picker below
  // narrows to just that squad instead of showing the whole club — this is what makes it a genuine
  // "pick today's playing XI" step rather than a free-for-all assignment.
  const[teamSquads,setTeamSquads]=useState({});
  // Optional team assignment at setup: tap each club player to put them on Team A or Team B. When set,
  // the match starts WITH teams known, so the "who bats/bowls next" pickers show only that team's
  // players instead of the whole club. Kept optional so the quick-setup flow still works if skipped.
  const[assignA,setAssignA]=useState([]);   // array of player names on Team A
  const[assignB,setAssignB]=useState([]);   // array of player names on Team B
  const[showAssign,setShowAssign]=useState(false);

  React.useEffect(()=>{
    if(!FB_OK||!DB) return;
    const rRef=DB.ref("roster");
    const rCb=rRef.on("value",s=>setRoster(s.val()||{}));
    const tsRef=DB.ref("teamSquads");
    const tsCb=tsRef.on("value",s=>setTeamSquads(s.val()||{}));
    const ptRef=DB.ref("publishedTeams");
    const ptCb=ptRef.on("value",s=>{
      const v=s.val()||{};
      const list=Object.entries(v)
        .map(([id,t])=>({id,...t}))
        .sort((a,b)=>b.publishedAt-a.publishedAt)
        .slice(0,8);
      setPubTeamsList(list);
      // DO NOT auto-select the most recent published set. Auto-selecting meant every new match silently
      // defaulted to some old team lineup (the bug: starting a fresh match at a venue pre-picked
      // yesterday's teams). Published teams are now strictly OPT-IN — nothing is chosen unless the admin
      // deliberately taps a set. A brand-new match therefore starts with NO teams, ready for players to
      // be added before and during the match.
    });
    return()=>{rRef.off("value",rCb);tsRef.off("value",tsCb);ptRef.off("value",ptCb);};
  },[]);

  const importTeams=(pub)=>{
    const p=pub||selectedPub;
    if(!p) return;
    if(rA.current) rA.current.value=p.captainA||"Team A";
    if(rB.current) rB.current.value=p.captainB||"Team B";
    setSelectedPub(p);
    setImported(true);
  };

  // Convert PIDs → player names
  const teamNames=(pids)=>(pids||[]).map(id=>roster[id]?.name).filter(Boolean);

  React.useEffect(()=>()=>{mountedRef.current=false;},[]);

  // Defense in depth: Setup creates/configures matches and exposes the "reset live data" tool —
  // it must never be reachable by a non-admin. Placed AFTER all hooks above (Rules of Hooks).
  if(role!=="admin"){
    return <Centered emoji="🏏" title="No active match yet" sub="Ask the admin to start a match first." onExit={onExit}/>;
  }

  const isSingle=venue==="lakes"&&single;

  // ── Lightweight Web Audio sound effects (no external files needed) ──
  const getAudioCtx = () => {
    if(!audioCtxRef.current){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(Ctx) audioCtxRef.current = new Ctx();
    }
    return audioCtxRef.current;
  };
  const playTick = () => {
    const ctx = getAudioCtx(); if(!ctx) return;
    if(ctx.state==="suspended"){ ctx.resume().catch(()=>{}); return; } // skip just this one tick, context will be ready for the next
    const t = ctx.currentTime;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = "square"; osc.frequency.setValueAtTime(1100, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.06, t+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.06);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t+0.07);
  };
  const playResultChime = () => {
    const ctx = getAudioCtx(); if(!ctx) return;
    if(ctx.state==="suspended"){ ctx.resume().catch(()=>{}); }
    const t = ctx.currentTime;
    [523.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = "sine"; osc.frequency.setValueAtTime(freq, t+i*0.12);
      gain.gain.setValueAtTime(0.0001, t+i*0.12);
      gain.gain.exponentialRampToValueAtTime(0.18, t+i*0.12+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+i*0.12+0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t+i*0.12); osc.stop(t+i*0.12+0.55);
    });
  };
  // Actually SPEAK "Heads!" or "Tails!" out loud using the browser's built-in voice (no audio files needed)
  const announceResult = (word) => {
    try{
      if(!window.speechSynthesis) return;
      window.speechSynthesis.cancel(); // clear any queued/stuck utterances first
      const utter = new SpeechSynthesisUtterance(word + "!");
      utter.rate = 0.85; utter.pitch = 1.1; utter.volume = 1;
      const voices = window.speechSynthesis.getVoices();
      const enVoice = voices.find(v=>v.lang && v.lang.startsWith("en"));
      if(enVoice) utter.voice = enVoice;
      window.speechSynthesis.speak(utter);
    }catch(e){ console.error("speech announce failed",e); }
  };

  const FLIP_DURATION = 5000; // 5 seconds
  const flipCoin=()=>{
    if(flipping)return;
    setFlipping(true);setCoinResult(null);setFlipCount(c=>c+1);
    // iOS/Safari suspend AudioContext until it's resumed inside a real user-gesture handler — this click is that gesture.
    const ctx = getAudioCtx();
    if(ctx && ctx.state==="suspended") ctx.resume().catch(()=>{});
    // CRITICAL for iOS Safari: speechSynthesis.speak() is only reliably allowed when called directly
    // inside a user-gesture handler — calling it later from a setTimeout (as the real "Heads!"/"Tails!"
    // announcement must, since it has to wait for the flip to finish) gets silently blocked on iOS.
    // The fix: speak a near-silent "warm-up" utterance right now, synchronously inside this click.
    // This unlocks the speech engine for the rest of the page session, so the delayed real announcement
    // later (after the 6s flip) is then allowed to play normally.
    try{
      if(window.speechSynthesis){
        const warmup = new SpeechSynthesisUtterance(" ");
        warmup.volume = 0; warmup.rate = 10;
        window.speechSynthesis.speak(warmup);
      }
    }catch(e){}
    // Also pre-load voices now (first call to getVoices() can be empty until they finish loading async)
    try{ window.speechSynthesis && window.speechSynthesis.getVoices(); }catch(e){}
    // Tick sound while the coin spins, slowing down toward the end like a real coin settling
    const tickIntervals = [120,120,140,160,190,230,280,340,420,520,650,820];
    let elapsed = 0;
    tickIntervals.forEach((gap)=>{
      elapsed += gap;
      setTimeout(()=>{ if(mountedRef.current && elapsed < FLIP_DURATION-200) playTick(); }, elapsed);
    });
    setTimeout(()=>{
      if(!mountedRef.current)return;
      const result = Math.random()<0.5 ? "heads" : "tails";
      setCoinResult(result);
      playResultChime();
      announceResult(result==="heads"?"Heads":"Tails");
      setFlipping(false);
      // Deliberately NOT auto-picking a toss winner — the coin only reveals heads/tails.
      // Whoever called it correctly is selected manually below by admin, just like a real toss.
    },FLIP_DURATION);
  };
  const go=()=>{
    const raw=[rA,rB].map(r=>r.current?.value?.trim());
    if(!raw[0]||!raw[1]){alert("Please enter both team names.");return;}
    const[a,b]=raw.map(formatTeamName);
    if(!tossWinner||!tossChoice){alert("Select who won the toss and their decision.");return;}
    if(venue==="lakes"){
      if(!overs||overs<1||overs>50){alert("Enter valid overs (1-50).");return;}
      if(!wkts||wkts<1||wkts>11){alert("Enter valid wickets (1-11).");return;}
    }
    if(venue==="millennium"){
      if(!mOvers||mOvers<1||mOvers>50){alert("Enter valid overs (1-50).");return;}
      if(!mWkts||mWkts<1||mWkts>20){alert("Enter valid wickets (1-20).");return;}
    }
    if(venue==="other"){
      if(!customVenueName.trim()){alert("Enter the ground/venue name.");return;}
      if(!cvOvers||cvOvers<1||cvOvers>50){alert("Enter valid overs (1-50).");return;}
      if(!cvWkts||cvWkts<1||cvWkts>20){alert("Enter valid wickets (1-20).");return;}
    }
    if(!pinA||pinA.length<3||!pinB||pinB.length<3){alert("Both team PINs must be at least 3 digits.");return;}
    if(pinA===pinB){alert("Team A and Team B PINs must be different.");return;}

    // Determine who bats first based on toss
    const winnerName=tossWinner==="A"?a:b;
    const loserName=tossWinner==="A"?b:a;
    const battingFirst=tossChoice==="bat"?winnerName:loserName;
    const bowlingFirst=battingFirst===a?b:a;

    const v=venue==="millennium"
      ?{venue:"Millennium Park, Lindenhurst",format:Number(mOvers)===20?"T20":"Custom",overs:Number(mOvers),maxWkts:Number(mWkts),single:false}
      :venue==="other"
      ?{venue:customVenueName.trim(),format:customVenueStyle==="millennium"?(Number(cvOvers)===20?"T20":"Custom"):"Casual",overs:Number(cvOvers),maxWkts:Number(cvWkts),single:customVenueStyle==="lakes"&&cvSingle}
      :{venue:"Lakes High School",format:"Casual",overs:Number(overs),maxWkts:Number(wkts),single:isSingle};
    // Team rosters for the match: prefer the manual assignment made here; else fall back to an
    // imported published set; else empty (teams get filled as players log in, old behaviour).
    // assignA/assignB are keyed to team A/B by name, so map them to whichever side is teamA.
    const manualAssigned = assignA.length>0 || assignB.length>0;
    const pubA = manualAssigned ? assignA : (imported&&selectedPub ? teamNames(selectedPub.teamA) : []);
    const pubB = manualAssigned ? assignB : (imported&&selectedPub ? teamNames(selectedPub.teamB) : []);
    onStart({teamA:a,teamB:b,battingFirst,bowlingFirst,pinA,pinB,
      tossSummary:`${winnerName} won the toss, chose to ${tossChoice} first`,
      pubTeamA: pubA,
      pubTeamB: pubB,
      tournamentId: fxTournamentId||null,
      fixtureId: fxFixtureId||null,
      ...v});
  };
  const clr=()=>{[rA,rB].forEach(r=>{if(r.current)r.current.value=""});setTossWinner(null);setTossChoice(null);rA.current?.focus();};

  const venueBtn=(id,emoji,title,sub,active)=>(
    <button onClick={()=>setVenue(id)} style={{
      flex:1,padding:"16px 12px",borderRadius:18,cursor:"pointer",textAlign:"left",
      border:active?"2px solid #f59e0b":"1.5px solid rgba(99,102,241,.3)",
      background:active?"linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.1))":"rgba(30,27,75,.5)",
      transition:"all .18s",color:"#fff",fontFamily:"'Inter',sans-serif"
    }}>
      <div style={{fontSize:28,marginBottom:6}}>{emoji}</div>
      <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{title}</div>
      <div style={{fontSize:11,color:active?"#fbbf24":"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>{sub}</div>
    </button>
  );

  const chip=(val,cur,set,suffix)=>(
    <button onClick={()=>set(val)} style={{
      flex:1,padding:"10px 4px",borderRadius:12,cursor:"pointer",fontWeight:700,
      fontFamily:"'JetBrains Mono',monospace",fontSize:15,transition:"all .15s",
      border:cur===val?"none":"1.5px solid rgba(99,102,241,.3)",
      background:cur===val?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",
      color:cur===val?"#111":"#bcc7d8"
    }}>{val}{suffix||""}</button>
  );

  const teamAName=rA.current?.value?.trim()||"Team A";
  const teamBName=rB.current?.value?.trim()||"Team B";
  // Team squads are keyed by a Firebase-safe, normalized version of the FORMATTED team name (the same
  // name that ends up stored as match.teamA/teamB), so a squad saved for "Raj" is found again whether
  // the admin types "Raj", "raj", or " Raj " next time.
  const squadKey=(name)=>normName(formatTeamName(name)).replace(/[.#$\[\]\/]/g,"_");
  const squadA=teamSquads[squadKey(teamAName)]?.players||null;
  const squadB=teamSquads[squadKey(teamBName)]?.players||null;

  return(
    <div className="screen">
      <div style={{width:"100%",maxWidth:"min(460px,100%)"}}>
        <div className="flex items-center justify-between" style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,background:"rgba(239,68,68,.18)",color:"#f87171",border:"1px solid rgba(239,68,68,.4)",borderRadius:8,padding:"4px 10px",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,letterSpacing:".05em"}}>👑 ADMIN</span>
            <span style={{fontSize:10,color:FB_OK?"#34d399":"#f87171",fontFamily:"'JetBrains Mono',monospace"}} title={FB_OK?"Live sync connected":"Offline — live sync unavailable"}>{FB_OK?"● online":"⚠️ offline"}</span>
          </div>
          {onExit&&<button onClick={onExit} style={{background:"none",border:"none",color:"#9aa8bf",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← home</button>}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          {onHistory&&<button onClick={onHistory} style={{flex:1,background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.35)",color:"#a5b4fc",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,borderRadius:10,padding:"9px 12px"}}>📚 History</button>}
          {onRoster&&<button onClick={onRoster} style={{flex:1,background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.35)",color:"#6ee7b7",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,borderRadius:10,padding:"9px 12px"}}>👥 Roster</button>}
          {onPoll&&<button onClick={onPoll} style={{flex:1,background:"rgba(167,139,250,.12)",border:"1px solid rgba(167,139,250,.35)",color:"#c4b5fd",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,borderRadius:10,padding:"9px 12px"}}>📋 Poll</button>}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:18}}>
          {FB_OK&&DB&&<button onClick={()=>{ if(confirm("Clear any stuck/corrupted live match data? This won't affect saved history.")){ DB.ref("live").remove().then(()=>alert("Live data cleared. You can start a fresh match now.")); } }} style={{flex:1,background:"transparent",border:"1px solid rgba(99,102,241,.25)",color:"#9aa8bf",fontSize:12,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,borderRadius:10,padding:"9px 12px"}} title="Use this if scorers see a blank screen">🧹 Reset Live Data</button>}
        </div>
        <div className="text-center mb-6 animate-fade">
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:76,height:76,borderRadius:22,background:"linear-gradient(135deg,var(--primary),var(--primary-2),#0369a1)",fontSize:38,marginBottom:14,boxShadow:"0 8px 32px var(--primary-glow)",animation:"pulseGlow 3s ease-in-out infinite"}}>🏏</div>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:52,fontWeight:700,letterSpacing:"-2px"}}>
            <span style={{background:"linear-gradient(90deg,#FF9933,#ffb366,#FF9933)",backgroundSize:"300% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"slowDrift 9s linear infinite"}}>L</span>
            <span style={{background:"linear-gradient(90deg,#ffffff,#a5b4fc,#ffffff)",backgroundSize:"300% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"slowDrift 9s linear infinite"}}>C</span>
            <span style={{background:"linear-gradient(90deg,#138808,#3fa340,#138808)",backgroundSize:"300% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"slowDrift 9s linear infinite"}}>C</span>
          </h1>
          <p style={{color:"rgba(129,140,248,.5)",fontSize:13,marginTop:2,fontWeight:500}}>Lindenhurst Cricket Club</p>
        </div>
        <div className="card space-y-4">
          {/* Venue picker */}
          <div>
            <p style={{color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".15em",marginBottom:8}}>📍 Select Ground</p>
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              {venueBtn("lakes","🎾","Lakes High School","Casual · 6-8 ov",venue==="lakes")}
              {venueBtn("millennium","🏟️","Millennium Park","T20 · 20 ov",venue==="millennium")}
            </div>
            <button onClick={()=>setVenue("other")} style={{
              width:"100%",padding:"12px",borderRadius:14,cursor:"pointer",textAlign:"center",
              border:venue==="other"?"2px solid #f59e0b":"1.5px dashed rgba(99,102,241,.4)",
              background:venue==="other"?"linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.1))":"rgba(30,27,75,.3)",
              transition:"all .18s",color:venue==="other"?"#fbbf24":"#818cf8",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:13
            }}>📍✨ New / Other Venue</button>
          </div>

          {/* Lakes: choose overs + wickets */}
          {venue==="lakes"&&(
            <div className="animate-fade" style={{background:"rgba(7,5,15,.4)",borderRadius:16,padding:14,border:"1px solid rgba(99,102,241,.15)"}}>
              <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".12em",marginBottom:6}}>Overs per side</p>
              <div style={{display:"flex",gap:6,marginBottom:customOv?6:12}}>
                {[6,7,8].map(o=>(
                  <button key={o} onClick={()=>{setCustomOv(false);setOvers(o)}} style={{flex:1,padding:"10px 4px",borderRadius:12,cursor:"pointer",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",fontSize:15,transition:"all .15s",border:(!customOv&&overs===o)?"none":"1.5px solid rgba(99,102,241,.3)",background:(!customOv&&overs===o)?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:(!customOv&&overs===o)?"#111":"#bcc7d8"}}>{o}</button>
                ))}
                <button onClick={()=>{setCustomOv(true);setOvers("")}} style={{flex:1,padding:"10px 4px",borderRadius:12,cursor:"pointer",fontWeight:700,fontFamily:"'Inter',sans-serif",fontSize:12,transition:"all .15s",border:customOv?"none":"1.5px solid rgba(99,102,241,.3)",background:customOv?"linear-gradient(135deg,#8b5cf6,#6366f1)":"transparent",color:customOv?"#fff":"#bcc7d8"}}>Custom</button>
              </div>
              {customOv&&<input type="number" min="1" max="50" value={overs} onChange={e=>setOvers(e.target.value)} placeholder="Type overs (e.g. 10, 12, 15)" style={{width:"100%",marginBottom:12,background:"rgba(7,5,15,.8)",border:"1.5px solid rgba(139,92,246,.5)",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,fontFamily:"'JetBrains Mono',monospace",outline:"none"}}/>}

              <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".12em",marginBottom:6}}>Wickets per side</p>
              <div style={{display:"flex",gap:6,marginBottom:customWk?6:0}}>
                {[4,5,6,7].map(w=>(
                  <button key={w} onClick={()=>{setCustomWk(false);setWkts(w)}} style={{flex:1,padding:"10px 4px",borderRadius:12,cursor:"pointer",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",fontSize:15,transition:"all .15s",border:(!customWk&&wkts===w)?"none":"1.5px solid rgba(99,102,241,.3)",background:(!customWk&&wkts===w)?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:(!customWk&&wkts===w)?"#111":"#bcc7d8"}}>{w}</button>
                ))}
                <button onClick={()=>{setCustomWk(true);setWkts("")}} style={{flex:1,padding:"10px 4px",borderRadius:12,cursor:"pointer",fontWeight:700,fontFamily:"'Inter',sans-serif",fontSize:12,transition:"all .15s",border:customWk?"none":"1.5px solid rgba(99,102,241,.3)",background:customWk?"linear-gradient(135deg,#8b5cf6,#6366f1)":"transparent",color:customWk?"#fff":"#bcc7d8"}}>Custom</button>
              </div>
              {customWk&&<input type="number" min="1" max="11" value={wkts} onChange={e=>setWkts(e.target.value)} placeholder="Type wickets (e.g. 9, 10)" style={{width:"100%",background:"rgba(7,5,15,.8)",border:"1.5px solid rgba(139,92,246,.5)",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,fontFamily:"'JetBrains Mono',monospace",outline:"none"}}/>}

              <div className="divider" style={{margin:"12px 0"}}/>
              <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".12em",marginBottom:6}}>Batting style</p>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setSingle(false)} style={{flex:1,padding:"11px 6px",borderRadius:12,cursor:"pointer",fontWeight:700,fontFamily:"'Inter',sans-serif",fontSize:12,transition:"all .15s",border:!single?"none":"1.5px solid rgba(99,102,241,.3)",background:!single?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:!single?"#111":"#bcc7d8"}}>👥 Pair (2 batsmen)</button>
                <button onClick={()=>setSingle(true)} style={{flex:1,padding:"11px 6px",borderRadius:12,cursor:"pointer",fontWeight:700,fontFamily:"'Inter',sans-serif",fontSize:12,transition:"all .15s",border:single?"none":"1.5px solid rgba(99,102,241,.3)",background:single?"linear-gradient(135deg,#8b5cf6,#6366f1)":"transparent",color:single?"#fff":"#bcc7d8"}}>🧍 Single batsman</button>
              </div>
              {single&&<p style={{color:"#a78bfa",fontFamily:"'JetBrains Mono',monospace",fontSize:10,marginTop:8,textAlign:"center"}}>One batsman bats alone · always on strike · can retire &amp; return</p>}
              <p style={{color:"#4338ca",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginTop:12,textAlign:"center"}}>{overs||"?"} overs · {wkts||"?"} wickets · {single?"single":"pair"}</p>
            </div>
          )}
          {venue==="millennium"&&(
            <div className="animate-fade" style={{background:"rgba(245,158,11,.08)",borderRadius:16,padding:14,border:"1px solid rgba(245,158,11,.25)"}}>
              <p style={{color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:600,textAlign:"center",marginBottom:12}}>🏟️ Millennium Park</p>

              <p style={{color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".12em",marginBottom:6}}>Overs per side</p>
              <div style={{display:"flex",gap:6,marginBottom:customMOv?6:12,flexWrap:"wrap"}}>
                {[15,20,25].map(o=>(

                    boxShadow:flipping?"0 0 24px rgba(245,158,11,.6), inset 0 2px 4px rgba(255,255,255,.4)":"0 4px 16px rgba(245,158,11,.5), inset 0 2px 4px rgba(255,255,255,.4)",
                    fontSize:26,fontWeight:700,color:"#7c2d12",
                    transformStyle:"preserve-3d",
                    animation:flipping?"coinFlip 5s cubic-bezier(.36,.07,.19,.97)":"none"}}>

                    <button onClick={()=>setVal(String(Math.floor(1000+Math.random()*9000)))} style={{padding:"9px 13px",borderRadius:12,border:`1.5px solid ${color}66`,background:"transparent",color:color,cursor:"pointer",fontSize:17}} title="New random PIN">🎲</button>
                  </div>

              return(
                <div style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.3)",borderRadius:14,padding:14}}>

                          <span style={{width:16,height:16,borderRadius:5,border:`1.5px solid ${on?color:"#8291ab"}`,background:on?color:"transparent",
