function PinGate({title,pin,altPin,verify,hint,onOk,onCancel}){
  const[val,setVal]=React.useState("");
  const[err,setErr]=React.useState(false);
  const[errMsg,setErrMsg]=React.useState("");
  const submit=()=>{
    if(verify){
      const r=verify(val);
      if(r.ok){onOk(r);}else{setErr(true);setErrMsg(r.msg||"❌ Wrong PIN");setVal("");}
    } else {
      if(val===pin||(altPin&&val===altPin)){onOk();}else{setErr(true);setErrMsg("❌ Wrong PIN, try again");setVal("");}
    }
  };
  return(
    <div className="result-screen"><div className="result-card" style={{maxWidth:360,textAlign:"center"}}>
      <div style={{fontSize:44,marginBottom:10}}>🔒</div>
      <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:24,fontWeight:700,marginBottom:4}}>{title}</h2>
      <p style={{color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:hint?6:18}}>Enter PIN to continue</p>
      {hint&&<p style={{color:"#34d399",fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginBottom:16}}>● {hint}</p>}
      <input type="password" inputMode="numeric" value={val} autoFocus
        onChange={e=>{setVal(e.target.value);setErr(false);}}
        onKeyDown={e=>e.key==="Enter"&&submit()}
        placeholder="••••"
        style={{width:"100%",textAlign:"center",letterSpacing:"0.5em",fontSize:22,background:"rgba(7,5,15,.8)",border:`1.5px solid ${err?"#ef4444":"rgba(99,102,241,.4)"}`,borderRadius:14,padding:"12px",color:"#fff",fontFamily:"'JetBrains Mono',monospace",outline:"none",marginBottom:12}}/>
      {err&&<p style={{color:"#f87171",fontSize:12,marginBottom:12,fontFamily:"'Inter',sans-serif",lineHeight:1.4}}>{errMsg}</p>}
      <div className="grid-2">
        <button className="btn btn-ghost w-full" onClick={onCancel}>Cancel</button>
        <button className="btn btn-primary w-full" onClick={submit}>Enter</button>
      </div>
    </div></div>
  );
}

function CricketHero({hideText}){
  // Jumbled order — no two same outcomes back to back where possible
  const outcomes=React.useMemo(()=>[
    {label:"SIX!",color:"#34d399",type:"six"},
    {label:"RUN OUT!",color:"#f87171",type:"runout"},
    {label:"FOUR!",color:"#fbbf24",type:"four"},
    {label:"WIDE",color:"#a5b4fc",type:"wide"},
    {label:"CAUGHT!",color:"#f87171",type:"caught"},
    {label:"SIX!",color:"#34d399",type:"six"},
    {label:"BOWLED!",color:"#f87171",type:"bowled"},
  ],[]);
  const[idx,setIdx]=React.useState(0);
  // 8-SECOND CINEMATIC TIMELINE — distinct phases so the bowler runs in, delivers, the ball travels,
  // the bat swings, the result pops, then a celebration beat before resetting. Each phase flows into
  // the next via a single recursive timeout chain (no parallel timers) so nothing desyncs.
  //   runin   (0.0–2.0s)  bowler runs in toward the crease
  //   action  (2.0–2.5s)  bowling delivery stride + arm comes over
  //   release (2.5–3.0s)  ball leaves the hand, travels toward the bat
  //   swing   (3.0–4.0s)  bat meets ball at contact (result decided)
  //   result  (4.0–5.5s)  outcome plays out — ball flies to its settle point, word pops
  //   celebrate(5.5–7.5s) celebration beat — figures react, word eases, ball fades
  //   reset   (one frame) snap ball back to bowler hand before the next run-in
  const[phase,setPhase]=React.useState("runin");
  const T_RUNIN=2000, T_ACTION=500, T_RELEASE=500, T_SWING=1000, T_RESULT=1500, T_CELEBRATE=2000;
  const t_action  = T_RUNIN;                                   // 2000
  const t_release = t_action + T_ACTION;                       // 2500
  const t_swing   = t_release + T_RELEASE;                     // 3000 (contact)
  const t_result  = t_swing + T_SWING;                         // 4000
  const t_celeb   = t_result + T_RESULT;                       // 5500
  const CYCLE_MS  = t_celeb + T_CELEBRATE + 200;               // ~7700 + gap ≈ 8s

  React.useEffect(()=>{
    let alive=true;
    let timers=[];
    let raf=null;
    function step(){
      if(!alive)return;
      // reset: snap ball to bowler's hand invisibly, then start the run-in on the next frame
      setPhase("reset");
      raf=requestAnimationFrame(()=>{
        raf=requestAnimationFrame(()=>{ if(alive) setPhase("runin"); });
      });
      timers.push(setTimeout(()=>{ if(alive) setPhase("action"); },t_action));
      timers.push(setTimeout(()=>{ if(alive) setPhase("release"); },t_release));
      timers.push(setTimeout(()=>{ if(alive) setPhase("swing"); },t_swing));     // contact moment
      timers.push(setTimeout(()=>{ if(alive) setPhase("result"); },t_result));
      timers.push(setTimeout(()=>{ if(alive) setPhase("celebrate"); },t_celeb));
      timers.push(setTimeout(()=>{
        if(!alive)return;
        setIdx(i=>(i+1)%outcomes.length);
        step();
      },CYCLE_MS));
    }
    step();
    return ()=>{ alive=false; timers.forEach(clearTimeout); if(raf)cancelAnimationFrame(raf); };
  },[outcomes.length]);

  const o=outcomes[idx];
  const type=o.type;
  const isBowled=type==="bowled", isSix=type==="six", isCaught=type==="caught", isRunOut=type==="runout", isWide=type==="wide", isFour=type==="four";
  const isHit = isSix||isFour;
  // contact happens at the START of "swing"; everything from swing onward is post-contact
  const contactOrAfter = phase==="swing"||phase==="result"||phase==="celebrate";
  const settled = phase==="result"||phase==="celebrate";
  const celebrating = phase==="celebrate";
  const runningIn = phase==="runin"||phase==="action";
  const S=(c)=>({stroke:c,strokeWidth:5,strokeLinecap:"round",fill:"none"});

  // ── Ball position, computed directly from `phase` ──
  const BOWLER_HAND={x:70,y:110};
  const contactPt = isWide?{x:252,y:140}:isCaught?{x:248,y:108}:isBowled?{x:284,y:118}:{x:252,y:118};
  const settlePt = (()=>{
    if(isSix) return {x:60,y:42};
    if(isFour) return {x:8,y:112};
    if(isBowled) return {x:291,y:130};
    if(isCaught) return {x:208,y:58};
    if(isRunOut) return {x:56,y:108};
    return {x:305,y:142}; // wide drifts off
  })();
  // Ball travel: during runin it waits in the hand; on release it flies to contact; on swing/after it goes to settle.
  const ballTarget = (phase==="reset"||phase==="runin"||phase==="action") ? BOWLER_HAND
                   : phase==="release" ? contactPt
                   : phase==="swing" ? contactPt
                   : settlePt;
  const ballMoving = phase==="release"||phase==="swing"||phase==="result";
  // Dotted glowing trail: a streak from where this leg of travel STARTED to the ball's current target.
  // release leg starts at the hand; the result leg (ball flying away) starts at the contact point.
  const trailFrom = phase==="release" ? BOWLER_HAND : phase==="result" ? contactPt : null;
  const showTrail = (phase==="release"||phase==="result") && !isWide;

  const swingRotation = settled ? 0 : contactOrAfter ? (isSix?-160:isFour?-100:0) : 0;
  // Bowler run-in: the whole bowler figure translates in from further back during runin, plants at action.
  const bowlerShift = runningIn ? (phase==="runin"? -26 : 0) : 0;
  // Bowling arm windmills over during action/release.
  const bowlArm = (phase==="action"||phase==="release"||contactOrAfter) ? -360 : (phase==="runin"? -120 : -150);

  // viewBox is 320x170: a dedicated top band (y 0-40) for the result word,

  return(
    <div style={{position:"relative",width:"100%",aspectRatio:"320/170",margin:"0 auto",
      borderRadius:18,overflow:"hidden",border:"1px solid rgba(99,102,241,.25)"}}>
      {/* Real stadium photo background */}
      <img src={STADIUM} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
      {/* Crowd shimmer — faint twinkling sparkle over the stands, very subtle */}
      <div style={{position:"absolute",inset:0,pointerEvents:"none",opacity:.5,mixBlendMode:"screen",
        background:"radial-gradient(1px 1px at 20% 38%,rgba(255,255,255,.7),transparent),radial-gradient(1px 1px at 60% 32%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 80% 42%,rgba(173,216,255,.6),transparent),radial-gradient(1px 1px at 38% 46%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 72% 50%,rgba(255,255,255,.55),transparent)",
        animation:"crowdShimmer 3.2s steps(2) infinite"}}/>
      {/* Floodlight sweep — a soft diagonal beam of light that slowly drifts across the scene */}
      <div style={{position:"absolute",top:"-30%",left:"-30%",width:"50%",height:"160%",pointerEvents:"none",
        background:"linear-gradient(105deg,transparent,rgba(190,220,255,.10) 45%,rgba(190,220,255,.16) 50%,rgba(190,220,255,.10) 55%,transparent)",
        filter:"blur(6px)",transform:"rotate(8deg)",animation:"floodSweep 9s ease-in-out infinite"}}/>
      {/* Dark overlay so the stick figures + result text stay readable on the bright pitch */}
      <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(5,8,30,.35) 0%,rgba(5,8,30,.15) 55%,rgba(5,8,30,.45) 100%)",pointerEvents:"none"}}/>
      <svg viewBox="0 0 320 170" preserveAspectRatio="xMidYMid meet" style={{position:"relative",width:"100%",height:"100%",display:"block"}}>
        <defs>
          {/* soft white glow for the stick figures (matches the reference's glowing white players) */}
          <filter id="figGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="1.6" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          {/* stronger glow for the result badge border + text */}
          <filter id="badgeGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="2.4" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          {/* red glow for the ball + its dotted trail */}
          <filter id="ballGlow" x="-120%" y="-120%" width="340%" height="340%">
            <feGaussianBlur stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {/* Result badge — a colourful neon-bordered plaque (like the reference "FOUR!" badge):
            rounded rect outline in the outcome colour with a glow, and glowing text inside.
            Pops in at the swing (contact) moment, eases during celebration. */}
        {!hideText&&(
          <g opacity={contactOrAfter ? (celebrating?0.6:1) : 0}
             style={{transform:contactOrAfter?(celebrating?"scale(0.97)":"scale(1)"):"scale(0.55)",
                     transformOrigin:"160px 26px",
                     transition:phase==="swing"?"opacity .16s ease-out, transform .16s cubic-bezier(.34,1.56,.64,1)"
                             :celebrating?"opacity .6s ease-out, transform .6s ease-out"
                             :"opacity 0s, transform 0s"}}>
            {(()=>{
              // width the badge to the label length so short and long words both look centred
              const w = Math.max(64, o.label.length*15 + 26);
              const x = 160 - w/2;
              return(<>
                <rect x={x} y="11" width={w} height="30" rx="8" ry="8"
                  fill="rgba(6,10,30,.55)" stroke={o.color} strokeWidth="2" filter="url(#badgeGlow)"/>
                <text x="160" y="32" textAnchor="middle"
                  fontFamily="'Oswald',sans-serif" fontSize="20" fontWeight="700" letterSpacing="2"
                  fill={o.color} filter="url(#badgeGlow)">{o.label}</text>
              </>);
            })()}
          </g>
        )}

        {/* Pitch + figures band — the photo provides the real pitch, so just a soft ground shadow */}
        {/* Whole scene scaled down further (reference proportions: small, slim, glowing-white players)
            WITHOUT changing internal coordinates — so bat/ball/result sync stays identical. The figGlow
            filter gives the white-glow look from the reference. translate keeps the shrunk figures on the
            photo's pitch line. */}
        <g transform="translate(51,46) scale(0.68)" filter="url(#figGlow)">
        <ellipse cx="160" cy="150" rx="150" ry="7" fill="rgba(0,0,0,.28)"/>

        {/* Bowler — runs IN during runin, plants and windmills the arm over on action/release */}
        <g style={{transform:`translate(${56+bowlerShift}px,76px)`,transition:`transform ${runningIn?(phase==="runin"?T_RUNIN:T_ACTION):300}ms ease-in-out`}}>
          {/* legs scissor while running in */}
          <circle cx="0" cy="0" r="11" {...S("#eaf0ff")}/>
          <line x1="0" y1="11" x2="0" y2="49" {...S("#eaf0ff")}/>
          <g style={{transformOrigin:"0px 49px",animation:phase==="runin"?"legSprint .3s linear infinite":"none"}}>
            <line x1="0" y1="49" x2="-12" y2="65" {...S("#eaf0ff")}/>
            <line x1="0" y1="49" x2="12" y2="65" {...S("#eaf0ff")}/>
          </g>
          {/* bowling arm windmills over */}
          <g style={{transformOrigin:"0px 19px",transform:`rotate(${bowlArm}deg)`,transition:`transform ${phase==="action"||phase==="release"?T_ACTION+T_RELEASE:300}ms ease-in-out`}}>
            <line x1="0" y1="19" x2="19" y2="9" {...S("#eaf0ff")}/>
          </g>
        </g>

        {/* Batsman 1 (striker) */}
        <g transform={isRunOut?"translate(0,0)":"translate(264,76)"}>
          <g style={{
            transform:isRunOut?(settled?"translate(56px,76px)":contactOrAfter?"translate(150px,76px)":"translate(264px,76px)"):"none",
            transition:isRunOut?`transform ${contactOrAfter?(settled?'1100ms':'900ms'):'0ms'} ease-in-out`:"none"
          }}>
            <circle cx="0" cy="0" r="11" {...S("#fff4dc")}/>
            <line x1="0" y1="11" x2="0" y2="49" {...S("#fff4dc")}/>
            <g style={{transformOrigin:"0px 49px",animation:isRunOut?"legSprint .3s linear infinite":"none"}}>
              <line x1="0" y1="49" x2="-12" y2="65" {...S("#fff4dc")}/>
              <line x1="0" y1="49" x2="12" y2="65" {...S("#fff4dc")}/>
            </g>
            {/* Bat swing — same simple motion for every outcome that involves a swing (six and four alike).
                A six is distinguished by the BALL flying further/higher afterward, not by a separate
                celebration animation — keeps the scene simple and avoids any extra moving parts to desync.
                The contact-transition duration (150ms) is matched EXACTLY to the result text's pop-in duration
                below, so the bat finishes its swing at the same visual instant the word finishes appearing. */}
            <g style={{transformOrigin:"0px 19px",
              transform:`rotate(${isHit?swingRotation:0}deg)`,
              transition:`transform ${runningIn?'250ms':contactOrAfter?(settled?'900ms':'150ms'):'0ms'} ease-in-out`}}>
              <line x1="0" y1="19" x2="-7" y2="31" {...S("#fff4dc")}/>
              <line x1="-7" y1="31" x2="-7" y2="62" stroke="#f0d9b5" strokeWidth="6" strokeLinecap="round"/>
            </g>
          </g>
        </g>

        {/* Batsman 2 (non-striker) — only for run-out, mirrors batsman 1's phase-driven motion exactly */}
        {isRunOut&&(
          <g style={{
            transform:settled?"translate(264px,76px)":contactOrAfter?"translate(170px,76px)":"translate(56px,76px)",
            transition:`transform ${contactOrAfter?(settled?'1100ms':'900ms'):'0ms'} ease-in-out`
          }}>
            <circle cx="0" cy="0" r="11" {...S("#ffffff")}/>
            <line x1="0" y1="11" x2="0" y2="49" {...S("#ffffff")}/>
            <g style={{transformOrigin:"0px 49px",animation:"legSprint .3s linear infinite"}}>
              <line x1="0" y1="49" x2="-12" y2="65" {...S("#ffffff")}/>
              <line x1="0" y1="49" x2="12" y2="65" {...S("#ffffff")}/>
            </g>
            <line x1="0" y1="19" x2="14" y2="10" {...S("#ffffff")}/>
          </g>
        )}

        {/* Fielder — only for a catch, dives in exactly when phase becomes "contact" */}
        {isCaught&&(
          <g transform="translate(222,60)">
            <g style={{
              opacity:contactOrAfter?1:0,
              transform:contactOrAfter?"translate(-16px,8px) rotate(-30deg)":"translate(0,0) rotate(0deg)",
              transition:`transform ${contactOrAfter?'350ms':'0ms'} ease-out, opacity 150ms ease-out`
            }}>
              <circle cx="0" cy="0" r="10" {...S("#d6ffe9")}/>
              <line x1="0" y1="10" x2="0" y2="40" {...S("#d6ffe9")}/>
              <line x1="0" y1="16" x2="-14" y2="4" {...S("#d6ffe9")}/>
              <line x1="0" y1="16" x2="14" y2="4" {...S("#d6ffe9")}/>
              <line x1="0" y1="40" x2="-10" y2="54" {...S("#d6ffe9")}/>
              <line x1="0" y1="40" x2="10" y2="54" {...S("#d6ffe9")}/>
            </g>
          </g>
        )}

        {/* Stumps — fall exactly when phase becomes "contact", same trigger as everything else */}
        <g transform="translate(286,117)">
          {[0,5,10].map(dx=>(
            <line key={dx} x1={dx} y1="0" x2={dx} y2="24" stroke={(isBowled||isRunOut)&&contactOrAfter?"#f87171":"rgba(226,232,240,.55)"} strokeWidth="3"
              style={isBowled?{transformOrigin:`${dx}px 24px`,transform:`rotate(${contactOrAfter?40:0}deg)`,transition:`transform ${contactOrAfter?'400ms':'0ms'} ease-out`}:{}}/>
          ))}
          {/* Flying bails — two short bars that pop off the top of the stumps and tumble away on BOWLED */}
          {isBowled&&[{dx:1,fly:-16,rot:-90},{dx:7,fly:14,rot:120}].map((b,i)=>(
            <line key={"bail"+i} x1={b.dx} y1="-2" x2={b.dx+4} y2="-2" stroke="#fde68a" strokeWidth="2.5" strokeLinecap="round"
              filter="url(#ballGlow)"
              opacity={contactOrAfter?(settled?0:1):0}
              style={{transformOrigin:`${b.dx+2}px -2px`,
                      transform:contactOrAfter?`translate(${b.fly}px,-22px) rotate(${b.rot}deg)`:"translate(0,0)",
                      transition:contactOrAfter?"transform 600ms cubic-bezier(.3,.7,.5,1), opacity 600ms ease-out":"none"}}/>
          ))}
        </g>

        {/* Glowing dotted ball trail — a red dashed streak from the start of the ball's current leg to
            the ball, fading behind it (like the reference). Sits just under the ball. */}
        {showTrail&&trailFrom&&(
          <line x1={trailFrom.x} y1={trailFrom.y} x2={ballTarget.x} y2={ballTarget.y}
            stroke="#ff3b3b" strokeWidth="3" strokeLinecap="round" strokeDasharray="1 7"
            filter="url(#ballGlow)" opacity={settled?0:0.85}
            style={{transition:phase==="result"?"opacity 500ms ease-out":"opacity 150ms ease-in"}}/>
        )}

        {/* Ball — position computed directly from `phase`. Release flies hand→contact over T_RELEASE,
            swing snaps contact (150ms, matched to bat+text), result flies to settle point. */}
        <circle cx={ballTarget.x} cy={ballTarget.y} r="6" fill="#ef4444" stroke="#fca5a5" strokeWidth="2"
          filter="url(#ballGlow)"
          opacity={(phase==="reset"||phase==="runin"||phase==="action")?0:(settled&&(isSix||isFour||isBowled||isCaught||isRunOut||isWide)?0:1)}
          style={{transition:(phase==="reset"||phase==="runin"||phase==="action")?"none"
                  :phase==="release"?`cx ${T_RELEASE}ms ease-in, cy ${T_RELEASE}ms ease-in, opacity 150ms ease-in`
                  :phase==="swing"?`cx 150ms ease-out, cy 150ms ease-out`
                  :settled?`cx 1100ms ease-out, cy 1100ms ease-out, opacity 600ms ease-out`
                  :"none"}}/>
        </g>
      </svg>
    </div>
  );
}

// ── WeatherWidget — cycles between ⛅ temp and 🕐 time under the logo ─────────
function wmoEmoji(code){
  if(code===0)return"☀️";                          // clear sky
  if(code<=2)return"🌤️";                           // mainly clear
  if(code===3)return"☁️";                           // overcast
  if(code<=48)return"🌫️";                          // fog
  if(code<=55)return"🌦️";                          // drizzle
  if(code<=65)return"🌧️";                          // rain
  if(code<=67)return"🌨️";                          // freezing rain
  if(code<=77)return"❄️";                           // snow
  if(code<=82)return"🌧️";                          // rain showers
  if(code<=86)return"🌨️";                          // snow showers
  return"⛈️";                                       // thunderstorm
}
function WeatherWidget(){
  const[temp,setTemp]=React.useState(null);
  const[emoji,setEmoji]=React.useState("🌡️");
  const[time,setTime]=React.useState("");
  const[show,setShow]=React.useState(0); // 0=weather, 1=time

  const tick=()=>setTime(new Date().toLocaleTimeString("en-US",
    {timeZone:"America/Chicago",hour:"numeric",minute:"2-digit",hour12:true}));

  const fetchWx=()=>{
    // Request both current formats — Open-Meteo sometimes returns
    // weather_code in `current` and sometimes in `current_weather`
    fetch("https://api.open-meteo.com/v1/forecast?latitude=42.3831&longitude=-87.8939"+
      "&current=temperature_2m,weather_code&current_weather=true"+
      "&temperature_unit=fahrenheit&timezone=America/Chicago&forecast_days=1")
      .then(r=>r.json())
      .then(d=>{
        // Try both response shapes — use whichever has the data
        const t=d?.current?.temperature_2m??d?.current_weather?.temperature;
        const code=d?.current?.weather_code??d?.current_weather?.weathercode;
        if(t!=null){
          setTemp(Math.round(t));
          setEmoji(wmoEmoji(code??0));
        }
      })
      .catch(()=>{});
  };

  React.useEffect(()=>{
    tick();fetchWx();

    // Tick every second — guarantees clock is never stale, even after Chrome throttles the tab
    const ti=setInterval(tick,1000);

    // Refresh weather every 10 min
    const wi=setInterval(fetchWx,10*60*1000);

    // Cycle between weather and time every 3 seconds
    const ci=setInterval(()=>setShow(s=>(s+1)%2),3000);

    // Snap to current values the moment user returns to the tab
    const onVisible=()=>{
      if(document.visibilityState==='visible'){tick();fetchWx();}
    };
    document.addEventListener('visibilitychange',onVisible);

    return()=>{
      clearInterval(ti);clearInterval(wi);clearInterval(ci);
      document.removeEventListener('visibilitychange',onVisible);
    };
  },[]);

  if(!time)return null;

  const base={
    fontSize:10,fontFamily:"'JetBrains Mono',monospace",
    color:"rgba(165,180,252,.7)",letterSpacing:".04em",
    whiteSpace:"nowrap",textAlign:"center",
    transition:"opacity .5s ease, transform .5s ease",
  };

  return(
    <div style={{marginTop:5,height:14,overflow:"hidden",position:"relative",minWidth:90}}>
      {/* Weather */}
      <div style={{...base,position:"absolute",left:0,right:0,
        opacity:show===0&&temp?1:0,
        transform:show===0?`translateY(0)`:`translateY(-8px)`}}>
        {emoji} {temp!==null?`${temp}°F`:"—"}
      </div>
      {/* Time */}
      <div style={{...base,position:"absolute",left:0,right:0,
        opacity:show===1?1:0,
        transform:show===1?`translateY(0)`:`translateY(8px)`}}>
        {time} CT
      </div>
    </div>
  );
}

function ScorerGate({onOk,onCancel}){
  const[data,setData]=React.useState(undefined);
  React.useEffect(()=>{
    if(!FB_OK||!DB){setData(null);return;}
    const ref=DB.ref("live");
    const cb=ref.on("value",s=>{
      const v=s.val();
      if(!v||!v.inn||!v.pinA||!v.pinB){setData(null);return;}
      setData({pinA:v.pinA,pinB:v.pinB,teamA:v.teamA,teamB:v.teamB,
        battingTeam:v.battingTeam,awaitingOpeners:!!v.inn.awaitingOpeners,ib:!!v.ib,mo:!!v.mo});
    });
    return ()=>ref.off("value",cb);
  },[]);

  if(data===undefined) return <Centered emoji="🔑" title="Checking match…" sub="Loading scorer access"/>;
  if(data===null) return <Centered emoji="🏏" title="No active match yet" sub="Waiting for admin to start a match." onExit={onCancel}/>;
  if(data.mo) return <Centered emoji="🏆" title="Match has ended" sub="Ask the admin to start a new match." onExit={onCancel}/>;

  const verify=(entered)=>{
    if(entered===ADMIN_PIN||entered===BASIC_ADMIN_PIN) return {ok:true};
    const isTeamA=entered===data.pinA, isTeamB=entered===data.pinB;
    if(!isTeamA&&!isTeamB) return {ok:false,msg:"❌ Wrong PIN, try again"};
    const myTeam=isTeamA?data.teamA:data.teamB;
    if(data.awaitingOpeners||data.ib) return {ok:true};
    if(myTeam===data.battingTeam) return {ok:true};
    return {ok:false,msg:`🔒 ${myTeam} isn't batting yet — ${data.battingTeam} is batting now.`};
  };

  return <PinGate title="Team Scorer Access" verify={verify} onOk={onOk} onCancel={onCancel}
    hint={data.awaitingOpeners?"Setting up openers":data.ib?"Innings break — new team sets up":`${data.battingTeam} batting`}/>;
}

    const cb4=tRef.on("value",s=>setTeams(s.val()||null));

    return ()=>{ rRef.off("value",cb1); pRef.off("value",cb2); vRef.off("value",cb3); tRef.off("value",cb4); ppRef.off("value",cb5); };
  },[]);

  if(roster===undefined||poll===undefined||passphrase===undefined) return <Centered emoji="📋" title="Loading poll…" onExit={onExit}/>;

  const tabs=isAdmin
    ?[["manage","⚙️ Manage"],["vote","🗳️ Vote"],["teams","🏏 Teams"]]
    :[["vote","🗳️ Vote"],["teams","🏏 Teams"]];

  return(
    <div style={{background:"linear-gradient(165deg,#022c1e,#0a2540,#1c1150,#2d0f5c,#0a0414)",minHeight:"100dvh"}}>
      <PageHeader title="📋 Weekend Poll" onBack={onExit} backLabel="home"/>
      <div className="resp-wrap" style={{padding:"14px 16px 32px"}}>
        <div className={`tabs`} style={{marginBottom:18,gridTemplateColumns:`repeat(${tabs.length},1fr)`}}>
          {tabs.map(([id,lbl])=>(
            <button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
          ))}
        </div>
        {tab==="manage"&&isAdmin&&<>
          <PollCreateForm poll={poll}/>
          {poll&&<PollResultsList poll={poll}/>}
        </>}
        {tab==="vote"&&<PollVoteTab role={role} roster={roster} poll={poll} votes={votes} passphrase={passphrase}/>}
        {tab==="teams"&&<PollTeamsTab role={role} roster={roster} poll={poll} votes={votes} teams={teams}/>}
      </div>
    </div>
  );
}

// ── Player Tools — inline component now lives inside RosterPage Tools tab ────
function PlayerToolsInline({roster,history}){
  const[toolTab,setToolTab]=React.useState("merge");
  const entries=Object.entries(roster||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));

  function MergeTab(){
    const[primary,setPrimary]=React.useState("");
    const[dup,setDup]=React.useState("");
    const[saving,setSaving]=React.useState(false);
    const doMerge=()=>{
      if(!primary||!dup){alert("Select both profiles.");return;}
      if(primary===dup){alert("Can't merge a profile with itself.");return;}
      if(!confirm(`Merge "${roster[dup]?.name}" INTO "${roster[primary]?.name}"?\nThe duplicate profile will be removed.`))return;
      setSaving(true);
      DB.ref("roster/"+dup).remove()
        .then(()=>{setSaving(false);setPrimary("");setDup("");alert("Merged! Duplicate removed.");})
        .catch(e=>{setSaving(false);alert("Failed: "+e.message);});
    };
    return(<div>
      <p style={{color:"#9ca3af",fontSize:12,marginBottom:14,lineHeight:1.5}}>Pick the profile to KEEP as Primary, and the one to REMOVE as Duplicate (e.g. "Raj" vs "Rajesh").</p>
      <label>Primary profile (KEEP)</label>
      <select value={primary} onChange={e=>setPrimary(e.target.value)} style={{width:"100%",background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,marginBottom:12,outline:"none"}}>
        <option value="">Select profile to keep…</option>
        {entries.filter(([id])=>id!==dup).map(([id,p])=><option key={id} value={id}>{p.name}</option>)}
      </select>
      <label>Duplicate profile (REMOVE)</label>
      <select value={dup} onChange={e=>setDup(e.target.value)} style={{width:"100%",background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:14,marginBottom:16,outline:"none"}}>
        <option value="">Select duplicate to remove…</option>
        {entries.filter(([id])=>id!==primary).map(([id,p])=><option key={id} value={id}>{p.name}</option>)}
      </select>
      {primary&&dup&&primary!==dup&&(
        <div className="mini-card" style={{marginBottom:16,background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)"}}>
          <p style={{fontSize:12,color:"#f87171"}}>"<b>{roster[dup]?.name}</b>" will be permanently removed. Stats tracked under that name will now appear under "<b>{roster[primary]?.name}</b>".</p>
        </div>
      )}
      <button className="btn btn-danger w-full" onClick={doMerge} disabled={saving||!primary||!dup||primary===dup}>
        {saving?"Merging…":"🔀 Merge Profiles"}
      </button>
    </div>);
  }

  function BulkAddTab(){
    const[text,setText]=React.useState("");
    const[saving,setSaving]=React.useState(false);
    const doAdd=()=>{
      const names=text.split("\n").map(n=>n.trim()).filter(Boolean);
      if(!names.length){alert("Enter at least one name.");return;}
      if(!confirm(`Add ${names.length} player${names.length>1?"s":""}?\n${names.join("\n")}`))return;
      setSaving(true);
      const promises=names.map(nm=>{
        const id="p_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
        return DB.ref("roster/"+id).set({name:nm,role:"All-rounder",keeper:false,bat:"Right",bowl:null});
      });
      Promise.all(promises).then(()=>{setSaving(false);setText("");alert(`Added ${names.length} player${names.length>1?"s":""}!`);}).catch(e=>{setSaving(false);alert("Failed: "+e.message);});
    };
    return(<div>
      <p style={{color:"#9ca3af",fontSize:12,marginBottom:12,lineHeight:1.5}}>Enter one player name per line. They'll all be added as All-rounders — players can edit their own details after.</p>
      <label>Player names (one per line)</label>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"Rajesh Arigela\nKiran Kumar\nPraveen Singh"} style={{width:"100%",minHeight:140,background:"#0f0c29",border:"1.5px solid #3730a3",borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:13,outline:"none",resize:"vertical",marginBottom:12,fontFamily:"'Inter',sans-serif",boxSizing:"border-box"}}/>
      <button className="btn btn-primary w-full" onClick={doAdd} disabled={saving||!text.trim()}>
        {saving?"Adding…":"➕ Bulk Add Players"}
      </button>
    </div>);
  }

  return(
    <div>
      <div className="tabs" style={{marginBottom:16,gridTemplateColumns:"1fr 1fr"}}>
        <button className={`tab${toolTab==="merge"?" active":""}`} onClick={()=>setToolTab("merge")}>🔀 Merge</button>
        <button className={`tab${toolTab==="bulk"?" active":""}`} onClick={()=>setToolTab("bulk")}>➕ Bulk Add</button>
      </div>
      <div className="mini-card">
        {toolTab==="merge"&&<MergeTab/>}
        {toolTab==="bulk"&&<BulkAddTab/>}
      </div>
    </div>
  );
}

// ── Admin-only: set or change the one shared club passphrase ──────────────────
// Replaces the old per-person PIN system — instead of every player remembering their
// own 4-digit code, the whole club shares ONE passphrase (separate from the admin PIN,
// which stays private). Anyone editing the roster or voting on someone's behalf needs to
// know this phrase once per device — proves "this is someone actually in the club" without
// the friction of managing dozens of individual PINs.
function ClubPassphraseAdmin({current}){
  const[open,setOpen]=React.useState(false);
  const[val,setVal]=React.useState(current||"");
  const save=()=>{
    const v=val.trim();
    if(!v){alert("Enter a passphrase.");return;}
    if(!FB_OK||!DB){alert("Offline — can't save right now.");return;}
    DB.ref("clubPassphrase").set(v).then(()=>{alert("Club passphrase saved! Share it with the group.");setOpen(false);}).catch(e=>alert("Failed: "+e.message));
  };
  return(
    <div className="mini-card" style={{marginBottom:16,border:"1px solid rgba(245,158,11,.3)"}}>
      <div className="flex items-center justify-between">
        <div>
          <p className="section-title" style={{marginBottom:2}}>🔑 Club Passphrase</p>
          <p style={{fontSize:12,color:"#9ca3af"}}>{current?`Currently set: "${current}"`:"Not set yet — anyone can edit/vote freely until you set one."}</p>
        </div>
        <button onClick={()=>{setVal(current||"");setOpen(!open);}} style={{background:"rgba(245,158,11,.12)",border:"1px solid rgba(245,158,11,.35)",color:"#fbbf24",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{current?"Change":"Set"}</button>
      </div>
      {open&&(
        <div style={{marginTop:12}}>
          <input value={val} onChange={e=>setVal(e.target.value)} placeholder="e.g. LCC2026" style={{marginBottom:10}}/>
          <button className="btn btn-primary w-full" onClick={save}>Save Passphrase</button>
        </div>
      )}
    </div>
  );
}

// ── Grouped vote results — who said Yes/No/+1, scannable at a glance ────────
function PollResultsList({poll}){
  const[roster,setRoster]=React.useState({});
  const[votes,setVotes]=React.useState({});
  React.useEffect(()=>{
    if(!FB_OK||!DB)return;
    const rRef=DB.ref("roster"), vRef=DB.ref("poll/votes");
    const cb1=rRef.on("value",s=>setRoster(s.val()||{}));
    const cb2=vRef.on("value",s=>setVotes(s.val()||{}));
    return ()=>{ rRef.off("value",cb1); vRef.off("value",cb2); };
  },[]);
  const byChoice=(choice)=>Object.entries(votes||{})
    .filter(([,v])=>v?.choice===choice)
    .map(([id])=>roster?.[id]?.name||"(removed player)")
    .sort((a,b)=>a.localeCompare(b));
  const plus1List=Object.entries(votes||{})
    .filter(([,v])=>v?.plus1)
    .map(([id,v])=>`${roster?.[id]?.name||"(removed player)"} → ${v.kidName||"unnamed"}`)
    .sort((a,b)=>a.localeCompare(b));
  const yes=byChoice("yes"), no=byChoice("no");
  const Group=({emoji,label,color,names})=>(
    <div className="mini-card" style={{marginBottom:10}}>
      <p style={{color,fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,marginBottom:names.length?8:0}}>{emoji} {label} ({names.length})</p>
      {names.length===0
        ? <p style={{color:"#4b5563",fontSize:12}}>No one yet</p>
        : names.map(n=><div key={n} style={{fontSize:13,padding:"3px 0",color:"#d1d5db"}}>{n}</div>)}
    </div>
  );
  return(
    <div style={{marginTop:20}}>
      <p className="section-title">Responses</p>
      <Group emoji="✅" label="Yes" color="#34d399" names={yes}/>
      <Group emoji="❌" label="No" color="#f87171" names={no}/>
      <Group emoji="➕" label="Bringing a kid" color="#fbbf24" names={plus1List}/>
    </div>
  );
}

// ── Roster management (admin only) ─────────────────────────────────────────
function PollRosterTab({roster,canDelete}){
  const[name,setName]=React.useState("");
  const[prole,setProle]=React.useState("Batsman");
  const[keeper,setKeeper]=React.useState(false);
  const[bat,setBat]=React.useState("Right");
  const[bowl,setBowl]=React.useState("Seam");
  const[editingId,setEditingId]=React.useState(null);
  const[nameError,setNameError]=React.useState("");
  const[welcome,setWelcome]=React.useState(""); // shows a welcome toast after a new player joins

  const needsBowlStyle=prole==="Bowler"||prole==="All-rounder";
  const resetForm=()=>{setName("");setProle("Batsman");setKeeper(false);setBat("Right");setBowl("Seam");setEditingId(null);setNameError("");};

  const save=()=>{
    const nm=name.trim().replace(/\s+/g," "); // collapse multiple spaces
    if(!nm){setNameError("Please enter your name.");return;}
    // Must be at least 2 words (first + last name)
    if(nm.split(" ").length<2){setNameError("Please enter your full name — first and last name.");return;}
    // Reject duplicate names (case-insensitive), unless editing that same entry
    const dup=Object.entries(roster||{}).find(([id,p])=>
      id!==editingId && (p.name||"").trim().toLowerCase()===nm.toLowerCase());
    if(dup){setNameError(`"${nm}" is already in the club list. If that's not you, add a middle name or initial to tell them apart.`);return;}
    if(!FB_OK||!DB){setNameError("Offline — can't save right now.");return;}
    const isNew=!editingId;
    const firstName=nm.split(" ")[0];
    const id=editingId||("p_"+Math.random().toString(36).slice(2)+Date.now().toString(36));
    const data={name:nm,role:prole,keeper,bat,bowl:needsBowlStyle?bowl:null};
    DB.ref("roster/"+id).set(JSON.parse(JSON.stringify(data))).then(()=>{
      resetForm();
      setWelcome(isNew?`🎉 Welcome to the club, ${firstName}! Your stats start tracking from your next match.`:`✓ Updated — see you out there, ${firstName}!`);
      window.scrollTo({top:0,behavior:"smooth"});
      setTimeout(()=>setWelcome(""),6000);
    }).catch(e=>setNameError("Save failed: "+e.message));
  };
  const doEdit=(id,p)=>{
    setEditingId(id);setName(p.name);setProle(p.role);setKeeper(!!p.keeper);setBat(p.bat||"Right");setBowl(p.bowl||"Seam");setNameError("");
    window.scrollTo({top:0,behavior:"smooth"});
  };
  const doDelete=(id)=>{
    if(!confirm("Remove this player from the club list?"))return;
    DB.ref("roster/"+id).remove();
  };

  const entries=Object.entries(roster||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));

  return(
    <div>
      {welcome&&(
        <div style={{
          marginBottom:14,padding:"14px 16px",borderRadius:14,
          background:"linear-gradient(135deg,rgba(52,211,153,.18),rgba(16,185,129,.1))",
          border:"1.5px solid rgba(52,211,153,.5)",
          color:"#6ee7b7",fontSize:14,fontWeight:600,fontFamily:"'Inter',sans-serif",
          textAlign:"center",lineHeight:1.45,animation:"fadeUp .3s ease both"
        }}>{welcome}</div>
      )}
      <div className="mini-card" style={{marginBottom:16}}>
        <p className="section-title">{editingId?"✏️ Edit Your Details":"➕ Add Yourself"}</p>
        <label>Full name</label>
        <input value={name} onChange={e=>{setName(e.target.value);if(nameError)setNameError("");}} placeholder="e.g. Rajesh Arigela" style={{marginBottom:nameError?4:4,borderColor:nameError?"rgba(239,68,68,.6)":undefined}}/>
        {nameError
          ? <p style={{fontSize:11,color:"#f87171",fontFamily:"'Inter',sans-serif",marginBottom:12,lineHeight:1.4}}>⚠️ {nameError}</p>
          : <p style={{fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",marginBottom:12,lineHeight:1.4}}>💡 Enter your full name (first & last) — used to track your stats across matches.</p>
        }
        <label>Role</label>
        <div className="grid-3" style={{marginBottom:12}}>
          {["Batsman","Bowler","All-rounder"].map(r=>(
            <button key={r} onClick={()=>setProle(r)} style={{padding:"9px 4px",borderRadius:10,border:`1.5px solid ${prole===r?"transparent":"#374151"}`,background:prole===r?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:prole===r?"#111":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:11,fontFamily:"'Inter',sans-serif"}}>{r}</button>
          ))}
        </div>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:12,textTransform:"none",letterSpacing:0,fontFamily:"'Inter',sans-serif",fontSize:13,color:"#d1d5db"}}>
          <input type="checkbox" checked={keeper} onChange={e=>setKeeper(e.target.checked)} style={{width:"auto",margin:0}}/>
          🧤 Also keeps wicket
        </label>
        <label>Batting style</label>
        <div className="grid-2" style={{marginBottom:12}}>
          <button onClick={()=>setBat("Left")} style={{padding:"9px 4px",borderRadius:10,border:`1.5px solid ${bat==="Left"?"transparent":"#374151"}`,background:bat==="Left"?"linear-gradient(135deg,#8b5cf6,#6366f1)":"transparent",color:bat==="Left"?"#fff":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>Left-handed</button>
          <button onClick={()=>setBat("Right")} style={{padding:"9px 4px",borderRadius:10,border:`1.5px solid ${bat==="Right"?"transparent":"#374151"}`,background:bat==="Right"?"linear-gradient(135deg,#8b5cf6,#6366f1)":"transparent",color:bat==="Right"?"#fff":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>Right-handed</button>
        </div>
        {needsBowlStyle&&(<>
          <label>Bowling style</label>
          <div className="grid-2" style={{marginBottom:12}}>
            <button onClick={()=>setBowl("Spin")} style={{padding:"9px 4px",borderRadius:10,border:`1.5px solid ${bowl==="Spin"?"transparent":"#374151"}`,background:bowl==="Spin"?"linear-gradient(135deg,#34d399,#10b981)":"transparent",color:bowl==="Spin"?"#111":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>Spin</button>
            <button onClick={()=>setBowl("Seam")} style={{padding:"9px 4px",borderRadius:10,border:`1.5px solid ${bowl==="Seam"?"transparent":"#374151"}`,background:bowl==="Seam"?"linear-gradient(135deg,#34d399,#10b981)":"transparent",color:bowl==="Seam"?"#111":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>Seam</button>
          </div>
        </>)}
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={save}>{editingId?"Save Changes":"➕ Add Me"}</button>
          {editingId&&<button className="btn" onClick={resetForm} style={{background:"transparent",border:"1px solid #374151",color:"#9ca3af"}}>Cancel</button>}
        </div>
      </div>

      <p className="section-title">Who's in ({entries.length})</p>
      {entries.length===0&&<p style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"20px 0"}}>No one's added themselves yet — be the first!</p>}
      {entries.map(([id,p])=>(
        <div key={id} className="mini-card" style={{marginBottom:8,display:"flex",alignItems:"center",gap:10,justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
            <PlayerAvatar name={p.name} avatar={p.avatar} size={40}/>
            <div style={{minWidth:0}}>
              <div style={{fontWeight:600,fontSize:14}}>{p.name} {p.keeper&&<span title="Wicketkeeper">🧤</span>}</div>
              <div style={{fontSize:11,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>
                {p.role==="Batsman"?"🏏":p.role==="Bowler"?"🎯":"⭐"} {p.role} · {p.bat==="Left"?"LH":"RH"}{p.bowl?` · ${p.bowl}`:""}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={()=>doEdit(id,p)} style={{background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.3)",color:"#a5b4fc",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>✏️</button>
            {canDelete&&<button onClick={()=>doDelete(id)} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.3)",color:"#f87171",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>🗑️</button>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Create / update the active poll (venue + date + time picker, no manual typing) ──
function PollCreateForm({poll}){
  const[venue,setVenue]=React.useState(poll?.venue||"Lakes High School");
  const[customVenue,setCustomVenue]=React.useState(poll&&!["Lakes High School","Millennium Park"].includes(poll.venue)?poll.venue:"");
  const[isCustom,setIsCustom]=React.useState(poll&&!["Lakes High School","Millennium Park"].includes(poll.venue));
  const[date,setDate]=React.useState(poll?.date||"");
  const[time,setTime]=React.useState(poll?.time||"10:00");

  const create=()=>{
    const v=isCustom?customVenue.trim():venue;
    if(!v){alert("Enter a venue name.");return;}
    if(!date){alert("Pick a date.");return;}
    if(!FB_OK||!DB){alert("Offline — can't publish right now.");return;}
    const data={venue:v,date,time,createdAt:Date.now()};
    // Starting a new poll clears old votes/teams so this week starts fresh
    DB.ref("poll").set({current:data}).then(()=>alert("Poll published! Share the Weekend Poll link with the group.")).catch(e=>alert("Failed: "+e.message));
  };
  const closePoll=()=>{
    if(!confirm("Close this week's poll? Votes and team selections will be cleared."))return;
    DB.ref("poll").remove();
  };

  return(
    <div className="mini-card">
      <p className="section-title">{poll?"📋 Update This Week's Poll":"📋 Create This Week's Poll"}</p>
      <label>Venue</label>
      <div className="grid-2" style={{marginBottom:isCustom?8:12}}>

        <button onClick={()=>{setIsCustom(false);setVenue("Millennium Park")}} style={{padding:"10px 4px",borderRadius:10,border:`1.5px solid ${!isCustom&&venue==="Millennium Park"?"transparent":"#374151"}`,background:!isCustom&&venue==="Millennium Park"?"linear-gradient(135deg,#f59e0b,#ef4444)":"transparent",color:!isCustom&&venue==="Millennium Park"?"#111":"#9ca3af",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif"}}>🏟️ Millennium Park</button>
      </div>
      <button onClick={()=>setIsCustom(true)} style={{width:"100%",padding:"9px",borderRadius:10,border:`1.5px dashed ${isCustom?"#f59e0b":"#374151"}`,background:isCustom?"rgba(245,158,11,.1)":"transparent",color:isCustom?"#fbbf24":"#6b7280",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter',sans-serif",marginBottom:isCustom?8:12}}>📍✨ Other venue</button>
      {isCustom&&<input value={customVenue} onChange={e=>setCustomVenue(e.target.value)} placeholder="Ground name" style={{marginBottom:12}}/>}

      <label>Time</label>

// ── Reusable share button: native share sheet (mobile) with a copy-to-clipboard fallback ──
function ShareButton({label,buildText}){
  const[copied,setCopied]=React.useState(false);
  const doShare=async()=>{
    const text=buildText();
    if(navigator.share){
      try{ await navigator.share({text}); return; }catch(e){ /* user cancelled or share failed — fall through to copy */ }
    }
    try{
      await navigator.clipboard.writeText(text);
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    }catch(e){
      alert(text); // last-resort fallback so the content is at least visible to copy manually
    }
  };
  return(
    <button onClick={doShare} style={{background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.35)",color:"#6ee7b7",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Inter',sans-serif",borderRadius:10,padding:"8px 16px"}}>
      {copied?"✓ Copied!":label}
    </button>
  );
}

// ── Public voting tab — tap your name, pick Yes/No/+1, one vote per device ──
function PollVoteTab({roster,poll,votes,passphrase,role}){
  const[myVote,setMyVote]=React.useState(()=>{try{return localStorage.getItem("lcc_poll_voted_as")||null;}catch(e){return null;}});
  const[kidDraft,setKidDraft]=React.useState({});
  const[deviceUnlocked,setDeviceUnlocked]=React.useState(()=>{
    try{return localStorage.getItem("lcc_club_unlocked")===passphrase&&!!passphrase;}catch(e){return false;}
  });
  const[passModal,setPassModal]=React.useState(null);
  const[passTry,setPassTry]=React.useState("");
  const[passErr,setPassErr]=React.useState("");
  const[plus1Open,setPlus1Open]=React.useState(null);

  // Helper: normalize old {plus1,kidName} OR new {kids:[]} format
  const getKids=(v)=>{
    if(Array.isArray(v?.kids)) return v.kids;
    if(v?.plus1&&v?.kidName) return [v.kidName];
    return [];
  };

  if(!poll) return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:40,marginBottom:10}}>📋</div>
      <p style={{fontWeight:600,marginBottom:4}}>No poll open right now</p>
      <p style={{color:"#6b7280",fontSize:13}}>Ask the admin to publish this week's match poll.</p>
    </div>
  );

  const entries=Object.entries(roster||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));
  const totalKids=Object.values(votes||{}).reduce((s,v)=>s+getKids(v).length,0);
  const counts={yes:0,no:0,kids:totalKids};
  Object.values(votes||{}).forEach(v=>{if(v?.choice==="yes")counts.yes++;if(v?.choice==="no")counts.no++;});

  const withClubAuth=(action)=>{
    if(!passphrase||deviceUnlocked){action();return;}
    setPassModal({pendingAction:action});setPassTry("");setPassErr("");
  };
  const confirmPass=()=>{
    if(passTry.trim()!==passphrase){setPassErr("Wrong passphrase — ask admin if you don't have it.");return;}
    try{localStorage.setItem("lcc_club_unlocked",passphrase);}catch(e){}
    setDeviceUnlocked(true);passModal.pendingAction();setPassModal(null);
  };

  const setChoice=(id,choice)=>withClubAuth(()=>{
    if(!FB_OK||!DB)return;
    const existing=votes?.[id]||{};
    const next=existing.choice===choice?null:choice;
    DB.ref("poll/votes/"+id).set(JSON.parse(JSON.stringify({...existing,choice:next})));
    try{localStorage.setItem("lcc_poll_voted_as",id);}catch(e){}
    setMyVote(id);
  });

  const addKid=(id)=>withClubAuth(()=>{
    const nm=(kidDraft[id]||"").trim();
    if(!nm){alert("Enter the kid's name first.");return;}
    if(!FB_OK||!DB)return;
    const existing=votes?.[id]||{};
    const current=getKids(existing);
    DB.ref("poll/votes/"+id).set(JSON.parse(JSON.stringify({...existing,kids:[...current,nm]})));
    setKidDraft(d=>({...d,[id]:""}));
    setPlus1Open(null);
  });

  const removeKid=(id,kidName)=>withClubAuth(()=>{
    if(!FB_OK||!DB)return;
    const existing=votes?.[id]||{};
    const current=getKids(existing).filter(k=>k!==kidName);
    DB.ref("poll/votes/"+id).set(JSON.parse(JSON.stringify({...existing,kids:current})));
  });

  return(
    <div>
      <div className="mini-card" style={{marginBottom:14,textAlign:"center"}}>
        <p style={{color:"#fbbf24",fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,marginBottom:4}}>{poll.venue}</p>
        <p style={{color:"#a5b4fc",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>{new Date(poll.date+"T"+poll.time).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})} · {poll.time}</p>
        <div style={{display:"flex",justifyContent:"center",gap:18,marginTop:10,marginBottom:12}}>
          <span style={{color:"#34d399",fontSize:13,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>✅ {counts.yes} Yes</span>
          <span style={{color:"#f87171",fontSize:13,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>❌ {counts.no} No</span>
          <span style={{color:"#fbbf24",fontSize:13,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>👶 {counts.kids} Kids</span>
        </div>
        <ShareButton label="📤 Share Poll" buildText={()=>{
          const yesNames=Object.entries(votes||{}).filter(([,v])=>v?.choice==="yes").map(([id])=>roster?.[id]?.name).filter(Boolean).sort();
          const noNames=Object.entries(votes||{}).filter(([,v])=>v?.choice==="no").map(([id])=>roster?.[id]?.name).filter(Boolean).sort();
          const kidLines=Object.entries(votes||{}).flatMap(([id,v])=>
            getKids(v).map(k=>`${roster?.[id]?.name||"?"} → ${k}`)
          ).sort();
          const dateStr=new Date(poll.date+"T"+poll.time).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
          let txt=`🏏 LCC Weekend Match\n📍 ${poll.venue}\n📅 ${dateStr} · ${poll.time}\n\n✅ Yes (${yesNames.length}): ${yesNames.join(", ")||"—"}\n❌ No (${noNames.length}): ${noNames.join(", ")||"—"}`;
          if(kidLines.length) txt+=`\n👶 Bringing kids:\n${kidLines.map(l=>"  • "+l).join("\n")}`;
          return txt;
        }}/>
      </div>

      <p className="section-title">Tap your name to vote</p>
      {entries.length===0&&<p style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"20px 0"}}>No players in the roster yet — ask admin to add the team.</p>}
      {entries.map(([id,p])=>{
        const v=votes?.[id]||{};
        const isMe=myVote===id;
        const hasVoted=v.choice==="yes"||v.choice==="no";
        const showKidInput=plus1Open===id;
        const kids=getKids(v);
        return(
          <div key={id} className="mini-card" style={{marginBottom:6,padding:"10px 12px",border:isMe?"1.5px solid rgba(245,158,11,.5)":"1px solid #3730a3"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
              <span style={{fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:8,overflow:"hidden"}}>
                <PlayerAvatar name={p.name} avatar={p.avatar} size={32}/>
                <span style={{overflow:"hidden"}}>
                  <span style={{display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
                  <span style={{display:"flex",alignItems:"center",gap:4}}>
                    {p.keeper&&<span style={{fontSize:10}}>🧤</span>}
                    {isMe&&<span style={{color:"#fbbf24",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}>(you)</span>}
                  </span>
                </span>
              </span>
              <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                {hasVoted?(
                  <button onClick={()=>setChoice(id,v.choice)} style={{padding:"4px 10px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:700,fontSize:11,
                    background:v.choice==="yes"?"linear-gradient(135deg,#34d399,#10b981)":"linear-gradient(135deg,#dc2626,#991b1b)",
                    color:v.choice==="yes"?"#111":"#fff"}}>{v.choice==="yes"?"✅ Yes":"❌ No"} ✕</button>
                ):(
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>setChoice(id,"yes")} style={{width:32,height:32,borderRadius:"50%",border:"1.5px solid rgba(52,211,153,.4)",background:"rgba(52,211,153,.1)",color:"#34d399",cursor:"pointer",fontSize:15}}>✅</button>
                    <button onClick={()=>setChoice(id,"no")} style={{width:32,height:32,borderRadius:"50%",border:"1.5px solid rgba(239,68,68,.4)",background:"rgba(239,68,68,.1)",color:"#f87171",cursor:"pointer",fontSize:15}}>❌</button>
                  </div>
                )}
                {/* ➕ Add kid button */}
                <button onClick={()=>setPlus1Open(plus1Open===id?null:id)}
                  style={{width:32,height:32,borderRadius:"50%",
                  border:`1.5px solid ${kids.length>0?"transparent":"rgba(245,158,11,.4)"}`,
                  background:kids.length>0?"linear-gradient(135deg,#f59e0b,#d97706)":"rgba(245,158,11,.1)",
                  color:kids.length>0?"#111":"#fbbf24",cursor:"pointer",fontSize:kids.length>0?11:15,
                  fontWeight:700}}
                  title={kids.length>0?`${kids.length} kid${kids.length>1?"s":""} — tap to manage`:"Bringing kids?"}>
                  {kids.length>0?kids.length:"➕"}
                </button>
              </div>
            </div>

            {/* Kids chips — always shown if any */}
            {kids.length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                {kids.map((k,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:5,
                    background:"rgba(245,158,11,.12)",border:"1px solid rgba(245,158,11,.3)",
                    borderRadius:20,padding:"3px 10px"}}>
                    <span style={{fontSize:11,color:"#fbbf24"}}>👶 {k}</span>
                    <button onClick={()=>removeKid(id,k)} style={{background:"none",border:"none",
                      color:"#6b7280",cursor:"pointer",fontSize:13,lineHeight:1,padding:0}}>×</button>
                  </div>
                ))}
              </div>
            )}

            {/* Add kid input */}
            {showKidInput&&(
              <div style={{display:"flex",gap:6,marginTop:8}}>
                <input value={kidDraft[id]||""} onChange={e=>setKidDraft(d=>({...d,[id]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&addKid(id)}
                  placeholder="Kid's name" autoFocus style={{flex:1,fontSize:12,padding:"7px 10px"}}/>
                <button onClick={()=>addKid(id)} style={{padding:"7px 12px",borderRadius:10,
                  border:"1.5px solid rgba(245,158,11,.4)",background:"transparent",
                  color:"#fbbf24",cursor:"pointer",fontWeight:700,fontSize:12}}>Add</button>
                <button onClick={()=>setPlus1Open(null)} style={{padding:"7px",borderRadius:10,
                  border:"none",background:"rgba(107,114,128,.15)",color:"#6b7280",cursor:"pointer",fontSize:13}}>✕</button>
              </div>
            )}
          </div>
        );
      })}
      {passphrase&&<p style={{color:"#4338ca",fontSize:11,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",marginTop:14}}>Club passphrase required once per device.</p>}

      {passModal&&(
        <Modal onClose={()=>setPassModal(null)} title="🔑 Club Passphrase">
          <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>Enter the shared club passphrase to vote. Only needed once on this device.</p>
          <input value={passTry} onChange={e=>{setPassTry(e.target.value);setPassErr("");}} placeholder="Passphrase" autoFocus onKeyDown={e=>e.key==="Enter"&&confirmPass()} style={{marginBottom:8}}/>
          {passErr&&<p style={{color:"#f87171",fontSize:12,marginBottom:10}}>{passErr}</p>}
          <button className="btn btn-primary w-full" onClick={confirmPass}>Confirm</button>
        </Modal>
      )}
    </div>
  );
}
function PollTeamsTab({roster,poll,votes,teams,role}){
  const[showBuilder,setShowBuilder]=React.useState(false);
  const[capA,setCapA]=React.useState(teams?.captainA||"");
  const[capB,setCapB]=React.useState(teams?.captainB||"");
  const[teamA,setTeamA]=React.useState(teams?.teamA||[]);
  const[teamB,setTeamB]=React.useState(teams?.teamB||[]);
  const isAdmin=role==="admin";

  React.useEffect(()=>{
    setCapA(teams?.captainA||"");setCapB(teams?.captainB||"");
    setTeamA(teams?.teamA||[]);setTeamB(teams?.teamB||[]);
  },[teams]);

  const nameOf=(id)=>roster?.[id]?.name||"(removed)";
  const publish=()=>{
    if(!capA.trim()||!capB.trim()){alert("Enter both captains' names.");return;}
    if(teamA.length===0||teamB.length===0){alert("Both teams need at least one player.");return;}
    if(!FB_OK||!DB){alert("Offline.");return;}
    const payload={captainA:capA.trim(),captainB:capB.trim(),teamA,teamB,published:true,publishedAt:Date.now()};
    DB.ref("poll/teams").set(payload)
      .then(()=>{
        // Also save to publishedTeams history so admin can reuse for multiple matches
        DB.ref("publishedTeams").push(payload).catch(()=>{});
        alert("Teams published!");setShowBuilder(false);
      })
      .catch(e=>alert("Failed: "+e.message));
  };
  const moveTo=(id,team)=>{
    setTeamA(a=>a.filter(x=>x!==id));setTeamB(b=>b.filter(x=>x!==id));
    if(team==="A")setTeamA(a=>[...a,id]);
    if(team==="B")setTeamB(b=>[...b,id]);
  };
  const remove=(id)=>{setTeamA(a=>a.filter(x=>x!==id));setTeamB(b=>b.filter(x=>x!==id));};
  const yesIds=Object.entries(votes||{}).filter(([,v])=>v?.choice==="yes").map(([id])=>id);
  const yesPlayers=yesIds.map(id=>({id,...(roster?.[id]||{name:"(removed)"})})).sort((a,b)=>a.name.localeCompare(b.name));
  const assigned=new Set([...teamA,...teamB]);
  const unassigned=yesPlayers.filter(p=>!assigned.has(p.id));

  // ── Published teams view — for everyone ───────────────────────────────────
  const PublishedView=()=>(
    <div>
      <div style={{background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.3)",borderRadius:14,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>✅</span>
        <div>
          <p style={{fontWeight:700,fontSize:13,color:"#34d399"}}>Teams Announced!</p>
          {teams.publishedAt&&<p style={{fontSize:10,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace"}}>{new Date(teams.publishedAt).toLocaleString()}</p>}
        </div>
      </div>
      <div className="grid-2" style={{gap:12,marginBottom:16}}>
        {[["A","#fbbf24","🟡",teams.captainA,teamA],["B","#6ee7b7","⚡",teams.captainB,teamB]].map(([t,col,em,cap,list])=>(
          <div key={t} style={{background:"rgba(255,255,255,.04)",border:`1.5px solid ${t==="A"?"rgba(245,158,11,.3)":"rgba(52,211,153,.3)"}`,borderRadius:16,padding:"14px 12px"}}>
            <p style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,color:col,marginBottom:2}}>{em} Team {t}</p>
            {cap&&<p style={{fontSize:11,color:"#6b7280",fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>Captain: {cap}</p>}
            {(list||[]).map(id=>(
              <div key={id} style={{fontSize:12,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.05)",display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:col,flexShrink:0,display:"inline-block"}}/>
                {nameOf(id)}{roster?.[id]?.keeper&&" 🧤"}
              </div>
            ))}
          </div>
        ))}
      </div>
      <ShareButton label="📤 Share Lineup" buildText={()=>{
        const dateStr=poll?new Date(poll.date+"T"+poll.time).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"}):"";
        return `🏏 LCC Teams${poll?` — ${poll.venue} · ${dateStr} ${poll.time}`:""}\n\n🟡 Team A${teams.captainA?` (${teams.captainA})`:""}:\n${(teamA||[]).map(id=>"  • "+nameOf(id)).join("\n")||"  —"}\n\n⚡ Team B${teams.captainB?` (${teams.captainB})`:""}:\n${(teamB||[]).map(id=>"  • "+nameOf(id)).join("\n")||"  —"}`;
      }}/>
      {isAdmin&&<button onClick={()=>setShowBuilder(true)} style={{width:"100%",marginTop:12,padding:"10px",borderRadius:12,border:"1px solid rgba(99,102,241,.35)",background:"transparent",color:"#a5b4fc",cursor:"pointer",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>✏️ Edit Teams (Admin)</button>}
    </div>
  );

  // ── Team builder — admin only ──────────────────────────────────────────────
  const BuilderView=()=>(
    <div>
      {teams?.published&&<button onClick={()=>setShowBuilder(false)} style={{background:"none",border:"none",color:"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",marginBottom:12}}>← Back to published teams</button>}
      <div className="mini-card" style={{marginBottom:14}}>
        <p className="section-title">👑 Captains</p>
        <div className="grid-2">
          <div><label>Team A Captain</label><input value={capA} onChange={e=>setCapA(e.target.value)} placeholder="Captain A"/></div>
          <div><label>Team B Captain</label><input value={capB} onChange={e=>setCapB(e.target.value)} placeholder="Captain B"/></div>
        </div>
      </div>
      <p className="section-title">Available — {unassigned.length} unassigned</p>
      {unassigned.length===0&&yesPlayers.length===0&&<p style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"12px 0"}}>No Yes votes yet.</p>}
      {unassigned.map(p=>(
        <div key={p.id} className="mini-card" style={{marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:600}}>{p.name}{p.keeper&&" 🧤"} <span style={{fontSize:10,color:"#818cf8",fontFamily:"'JetBrains Mono',monospace"}}>{p.role}</span></span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>moveTo(p.id,"A")} style={{background:"rgba(245,158,11,.15)",border:"1px solid rgba(245,158,11,.4)",color:"#fbbf24",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>→ A</button>
            <button onClick={()=>moveTo(p.id,"B")} style={{background:"rgba(52,211,153,.15)",border:"1px solid rgba(52,211,153,.4)",color:"#6ee7b7",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>→ B</button>
          </div>
        </div>
      ))}
      <div className="divider" style={{margin:"16px 0"}}/>
      <div className="grid-2" style={{gap:12}}>
        {[["A","#fbbf24","🟡",capA,teamA],["B","#6ee7b7","⚡",capB,teamB]].map(([t,col,em,cap,list])=>(
          <div key={t}>
            <p className="section-title" style={{color:col}}>{em} Team {t} ({list.length}){cap&&` · ${cap}`}</p>
            {list.map(id=>(
              <div key={id} className="mini-card" style={{marginBottom:6,padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12}}>{nameOf(id)}</span>
                <button onClick={()=>remove(id)} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:14}}>×</button>
              </div>
            ))}
          </div>
        ))}
      </div>
      <button className="btn btn-primary w-full" style={{marginTop:16}} onClick={publish}>📢 {teams?.published?"Update & Re-publish":"Publish Teams"}</button>
    </div>
  );

  // ── Routing ───────────────────────────────────────────────────────────────
  if(!poll) return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:40,marginBottom:10}}>🏏</div>
      <p style={{fontWeight:600,marginBottom:4}}>No poll open</p>
      <p style={{color:"#6b7280",fontSize:13}}>Teams are built from this week's poll responses.</p>
    </div>
  );
  if(teams?.published&&!showBuilder) return <PublishedView/>;
  if(isAdmin) return <BuilderView/>;
  return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:40,marginBottom:10}}>⏳</div>
      <p style={{fontWeight:600,marginBottom:4}}>Teams not announced yet</p>
      <p style={{color:"#6b7280",fontSize:13}}>Check back once the admin has finalised and published the teams.</p>
    </div>
  );
}

// ── Stats & Leaderboard page — career stats aggregated from match history ──────
function fmtAvg(v){return v===null?"—":v.toFixed(1);}
function fmtSR(v){return v===null?"—":v.toFixed(1);}
function fmtEcon(v){return v===null?"—":v.toFixed(2);}

// ── Character avatars — players pick one when joining ───────────────────────
// ── PlayerAvatar — colour-gradient circle with the player's initials ──────────
function PlayerAvatar({name,avatar,size=38}){
  // Initials: first letter of first + first letter of last name (e.g. "Rajesh Arigela" -> "RA")
  const parts=(name||"?").trim().split(/\s+/);
  const initials=(parts.length>=2
    ? parts[0][0]+parts[parts.length-1][0]
    : (parts[0]||"?").slice(0,2)
  ).toUpperCase();
  const colors=[["#f59e0b","#ef4444"],["#6366f1","#8b5cf6"],["#10b981","#06b6d4"],
                ["#f97316","#ec4899"],["#14b8a6","#6366f1"],["#84cc16","#10b981"]];
  const [c1,c2]=colors[(name||"").charCodeAt(0)%colors.length];
  return(
    <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
      background:`linear-gradient(135deg,${c1},${c2})`,boxShadow:`0 2px 8px ${c1}55`,
      fontFamily:"'Oswald',sans-serif",fontSize:size*0.38,fontWeight:700,color:"#fff",letterSpacing:".02em"}}>
      {initials}
    </div>
  );
}

                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:"#fbbf24",letterSpacing:".15em"}}>BATTING</span>
                </div>
                {hsEntry&&<RC accent="#fbbf24" icon="👑" title="HIGHEST SCORE" name={hsEntry.name} value={`${hsEntry.runs+(hsEntry.out?"":"*")} off ${hsEntry.balls} balls`} detail={`${hsEntry.vn}·${hsEntry.dt}`}/>}
                {mostSixes&&mostSixes.sixes>0&&<RC accent="#34d399" icon="💥" title="MOST SIXES (innings)" name={mostSixes.name} value={`${mostSixes.sixes} sixes`} detail={`${mostSixes.vn}·${mostSixes.dt}`}/>}
                {mostFours&&mostFours.fours>0&&<RC accent="#fbbf24" icon="🏃" title="MOST FOURS (innings)" name={mostFours.name} value={`${mostFours.fours} fours`} detail={`${mostFours.vn}·${mostFours.dt}`}/>}
                <div style={{height:1,background:"rgba(255,255,255,.06)",margin:"16px 0"}}/>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <div style={{width:3,height:16,borderRadius:2,background:"#f87171"}}/>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:"#f87171",letterSpacing:".15em"}}>BOWLING</span>
                </div>
                {bestBowl?<RC accent="#f87171" icon="🎳" title="BEST BOWLING" name={bestBowl.name} value={`${bestBowl.wkts}/${bestBowl.runs}`} detail={`${bestBowl.vn}·${bestBowl.dt}`}/>:<p style={{color:"#6b7280",fontSize:12,marginBottom:10}}>No wickets recorded yet.</p>}
                {mostMaidens&&<RC accent="#a5b4fc" icon="🔒" title="MOST MAIDENS" name={mostMaidens.name} value={`${mostMaidens.maidens} maiden${mostMaidens.maidens>1?"s":""}`} detail={`${mostMaidens.vn}·${mostMaidens.dt}`}/>}
              </div>
            );
          })()}
        </>)}
      </div>
    </div>
  );
}
// ── Super Admin: Announcement manager — post a notice visible on the home screen
function AnnouncementPage({onExit}){
  const[current,setCurrent]=React.useState(undefined);
  const[text,setText]=React.useState("");
  const[by,setBy]=React.useState("");
  React.useEffect(()=>{
    if(!FB_OK||!DB){setCurrent(null);return;}
    const ref=DB.ref("announcement");
    const cb=ref.on("value",s=>{const v=s.val()||null;setCurrent(v);setText(v?.text||"");setBy(v?.by||"");});
    return ()=>ref.off("value",cb);
  },[]);
  const save=()=>{
    const t=text.trim();
    if(!t){alert("Enter the announcement text.");return;}
    if(!FB_OK||!DB){alert("Offline.");return;}
    DB.ref("announcement").set({text:t,by:by.trim()||"Admin",postedAt:Date.now()})
      .then(()=>alert("Announcement posted! Everyone will see it on the home screen."))
      .catch(e=>alert("Failed: "+e.message));
  };
  const clear=()=>{
    if(!confirm("Remove the current announcement?"))return;
    DB.ref("announcement").remove().catch(e=>alert("Failed: "+e.message));
  };
  if(current===undefined) return <Centered emoji="📢" title="Loading…" onExit={onExit}/>;
  return(
    <div style={{background:"linear-gradient(165deg,#022c1e,#0a2540,#1c1150,#2d0f5c,#0a0414)",minHeight:"100dvh",padding:"20px 16px"}}>
      <div className="resp-wrap">
        <div className="flex items-center justify-between" style={{marginBottom:18}}>
          <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:26,fontWeight:700}}>📢 Announcements</h1>
          <button onClick={onExit} style={{background:"none",border:"none",color:"#6b7280",fontSize:13,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>← back</button>
        </div>
        {current&&current.text&&(
          <div style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",borderRadius:14,padding:"12px 14px",marginBottom:16}}>

function SuperAdminHome({onScore,onHistory,onAnnounce,onRoster,onStats,onPoll,onPins,onExit}){
  return <AdminHome tier="super" onPick={(s)=>{
    if(s==="admin")      onScore();
    else if(s==="history")  onHistory();
    else if(s==="announce") onAnnounce();
    else if(s==="roster")   onRoster();
    else if(s==="stats")    onStats();
    else if(s==="poll")     onPoll();
    else if(s==="pinMgmt")  onPins();
  }} onExit={onExit}/>;
}

function BasicAdminHome({onPick,onExit}){
  return <AdminHome tier="basic" onPick={onPick} onExit={onExit}/>;
}

function Root(){
  const[screen,setScreen]=React.useState("landing");
  const[gate,setGate]=React.useState(null);
  const[adminTier,setAdminTier]=React.useState(null);
  const[dynPins,setDynPins]=React.useState(null);

  // ── Browser back button handling ──────────────────────────────────────────
  // Maintain an in-app navigation stack. Every setScreen() pushes a browser
  // history entry so the back button stays inside the app instead of leaving.
  const navStack=React.useRef(["landing"]);

  const go=(s)=>{
    navStack.current=[...navStack.current,s];
    window.history.pushState({screen:s,depth:navStack.current.length},"");
    setScreen(s);
    setGate(null);
  };
  const goBack=()=>{
    if(navStack.current.length>1){
      navStack.current=navStack.current.slice(0,-1);
      const prev=navStack.current[navStack.current.length-1];
      setScreen(prev);
      // If going back past any admin screen to landing, clear admin state
      if(prev==="landing") setGate(null);
    } else {
      setScreen("landing");
      setGate(null);
    }
  };

  React.useEffect(()=>{
    // Seed the initial history entry
    window.history.replaceState({screen:"landing",depth:1},"");
    const onPop=()=>goBack();
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[]);

  // Wrap setScreen so it also updates navStack and browser history
  const nav=(s)=>go(s);
  const home=()=>{
    navStack.current=["landing"];
    window.history.replaceState({screen:"landing",depth:1},"");
    setScreen("landing");
    setGate(null);
    setAdminTier(null); // Clear admin tier so stale tier never contaminates next login
  };
  const pick=(r)=>{
    if(r==="scorer"){setGate("scorer");}
    else if(r==="admin"){setGate("admin");}
    else nav(r);
  };

  if(gate==="scorer") return <ScorerGate onOk={()=>{setGate(null);setScreen("scorer");}} onCancel={home}/>;
  if(gate==="admin")  return <PinGate title="Admin Access" hint="Super or Basic admin PIN"
    verify={(v)=>{
      const pins=dynPins||{super:ADMIN_PIN,basic:BASIC_ADMIN_PIN};
      if(v===pins.super) return {ok:true, tier:"super"};
      if(v===pins.basic) return {ok:true, tier:"basic"};
      return {ok:false, msg:"❌ Wrong PIN, try again"};
    }}
    onOk={(r)=>{
      setGate(null);
      setAdminTier(r.tier);
      const dest=r.tier==="super"?"superAdmin":"basicAdmin";
      // Reset navStack on every login so browser back can never reach wrong screen
      navStack.current=["landing",dest];
      window.history.replaceState({screen:"landing",depth:1},"");
      window.history.pushState({screen:dest,depth:2},"");
      setScreen(dest);
    }}
    onCancel={home}/>;

  const isAdmin=adminTier!==null;
  const isSuper=adminTier==="super";
  const adminHome=adminTier==="super"?"superAdmin":adminTier==="basic"?"basicAdmin":"landing";

  if(screen==="landing") return <Landing onPick={pick}/>;
  if(screen==="viewer")  return <ViewerLive onExit={home}/>;
  if(screen==="basicAdmin") return <BasicAdminHome onPick={nav} onExit={home}/>;
  if(screen==="history") return <HistoryPage role={isSuper?"admin":"viewer"} onExit={()=>nav(adminHome)}/>;
  if(screen==="poll")    return <PollPage role={isAdmin?"admin":"viewer"} onExit={()=>nav(adminHome)}/>;
  if(screen==="roster")  return <RosterPage role={isAdmin?"admin":"viewer"} onExit={()=>nav(adminHome)}/>;
  if(screen==="stats")   return <StatsPage onExit={()=>nav(adminHome)}/>;
  if(screen==="announce") return <AnnouncementPage onExit={()=>nav(adminHome)}/>;
  if(screen==="scorer")    return <App role="scorer" onExit={home}/>;
  if(screen==="adminScore") return <App role="admin" onExit={()=>nav(adminHome)} onHistory={()=>nav("history")} onPoll={()=>nav("poll")} onRoster={()=>nav("roster")} onAnnounce={()=>nav("announce")}/>;
  if(screen==="superAdmin") return <SuperAdminHome
    onScore={()=>nav("admin")}
    onHistory={()=>nav("history")}
    onStats={()=>nav("stats")}
    onPoll={()=>nav("poll")}
    onRoster={()=>nav("roster")}
    onAnnounce={()=>nav("announce")}
    onPins={()=>nav("pinMgmt")}
    onExit={home}/>;
  if(screen==="pinMgmt") return <PinMgmtModal onClose={()=>nav(adminHome)}/>;
  if(screen==="admin") return <App role="admin" onExit={()=>nav(adminHome)} onHistory={()=>nav("history")} onPoll={()=>nav("poll")} onRoster={()=>nav("roster")} onAnnounce={()=>nav("announce")}/>;
  return <Landing onPick={pick}/>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  componentDidCatch(error,info){console.error("App crashed:",error,info);}
  render(){
    if(this.state.error){
      return(
        <div className="screen">
          <div className="card" style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
            <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,marginBottom:10}}>Something went wrong</h2>
            <p style={{color:"#9ca3af",fontSize:12,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>{String(this.state.error.message||this.state.error)}</p>
            <p style={{color:"#6b7280",fontSize:12,marginBottom:18}}>This is usually caused by stale match data. Tap below to reset and go home — the live match (if any) is unaffected on the server.</p>
            <button className="btn btn-primary w-full" onClick={()=>{this.setState({error:null});window.location.hash="";window.location.reload();}}>🔄 Reset & Reload</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.render(<ErrorBoundary><Root/></ErrorBoundary>,document.getElementById("root"));

<script>
/* ── PWA service worker ──────────────────────────────────────────────────────────────────────
   Registers a small service worker built from a Blob URL, so the whole app stays a single HTML
   file with no extra files to upload. The SW caches the page shell so the app opens instantly and
   works offline (cached view). Live scores still need a connection (Firebase), but the app frame,
   last-seen data, and UI load with no network. This is what makes "Add to Home Screen" install it
   as a real fullscreen app on iOS and Android. */
(function(){
  if(!('serviceWorker' in navigator)) return;
  // Prefer a real ./sw.js file (most reliable, required for install on iOS Safari). If it isn't
  // present (single-file deploy), fall back to a Blob-built service worker so offline/caching still
  // works on Android/desktop. Either way the app stays installable.
  function registerBlobSW(){
    var swCode = [
      "var CACHE='lcc-v1';",
      "self.addEventListener('install',function(e){self.skipWaiting();e.waitUntil(caches.open(CACHE).then(function(c){return c.add('./');}).catch(function(){}));});",
      "self.addEventListener('activate',function(e){e.waitUntil(self.clients.claim());});",
      "self.addEventListener('fetch',function(e){",
      "  var req=e.request; if(req.method!=='GET'){return;}",
      "  var url=new URL(req.url); if(url.origin!==location.origin){return;}",
      "  if(req.mode==='navigate'){e.respondWith(fetch(req).then(function(res){var copy=res.clone();caches.open(CACHE).then(function(c){c.put('./',copy);});return res;}).catch(function(){return caches.match('./');}));return;}",
      "  e.respondWith(caches.match(req).then(function(c){return c||fetch(req);}));",
      "});"
    ].join("\n");
    try { var b=new Blob([swCode],{type:'text/javascript'}); navigator.serviceWorker.register(URL.createObjectURL(b)).catch(function(){}); } catch(e){}
  }
  // Check for the real file first.
  fetch('./sw.js',{method:'HEAD'}).then(function(r){
    if(r && r.ok){ navigator.serviceWorker.register('./sw.js').catch(function(){ registerBlobSW(); }); }
    else { registerBlobSW(); }
  }).catch(function(){ registerBlobSW(); });
})();
</script>
